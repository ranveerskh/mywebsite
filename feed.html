      `;
    }

    function renderCommunityPostHeader(post, author, displayName, username, avatarUrl, verifiedHtml, ownerId, postId, deleteButton) {
      const community = getCommunityById(post.communityId);
      const communityName = getCommunityName(post.communityId, post.communityName);
      const communityUrl = `community.html?communityId=${encodeURIComponent(post.communityId)}`;
      const firstLetter = (communityName || "C").trim().charAt(0).toUpperCase() || "C";
      const communityImage = community?.imageURL || "";

      const avatarHtml = communityImage
        ? `<a href="${communityUrl}" title="Open community">
             <img class="community-avatar" src="${escapeHtml(communityImage)}" alt="Community Photo">
           </a>`
        : `<a href="${communityUrl}" title="Open community" style="text-decoration:none;">
             <div class="community-avatar-placeholder">${escapeHtml(firstLetter)}</div>
           </a>`;

      const posterLabel = username
        ? `by <a href="member.html?uid=${encodeURIComponent(ownerId)}">@${escapeHtml(username)}</a>`
        : `by <a href="member.html?uid=${encodeURIComponent(ownerId)}">${escapeHtml(displayName)}</a>`;

      return `
        <div class="post-top">
          <div class="post-left">
            ${avatarHtml}
            <div class="post-top-text">
              <div class="post-name">
                <a class="community-name-link" href="${communityUrl}">
                  ${ICONS.community}
                  ${escapeHtml(communityName)}
                </a>
              </div>
              <div class="community-poster-line">
                ${posterLabel}
                ${verifiedHtml}
              </div>
              <div class="post-date">${formatDate(post.createdAt)}</div>
              <div class="post-community-pill">
                ${ICONS.community}
                Community post
              </div>
            </div>
          </div>

          <div class="post-top-actions">
            ${buildCommunityActions(post)}
            ${deleteButton}
          </div>
        </div>
      `;
    }

    function renderPostItem(post) {
      const postId = post.id;
      const ownerId = post.userId;
      const author = getAuthorProfile(ownerId);

      if (!ownerId || isUserBlocked(ownerId) || authorHidden(author, ownerId) || postHiddenOrUnsafe(post)) return null;

      const displayName = author?.displayName || post.displayName || "Member";
      const username = author?.username || post.username || "";
      const avatarUrl = author?.photoURL || post.userPhotoURL || "";
      const caption = post.caption;
      const imageUrl = post.imageURL;
      const communityPost = isCommunityPost(post);

      const verifiedHtml = author?.verified ? ICONS.verified : "";

      const canDeleteOwnPost =
        currentUser &&
        ownerId === currentUser.id &&
        (post.sourceTable === "posts" || !post.sourceTable);

      const deleteButton = canDeleteOwnPost
        ? `
          <button data-id="${postId}" class="delete-post-btn" title="Delete post" aria-label="Delete post">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
          </button>
        `
        : "";

      const relationButton = communityPost ? "" : buildRelationButton(ownerId, postId);

      const reportButton = currentUser && ownerId !== currentUser.id
        ? `
          <a class="icon-report-link" href="report.html?type=post&targetId=${encodeURIComponent(postId)}&targetUserId=${encodeURIComponent(ownerId)}" aria-label="Report">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 9v4"></path>
              <path d="M12 17h.01"></path>
              <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>
            </svg>
            <span>Report</span>
          </a>
        `
        : "";

      const headerHtml = communityPost
        ? renderCommunityPostHeader(post, author, displayName, username, avatarUrl, verifiedHtml, ownerId, postId, deleteButton)
        : renderStandardPostHeader(post, author, displayName, username, avatarUrl, verifiedHtml, ownerId, postId, deleteButton, relationButton);

      const item = document.createElement("div");
      item.className = communityPost ? "feed-item community-feed-item" : "feed-item";

      item.innerHTML = `
        ${headerHtml}

        <a class="post-click" href="post.html?postId=${encodeURIComponent(postId)}">
          ${caption ? `<div class="post-caption">${escapeHtml(caption)}</div>` : ""}
          ${imageUrl ? `<img class="post-image" src="${escapeHtml(imageUrl)}" alt="Post Image">` : ""}
        </a>

        <div class="post-actions">
          ${buildLikeButton(postId)}

          <button class="icon-action-btn comment-toggle-btn" data-post-id="${postId}" aria-label="Comments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
            </svg>
            <span class="comment-count">0</span>
          </button>

          ${reportButton}

          <button class="icon-action-btn share-btn" data-type="post" data-post-id="${postId}" aria-label="Share">
            ${ICONS.share}
            <span>Share</span>
          </button>
        </div>

        <div class="comments-wrap hidden" data-post-id="${postId}">
          <form class="comment-form" data-post-id="${postId}">
            <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
            <button type="submit" class="icon-action-btn comment-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
              </svg>
              <span>Add</span>
            </button>
          </form>
          <div class="comments-list" data-post-id="${postId}"></div>
        </div>
      `;

      const img = item.querySelector(".post-image");
      if (img) {
        img.addEventListener("error", () => {
          img.style.display = "none";
        });
      }

      item.querySelectorAll(".post-avatar, .community-avatar").forEach(imgEl => {
        imgEl.addEventListener("error", () => {
          imgEl.style.display = "none";
        });
      });

      return item;
    }

    async function renderFeedItems() {
      applyFeedTabUI();

      const items = getFilteredItems();
      postsList.innerHTML = "";

      if (!items.length) {
        emptyBox.classList.remove("hidden");

        emptyBox.textContent =
          currentFeedFilter === "following"
            ? "No posts from people you follow yet."
            : currentFeedFilter === "communities"
            ? "No community posts yet. Join or create communities from Nearby."
            : "No posts yet.";

        return;
      }

      emptyBox.classList.add("hidden");

      const postIds = [];

      for (const item of items) {
        const postEl = renderPostItem(item);
        if (!postEl) continue;

        postsList.appendChild(postEl);
        attachPostActions(item.id, item);
        postIds.push(item.id);
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            const { error } = await supabase
              .from("posts")
              .delete()
              .eq("id", postId)
              .eq("user_id", currentUser.id);

            if (error) throw error;
            await refreshFeedData();
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });

      Promise.all(postIds.map(id => refreshPostMeta(id))).catch(err => {
        console.error("Post meta refresh error:", err);
      });
    }

    async function uploadPostImage(file) {
      if (!file) return "";

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z0-9]/g, "") || "jpg";
      const safeName = (file.name || "image")
        .replace(/\.[^/.]+$/, "")
        .replace(/[^a-zA-Z0-9_-]/g, "-")
        .slice(0, 40) || "image";

      const path = `posts/${currentUser.id}/${Date.now()}_${safeName}.${ext}`;

      const { error: uploadError } = await supabase
        .storage
        .from(STORAGE_BUCKET)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    async function markNotificationsRead() {
      if (!currentUser) return;

      const now = nowIso();

      const payloads = [
        { is_read: true, read: true, read_at: now, updated_at: now },
        { is_read: true, read_at: now, updated_at: now },
        { is_read: true, updated_at: now },
        { read: true, updated_at: now },
        { isRead: true, readAt: now, updatedAt: now },
        { is_read: true },
        { read: true }
      ];

      const toColumns = ["to_user_id", "toUserId", "user_id", "userId"];

      for (const payload of payloads) {
        for (const toCol of toColumns) {
          await tryUpdate("notifications", payload, q => q.eq(toCol, currentUser.id));
        }
      }
    }

    notifyBtn.addEventListener("click", async () => {
      if (!currentUser) {
        window.location.href = "notifications.html";
        return;
      }

      await markNotificationsRead();
      window.location.href = "notifications.html";
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();

      if (!caption && !selectedImageFile) {
        setFormMessage("Write something or upload a photo.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        let uploadedImageUrl = "";
        if (selectedImageFile) {
          uploadedImageUrl = await uploadPostImage(selectedImageFile);
        }

        const displayName = currentUserProfile?.displayName || currentUser.user_metadata?.display_name || "Member";
        const userPhotoURL = currentUserProfile?.photoURL || "";
        const username = currentUserProfile?.username || "";

        const { error } = await supabase
          .from("posts")
          .insert({
            user_id: currentUser.id,
            author_id: currentUser.id,
            display_name: displayName,
            author_name: displayName,
            username,
            user_photo_url: userPhotoURL,
            caption,
            text: caption,
            body: caption,
            content: caption,
            image_url: uploadedImageUrl,
            photo_url: uploadedImageUrl,
            media_url: uploadedImageUrl,
            source: "feed",
            post_type: "post",
            hidden: false,
            hidden_by_admin: false,
            soft_deleted: false,
            created_at: nowIso(),
            updated_at: nowIso()
          });

        if (error) throw error;

        captionInput.value = "";
        selectedImageFile = null;
        updateSelectedImageUI();
        setFormMessage("Update posted.", "success");
        hideComposer();
        await refreshFeedData();
      } catch (error) {
        console.error(error);
        setFormMessage(error?.message || "Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    async function refreshFeedData() {
      // Important order:
      // 1) Load own profile first, because old users table may hold blocked_users array.
      // 2) Load blocked list before posts, so blocked authors never enter final visible feed.
      await loadCurrentUserProfile();
      await loadBlockedUsers();

      await Promise.all([
        loadFollows(),
        loadOutgoingRequests(),
        loadNotificationsCount(),
        loadInboxBadgeCount()
      ]);

      await loadPostsCommunitiesAndProfiles();
      await renderFeedItems();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        refreshFeedData().catch(err => console.error("Refresh error:", err));
      }, 350);
    }

    function clearSubscriptions() {
      feedSubscriptions.forEach(sub => {
        try {
          supabase.removeChannel(sub);
        } catch {}
      });

      feedSubscriptions = [];
    }

    function setupRealtime() {
      clearSubscriptions();

      const tables = [
        "posts",
        "public_profiles",
        "users",
        "follows",
        "follow_requests",
        "notifications",
        "message_requests",
        "chat_threads",
        "chat_messages",
        "communities",
        "community_members",
        "points_ledger",
        "blocked_users",
        "user_blocks",
        "blocks"
      ];

      tables.forEach(table => {
        try {
          const channel = supabase
            .channel(`ownspace-feed-live-${table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table },
              (payload) => {
                if (
                  table === "points_ledger" &&
                  payload?.eventType === "INSERT" &&
                  payload?.new?.user_id === currentUser?.id &&
                  Number(payload?.new?.points || 0) > 0
                ) {
                  showPointsToast(Number(payload.new.points || 0), "Your post reached a like milestone.");
                }

                scheduleRefresh();
              }
            )
            .subscribe();

          feedSubscriptions.push(channel);
        } catch {}
      });
    }

    window.addEventListener("hashchange", () => {
      if (window.location.hash === "#composerPanel") {
        showComposer();
      }
    });

    window.addEventListener("ownspace:badges-refresh", () => {
      loadInboxBadgeCount().catch(() => {});
    });

    async function initFeed() {
      const { data: userRes, error: userError } = await supabase.auth.getUser();

      if (userError || !userRes?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = userRes.user;

      await detectOptionalTables();
      await refreshFeedData();
      setupRealtime();

      if (window.location.hash === "#composerPanel") {
        showComposer();
      }

      supabase.auth.onAuthStateChange((_event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", clearSubscriptions);

    initFeed().catch((error) => {
      console.error(error);
      postsList.innerHTML = "";
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = "Could not load feed.";
    });

    /*
      OWNSPACE FEED UPDATE â BLOCKED USER FIX:

      Main fix:
      - Added blockedUserIds Set.
      - Added loadBlockedUsers().
      - Supports blocked_users, user_blocks, blocks, blockedUsers.
      - Supports old users.blocked_users array fallback.
      - Hides both directions:
        1) users I blocked
        2) users who blocked me
      - Blocked authors are filtered before render and again inside renderPostItem.
      - Blocked users' comments are hidden too.
      - Community posts from blocked authors are hidden.
      - Communities owned by blocked users are hidden from feed discovery.
      - Realtime now listens to blocked_users / user_blocks / blocks changes.

      Points added:
      - Feed top shows small Trust + Points chips.
      - Likes call RPC award_like_milestone_points(postId).
      - points_ledger realtime can show a small toast when current user earns points.
      - Trust Score remains separate from Points.

      Also preserved:
      - All / Following / Communities feed tabs.
      - Supabase Storage post image upload.
      - Likes, comments, share, report.
      - Follow / request follow top button.
      - Community open/join/request buttons.
      - Correct inbox badge logic: pending message_requests + unread incoming chat_messages only.
    */
  </script>
