<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Feed</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 90%, #000 10%));
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.05;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .notify-count{
      position:absolute;
      top:-4px;
      right:-2px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid var(--topbar-bg);
    }

    .feed-shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .feed-head{
      padding:12px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
    }

    .feed-head-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .section-title{
      font-size:17px;
      font-weight:950;
      line-height:1.2;
    }

    .write-btn{
      border:none;
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.22);
      border-radius:13px;
      padding:9px 12px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
      min-height:38px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .write-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .write-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .filter-tabs{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
    }

    .filter-tab{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:13px;
      padding:9px 4px;
      font-size:11px;
      font-weight:950;
      cursor:pointer;
      min-height:36px;
      white-space:nowrap;
    }

    .filter-tab.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .composer-wrap{
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
      padding:12px;
    }

    .composer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .composer-head-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .avatar,
    .post-avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .avatar-placeholder,
    .post-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:var(--surface-3);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
    }

    .composer-head h3{
      font-size:15px;
      margin-bottom:2px;
      font-weight:950;
    }

    .composer-username{
      color:var(--blue);
      font-size:12px;
      font-weight:850;
      margin-top:2px;
    }

    .muted{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .field{margin-bottom:10px}

    textarea,
    input[type="file"]{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:13px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    textarea{min-height:92px}
    textarea::placeholder{color:var(--muted)}

    .composer-actions{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .post-btn{
      border:none;
      background:var(--green);
      color:#052112;
      padding:11px 16px;
      border-radius:13px;
      font-weight:950;
      cursor:pointer;
      min-width:124px;
    }

    .post-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .close-compose-btn,
    .remove-image-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 11px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
    }

    .message{min-height:18px;font-size:13px}
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .tiny-note{
      color:var(--muted);
      font-size:11px;
      line-height:1.45;
      margin-top:5px;
    }

    .image-preview-wrap{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .image-preview{
      width:100%;
      max-height:360px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line-soft);
    }

    .posts-list{display:block}

    .feed-item{
      padding:12px;
      border-bottom:1px solid var(--line-soft);
    }

    .feed-item:last-child{border-bottom:none}

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .post-left{
      display:flex;
      gap:10px;
      align-items:center;
      min-width:0;
    }

    .post-top-text{min-width:0}

    .post-name{
      font-size:15px;
      font-weight:950;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .post-name a{
      color:var(--text);
      text-decoration:none;
    }

    .post-name a:hover{text-decoration:underline}

    .verified-badge{
      width:20px;
      height:20px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#fff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:
        0 0 0 3px rgba(32,199,111,.16),
        0 8px 18px rgba(32,199,111,.20);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:12px;
      height:12px;
      display:block;
      stroke-width:3;
    }

    .post-username{
      color:var(--blue);
      font-size:12px;
      font-weight:850;
      margin-top:2px;
      word-break:break-word;
    }

    .post-date{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
    }

    .post-top-actions{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      flex-shrink:0;
    }

    .follow-top-btn,
    .delete-post-btn{
      width:34px;
      height:34px;
      min-width:34px;
      border:none;
      border-radius:10px;
      padding:0;
      font-size:0;
      font-weight:950;
      cursor:pointer;
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .follow-top-btn svg,
    .delete-post-btn svg{
      width:16px;
      height:16px;
      display:block;
    }

    .follow-top-btn.follow{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }

    .follow-top-btn.request{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }

    .follow-top-btn.requested{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }

    .delete-post-btn{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }

    .post-click{
      display:block;
      text-decoration:none;
      color:inherit;
    }

    .post-caption{
      color:var(--text);
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }

    .post-image{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-2);
      margin-top:4px;
      border:1px solid var(--line-soft);
    }

    .post-actions,
    .card-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }

    .icon-action-btn,
    .icon-report-link,
    .mini-btn{
      border:none;
      cursor:pointer;
      font-weight:950;
      border-radius:11px;
      padding:8px 10px;
      font-size:11.5px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-decoration:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      min-height:34px;
    }

    .icon-action-btn svg,
    .icon-report-link svg,
    .mini-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .like-btn{
      background:rgba(76,201,255,.12);
      border-color:rgba(76,201,255,.18);
    }

    .like-btn[data-liked="yes"]{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.22);
    }

    .like-btn[data-liked="yes"] svg{
      fill:currentColor;
      color:var(--red);
    }

    .comment-toggle-btn{
      background:rgba(167,139,250,.12);
      border-color:rgba(167,139,250,.18);
    }

    .share-btn{
      margin-left:auto;
      background:rgba(61,220,132,.12);
      border-color:rgba(61,220,132,.18);
    }

    .icon-report-link{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }

    .comments-wrap{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--line-soft);
    }

    .comment-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .comment-input{
      flex:1;
      min-width:200px;
      border:none;
      outline:none;
      padding:12px 13px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:13px;
    }

    .comment-submit{
      background:var(--green);
      color:#052112;
      border-color:rgba(61,220,132,.20);
    }

    .comments-list{
      display:grid;
      gap:10px;
    }

    .comment-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
    }

    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }

    .comment-author{
      font-weight:950;
      font-size:13px;
      color:var(--text);
    }

    .comment-username{
      color:var(--blue);
      font-size:11px;
      font-weight:850;
      margin-top:2px;
    }

    .comment-date{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
    }

    .comment-text{
      color:var(--text);
      line-height:1.55;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:11px;
      font-weight:950;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .content-card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .content-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .content-type{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:950;
      border:1px solid var(--line);
      background:rgba(76,201,255,.14);
      color:var(--text);
      white-space:nowrap;
    }

    .content-type.event{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }

    .content-type.place{
      background:rgba(61,220,132,.14);
      border-color:rgba(61,220,132,.20);
    }

    .content-type.community{
      background:rgba(167,139,250,.14);
      border-color:rgba(167,139,250,.20);
    }

    .content-title{
      font-size:16px;
      font-weight:950;
      line-height:1.35;
      margin-bottom:7px;
    }

    .content-meta{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      margin-bottom:8px;
    }

    .content-desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .content-image{
      width:100%;
      max-height:420px;
      object-fit:cover;
      border-radius:15px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line-soft);
      margin-top:10px;
    }

    .empty-box{
      text-align:center;
      padding:24px 12px;
      color:var(--muted);
      background:var(--surface-2);
      margin:12px;
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .composer-actions{align-items:stretch}
      .post-btn{width:100%}
      .comment-form{flex-direction:column}
      .close-compose-btn{width:100%}
      .feed-item{padding:11px}
      .feed-head-top{align-items:stretch}
      .write-btn{width:100%;justify-content:center}
      .remove-image-btn{width:100%}
      .share-btn{margin-left:0}
      .filter-tab{font-size:10px;padding:8px 2px}
      .brand{font-size:17px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <a href="school.html" class="top-icon-btn" aria-label="School">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-5 9 5-9 5-9-5z"></path>
          <path d="M7 12v5c0 .6 2.2 3 5 3s5-2.4 5-3v-5"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Member feed</div>
      </div>

      <button id="notifyBtn" class="top-icon-btn" type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
          <path d="M10 20a2 2 0 0 0 4 0"></path>
        </svg>
        <span id="notifyCount" class="notify-count hidden">0</span>
      </button>
    </div>

    <div class="feed-shell">
      <div class="feed-head">
        <div class="feed-head-top">
          <div class="section-title">Feed</div>

          <button id="openComposerBtn" class="write-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <circle cx="8.5" cy="10" r="1.5"></circle>
              <path d="M21 15l-5-5L5 21"></path>
            </svg>
            <span>Share a Post</span>
          </button>
        </div>

        <div class="filter-tabs">
          <button class="filter-tab active" data-feed-filter="all" type="button">All</button>
          <button class="filter-tab" data-feed-filter="following" type="button">Following</button>

  <script type="module">
    import { supabase } from "./supabase.js";

    const STORAGE_BUCKET = "media";
    const FEED_FILTER_KEY = "ownspaceFeedFilter";

    const postForm = document.getElementById("postForm");
    const postBtn = document.getElementById("postBtn");
    const captionInput = document.getElementById("caption");
    const imageFileInput = document.getElementById("imageFile");
    const imagePreviewWrap = document.getElementById("imagePreviewWrap");
    const imagePreview = document.getElementById("imagePreview");
    const removeImageBtn = document.getElementById("removeImageBtn");
    const formMessage = document.getElementById("formMessage");

    const myName = document.getElementById("myName");
    const myUsername = document.getElementById("myUsername");
    const myAvatar = document.getElementById("myAvatar");
    const myAvatarPlaceholder = document.getElementById("myAvatarPlaceholder");

    const postsList = document.getElementById("postsList");
    const emptyBox = document.getElementById("emptyBox");
    const notifyBtn = document.getElementById("notifyBtn");
    const notifyCount = document.getElementById("notifyCount");
    const inboxBadge = document.getElementById("inboxBadge");

    const composerPanel = document.getElementById("composerPanel");
    const openComposerBtn = document.getElementById("openComposerBtn");
    const closeComposerBtn = document.getElementById("closeComposerBtn");

    let currentUser = null;
    let currentUserProfile = null;
    let currentFeedFilter = getSavedFeedFilter();
    let follows = [];
    let outgoingRequests = [];
    let allPosts = [];
    let allEvents = [];
    let allPlaces = [];
    let allCommunities = [];
    let publicProfilesMap = new Map();
    let selectedImageFile = null;
    let feedSubscriptions = [];
    let hasPostLikesTable = false;
    let refreshTimer = null;

    const TABLES = {
      events: ["events"],
      places: ["places", "nearby_places", "nudist_places"],
      communities: ["communities", "community"],
      communityMembers: ["community_members", "communities_members", "communityMembers"]
    };

    const ICONS = {
      verified: `
        <span class="verified-badge" title="Verified">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      `,
      open: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      `,
      share: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.6 13.5 6.8 4"></path>
          <path d="m15.4 6.5-6.8 4"></path>
        </svg>
      `
    };

    function getSavedFeedFilter() {
      const saved = localStorage.getItem(FEED_FILTER_KEY);
      const allowed = ["all", "following", "communities", "events", "places"];
      return allowed.includes(saved) ? saved : "all";
    }

    function saveFeedFilter(value) {
      localStorage.setItem(FEED_FILTER_KEY, value);
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", resolveTheme(getStoredTheme()));
    }

    applyTheme();

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme();
      });
    }

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showComposer() {
      if (openComposerBtn.disabled) return;
      composerPanel.classList.remove("hidden");
      composerPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      setTimeout(() => captionInput.focus(), 180);
    }

    function hideComposer() {
      composerPanel.classList.add("hidden");
    }

    openComposerBtn.addEventListener("click", showComposer);
    closeComposerBtn.addEventListener("click", hideComposer);

    function showMyAvatar(url) {
      const cleanUrl = String(url || "").trim();

      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }

      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(value) {
      if (!value) return "Just now";

      try {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "Just now";

        const now = Date.now();
        const diff = now - d.getTime();
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if (diff < minute) return "Now";
        if (diff < hour) return `${Math.floor(diff / minute)}m ago`;
        if (diff < day) return `${Math.floor(diff / hour)}h ago`;
        if (diff < day * 7) return `${Math.floor(diff / day)}d ago`;

        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      } catch {
        return "Just now";
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
      }
      return fallback;
    }

    function getBool(raw, names, fallback = false) {
      for (const name of names) {
        if (raw?.[name] !== undefined && raw?.[name] !== null) return !!raw[name];
      }
      return fallback;
    }

    function getCreatedMs(value) {
      if (!value) return 0;
      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : 0;
    }

    function isMissingTableError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("does not exist") ||
        (msg.includes("relation") && msg.includes("does not exist")) ||
        msg.includes("could not find the table") ||
        msg.includes("not found in the schema cache")
      );
    }

    async function selectAllAvailable(tableNames, buildQuery = null) {
      const merged = [];

      for (const table of tableNames) {
        try {
          let q = supabase.from(table).select("*");
          if (buildQuery) q = buildQuery(q, table);
          const { data, error } = await q;

          if (error) {
            if (isMissingTableError(error)) continue;
            console.error(`Query error on ${table}:`, error);
            continue;
          }

          (data || []).forEach(row => merged.push({ ...row, __table: table }));
        } catch (err) {
          console.error(`Query failed on ${table}:`, err);
        }
      }

      return merged;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"], "Member") || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        bio: getField(d, ["bio", "about", "description"]),
        suspensionUntil: d.suspension_until ?? d.suspensionUntil ?? null
      };
    }

    function normalizePost(raw) {
      const d = raw || {};

      return {
        itemType: "post",
        id: d.id || "",
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "uid"]),
        displayName: getField(d, ["display_name", "displayName", "name"]),
        username: getField(d, ["username"]),
        userPhotoURL: getField(d, ["user_photo_url", "userPhotoURL", "photo_url", "photoURL"]),
        caption: getField(d, ["caption", "text", "content"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        source: getField(d, ["source"]) || "feed",
        hidden: !!(d.hidden),
        hiddenByAdmin: !!(d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        createdAt: d.created_at ?? d.createdAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt)
      };
    }

    function normalizeComment(raw) {
      const d = raw || {};

      return {
        id: d.id || "",
        postId: getField(d, ["post_id", "postId"]),
        userId: getField(d, ["user_id", "userId", "uid"]),
        displayName: getField(d, ["display_name", "displayName", "name"]) || "Member",
        username: getField(d, ["username"]),
        text: getField(d, ["text", "comment", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    function normalizeNotification(raw) {
      const d = raw || {};

      return {
        id: d.id || "",
        isRead: !!(d.is_read ?? d.isRead ?? d.read),
        toUserId: getField(d, ["to_user_id", "toUserId", "user_id", "userId"])
      };
    }

    function normalizeEvent(raw) {
      const d = raw || {};

      return {
        itemType: "event",
        id: d.id || "",
        title: getField(d, ["title", "name"], "Untitled Event"),
        description: getField(d, ["description", "desc"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        date: getField(d, ["date"]),
        time: getField(d, ["time"]),
        visibility: getField(d, ["visibility", "event_visibility", "eventVisibility"], "public"),
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"], "Member"),
        hidden: getBool(d, ["hidden", "hidden_by_admin", "hiddenByAdmin", "soft_deleted", "softDeleted"]) || String(d.status || "").toLowerCase() === "deleted",
        createdAt: d.created_at ?? d.createdAt ?? d.event_at ?? d.eventAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt ?? d.event_at ?? d.eventAt)
      };
    }

    function normalizePlace(raw) {
      const d = raw || {};

      return {
        itemType: "place",
        id: d.id || "",
        source: d.__table || d.source || d.place_source || d.placeSource || "",
        name: getField(d, ["name", "title", "place_name", "placeName"], "Untitled Place"),
        category: getField(d, ["category", "topic"], "Place"),
        city: getField(d, ["city", "location_city", "locationCity"]),
        description: getField(d, ["description", "desc", "notes"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "user_id", "userId", "owner_id", "ownerId"]),
        hidden: getBool(d, ["hidden", "hidden_by_admin", "hiddenByAdmin", "soft_deleted", "softDeleted"]) || String(d.status || "").toLowerCase() === "deleted",
        approved: d.approved === true || d.verified === true || ["approved", "active", "verified"].includes(String(d.status || "").toLowerCase()),
        createdAt: d.created_at ?? d.createdAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt)
      };
    }

    function normalizeCommunity(raw) {
      const d = raw || {};

      return {
        itemType: "community",
        id: d.id || "",
        name: getField(d, ["name", "title", "community_name", "communityName"], "Untitled Community"),
        description: getField(d, ["description", "desc", "about"]),
        privacy: getField(d, ["privacy", "visibility", "type"], "Public"),
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "owner_id", "ownerId", "user_id", "userId", "uid"]),
        memberCount: Number(d.member_count ?? d.memberCount ?? d.members_count ?? d.membersCount ?? 0) || 0,
        hidden: getBool(d, ["hidden", "hidden_by_admin", "hiddenByAdmin", "soft_deleted", "softDeleted"]) || String(d.status || "").toLowerCase() === "deleted",
        createdAt: d.created_at ?? d.createdAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt)
      };
    }

    function authorHidden(author) {
      return author?.isHiddenByAdmin || author?.moderationStatus === "banned" || author?.softDeleted;
    }

    function getAuthorProfile(uid) {
      if (uid === currentUser?.id && currentUserProfile) return currentUserProfile;
      return publicProfilesMap.get(uid) || null;
    }

    function isFollowing(userId) {
      return follows.some(f => (f.following_id || f.followingId) === userId);
    }

    function isOutgoingRequested(userId) {
      return outgoingRequests.some(r => (r.target_id || r.targetId) === userId);
    }

    function canViewerSeePost(post) {
      if (!post?.userId || !currentUser) return false;
      if (post.userId === currentUser.id) return true;

      const author = getAuthorProfile(post.userId);
      if (!author) return true;
      if (authorHidden(author)) return false;

      if (author.isPrivate && !isFollowing(post.userId)) return false;

      return true;
    }

    function getFilteredItems() {
      if (currentFeedFilter === "following") {
        return allPosts
          .filter(post => {
            if (!post.userId) return false;
            if (post.hidden || post.hiddenByAdmin || post.softDeleted) return false;

            const author = getAuthorProfile(post.userId);
            if (authorHidden(author)) return false;

            return post.userId === currentUser.id || isFollowing(post.userId);
          })
          .sort((a, b) => b.createdAtMs - a.createdAtMs);
      }

      if (currentFeedFilter === "events") {
        return allEvents
          .filter(event => !event.hidden)
          .sort((a, b) => b.createdAtMs - a.createdAtMs);
      }

      if (currentFeedFilter === "places") {
        return allPlaces
          .filter(place => !place.hidden)
          .sort((a, b) => b.createdAtMs - a.createdAtMs);
      }

      if (currentFeedFilter === "communities") {
        return allCommunities
          .filter(community => !community.hidden)
          .sort((a, b) => b.createdAtMs - a.createdAtMs);
      }

      return [
        ...allPosts.filter(post => {
          if (!post.userId) return false;
          if (post.hidden || post.hiddenByAdmin || post.softDeleted) return false;

          const author = getAuthorProfile(post.userId);
          if (authorHidden(author)) return false;

          return canViewerSeePost(post);
        }),
        ...allEvents.filter(event => !event.hidden),
        ...allPlaces.filter(place => !place.hidden),
        ...allCommunities.filter(community => !community.hidden)
      ].sort((a, b) => b.createdAtMs - a.createdAtMs);
    }

    function applyFeedTabUI() {
      document.querySelectorAll(".filter-tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.feedFilter === currentFeedFilter);
      });
    }

    document.querySelectorAll(".filter-tab").forEach(btn => {
      btn.addEventListener("click", async () => {
        currentFeedFilter = btn.dataset.feedFilter || "all";
        saveFeedFilter(currentFeedFilter);
        applyFeedTabUI();
        await renderFeedItems();
      });
    });

    function formatBadgeCount(count) {
      return count > 99 ? "99+" : String(count);
    }

    function renderNotifications(items) {
      const unread = items.filter(item => !item.isRead);
      const count = unread.length;

      if (!count) {
        notifyCount.classList.add("hidden");
      } else {
        notifyCount.textContent = formatBadgeCount(count);
        notifyCount.classList.remove("hidden");
      }
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];

      for (const col of targetColumns) {
        try {
          const { count, error } = await supabase
            .from("message_requests")
            .select("id", { count: "exact", head: true })
            .eq(col, uid)
            .eq("status", "pending");

          if (!error) return count || 0;
        } catch {}
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (!Array.isArray(threads) || !threads.length) return 0;

        const threadIds = threads.map(t => t.id).filter(Boolean);
        if (!threadIds.length) return 0;

        const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

        for (const field of seenFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .is(field, null);

            if (!error) return count || 0;
          } catch {}
        }

        const boolFields = ["is_read", "read"];

        for (const field of boolFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .eq(field, false);

            if (!error) return count || 0;
          } catch {}
        }
      } catch {}

      return 0;
    }

    async function loadInboxBadgeCount() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = formatBadgeCount(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    function getRelationState(authorId) {
      if (!currentUser || !authorId) return "none";
      if (authorId === currentUser.id) return "self";
      if (isFollowing(authorId)) return "following";

      const author = getAuthorProfile(authorId);
      if (author?.isPrivate) {
        return isOutgoingRequested(authorId) ? "requested" : "request";
      }

      return "follow";
    }

    function buildRelationButton(authorId, postId) {
      const relation = getRelationState(authorId);
      if (relation === "self") return "";
      if (relation === "following") return "";

      if (relation === "requested") {
        return `
          <button class="follow-top-btn requested" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}" title="Requested" aria-label="Requested">

    function updateSelectedImageUI() {
      if (!selectedImageFile) {
        imageFileInput.value = "";
        imagePreviewWrap.classList.add("hidden");
        imagePreview.removeAttribute("src");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        imagePreview.src = reader.result;
        imagePreviewWrap.classList.remove("hidden");
      };
      reader.readAsDataURL(selectedImageFile);
    }

    imageFileInput.addEventListener("change", () => {
      const file = imageFileInput.files?.[0] || null;

      if (!file) {
        selectedImageFile = null;
        updateSelectedImageUI();
        return;
      }

      if (!file.type.startsWith("image/")) {
        selectedImageFile = null;
        updateSelectedImageUI();
        setFormMessage("Please choose an image file.", "error");
        return;
      }

      selectedImageFile = file;
      setFormMessage("");
      updateSelectedImageUI();

    async function ensureOwnProfileRows() {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", currentUser.id).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", currentUser.id).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      let userRow = userRes.data || null;
      let publicRow = publicRes.data || null;

      if (!userRow && !publicRow) {
        const fallbackName =
          currentUser.user_metadata?.display_name ||
          currentUser.email?.split("@")[0] ||
          "Member";

        const baseRow = {
          uid: currentUser.id,
          display_name: fallbackName,
          display_name_lower: fallbackName.toLowerCase(),
          username: "",
          username_lower: "",
          bio: "",
          photo_url: "",
          city: "",
          city_lower: "",
          province: "",
          country: "",
          location_search: "",
          city_visible: false,
          is_private: false,
          is_verified: false,
          show_in_nearby: true,
          location_visibility: "city",
          moderation_status: "",
          trust_score: 50,
          points_balance: 0,
          updated_at: nowIso()
        };

        const userPayload = {
          ...baseRow,
          email: currentUser.email || "",
          real_name: "",
          blocked_users: []
        };

        const { error: saveUserError } = await supabase
          .from("users")
          .upsert(userPayload, { onConflict: "uid" });

        if (saveUserError) throw saveUserError;

        const { error: savePublicError } = await supabase
          .from("public_profiles")
          .upsert(baseRow, { onConflict: "uid" });

        if (savePublicError) throw savePublicError;

        userRow = userPayload;
        publicRow = baseRow;
      }

      return normalizeProfile({ ...(publicRow || {}), ...(userRow || {}), uid: currentUser.id }, currentUser.id);
    }

    async function loadCurrentUserProfile() {
      currentUserProfile = await ensureOwnProfileRows();

      myName.textContent =
        currentUserProfile.displayName ||
        currentUser.user_metadata?.display_name ||
        currentUser.email?.split("@")[0] ||
        "Member";

      if (currentUserProfile.username) {
        myUsername.textContent = "@" + currentUserProfile.username;
        myUsername.classList.remove("hidden");
      } else {
        myUsername.classList.add("hidden");
      }

      showMyAvatar(currentUserProfile.photoURL || "");

      const status = currentUserProfile?.moderationStatus || "";
      const suspendUntilValue = currentUserProfile?.suspensionUntil || null;

      const suspensionUntil = suspendUntilValue
        ? new Date(suspendUntilValue).getTime()
        : 0;

      if (status === "banned") {
        hideComposer();
        openComposerBtn.disabled = true;
        setFormMessage("Your account is banned. Posting is disabled.", "error");
      } else if (status === "suspended" && suspensionUntil && Date.now() < suspensionUntil) {
        hideComposer();
        openComposerBtn.disabled = true;
        setFormMessage("Your account is suspended. Posting is disabled for now.", "error");
      } else {
        openComposerBtn.disabled = false;
      }
    }

    async function loadPostsEventsPlacesCommunitiesAndProfiles() {
      const [
        postRowsRes,
        eventRows,
        placeRows,
        communityRows
      ] = await Promise.all([
        supabase.from("posts").select("*").order("created_at", { ascending: false }),
        selectAllAvailable(TABLES.events),
        selectAllAvailable(TABLES.places),
        selectAllAvailable(TABLES.communities)
      ]);

      if (postRowsRes.error) throw postRowsRes.error;

      allPosts = (postRowsRes.data || []).map(normalizePost);
      allEvents = (eventRows || []).map(normalizeEvent).filter(e => !e.hidden);
      allPlaces = (placeRows || []).map(normalizePlace).filter(p => !p.hidden);
      allCommunities = (communityRows || []).map(normalizeCommunity).filter(c => !c.hidden);

      const authorIds = [
        ...allPosts.map(p => p.userId),
        ...allEvents.map(e => e.creatorId),
        ...allPlaces.map(p => p.creatorId),
        ...allCommunities.map(c => c.creatorId)
      ].filter(Boolean);

      const uniqueAuthorIds = [...new Set(authorIds)];
      publicProfilesMap = new Map();

      if (uniqueAuthorIds.length) {
        const { data: profileRows, error: profileError } = await supabase
          .from("public_profiles")
          .select("*")
          .in("uid", uniqueAuthorIds);

        if (profileError) throw profileError;

        (profileRows || []).forEach(row => {
          const p = normalizeProfile(row, row.uid);
          publicProfilesMap.set(p.uid, p);
        });
      }

      if (currentUserProfile) {
        publicProfilesMap.set(currentUser.id, currentUserProfile);
      }
    }

    async function findFollowRow(authorId) {
      const existing = follows.find(f => (f.following_id || f.followingId) === authorId);
      if (existing) return existing;

      const { data, error } = await supabase
        .from("follows")
        .select("*")
        .eq("follower_id", currentUser.id)
        .eq("following_id", authorId)
        .limit(1);

      if (error) throw error;
      return data?.[0] || null;
    }

    async function findRequestRow(authorId) {
      const existing = outgoingRequests.find(r => (r.target_id || r.targetId) === authorId);
      if (existing) return existing;

      const { data, error } = await supabase
        .from("follow_requests")
        .select("*")
        .eq("requester_id", currentUser.id)
        .eq("target_id", authorId)
        .limit(1);

      if (error) throw error;
      return data?.[0] || null;
    }

    async function createNotificationSafe(payload) {
      if (!payload?.to_user_id || payload.to_user_id === currentUser.id) return;

      const variants = [
        payload,
        { ...payload, user_id: payload.to_user_id }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function handleTopRelationAction(authorId, relationBtn) {
      if (!currentUser || !authorId || authorId === currentUser.id) return;

      const author = getAuthorProfile(authorId);
      const relation = getRelationState(authorId);
      relationBtn.disabled = true;

      try {
        if (relation === "requested") {
          const row = await findRequestRow(authorId);

          if (row?.id) {
            const { error } = await supabase
              .from("follow_requests")
              .delete()
              .eq("id", row.id);

            if (error) throw error;
          }
        } else if (author?.isPrivate) {
          const row = await findRequestRow(authorId);

          if (!row) {
            const { error } = await supabase
              .from("follow_requests")
              .insert({
                requester_id: currentUser.id,
                target_id: authorId,
                from_user_id: currentUser.id,
                to_user_id: authorId,
                status: "pending",
                created_at: nowIso(),
                updated_at: nowIso()
              });

            if (error) throw error;

            await createNotificationSafe({
              type: "follow_request",
              title: "Follow request",
              text: `${currentUserProfile?.displayName || "Someone"} sent you a follow request.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        } else {
          const row = await findFollowRow(authorId);

          if (!row) {
            const { error } = await supabase
              .from("follows")
              .insert({
                follower_id: currentUser.id,
                following_id: authorId,
                created_at: nowIso()
              });

            if (error) throw error;

            await createNotificationSafe({
              type: "follow",
              title: "New follower",
              text: `${currentUserProfile?.displayName || "Someone"} started following you.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        }

        await Promise.all([loadFollows(), loadOutgoingRequests()]);
        await renderFeedItems();
      } catch (error) {
        console.error("Relation action failed:", error);
        alert("Could not update follow state.");
      }

      relationBtn.disabled = false;
    }

    async function loadPostMeta(postId) {
      let likeCount = 0;
      let liked = false;

      if (hasPostLikesTable) {
        try {
          const [countRes, myLikeRes] = await Promise.all([
            supabase.from("post_likes").select("id", { count: "exact", head: true }).eq("post_id", postId),
            supabase.from("post_likes").select("id").eq("post_id", postId).eq("user_id", currentUser.id).limit(1)
          ]);

          if (!countRes.error) likeCount = countRes.count || 0;
          if (!myLikeRes.error) liked = !!(myLikeRes.data && myLikeRes.data.length);
        } catch (err) {
          console.error("Like meta error:", err);
        }
      }

      let commentCount = 0;

      try {
        const { count, error } = await supabase
          .from("post_comments")
          .select("id", { count: "exact", head: true })
          .eq("post_id", postId);

        if (!error) commentCount = count || 0;
      } catch (err) {
        console.error("Comment meta error:", err);
      }

      return { likeCount, liked, commentCount };
    }

    async function renderCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const postRow = allPosts.find(p => p.id === postId);
        const postOwnerId = postRow ? postRow.userId : "";

        const { data, error } = await supabase
          .from("post_comments")
          .select("*")
          .eq("post_id", postId)
          .order("created_at", { ascending: true });

        if (error) throw error;

        const comments = (data || []).map(normalizeComment);
        const countEl = commentsToggle.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(comments.length);

        if (!comments.length) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        comments.forEach((comment) => {
          const canDelete = comment.userId === currentUser.id || postOwnerId === currentUser.id;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";

          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                ${comment.username ? `<div class="comment-username">@${escapeHtml(comment.username)}</div>` : ""}
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${comment.id}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              const { error } = await supabase
                .from("post_comments")
                .delete()
                .eq("id", cId);

              if (error) throw error;
              await refreshPostMeta(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentsWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);

      const meta = await loadPostMeta(postId);

      if (likeBtn) {
        likeBtn.dataset.liked = meta.liked ? "yes" : "no";
        const countEl = likeBtn.querySelector(".like-count");
        if (countEl) countEl.textContent = String(meta.likeCount);
      }

      if (commentToggleBtn) {
        const countEl = commentToggleBtn.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(meta.commentCount);
      }

      if (commentsWrap && !commentsWrap.classList.contains("hidden")) {
        await renderCommentsUI(postId);
      }
    }

    function buildShareUrl(type, item) {
      const url = new URL(window.location.href);

      if (type === "post") {
        url.pathname = url.pathname.replace(/[^/]*$/, "post.html");
        url.search = "";
        url.searchParams.set("postId", item.id);
        return url.toString();
      }

      if (type === "event") {
        url.pathname = url.pathname.replace(/[^/]*$/, "event.html");
        url.search = "";
        url.searchParams.set("eventId", item.id);
        return url.toString();
      }

      if (type === "place") {
        url.pathname = url.pathname.replace(/[^/]*$/, "place.html");
        url.search = "";
        url.searchParams.set("placeId", item.id);
        if (item.source) url.searchParams.set("source", item.source);
        return url.toString();
      }

      if (type === "community") {
        url.pathname = url.pathname.replace(/[^/]*$/, "community.html");
        url.search = "";
        url.searchParams.set("communityId", item.id);
        return url.toString();
      }

      return window.location.href;
    }

    async function shareItem(type, item, label = "OwnSpace") {
      const url = buildShareUrl(type, item);
      const title =
        type === "post" ? "Check this post on OwnSpace" :
        type === "event" ? `Check this event on OwnSpace` :
        type === "place" ? `Check this place on OwnSpace` :
        type === "community" ? `Check this community on OwnSpace` :
        "Check this on OwnSpace";

      const text =
        type === "post" ? "Check this post on OwnSpace." :
        `Check out ${label || "this"} on OwnSpace.`;

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Link copied.");
        } else {
          prompt("Copy this link:", url);
        }
      } catch (err) {
        console.error("Share failed:", err);
      }
    }

    function attachPostActions(postId, postData) {
      const ownerId = postData.userId;
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const shareBtn = document.querySelector(`.share-btn[data-type="post"][data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
      const relationBtn = document.querySelector(`.follow-top-btn[data-author-id="${ownerId}"][data-post-id="${postId}"]`);

      if (relationBtn) {
        relationBtn.addEventListener("click", async () => {
          await handleTopRelationAction(ownerId, relationBtn);
        });
      }

      if (shareBtn) {
        shareBtn.addEventListener("click", async () => {
          await shareItem("post", postData, "post");
        });
      }

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser || !hasPostLikesTable) return;
          likeBtn.disabled = true;

          try {
            const { data: existing, error: findError } = await supabase
              .from("post_likes")
              .select("id")
              .eq("post_id", postId)
              .eq("user_id", currentUser.id)
              .limit(1);

            if (findError) throw findError;

            if (existing && existing.length) {
              const { error } = await supabase
                .from("post_likes")
                .delete()
                .eq("id", existing[0].id);

              if (error) throw error;
            } else {
              const { error } = await supabase
                .from("post_likes")
                .insert({
                  post_id: postId,
                  user_id: currentUser.id,
                  created_at: nowIso()
                });

              if (error) throw error;

              if (ownerId && ownerId !== currentUser.id) {
                await createNotificationSafe({
                  type: "like",
                  title: "New like",
                  text: `${currentUserProfile?.displayName || "Someone"} liked your post.`,
                  from_user_id: currentUser.id,
                  to_user_id: ownerId,
                  post_id: postId,
                  created_at: nowIso(),
                  is_read: false
                });
              }
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");

          if (!commentWrap.classList.contains("hidden")) {
            await renderCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text) return;

          const displayName = currentUserProfile?.displayName || "Member";
          const username = currentUserProfile?.username || "";
          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            const { error } = await supabase
              .from("post_comments")
              .insert({
                post_id: postId,
                user_id: currentUser.id,
                display_name: displayName,
                username,
                text,
                created_at: nowIso()
              });

            if (error) throw error;

            commentInput.value = "";

            if (ownerId && ownerId !== currentUser.id) {
              await createNotificationSafe({
                type: "comment",
                title: "New comment",
                text: `${displayName} commented on your post.`,
                from_user_id: currentUser.id,
                to_user_id: ownerId,
                post_id: postId,
                created_at: nowIso(),
                is_read: false
              });
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert(error?.message || "Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }

          <button data-id="${postId}" class="delete-post-btn" title="Delete post" aria-label="Delete post">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
          </button>
        `
        : "";

      const relationButton = buildRelationButton(ownerId, postId);

      const reportButton = currentUser && ownerId !== currentUser.id
        ? `
          <a class="icon-report-link" href="report.html?type=post&targetId=${encodeURIComponent(postId)}&targetUserId=${encodeURIComponent(ownerId)}" aria-label="Report">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 9v4"></path>
              <path d="M12 17h.01"></path>
              <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>
            </svg>
            <span>Report</span>
          </a>
        `
        : "";

      const item = document.createElement("div");
      item.className = "feed-item";

      item.innerHTML = `
        <div class="post-top">
          <div class="post-left">
            ${avatarHtml}
            <div class="post-top-text">
              <div class="post-name">
                <a href="member.html?uid=${encodeURIComponent(ownerId)}">${escapeHtml(displayName)}</a>
                ${verifiedHtml}
              </div>
              ${username ? `<div class="post-username">@${escapeHtml(username)}</div>` : ""}
              <div class="post-date">${formatDate(post.createdAt)}</div>
            </div>
          </div>

          <div class="post-top-actions">
            ${relationButton}
            ${deleteButton}
          </div>
        </div>

        <a class="post-click" href="post.html?postId=${encodeURIComponent(postId)}">
          ${caption ? `<div class="post-caption">${escapeHtml(caption)}</div>` : ""}
          ${imageUrl ? `<img class="post-image" src="${escapeHtml(imageUrl)}" alt="Post Image">` : ""}
        </a>

        <div class="post-actions">
          ${buildLikeButton(postId)}

          <button class="icon-action-btn comment-toggle-btn" data-post-id="${postId}" aria-label="Comments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
            </svg>
            <span class="comment-count">0</span>
          </button>

          ${reportButton}

          <button class="icon-action-btn share-btn" data-type="post" data-post-id="${postId}" aria-label="Share">
            ${ICONS.share}
            <span>Share</span>
          </button>
        </div>

        <div class="comments-wrap hidden" data-post-id="${postId}">
          <form class="comment-form" data-post-id="${postId}">
            <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
            <button type="submit" class="icon-action-btn comment-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
              </svg>
              <span>Add</span>
            </button>
          </form>
          <div class="comments-list" data-post-id="${postId}"></div>
        </div>
      `;

      const img = item.querySelector(".post-image");
      if (img) {
        img.addEventListener("error", () => {
          img.style.display = "none";
        });
      }

      const avatarImg = item.querySelector(".post-avatar");
      if (avatarImg) {
        avatarImg.addEventListener("error", () => {
          avatarImg.style.display = "none";
        });
      }

      return item;
    }

    function renderContentCard(item) {
      const card = document.createElement("div");
      card.className = "feed-item";

      let typeClass = "";
      let typeLabel = "";
      let title = "";
      let meta = "";
      let desc = "";
      let openHref = "";
      let imageUrl = "";
      let shareType = "";

      if (item.itemType === "event") {
        typeClass = "event";
        typeLabel = "Event";
        title = item.title || "Untitled Event";
        meta = [item.city, item.date, item.time].filter(Boolean).join(" • ") || "Event";
        desc = item.description || "No description added.";
        openHref = `event.html?eventId=${encodeURIComponent(item.id)}`;
        shareType = "event";
      }

      if (item.itemType === "place") {
        typeClass = "place";
        typeLabel = "Place";
        title = item.name || "Untitled Place";
        meta = [item.category, item.city].filter(Boolean).join(" • ") || "Place";
        desc = item.description || "No description added.";
        openHref = `place.html?placeId=${encodeURIComponent(item.id)}${item.source ? `&source=${encodeURIComponent(item.source)}` : ""}`;
        imageUrl = item.imageURL || "";
        shareType = "place";
      }

      if (item.itemType === "community") {
        typeClass = "community";
        typeLabel = "Community";
        title = item.name || "Untitled Community";
        meta = [item.privacy, `${item.memberCount || 0} members`].filter(Boolean).join(" • ") || "Community";
        desc = item.description || "No description added.";
        openHref = `community.html?communityId=${encodeURIComponent(item.id)}`;
        shareType = "community";
      }

      card.innerHTML = `
        <div class="content-card">
          <div class="content-top">
            <span class="content-type ${typeClass}">${typeLabel}</span>
            <span class="post-date">${formatDate(item.createdAt)}</span>
          </div>

          <div class="content-title">${escapeHtml(title)}</div>
          <div class="content-meta">${escapeHtml(meta)}</div>
          <div class="content-desc">${escapeHtml(desc)}</div>

          ${imageUrl ? `<img class="content-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(typeLabel)} image">` : ""}

          <div class="card-actions">
            <a class="mini-btn btn-blue" href="${openHref}">
              ${ICONS.open}
              <span>Open</span>
            </a>

            <button class="mini-btn btn-green share-btn" data-type="${shareType}" data-id="${escapeHtml(item.id)}" type="button">
              ${ICONS.share}
              <span>Share</span>
            </button>
          </div>
        </div>
      `;

      const img = card.querySelector(".content-image");
      if (img) {
        img.addEventListener("error", () => {
          img.style.display = "none";
        });
      }

      const shareBtn = card.querySelector(".share-btn");
      if (shareBtn) {
        shareBtn.addEventListener("click", () => {
          shareItem(shareType, item, title);
        });
      }

      return card;
    }

    async function renderFeedItems() {
      applyFeedTabUI();
      const items = getFilteredItems();
      postsList.innerHTML = "";

      if (!items.length) {
        emptyBox.classList.remove("hidden");

        emptyBox.textContent =
          currentFeedFilter === "following" ? "No updates from people you follow yet." :
          currentFeedFilter === "events" ? "No events yet." :
          currentFeedFilter === "places" ? "No places yet." :
          currentFeedFilter === "communities" ? "No communities yet." :
          "No updates yet.";

        return;
      }

      emptyBox.classList.add("hidden");

      const postIds = [];

      for (const item of items) {
        if (item.itemType === "post") {
          const postEl = renderPostItem(item);
          if (!postEl) continue;

          postsList.appendChild(postEl);
          attachPostActions(item.id, item);
          postIds.push(item.id);
        } else {
          postsList.appendChild(renderContentCard(item));
        }
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            const { error } = await supabase
              .from("posts")
              .delete()
              .eq("id", postId)
              .eq("user_id", currentUser.id);

            if (error) throw error;
            await refreshFeedData();
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });

      Promise.all(postIds.map(id => refreshPostMeta(id))).catch(err => {
        console.error("Post meta refresh error:", err);
      });
    }

    async function uploadPostImage(file) {
      if (!file) return "";

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const safeName = (file.name || "image")
        .replace(/\.[^/.]+$/, "")
        .replace(/[^a-zA-Z0-9_-]/g, "-")
        .slice(0, 40) || "image";

      const path = `posts/${currentUser.id}/${Date.now()}_${safeName}.${ext}`;

      const { error: uploadError } = await supabase
        .storage
        .from(STORAGE_BUCKET)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    async function markNotificationsRead() {
      const { data, error } = await supabase
        .from("notifications")
        .select("id")
        .eq("to_user_id", currentUser.id)
        .eq("is_read", false);

      if (error) {
        console.error("Could not fetch unread notifications:", error);
        return;
      }

      const ids = (data || []).map(row => row.id).filter(Boolean);
      if (!ids.length) return;

      const { error: updateError } = await supabase
        .from("notifications")
        .update({
          is_read: true,
          read: true,
          read_at: nowIso(),
          updated_at: nowIso()
        })
        .in("id", ids);

      if (updateError) {
        console.error("Could not mark notifications read:", updateError);
      }
    }

    notifyBtn.addEventListener("click", async () => {
      if (!currentUser) {
        window.location.href = "notifications.html";
        return;
      }

      await markNotificationsRead();
      window.location.href = "notifications.html";
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();

      if (!caption && !selectedImageFile) {
        setFormMessage("Write something or upload a photo.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        let uploadedImageUrl = "";
        if (selectedImageFile) {
          uploadedImageUrl = await uploadPostImage(selectedImageFile);
        }

        const displayName =
          currentUserProfile?.displayName ||
          currentUser.user_metadata?.display_name ||
          "Member";

        const userPhotoURL = currentUserProfile?.photoURL || "";
        const username = currentUserProfile?.username || "";

        const { error } = await supabase
          .from("posts")
          .insert({
            user_id: currentUser.id,
            display_name: displayName,
            username,
            user_photo_url: userPhotoURL,
            caption,
            image_url: uploadedImageUrl,
            source: "feed",
            hidden: false,
            hidden_by_admin: false,
            soft_deleted: false,
            created_at: nowIso(),
            updated_at: nowIso()
          });

        if (error) throw error;

        captionInput.value = "";
        selectedImageFile = null;
        updateSelectedImageUI();
        setFormMessage("Update posted.", "success");
        hideComposer();
        await refreshFeedData();
      } catch (error) {
        console.error(error);
        setFormMessage(error?.message || "Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    async function refreshFeedData() {
      await Promise.all([
        loadCurrentUserProfile(),
        loadFollows(),
        loadOutgoingRequests(),
        loadNotificationsCount(),
        loadInboxBadgeCount(),
        loadPostsEventsPlacesCommunitiesAndProfiles()
      ]);

      await renderFeedItems();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        refreshFeedData().catch(err => console.error("Refresh error:", err));
      }, 350);
    }

    function clearSubscriptions() {
      feedSubscriptions.forEach(sub => {
        try {
          supabase.removeChannel(sub);
        } catch {}
      });

      feedSubscriptions = [];
    }

    function setupRealtime() {
      clearSubscriptions();

      const tables = [
        "posts",
        "public_profiles",
        "follows",
        "follow_requests",
        "notifications",
        "message_requests",
        "chat_messages",
        "events",
        "nearby_places",
        "places",
        "communities"
      ];

      tables.forEach(table => {
        const channel = supabase
          .channel(`ownspace-feed-live-${table}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table },
            () => scheduleRefresh()
          )
          .subscribe();

        feedSubscriptions.push(channel);
      });
    }

    window.addEventListener("hashchange", () => {
      if (window.location.hash === "#composerPanel") {
        showComposer();
      }
    });

    async function initFeed() {
      const { data: userRes, error: userError } = await supabase.auth.getUser();

      if (userError || !userRes?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = userRes.user;

      await detectOptionalTables();
      await refreshFeedData();
      setupRealtime();

      if (window.location.hash === "#composerPanel") {
        showComposer();
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", clearSubscriptions);

    initFeed().catch((error) => {
      console.error(error);
      postsList.innerHTML = "";
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = "Could not load feed.";
    });

    /*
      OWNSPACE FEED UPDATE:

      FIXED / ADDED:
      - BareWorld renamed to OwnSpace.
      - Feed tabs now include:
        All / Following / Community / Events / Places.
      - Selected feed tab is saved in localStorage.
        Example: if user selects Places, Places stays selected by default until user switches.
      - Share button stays on posts and was added to:
        events, places, communities.
      - Share button is aligned to the right when space allows.
      - Verified badge is now bright green and visible.
      - Like heart icon cleaned up.
      - Bottom Inbox badge no longer counts general notifications.
      - Bottom Inbox badge counts only:
        pending message_requests + unread chat_messages.
      - Top bell still counts general notifications.
    */
  </script>
</body>
