<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Feed</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
    body{
      background:linear-gradient(135deg,#020617,#0f172a);
      color:#fff;min-height:100vh;padding:20px;
    }
    .wrap{max-width:960px;margin:0 auto;}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;flex-wrap:wrap;margin-bottom:20px;
    }
    .brand{font-size:30px;font-weight:800;}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      border:none;border-radius:12px;padding:12px 16px;cursor:pointer;
      font-weight:700;text-decoration:none;display:inline-block;
    }
    .btn-profile{background:#38bdf8;color:#082f49;}
    .btn-edit{background:#64748b;color:#fff;}
    .btn-nearby{background:#a78bfa;color:#1e1b4b;}
    .btn-events{background:#f59e0b;color:#3b2200;}
    .btn-settings{background:#22c55e;color:#052e16;}
    .btn-logout{background:#ef4444;color:#fff;}
    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:22px;padding:22px;
      backdrop-filter:blur(12px);
      box-shadow:0 20px 40px rgba(0,0,0,0.2);
      margin-bottom:18px;
    }
    .section-title{font-size:22px;margin-bottom:14px;}
    .muted{color:#94a3b8;font-size:14px;}
    .composer-head{
      display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;
    }
    .avatar,.post-avatar{
      width:58px;height:58px;border-radius:18px;object-fit:cover;
      border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);
    }
    .avatar-placeholder,.post-avatar-placeholder{
      width:58px;height:58px;border-radius:18px;display:flex;align-items:center;
      justify-content:center;text-align:center;padding:8px;color:#94a3b8;
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
      font-size:11px;line-height:1.3;
    }
    .composer-info h3{font-size:18px;margin-bottom:4px;}
    .field{margin-bottom:14px;}
    textarea,input[type="text"]{
      width:100%;padding:14px;border-radius:14px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);color:#fff;outline:none;font-size:15px;
    }
    textarea{min-height:110px;resize:vertical;}
    input::placeholder,textarea::placeholder{color:#94a3b8;}
    .composer-actions{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;flex-wrap:wrap;
    }
    .post-btn{background:#22c55e;color:#052e16;min-width:140px;}
    .message{min-height:20px;font-size:14px;}
    .success{color:#86efac;}
    .error{color:#fda4af;}
    .posts-list{display:grid;gap:16px;}
    .post-card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:20px;padding:18px;
    }
    .post-top{
      display:flex;justify-content:space-between;align-items:flex-start;
      gap:12px;margin-bottom:14px;
    }
    .post-left{display:flex;gap:12px;align-items:center;min-width:0;}
    .post-top-text h4{font-size:18px;margin-bottom:4px;}
    .post-top-text a{color:#fff;text-decoration:none;}
    .post-top-text a:hover{text-decoration:underline;}
    .post-date{color:#94a3b8;font-size:13px;}
    .post-caption{
      color:#e2e8f0;line-height:1.7;white-space:pre-wrap;
      word-break:break-word;margin-bottom:14px;
    }
    .post-image{
      width:100%;max-height:520px;object-fit:cover;border-radius:18px;
      border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.06);
      margin-bottom:14px;
    }
    .post-actions{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:6px;
    }
    .action-btn{
      border:none;border-radius:12px;padding:10px 14px;cursor:pointer;
      font-weight:700;font-size:14px;
    }
    .like-btn{background:#1d4ed8;color:#dbeafe;}
    .comment-toggle-btn{background:#334155;color:#fff;}
    .delete-btn{background:#ef4444;color:#fff;padding:8px 12px;font-size:13px;}
    .comments-wrap{
      margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.10);
    }
    .comment-form{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .comment-input{
      flex:1;min-width:220px;
    }
    .comment-submit{
      background:#22c55e;color:#052e16;
    }
    .comments-list{display:grid;gap:10px;}
    .comment-item{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;padding:12px;
    }
    .comment-top{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px;
    }
    .comment-author{
      font-weight:700;font-size:14px;color:#fff;
    }
    .comment-date{
      color:#94a3b8;font-size:12px;
    }
    .comment-text{
      color:#e2e8f0;line-height:1.6;white-space:pre-wrap;word-break:break-word;font-size:14px;
    }
    .comment-delete-btn{
      background:#7f1d1d;color:#fecaca;border:none;border-radius:10px;
      padding:6px 10px;font-size:12px;cursor:pointer;font-weight:700;
    }
    .hidden{display:none !important;}
    .empty-box{text-align:center;padding:30px 10px;color:#94a3b8;}
    .tiny-note{color:#94a3b8;font-size:12px;line-height:1.5;margin-top:6px;}
    @media (max-width:700px){
      .composer-actions{align-items:stretch;}
      .post-btn{width:100%;}
      .comment-form{flex-direction:column;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">BareWorld</div>
      <div class="top-actions">
        <a href="profile.html" class="btn btn-profile">My Profile</a>
        <a href="edit-profile.html" class="btn btn-edit">Edit Profile</a>
        <a href="nearby.html" class="btn btn-nearby">Nearby</a>
        <a href="events.html" class="btn btn-events">Events</a>
        <a href="settings.html" class="btn btn-settings">Settings</a>
        <button id="logoutBtn" class="btn btn-logout">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Share an Update</div>

      <div class="composer-head">
        <img id="myAvatar" class="avatar hidden" alt="My Photo" />
        <div id="myAvatarPlaceholder" class="avatar-placeholder">No photo</div>

        <div class="composer-info">
          <h3 id="myName">Loading...</h3>
          <div class="muted">Post updates for the member feed</div>
        </div>
      </div>

      <form id="postForm">
        <div class="field">
          <textarea id="caption" placeholder="Write something..."></textarea>
        </div>

        <div class="field">
          <input type="text" id="imageURL" placeholder="Optional image link (https://example.com/photo.jpg)" />
          <div class="tiny-note">Direct image link only. This is optional.</div>
        </div>

        <div class="composer-actions">
          <div id="formMessage" class="message"></div>
          <button type="submit" id="postBtn" class="btn post-btn">Post Update</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="section-title">Member Feed</div>
      <div id="postsList" class="posts-list"></div>
      <div id="emptyBox" class="empty-box hidden">No updates yet.</div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      addDoc,
      doc,
      getDoc,
      getDocs,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      deleteDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const logoutBtn = document.getElementById("logoutBtn");
    const postForm = document.getElementById("postForm");
    const postBtn = document.getElementById("postBtn");
    const captionInput = document.getElementById("caption");
    const imageURLInput = document.getElementById("imageURL");
    const formMessage = document.getElementById("formMessage");

    const myName = document.getElementById("myName");
    const myAvatar = document.getElementById("myAvatar");
    const myAvatarPlaceholder = document.getElementById("myAvatarPlaceholder");

    const postsList = document.getElementById("postsList");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentUserProfile = null;

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showMyAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }
      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    async function refreshLikeUI(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      if (!likeBtn || !currentUser) return;

      try {
        const likesCol = collection(db, "posts", postId, "likes");
        const likesSnap = await getDocs(likesCol);
        const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
        const myLike = await getDoc(likeRef);

        const liked = myLike.exists();
        const count = likesSnap.size;

        likeBtn.textContent = liked ? `Unlike (${count})` : `Like (${count})`;
        likeBtn.dataset.liked = liked ? "yes" : "no";
      } catch (error) {
        console.error("Like UI error:", error);
      }
    }

    async function refreshCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const commentsQuery = query(
          collection(db, "posts", postId, "comments"),
          orderBy("createdAt", "asc")
        );
        const commentsSnap = await getDocs(commentsQuery);

        commentsToggle.textContent = `Comments (${commentsSnap.size})`;

        if (commentsSnap.empty) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        commentsSnap.forEach((commentDoc) => {
          const comment = commentDoc.data();
          const commentId = commentDoc.id;
          const canDelete = comment.userId === currentUser.uid;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";
          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${commentId}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              await deleteDoc(doc(db, "posts", pId, "comments", cId));
              await refreshCommentsUI(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      await refreshLikeUI(postId);
      await refreshCommentsUI(postId);
    }

    function attachPostActions(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser) return;

          const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
          const existing = await getDoc(likeRef);

          likeBtn.disabled = true;

          try {
            if (existing.exists()) {
              await deleteDoc(likeRef);
            } else {
              await setDoc(likeRef, {
                userId: currentUser.uid,
                createdAt: serverTimestamp()
              });
            }
            await refreshLikeUI(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");
          if (!commentWrap.classList.contains("hidden")) {
            await refreshCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text) return;

          const displayName =
            currentUserProfile?.displayName ||
            currentUser.displayName ||
            "Member";

          const userPhotoURL = currentUserProfile?.photoURL || "";

          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            await addDoc(collection(db, "posts", postId, "comments"), {
              userId: currentUser.uid,
              displayName,
              userPhotoURL,
              text,
              createdAt: serverTimestamp()
            });

            commentInput.value = "";
            await refreshCommentsUI(postId);
          } catch (error) {
            console.error(error);
            alert("Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }

    async function renderPosts(docs) {
      postsList.innerHTML = "";

      if (!docs.length) {
        emptyBox.classList.remove("hidden");
        return;
      }

      emptyBox.classList.add("hidden");

      for (const postDoc of docs) {
        const post = postDoc.data();
        const postId = postDoc.id;

        const avatarHtml = post.userPhotoURL
          ? `<a href="member.html?uid=${encodeURIComponent(post.userId)}">
               <img class="post-avatar" src="${escapeHtml(post.userPhotoURL)}" alt="User Photo">
             </a>`
          : `<a href="member.html?uid=${encodeURIComponent(post.userId)}" style="text-decoration:none;">
               <div class="post-avatar-placeholder">No photo</div>
             </a>`;

        const deleteButton = currentUser && post.userId === currentUser.uid
          ? `<button data-id="${postId}" class="btn delete-btn delete-post-btn">Delete</button>`
          : "";

        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
          <div class="post-top">
            <div class="post-left">
              ${avatarHtml}
              <div class="post-top-text">
                <h4>
                  <a href="member.html?uid=${encodeURIComponent(post.userId)}">
                    ${escapeHtml(post.displayName || "Member")}
                  </a>
                </h4>
                <div class="post-date">${formatDate(post.createdAt)}</div>
              </div>
            </div>
            ${deleteButton}
          </div>

          <div class="post-caption">${escapeHtml(post.caption || "")}</div>

          ${post.imageURL ? `<img class="post-image" src="${escapeHtml(post.imageURL)}" alt="Post Image">` : ""}

          <div class="post-actions">
            <button class="action-btn like-btn" data-post-id="${postId}" data-liked="no">Like (0)</button>
            <button class="action-btn comment-toggle-btn" data-post-id="${postId}">Comments (0)</button>
          </div>

          <div class="comments-wrap hidden" data-post-id="${postId}">
            <form class="comment-form" data-post-id="${postId}">
              <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
              <button type="submit" class="action-btn comment-submit">Add Comment</button>
            </form>
            <div class="comments-list" data-post-id="${postId}"></div>
          </div>
        `;

        const img = card.querySelector(".post-image");
        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const avatar = card.querySelector(".post-avatar");
        if (avatar) {
          avatar.addEventListener("error", () => {
            avatar.style.display = "none";
          });
        }

        postsList.appendChild(card);
        attachPostActions(postId);
        await refreshPostMeta(postId);
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "posts", postId));
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
          currentUserProfile = userSnap.data();
          myName.textContent = currentUserProfile.displayName || user.displayName || "Member";
          showMyAvatar(currentUserProfile.photoURL || "");
        } else {
          myName.textContent = user.displayName || "Member";
          showMyAvatar("");
        }

        const postsQuery = query(
          collection(db, "posts"),
          orderBy("createdAt", "desc")
        );

        onSnapshot(postsQuery, async (snapshot) => {
          await renderPosts(snapshot.docs);
        }, (error) => {
          console.error(error);
          postsList.innerHTML = "";
          emptyBox.classList.remove("hidden");
          emptyBox.textContent = "Could not load feed.";
        });

      } catch (error) {
        console.error(error);
        myName.textContent = "Member";
      }
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();
      const imageURL = imageURLInput.value.trim();

      if (!caption && !imageURL) {
        setFormMessage("Write something or add an image link.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        const displayName =
          currentUserProfile?.displayName ||
          currentUser.displayName ||
          "Member";

        const userPhotoURL = currentUserProfile?.photoURL || "";

        await addDoc(collection(db, "posts"), {
          userId: currentUser.uid,
          displayName,
          userPhotoURL,
          caption,
          imageURL,
          createdAt: serverTimestamp()
        });

        captionInput.value = "";
        imageURLInput.value = "";
        setFormMessage("Update posted.", "success");
      } catch (error) {
        console.error(error);
        setFormMessage("Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
