<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Feed</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 16px 30px rgba(20,33,61,.08);
      --soft-shadow:0 10px 24px rgba(20,33,61,.06);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 20px 40px rgba(0,0,0,.18);
      --soft-shadow:0 10px 24px rgba(0,0,0,.16);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.05;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{width:19px;height:19px;display:block}

    .notify-count{
      position:absolute;
      top:-4px;
      right:-2px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid var(--topbar-bg);
    }

    .feed-shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .feed-head{
      padding:12px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
    }

    .feed-head-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .section-title{font-size:17px;font-weight:950;line-height:1.2}


    .feed-stats{
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
      margin:0 0 10px;
    }

    .stat-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 9px;
      border-radius:999px;
      background:var(--surface-2);
      border:1px solid var(--line);
      color:var(--text);
      font-size:11px;
      font-weight:950;
      line-height:1;
    }

    .stat-pill svg{
      width:14px;
      height:14px;
      display:block;
      flex-shrink:0;
    }

    .stat-pill.trust-good{
      background:rgba(61,220,132,.12);
      border-color:rgba(61,220,132,.22);
    }

    .stat-pill.trust-normal{
      background:rgba(76,201,255,.12);
      border-color:rgba(76,201,255,.20);
    }

    .stat-pill.trust-low{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.24);
    }

    .stat-pill.trust-risk{
      background:rgba(255,93,115,.13);
      border-color:rgba(255,93,115,.24);
    }

    .points-toast{
      position:fixed;
      left:50%;
      bottom:92px;
      transform:translateX(-50%) translateY(18px);
      width:min(420px, calc(100% - 28px));
      z-index:80;
      padding:12px 14px;
      border-radius:16px;
      background:var(--surface);
      color:var(--text);
      border:1px solid rgba(61,220,132,.28);
      box-shadow:0 18px 40px rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease, transform .22s ease;
    }

    .points-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .points-toast-icon{
      width:34px;
      height:34px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(61,220,132,.14);
      color:var(--green);
      border:1px solid rgba(61,220,132,.22);
      flex-shrink:0;
      font-weight:950;
    }

    .points-toast strong{
      display:block;
      font-size:13px;
      line-height:1.2;
    }

    .points-toast span{
      display:block;
      color:var(--muted);
      font-size:11.5px;
      font-weight:800;
      margin-top:2px;
    }

    .write-btn{
      border:none;
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.22);
      border-radius:13px;
      padding:9px 12px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
      min-height:38px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .write-btn svg{width:15px;height:15px;display:block;flex-shrink:0}
    .write-btn:disabled{opacity:.55;cursor:not-allowed}

    .filter-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

    .filter-tab{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:13px;
      padding:9px 4px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
      min-height:36px;
      white-space:nowrap;
    }

    .filter-tab.active{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}

    .composer-wrap{
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
      padding:12px;
    }

    .composer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .composer-head-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

    .avatar,
    .post-avatar,
    .community-avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .community-avatar{border-radius:15px}

    .avatar-placeholder,
    .post-avatar-placeholder,
    .community-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:var(--surface-3);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
      font-weight:950;
    }

    .community-avatar-placeholder{
      border-radius:15px;
      color:var(--text);
      font-size:18px;
      background:
        radial-gradient(circle at 26% 20%, rgba(76,201,255,.24), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.17), rgba(61,220,132,.12)),
        var(--surface-3);
    }

    .composer-head h3{font-size:15px;margin-bottom:2px;font-weight:950}

    .composer-username{color:var(--blue);font-size:12px;font-weight:850;margin-top:2px}

    .muted{color:var(--muted);font-size:12px;line-height:1.45}
    .field{margin-bottom:10px}

    textarea,
    input[type="file"]{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:13px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    textarea{min-height:92px}
    textarea::placeholder{color:var(--muted)}

    .composer-actions{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}

    .post-btn{
      border:none;
      background:var(--green);
      color:#052112;
      padding:11px 16px;
      border-radius:13px;
      font-weight:950;
      cursor:pointer;
      min-width:124px;
    }

    .post-btn:disabled{opacity:.7;cursor:not-allowed}

    .close-compose-btn,
    .remove-image-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 11px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
    }

    .message{min-height:18px;font-size:13px}
    .success{color:#22b36c}
    .error{color:#e74c66}
    html[data-theme="dark"] .success{color:#9cf0bf}
    html[data-theme="dark"] .error{color:#ffb3bd}

    .tiny-note{color:var(--muted);font-size:11px;line-height:1.45;margin-top:5px}

    .image-preview-wrap{margin-top:10px;display:grid;gap:10px}

    .image-preview{
      width:100%;
      max-height:360px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line-soft);
    }

    .posts-list{display:block}

    .feed-item{padding:12px;border-bottom:1px solid var(--line-soft)}
    .feed-item:last-child{border-bottom:none}

    .feed-item.community-feed-item{
      background:linear-gradient(135deg, rgba(167,139,250,.055), rgba(76,201,255,.025)), transparent;
    }

    .post-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
    .post-left{display:flex;gap:10px;align-items:center;min-width:0}
    .post-top-text{min-width:0}

    .post-name{
      font-size:15px;
      font-weight:950;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .post-name a{color:var(--text);text-decoration:none}
    .post-name a:hover{text-decoration:underline}

    .community-name-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:var(--text)!important;
      text-decoration:none;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .community-name-link:hover{text-decoration:underline}
    .community-name-link svg{width:14px;height:14px;flex-shrink:0}

    .verified-badge{
      width:20px;
      height:20px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#fff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:0 0 0 3px rgba(32,199,111,.16),0 8px 18px rgba(32,199,111,.20);
      flex-shrink:0;
    }

    .verified-badge svg{width:12px;height:12px;display:block;stroke-width:3}

    .post-username,
    .community-poster-line{color:var(--blue);font-size:12px;font-weight:850;margin-top:2px;word-break:break-word}
    .community-poster-line a{color:var(--blue);text-decoration:none}
    .community-poster-line a:hover{text-decoration:underline}

    .post-date{color:var(--muted);font-size:11px;margin-top:2px}

    .post-community-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      margin-top:5px;
      padding:5px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      background:rgba(167,139,250,.14);
      border:1px solid rgba(167,139,250,.20);
      color:var(--text);
      max-width:100%;
    }

    .post-community-pill svg{width:12px;height:12px;flex-shrink:0}

    .post-top-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center;justify-content:flex-end;flex-shrink:0}

    .follow-top-btn,
    .delete-post-btn,
    .community-top-btn{
      min-width:34px;
      min-height:34px;
      border:none;
      border-radius:10px;
      padding:0 10px;
      font-size:11px;
      font-weight:950;
      cursor:pointer;
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      text-decoration:none;
      white-space:nowrap;
    }

    .follow-top-btn,
    .delete-post-btn{width:34px;padding:0;font-size:0}

    .follow-top-btn svg,
    .delete-post-btn svg,
    .community-top-btn svg{width:15px;height:15px;display:block;flex-shrink:0}

    .follow-top-btn.follow,
    .community-top-btn.open{background:rgba(76,201,255,.14);color:var(--text);border:1px solid rgba(76,201,255,.20)}
    .follow-top-btn.request,
    .community-top-btn.request{background:rgba(167,139,250,.14);color:var(--text);border:1px solid rgba(167,139,250,.20)}
    .follow-top-btn.requested,
    .community-top-btn.requested,
    .community-top-btn.joined{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
    .community-top-btn.join{background:rgba(61,220,132,.14);color:var(--text);border:1px solid rgba(61,220,132,.20)}
    .delete-post-btn{background:rgba(255,93,115,.14);color:var(--text);border:1px solid rgba(255,93,115,.20)}

    .post-click{display:block;text-decoration:none;color:inherit}

    .post-caption{
      color:var(--text);
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }

    .post-image{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-2);
      margin-top:4px;
      border:1px solid var(--line-soft);
    }

    .post-actions,
    .card-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px}

    .icon-action-btn,
    .icon-report-link,
    .mini-btn{
      border:none;
      cursor:pointer;
      font-weight:950;
      border-radius:11px;
      padding:8px 10px;
      font-size:11.5px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      text-decoration:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      min-height:34px;
    }

    .icon-action-btn svg,
    .icon-report-link svg,
    .mini-btn svg{width:15px;height:15px;display:block;flex-shrink:0}

    .like-btn{background:rgba(76,201,255,.12);border-color:rgba(76,201,255,.18)}
    .like-btn[data-liked="yes"]{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .like-btn[data-liked="yes"] svg{fill:currentColor;color:var(--red)}
    .comment-toggle-btn{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.18)}
    .share-btn{margin-left:auto;background:rgba(61,220,132,.12);border-color:rgba(61,220,132,.18)}
    .icon-report-link{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}

    .comments-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft)}
    .comment-form{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}

    .comment-input{
      flex:1;
      min-width:200px;
      border:none;
      outline:none;
      padding:12px 13px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:13px;
    }

    .comment-submit{background:var(--green);color:#052112;border-color:rgba(61,220,132,.20)}
    .comments-list{display:grid;gap:10px}

    .comment-item{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:11px}
    .comment-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
    .comment-author{font-weight:950;font-size:13px;color:var(--text)}
    .comment-username{color:var(--blue);font-size:11px;font-weight:850;margin-top:2px}
    .comment-date{color:var(--muted);font-size:11px;margin-top:2px}

    .comment-text{
      color:var(--text);
      line-height:1.55;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:11px;
      font-weight:950;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .empty-box{
      text-align:center;
      padding:24px 12px;
      color:var(--muted);
      background:var(--surface-2);
      margin:12px;
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{background:rgba(76,201,255,.14);color:var(--text)}
    .icon-svg{width:20px;height:20px;display:flex;align-items:center;justify-content:center;line-height:1}
    .icon-svg svg{width:20px;height:20px;display:block}

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .composer-actions{align-items:stretch}
      .post-btn{width:100%}
      .comment-form{flex-direction:column}
      .close-compose-btn{width:100%}
      .feed-item{padding:11px}
      .feed-head-top{align-items:stretch}
      .write-btn{width:100%;justify-content:center}
      .feed-stats{justify-content:center}
      .stat-pill{flex:1;justify-content:center}
      .remove-image-btn{width:100%}
      .share-btn{margin-left:0}
      .filter-tab{font-size:11px;padding:8px 2px}
      .brand{font-size:17px}
      .post-top{gap:8px}
      .post-top-actions{max-width:120px}
      .community-top-btn{min-height:32px;padding:0 8px;font-size:10.5px}
    }

    @media(max-width:390px){
      .filter-tab{font-size:10px}
      .icon-action-btn,
      .icon-report-link,
      .mini-btn{font-size:11px;padding:8px 9px}
      .post-top-actions{max-width:105px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <a href="hub.html" class="top-icon-btn" aria-label="OwnSpace Hub">

    function getSavedFeedFilter() {
      const saved = localStorage.getItem(FEED_FILTER_KEY);
      const allowed = ["all", "following", "communities"];
      return allowed.includes(saved) ? saved : "all";
    }

    function saveFeedFilter(value) {
      localStorage.setItem(FEED_FILTER_KEY, value);
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", resolveTheme(getStoredTheme()));
    }

    applyTheme();

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme();
      });
    }

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showComposer() {
      if (openComposerBtn.disabled) return;
      composerPanel.classList.remove("hidden");
      composerPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      setTimeout(() => captionInput.focus(), 180);
    }

    function hideComposer() {
      composerPanel.classList.add("hidden");
    }

    openComposerBtn.addEventListener("click", showComposer);
    closeComposerBtn.addEventListener("click", hideComposer);

    function showMyAvatar(url) {
      const cleanUrl = String(url || "").trim();

      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }

      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(value) {
      if (!value) return "Just now";

      try {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "Just now";

        const now = Date.now();
        const diff = now - d.getTime();
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if (diff < minute) return "Now";
        if (diff < hour) return `${Math.floor(diff / minute)}m ago`;
        if (diff < day) return `${Math.floor(diff / hour)}h ago`;
        if (diff < day * 7) return `${Math.floor(diff / day)}d ago`;

        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      } catch {
        return "Just now";
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
      }
      return fallback;
    }

    function getBool(raw, names, fallback = false) {
      for (const name of names) {
        if (raw?.[name] !== undefined && raw?.[name] !== null) return !!raw[name];
      }
      return fallback;
    }

    function getArray(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (Array.isArray(value)) return value.map(String).filter(Boolean);
        if (typeof value === "string" && value.trim()) {
          try {
            const parsed = JSON.parse(value);
            if (Array.isArray(parsed)) return parsed.map(String).filter(Boolean);
          } catch {}
        }
      }
      return [];
    }

    function getCreatedMs(value) {
      if (!value) return 0;
      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : 0;
    }

    function isMissingTableError(error) {
      const msg = String(error?.message || "").toLowerCase();

      return (
        msg.includes("does not exist") ||
        (msg.includes("relation") && msg.includes("does not exist")) ||
        msg.includes("could not find the table") ||
        msg.includes("not found in the schema cache")
      );
    }

    async function selectAllAvailable(tableNames, buildQuery = null) {
      const merged = [];

      for (const table of tableNames) {
        try {
          let q = supabase.from(table).select("*");
          if (buildQuery) q = buildQuery(q, table);

          const { data, error } = await q;

          if (error) {
            if (isMissingTableError(error)) continue;
            console.error(`Query error on ${table}:`, error);
            continue;
          }

          (data || []).forEach(row => merged.push({ ...row, __table: table }));
        } catch (err) {
          console.error(`Query failed on ${table}:`, err);
        }
      }

      return merged;
    }

    async function tryUpdate(table, payload, buildQuery) {
      try {
        let q = supabase.from(table).update(payload);
        q = buildQuery(q);
        const { error } = await q;
        return !error;
      } catch {
        return false;
      }
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"], "Member") || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: String(getField(d, ["moderation_status", "moderationStatus", "status"]) || "").toLowerCase(),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin ?? d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deleted),
        banned: !!(d.banned ?? d.is_banned ?? d.isBanned),
        suspended: !!(d.suspended ?? d.is_suspended ?? d.isSuspended),
        hidden: !!(d.hidden ?? d.is_hidden ?? d.isHidden),
        blockedUsers: getArray(d, ["blocked_users", "blockedUsers", "blocks", "blocked"]),
        trustScore: Number(d.trust_score ?? d.trustScore ?? d.trust ?? 50) || 50,
        pointsBalance: Number(d.points_balance ?? d.pointsBalance ?? d.points ?? 0) || 0,
        earnedPoints: Number(d.earned_points ?? d.earnedPoints ?? 0) || 0,
        purchasedPoints: Number(d.purchased_points ?? d.purchasedPoints ?? 0) || 0,
        bio: getField(d, ["bio", "about", "description"]),
        suspensionUntil: d.suspension_until ?? d.suspensionUntil ?? null
      };
    }

    function normalizePost(raw) {
      const d = raw || {};
      const sourceTable = d.__table || "";
      const communityId = getField(d, [
        "community_id",
        "communityId",
        "group_id",
        "groupId",
        "circle_id",
        "circleId"
      ]);

      const source = getField(d, ["source", "post_type", "postType"]) || (communityId ? "community" : "feed");
      const status = String(getField(d, ["status", "post_status", "postStatus"]) || "").toLowerCase();

      return {
        itemType: "post",
        sourceTable,
        id: d.id || "",
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "uid", "created_by", "createdBy"]),
        displayName: getField(d, ["author_name", "authorName", "display_name", "displayName", "name"]),
        username: getField(d, ["username"]),
        userPhotoURL: getField(d, ["user_photo_url", "userPhotoURL", "photo_url", "photoURL", "avatar_url", "avatarUrl"]),
        caption: getField(d, ["caption", "text", "content", "body", "description"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl", "cover_url", "coverURL"]),
        source,
        communityId,
        communityName: getField(d, ["community_name", "communityName", "group_name", "groupName"]),
        hidden: !!(d.hidden),
        hiddenByAdmin: !!(d.hidden_by_admin ?? d.hiddenByAdmin ?? d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deleted),
        banned: !!(d.banned ?? d.is_banned ?? d.isBanned),
        suspended: !!(d.suspended ?? d.is_suspended ?? d.isSuspended),
        status,
        createdAt: d.created_at ?? d.createdAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt)
      };
    }

    function normalizeComment(raw) {
      const d = raw || {};

      return {
        id: d.id || "",
        postId: getField(d, ["post_id", "postId"]),
        userId: getField(d, ["user_id", "userId", "uid"]),
        displayName: getField(d, ["display_name", "displayName", "name"]) || "Member",
        username: getField(d, ["username"]),
        text: getField(d, ["text", "comment", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null

    function normalizeNotification(raw) {
      const d = raw || {};

      return {
        id: d.id || "",
        isRead: !!(d.is_read ?? d.isRead ?? d.read),
        toUserId: getField(d, ["to_user_id", "toUserId", "user_id", "userId"])
      };
    }

    function normalizeCommunity(raw) {
      const d = raw || {};
      const status = String(d.status || d.community_status || d.communityStatus || "").toLowerCase();
      const privacy = String(getField(d, ["privacy", "visibility", "type"], "public") || "public").toLowerCase();

      return {
        id: d.id || "",
        name: getField(d, ["name", "title", "community_name", "communityName"], "Untitled Community"),
        description: getField(d, ["description", "desc", "about"]),
        privacy,
        city: getField(d, ["city", "location_city", "locationCity"]),
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "owner_id", "ownerId", "user_id", "userId", "uid"]),
        memberCount: Number(d.member_count ?? d.memberCount ?? d.members_count ?? d.membersCount ?? 0) || 0,
        imageURL: getField(d, ["cover_url", "coverURL", "coverUrl", "image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        hidden: getBool(d, ["hidden", "hidden_by_admin", "hiddenByAdmin", "soft_deleted", "softDeleted"]) || status === "deleted" || status === "hidden" || status === "removed",
        approved:
          getBool(d, ["approved", "is_approved", "isApproved"], false) ||
          ["active", "approved", "published", "public", ""].includes(status),
        createdAt: d.created_at ?? d.createdAt ?? null,
        createdAtMs: getCreatedMs(d.created_at ?? d.createdAt)
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        text: getField(d, ["text", "message", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function isMessageUnread(msg) {
      if (!msg || msg.senderId === currentUser.id) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    function getCommunityIdFromMember(row) {
      return getField(row, ["community_id", "communityId", "group_id", "groupId", "circle_id", "circleId"]);

      return getField(row, ["user_id", "userId", "uid", "member_id", "memberId"]);

    function getBlockerUid(row) {
      return getField(row, [

      const status = String(getField(row, ["status", "block_status", "blockStatus"], "active") || "active").toLowerCase();
      return ["inactive", "removed", "deleted", "unblocked", "cancelled", "canceled"].includes(status);

    async function loadBlockedUsers() {
      blockedUserIds = new Set();
      if (!currentUser?.id) return;

      // Old profile fallback: if your users row keeps blocked_users as an array, use that too.
      (currentUserProfile?.blockedUsers || []).forEach(uid => {
        if (uid && uid !== currentUser.id) blockedUserIds.add(String(uid));
      });

      // Main supported tables: blocked_users / user_blocks / blocks.
      // RLS should ideally return only rows involving the current user, but we still filter manually for safety.
      const rows = await selectAllAvailable(TABLES.blockedUsers);

      (rows || []).forEach(row => {
        if (isInactiveBlockRow(row)) return;

        const blocker = getBlockerUid(row);
        const blocked = getBlockedUid(row);

        if (!blocker || !blocked) return;

        // Hide both directions:
        // 1) I blocked them
        // 2) They blocked me
        if (blocker === currentUser.id && blocked !== currentUser.id) blockedUserIds.add(blocked);
        if (blocked === currentUser.id && blocker !== currentUser.id) blockedUserIds.add(blocker);
      });
    }

    function isUserBlocked(uid) {
      if (!uid || !currentUser?.id) return false;
      if (uid === currentUser.id) return false;
      return blockedUserIds.has(String(uid));
    }

    function isBadModerationStatus(status) {
      const s = String(status || "").toLowerCase().trim();
      return ["banned", "ban", "suspended", "suspend", "deleted", "removed", "hidden", "blocked", "soft_deleted"].includes(s);
    }

    function authorHidden(author, uid = "") {
      if (uid && isUserBlocked(uid)) return true;
      if (!author) return false;

      return !!(
        isUserBlocked(author.uid) ||
        author.isHiddenByAdmin ||
        author.softDeleted ||
        author.banned ||
        author.suspended ||
        author.hidden ||
        isBadModerationStatus(author.moderationStatus)
      );
    }

    function postHiddenOrUnsafe(post) {
      if (!post?.userId || !currentUser) return true;
      if (isUserBlocked(post.userId)) return true;

      return !!(
        post.hidden ||
        post.hiddenByAdmin ||
        post.softDeleted ||
        post.banned ||
        post.suspended ||
        isBadModerationStatus(post.status)
      );
    }

    function getAuthorProfile(uid) {
      if (uid === currentUser?.id && currentUserProfile) return currentUserProfile;
      return publicProfilesMap.get(uid) || null;
    }

    function isFollowing(userId) {
      return follows.some(f => (f.following_id || f.followingId) === userId);
    }

    function isOutgoingRequested(userId) {
      return outgoingRequests.some(r => (r.target_id || r.targetId) === userId);
    }

    function isCommunityPost(post) {
      const source = String(post?.source || "").toLowerCase();
      const sourceTable = String(post?.sourceTable || "").toLowerCase();

      return !!(
        post?.communityId ||
        source === "community" ||
        source === "community_post" ||
        sourceTable.includes("community")
      );
    }

    function getCommunityById(communityId) {
      if (!communityId) return null;
      return allCommunities.find(c => c.id === communityId) || null;
    }

    function getCommunityName(communityId, fallback = "") {
      const community = getCommunityById(communityId);
      return community?.name || fallback || "Community";
    }

    function isPrivateCommunity(community) {
      const p = String(community?.privacy || "public").toLowerCase();
      return ["private", "request", "request_only", "approval", "closed"].includes(p);
    }

    function isCommunityOwner(communityId) {
      const community = getCommunityById(communityId);
      return !!(community?.creatorId && community.creatorId === currentUser?.id);
    }

    function isCommunityJoined(communityId) {
      return joinedCommunityIds.has(communityId) || isCommunityOwner(communityId);
    }

    function canViewerSeeStandardPost(post) {
      if (postHiddenOrUnsafe(post)) return false;
      if (isCommunityPost(post)) return false;
      if (post.userId === currentUser.id) return true;

      const author = getAuthorProfile(post.userId);
      if (authorHidden(author, post.userId)) return false;
      if (author?.isPrivate && !isFollowing(post.userId)) return false;

      return true;
    }

    function canViewerSeeCommunityPost(post) {
      if (postHiddenOrUnsafe(post)) return false;
      if (!isCommunityPost(post)) return false;
      if (!post.communityId) return false;

      const community = getCommunityById(post.communityId);
      if (community?.hidden || community?.approved === false) return false;
      if (community?.creatorId && isUserBlocked(community.creatorId)) return false;

      const author = getAuthorProfile(post.userId);
      if (authorHidden(author, post.userId)) return false;

      if (isCommunityJoined(post.communityId)) return true;
      if (!community) return true;
      if (isPrivateCommunity(community)) return false;

      return true;
    }

    function getFilteredItems() {

          .filter(post => post.userId === currentUser.id || isFollowing(post.userId))
          .sort((a, b) => b.createdAtMs - a.createdAtMs);

      if (currentFeedFilter === "communities") {
        return visiblePosts
          .filter(post => canViewerSeeCommunityPost(post))
          .sort((a, b) => b.createdAtMs - a.createdAtMs);
      }

      return visiblePosts
        .filter(post => canViewerSeeStandardPost(post) || canViewerSeeCommunityPost(post))
        .sort((a, b) => b.createdAtMs - a.createdAtMs);
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId", "receiverId", "recipientId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetCol of targetColumns) {
        for (const statusCol of statusColumns) {
          try {
            const { count, error } = await supabase
              .from("message_requests")
              .select("id", { count: "exact", head: true })
              .eq(targetCol, uid)
              .eq(statusCol, "pending");

            if (!error) return count || 0;
          } catch {}
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetCol, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = getField(row, ["status", "request_status", "requestStatus"], "pending");
              return String(status || "pending").toLowerCase() === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    async function fetchChatThreadsForUser(uid) {
      const maps = new Map();

      const attempts = [
        { a: "participant_a", b: "participant_b" },
        { a: "participantA", b: "participantB" }
      ];

      for (const fields of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${fields.a}.eq.${uid},${fields.b}.eq.${uid}`);

          if (!error && Array.isArray(data)) {
            data.forEach(row => {
              if (row.id) maps.set(row.id, row);
            });
          }
        } catch {}
      }

      return Array.from(maps.values());
    }

    async function fetchMessagesForThreads(threadIds) {
      if (!threadIds.length) return [];

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("thread_id", threadIds)
          .order("created_at", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("threadId", threadIds)
          .order("createdAt", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      return [];
    }

    async function countUnreadChatMessages(uid) {
      try {
        const threads = await fetchChatThreadsForUser(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);
        if (!threadIds.length) return 0;

        const messages = await fetchMessagesForThreads(threadIds);
        const byThread = new Map();

        messages.forEach(msg => {
          if (!msg.threadId) return;
          if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
          byThread.get(msg.threadId).push(msg);
        });

        let total = 0;

        threads.forEach(thread => {
          const list = byThread.get(thread.id) || [];
          if (!list.length) return;

          const newest = [...list].sort((a, b) => getCreatedMs(b.createdAt) - getCreatedMs(a.createdAt))[0];
          if (newest?.senderId === uid) return;

          const lastOutgoingMs = list
            .filter(msg => msg.senderId === uid)
            .reduce((max, msg) => Math.max(max, getCreatedMs(msg.createdAt)), 0);

          const unreadInThread = list.filter(msg => {
            if (msg.senderId === uid) return false;
            if (getCreatedMs(msg.createdAt) <= lastOutgoingMs) return false;
            return isMessageUnread(msg);
          }).length;

          total += unreadInThread;
        });

        return total;
      } catch (err) {
        console.warn("Unread chat count failed:", err?.message || err);
        return 0;
      }
    }

        return;
      }

      try {
        const { data: profileRows, error: profileError } = await supabase
          .from("public_profiles")
          .select("*")
          .in("uid", uniqueAuthorIds);

        if (!profileError) {
          (profileRows || []).forEach(row => {
            const p = normalizeProfile(row, row.uid);
            publicProfilesMap.set(p.uid, p);
          });
        }
      } catch {}

      try {
        const missing = uniqueAuthorIds.filter(uid => !publicProfilesMap.has(uid));

        if (missing.length) {
          const { data: userRows, error: userError } = await supabase
            .from("users")
            .select("*")
            .in("uid", missing);

          if (!userError) {
            (userRows || []).forEach(row => {
              const p = normalizeProfile(row, row.uid);
              publicProfilesMap.set(p.uid, p);
            });
          }
        }
      } catch {}

      if (currentUserProfile) {
        publicProfilesMap.set(currentUser.id, currentUserProfile);
      }
    }

    async function loadPostsCommunitiesAndProfiles() {
      const [postRowsRes, communityRows, communityMemberRows] = await Promise.all([
        supabase.from("posts").select("*").order("created_at", { ascending: false }),
        selectAllAvailable(TABLES.communities),
        selectAllAvailable(TABLES.communityMembers)
      ]);

      if (postRowsRes.error) throw postRowsRes.error;

      allCommunities = (communityRows || [])
        .map(normalizeCommunity)
        .filter(c => c.id && !c.hidden && !isUserBlocked(c.creatorId));

      joinedCommunityIds = new Set();
      pendingCommunityIds = new Set();

      (communityMemberRows || []).forEach(row => {
        const uid = getMemberUid(row);
        const communityId = getCommunityIdFromMember(row);
        const status = getMemberStatus(row);

        if (uid !== currentUser.id || !communityId) return;
        if (["removed", "banned", "left", "declined", "rejected"].includes(status)) return;

        if (["pending", "requested", "request"].includes(status)) {
          pendingCommunityIds.add(communityId);
          return;
        }

        joinedCommunityIds.add(communityId);
      });

      allCommunities.forEach(community => {
        if (community.creatorId === currentUser.id) {
          joinedCommunityIds.add(community.id);
        }
      });

      allPosts = (postRowsRes.data || [])
        .map(row => normalizePost({ ...row, __table: "posts" }))
        .filter(post => post.id && post.userId && !isUserBlocked(post.userId));

      const authorIds = allPosts.map(p => p.userId).filter(Boolean);
      const uniqueAuthorIds = [...new Set(authorIds)];

      await loadProfilesForAuthors(uniqueAuthorIds);

      // Strong final cleanup after author profiles are loaded.
      allPosts = allPosts.filter(post => !postHiddenOrUnsafe(post) && !authorHidden(getAuthorProfile(post.userId), post.userId));
    }

    async function findFollowRow(authorId) {
      const existing = follows.find(f => (f.following_id || f.followingId) === authorId);
      if (existing) return existing;

      try {
        const { data, error } = await supabase
          .from("follows")
          .select("*")
          .eq("follower_id", currentUser.id)
          .eq("following_id", authorId)
          .limit(1);

        if (!error) return data?.[0] || null;
      } catch {}

      return null;
    }

    async function findRequestRow(authorId) {
      const existing = outgoingRequests.find(r => (r.target_id || r.targetId) === authorId);
      if (existing) return existing;

      try {
        const { data, error } = await supabase
          .from("follow_requests")
          .select("*")
          .eq("requester_id", currentUser.id)
          .eq("target_id", authorId)
          .limit(1);

        if (!error) return data?.[0] || null;
      } catch {}

      return null;
    }

    async function createNotificationSafe(payload) {
      if (!payload?.to_user_id || payload.to_user_id === currentUser.id) return;
      if (isUserBlocked(payload.to_user_id)) return;

      const createdAt = payload.created_at || nowIso();

      const variants = [
        {
          ...payload,
          user_id: payload.to_user_id,
          created_at: createdAt,
          is_read: false,
          read: false
        },
        {
          type: payload.type || "notification",
          title: payload.title || "",
          text: payload.text || "",
          fromUserId: payload.from_user_id || currentUser.id,
          toUserId: payload.to_user_id,
          userId: payload.to_user_id,
          postId: payload.post_id || "",
          communityId: payload.community_id || "",
          createdAt,
          isRead: false,
          read: false
        },
        {
          type: payload.type || "notification",
          text: payload.text || "",
          to_user_id: payload.to_user_id,
          user_id: payload.to_user_id,
          created_at: createdAt,
          is_read: false
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function handleTopRelationAction(authorId, relationBtn) {
      if (!currentUser || !authorId || authorId === currentUser.id || isUserBlocked(authorId)) return;

      const author = getAuthorProfile(authorId);
      const relation = getRelationState(authorId);
      relationBtn.disabled = true;

      try {
        if (relation === "requested") {
          const row = await findRequestRow(authorId);

          if (row?.id) {
            const { error } = await supabase
              .from("follow_requests")
              .delete()
              .eq("id", row.id);

            if (error) throw error;
          }
        } else if (author?.isPrivate) {
          const row = await findRequestRow(authorId);

          if (!row) {
            const { error } = await supabase
              .from("follow_requests")
              .insert({
                requester_id: currentUser.id,
                target_id: authorId,
                from_user_id: currentUser.id,
                to_user_id: authorId,
                status: "pending",
                created_at: nowIso(),
                updated_at: nowIso()
              });

            if (error) throw error;

            await createNotificationSafe({
              type: "follow_request",
              title: "Follow request",
              text: `${currentUserProfile?.displayName || "Someone"} sent you a follow request.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        } else {
          const row = await findFollowRow(authorId);

          if (!row) {
            const { error } = await supabase
              .from("follows")
              .insert({
                follower_id: currentUser.id,
                following_id: authorId,
                created_at: nowIso()
              });

            if (error) throw error;

            await createNotificationSafe({
              type: "follow",
              title: "New follower",
              text: `${currentUserProfile?.displayName || "Someone"} started following you.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        }

        await Promise.all([loadFollows(), loadOutgoingRequests()]);
        await renderFeedItems();
      } catch (error) {
        console.error("Relation action failed:", error);
        alert("Could not update follow state.");
      }

      relationBtn.disabled = false;
    }

    async function findCommunityMembership(table, communityId) {
      const variants = [
        { communityCol: "community_id", userCol: "user_id" },
        { communityCol: "communityId", userCol: "userId" },
        { communityCol: "community_id", userCol: "uid" },
        { communityCol: "communityId", userCol: "uid" },
        { communityCol: "group_id", userCol: "user_id" },
        { communityCol: "groupId", userCol: "userId" }
      ];

      for (const v of variants) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(v.communityCol, communityId)
            .eq(v.userCol, currentUser.id)
            .limit(1);

          if (!error && data?.length) {
            return { table, row: data[0], variant: v };
          }
        } catch {}
      }

      return null;
    }

    async function findWritableCommunityMemberTable() {
      for (const table of TABLES.communityMembers) {
        try {
          const { error } = await supabase.from(table).select("id").limit(1);
          if (!error) return table;
        } catch {}
      }

      return TABLES.communityMembers[0];
    }

    async function addCommunityMembership(communityId, status) {
      const table = await findWritableCommunityMemberTable();
      const existing = await findCommunityMembership(table, communityId);

      if (existing?.row?.id) {
        try {
          const { error } = await supabase
            .from(existing.table)
            .update({ status, updated_at: nowIso() })
            .eq("id", existing.row.id);

          if (!error) return;
        } catch {}
      }

      const displayName = currentUserProfile?.displayName || currentUser?.user_metadata?.display_name || currentUser?.email || "Member";
      const username = currentUserProfile?.username || "";

      const payloads = [
        {
          community_id: communityId,
          user_id: currentUser.id,
          display_name: displayName,
          username,
          role: "member",
          status,
          joined_at: nowIso(),
          created_at: nowIso(),
          updated_at: nowIso()
        },
        {
          communityId: communityId,
          userId: currentUser.id,
          displayName,
          username,
          role: "member",
          status,
          joinedAt: nowIso(),
          createdAt: nowIso(),
          updatedAt: nowIso()
        },
        {
          community_id: communityId,
          user_id: currentUser.id,
          status
        }
      ];

      let lastError = null;

      for (const payload of payloads) {
        try {
          const { error } = await supabase.from(table).insert(payload);
          if (!error) return;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not join community.");
    }

    async function handleCommunityJoinAction(communityId, btn) {
      if (!currentUser || !communityId) return;

      const community = getCommunityById(communityId);

      if (!community) {
        window.location.href = `community.html?communityId=${encodeURIComponent(communityId)}`;
        return;
      }

      if (isCommunityOwner(communityId) || isCommunityJoined(communityId)) {
        window.location.href = `community.html?communityId=${encodeURIComponent(communityId)}`;
        return;
      }

      if (community.creatorId && isUserBlocked(community.creatorId)) return;

      btn.disabled = true;

      try {
        const requestOnly = isPrivateCommunity(community);
        const status = requestOnly ? "pending" : "active";

        await addCommunityMembership(communityId, status);

        if (requestOnly) {
          pendingCommunityIds.add(communityId);

          if (community.creatorId && community.creatorId !== currentUser.id) {
            await createNotificationSafe({
              type: "community_join_request",
              title: "Community request",
              text: `${currentUserProfile?.displayName || "Someone"} requested to join ${community.name}.`,
              from_user_id: currentUser.id,
              to_user_id: community.creatorId,
              community_id: communityId,
              created_at: nowIso(),
              is_read: false
            });
          }
        } else {
          joinedCommunityIds.add(communityId);

          if (community.creatorId && community.creatorId !== currentUser.id) {
            await createNotificationSafe({
              type: "community_join",
              title: "New community member",
              text: `${currentUserProfile?.displayName || "Someone"} joined ${community.name}.`,
              from_user_id: currentUser.id,
              to_user_id: community.creatorId,
              community_id: communityId,
              created_at: nowIso(),
              is_read: false
            });
          }
        }

        await refreshFeedData();
      } catch (error) {
        console.error("Community join failed:", error);
        alert(error?.message || "Could not join community.");
        btn.disabled = false;
      }
    }

    async function loadPostMeta(postId) {
      let likeCount = 0;
      let liked = false;

      if (hasPostLikesTable) {
        try {
          const [countRes, myLikeRes] = await Promise.all([
            supabase.from("post_likes").select("id", { count: "exact", head: true }).eq("post_id", postId),
            supabase.from("post_likes").select("id").eq("post_id", postId).eq("user_id", currentUser.id).limit(1)
          ]);

          if (!countRes.error) likeCount = countRes.count || 0;
          if (!myLikeRes.error) liked = !!(myLikeRes.data && myLikeRes.data.length);
        } catch (err) {
          console.error("Like meta error:", err);
        }
      }

      let commentCount = 0;

      try {
        const { count, error } = await supabase
          .from("post_comments")
          .select("id", { count: "exact", head: true })
          .eq("post_id", postId);

        if (!error) commentCount = count || 0;
      } catch (err) {
        console.error("Comment meta error:", err);
      }

      return { likeCount, liked, commentCount };
    }

    async function renderCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const postRow = allPosts.find(p => p.id === postId);
        const postOwnerId = postRow ? postRow.userId : "";

        const { data, error } = await supabase
          .from("post_comments")
          .select("*")
          .eq("post_id", postId)
          .order("created_at", { ascending: true });

        if (error) throw error;

        const comments = (data || [])
          .map(normalizeComment)
          .filter(comment => !isUserBlocked(comment.userId));

        const countEl = commentsToggle.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(comments.length);

        if (!comments.length) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        comments.forEach((comment) => {
          const canDelete = comment.userId === currentUser.id || postOwnerId === currentUser.id;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";

          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                ${comment.username ? `<div class="comment-username">@${escapeHtml(comment.username)}</div>` : ""}
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${comment.id}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              const { error } = await supabase
                .from("post_comments")
                .delete()
                .eq("id", cId);

              if (error) throw error;
              await refreshPostMeta(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentsWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);

      const meta = await loadPostMeta(postId);

      if (likeBtn) {
        likeBtn.dataset.liked = meta.liked ? "yes" : "no";
        const countEl = likeBtn.querySelector(".like-count");
        if (countEl) countEl.textContent = String(meta.likeCount);
      }

      if (commentToggleBtn) {
        const countEl = commentToggleBtn.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(meta.commentCount);
      }

      if (commentsWrap && !commentsWrap.classList.contains("hidden")) {
        await renderCommentsUI(postId);
      }
    }

            <path d="M20.8 4.6a5.4 5.4 0 0 0-7.6 0L12 5.8l-1.2-1.2a5.4 5.4 0 1 0-7.6 7.6L12 21l8.8-8.8a5.4 5.4 0 0 0 0-7.6z"></path>

    function buildShareUrl(type, item) {
      const url = new URL(window.location.href);

      if (type === "post") {
        url.pathname = url.pathname.replace(/[^/]*$/, "post.html");
        url.search = "";
        url.searchParams.set("postId", item.id);
        return url.toString();
      }

      if (type === "community") {
        url.pathname = url.pathname.replace(/[^/]*$/, "community.html");
        url.search = "";
        url.searchParams.set("communityId", item.communityId || item.id || "");
        return url.toString();
      }

      return window.location.href;
    }

    async function shareItem(type, item, label = "OwnSpace") {
      const url = buildShareUrl(type, item);

      const title = type === "community" ? "Check this community on OwnSpace" : "Check this post on OwnSpace";
      const text = type === "community" ? `Check out ${label || "this community"} on OwnSpace.` : "Check this post on OwnSpace.";

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Link copied.");
        } else {
          prompt("Copy this link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") console.error("Share failed:", err);
      }
    }


    async function awardLikeMilestonePoints(postId) {
      if (!postId) return null;

      try {
        const { data, error } = await supabase.rpc("award_like_milestone_points", {
          p_post_id: postId
        });

        if (error) {
          const msg = String(error?.message || "").toLowerCase();

          // Do not break liking if points SQL is not installed yet.
          if (
            !msg.includes("function") &&
            !msg.includes("schema cache") &&
            !msg.includes("could not find")
          ) {
            console.warn("Like points reward failed:", error);
          }

          return null;
        }

        const row = Array.isArray(data) ? data[0] : data;

        if (row && Number(row.awarded_points || 0) > 0) {
          console.log(`OwnSpace points awarded: +${row.awarded_points}`);
        }

        return row || null;
      } catch (err) {
        console.warn("Like points reward skipped:", err?.message || err);
        return null;
      }
    }

    function attachPostActions(postId, postData) {
      const ownerId = postData.userId;
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const shareBtn = document.querySelector(`.share-btn[data-type="post"][data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
      const relationBtn = document.querySelector(`.follow-top-btn[data-author-id="${ownerId}"][data-post-id="${postId}"]`);

      if (relationBtn) {
        relationBtn.addEventListener("click", async () => {
          await handleTopRelationAction(ownerId, relationBtn);
        });
      }

      document.querySelectorAll(`.community-join-btn[data-community-id="${postData.communityId || ""}"]`).forEach(btn => {
        if (btn.dataset.bound === "yes") return;
        btn.dataset.bound = "yes";

        btn.addEventListener("click", async () => {
          await handleCommunityJoinAction(btn.getAttribute("data-community-id"), btn);
        });
      });

      if (shareBtn) {
        shareBtn.addEventListener("click", async () => {
          await shareItem("post", postData, "post");
        });
      }

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser || !hasPostLikesTable || isUserBlocked(ownerId)) return;
          likeBtn.disabled = true;

          try {
            const { data: existing, error: findError } = await supabase
              .from("post_likes")
              .select("id")
              .eq("post_id", postId)
              .eq("user_id", currentUser.id)
              .limit(1);

            if (findError) throw findError;

            if (existing && existing.length) {
              const { error } = await supabase
                .from("post_likes")
                .delete()
                .eq("id", existing[0].id);

              if (error) throw error;
            } else {
              const { error } = await supabase
                .from("post_likes")
                .insert({
                  post_id: postId,
                  user_id: currentUser.id,
                  created_at: nowIso()
                });

              if (error) throw error;

              if (ownerId && ownerId !== currentUser.id) {
                await awardLikeMilestonePoints(postId);

                await createNotificationSafe({
                  type: "like",
                  title: "New like",
                  text: `${currentUserProfile?.displayName || "Someone"} liked your post.`,
                  from_user_id: currentUser.id,
                  to_user_id: ownerId,
                  post_id: postId,
                  created_at: nowIso(),
                  is_read: false
                });
              }
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");

          if (!commentWrap.classList.contains("hidden")) {
            await renderCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text || isUserBlocked(ownerId)) return;

          const displayName = currentUserProfile?.displayName || "Member";
          const username = currentUserProfile?.username || "";
          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            const { error } = await supabase
              .from("post_comments")
              .insert({
                post_id: postId,
                user_id: currentUser.id,
                display_name: displayName,
                username,
                text,
                created_at: nowIso()
              });

            if (error) throw error;

            commentInput.value = "";

            if (ownerId && ownerId !== currentUser.id) {
              await createNotificationSafe({
                type: "comment",
                title: "New comment",
                text: `${displayName} commented on your post.`,
                from_user_id: currentUser.id,
                to_user_id: ownerId,
                post_id: postId,
                created_at: nowIso(),
                is_read: false
              });
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert(error?.message || "Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }
