<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Feed</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 18px 36px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 16px 28px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:720px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-center{text-align:center;min-width:0}
    .brand{
      font-size:18px;
      font-weight:800;
      letter-spacing:.1px;
      line-height:1.05;
    }
    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }
    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }
    .top-icon-btn svg{width:18px;height:18px;display:block}
    .notify-count{
      position:absolute;
      top:-4px;
      right:-2px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:11px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .feed-shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .feed-head{
      padding:12px 12px 10px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }
    .feed-head-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .section-title{
      font-size:17px;
      font-weight:800;
      line-height:1.2;
    }
    .write-btn{
      border:none;
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
      border-radius:12px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      min-height:38px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .write-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }
    .write-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .filter-tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .filter-tab{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .filter-tab.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .composer-wrap{
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
      padding:12px;
    }
    .composer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .composer-head-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .avatar,.post-avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }
    .avatar-placeholder,.post-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:var(--surface-3);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
    }
    .composer-head h3{font-size:15px;margin-bottom:2px}
    .composer-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
    }
    .muted{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .field{margin-bottom:10px}
    textarea,
    input[type="file"]{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:13px 13px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    textarea{min-height:92px}
    textarea::placeholder{color:var(--muted)}

    .composer-actions{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .post-btn{
      border:none;
      background:var(--green);
      color:#052112;
      padding:11px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      min-width:124px;
    }
    .post-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
    .close-compose-btn,
    .remove-image-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 11px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .message{min-height:18px;font-size:13px}
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}
    .tiny-note{
      color:var(--muted);
      font-size:11px;
      line-height:1.45;
      margin-top:5px;
    }

    .image-preview-wrap{
      margin-top:10px;
      display:grid;
      gap:10px;
    }
    .image-preview{
      width:100%;
      max-height:360px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line-soft);
    }

    .posts-list{display:block}
    .feed-item{
      padding:12px;
      border-bottom:1px solid var(--line-soft);
    }
    .feed-item:last-child{border-bottom:none}

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }
    .post-left{
      display:flex;
      gap:10px;
      align-items:center;
      min-width:0;
    }
    .post-top-text{min-width:0}
    .post-name{
      font-size:15px;
      font-weight:800;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .post-name a{
      color:var(--text);
      text-decoration:none;
    }
    .post-name a:hover{text-decoration:underline}
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }
    .post-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .post-date{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
    }

    .post-top-actions{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      flex-shrink:0;
    }

    .follow-top-btn,
    .delete-post-btn{
      width:34px;
      height:34px;
      min-width:34px;
      border:none;
      border-radius:10px;
      padding:0;
      font-size:0;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .follow-top-btn svg,
    .delete-post-btn svg{
      width:16px;
      height:16px;
      display:block;
    }

    .follow-top-btn.follow{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .follow-top-btn.request{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }
    .follow-top-btn.requested{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .delete-post-btn{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }

    .post-click{
      display:block;
      text-decoration:none;
      color:inherit;
    }
    .post-caption{
      color:var(--text);
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }
    .post-image{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-2);
      margin-top:4px;
      border:1px solid var(--line-soft);
    }

    .post-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .icon-action-btn,.icon-report-link{
      border:none;
      cursor:pointer;
      font-weight:800;
      border-radius:10px;
      padding:7px 9px;
      font-size:11px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .icon-action-btn svg,.icon-report-link svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0
    }
    .like-btn{
      background:rgba(76,201,255,.12);
      border-color:rgba(76,201,255,.18);
    }
    .like-btn[data-liked="yes"]{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.22);
    }
    .comment-toggle-btn{
      background:rgba(167,139,250,.12);
      border-color:rgba(167,139,250,.18);
    }
    .icon-report-link{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }

    .comments-wrap{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--line-soft);
    }
    .comment-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px
    }
    .comment-input{
      flex:1;
      min-width:200px;
      border:none;
      outline:none;
      padding:12px 13px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:13px;
    }
    .comment-submit{
      background:var(--green);
      color:#052112;
      border-color:rgba(61,220,132,.20);
    }
    .comments-list{
      display:grid;
      gap:10px
    }
    .comment-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
    }
    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .comment-author{
      font-weight:800;
      font-size:13px;
      color:var(--text)
    }
    .comment-username{
      color:var(--blue);
      font-size:11px;
      font-weight:700;
      margin-top:2px;
    }
    .comment-date{
      color:var(--muted);
      font-size:11px;
      margin-top:2px
    }
    .comment-text{
      color:var(--text);
      line-height:1.55;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word
    }
    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:11px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .empty-box{
      text-align:center;
      padding:24px 12px;
      color:var(--muted);
      background:var(--surface-2);
      margin:12px;
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(720px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }
    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .composer-actions{align-items:stretch}
      .post-btn{width:100%}
      .comment-form{flex-direction:column}
      .close-compose-btn{width:100%}
      .feed-item{padding:11px}
      .feed-head-top{align-items:stretch}
      .write-btn{width:100%;justify-content:center}
      .remove-image-btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="school.html" class="top-icon-btn" aria-label="School">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-5 9 5-9 5-9-5z"></path>
          <path d="M7 12v5c0 .6 2.2 3 5 3s5-2.4 5-3v-5"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Member feed</div>
      </div>

      <button id="notifyBtn" class="top-icon-btn" type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
          <path d="M10 20a2 2 0 0 0 4 0"></path>
        </svg>
        <span id="notifyCount" class="notify-count hidden">0</span>
      </button>
    </div>

    <div class="feed-shell">
      <div class="feed-head">
        <div class="feed-head-top">
          <div class="section-title">Feed</div>
          <button id="openComposerBtn" class="write-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <circle cx="8.5" cy="10" r="1.5"></circle>
              <path d="M21 15l-5-5L5 21"></path>
            </svg>
            <span>Share a Post</span>
          </button>
        </div>

        <div class="filter-tabs">
          <button id="allTab" class="filter-tab active" type="button">All</button>
          <button id="followingTab" class="filter-tab" type="button">Following</button>
        </div>
      </div>

      <div id="composerPanel" class="composer-wrap hidden">
        <div class="composer-head">
          <div class="composer-head-left">
            <img id="myAvatar" class="avatar hidden" alt="My Photo" />
            <div id="myAvatarPlaceholder" class="avatar-placeholder">No photo</div>

            <div>
              <h3 id="myName">Loading...</h3>
              <div id="myUsername" class="composer-username hidden">@username</div>
              <div class="muted">Write something or upload a photo</div>
            </div>
          </div>

          <button id="closeComposerBtn" class="close-compose-btn" type="button">Close</button>
        </div>

        <form id="postForm">
          <div class="field">
            <textarea id="caption" placeholder="What’s happening?"></textarea>
          </div>

          <div class="field">
            <input type="file" id="imageFile" accept="image/*" />
            <div class="tiny-note">Direct upload to Supabase Storage. No image link needed.</div>

            <div id="imagePreviewWrap" class="image-preview-wrap hidden">
              <img id="imagePreview" class="image-preview" alt="Selected image preview" />
              <button id="removeImageBtn" class="remove-image-btn" type="button">Remove Photo</button>
            </div>
          </div>

          <div class="composer-actions">
            <div id="formMessage" class="message"></div>
            <button type="submit" id="postBtn" class="post-btn">Post Update</button>
          </div>
        </form>
      </div>

      <div id="postsList" class="posts-list"></div>
      <div id="emptyBox" class="empty-box hidden">No updates yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5"></path>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const STORAGE_BUCKET = "media";

    const postForm = document.getElementById("postForm");
    const postBtn = document.getElementById("postBtn");
    const captionInput = document.getElementById("caption");
    const imageFileInput = document.getElementById("imageFile");
    const imagePreviewWrap = document.getElementById("imagePreviewWrap");
    const imagePreview = document.getElementById("imagePreview");
    const removeImageBtn = document.getElementById("removeImageBtn");
    const formMessage = document.getElementById("formMessage");

    const myName = document.getElementById("myName");
    const myUsername = document.getElementById("myUsername");
    const myAvatar = document.getElementById("myAvatar");
    const myAvatarPlaceholder = document.getElementById("myAvatarPlaceholder");

    const postsList = document.getElementById("postsList");
    const emptyBox = document.getElementById("emptyBox");
    const allTab = document.getElementById("allTab");
    const followingTab = document.getElementById("followingTab");

    const notifyBtn = document.getElementById("notifyBtn");
    const notifyCount = document.getElementById("notifyCount");
    const inboxBadge = document.getElementById("inboxBadge");

    const composerPanel = document.getElementById("composerPanel");
    const openComposerBtn = document.getElementById("openComposerBtn");
    const closeComposerBtn = document.getElementById("closeComposerBtn");

    let currentUser = null;
    let currentUserProfile = null;
    let currentFeedFilter = "all";
    let follows = [];
    let outgoingRequests = [];
    let allPosts = [];
    let publicProfilesMap = new Map();
    let selectedImageFile = null;
    let feedSubscriptions = [];
    let hasPostLikesTable = false;
    let refreshTimer = null;

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme() {
      const theme = resolveTheme(getStoredTheme());
      document.documentElement.setAttribute("data-theme", theme);
    }

    applyTheme();

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme();
      });
    }

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme();
    });

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showComposer() {
      if (openComposerBtn.disabled) return;
      composerPanel.classList.remove("hidden");
      composerPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      setTimeout(() => captionInput.focus(), 180);
    }

    function hideComposer() {
      composerPanel.classList.add("hidden");
    }

    openComposerBtn.addEventListener("click", showComposer);
    closeComposerBtn.addEventListener("click", hideComposer);

    function showMyAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }
      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(value) {
      if (!value) return "Just now";
      try {
        const d = typeof value === "string" ? new Date(value) : new Date(value);
        return Number.isNaN(d.getTime()) ? "Just now" : d.toLocaleString();
      } catch {
        return "Just now";
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        bio: getField(d, ["bio", "about", "description"]),
        suspensionUntil: d.suspension_until ?? d.suspensionUntil ?? null
      };
    }

    function normalizePost(raw) {
      const d = raw || {};
      return {
        id: d.id || "",
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "uid"]),
        displayName: getField(d, ["display_name", "displayName", "name"]),
        username: getField(d, ["username"]),
        userPhotoURL: getField(d, ["user_photo_url", "userPhotoURL", "photo_url", "photoURL"]),
        caption: getField(d, ["caption", "text", "content"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        source: getField(d, ["source"]) || "feed",
        hidden: !!(d.hidden),
        hiddenByAdmin: !!(d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    function normalizeComment(raw) {
      const d = raw || {};
      return {
        id: d.id || "",
        postId: getField(d, ["post_id", "postId"]),
        userId: getField(d, ["user_id", "userId", "uid"]),
        displayName: getField(d, ["display_name", "displayName", "name"]) || "Member",
        username: getField(d, ["username"]),
        text: getField(d, ["text", "comment", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    function normalizeNotification(raw) {
      const d = raw || {};
      return {
        id: d.id || "",
        isRead: !!(d.is_read ?? d.isRead ?? d.read),
        toUserId: getField(d, ["to_user_id", "toUserId", "user_id", "userId"])
      };
    }

    function authorHidden(author) {
      return author?.isHiddenByAdmin || author?.moderationStatus === "banned" || author?.softDeleted;
    }

    function getAuthorProfile(uid) {
      if (uid === currentUser?.id && currentUserProfile) return currentUserProfile;
      return publicProfilesMap.get(uid) || null;
    }

    function isFollowing(userId) {
      return follows.some(f => (f.following_id || f.followingId) === userId);
    }

    function isOutgoingRequested(userId) {
      return outgoingRequests.some(r => (r.target_id || r.targetId) === userId);
    }

    function canViewerSeePost(post) {
      if (!post?.userId || !currentUser) return false;
      if (post.userId === currentUser.id) return true;

      const author = getAuthorProfile(post.userId);
      if (!author) return true;
      if (authorHidden(author)) return false;

      if (author.isPrivate && !isFollowing(post.userId)) {
        return false;
      }

      return true;
    }

    function getFilteredPosts() {
      return allPosts.filter(post => {
        if (!post.userId) return false;
        if (post.hidden || post.hiddenByAdmin || post.softDeleted) return false;

        const author = getAuthorProfile(post.userId);
        if (authorHidden(author)) return false;

        if (currentFeedFilter === "following") {
          return post.userId === currentUser.id || isFollowing(post.userId);
        }

        return canViewerSeePost(post);
      });
    }

    function applyFeedTabUI() {
      allTab.classList.toggle("active", currentFeedFilter === "all");
      followingTab.classList.toggle("active", currentFeedFilter === "following");
    }

    allTab.addEventListener("click", async () => {
      currentFeedFilter = "all";
      applyFeedTabUI();
      await renderPosts();
    });

    followingTab.addEventListener("click", async () => {
      currentFeedFilter = "following";
      applyFeedTabUI();
      await renderPosts();
    });

    function formatBadgeCount(count) {
      return count > 99 ? "99+" : String(count);
    }

    function renderNotifications(items) {
      const unread = items.filter(item => !item.isRead);
      const count = unread.length;

      if (!count) {
        notifyCount.classList.add("hidden");
      } else {
        notifyCount.textContent = formatBadgeCount(count);
        notifyCount.classList.remove("hidden");
      }

      if (!count) {
        inboxBadge.classList.add("hidden");
      } else {
        inboxBadge.textContent = formatBadgeCount(count);
        inboxBadge.classList.remove("hidden");
      }
    }

    function getRelationState(authorId) {
      if (!currentUser || !authorId) return "none";
      if (authorId === currentUser.id) return "self";
      if (isFollowing(authorId)) return "following";

      const author = getAuthorProfile(authorId);
      if (author?.isPrivate) {
        return isOutgoingRequested(authorId) ? "requested" : "request";
      }

      return "follow";
    }

    function buildRelationButton(authorId, postId) {
      const relation = getRelationState(authorId);
      if (relation === "self") return "";
      if (relation === "following") return "";

      if (relation === "requested") {
        return `
          <button class="follow-top-btn requested" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}" title="Requested" aria-label="Requested">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 8v4l2.5 2.5"></path>
              <circle cx="12" cy="12" r="8"></circle>
            </svg>
          </button>
        `;
      }

      const author = getAuthorProfile(authorId);
      if (author?.isPrivate) {
        return `
          <button class="follow-top-btn request" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}" title="Request follow" aria-label="Request follow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
              <circle cx="9.5" cy="7" r="3.5"></circle>
              <path d="M19 8v6"></path>
              <path d="M16 11h6"></path>
            </svg>
          </button>
        `;
      }

      return `
        <button class="follow-top-btn follow" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}" title="Follow" aria-label="Follow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
            <circle cx="9.5" cy="7" r="3.5"></circle>
            <path d="M19 8v6"></path>
            <path d="M16 11h6"></path>
          </svg>
        </button>
      `;
    }

    function updateSelectedImageUI() {
      if (!selectedImageFile) {
        imageFileInput.value = "";
        imagePreviewWrap.classList.add("hidden");
        imagePreview.removeAttribute("src");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        imagePreview.src = reader.result;
        imagePreviewWrap.classList.remove("hidden");
      };
      reader.readAsDataURL(selectedImageFile);
    }

    imageFileInput.addEventListener("change", () => {
      const file = imageFileInput.files?.[0] || null;
      if (!file) {
        selectedImageFile = null;
        updateSelectedImageUI();
        return;
      }

      if (!file.type.startsWith("image/")) {
        selectedImageFile = null;
        updateSelectedImageUI();
        setFormMessage("Please choose an image file.", "error");
        return;
      }

      selectedImageFile = file;
      setFormMessage("");
      updateSelectedImageUI();
    });

    removeImageBtn.addEventListener("click", () => {
      selectedImageFile = null;
      updateSelectedImageUI();
    });

    async function detectOptionalTables() {
      try {
        const { error } = await supabase
          .from("post_likes")
          .select("id", { count: "exact", head: true })
          .limit(1);

        hasPostLikesTable = !error;
      } catch {
        hasPostLikesTable = false;
      }
    }

    async function ensureOwnProfileRows() {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", currentUser.id).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", currentUser.id).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      let userRow = userRes.data || null;
      let publicRow = publicRes.data || null;

      if (!userRow && !publicRow) {
        const fallbackName =
          currentUser.user_metadata?.display_name ||
          currentUser.email?.split("@")[0] ||
          "Member";

        const fallbackUsername = "";
        const baseRow = {
          uid: currentUser.id,
          display_name: fallbackName,
          display_name_lower: fallbackName.toLowerCase(),
          username: fallbackUsername,
          username_lower: fallbackUsername,
          bio: "",
          photo_url: "",
          city: "",
          city_lower: "",
          province: "",
          country: "",
          location_search: "",
          city_visible: false,
          is_private: false,
          is_verified: false,
          show_in_nearby: true,
          location_visibility: "city",
          moderation_status: "",
          updated_at: nowIso()
        };

        const userPayload = {
          ...baseRow,
          email: currentUser.email || "",
          real_name: "",
          blocked_users: []
        };

        const { error: saveUserError } = await supabase
          .from("users")
          .upsert(userPayload, { onConflict: "uid" });
        if (saveUserError) throw saveUserError;

        const { error: savePublicError } = await supabase
          .from("public_profiles")
          .upsert(baseRow, { onConflict: "uid" });
        if (savePublicError) throw savePublicError;

        userRow = userPayload;
        publicRow = baseRow;
      }

      return normalizeProfile({ ...(publicRow || {}), ...(userRow || {}), uid: currentUser.id }, currentUser.id);
    }

    async function loadCurrentUserProfile() {
      currentUserProfile = await ensureOwnProfileRows();

      myName.textContent =
        currentUserProfile.displayName ||
        currentUser.user_metadata?.display_name ||
        currentUser.email?.split("@")[0] ||
        "Member";

      if (currentUserProfile.username) {
        myUsername.textContent = "@" + currentUserProfile.username;
        myUsername.classList.remove("hidden");
      } else {
        myUsername.classList.add("hidden");
      }

      showMyAvatar(currentUserProfile.photoURL || "");

      const status = currentUserProfile?.moderationStatus || "";
      const suspendUntilValue = currentUserProfile?.suspensionUntil || null;

      const suspensionUntil = suspendUntilValue
        ? new Date(suspendUntilValue).getTime()
        : 0;

      if (status === "banned") {
        hideComposer();
        openComposerBtn.disabled = true;
        setFormMessage("Your account is banned. Posting is disabled.", "error");
      } else if (status === "suspended" && suspensionUntil && Date.now() < suspensionUntil) {
        hideComposer();
        openComposerBtn.disabled = true;
        setFormMessage("Your account is suspended. Posting is disabled for now.", "error");
      } else {
        openComposerBtn.disabled = false;
      }
    }

    async function loadFollows() {
      const { data, error } = await supabase
        .from("follows")
        .select("*")
        .eq("follower_id", currentUser.id);

      if (error) throw error;
      follows = data || [];
    }

    async function loadOutgoingRequests() {
      const { data, error } = await supabase
        .from("follow_requests")
        .select("*")
        .eq("requester_id", currentUser.id);

      if (error) throw error;
      outgoingRequests = data || [];
    }

    async function loadNotificationsCount() {
      const { data, error } = await supabase
        .from("notifications")
        .select("*")
        .eq("to_user_id", currentUser.id)
        .order("created_at", { ascending: false })
        .limit(200);

      if (error) {
        console.error("Notification load error:", error);
        renderNotifications([]);
        return;
      }

      renderNotifications((data || []).map(normalizeNotification));
    }

    async function loadPostsAndProfiles() {
      const { data: postRows, error: postError } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (postError) throw postError;

      allPosts = (postRows || []).map(normalizePost);

      const authorIds = [...new Set(allPosts.map(p => p.userId).filter(Boolean))];
      publicProfilesMap = new Map();

      if (authorIds.length) {
        const { data: profileRows, error: profileError } = await supabase
          .from("public_profiles")
          .select("*")
          .in("uid", authorIds);

        if (profileError) throw profileError;

        (profileRows || []).forEach(row => {
          const p = normalizeProfile(row, row.uid);
          publicProfilesMap.set(p.uid, p);
        });
      }

      if (currentUserProfile) {
        publicProfilesMap.set(currentUser.id, currentUserProfile);
      }
    }

    async function findFollowRow(authorId) {
      const existing = follows.find(f => (f.following_id || f.followingId) === authorId);
      if (existing) return existing;

      const { data, error } = await supabase
        .from("follows")
        .select("*")
        .eq("follower_id", currentUser.id)
        .eq("following_id", authorId)
        .limit(1);

      if (error) throw error;
      return data?.[0] || null;
    }

    async function findRequestRow(authorId) {
      const existing = outgoingRequests.find(r => (r.target_id || r.targetId) === authorId);
      if (existing) return existing;

      const { data, error } = await supabase
        .from("follow_requests")
        .select("*")
        .eq("requester_id", currentUser.id)
        .eq("target_id", authorId)
        .limit(1);

      if (error) throw error;
      return data?.[0] || null;
    }

    async function createNotificationSafe(payload) {
      if (!payload?.to_user_id || payload.to_user_id === currentUser.id) return;
      try {
        await supabase.from("notifications").insert(payload);
      } catch (err) {
        console.error("Notification error:", err);
      }
    }

    async function handleTopRelationAction(authorId, relationBtn) {
      if (!currentUser || !authorId || authorId === currentUser.id) return;

      const author = getAuthorProfile(authorId);
      const relation = getRelationState(authorId);
      relationBtn.disabled = true;

      try {
        if (relation === "requested") {
          const row = await findRequestRow(authorId);
          if (row?.id) {
            const { error } = await supabase
              .from("follow_requests")
              .delete()
              .eq("id", row.id);
            if (error) throw error;
          }
        } else if (author?.isPrivate) {
          const row = await findRequestRow(authorId);
          if (!row) {
            const { error } = await supabase
              .from("follow_requests")
              .insert({
                requester_id: currentUser.id,
                target_id: authorId,
                created_at: nowIso()
              });
            if (error) throw error;

            await createNotificationSafe({
              type: "follow_request",
              title: "Follow request",
              text: `${currentUserProfile?.displayName || "Someone"} sent you a follow request.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        } else {
          const row = await findFollowRow(authorId);
          if (!row) {
            const { error } = await supabase
              .from("follows")
              .insert({
                follower_id: currentUser.id,
                following_id: authorId,
                created_at: nowIso()
              });
            if (error) throw error;

            await createNotificationSafe({
              type: "follow",
              title: "New follower",
              text: `${currentUserProfile?.displayName || "Someone"} started following you.`,
              from_user_id: currentUser.id,
              to_user_id: authorId,
              created_at: nowIso(),
              is_read: false
            });
          }
        }

        await Promise.all([loadFollows(), loadOutgoingRequests()]);
        await renderPosts();
      } catch (error) {
        console.error("Relation action failed:", error);
        alert("Could not update follow state.");
      }

      relationBtn.disabled = false;
    }

    async function loadPostMeta(postId) {
      let likeCount = 0;
      let liked = false;

      if (hasPostLikesTable) {
        try {
          const [countRes, myLikeRes] = await Promise.all([
            supabase.from("post_likes").select("id", { count: "exact", head: true }).eq("post_id", postId),
            supabase.from("post_likes").select("id").eq("post_id", postId).eq("user_id", currentUser.id).limit(1)
          ]);

          if (!countRes.error) likeCount = countRes.count || 0;
          if (!myLikeRes.error) liked = !!(myLikeRes.data && myLikeRes.data.length);
        } catch (err) {
          console.error("Like meta error:", err);
        }
      }

      let commentCount = 0;
      try {
        const { count, error } = await supabase
          .from("post_comments")
          .select("id", { count: "exact", head: true })
          .eq("post_id", postId);

        if (!error) commentCount = count || 0;
      } catch (err) {
        console.error("Comment meta error:", err);
      }

      return { likeCount, liked, commentCount };
    }

    async function renderCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const postRow = allPosts.find(p => p.id === postId);
        const postOwnerId = postRow ? postRow.userId : "";

        const { data, error } = await supabase
          .from("post_comments")
          .select("*")
          .eq("post_id", postId)
          .order("created_at", { ascending: true });

        if (error) throw error;

        const comments = (data || []).map(normalizeComment);
        const countEl = commentsToggle.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(comments.length);

        if (!comments.length) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        comments.forEach((comment) => {
          const canDelete = comment.userId === currentUser.id || postOwnerId === currentUser.id;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";
          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                ${comment.username ? `<div class="comment-username">@${escapeHtml(comment.username)}</div>` : ""}
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${comment.id}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              const { error } = await supabase
                .from("post_comments")
                .delete()
                .eq("id", cId);

              if (error) throw error;
              await refreshPostMeta(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentsWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);

      const meta = await loadPostMeta(postId);

      if (likeBtn) {
        likeBtn.dataset.liked = meta.liked ? "yes" : "no";
        const countEl = likeBtn.querySelector(".like-count");
        if (countEl) countEl.textContent = String(meta.likeCount);
      }

      if (commentToggleBtn) {
        const countEl = commentToggleBtn.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(meta.commentCount);
      }

      if (commentsWrap && !commentsWrap.classList.contains("hidden")) {
        await renderCommentsUI(postId);
      }
    }

    function buildLikeButton(postId) {
      if (!hasPostLikesTable) return "";
      return `
        <button class="icon-action-btn like-btn" data-post-id="${postId}" data-liked="no" aria-label="Like">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s-6.7-4.4-9.2-8C.8 10.5 2 6.8 5.7 6c2.1-.4 3.7.5 4.8 1.8C11.6 6.5 13.2 5.6 15.3 6 19 6.8 20.2 10.5 21.2 13c-2.5 3.6-9.2 8-9.2 8z"></path>
          </svg>
          <span class="like-count">0</span>
        </button>
      `;
    }

    function attachPostActions(postId, postData) {
      const ownerId = postData.userId;
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
      const relationBtn = document.querySelector(`.follow-top-btn[data-author-id="${ownerId}"][data-post-id="${postId}"]`);

      if (relationBtn) {
        relationBtn.addEventListener("click", async () => {
          await handleTopRelationAction(ownerId, relationBtn);
        });
      }

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser || !hasPostLikesTable) return;
          likeBtn.disabled = true;

          try {
            const { data: existing, error: findError } = await supabase
              .from("post_likes")
              .select("id")
              .eq("post_id", postId)
              .eq("user_id", currentUser.id)
              .limit(1);

            if (findError) throw findError;

            if (existing && existing.length) {
              const { error } = await supabase
                .from("post_likes")
                .delete()
                .eq("id", existing[0].id);
              if (error) throw error;
            } else {
              const { error } = await supabase
                .from("post_likes")
                .insert({
                  post_id: postId,
                  user_id: currentUser.id,
                  created_at: nowIso()
                });
              if (error) throw error;

              if (ownerId && ownerId !== currentUser.id) {
                await createNotificationSafe({
                  type: "like",
                  title: "New like",
                  text: `${currentUserProfile?.displayName || "Someone"} liked your post.`,
                  from_user_id: currentUser.id,
                  to_user_id: ownerId,
                  post_id: postId,
                  created_at: nowIso(),
                  is_read: false
                });
              }
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");
          if (!commentWrap.classList.contains("hidden")) {
            await renderCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text) return;

          const displayName = currentUserProfile?.displayName || "Member";
          const username = currentUserProfile?.username || "";
          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            const { error } = await supabase
              .from("post_comments")
              .insert({
                post_id: postId,
                user_id: currentUser.id,
                display_name: displayName,
                username,
                text,
                created_at: nowIso()
              });

            if (error) throw error;

            commentInput.value = "";

            if (ownerId && ownerId !== currentUser.id) {
              await createNotificationSafe({
                type: "comment",
                title: "New comment",
                text: `${displayName} commented on your post.`,
                from_user_id: currentUser.id,
                to_user_id: ownerId,
                post_id: postId,
                created_at: nowIso(),
                is_read: false
              });
            }

            await refreshPostMeta(postId);
          } catch (error) {
            console.error(error);
            alert(error?.message || "Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }

    async function renderPosts() {
      const posts = getFilteredPosts();
      postsList.innerHTML = "";

      if (!posts.length) {
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = currentFeedFilter === "following"
          ? "No updates from people you follow yet."
          : "No updates yet.";
        return;
      }

      emptyBox.classList.add("hidden");
      const postIds = [];

      for (const post of posts) {
        const postId = post.id;
        const ownerId = post.userId;
        const author = getAuthorProfile(ownerId);

        if (!ownerId) continue;
        if (!canViewerSeePost(post) && currentFeedFilter === "all") continue;

        postIds.push(postId);

        const displayName = author?.displayName || post.displayName || "Member";
        const username = author?.username || post.username || "";
        const avatarUrl = author?.photoURL || post.userPhotoURL || "";
        const caption = post.caption;
        const imageUrl = post.imageURL;

        const avatarHtml = avatarUrl
          ? `<a href="member.html?uid=${encodeURIComponent(ownerId)}">
               <img class="post-avatar" src="${escapeHtml(avatarUrl)}" alt="User Photo">
             </a>`
          : `<a href="member.html?uid=${encodeURIComponent(ownerId)}" style="text-decoration:none;">
               <div class="post-avatar-placeholder">No photo</div>
             </a>`;

        const verifiedHtml = author?.verified
          ? `<span class="verified-dot">✓</span>`
          : "";

        const deleteButton = currentUser && ownerId === currentUser.id
          ? `
            <button data-id="${postId}" class="delete-post-btn" title="Delete post" aria-label="Delete post">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
              </svg>
            </button>
          `
          : "";

        const relationButton = buildRelationButton(ownerId, postId);

        const reportButton = currentUser && ownerId !== currentUser.id
          ? `
            <a class="icon-report-link" href="report.html?type=post&targetId=${encodeURIComponent(postId)}&targetUserId=${encodeURIComponent(ownerId)}" aria-label="Report">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 3v18"></path>
                <path d="M5 4h10l-2.5 4L15 12H5"></path>
              </svg>
              <span>Report</span>
            </a>
          `
          : "";

        const item = document.createElement("div");
        item.className = "feed-item";
        item.innerHTML = `
          <div class="post-top">
            <div class="post-left">
              ${avatarHtml}
              <div class="post-top-text">
                <div class="post-name">
                  <a href="member.html?uid=${encodeURIComponent(ownerId)}">${escapeHtml(displayName)}</a>
                  ${verifiedHtml}
                </div>
                ${username ? `<div class="post-username">@${escapeHtml(username)}</div>` : ""}
                <div class="post-date">${formatDate(post.createdAt)}</div>
              </div>
            </div>

            <div class="post-top-actions">
              ${relationButton}
              ${deleteButton}
            </div>
          </div>

          <a class="post-click" href="post.html?postId=${encodeURIComponent(postId)}">
            ${caption ? `<div class="post-caption">${escapeHtml(caption)}</div>` : ""}
            ${imageUrl ? `<img class="post-image" src="${escapeHtml(imageUrl)}" alt="Post Image">` : ""}
          </a>

          <div class="post-actions">
            ${buildLikeButton(postId)}

            <button class="icon-action-btn comment-toggle-btn" data-post-id="${postId}" aria-label="Comments">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              <span class="comment-count">0</span>
            </button>

            ${reportButton}
          </div>

          <div class="comments-wrap hidden" data-post-id="${postId}">
            <form class="comment-form" data-post-id="${postId}">
              <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
              <button type="submit" class="icon-action-btn comment-submit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M22 2L11 13"></path>
                  <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
                </svg>
                <span>Add</span>
              </button>
            </form>
            <div class="comments-list" data-post-id="${postId}"></div>
          </div>
        `;

        const img = item.querySelector(".post-image");
        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const avatarImg = item.querySelector(".post-avatar");
        if (avatarImg) {
          avatarImg.addEventListener("error", () => {
            avatarImg.style.display = "none";
          });
        }

        postsList.appendChild(item);
        attachPostActions(postId, post);
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            const { error } = await supabase
              .from("posts")
              .delete()
              .eq("id", postId)
              .eq("user_id", currentUser.id);

            if (error) throw error;
            await refreshFeedData();
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });

      Promise.all(postIds.map(id => refreshPostMeta(id))).catch(err => {
        console.error("Post meta refresh error:", err);
      });
    }

    async function uploadPostImage(file) {
      if (!file) return "";

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const safeName = (file.name || "image")
        .replace(/\.[^/.]+$/, "")
        .replace(/[^a-zA-Z0-9_-]/g, "-")
        .slice(0, 40) || "image";

      const path = `posts/${currentUser.id}/${Date.now()}_${safeName}.${ext}`;

      const { error: uploadError } = await supabase
        .storage
        .from(STORAGE_BUCKET)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      return data?.publicUrl || "";
    }

    async function markNotificationsRead() {
      const { data, error } = await supabase
        .from("notifications")
        .select("id")
        .eq("to_user_id", currentUser.id)
        .eq("is_read", false);

      if (error) {
        console.error("Could not fetch unread notifications:", error);
        return;
      }

      const ids = (data || []).map(row => row.id).filter(Boolean);
      if (!ids.length) return;

      const { error: updateError } = await supabase
        .from("notifications")
        .update({
          is_read: true,
          read: true,
          read_at: nowIso()
        })
        .in("id", ids);

      if (updateError) {
        console.error("Could not mark notifications read:", updateError);
      }
    }

    notifyBtn.addEventListener("click", async () => {
      if (!currentUser) {
        window.location.href = "notifications.html";
        return;
      }

      await markNotificationsRead();
      window.location.href = "notifications.html";
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();

      if (!caption && !selectedImageFile) {
        setFormMessage("Write something or upload a photo.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        let uploadedImageUrl = "";
        if (selectedImageFile) {
          uploadedImageUrl = await uploadPostImage(selectedImageFile);
        }

        const displayName =
          currentUserProfile?.displayName ||
          currentUser.user_metadata?.display_name ||
          "Member";

        const userPhotoURL = currentUserProfile?.photoURL || "";
        const username = currentUserProfile?.username || "";

        const { error } = await supabase
          .from("posts")
          .insert({
            user_id: currentUser.id,
            display_name: displayName,
            username,
            user_photo_url: userPhotoURL,
            caption,
            image_url: uploadedImageUrl,
            source: "feed",
            hidden: false,
            hidden_by_admin: false,
            soft_deleted: false,
            created_at: nowIso(),
            updated_at: nowIso()
          });

        if (error) throw error;

        captionInput.value = "";
        selectedImageFile = null;
        updateSelectedImageUI();
        setFormMessage("Update posted.", "success");
        hideComposer();
        await refreshFeedData();
      } catch (error) {
        console.error(error);
        setFormMessage(error?.message || "Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    async function refreshFeedData() {
      await Promise.all([
        loadCurrentUserProfile(),
        loadFollows(),
        loadOutgoingRequests(),
        loadPostsAndProfiles(),
        loadNotificationsCount()
      ]);

      await renderPosts();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        refreshFeedData().catch(err => console.error("Refresh error:", err));
      }, 350);
    }

    function clearSubscriptions() {
      feedSubscriptions.forEach(sub => {
        try {
          supabase.removeChannel(sub);
        } catch {}
      });
      feedSubscriptions = [];
    }

    function setupRealtime() {
      clearSubscriptions();

      const tables = [
        "posts",
        "public_profiles",
        "follows",
        "follow_requests",
        "notifications"
      ];

      tables.forEach(table => {
        const channel = supabase
          .channel(`feed-live-${table}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table },
            () => scheduleRefresh()
          )
          .subscribe();

        feedSubscriptions.push(channel);
      });
    }

    window.addEventListener("hashchange", () => {
      if (window.location.hash === "#composerPanel") {
        showComposer();
      }
    });

    async function initFeed() {
      const { data: userRes, error: userError } = await supabase.auth.getUser();

      if (userError || !userRes?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = userRes.user;

      await detectOptionalTables();
      await refreshFeedData();
      setupRealtime();

      if (window.location.hash === "#composerPanel") {
        showComposer();
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    initFeed().catch((error) => {
      console.error(error);
      postsList.innerHTML = "";
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = "Could not load feed.";
    });
  </script>
</body>
