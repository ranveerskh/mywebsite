<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld Feed</title>
</head>
<body>
  <h1>Welcome to BareWorld</h1>

  <p id="loading">Loading profile...</p>

  <div id="profileBox" style="display:none;">
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Display Name:</strong> <span id="displayName"></span></p>
    <p><strong>City:</strong> <span id="city"></span></p>
    <p><strong>Profile Type:</strong> <span id="profileType"></span></p>
    <p><strong>Verified:</strong> <span id="verified"></span></p>

    <br>
    <a href="profile.html">Edit Profile</a>
    <br><br>
    <button id="logoutBtn">Logout</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const profileBox = document.getElementById("profileBox");
    const emailEl = document.getElementById("email");
    const displayNameEl = document.getElementById("displayName");
    const cityEl = document.getElementById("city");
    const profileTypeEl = document.getElementById("profileType");
    const verifiedEl = document.getElementById("verified");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        emailEl.textContent = user.email || "";
        
        if (userSnap.exists()) {
          const data = userSnap.data();

          displayNameEl.textContent = data.displayName || "";
          cityEl.textContent = data.cityVisible ? (data.city || "") : "Hidden";
          profileTypeEl.textContent = data.isPrivate ? "Private" : "Public";
          verifiedEl.textContent = data.isVerified ? "Yes" : "No";
        } else {
          displayNameEl.textContent = "No profile found";
          cityEl.textContent = "-";
          profileTypeEl.textContent = "-";
          verifiedEl.textContent = "-";
        }

        loading.style.display = "none";
        profileBox.style.display = "block";
      } catch (err) {
        loading.textContent = "Error loading profile";
        console.error(err);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
