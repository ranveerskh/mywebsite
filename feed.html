<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Feed</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;--card:#121931;--card-soft:#161f3d;--line:rgba(255,255,255,0.08);
      --text:#ffffff;--muted:#9aa7c7;--blue:#4cc9ff;--green:#3ddc84;
      --yellow:#f5b942;--red:#ff5d73;--purple:#a78bfa;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%, #0d1326 100%);
      color:var(--text);min-height:100vh;padding:14px 14px 92px;
    }
    .app{max-width:720px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
      background:rgba(11,16,32,0.82);border:1px solid rgba(255,255,255,0.04);
      border-radius:18px;padding:12px 14px;margin-bottom:14px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;
    }
    .brand-wrap{display:flex;flex-direction:column;gap:2px}
    .brand{font-size:22px;font-weight:800;letter-spacing:.2px}
    .brand-sub{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chip-btn{
      border:none;background:var(--card-soft);color:#fff;border-radius:12px;padding:10px 12px;
      text-decoration:none;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
    }
    .chip-btn.logout{
      background:rgba(255,93,115,0.14);color:#ffd3d9;border-color:rgba(255,93,115,0.22);
    }
    .notify-btn{position:relative;min-width:44px;padding:10px 12px}
    .notify-icon{width:18px;height:18px;display:block}
    .notify-count{
      position:absolute;top:-4px;right:-2px;min-width:18px;height:18px;padding:0 5px;
      border-radius:999px;background:var(--red);color:#fff;font-size:11px;font-weight:800;
      display:flex;align-items:center;justify-content:center;
    }
    .panel{
      background:rgba(18,25,49,0.88);border:1px solid var(--line);border-radius:22px;padding:16px;
      margin-bottom:14px;box-shadow:0 20px 40px rgba(0,0,0,0.18);
    }

    .composer-head{
      display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;
    }
    .composer-head-left{
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    }
    .avatar,.post-avatar{
      width:52px;height:52px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.10);
      background:#1b2445;flex-shrink:0;
    }
    .avatar-placeholder,.post-avatar-placeholder{
      width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      text-align:center;padding:6px;background:#1b2445;border:1px solid rgba(255,255,255,0.10);
      color:var(--muted);font-size:10px;flex-shrink:0;
    }
    .composer-head h3{font-size:16px;margin-bottom:2px}
    .muted{color:var(--muted);font-size:13px;line-height:1.5}
    .field{margin-bottom:12px}
    textarea,input[type="text"]{
      width:100%;border:none;outline:none;resize:none;padding:14px 15px;border-radius:16px;
      background:#0f1630;color:#fff;border:1px solid rgba(255,255,255,0.07);font-size:15px;
    }
    textarea{min-height:96px}
    textarea::placeholder,input::placeholder{color:#7f8cad}
    .composer-actions{
      display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;
    }
    .post-btn{
      border:none;background:var(--green);color:#062513;padding:12px 18px;border-radius:14px;
      font-weight:800;cursor:pointer;min-width:130px;
    }
    .close-compose-btn{
      border:none;background:#0f1630;color:#c9d5ff;border:1px solid rgba(255,255,255,0.06);
      border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;
    }
    .message{min-height:20px;font-size:14px}
    .success{color:#9cf0bf}.error{color:#ffb3bd}

    .section-head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;
    }
    .section-title{font-size:20px;font-weight:800}
    .filter-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .filter-tab{
      border:none;background:#0f1630;color:#c9d5ff;border:1px solid rgba(255,255,255,0.06);
      border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;
    }
    .filter-tab.active{
      background:rgba(76,201,255,0.14);color:#d8f7ff;border-color:rgba(76,201,255,0.20);
    }

    .posts-list{display:grid;gap:14px}
    .post-card{
      background:rgba(18,25,49,0.95);border:1px solid var(--line);border-radius:24px;overflow:hidden;
    }
    .post-inner{padding:15px}
    .post-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;
    }
    .post-left{display:flex;gap:12px;align-items:center;min-width:0}
    .post-name{font-size:16px;font-weight:800;line-height:1.3}
    .post-name a{color:#fff;text-decoration:none}
    .post-name a:hover{text-decoration:underline}
    .post-date{color:var(--muted);font-size:12px;margin-top:3px}
    .post-top-actions{
      display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end;
      flex-shrink:0;
    }
    .delete-post-btn{
      border:none;background:rgba(255,93,115,0.14);color:#ffd3d9;border-radius:10px;padding:8px 10px;
      font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0;
    }
    .report-link{
      text-decoration:none;
      background:rgba(245,185,66,.14);
      color:#ffe7b0;
      border:1px solid rgba(245,185,66,.20);
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      display:inline-block;
    }
    .post-click{
      display:block;
      text-decoration:none;
      color:inherit;
    }
    .post-caption{
      color:#e8eeff;line-height:1.7;font-size:15px;white-space:pre-wrap;word-break:break-word;
      margin-bottom:12px;
    }
    .post-image{
      width:100%;max-height:520px;object-fit:cover;border-radius:18px;display:block;background:#0f1630;
      border:1px solid rgba(255,255,255,0.06);margin-bottom:12px;
    }
    .post-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .action-btn{
      border:none;cursor:pointer;font-weight:800;border-radius:12px;padding:10px 14px;font-size:14px;
    }
    .like-btn{background:rgba(76,201,255,0.14);color:#c9f3ff}
    .comment-toggle-btn{background:rgba(167,139,250,0.14);color:#e5ddff}

    .comments-wrap{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)}
    .comment-form{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .comment-input{flex:1;min-width:200px}
    .comment-submit{background:var(--green);color:#062513}
    .comments-list{display:grid;gap:10px}
    .comment-item{
      background:#0f1630;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:12px;
    }
    .comment-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;
    }
    .comment-author{font-weight:800;font-size:14px;color:#fff}
    .comment-date{color:var(--muted);font-size:12px;margin-top:2px}
    .comment-text{color:#e8eeff;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word}
    .comment-delete-btn{
      border:none;background:rgba(255,93,115,0.14);color:#ffd3d9;border-radius:10px;padding:7px 9px;
      font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0;
    }

    .empty-box{
      text-align:center;padding:28px 10px;color:var(--muted);background:#0f1630;border-radius:18px;
      border:1px dashed rgba(255,255,255,0.08);
    }
    .tiny-note{color:var(--muted);font-size:12px;line-height:1.5;margin-top:6px}
    .hidden{display:none!important}

    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(720px, calc(100% - 20px));
      background:rgba(12,18,35,0.92);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(18px);
      border-radius:20px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,0.25);
    }
    .nav-link{
      text-decoration:none;color:#b9c4e3;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 6px;border-radius:14px;font-size:11px;font-weight:700;min-height:58px;
      border:none;background:transparent;cursor:pointer;
    }
    .nav-link .icon{font-size:18px;line-height:1}
    .nav-link.active{background:rgba(76,201,255,0.14);color:#d8f7ff}

    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{padding:10px 12px}
      .brand{font-size:20px}
      .chip-btn{padding:9px 10px;font-size:12px}
      .composer-actions{align-items:stretch}
      .post-btn{width:100%}
      .comment-form{flex-direction:column}
      .close-compose-btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand-wrap">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Member feed</div>
      </div>

      <div class="top-actions">
        <button id="notifyBtn" class="chip-btn notify-btn" type="button" aria-label="Notifications">
          <svg class="notify-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
            <path d="M10 20a2 2 0 0 0 4 0"></path>
          </svg>
          <span id="notifyCount" class="notify-count hidden">0</span>
        </button>

        <a href="settings.html" class="chip-btn">Settings</a>
        <button id="logoutBtn" class="chip-btn logout">Logout</button>
      </div>
    </div>

    <div id="composerPanel" class="panel hidden">
      <div class="composer-head">
        <div class="composer-head-left">
          <img id="myAvatar" class="avatar hidden" alt="My Photo" />
          <div id="myAvatarPlaceholder" class="avatar-placeholder">No photo</div>

          <div>
            <h3 id="myName">Loading...</h3>
            <div class="muted">Post a new update or photo</div>
          </div>
        </div>

        <button id="closeComposerBtn" class="close-compose-btn" type="button">Close</button>
      </div>

      <form id="postForm">
        <div class="field">
          <textarea id="caption" placeholder="What’s happening?"></textarea>
        </div>

        <div class="field">
          <input type="text" id="imageURL" placeholder="Optional image link (https://example.com/photo.jpg)" />
          <div class="tiny-note">Direct image link only. Optional.</div>
        </div>

        <div class="composer-actions">
          <div id="formMessage" class="message"></div>
          <button type="submit" id="postBtn" class="post-btn">Post Update</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <div class="section-head">
        <div class="section-title">Feed</div>

        <div class="filter-tabs">
          <button id="allTab" class="filter-tab active" type="button">All</button>
          <button id="followingTab" class="filter-tab" type="button">Following</button>
        </div>
      </div>

      <div id="postsList" class="posts-list"></div>
      <div id="emptyBox" class="empty-box hidden">No updates yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link active">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>

    <button id="navCreateBtn" type="button" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </button>

    <a href="events.html" class="nav-link">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      addDoc,
      doc,
      getDoc,
      getDocs,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      deleteDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const logoutBtn = document.getElementById("logoutBtn");
    const postForm = document.getElementById("postForm");
    const postBtn = document.getElementById("postBtn");
    const captionInput = document.getElementById("caption");
    const imageURLInput = document.getElementById("imageURL");
    const formMessage = document.getElementById("formMessage");

    const myName = document.getElementById("myName");
    const myAvatar = document.getElementById("myAvatar");
    const myAvatarPlaceholder = document.getElementById("myAvatarPlaceholder");

    const postsList = document.getElementById("postsList");
    const emptyBox = document.getElementById("emptyBox");
    const allTab = document.getElementById("allTab");
    const followingTab = document.getElementById("followingTab");

    const notifyBtn = document.getElementById("notifyBtn");
    const notifyCount = document.getElementById("notifyCount");

    const composerPanel = document.getElementById("composerPanel");
    const navCreateBtn = document.getElementById("navCreateBtn");
    const closeComposerBtn = document.getElementById("closeComposerBtn");

    let currentUser = null;
    let currentUserProfile = null;
    let currentFeedFilter = "all";
    let follows = [];
    let allPostDocs = [];
    let publicProfilesMap = new Map();

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showComposer() {
      if (navCreateBtn.disabled) return;
      composerPanel.classList.remove("hidden");
      composerPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => captionInput.focus(), 250);
    }

    function hideComposer() {
      composerPanel.classList.add("hidden");
    }

    navCreateBtn.addEventListener("click", showComposer);
    closeComposerBtn.addEventListener("click", hideComposer);

    function showMyAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }
      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function isFollowing(userId) {
      return follows.some(f => f.followerId === currentUser.uid && f.followingId === userId);
    }

    function applyFeedTabUI() {
      allTab.classList.toggle("active", currentFeedFilter === "all");
      followingTab.classList.toggle("active", currentFeedFilter === "following");
    }

    function formatBadgeCount(count) {
      return count > 99 ? "99+" : String(count);
    }

    function renderNotifications(items) {
      if (!items.length) {
        notifyCount.classList.add("hidden");
        return;
      }

      notifyCount.textContent = formatBadgeCount(items.length);
      notifyCount.classList.remove("hidden");
    }

    function authorHidden(author) {
      return author?.isHiddenByAdmin || author?.moderationStatus === "banned" || author?.softDeleted;
    }

    function getFilteredPostDocs() {
      return allPostDocs.filter(postDoc => {
        const post = postDoc.data();
        const author = publicProfilesMap.get(post.userId);

        if (authorHidden(author)) return false;

        if (currentFeedFilter === "following") {
          return isFollowing(post.userId);
        }

        return true;
      });
    }

    async function refreshLikeUI(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      if (!likeBtn || !currentUser) return;

      try {
        const likesCol = collection(db, "posts", postId, "likes");
        const likesSnap = await getDocs(likesCol);
        const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
        const myLike = await getDoc(likeRef);

        const liked = myLike.exists();
        const count = likesSnap.size;

        likeBtn.textContent = liked ? `Unlike (${count})` : `Like (${count})`;
        likeBtn.dataset.liked = liked ? "yes" : "no";
      } catch (error) {
        console.error("Like UI error:", error);
      }
    }

    async function refreshCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const commentsQuery = query(
          collection(db, "posts", postId, "comments"),
          orderBy("createdAt", "asc")
        );
        const commentsSnap = await getDocs(commentsQuery);

        commentsToggle.textContent = `Comments (${commentsSnap.size})`;

        if (commentsSnap.empty) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        commentsSnap.forEach((commentDoc) => {
          const comment = commentDoc.data();
          const commentId = commentDoc.id;
          const canDelete = comment.userId === currentUser.uid;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";
          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${commentId}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              await deleteDoc(doc(db, "posts", pId, "comments", cId));
              await refreshCommentsUI(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      await refreshLikeUI(postId);
      await refreshCommentsUI(postId);
    }

    function attachPostActions(postId, postData) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser) return;

          const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
          const existing = await getDoc(likeRef);

          likeBtn.disabled = true;

          try {
            if (existing.exists()) {
              await deleteDoc(likeRef);
            } else {
              await setDoc(likeRef, {
                userId: currentUser.uid,
                createdAt: serverTimestamp()
              });

              if (postData.userId !== currentUser.uid) {
                const actorName =
                  currentUserProfile?.displayName ||
                  currentUser.displayName ||
                  "Someone";

                await addDoc(collection(db, "notifications", postData.userId, "items"), {
                  type: "like",
                  title: "New like",
                  text: `${actorName} liked your post.`,
                  fromUserId: currentUser.uid,
                  toUserId: postData.userId,
                  postId,
                  createdAt: serverTimestamp()
                });
              }
            }
            await refreshLikeUI(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");
          if (!commentWrap.classList.contains("hidden")) {
            await refreshCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text) return;

          const displayName =
            currentUserProfile?.displayName ||
            currentUser.displayName ||
            "Member";

          const userPhotoURL = currentUserProfile?.photoURL || "";
          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            await addDoc(collection(db, "posts", postId, "comments"), {
              userId: currentUser.uid,
              displayName,
              userPhotoURL,
              text,
              createdAt: serverTimestamp()
            });

            if (postData.userId !== currentUser.uid) {
              await addDoc(collection(db, "notifications", postData.userId, "items"), {
                type: "comment",
                title: "New comment",
                text: `${displayName} commented on your post.`,
                fromUserId: currentUser.uid,
                toUserId: postData.userId,
                postId,
                createdAt: serverTimestamp()
              });
            }

            commentInput.value = "";
            await refreshCommentsUI(postId);
          } catch (error) {
            console.error(error);
            alert("Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }

    async function renderPosts() {
      const docs = getFilteredPostDocs();
      postsList.innerHTML = "";

      if (!docs.length) {
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = currentFeedFilter === "following"
          ? "No updates from people you follow yet."
          : "No updates yet.";
        return;
      }

      emptyBox.classList.add("hidden");

      for (const postDoc of docs) {
        const post = postDoc.data();
        const postId = postDoc.id;

        const avatarHtml = post.userPhotoURL
          ? `<a href="member.html?uid=${encodeURIComponent(post.userId)}">
               <img class="post-avatar" src="${escapeHtml(post.userPhotoURL)}" alt="User Photo">
             </a>`
          : `<a href="member.html?uid=${encodeURIComponent(post.userId)}" style="text-decoration:none;">
               <div class="post-avatar-placeholder">No photo</div>
             </a>`;

        const deleteButton = currentUser && post.userId === currentUser.uid
          ? `<button data-id="${postId}" class="delete-post-btn">Delete</button>`
          : "";

        const reportButton = currentUser && post.userId !== currentUser.uid
          ? `<a class="report-link" href="report.html?type=post&targetId=${encodeURIComponent(postId)}&targetUserId=${encodeURIComponent(post.userId)}">Report</a>`
          : "";

        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
          <div class="post-inner">
            <div class="post-top">
              <div class="post-left">
                ${avatarHtml}
                <div class="post-top-text">
                  <div class="post-name">
                    <a href="member.html?uid=${encodeURIComponent(post.userId)}">
                      ${escapeHtml(post.displayName || "Member")}
                    </a>
                  </div>
                  <div class="post-date">${formatDate(post.createdAt)}</div>
                </div>
              </div>
              <div class="post-top-actions">
                ${deleteButton}
                ${reportButton}
              </div>
            </div>

            <a class="post-click" href="post.html?postId=${encodeURIComponent(postId)}">
              <div class="post-caption">${escapeHtml(post.caption || "")}</div>
              ${post.imageURL ? `<img class="post-image" src="${escapeHtml(post.imageURL)}" alt="Post Image">` : ""}
            </a>

            <div class="post-actions">
              <button class="action-btn like-btn" data-post-id="${postId}" data-liked="no">Like (0)</button>
              <button class="action-btn comment-toggle-btn" data-post-id="${postId}">Comments (0)</button>
            </div>

            <div class="comments-wrap hidden" data-post-id="${postId}">
              <form class="comment-form" data-post-id="${postId}">
                <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
                <button type="submit" class="action-btn comment-submit">Add</button>
              </form>
              <div class="comments-list" data-post-id="${postId}"></div>
            </div>
          </div>
        `;

        const img = card.querySelector(".post-image");
        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const avatar = card.querySelector(".post-avatar");
        if (avatar) {
          avatar.addEventListener("error", () => {
            avatar.style.display = "none";
          });
        }

        postsList.appendChild(card);
        attachPostActions(postId, post);
        await refreshPostMeta(postId);
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "posts", postId));
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });
    }

    notifyBtn.addEventListener("click", () => {
      window.location.href = "notifications.html";
    });

    allTab.addEventListener("click", async () => {
      currentFeedFilter = "all";
      applyFeedTabUI();
      await renderPosts();
    });

    followingTab.addEventListener("click", async () => {
      currentFeedFilter = "following";
      applyFeedTabUI();
      await renderPosts();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
          currentUserProfile = userSnap.data();
          myName.textContent = currentUserProfile.displayName || user.displayName || "Member";
          showMyAvatar(currentUserProfile.photoURL || "");
        } else {
          myName.textContent = user.displayName || "Member";
          showMyAvatar("");
        }

        if (window.location.hash === "#composerPanel") {
          showComposer();
        }

        const status = currentUserProfile?.moderationStatus || "";
        const suspensionUntil = currentUserProfile?.suspensionUntil?.toDate
          ? currentUserProfile.suspensionUntil.toDate().getTime()
          : currentUserProfile?.suspensionUntil
          ? new Date(currentUserProfile.suspensionUntil).getTime()
          : 0;

        if (status === "banned") {
          hideComposer();
          navCreateBtn.disabled = true;
          setFormMessage("Your account is banned. Posting is disabled.", "error");
        } else if (status === "suspended" && suspensionUntil && Date.now() < suspensionUntil) {
          hideComposer();
          navCreateBtn.disabled = true;
          setFormMessage("Your account is suspended. Posting is disabled for now.", "error");
        }

        onSnapshot(collection(db, "publicProfiles"), async (snapshot) => {
          publicProfilesMap = new Map();
          snapshot.forEach(docSnap => {
            const data = docSnap.data();
            publicProfilesMap.set(data.uid, data);
          });
          await renderPosts();
        });

        onSnapshot(collection(db, "follows"), async (snapshot) => {
          follows = snapshot.docs.map(d => d.data());
          await renderPosts();
        });

        const postsQuery = query(
          collection(db, "posts"),
          orderBy("createdAt", "desc")
        );

        onSnapshot(postsQuery, async (snapshot) => {
          allPostDocs = snapshot.docs;
          await renderPosts();
        }, (error) => {
          console.error(error);
          postsList.innerHTML = "";
          emptyBox.classList.remove("hidden");
          emptyBox.textContent = "Could not load feed.";
        });

        onSnapshot(collection(db, "notifications", user.uid, "items"), (snapshot) => {
          const items = snapshot.docs.map(d => d.data());
          renderNotifications(items);
        }, (error) => {
          console.error("Notification load error:", error);
          renderNotifications([]);
        });

      } catch (error) {
        console.error(error);
        myName.textContent = "Member";
      }
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();
      const imageURL = imageURLInput.value.trim();

      if (!caption && !imageURL) {
        setFormMessage("Write something or add an image link.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        const displayName =
          currentUserProfile?.displayName ||
          currentUser.displayName ||
          "Member";

        const userPhotoURL = currentUserProfile?.photoURL || "";

        await addDoc(collection(db, "posts"), {
          userId: currentUser.uid,
          displayName,
          userPhotoURL,
          caption,
          imageURL,
          createdAt: serverTimestamp()
        });

        captionInput.value = "";
        imageURLInput.value = "";
        setFormMessage("Update posted.", "success");
        hideComposer();
      } catch (error) {
        console.error(error);
        setFormMessage("Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
