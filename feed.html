<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Feed</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 112px;
    }

    .app{max-width:720px;margin:0 auto}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-center{text-align:center;min-width:0}
    .brand{
      font-size:20px;
      font-weight:800;
      letter-spacing:.1px;
      line-height:1.05;
    }
    .brand-sub{
      font-size:11px;
      color:var(--muted);
      margin-top:2px;
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .notify-count{
      position:absolute;
      top:-4px;
      right:-2px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:11px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .composer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .composer-head-left{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .avatar,.post-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }
    .avatar-placeholder,.post-avatar-placeholder{
      width:48px;
      height:48px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:var(--surface-3);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
    }
    .composer-head h3{font-size:16px;margin-bottom:2px}
    .composer-username{
      color:var(--blue);
      font-size:13px;
      font-weight:700;
      margin-top:2px;
    }
    .muted{color:var(--muted);font-size:13px;line-height:1.45}
    .field{margin-bottom:10px}
    textarea,input[type="text"]{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:15px;
    }
    textarea{min-height:96px}
    textarea::placeholder,input::placeholder{color:var(--muted)}
    .composer-actions{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .post-btn{
      border:none;
      background:var(--green);
      color:#052112;
      padding:12px 18px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      min-width:130px;
    }
    .close-compose-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }
    .message{min-height:20px;font-size:14px}
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .section-title{
      font-size:18px;
      font-weight:800;
    }
    .filter-tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .filter-tab{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }
    .filter-tab.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border-color:rgba(76,201,255,.20);
    }

    .feed-shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .feed-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:14px 14px 10px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }
    .posts-list{display:block}
    .feed-item{
      padding:14px;
      border-bottom:1px solid var(--line-soft);
    }
    .feed-item:last-child{border-bottom:none}

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }
    .post-left{
      display:flex;
      gap:10px;
      align-items:center;
      min-width:0;
    }
    .post-top-text{min-width:0}
    .post-name{
      font-size:16px;
      font-weight:800;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .post-name a{
      color:var(--text);
      text-decoration:none;
    }
    .post-name a:hover{text-decoration:underline}
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }
    .post-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .post-date{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .post-top-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      flex-shrink:0;
    }

    .follow-top-btn,.delete-post-btn{
      border:none;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
    }
    .follow-top-btn.follow{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .follow-top-btn.unfollow{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .follow-top-btn.request{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }
    .follow-top-btn.requested{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .delete-post-btn{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }

    .post-click{
      display:block;
      text-decoration:none;
      color:inherit;
    }
    .post-caption{
      color:var(--text);
      line-height:1.62;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }
    .post-image{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:var(--surface-2);
      margin-top:4px;
    }

    .post-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .icon-action-btn,.icon-report-link{
      border:none;
      cursor:pointer;
      font-weight:800;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .icon-action-btn svg,.icon-report-link svg{
      width:18px;
      height:18px;
      display:block;
      flex-shrink:0
    }
    .like-btn{
      background:rgba(76,201,255,.12);
    }
    .comment-toggle-btn{
      background:rgba(167,139,250,.12);
    }
    .icon-report-link{
      background:rgba(245,185,66,.14);
      color:var(--text);
      border:1px solid rgba(245,185,66,.20)
    }

    .comments-wrap{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--line-soft);
    }
    .comment-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px
    }
    .comment-input{
      flex:1;
      min-width:200px
    }
    .comment-submit{
      background:var(--green);
      color:#052112;
    }
    .comments-list{
      display:grid;
      gap:10px
    }
    .comment-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .comment-author{
      font-weight:800;
      font-size:14px;
      color:var(--text)
    }
    .comment-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
    }
    .comment-date{
      color:var(--muted);
      font-size:12px;
      margin-top:2px
    }
    .comment-text{
      color:var(--text);
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word
    }
    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .empty-box{
      text-align:center;
      padding:26px 12px;
      color:var(--muted);
      background:var(--surface-2);
      margin:14px;
      border-radius:18px;
      border:1px dashed var(--line);
    }
    .tiny-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      margin-top:6px
    }
    .hidden{display:none!important}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(720px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{font-size:18px;line-height:1}
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    @media (max-width:700px){
      body{padding:10px 10px 112px}
      .brand{font-size:18px}
      .composer-actions{align-items:stretch}
      .post-btn{width:100%}
      .comment-form{flex-direction:column}
      .close-compose-btn{width:100%}
      .feed-head{padding:12px 12px 10px}
      .feed-item{padding:12px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="school.html" class="top-icon-btn" aria-label="School">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-5 9 5-9 5-9-5z"></path>
          <path d="M7 12v5c0 .6 2.2 3 5 3s5-2.4 5-3v-5"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Member feed</div>
      </div>

      <button id="notifyBtn" class="top-icon-btn" type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
          <path d="M10 20a2 2 0 0 0 4 0"></path>
        </svg>
        <span id="notifyCount" class="notify-count hidden">0</span>
      </button>
    </div>

    <div id="composerPanel" class="panel hidden">
      <div class="composer-head">
        <div class="composer-head-left">
          <img id="myAvatar" class="avatar hidden" alt="My Photo" />
          <div id="myAvatarPlaceholder" class="avatar-placeholder">No photo</div>

          <div>
            <h3 id="myName">Loading...</h3>
            <div id="myUsername" class="composer-username hidden">@username</div>
            <div class="muted">Post a new update or photo</div>
          </div>
        </div>

        <button id="closeComposerBtn" class="close-compose-btn" type="button">Close</button>
      </div>

      <form id="postForm">
        <div class="field">
          <textarea id="caption" placeholder="What’s happening?"></textarea>
        </div>

        <div class="field">
          <input type="text" id="imageURL" placeholder="Optional image link (https://example.com/photo.jpg)" />
          <div class="tiny-note">Direct image link only. Optional.</div>
        </div>

        <div class="composer-actions">
          <div id="formMessage" class="message"></div>
          <button type="submit" id="postBtn" class="post-btn">Post Update</button>
        </div>
      </form>
    </div>

    <div class="feed-shell">
      <div class="feed-head">
        <div class="section-title">Feed</div>

        <div class="filter-tabs">
          <button id="allTab" class="filter-tab active" type="button">All</button>
          <button id="followingTab" class="filter-tab" type="button">Following</button>
        </div>
      </div>

      <div id="postsList" class="posts-list"></div>
      <div id="emptyBox" class="empty-box hidden">No updates yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link active">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>

    <button id="navCreateBtn" type="button" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </button>

    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      addDoc,
      doc,
      getDoc,
      getDocs,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      deleteDoc,
      setDoc,
      where,
      writeBatch,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const postForm = document.getElementById("postForm");
    const postBtn = document.getElementById("postBtn");
    const captionInput = document.getElementById("caption");
    const imageURLInput = document.getElementById("imageURL");
    const formMessage = document.getElementById("formMessage");

    const myName = document.getElementById("myName");
    const myUsername = document.getElementById("myUsername");
    const myAvatar = document.getElementById("myAvatar");
    const myAvatarPlaceholder = document.getElementById("myAvatarPlaceholder");

    const postsList = document.getElementById("postsList");
    const emptyBox = document.getElementById("emptyBox");
    const allTab = document.getElementById("allTab");
    const followingTab = document.getElementById("followingTab");

    const notifyBtn = document.getElementById("notifyBtn");
    const notifyCount = document.getElementById("notifyCount");

    const composerPanel = document.getElementById("composerPanel");
    const navCreateBtn = document.getElementById("navCreateBtn");
    const closeComposerBtn = document.getElementById("closeComposerBtn");

    let currentUser = null;
    let currentUserProfile = null;
    let currentFeedFilter = "all";
    let follows = [];
    let outgoingRequests = [];
    let allPostDocs = [];
    let publicProfilesMap = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme() {
      const theme = resolveTheme(getStoredTheme());
      document.documentElement.setAttribute("data-theme", theme);
    }

    applyTheme();

    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (getStoredTheme() === "system") applyTheme();
    });

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme();
    });

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function showComposer() {
      if (navCreateBtn.disabled) return;
      composerPanel.classList.remove("hidden");
      composerPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => captionInput.focus(), 220);
    }

    function hideComposer() {
      composerPanel.classList.add("hidden");
    }

    navCreateBtn.addEventListener("click", showComposer);
    closeComposerBtn.addEventListener("click", hideComposer);

    function showMyAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        myAvatar.classList.add("hidden");
        myAvatar.removeAttribute("src");
        myAvatarPlaceholder.classList.remove("hidden");
        return;
      }
      myAvatar.src = cleanUrl;
      myAvatar.classList.remove("hidden");
      myAvatarPlaceholder.classList.add("hidden");
    }

    myAvatar.addEventListener("error", () => {
      myAvatar.classList.add("hidden");
      myAvatarPlaceholder.classList.remove("hidden");
    });

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        isPrivate: !!(d.isPrivate || d.privateProfile || d.private || d.accountPrivate),
        verified: !!(d.verified || d.isVerified),
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted,
        bio: d.bio || "",
        suspensionUntil: d.suspensionUntil || d.suspendUntil || null
      };
    }

    function getAuthorProfile(uid) {
      if (uid === currentUser?.uid && currentUserProfile) return currentUserProfile;
      return publicProfilesMap.get(uid) || null;
    }

    function getPostOwnerId(post) {
      return post?.userId || post?.authorId || post?.ownerId || post?.uid || "";
    }

    function getPostImage(post) {
      return post?.imageURL || post?.imageUrl || post?.photoURL || post?.mediaUrl || "";
    }

    function getPostCaption(post) {
      return post?.caption || post?.text || post?.content || "";
    }

    function isFollowing(userId) {
      return follows.some(f => f.followerId === currentUser.uid && f.followingId === userId);
    }

    function isOutgoingRequested(userId) {
      return outgoingRequests.some(r => r.requesterId === currentUser.uid && r.targetId === userId);
    }

    async function findFollowDocId(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return null;

      try {
        const directId = `${viewerUid}__${targetUid}`;
        const direct = await getDoc(doc(db, "follows", directId));
        if (direct.exists()) return directId;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follows"),
            where("followerId", "==", viewerUid),
            where("followingId", "==", targetUid),
            limit(1)
          )
        );
        if (!snap.empty) return snap.docs[0].id;
      } catch {}

      return null;
    }

    async function findRequestDocId(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return null;

      try {
        const directId = `${viewerUid}__${targetUid}`;
        const direct = await getDoc(doc(db, "follow_requests", directId));
        if (direct.exists()) return directId;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follow_requests"),
            where("requesterId", "==", viewerUid),
            where("targetId", "==", targetUid),
            limit(1)
          )
        );
        if (!snap.empty) return snap.docs[0].id;
      } catch {}

      return null;
    }

    function applyFeedTabUI() {
      allTab.classList.toggle("active", currentFeedFilter === "all");
      followingTab.classList.toggle("active", currentFeedFilter === "following");
    }

    function formatBadgeCount(count) {
      return count > 99 ? "99+" : String(count);
    }

    function renderNotifications(items) {
      const unread = items.filter(item => item.isRead !== true && item.read !== true);
      const count = unread.length;

      if (!count) {
        notifyCount.classList.add("hidden");
        return;
      }

      notifyCount.textContent = formatBadgeCount(count);
      notifyCount.classList.remove("hidden");
    }

    function authorHidden(author) {
      return author?.isHiddenByAdmin || author?.moderationStatus === "banned" || author?.softDeleted;
    }

    function canViewerSeePost(post) {
      const ownerId = getPostOwnerId(post);
      if (!ownerId || !currentUser) return false;
      if (ownerId === currentUser.uid) return true;

      const author = getAuthorProfile(ownerId);
      if (!author) return false;
      if (authorHidden(author)) return false;

      if (author.isPrivate && !isFollowing(ownerId)) {
        return false;
      }

      return true;
    }

    function getFilteredPostDocs() {
      return allPostDocs.filter(postDoc => {
        const post = postDoc.data();
        const ownerId = getPostOwnerId(post);
        const author = getAuthorProfile(ownerId);

        if (!ownerId) return false;
        if (post.hidden || post.hiddenByAdmin || post.softDeleted) return false;
        if (authorHidden(author)) return false;

        if (currentFeedFilter === "following") {
          return ownerId === currentUser.uid || isFollowing(ownerId);
        }

        return canViewerSeePost(post);
      });
    }

    function getRelationState(authorId) {
      if (!currentUser || !authorId) return "none";
      if (authorId === currentUser.uid) return "self";
      if (isFollowing(authorId)) return "following";

      const author = getAuthorProfile(authorId);
      if (author?.isPrivate) {
        return isOutgoingRequested(authorId) ? "requested" : "request";
      }

      return "follow";
    }

    async function refreshLikeUI(postId) {
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      if (!likeBtn || !currentUser) return;

      try {
        const likesCol = collection(db, "posts", postId, "likes");
        const likesSnap = await getDocs(likesCol);
        const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
        const myLike = await getDoc(likeRef);

        const liked = myLike.exists();
        const count = likesSnap.size;

        likeBtn.dataset.liked = liked ? "yes" : "no";
        const countEl = likeBtn.querySelector(".like-count");
        if (countEl) countEl.textContent = String(count);
      } catch (error) {
        console.error("Like UI error:", error);
      }
    }

    async function refreshCommentsUI(postId) {
      const commentsList = document.querySelector(`.comments-list[data-post-id="${postId}"]`);
      const commentsToggle = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      if (!commentsList || !commentsToggle || !currentUser) return;

      commentsList.innerHTML = "";

      try {
        const commentsQuery = query(
          collection(db, "posts", postId, "comments"),
          orderBy("createdAt", "asc")
        );
        const commentsSnap = await getDocs(commentsQuery);

        const countEl = commentsToggle.querySelector(".comment-count");
        if (countEl) countEl.textContent = String(commentsSnap.size);

        if (commentsSnap.empty) {
          commentsList.innerHTML = `<div class="muted">No comments yet.</div>`;
          return;
        }

        commentsSnap.forEach((commentDoc) => {
          const comment = commentDoc.data();
          const commentId = commentDoc.id;
          const canDelete = comment.userId === currentUser.uid;

          const commentEl = document.createElement("div");
          commentEl.className = "comment-item";
          commentEl.innerHTML = `
            <div class="comment-top">
              <div>
                <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
                ${comment.username ? `<div class="comment-username">@${escapeHtml(comment.username)}</div>` : ""}
                <div class="comment-date">${formatDate(comment.createdAt)}</div>
              </div>
              ${canDelete ? `<button class="comment-delete-btn" data-post-id="${postId}" data-comment-id="${commentId}">Delete</button>` : ""}
            </div>
            <div class="comment-text">${escapeHtml(comment.text || "")}</div>
          `;

          commentsList.appendChild(commentEl);
        });

        commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const pId = btn.getAttribute("data-post-id");
            const cId = btn.getAttribute("data-comment-id");
            const ok = confirm("Delete this comment?");
            if (!ok) return;

            try {
              await deleteDoc(doc(db, "posts", pId, "comments", cId));
              await refreshCommentsUI(pId);
            } catch (error) {
              console.error(error);
              alert("Could not delete comment.");
            }
          });
        });
      } catch (error) {
        console.error("Comments UI error:", error);
        commentsList.innerHTML = `<div class="error">Could not load comments.</div>`;
      }
    }

    async function refreshPostMeta(postId) {
      await Promise.all([
        refreshLikeUI(postId),
        refreshCommentsUI(postId)
      ]);
    }

    async function handleTopRelationAction(authorId, relationBtn) {
      if (!currentUser || !authorId || authorId === currentUser.uid) return;

      const author = getAuthorProfile(authorId);
      const relation = getRelationState(authorId);
      relationBtn.disabled = true;

      try {
        if (relation === "following") {
          const followDocId = await findFollowDocId(currentUser.uid, authorId);
          if (followDocId) {
            await deleteDoc(doc(db, "follows", followDocId));
          }
        } else if (relation === "requested") {
          const requestDocId = await findRequestDocId(currentUser.uid, authorId);
          if (requestDocId) {
            await deleteDoc(doc(db, "follow_requests", requestDocId));
          }
        } else if (author?.isPrivate) {
          await setDoc(doc(db, "follow_requests", `${currentUser.uid}__${authorId}`), {
            requesterId: currentUser.uid,
            targetId: authorId,
            createdAt: serverTimestamp()
          });

          try {
            await addDoc(collection(db, "notifications", authorId, "items"), {
              type: "follow_request",
              title: "Follow request",
              text: `${currentUserProfile?.displayName || currentUser.displayName || "Someone"} sent you a follow request.`,
              fromUserId: currentUser.uid,
              toUserId: authorId,
              createdAt: serverTimestamp(),
              isRead: false
            });
          } catch (notifyErr) {
            console.error("Follow request notification failed:", notifyErr);
          }
        } else {
          await setDoc(doc(db, "follows", `${currentUser.uid}__${authorId}`), {
            followerId: currentUser.uid,
            followingId: authorId,
            createdAt: serverTimestamp()
          });

          try {
            await addDoc(collection(db, "notifications", authorId, "items"), {
              type: "follow",
              title: "New follower",
              text: `${currentUserProfile?.displayName || currentUser.displayName || "Someone"} started following you.`,
              fromUserId: currentUser.uid,
              toUserId: authorId,
              createdAt: serverTimestamp(),
              isRead: false
            });
          } catch (notifyErr) {
            console.error("Follow notification failed:", notifyErr);
          }
        }
      } catch (error) {
        console.error("Relation action failed:", error);
        alert("Could not update follow state.");
      }

      relationBtn.disabled = false;
    }

    function attachPostActions(postId, postData) {
      const ownerId = getPostOwnerId(postData);
      const likeBtn = document.querySelector(`.like-btn[data-post-id="${postId}"]`);
      const commentToggleBtn = document.querySelector(`.comment-toggle-btn[data-post-id="${postId}"]`);
      const commentWrap = document.querySelector(`.comments-wrap[data-post-id="${postId}"]`);
      const commentForm = document.querySelector(`.comment-form[data-post-id="${postId}"]`);
      const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
      const relationBtn = document.querySelector(`.follow-top-btn[data-author-id="${ownerId}"][data-post-id="${postId}"]`);

      if (relationBtn) {
        relationBtn.addEventListener("click", async () => {
          await handleTopRelationAction(ownerId, relationBtn);
        });
      }

      if (likeBtn) {
        likeBtn.addEventListener("click", async () => {
          if (!currentUser) return;

          const likeRef = doc(db, "posts", postId, "likes", currentUser.uid);
          const existing = await getDoc(likeRef);
          likeBtn.disabled = true;

          try {
            if (existing.exists()) {
              await deleteDoc(likeRef);
            } else {
              await setDoc(likeRef, {
                userId: currentUser.uid,
                createdAt: serverTimestamp()
              });

              if (ownerId && ownerId !== currentUser.uid) {
                const actorName =
                  currentUserProfile?.displayName ||
                  currentUser.displayName ||
                  "Someone";

                try {
                  await addDoc(collection(db, "notifications", ownerId, "items"), {
                    type: "like",
                    title: "New like",
                    text: `${actorName} liked your post.`,
                    fromUserId: currentUser.uid,
                    toUserId: ownerId,
                    postId,
                    createdAt: serverTimestamp(),
                    isRead: false
                  });
                } catch (notifyErr) {
                  console.error("Like notification failed:", notifyErr);
                }
              }
            }
            await refreshLikeUI(postId);
          } catch (error) {
            console.error(error);
            alert("Could not update like.");
          }

          likeBtn.disabled = false;
        });
      }

      if (commentToggleBtn && commentWrap) {
        commentToggleBtn.addEventListener("click", async () => {
          commentWrap.classList.toggle("hidden");
          if (!commentWrap.classList.contains("hidden")) {
            await refreshCommentsUI(postId);
          }
        });
      }

      if (commentForm && commentInput) {
        commentForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const text = commentInput.value.trim();
          if (!text) return;

          const displayName =
            currentUserProfile?.displayName ||
            currentUser.displayName ||
            "Member";

          const username = currentUserProfile?.username || "";
          const userPhotoURL = currentUserProfile?.photoURL || "";
          const submitBtn = commentForm.querySelector("button");
          submitBtn.disabled = true;

          try {
            await addDoc(collection(db, "posts", postId, "comments"), {
              userId: currentUser.uid,
              displayName,
              username,
              userPhotoURL,
              text,
              createdAt: serverTimestamp()
            });

            commentInput.value = "";

            if (ownerId && ownerId !== currentUser.uid) {
              try {
                await addDoc(collection(db, "notifications", ownerId, "items"), {
                  type: "comment",
                  title: "New comment",
                  text: `${displayName} commented on your post.`,
                  fromUserId: currentUser.uid,
                  toUserId: ownerId,
                  postId,
                  createdAt: serverTimestamp(),
                  isRead: false
                });
              } catch (notifyErr) {
                console.error("Comment notification failed:", notifyErr);
              }
            }

            await refreshCommentsUI(postId);
          } catch (error) {
            console.error(error);
            alert(error?.message || "Could not add comment.");
          }

          submitBtn.disabled = false;
        });
      }
    }

    function buildRelationButton(authorId, postId) {
      const relation = getRelationState(authorId);
      if (relation === "self") return "";

      if (relation === "following") {
        return `<button class="follow-top-btn unfollow" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}">Unfollow</button>`;
      }

      if (relation === "requested") {
        return `<button class="follow-top-btn requested" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}">Requested</button>`;
      }

      const author = getAuthorProfile(authorId);
      if (author?.isPrivate) {
        return `<button class="follow-top-btn request" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}">Request</button>`;
      }

      return `<button class="follow-top-btn follow" data-author-id="${escapeHtml(authorId)}" data-post-id="${escapeHtml(postId)}">Follow</button>`;
    }

    async function renderPosts() {
      const docs = getFilteredPostDocs();
      postsList.innerHTML = "";

      if (!docs.length) {
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = currentFeedFilter === "following"
          ? "No updates from people you follow yet."
          : "No updates yet.";
        return;
      }

      emptyBox.classList.add("hidden");
      const postIds = [];

      for (const postDoc of docs) {
        const post = postDoc.data();
        const postId = postDoc.id;
        const ownerId = getPostOwnerId(post);
        const author = getAuthorProfile(ownerId);

        if (!ownerId) continue;
        if (!canViewerSeePost(post) && currentFeedFilter === "all") continue;

        postIds.push(postId);

        const displayName = author?.displayName || post.displayName || "Member";
        const username = author?.username || post.username || "";
        const avatarUrl = author?.photoURL || post.userPhotoURL || "";
        const caption = getPostCaption(post);
        const imageUrl = getPostImage(post);

        const avatarHtml = avatarUrl
          ? `<a href="member.html?uid=${encodeURIComponent(ownerId)}">
               <img class="post-avatar" src="${escapeHtml(avatarUrl)}" alt="User Photo">
             </a>`
          : `<a href="member.html?uid=${encodeURIComponent(ownerId)}" style="text-decoration:none;">
               <div class="post-avatar-placeholder">No photo</div>
             </a>`;

        const verifiedHtml = author?.verified
          ? `<span class="verified-dot">✓</span>`
          : "";

        const deleteButton = currentUser && ownerId === currentUser.uid
          ? `<button data-id="${postId}" class="delete-post-btn">Delete</button>`
          : "";

        const relationButton = buildRelationButton(ownerId, postId);

        const reportButton = currentUser && ownerId !== currentUser.uid
          ? `
            <a class="icon-report-link" href="report.html?type=post&targetId=${encodeURIComponent(postId)}&targetUserId=${encodeURIComponent(ownerId)}" aria-label="Report">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 3v18"></path>
                <path d="M5 4h10l-2.5 4L15 12H5"></path>
              </svg>
              <span>Report</span>
            </a>
          `
          : "";

        const item = document.createElement("div");
        item.className = "feed-item";
        item.innerHTML = `
          <div class="post-top">
            <div class="post-left">
              ${avatarHtml}
              <div class="post-top-text">
                <div class="post-name">
                  <a href="member.html?uid=${encodeURIComponent(ownerId)}">${escapeHtml(displayName)}</a>
                  ${verifiedHtml}
                </div>
                ${username ? `<div class="post-username">@${escapeHtml(username)}</div>` : ""}
                <div class="post-date">${formatDate(post.createdAt)}</div>
              </div>
            </div>

            <div class="post-top-actions">
              ${relationButton}
              ${deleteButton}
            </div>
          </div>

          <a class="post-click" href="post.html?postId=${encodeURIComponent(postId)}">
            ${caption ? `<div class="post-caption">${escapeHtml(caption)}</div>` : ""}
            ${imageUrl ? `<img class="post-image" src="${escapeHtml(imageUrl)}" alt="Post Image">` : ""}
          </a>

          <div class="post-actions">
            <button class="icon-action-btn like-btn" data-post-id="${postId}" data-liked="no" aria-label="Like">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 21s-6.7-4.4-9.2-8C.8 10.5 2 6.8 5.7 6c2.1-.4 3.7.5 4.8 1.8C11.6 6.5 13.2 5.6 15.3 6 19 6.8 20.2 10.5 21.2 13c-2.5 3.6-9.2 8-9.2 8z"></path>
              </svg>
              <span class="like-count">0</span>
            </button>

            <button class="icon-action-btn comment-toggle-btn" data-post-id="${postId}" aria-label="Comments">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              <span class="comment-count">0</span>
            </button>

            ${reportButton}
          </div>

          <div class="comments-wrap hidden" data-post-id="${postId}">
            <form class="comment-form" data-post-id="${postId}">
              <input class="comment-input" data-post-id="${postId}" type="text" placeholder="Write a comment..." />
              <button type="submit" class="icon-action-btn comment-submit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M22 2L11 13"></path>
                  <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
                </svg>
                <span>Add</span>
              </button>
            </form>
            <div class="comments-list" data-post-id="${postId}"></div>
          </div>
        `;

        const img = item.querySelector(".post-image");
        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const avatarImg = item.querySelector(".post-avatar");
        if (avatarImg) {
          avatarImg.addEventListener("error", () => {
            avatarImg.style.display = "none";
          });
        }

        postsList.appendChild(item);
        attachPostActions(postId, post);
      }

      document.querySelectorAll(".delete-post-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const postId = btn.getAttribute("data-id");
          const ok = confirm("Delete this post?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "posts", postId));
          } catch (error) {
            console.error(error);
            alert("Could not delete post.");
          }
        });
      });

      Promise.all(postIds.map(id => refreshPostMeta(id))).catch(err => {
        console.error("Post meta refresh error:", err);
      });
    }

    notifyBtn.addEventListener("click", async () => {
      if (!currentUser) {
        window.location.href = "notifications.html";
        return;
      }

      try {
        const snap = await getDocs(collection(db, "notifications", currentUser.uid, "items"));
        const unreadDocs = snap.docs.filter(d => {
          const data = d.data();
          return data.isRead !== true && data.read !== true;
        });

        if (unreadDocs.length) {
          const batch = writeBatch(db);
          unreadDocs.forEach(d => {
            batch.update(d.ref, {
              isRead: true,
              read: true,
              readAt: serverTimestamp()
            });
          });
          await batch.commit();
        }
      } catch (error) {
        console.error("Could not mark notifications read:", error);
      }

      window.location.href = "notifications.html";
    });

    allTab.addEventListener("click", async () => {
      currentFeedFilter = "all";
      applyFeedTabUI();
      await renderPosts();
    });

    followingTab.addEventListener("click", async () => {
      currentFeedFilter = "following";
      applyFeedTabUI();
      await renderPosts();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const [userSnap, publicSnap] = await Promise.all([
          getDoc(doc(db, "users", user.uid)),
          getDoc(doc(db, "publicProfiles", user.uid))
        ]);

        const userData = userSnap.exists() ? userSnap.data() : {};
        const publicData = publicSnap.exists() ? publicSnap.data() : {};
        currentUserProfile = normalizeProfile({ ...publicData, ...userData, uid: user.uid }, user.uid);

        myName.textContent = currentUserProfile.displayName || user.displayName || "Member";

        if (currentUserProfile.username) {
          myUsername.textContent = "@" + currentUserProfile.username;
          myUsername.classList.remove("hidden");
        } else {
          myUsername.classList.add("hidden");
        }

        showMyAvatar(currentUserProfile.photoURL || "");

        if (window.location.hash === "#composerPanel") {
          showComposer();
        }

        const status = currentUserProfile?.moderationStatus || "";
        const suspendUntilValue = currentUserProfile?.suspensionUntil || null;

        const suspensionUntil = suspendUntilValue?.toDate
          ? suspendUntilValue.toDate().getTime()
          : suspendUntilValue
          ? new Date(suspendUntilValue).getTime()
          : 0;

        if (status === "banned") {
          hideComposer();
          navCreateBtn.disabled = true;
          setFormMessage("Your account is banned. Posting is disabled.", "error");
        } else if (status === "suspended" && suspensionUntil && Date.now() < suspensionUntil) {
          hideComposer();
          navCreateBtn.disabled = true;
          setFormMessage("Your account is suspended. Posting is disabled for now.", "error");
        }

        onSnapshot(collection(db, "publicProfiles"), async (snapshot) => {
          publicProfilesMap = new Map();
          snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const uid = data.uid || docSnap.id;
            publicProfilesMap.set(uid, normalizeProfile({ id: docSnap.id, ...data }, uid));
          });
          await renderPosts();
        });

        onSnapshot(collection(db, "follows"), async (snapshot) => {
          follows = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          await renderPosts();
        });

        onSnapshot(
          query(collection(db, "follow_requests"), where("requesterId", "==", user.uid)),
          async (snapshot) => {
            outgoingRequests = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            await renderPosts();
          }
        );

        const postsQuery = query(
          collection(db, "posts"),
          orderBy("createdAt", "desc")
        );

        onSnapshot(postsQuery, async (snapshot) => {
          allPostDocs = snapshot.docs;
          await renderPosts();
        }, (error) => {
          console.error(error);
          postsList.innerHTML = "";
          emptyBox.classList.remove("hidden");
          emptyBox.textContent = "Could not load feed.";
        });

        onSnapshot(collection(db, "notifications", user.uid, "items"), (snapshot) => {
          const items = snapshot.docs.map(d => d.data());
          renderNotifications(items);
        }, (error) => {
          console.error("Notification load error:", error);
          renderNotifications([]);
        });

      } catch (error) {
        console.error(error);
        myName.textContent = "Member";
        myUsername.classList.add("hidden");
      }
    });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const caption = captionInput.value.trim();
      const imageURL = imageURLInput.value.trim();

      if (!caption && !imageURL) {
        setFormMessage("Write something or add an image link.", "error");
        return;
      }

      postBtn.disabled = true;
      postBtn.textContent = "Posting...";

      try {
        const displayName =
          currentUserProfile?.displayName ||
          currentUser.displayName ||
          "Member";

        const userPhotoURL = currentUserProfile?.photoURL || "";
        const username = currentUserProfile?.username || "";

        await addDoc(collection(db, "posts"), {
          userId: currentUser.uid,
          displayName,
          username,
          userPhotoURL,
          caption,
          imageURL,
          createdAt: serverTimestamp()
        });

        captionInput.value = "";
        imageURLInput.value = "";
        setFormMessage("Update posted.", "success");
        hideComposer();
      } catch (error) {
        console.error(error);
        setFormMessage("Could not post update.", "error");
      }

      postBtn.disabled = false;
      postBtn.textContent = "Post Update";
    });

    window.addEventListener("hashchange", () => {
      if (window.location.hash === "#composerPanel") {
        showComposer();
      }
    });
  </script>
</body>
</html>
