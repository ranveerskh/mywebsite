<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Post</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --red:#e74c66;
      --purple:#7f63ff;
      --yellow:#d59617;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.055);
      --shadow-strong:0 16px 34px rgba(20,33,61,.08);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
      --purple:#a78bfa;
      --yellow:#f5b942;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 10px 24px rgba(0,0,0,.16);
      --shadow-strong:0 20px 40px rgba(0,0,0,.18);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 22%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{width:17px;height:17px;display:block}
    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:16px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
    }

    .shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow-strong);
      margin-bottom:8px;
    }

    .section{
      padding:9px;
      border-bottom:1px solid var(--line-soft);
    }

    .section:last-child{border-bottom:none}

    .loading{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      font-size:12.5px;
      line-height:1.5;
    }

    .message{
      min-height:18px;
      font-size:12px;
      margin-top:7px;
      line-height:1.4;
      color:var(--muted);
    }

    .success{color:#22b36c}
    .error{color:#e74c66}
    html[data-theme="dark"] .success{color:#9cf0bf}
    html[data-theme="dark"] .error{color:#ffb3bd}

    .post-top{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:8px;
      margin-bottom:8px;
    }

    .post-left{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .avatar,
    .avatar-placeholder{
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .avatar{object-fit:cover}

    .avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:5px;
      color:var(--muted);
      font-size:8.8px;
      line-height:1.2;
    }

    .post-top-text{min-width:0}

    .post-name-row{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      min-width:0;
    }

    .name-delete-btn{
      width:26px;
      height:26px;
      min-height:26px;
      padding:0;
      border-radius:999px;
      flex-shrink:0;
      background:rgba(255,93,115,.12);
      border:1px solid rgba(255,93,115,.20);
    }

    .name-delete-btn svg{
      width:13px;
      height:13px;
      display:block;
    }

    .post-name{
      font-size:14.5px;
      font-weight:950;
      line-height:1.15;
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      min-width:0;
    }

    .post-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .post-name a:hover{text-decoration:underline}

    .verified-badge{
      width:18px;
      height:18px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:0 0 0 2px rgba(32,199,111,.14);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:10px;
      height:10px;
      display:block;
      stroke-width:3;
    }

    .post-username{
      color:var(--blue);
      font-size:11px;
      font-weight:850;
      margin-top:2px;
      word-break:break-word;
    }

    .post-date{
      color:var(--muted);
      font-size:10.5px;
      margin-top:2px;
    }

    .post-top-actions{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
      flex-shrink:0;
      max-width:120px;
    }

    .top-follow-btn,
    .delete-btn{
      border:none;
      border-radius:999px;
      padding:5px 8px;
      font-size:10.5px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      min-height:27px;
      white-space:nowrap;
      color:var(--text);
    }

    .top-follow-btn.follow{background:rgba(76,201,255,.14);border:1px solid rgba(76,201,255,.22)}
    .top-follow-btn.unfollow{background:rgba(255,93,115,.14);border:1px solid rgba(255,93,115,.22)}
    .top-follow-btn.request{background:rgba(167,139,250,.14);border:1px solid rgba(167,139,250,.22)}
    .top-follow-btn.requested{background:var(--surface-2);border:1px solid var(--line)}

    .top-follow-btn:disabled,
    .delete-btn:disabled,
    .icon-action-btn:disabled{opacity:.7;cursor:not-allowed}

    .delete-btn{
      background:rgba(255,93,115,.14);
      border:1px solid rgba(255,93,115,.22);
    }

    .delete-btn svg{width:12px;height:12px;display:block}

    .meta-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:5px 7px;
      border-radius:999px;
      font-size:10px;
      font-weight:950;
      line-height:1;
      text-decoration:none;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--surface-2);
    }

    .badge-private{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .badge-banned{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}
    .badge-verified{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .badge-community{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .post-title{
      color:var(--text);
      font-size:15.5px;
      font-weight:950;
      line-height:1.28;
      margin-bottom:7px;
      word-break:break-word;
      letter-spacing:-.015em;
    }

    .post-caption{
      color:var(--text);
      line-height:1.52;
      font-size:13.2px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:8px;
    }

    .post-image{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:var(--surface-2);
      border:1px solid var(--line);
      margin-bottom:8px;
    }

    .actions{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:2px;
    }

    .icon-action-btn,
    .icon-report-link{
      border:none;
      cursor:pointer;
      font-weight:950;
      border-radius:11px;
      padding:7px 8px;
      font-size:10.8px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      text-decoration:none;
      color:var(--text);
      min-height:31px;
      border:1px solid var(--line);
      background:var(--surface-2);
      white-space:nowrap;
    }

    .icon-action-btn svg,
    .icon-report-link svg{width:14px;height:14px;display:block;flex-shrink:0}

    .like-btn{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .like-btn[data-liked="yes"]{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .like-btn[data-liked="yes"] svg{fill:currentColor;color:var(--red)}
    .comment-anchor-btn{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.20)}
    .icon-report-link{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}
    .share-btn{margin-left:auto;background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.20)}

    .comments-panel-title{
      font-size:15px;
      font-weight:950;
      margin-bottom:8px;
      letter-spacing:-.015em;
    }

    .comment-form{
      display:grid;
      grid-template-columns:1fr auto;
      gap:7px;
      margin-bottom:7px;
    }

    .comment-input{
      min-width:0;
      border:none;
      outline:none;
      padding:9px 10px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:13px;
    }

    .comment-input::placeholder{color:var(--muted)}

    .comment-submit{
      background:rgba(61,220,132,.14);
      border:1px solid rgba(61,220,132,.22);
      color:var(--text);
      min-width:66px;
    }

    .comments-list{
      display:grid;
      gap:7px;
    }

    .comment-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px;
    }

    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:6px;
    }

    .comment-left{
      display:flex;
      gap:7px;
      align-items:flex-start;
      min-width:0;
    }

    .comment-avatar,
    .comment-avatar-placeholder{
      width:32px;
      height:32px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .comment-avatar{object-fit:cover}

    .comment-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      font-size:8px;
      padding:4px;
      line-height:1.1;
    }

    .comment-info{min-width:0}

    .comment-author{
      font-weight:950;
      font-size:12.5px;
      color:var(--text);
      line-height:1.2;
    }

    .comment-username{
      color:var(--blue);
      font-size:10.5px;
      font-weight:850;
      margin-top:1px;
    }

    .comment-date{
      color:var(--muted);
      font-size:10px;
      margin-top:1px;
    }

    .comment-text{
      color:var(--text);
      line-height:1.5;
      font-size:12.5px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:9px;
      padding:5px 7px;
      font-size:10px;
      font-weight:950;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .lock-box,
    .empty-box{
      text-align:center;
      padding:18px 10px;
      background:var(--surface-2);
      border-radius:15px;
      border:1px dashed var(--line);
    }

    .lock-title{
      font-size:15px;
      font-weight:950;
      margin-bottom:6px;
    }

    .lock-text,
    .empty-box{
      color:var(--muted);
      font-size:12.5px;
      line-height:1.5;
    }

    .lock-action-wrap{
      margin-top:10px;
      display:flex;
      justify-content:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{background:rgba(76,201,255,.14);color:var(--text)}

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{width:17px;height:17px;display:block}

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media(max-width:700px){
      .brand{font-size:15.5px}
      .section{padding:8px}
      .post-top{grid-template-columns:1fr auto;align-items:start}
      .post-top-actions{width:auto;justify-content:flex-end;max-width:110px}
      .avatar,.avatar-placeholder{width:40px;height:40px}
      .post-name{font-size:14px}
      .post-caption{font-size:13px}
      .comment-form{grid-template-columns:1fr auto}
      .share-btn{margin-left:0}
      .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
      .icon-action-btn,.icon-report-link{padding:7px 4px;font-size:10.5px;gap:4px}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
    }

    @media(max-width:390px){
      .actions{grid-template-columns:repeat(2,1fr)}
      .comment-form{grid-template-columns:1fr}
      .comment-submit{width:100%}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div id="pageSubtitle" class="brand-sub">Post detail</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div class="shell">
      <div class="section">
        <div id="loading" class="loading">Loading post...</div>
        <div id="pageMessage" class="message"></div>

        <div id="postContent" class="hidden">
          <div class="post-top">
            <div class="post-left">
              <img id="avatar" class="avatar hidden" alt="User Photo" />
              <div id="avatarPlaceholder" class="avatar-placeholder">No photo</div>

              <div class="post-top-text">
                <div class="post-name-row">
                  <div class="post-name">
                    <a id="ownerLink" href="#">Member</a>

                    <span id="verifiedDot" class="verified-badge hidden" title="Verified">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M20 6 9 17l-5-5"></path>
                      </svg>
                    </span>
                  </div>

                  <button id="deleteBtn" class="delete-btn name-delete-btn hidden" type="button" title="Delete post" aria-label="Delete post">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M3 6h18"></path>
                      <path d="M8 6V4h8v2"></path>
                      <path d="M19 6l-1 14H6L5 6"></path>
                      <path d="M10 11v6"></path>
                      <path d="M14 11v6"></path>
                    </svg>
                  </button>
                </div>

                <div id="ownerUsername" class="post-username hidden">@username</div>
                <div id="postDate" class="post-date">Just now</div>
              </div>
            </div>

            <div class="post-top-actions">
              <button id="topRelationBtn" class="top-follow-btn follow hidden" type="button">Follow</button>

            </div>
          </div>

          <div id="metaRow" class="meta-row"></div>
          <div id="postTitle" class="post-title hidden"></div>
          <div id="postCaption" class="post-caption hidden"></div>
          <img id="postImage" class="post-image hidden" alt="Post image" />

          <div class="actions">
            <button id="likeBtn" class="icon-action-btn like-btn" aria-label="Like" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.8 4.6a5.4 5.4 0 0 0-7.6 0L12 5.8l-1.2-1.2a5.4 5.4 0 1 0-7.6 7.6L12 21l8.8-8.8a5.4 5.4 0 0 0 0-7.6z"></path>
              </svg>
              <span id="likeCount">0</span>
            </button>

            <button id="commentAnchorBtn" class="icon-action-btn comment-anchor-btn" aria-label="Comments" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              <span id="commentCount">0</span>
            </button>

            <a id="reportBtn" class="icon-report-link hidden" href="#" aria-label="Report">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 9v4"></path>
                <path d="M12 17h.01"></path>
                <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>
              </svg>
              <span>Report</span>
            </a>

            <button id="shareBtn" class="icon-action-btn share-btn" aria-label="Share" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <path d="m8.6 13.5 6.8 4"></path>
                <path d="m15.4 6.5-6.8 4"></path>
              </svg>
              <span>Share</span>
            </button>
          </div>
        </div>
      </div>

      <div id="lockedPanel" class="section hidden">
        <div class="lock-box">
          <div id="lockedTitle" class="lock-title">Private Post</div>
          <div id="lockedText" class="lock-text">You need to follow this member to view this post.</div>

          <div class="lock-action-wrap">
            <button id="lockedRelationBtn" class="top-follow-btn follow hidden" type="button">Follow</button>
          </div>
        </div>

    const relationButtons = [topRelationBtn, lockedRelationBtn];

    function nowIso(){return new Date().toISOString()}

    function getStoredTheme(){return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light"}

    function resolveTheme(themeValue){
      if(themeValue === "system") return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()){
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if(e.key === "osTheme" || e.key === "bwTheme") applyTheme();
      if(e.key === "ownspace_badges_refresh" || e.key === "ownspace_inbox_refresh" || e.key === "ownspace_chat_read_refresh") {
        loadInboxBadgeCount().catch(() => {});
      }
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if(mediaQuery.addEventListener){
      mediaQuery.addEventListener("change", () => {
        if(getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {

    });

    function setPageMessage(text, type = ""){
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function setFormMessage(text, type = ""){
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function escapeHtml(text){
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names, fallback = ""){
      for(const name of names){
        const value = raw?.[name];
        if(value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
      }
      return fallback;
    }

    function getBool(raw, names, fallback = false){
      for(const name of names){
        if(raw?.[name] !== undefined && raw?.[name] !== null) return !!raw[name];
      }
      return fallback;
    }

    function normalizeText(value){return String(value || "").trim().toLowerCase()}

    function isSchemaColumnError(error){
      const msg = String(error?.message || "").toLowerCase();
      return msg.includes("could not find") || msg.includes("schema cache") || msg.includes("column") || msg.includes("does not exist");
    }

    function toMillis(value){
      if(!value) return 0;
      try{
        if(typeof value === "object" && typeof value.toDate === "function") return value.toDate().getTime();
      }catch{}
      try{
        if(typeof value === "object" && typeof value.seconds === "number") return value.seconds * 1000;
      }catch{}
      try{
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      }catch{return 0}
    }

    function formatDate(value){
      if(!value) return "Just now";
      try{
        const d = new Date(value);
        if(Number.isNaN(d.getTime())) return "Just now";
        const diff = Date.now() - d.getTime();
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;
        if(diff < minute) return "Now";
        if(diff < hour) return `${Math.floor(diff / minute)}m ago`;
        if(diff < day) return `${Math.floor(diff / hour)}h ago`;
        if(diff < day * 7) return `${Math.floor(diff / day)}d ago`;
        return d.toLocaleDateString([], { month:"short", day:"numeric" });
      }catch{return "Just now"}
    }

    function showAvatar(url){
      const cleanUrl = String(url || "").trim();
      if(!cleanUrl){
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    function normalizeProfile(raw, fallbackUid = ""){
      const d = raw || {};
      return {
        uid:getField(d, ["uid", "id", "user_id", "userId"], fallbackUid) || fallbackUid || "",
        displayName:getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"], "Member") || "Member",
        username:getField(d, ["username", "handle", "user_name", "userName"]),
        photoURL:getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        isPrivate:!!(d.is_private ?? d.isPrivate ?? d.private_profile ?? d.privateProfile ?? d.private ?? d.account_private ?? d.accountPrivate),
        moderationStatus:getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin:!!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted:!!(d.soft_deleted ?? d.softDeleted),
        verified:!!(d.is_verified ?? d.verified ?? d.isVerified)
      };
    }

    function normalizePost(raw, sourceTable = "posts"){
      const d = raw || {};
      const source = sourceTable || d.__sourceTable || d.sourceTable || "posts";
      return {
        id:getField(d, ["id"]),
        sourceTable:source,
        userId:getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "created_by", "createdBy", "uid"]),
        displayName:getField(d, ["display_name", "displayName", "author_name", "authorName", "name"]),
        username:getField(d, ["username", "author_username", "authorUsername"]),
        userPhotoURL:getField(d, ["user_photo_url", "userPhotoURL", "author_photo_url", "authorPhotoURL", "avatar", "photo_url", "photoURL"]),
        title:getField(d, ["title", "heading"]),
        caption:getField(d, ["caption", "text", "body", "content", "description"]),
        imageURL:getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        communityId:getField(d, ["community_id", "communityId", "group_id", "groupId"]),
        type:getField(d, ["type", "post_type", "postType"], source === "community_posts" ? "community" : "post"),
        audience:getField(d, ["audience"], ""),
        hidden:!!d.hidden,
        hiddenByAdmin:!!(d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted:!!(d.soft_deleted ?? d.softDeleted),
        createdAt:d.created_at ?? d.createdAt ?? d.timestamp ?? null
      };
    }

    function normalizeCommunity(raw, fallbackId = ""){
      const d = raw || {};
      return {
        id:getField(d, ["id"], fallbackId) || fallbackId || "",
        name:getField(d, ["name", "title", "community_name", "communityName"], "Community") || "Community",
        hidden:getBool(d, ["hidden", "hidden_by_admin", "hiddenByAdmin", "soft_deleted", "softDeleted"]) || normalizeText(d.status) === "deleted"
      };
    }

    function normalizeComment(raw){
      const d = raw || {};
      return {
        id:getField(d, ["id"]),
        postId:getField(d, ["post_id", "postId"]),
        source:getField(d, ["source", "source_table", "sourceTable"]),
        userId:getField(d, ["user_id", "userId", "uid"]),
        displayName:getField(d, ["display_name", "displayName", "name"]) || "Member",
        username:getField(d, ["username"]),
        userPhotoURL:getField(d, ["user_photo_url", "userPhotoURL", "photo_url", "photoURL"]),
        text:getField(d, ["text", "comment", "body"]),
        createdAt:d.created_at ?? d.createdAt ?? null,
        createdAtMs:toMillis(d.created_at ?? d.createdAt ?? null)
      };
    }

    async function selectProfileRow(table, uid){
      const columns = ["uid", "id", "user_id", "userId"];
      for(const column of columns){
        try{
          const { data, error } = await supabase.from(table).select("*").eq(column, uid).maybeSingle();
          if(!error && data) return data;
        }catch{}
      }
      return null;
    }

    async function getViewerProfile(uid){
      try{
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);
        return normalizeProfile({ ...(publicRow || {}), ...(userRow || {}), uid }, uid);
      }catch{
        return normalizeProfile({ uid }, uid);
      }
    }

    async function getPublicProfile(uid){
      try{
        const publicRow = await selectProfileRow("public_profiles", uid);
        if(publicRow) return normalizeProfile(publicRow, uid);
        const userRow = await selectProfileRow("users", uid);
        if(userRow) return normalizeProfile(userRow, uid);
      }catch{}
      return normalizeProfile({ uid }, uid);
    }

    async function getCommunityById(communityId){
      if(!communityId) return null;
      const tables = ["communities", "community"];
      for(const table of tables){
        try{
          const { data, error } = await supabase.from(table).select("*").eq("id", communityId).maybeSingle();
          if(!error && data) return normalizeCommunity({ id:data.id, ...data }, data.id);
        }catch{}
      }
      return null;
    }

    async function getPostById(postId){
      const params = new URLSearchParams(window.location.search);
      const requestedSource = params.get("source") || params.get("table") || "";
      const sourceOrder = [];
      if(requestedSource === "community_posts") sourceOrder.push("community_posts");
      if(requestedSource === "posts") sourceOrder.push("posts");
      sourceOrder.push("posts", "community_posts");
      const uniqueSources = [...new Set(sourceOrder)];

      for(const table of uniqueSources){
        try{
          const { data, error } = await supabase.from(table).select("*").eq("id", postId).maybeSingle();
          if(!error && data) return normalizePost({ id:data.id, ...data }, table);
        }catch{}
      }
      return null;
    }

    function getPostOwnerId(post){return post?.userId || ""}
    function getPostImage(post){return post?.imageURL || ""}
    function getPostCaption(post){return post?.caption || ""}

    async function findFollowRow(viewerUid, targetUid){
      const variants = [
        { followerCol:"follower_id", followingCol:"following_id" },
        { followerCol:"followerId", followingCol:"followingId" },
        { followerCol:"from_user_id", followingCol:"to_user_id" },
        { followerCol:"fromUserId", followingCol:"toUserId" }
      ];
      for(const v of variants){
        try{
          const { data, error } = await supabase.from("follows").select("*").eq(v.followerCol, viewerUid).eq(v.followingCol, targetUid).limit(1);
          if(!error && data && data.length) return data[0];
        }catch{}
      }
      return null;
    }

    async function findRequestRow(viewerUid, targetUid){
      const variants = [
        { requesterCol:"requester_id", targetCol:"target_id" },
        { requesterCol:"requesterId", targetCol:"targetId" },
        { requesterCol:"from_user_id", targetCol:"to_user_id" },
        { requesterCol:"fromUserId", targetCol:"toUserId" }
      ];
      for(const v of variants){
        try{
          const { data, error } = await supabase.from("follow_requests").select("*").eq(v.requesterCol, viewerUid).eq(v.targetCol, targetUid).limit(1);
          if(!error && data && data.length){
            const row = data[0];
            const status = String(row.status || "pending").toLowerCase();
            if(!["accepted", "declined", "rejected", "cancelled", "canceled"].includes(status)) return row;
          }
        }catch{}
      }
      return null;
    }

    async function checkFollowing(viewerUid, targetUid){return !!(await findFollowRow(viewerUid, targetUid))}

    async function insertWithFallback(table, payloads){
      let lastError = null;
      for(const payload of payloads){
        try{
          const { data, error } = await supabase.from(table).insert(payload).select().maybeSingle();
          if(!error) return data || null;
          lastError = error;
        }catch(err){lastError = err}
      }
      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    async function deleteById(table, id){
      if(!id) return;
      const { error } = await supabase.from(table).delete().eq("id", id);
      if(error) throw error;
    }

    async function createNotificationSafe(targetUid, payload = {}){
      if(!targetUid || !currentUser || targetUid === currentUser.id) return;

      const createdAt = nowIso();
      const snakePayload = {
        type:payload.type || "notification",
        title:payload.title || "",
        text:payload.text || "",
        from_user_id:payload.from_user_id || payload.fromUserId || currentUser.id,
        to_user_id:targetUid,
        user_id:targetUid,
        post_id:payload.post_id || payload.postId || "",
        community_id:payload.community_id || payload.communityId || "",
        source:payload.source || "",
        created_at:createdAt,
        is_read:false,
        read:false
      };

      const camelPayload = {
        type:snakePayload.type,
        title:snakePayload.title,
        text:snakePayload.text,
        fromUserId:snakePayload.from_user_id,
        toUserId:targetUid,
        userId:targetUid,
        postId:snakePayload.post_id,
        communityId:snakePayload.community_id,
        source:snakePayload.source,
        createdAt:createdAt,
        isRead:false,
        read:false
      };

      try{
        await insertWithFallback("notifications", [
          snakePayload,
          camelPayload,
          { type:snakePayload.type, text:snakePayload.text, to_user_id:targetUid, user_id:targetUid, created_at:createdAt, is_read:false }
        ]);
      }catch(err){
        console.warn("Notification failed:", err?.message || err);
      }
    }

    function styleRelationButton(btn, state){
      if(!btn) return;
      if(!currentUser || !ownerUid || ownerUid === currentUser.id){
        btn.classList.add("hidden");
        return;
      }

      btn.classList.remove("hidden");

      if(state === "following"){
        btn.className = "top-follow-btn unfollow";
        btn.textContent = "Unfollow";
      }else if(state === "requested"){
        btn.className = "top-follow-btn requested";
        btn.textContent = "Requested";
      }else if(state === "request"){
        btn.className = "top-follow-btn request";
        btn.textContent = "Request";
      }else{
        btn.className = "top-follow-btn follow";
        btn.textContent = "Follow";
      }
    }

    async function refreshRelationButtons(){
      relationButtons.forEach(btn => {
        if(btn){
          btn.disabled = false;
          btn.classList.add("hidden");
        }
      });

      relationInfo = { followId:null, requestId:null };
      if(!currentUser || !ownerUid || ownerUid === currentUser.id || !ownerProfile) return;

      const followRow = await findFollowRow(currentUser.id, ownerUid);
      const requestRow = !followRow ? await findRequestRow(currentUser.id, ownerUid) : null;

      if(followRow){
        relationState = "following";
        relationInfo.followId = followRow.id || null;
      }else if(ownerProfile.isPrivate && requestRow){
        relationState = "requested";
        relationInfo.requestId = requestRow.id || null;
      }else if(ownerProfile.isPrivate){
        relationState = "request";
      }else{
        relationState = "follow";
      }

      relationButtons.forEach(btn => styleRelationButton(btn, relationState));
    }

    async function handleRelationAction(){
      if(!currentUser || !ownerUid || ownerUid === currentUser.id) return;
      relationButtons.forEach(btn => btn.disabled = true);
      setPageMessage("");

      try{
        if(relationState === "following"){
          const row = await findFollowRow(currentUser.id, ownerUid);
          if(row?.id) await deleteById("follows", row.id);
          else await supabase.from("follows").delete().eq("follower_id", currentUser.id).eq("following_id", ownerUid);
        }else if(relationState === "requested"){
          const row = await findRequestRow(currentUser.id, ownerUid);
          if(row?.id) await deleteById("follow_requests", row.id);
          else await supabase.from("follow_requests").delete().eq("requester_id", currentUser.id).eq("target_id", ownerUid);
        }else if(relationState === "request"){
          await insertWithFallback("follow_requests", [
            { requester_id:currentUser.id, target_id:ownerUid, from_user_id:currentUser.id, to_user_id:ownerUid, status:"pending", created_at:nowIso(), updated_at:nowIso() },
            { requesterId:currentUser.id, targetId:ownerUid, fromUserId:currentUser.id, toUserId:ownerUid, status:"pending", createdAt:nowIso(), updatedAt:nowIso() }
          ]);

          await createNotificationSafe(ownerUid, {
            type:"follow_request",
            title:"Follow request",
            text:`${currentUserProfile?.displayName || "Someone"} sent you a follow request.`,
            post_id:currentPostId
          });
        }else if(relationState === "follow"){
          await insertWithFallback("follows", [
            { follower_id:currentUser.id, following_id:ownerUid, created_at:nowIso() },
            { followerId:currentUser.id, followingId:ownerUid, createdAt:nowIso() }
          ]);

          await createNotificationSafe(ownerUid, {
            type:"follow",
            title:"New follower",
            text:`${currentUserProfile?.displayName || "Someone"} started following you.`
          });
        }

        await refreshRelationButtons();

        if(!lockedPanel.classList.contains("hidden")){
          const followingNow = await checkFollowing(currentUser.id, ownerUid);
          if(!ownerProfile.isPrivate || followingNow){
            window.location.reload();
            return;
          }
        }
      }catch(error){
        console.error("Relation update failed:", error);
        setPageMessage("Could not update follow state.", "error");
      }

      relationButtons.forEach(btn => btn.disabled = false);
    }

    topRelationBtn.addEventListener("click", handleRelationAction);
    lockedRelationBtn.addEventListener("click", handleRelationAction);

    async function findLikeRow(postId, userId){
      const variants = [
        { postCol:"post_id", userCol:"user_id" },
        { postCol:"postId", userCol:"userId" }
      ];
      for(const v of variants){
        try{
          const { data, error } = await supabase.from("post_likes").select("*").eq(v.postCol, postId).eq(v.userCol, userId).limit(1);
          if(!error && data && data.length) return data[0];
        }catch{}
      }
      return null;
    }

    async function countLikes(postId){
      const variants = [{ postCol:"post_id" }, { postCol:"postId" }];
      for(const v of variants){
        try{
          const { count, error } = await supabase.from("post_likes").select("id", { count:"exact", head:true }).eq(v.postCol, postId);
          if(!error) return count || 0;
        }catch{}
      }
      return 0;
    }

    async function refreshLikeUI(){
      if(!currentPostId || !currentUser) return;
      const [totalLikes, myLike] = await Promise.all([
        countLikes(currentPostId),
        findLikeRow(currentPostId, currentUser.id)
      ]);
      const liked = !!myLike;
      likeBtn.dataset.liked = liked ? "yes" : "no";
      likeCount.textContent = String(totalLikes);
    }

    async function loadComments(postId){
      const variants = [
        { postCol:"post_id", orderCol:"created_at" },
        { postCol:"postId", orderCol:"createdAt" }
      ];

      for(const v of variants){
        try{
          const { data, error } = await supabase.from("post_comments").select("*").eq(v.postCol, postId).order(v.orderCol, { ascending:true });
          if(!error){
            return (data || []).map(row => normalizeComment({ id:row.id, ...row })).sort((a,b) => a.createdAtMs - b.createdAtMs);
          }
        }catch{}
      }

      try{
        const { data, error } = await supabase.from("post_comments").select("*");
        if(error) throw error;
        return (data || []).map(row => normalizeComment({ id:row.id, ...row })).filter(row => row.postId === postId).sort((a,b) => a.createdAtMs - b.createdAtMs);
      }catch{return []}
    }

    function buildCommentElement(comment){
      const canDelete = comment.userId === currentUser.id || ownerUid === currentUser.id;
      const wrap = document.createElement("div");
      wrap.className = "comment-item";

      const avatarHtml = comment.userPhotoURL
        ? `<img class="comment-avatar" src="${escapeHtml(comment.userPhotoURL)}" alt="Comment user photo">`
        : `<div class="comment-avatar-placeholder">No photo</div>`;

      wrap.innerHTML = `
        <div class="comment-top">
          <div class="comment-left">
            ${avatarHtml}
            <div class="comment-info">
              <div class="comment-author">${escapeHtml(comment.displayName || "Member")}</div>
              ${comment.username ? `<div class="comment-username">@${escapeHtml(comment.username)}</div>` : ""}
              <div class="comment-date">${escapeHtml(formatDate(comment.createdAt))}</div>
            </div>
          </div>
          ${canDelete ? `<button class="comment-delete-btn" type="button">Delete</button>` : ""}
        </div>
        <div class="comment-text">${escapeHtml(comment.text || "")}</div>
      `;

      const img = wrap.querySelector(".comment-avatar");
      if(img){
        img.addEventListener("error", () => {
          img.outerHTML = `<div class="comment-avatar-placeholder">No photo</div>`;
        });
      }

      const delBtn = wrap.querySelector(".comment-delete-btn");
      if(delBtn){
        delBtn.addEventListener("click", async () => {
          const ok = confirm("Delete this comment?");
          if(!ok) return;
          try{
            await deleteById("post_comments", comment.id);
            await refreshCommentsUI();
          }catch(error){
            console.error(error);
            setFormMessage("Could not delete comment.", "error");
          }
        });
      }

      return wrap;
    }

    async function refreshCommentsUI(){
      if(!currentPostId || !currentUser) return;
      commentsList.innerHTML = "";
      const comments = await loadComments(currentPostId);
      commentCount.textContent = String(comments.length);
      if(!comments.length){
        commentsEmpty.classList.remove("hidden");
        return;
      }
      commentsEmpty.classList.add("hidden");
      comments.forEach(comment => commentsList.appendChild(buildCommentElement(comment)));
    }

    function renderMeta(profile, isRemoved, community){
      const bits = [];
      if(currentPostData?.sourceTable === "community_posts"){
        const communityName = community?.name || "Community";
        const communityId = currentPostData?.communityId || "";
        const href = communityId ? `community.html?communityId=${encodeURIComponent(communityId)}` : "#";
        bits.push(`<a class="badge badge-community" href="${href}">${escapeHtml(communityName)}</a>`);
      }
      if(profile?.isPrivate) bits.push(`<span class="badge badge-private">Private</span>`);
      if(profile?.verified) bits.push(`<span class="badge badge-verified">Verified</span>`);
      if(isRemoved) bits.push(`<span class="badge badge-banned">Removed</span>`);

      metaRow.innerHTML = bits.join("");
      metaRow.classList.toggle("hidden", bits.length === 0);
    }

    function setVisibilityMode(showPost){
      if(showPost){
        postContent.classList.remove("hidden");
        commentsPanel.classList.remove("hidden");
        lockedPanel.classList.add("hidden");
      }else{
        postContent.classList.add("hidden");
        commentsPanel.classList.add("hidden");
        lockedPanel.classList.remove("hidden");
      }
    }

    async function sharePost(postId){
      const url = new URL("post.html", window.location.href);
      url.searchParams.set("postId", postId);
      if(currentPostData?.sourceTable) url.searchParams.set("source", currentPostData.sourceTable);

      try{
        if(navigator.share){
          await navigator.share({
            title:currentPostData?.title || "Check this post on OwnSpace",
            text:"Check this post on OwnSpace.",
            url:url.toString()
          });
        }else if(navigator.clipboard?.writeText){
          await navigator.clipboard.writeText(url.toString());
          alert("Post link copied.");
        }else{
          prompt("Copy this post link:", url.toString());
        }
      }catch(err){
        if(err?.name !== "AbortError") console.error("Share failed:", err);
      }
    }

    async function countRows(table, buildQuery){
      try{
        const query = supabase.from(table).select("id", { count:"exact", head:true });
        const { count, error } = await buildQuery(query);
        if(!error) return count || 0;
      }catch{}
      return null;
    }

    async function countPendingMessageRequests(uid){
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId", "receiverId", "recipientId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for(const targetColumn of targetColumns){
        for(const statusColumn of statusColumns){
          const count = await countRows("message_requests", q => q.eq(targetColumn, uid).eq(statusColumn, "pending"));
          if(count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q => q.eq(targetColumn, uid));
        if(countWithoutStatus !== null) return countWithoutStatus;
      }
      return 0;
    }

    async function fetchThreadsForBadge(uid){
      const attempts = [
        ["participant_a", "participant_b"],
        ["participantA", "participantB"]
      ];

      for(const [a,b] of attempts){
        try{
          const { data, error } = await supabase.from("chat_threads").select("*").or(`${a}.eq.${uid},${b}.eq.${uid}`);
          if(!error) return data || [];
        }catch{}
      }
      return [];
    }

    async function countUnreadChatMessages(uid){
      try{
        const threads = await fetchThreadsForBadge(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);
        if(!threadIds.length) return 0;

        const threadColumns = ["thread_id", "threadId"];
        const senderColumns = ["sender_id", "senderId", "from_user_id", "fromUserId"];
        const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

        for(const threadCol of threadColumns){
          for(const senderCol of senderColumns){
            for(const field of seenFields){
              try{
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count:"exact", head:true })
                  .in(threadCol, threadIds)
                  .neq(senderCol, uid)
                  .is(field, null);
                if(!error) return count || 0;
              }catch{}
            }
          }
        }

        const boolFields = ["is_read", "read", "isRead"];
        for(const threadCol of threadColumns){
          for(const senderCol of senderColumns){
            for(const field of boolFields){
              try{
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count:"exact", head:true })
                  .in(threadCol, threadIds)
                  .neq(senderCol, uid)
                  .eq(field, false);
                if(!error) return count || 0;
              }catch{}
            }
          }
        }
      }catch{}
      return 0;
    }

    async function loadInboxBadgeCount(){
      if(!currentUser) return;
      try{
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);
        const total = Number(requests || 0) + Number(unreadMessages || 0);
        if(!total){
          inboxBadge.classList.add("hidden");
        }else{
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      }catch{
        inboxBadge.classList.add("hidden");
      }
    }

    async function loadPostPage(){
      const params = new URLSearchParams(window.location.search);
      currentPostId = params.get("postId") || params.get("id") || "";

      if(!currentPostId){
        loading.textContent = "No post selected.";
        return;
      }

      try{
        currentUserProfile = await getViewerProfile(currentUser.id);
        currentPostData = await getPostById(currentPostId);

        if(!currentPostData){
          loading.textContent = "Post not found.";
          return;
        }

        ownerUid = getPostOwnerId(currentPostData);
        if(!ownerUid){
          loading.textContent = "Post owner not found.";
          return;
        }

        ownerProfile = await getPublicProfile(ownerUid);

        const community = currentPostData.communityId ? await getCommunityById(currentPostData.communityId) : null;

        const isRemoved =
          currentPostData.hidden ||
          currentPostData.hiddenByAdmin ||
          currentPostData.softDeleted ||
          ownerProfile?.moderationStatus === "banned" ||
          ownerProfile?.isHiddenByAdmin ||
          ownerProfile?.softDeleted ||
          community?.hidden;

        const alreadyFollowing = await checkFollowing(currentUser.id, ownerUid);
        const isCommunityPost = currentPostData.sourceTable === "community_posts";

        const canViewFull = !isRemoved && (
          isCommunityPost ||
          currentUser.id === ownerUid ||
          !ownerProfile?.isPrivate ||
          alreadyFollowing
        );

        pageSubtitle.textContent = isCommunityPost ? "Community post" : "Post detail";

        if(!isRemoved) await refreshRelationButtons();

        if(!canViewFull){
          loading.classList.add("hidden");
          if(isRemoved){
            lockedTitle.textContent = "Removed Post";
            lockedText.textContent = "This content was removed or hidden.";
            lockedRelationBtn.classList.add("hidden");
          }else{
            lockedTitle.textContent = "Private Post";
            lockedText.textContent = "You need to follow this member to view this post.";
          }
          setVisibilityMode(false);
          return;
        }

        setVisibilityMode(true);
        showAvatar(ownerProfile?.photoURL || currentPostData.userPhotoURL || "");

        ownerLink.textContent = ownerProfile?.displayName || currentPostData.displayName || "Member";
        ownerLink.href = `member.html?uid=${encodeURIComponent(ownerUid)}`;
        verifiedDot.classList.toggle("hidden", !ownerProfile?.verified);

        const ownerHandle = ownerProfile?.username || currentPostData.username || "";
        if(ownerHandle){
          ownerUsername.textContent = "@" + ownerHandle;
          ownerUsername.classList.remove("hidden");
        }else{
          ownerUsername.classList.add("hidden");
        }

        postDate.textContent = formatDate(currentPostData.createdAt);
        renderMeta(ownerProfile, isRemoved, community);

        if(currentPostData.title){
          postTitle.textContent = currentPostData.title;
          postTitle.classList.remove("hidden");
        }else{
          postTitle.classList.add("hidden");
        }

        const caption = getPostCaption(currentPostData);
        if(caption){
          postCaption.textContent = caption;
          postCaption.classList.remove("hidden");
        }else{
          postCaption.classList.add("hidden");
        }

        const imageUrl = getPostImage(currentPostData);
        if(imageUrl){
          postImage.src = imageUrl;
          postImage.classList.remove("hidden");
        }else{
          postImage.classList.add("hidden");
        }

        if(currentUser.id === ownerUid){
          deleteBtn.classList.remove("hidden");
          reportBtn.classList.add("hidden");
        }else{
          deleteBtn.classList.add("hidden");
          reportBtn.classList.remove("hidden");
          reportBtn.href = `report.html?type=post&targetId=${encodeURIComponent(currentPostId)}&targetUserId=${encodeURIComponent(ownerUid)}&source=${encodeURIComponent(currentPostData.sourceTable)}`;
        }

        await refreshLikeUI();
        await refreshCommentsUI();
        await loadInboxBadgeCount();
        loading.classList.add("hidden");
      }catch(error){
        console.error(error);
        loading.textContent = "Could not load post.";
      }
    }

    likeBtn.addEventListener("click", async () => {
      if(!currentUser || !currentPostId || !currentPostData) return;
      likeBtn.disabled = true;
      let createdNewLike = false;

      try{
        const existing = await findLikeRow(currentPostId, currentUser.id);
        if(existing?.id){
          await deleteById("post_likes", existing.id);
        }else{
          await insertWithFallback("post_likes", [
            { post_id:currentPostId, user_id:currentUser.id, source:currentPostData.sourceTable, created_at:nowIso() },
            { postId:currentPostId, userId:currentUser.id, source:currentPostData.sourceTable, createdAt:nowIso() },
            { post_id:currentPostId, user_id:currentUser.id, created_at:nowIso() }
          ]);
          createdNewLike = true;
        }

        await refreshLikeUI();
        setPageMessage("");
      }catch(error){
        console.error("LIKE WRITE FAILED:", error);
        setPageMessage("Like save failed: " + (error?.message || "Unknown error"), "error");
        likeBtn.disabled = false;
        return;
      }

      if(createdNewLike && ownerUid && ownerUid !== currentUser.id){
        await createNotificationSafe(ownerUid, {
          type:"like",
          title:"New like",
          text:`${currentUserProfile?.displayName || "Someone"} liked your post.`,
          post_id:currentPostId,
          community_id:currentPostData.communityId,
          source:currentPostData.sourceTable
        });
      }

      likeBtn.disabled = false;
    });

    commentForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if(!currentUser || !currentPostId || !currentPostData) return;

      const text = commentInput.value.trim();
      if(!text) return;

      const displayName = currentUserProfile?.displayName || "Member";
      const username = currentUserProfile?.username || "";
      const userPhotoURL = currentUserProfile?.photoURL || "";
      const submitBtn = commentForm.querySelector("button");
      submitBtn.disabled = true;
      let commentSaved = false;

      try{
        await insertWithFallback("post_comments", [
          { post_id:currentPostId, user_id:currentUser.id, display_name:displayName, username, user_photo_url:userPhotoURL, text, source:currentPostData.sourceTable, community_id:currentPostData.communityId || "", created_at:nowIso() },
          { postId:currentPostId, userId:currentUser.id, displayName, username, userPhotoURL, text, source:currentPostData.sourceTable, communityId:currentPostData.communityId || "", createdAt:nowIso() },
          { post_id:currentPostId, user_id:currentUser.id, display_name:displayName, username, user_photo_url:userPhotoURL, text, created_at:nowIso() }
        ]);

        commentSaved = true;
        commentInput.value = "";
        await refreshCommentsUI();
        setFormMessage("Comment added.", "success");
      }catch(error){
        console.error("COMMENT WRITE FAILED:", error);
        setFormMessage("Comment save failed: " + (error?.message || "Unknown error"), "error");
        submitBtn.disabled = false;
        return;
      }

      if(commentSaved && ownerUid && ownerUid !== currentUser.id){
        await createNotificationSafe(ownerUid, {
          type:"comment",
          title:"New comment",
          text:`${displayName} commented on your post.`,
          post_id:currentPostId,
          community_id:currentPostData.communityId,
          source:currentPostData.sourceTable
        });
      }

      submitBtn.disabled = false;
    });

    deleteBtn.addEventListener("click", async () => {
      if(!currentPostId || !currentUser || !currentPostData) return;
      const ok = confirm("Delete this post?");
      if(!ok) return;

      deleteBtn.disabled = true;
      const table = currentPostData.sourceTable || "posts";

      try{
        const ownerColumns = ["user_id", "author_id", "created_by", "uid", "userId", "authorId", "createdBy"];
        let deleted = false;
        let lastError = null;

        for(const col of ownerColumns){
          try{
            const { error } = await supabase.from(table).delete().eq("id", currentPostId).eq(col, currentUser.id);
            if(!error){
              deleted = true;
              break;
            }
            lastError = error;
          }catch(err){lastError = err}
        }

        if(!deleted){
          const softPayloads = [
            { hidden:true, soft_deleted:true, deleted_at:nowIso(), updated_at:nowIso() },
            { hidden:true, softDeleted:true, deletedAt:nowIso(), updatedAt:nowIso() },
            { hidden:true }
          ];

          let softDone = false;
          for(const payload of softPayloads){
            try{
              const { error } = await supabase.from(table).update(payload).eq("id", currentPostId);
              if(!error){
                softDone = true;
                break;
              }
              lastError = error;
            }catch(err){lastError = err}
          }
          if(!softDone && lastError) throw lastError;
        }

        if(currentPostData.communityId){
          window.location.href = `community.html?communityId=${encodeURIComponent(currentPostData.communityId)}`;
        }else{
          window.location.href = "profile.html";
        }
      }catch(error){
        console.error(error);
        setPageMessage("Could not delete post.", "error");
        deleteBtn.disabled = false;
      }
    });

    async function initPage(){
      const { data, error } = await supabase.auth.getUser();
      if(error || !data?.user){
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;
      await loadPostPage();

      supabase.auth.onAuthStateChange((_event, session) => {
        if(!session?.user) window.location.href = "login.html";
      });
    }

    initPage().catch((error) => {
      console.error(error);
      loading.textContent = "Could not load post.";
    });

    /*
      OWNSPACE POST PAGE COMPACT PREMIUM UPDATE:
      - Slim topbar and bottom navigation to match feed/profile/member pages.
      - Smaller author row, avatar, verified badge, follow/delete controls.
      - Compact Like, Comment, Report, Share action row.
      - Cleaner comments panel with smaller input, avatars, and cards.
      - Keeps Supabase post loading, private post lock, likes, comments, share, report, follow/request, delete, and inbox badge logic.
      - Notification insert now includes user_id fallback for older notifications schema.
    */
  </script>
</body>
