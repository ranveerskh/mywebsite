<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Post</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;
      --card:#121931;
      --soft:#161f3d;
      --soft2:#0f1630;
      --line:rgba(255,255,255,.08);
      --text:#fff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
      --purple:#a78bfa;
      --yellow:#f5b942;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);
      min-height:100vh;
      padding:14px 14px 92px;
    }
    .app{max-width:760px;margin:0 auto}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);
      border:1px solid rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px 12px;
      margin-bottom:14px;
      display:grid;
      grid-template-columns:48px 1fr 48px;
      align-items:center;
      gap:10px;
    }
    .top-icon-btn{
      width:48px;
      height:48px;
      border:none;
      background:var(--soft);
      color:#fff;
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }
    .top-icon-btn svg{width:20px;height:20px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}

    .panel{
      background:rgba(18,25,49,.88);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    .loading{
      text-align:center;
      color:var(--muted);
      padding:28px 10px;
    }
    .hidden{display:none!important}

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }
    .post-left{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
    }
    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.10);
      background:#1b2445;
      flex-shrink:0;
    }
    .avatar-placeholder{
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:#1b2445;
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
    }
    .post-top-text{min-width:0}
    .post-name{
      font-size:18px;
      font-weight:800;
      line-height:1.3;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .post-name a{
      color:#fff;
      text-decoration:none;
    }
    .post-name a:hover{
      text-decoration:underline;
    }
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:20px;
      height:20px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:11px;
      font-weight:900;
    }
    .post-username{
      color:#8fdfff;
      font-size:13px;
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .post-date{
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .post-top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
      flex-shrink:0;
    }

    .top-follow-btn,.delete-btn{
      border:none;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .top-follow-btn.follow{
      background:rgba(76,201,255,.14);
      color:#d8f7ff;
      border:1px solid rgba(76,201,255,.20);
    }
    .top-follow-btn.unfollow{
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border:1px solid rgba(255,93,115,.20);
    }
    .top-follow-btn.request{
      background:rgba(167,139,250,.14);
      color:#e8defd;
      border:1px solid rgba(167,139,250,.20);
    }
    .top-follow-btn.requested{
      background:#182248;
      color:#c9d5ff;
      border:1px solid rgba(255,255,255,.06);
    }
    .delete-btn{
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border:1px solid rgba(255,93,115,.20);
    }
    .delete-btn svg{width:14px;height:14px;display:block}

    .meta-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }
    .badge-public{
      background:rgba(76,201,255,.14);
      color:#d8f7ff;
      border:1px solid rgba(76,201,255,.20);
    }
    .badge-private{
      background:rgba(245,185,66,.14);
      color:#ffe7b0;
      border:1px solid rgba(245,185,66,.20);
    }
    .badge-banned{
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border:1px solid rgba(255,93,115,.20);
    }
    .badge-verified{
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
    }

    .post-caption{
      color:#e8eeff;
      line-height:1.8;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }
    .post-image{
      width:100%;
      max-height:620px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:var(--soft2);
      border:1px solid rgba(255,255,255,.06);
      margin-bottom:12px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:4px;
    }
    .icon-action-btn,.icon-report-link{
      border:none;
      cursor:pointer;
      font-weight:800;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
    }
    .icon-action-btn svg,.icon-report-link svg{width:18px;height:18px;display:block;flex-shrink:0}
    .like-btn{
      background:rgba(76,201,255,.14);
      color:#c9f3ff;
    }
    .comment-anchor-btn{
      background:rgba(167,139,250,.14);
      color:#e5ddff;
    }
    .icon-report-link{
      background:rgba(245,185,66,.14);
      color:#ffe7b0;
      border:1px solid rgba(245,185,66,.20);
    }

    .comments-panel-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:12px;
    }
    .comment-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .comment-input{
      flex:1;
      min-width:220px;
      border:none;
      outline:none;
      padding:14px 15px;
      border-radius:16px;
      background:var(--soft2);
      color:#fff;
      border:1px solid rgba(255,255,255,.07);
      font-size:15px;
    }
    .comment-submit{
      background:var(--green);
      color:#062513;
    }
    .comments-list{
      display:grid;
      gap:10px;
    }
    .comment-item{
      background:var(--soft2);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:12px;
    }
    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .comment-author{
      font-weight:800;
      font-size:14px;
      color:#fff;
    }
    .comment-username{
      color:#8fdfff;
      font-size:12px;
      font-weight:700;
      margin-top:2px;
    }
    .comment-date{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
    .comment-text{
      color:#e8eeff;
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border-radius:10px;
      padding:7px 9px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
    }

    .lock-box{
      text-align:center;
      padding:26px 14px;
      background:var(--soft2);
      border-radius:18px;
      border:1px dashed rgba(255,255,255,.08);
    }
    .lock-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:8px;
    }
    .lock-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .empty-box{
      text-align:center;
      padding:28px 10px;
      color:var(--muted);
      background:var(--soft2);
      border-radius:18px;
      border:1px dashed rgba(255,255,255,.08);
    }

    .message{
      min-height:20px;
      font-size:14px;
      margin-top:10px;
    }
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(12,18,35,.92);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    .nav-link{
      text-decoration:none;
      color:#b9c4e3;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
    }
    .nav-link .icon{font-size:18px;line-height:1}

    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{padding:10px 12px}
      .brand{font-size:20px}
      .comment-form{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Post detail</div>
      </div>

      <a href="notifications.html" class="top-icon-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
          <path d="M10 20a2 2 0 0 0 4 0"></path>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading post...</div>

      <div id="postContent" class="hidden">
        <div class="post-top">
          <div class="post-left">
            <img id="avatar" class="avatar hidden" alt="User Photo" />
            <div id="avatarPlaceholder" class="avatar-placeholder">No photo</div>

            <div class="post-top-text">
              <div class="post-name">
                <a id="ownerLink" href="#">Member</a>
                <span id="verifiedDot" class="verified-dot hidden">✓</span>
              </div>
              <div id="ownerUsername" class="post-username hidden">@username</div>
              <div id="postDate" class="post-date">Just now</div>
            </div>
          </div>

          <div class="post-top-actions">
            <button id="topRelationBtn" class="top-follow-btn follow hidden" type="button">Follow</button>

            <a id="reportPostBtn" class="icon-report-link hidden" href="#">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 3v18"></path>
                <path d="M5 4h10l-2.5 4L15 12H5"></path>
              </svg>
              <span>Report</span>
            </a>

            <button id="deleteBtn" class="delete-btn hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
              </svg>
              <span>Delete</span>
            </button>
          </div>
        </div>

        <div id="metaRow" class="meta-row"></div>
        <div id="postCaption" class="post-caption hidden"></div>
        <img id="postImage" class="post-image hidden" alt="Post image" />

        <div class="actions">
          <button id="likeBtn" class="icon-action-btn like-btn" aria-label="Like">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 21s-6.7-4.4-9.2-8C.8 10.5 2 6.8 5.7 6c2.1-.4 3.7.5 4.8 1.8C11.6 6.5 13.2 5.6 15.3 6 19 6.8 20.2 10.5 21.2 13c-2.5 3.6-9.2 8-9.2 8z"></path>
            </svg>
            <span id="likeCount">0</span>
          </button>

          <button id="commentAnchorBtn" class="icon-action-btn comment-anchor-btn" aria-label="Comments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
            </svg>
            <span id="commentCount">0</span>
          </button>

          <a id="reportBottomBtn" class="icon-report-link hidden" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 3v18"></path>
              <path d="M5 4h10l-2.5 4L15 12H5"></path>
            </svg>
            <span>Report</span>
          </a>
        </div>
      </div>
    </div>

    <div id="lockedPanel" class="panel hidden">
      <div class="lock-box">
        <div id="lockedTitle" class="lock-title">Private Post</div>
        <div id="lockedText" class="lock-text">
          You need to follow this member to view this post.
        </div>
      </div>
    </div>

    <div id="commentsPanel" class="panel hidden">
      <div class="comments-panel-title">Comments</div>

      <form id="commentForm" class="comment-form">
        <input id="commentInput" class="comment-input" type="text" placeholder="Write a comment..." />
        <button type="submit" class="icon-action-btn comment-submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2L11 13"></path>
            <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
          </svg>
          <span>Add</span>
        </button>
      </form>

      <div id="formMessage" class="message"></div>
      <div id="commentsList" class="comments-list"></div>
      <div id="commentsEmpty" class="empty-box hidden">No comments yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="events.html" class="nav-link">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      getDocs,
      collection,
      query,
      orderBy,
      addDoc,
      setDoc,
      deleteDoc,
      serverTimestamp,
      where,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const postContent = document.getElementById("postContent");
    const lockedPanel = document.getElementById("lockedPanel");
    const commentsPanel = document.getElementById("commentsPanel");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const ownerLink = document.getElementById("ownerLink");
    const ownerUsername = document.getElementById("ownerUsername");
    const verifiedDot = document.getElementById("verifiedDot");
    const postDate = document.getElementById("postDate");
    const metaRow = document.getElementById("metaRow");
    const postCaption = document.getElementById("postCaption");
    const postImage = document.getElementById("postImage");
    const likeBtn = document.getElementById("likeBtn");
    const likeCount = document.getElementById("likeCount");
    const commentAnchorBtn = document.getElementById("commentAnchorBtn");
    const commentCount = document.getElementById("commentCount");
    const deleteBtn = document.getElementById("deleteBtn");
    const reportPostBtn = document.getElementById("reportPostBtn");
    const reportBottomBtn = document.getElementById("reportBottomBtn");
    const topRelationBtn = document.getElementById("topRelationBtn");
    const lockedTitle = document.getElementById("lockedTitle");
    const lockedText = document.getElementById("lockedText");

    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    const formMessage = document.getElementById("formMessage");
    const commentsList = document.getElementById("commentsList");
    const commentsEmpty = document.getElementById("commentsEmpty");

    let currentUser = null;
    let currentUserProfile = null;
    let currentPostId = null;
    let currentPostData = null;
    let ownerProfile = null;
    let ownerUid = "";
    let relationState = "none";

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "feed.html";
    });

    commentAnchorBtn.addEventListener("click", () => {
      commentsPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => commentInput.focus(), 250);
    });

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    postImage.addEventListener("error", () => {
      postImage.classList.add("hidden");
    });

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        isPrivate: !!(d.isPrivate || d.privateProfile || d.private || d.accountPrivate),
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted,
        verified: !!(d.verified || d.isVerified)
      };
    }

    async function getViewerProfile(uid) {
      let publicData = null;
      let userData = null;

      try {
        const publicSnap = await getDoc(doc(db, "publicProfiles", uid));
        if (publicSnap.exists()) publicData = publicSnap.data();
      } catch {}

      try {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists()) userData = userSnap.data();
      } catch {}

      return normalizeProfile({ ...(publicData || {}), ...(userData || {}), uid }, uid);
    }

    async function getPublicProfile(uid) {
      try {
        const publicSnap = await getDoc(doc(db, "publicProfiles", uid));
        if (publicSnap.exists()) {
          return normalizeProfile({ id: publicSnap.id, ...publicSnap.data() }, uid);
        }
      } catch {}
      return normalizeProfile({ uid }, uid);
    }

    function getPostOwnerId(post) {
      return post?.userId || post?.authorId || post?.ownerId || post?.uid || "";
    }

    function getPostImage(post) {
      return post?.imageURL || post?.imageUrl || post?.photoURL || post?.mediaUrl || "";
    }

    function getPostCaption(post) {
      return post?.caption || post?.text || post?.content || "";
    }

    async function checkFollowing(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return false;

      try {
        const direct = await getDoc(doc(db, "follows", `${viewerUid}__${targetUid}`));
        if (direct.exists()) return true;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follows"),
            where("followerId", "==", viewerUid),
            where("followingId", "==", targetUid),
            limit(1)
          )
        );
        return !snap.empty;
      } catch {
        return false;
      }
    }

    async function checkRequested(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return false;

      try {
        const direct = await getDoc(doc(db, "follow_requests", `${viewerUid}__${targetUid}`));
        if (direct.exists()) return true;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follow_requests"),
            where("requesterId", "==", viewerUid),
            where("targetId", "==", targetUid),
            limit(1)
          )
        );
        return !snap.empty;
      } catch {
        return false;
      }
    }

    async function refreshRelationButton() {
      topRelationBtn.classList.add("hidden");
      topRelationBtn.disabled = false;

      if (!currentUser || !ownerUid || ownerUid === currentUser.uid) return;

      const following = await checkFollowing(currentUser.uid, ownerUid);
      const requested = !following ? await checkRequested(currentUser.uid, ownerUid) : false;

      if (following) {
        relationState = "following";
        topRelationBtn.className = "top-follow-btn unfollow";
        topRelationBtn.textContent = "Unfollow";
      } else if (ownerProfile?.isPrivate && requested) {
        relationState = "requested";
        topRelationBtn.className = "top-follow-btn requested";
        topRelationBtn.textContent = "Requested";
      } else if (ownerProfile?.isPrivate) {
        relationState = "request";
        topRelationBtn.className = "top-follow-btn request";
        topRelationBtn.textContent = "Request";
      } else {
        relationState = "follow";
        topRelationBtn.className = "top-follow-btn follow";
        topRelationBtn.textContent = "Follow";
      }

      topRelationBtn.classList.remove("hidden");
    }

    async function refreshLikeUI() {
      if (!currentPostId || !currentUser) return;

      const likesCol = collection(db, "posts", currentPostId, "likes");
      const likesSnap = await getDocs(likesCol);
      const likeRef = doc(db, "posts", currentPostId, "likes", currentUser.uid);
      const myLike = await getDoc(likeRef);

      const liked = myLike.exists();
      likeBtn.dataset.liked = liked ? "yes" : "no";
      likeCount.textContent = String(likesSnap.size);
    }

    async function refreshCommentsUI() {
      if (!currentPostId || !currentUser) return;

      commentsList.innerHTML = "";

      const commentsQuery = query(
        collection(db, "posts", currentPostId, "comments"),
        orderBy("createdAt", "asc")
      );

      const commentsSnap = await getDocs(commentsQuery);
      commentCount.textContent = String(commentsSnap.size);

      if (commentsSnap.empty) {
        commentsEmpty.classList.remove("hidden");
        return;
      }

      commentsEmpty.classList.add("hidden");

      commentsSnap.forEach((commentDoc) => {
        const comment = commentDoc.data();
        const commentId = commentDoc.id;
        const canDelete = comment.userId === currentUser.uid;

        const commentEl = document.createElement("div");
        commentEl.className = "comment-item";
        commentEl.innerHTML = `
          <div class="comment-top">
            <div>
              <div class="comment-author">${comment.displayName || "Member"}</div>
              ${comment.username ? `<div class="comment-username">@${comment.username}</div>` : ""}
              <div class="comment-date">${formatDate(comment.createdAt)}</div>
            </div>
            ${canDelete ? `<button class="comment-delete-btn" data-comment-id="${commentId}">Delete</button>` : ""}
          </div>
          <div class="comment-text">${comment.text || ""}</div>
        `;

        commentsList.appendChild(commentEl);
      });

      commentsList.querySelectorAll(".comment-delete-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const commentId = btn.getAttribute("data-comment-id");
          const ok = confirm("Delete this comment?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "posts", currentPostId, "comments", commentId));
            await refreshCommentsUI();
          } catch (error) {
            console.error(error);
            setFormMessage("Could not delete comment.", "error");
          }
        });
      });
    }

    function renderMeta(profile, isRemoved) {
      const bits = [
        `<span class="badge ${profile?.isPrivate ? "badge-private" : "badge-public"}">${profile?.isPrivate ? "Private" : "Public"}</span>`
      ];

      if (profile?.verified) {
        bits.push(`<span class="badge badge-verified">Verified</span>`);
      }

      if (isRemoved) {
        bits.push(`<span class="badge badge-banned">Removed</span>`);
      }

      metaRow.innerHTML = bits.join("");
    }

    function setVisibilityMode(showPost) {
      if (showPost) {
        postContent.classList.remove("hidden");
        commentsPanel.classList.remove("hidden");
        lockedPanel.classList.add("hidden");
      } else {
        postContent.classList.add("hidden");
        commentsPanel.classList.add("hidden");
        lockedPanel.classList.remove("hidden");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      currentPostId = new URLSearchParams(window.location.search).get("postId");

      if (!currentPostId) {
        loading.textContent = "No post selected.";
        return;
      }

      try {
        currentUserProfile = await getViewerProfile(user.uid);

        const postSnap = await getDoc(doc(db, "posts", currentPostId));
        if (!postSnap.exists()) {
          loading.textContent = "Post not found.";
          return;
        }

        currentPostData = { id: postSnap.id, ...postSnap.data() };

        if (currentPostData.hidden || currentPostData.hiddenByAdmin || currentPostData.softDeleted) {
          loading.classList.add("hidden");
          lockedTitle.textContent = "Removed Post";
          lockedText.textContent = "This content was removed for policy violation.";
          setVisibilityMode(false);
          return;
        }

        ownerUid = getPostOwnerId(currentPostData);
        if (!ownerUid) {
          loading.textContent = "Post owner not found.";
          return;
        }

        ownerProfile = await getPublicProfile(ownerUid);
        const isRemoved =
          ownerProfile?.moderationStatus === "banned" ||
          ownerProfile?.isHiddenByAdmin ||
          ownerProfile?.softDeleted;

        const alreadyFollowing = await checkFollowing(user.uid, ownerUid);
        const canViewFull = !isRemoved && (
          user.uid === ownerUid ||
          !ownerProfile?.isPrivate ||
          alreadyFollowing
        );

        if (!canViewFull) {
          loading.classList.add("hidden");

          if (isRemoved) {
            lockedTitle.textContent = "Removed Post";
            lockedText.textContent = "This content was removed for policy violation.";
          } else {
            lockedTitle.textContent = "Private Post";
            lockedText.textContent = "You need to follow this member to view this post.";
          }

          setVisibilityMode(false);
          return;
        }

        setVisibilityMode(true);

        showAvatar(ownerProfile?.photoURL || currentPostData.userPhotoURL || "");
        ownerLink.textContent = ownerProfile?.displayName || currentPostData.displayName || "Member";
        ownerLink.href = `member.html?uid=${encodeURIComponent(ownerUid)}`;

        if (ownerProfile?.verified) {
          verifiedDot.classList.remove("hidden");
        } else {
          verifiedDot.classList.add("hidden");
        }

        const ownerHandle = ownerProfile?.username || currentPostData.username || "";
        if (ownerHandle) {
          ownerUsername.textContent = "@" + ownerHandle;
          ownerUsername.classList.remove("hidden");
        } else {
          ownerUsername.classList.add("hidden");
        }

        postDate.textContent = formatDate(currentPostData.createdAt);
        renderMeta(ownerProfile, isRemoved);

        const caption = getPostCaption(currentPostData);
        if (caption) {
          postCaption.textContent = caption;
          postCaption.classList.remove("hidden");
        } else {
          postCaption.classList.add("hidden");
        }

        const imageUrl = getPostImage(currentPostData);
        if (imageUrl) {
          postImage.src = imageUrl;
          postImage.classList.remove("hidden");
        } else {
          postImage.classList.add("hidden");
        }

        if (currentUser.uid === ownerUid) {
          deleteBtn.classList.remove("hidden");
        } else {
          reportPostBtn.classList.remove("hidden");
          reportBottomBtn.classList.remove("hidden");
          const reportHref = `report.html?type=post&targetId=${encodeURIComponent(currentPostId)}&targetUserId=${encodeURIComponent(ownerUid)}`;
          reportPostBtn.href = reportHref;
          reportBottomBtn.href = reportHref;
        }

        await refreshRelationButton();
        await refreshLikeUI();
        await refreshCommentsUI();

        loading.classList.add("hidden");
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load post.";
      }
    });

    topRelationBtn.addEventListener("click", async () => {
      if (!currentUser || !ownerUid || ownerUid === currentUser.uid) return;

      topRelationBtn.disabled = true;

      try {
        if (relationState === "following") {
          await deleteDoc(doc(db, "follows", `${currentUser.uid}__${ownerUid}`));
        } else if (relationState === "requested") {
          await deleteDoc(doc(db, "follow_requests", `${currentUser.uid}__${ownerUid}`));
        } else if (relationState === "request") {
          await setDoc(doc(db, "follow_requests", `${currentUser.uid}__${ownerUid}`), {
            requesterId: currentUser.uid,
            targetId: ownerUid,
            createdAt: serverTimestamp()
          });
        } else if (relationState === "follow") {
          await setDoc(doc(db, "follows", `${currentUser.uid}__${ownerUid}`), {
            followerId: currentUser.uid,
            followingId: ownerUid,
            createdAt: serverTimestamp()
          });
        }

        await refreshRelationButton();
      } catch (error) {
        console.error("Relation update failed:", error);
        setFormMessage("Could not update follow state.", "error");
      }

      topRelationBtn.disabled = false;
    });

    likeBtn.addEventListener("click", async () => {
      if (!currentUser || !currentPostId || !currentPostData) return;

      const likeRef = doc(db, "posts", currentPostId, "likes", currentUser.uid);
      likeBtn.disabled = true;
      let createdNewLike = false;

      try {
        const existing = await getDoc(likeRef);

        if (existing.exists()) {
          await deleteDoc(likeRef);
        } else {
          await setDoc(likeRef, {
            userId: currentUser.uid,
            createdAt: serverTimestamp()
          });
          createdNewLike = true;
        }

        await refreshLikeUI();
        setFormMessage("", "");
      } catch (error) {
        console.error("LIKE WRITE FAILED:", error);
        setFormMessage("Like save failed: " + (error?.message || "Unknown error"), "error");
        likeBtn.disabled = false;
        return;
      }

      if (createdNewLike && ownerUid && ownerUid !== currentUser.uid) {
        try {
          const actorName =
            currentUserProfile?.displayName ||
            currentUser.displayName ||
            "Someone";

          await addDoc(collection(db, "notifications", ownerUid, "items"), {
            type: "like",
            title: "New like",
            text: `${actorName} liked your post.`,
            fromUserId: currentUser.uid,
            toUserId: ownerUid,
            postId: currentPostId,
            createdAt: serverTimestamp(),
            isRead: false
          });
        } catch (notifyErr) {
          console.error("LIKE NOTIFICATION FAILED:", notifyErr);
        }
      }

      likeBtn.disabled = false;
    });

    commentForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser || !currentPostId || !currentPostData) return;

      const text = commentInput.value.trim();
      if (!text) return;

      const displayName =
        currentUserProfile?.displayName ||
        currentUser.displayName ||
        "Member";

      const username = currentUserProfile?.username || "";
      const userPhotoURL = currentUserProfile?.photoURL || "";
      const submitBtn = commentForm.querySelector("button");
      submitBtn.disabled = true;

      let commentSaved = false;

      try {
        await addDoc(collection(db, "posts", currentPostId, "comments"), {
          userId: currentUser.uid,
          displayName,
          username,
          userPhotoURL,
          text,
          createdAt: serverTimestamp()
        });

        commentSaved = true;
        commentInput.value = "";
        await refreshCommentsUI();
        setFormMessage("Comment added.", "success");
      } catch (error) {
        console.error("COMMENT WRITE FAILED:", error);
        setFormMessage("Comment save failed: " + (error?.message || "Unknown error"), "error");
        submitBtn.disabled = false;
        return;
      }

      if (commentSaved && ownerUid && ownerUid !== currentUser.uid) {
        try {
          await addDoc(collection(db, "notifications", ownerUid, "items"), {
            type: "comment",
            title: "New comment",
            text: `${displayName} commented on your post.`,
            fromUserId: currentUser.uid,
            toUserId: ownerUid,
            postId: currentPostId,
            createdAt: serverTimestamp(),
            isRead: false
          });
        } catch (notifyErr) {
          console.error("COMMENT NOTIFICATION FAILED:", notifyErr);
          setFormMessage("Comment added. Notification failed only.", "success");
        }
      }

      submitBtn.disabled = false;
    });

    deleteBtn.addEventListener("click", async () => {
      if (!currentPostId) return;

      const ok = confirm("Delete this post?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "posts", currentPostId));
        window.location.href = "profile.html";
      } catch (error) {
        console.error(error);
        setFormMessage("Could not delete post.", "error");
      }
    });
  </script>
</body>
</html>
