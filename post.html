<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Post</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
      --purple:#a78bfa;
      --yellow:#f5b942;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --red:#e74c66;
      --purple:#7f63ff;
      --yellow:#d59617;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }
    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:18px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:10px;color:var(--muted);margin-top:2px}

    .shell{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }
    .section{
      padding:14px;
      border-bottom:1px solid var(--line-soft);
    }
    .section:last-child{border-bottom:none}

    .loading{
      text-align:center;
      color:var(--muted);
      padding:28px 10px;
      font-size:14px;
    }
    .message{
      min-height:20px;
      font-size:14px;
      margin-top:10px;
    }
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }
    .post-left{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }
    .avatar-placeholder{
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      background:var(--surface-3);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      flex-shrink:0;
    }

    .post-top-text{min-width:0}
    .post-name-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .post-name{
      font-size:18px;
      font-weight:800;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }
    .post-name a{
      color:var(--text);
      text-decoration:none;
    }
    .post-name a:hover{text-decoration:underline}

    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:20px;
      height:20px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:11px;
      font-weight:900;
    }

    .post-username{
      color:var(--blue);
      font-size:13px;
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .post-date{
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .post-top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
      flex-shrink:0;
    }

    .top-follow-btn,.delete-btn,.mini-report-btn{
      border:none;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:36px;
    }
    .top-follow-btn.follow{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .top-follow-btn.unfollow{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .top-follow-btn.request{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }
    .top-follow-btn.requested{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .top-follow-btn:disabled,.delete-btn:disabled,.icon-action-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
    .delete-btn{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .delete-btn svg,.mini-report-btn svg{width:14px;height:14px;display:block}
    .mini-report-btn{
      background:rgba(245,185,66,.14);
      color:var(--text);
      border:1px solid rgba(245,185,66,.20);
    }

    .meta-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }
    .badge-private{
      background:rgba(245,185,66,.14);
      color:var(--text);
      border:1px solid rgba(245,185,66,.20);
    }
    .badge-banned{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .badge-verified{
      background:rgba(61,220,132,.14);
      color:var(--text);
      border:1px solid rgba(61,220,132,.20);
    }

    .post-caption{
      color:var(--text);
      line-height:1.75;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }
    .post-image{
      width:100%;
      max-height:620px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:var(--surface-2);
      border:1px solid var(--line);
      margin-bottom:12px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:4px;
    }
    .icon-action-btn,.icon-report-link{
      border:none;
      cursor:pointer;
      font-weight:800;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:var(--text);
    }
    .icon-action-btn svg,.icon-report-link svg{width:18px;height:18px;display:block;flex-shrink:0}
    .like-btn{
      background:rgba(76,201,255,.14);
      border:1px solid rgba(76,201,255,.20);
    }
    .comment-anchor-btn{
      background:rgba(167,139,250,.14);
      border:1px solid rgba(167,139,250,.20);
    }
    .icon-report-link{
      background:rgba(245,185,66,.14);
      border:1px solid rgba(245,185,66,.20);
    }

    .comments-panel-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:12px;
    }
    .comment-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .comment-input{
      flex:1;
      min-width:220px;
      border:none;
      outline:none;
      padding:14px 15px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:15px;
    }
    .comment-input::placeholder{color:var(--muted)}
    .comment-submit{
      background:rgba(61,220,132,.16);
      border:1px solid rgba(61,220,132,.20);
      color:var(--text);
    }

    .comments-list{
      display:grid;
      gap:10px;
    }
    .comment-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .comment-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .comment-author{
      font-weight:800;
      font-size:14px;
      color:var(--text);
    }
    .comment-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
    }
    .comment-date{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
    .comment-text{
      color:var(--text);
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .comment-delete-btn{
      border:none;
      background:rgba(255,93,115,.14);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      border:1px solid rgba(255,93,115,.20);
    }

    .lock-box{
      text-align:center;
      padding:26px 14px;
      background:var(--surface-2);
      border-radius:18px;
      border:1px dashed var(--line);
    }
    .lock-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:8px;
    }
    .lock-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }
    .lock-action-wrap{
      margin-top:14px;
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty-box{
      text-align:center;
      padding:28px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:18px;
      border:1px dashed var(--line);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{font-size:18px;line-height:1;display:block}

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .comment-form{flex-direction:column}
      .post-top{flex-direction:column}
      .post-top-actions{width:100%;justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Post detail</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div class="shell">
      <div class="section">
        <div id="loading" class="loading">Loading post...</div>
        <div id="pageMessage" class="message"></div>

        <div id="postContent" class="hidden">
          <div class="post-top">
            <div class="post-left">
              <img id="avatar" class="avatar hidden" alt="User Photo" />
              <div id="avatarPlaceholder" class="avatar-placeholder">No photo</div>

              <div class="post-top-text">
                <div class="post-name-row">
                  <div class="post-name">
                    <a id="ownerLink" href="#">Member</a>
                    <span id="verifiedDot" class="verified-dot hidden">✓</span>
                  </div>
                </div>
                <div id="ownerUsername" class="post-username hidden">@username</div>
                <div id="postDate" class="post-date">Just now</div>
              </div>
            </div>

            <div class="post-top-actions">
              <a id="topReportBtn" class="mini-report-btn hidden" href="#">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M5 3v18"></path>
                  <path d="M5 4h10l-2.5 4L15 12H5"></path>
                </svg>
                <span>Report</span>
              </a>

              <button id="topRelationBtn" class="top-follow-btn follow hidden" type="button">Follow</button>

              <button id="deleteBtn" class="delete-btn hidden" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 6h18"></path>
                  <path d="M8 6V4h8v2"></path>
                  <path d="M19 6l-1 14H6L5 6"></path>
                </svg>
                <span>Delete</span>
              </button>
            </div>
          </div>

          <div id="metaRow" class="meta-row"></div>
          <div id="postCaption" class="post-caption hidden"></div>
          <img id="postImage" class="post-image hidden" alt="Post image" />

          <div class="actions">
            <button id="likeBtn" class="icon-action-btn like-btn" aria-label="Like" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 21s-6.7-4.4-9.2-8C.8 10.5 2 6.8 5.7 6c2.1-.4 3.7.5 4.8 1.8C11.6 6.5 13.2 5.6 15.3 6 19 6.8 20.2 10.5 21.2 13c-2.5 3.6-9.2 8-9.2 8z"></path>
              </svg>
              <span id="likeCount">0</span>
            </button>

            <button id="commentAnchorBtn" class="icon-action-btn comment-anchor-btn" aria-label="Comments" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              <span id="commentCount">0</span>
            </button>
          </div>
        </div>
      </div>

      <div id="lockedPanel" class="section hidden">
        <div class="lock-box">
          <div id="lockedTitle" class="lock-title">Private Post</div>
          <div id="lockedText" class="lock-text">
            You need to follow this member to view this post.
          </div>
          <div class="lock-action-wrap">
            <button id="lockedRelationBtn" class="top-follow-btn follow hidden" type="button">Follow</button>
          </div>
        </div>
      </div>

      <div id="commentsPanel" class="section hidden">
        <div class="comments-panel-title">Comments</div>

        <form id="commentForm" class="comment-form">
          <input id="commentInput" class="comment-input" type="text" placeholder="Write a comment..." maxlength="1000" />
          <button type="submit" class="icon-action-btn comment-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 2L11 13"></path>
              <path d="M22 2L15 22l-4-9-9-4 20-7z"></path>
            </svg>
            <span>Add</span>
          </button>
        </form>

        <div id="formMessage" class="message"></div>
        <div id="commentsList" class="comments-list"></div>
        <div id="commentsEmpty" class="empty-box hidden">No comments yet.</div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      getDocs,
      collection,
      query,
      orderBy,
      addDoc,
      setDoc,
      deleteDoc,
      serverTimestamp,
      where,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const pageMessage = document.getElementById("pageMessage");
    const postContent = document.getElementById("postContent");
    const lockedPanel = document.getElementById("lockedPanel");
    const commentsPanel = document.getElementById("commentsPanel");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const ownerLink = document.getElementById("ownerLink");
    const ownerUsername = document.getElementById("ownerUsername");
    const verifiedDot = document.getElementById("verifiedDot");
    const postDate = document.getElementById("postDate");
    const metaRow = document.getElementById("metaRow");
    const postCaption = document.getElementById("postCaption");
    const postImage = document.getElementById("postImage");
    const likeBtn = document.getElementById("likeBtn");
    const likeCount = document.getElementById("likeCount");
    const commentAnchorBtn = document.getElementById("commentAnchorBtn");
    const commentCount = document.getElementById("commentCount");
    const deleteBtn = document.getElementById("deleteBtn");
    const topReportBtn = document.getElementById("topReportBtn");
    const topRelationBtn = document.getElementById("topRelationBtn");
    const lockedTitle = document.getElementById("lockedTitle");
    const lockedText = document.getElementById("lockedText");
    const lockedRelationBtn = document.getElementById("lockedRelationBtn");

    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    const formMessage = document.getElementById("formMessage");
    const commentsList = document.getElementById("commentsList");
    const commentsEmpty = document.getElementById("commentsEmpty");

    let currentUser = null;
    let currentUserProfile = null;
    let currentPostId = null;
    let currentPostData = null;
    let ownerProfile = null;
    let ownerUid = "";
    let relationState = "none";

    const relationButtons = [topRelationBtn, lockedRelationBtn];

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "feed.html";
    });

    commentAnchorBtn.addEventListener("click", () => {
      if (commentsPanel.classList.contains("hidden")) return;
      commentsPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => commentInput.focus(), 250);
    });

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    postImage.addEventListener("error", () => {
      postImage.classList.add("hidden");
    });

    function setPageMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function setFormMessage(text, type = "") {
      formMessage.textContent = text;
      formMessage.className = `message ${type}`;
    }

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        isPrivate: !!(d.isPrivate || d.privateProfile || d.private || d.accountPrivate),
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted,
        verified: !!(d.verified || d.isVerified)
      };
    }

    async function getViewerProfile(uid) {
      let publicData = null;
      let userData = null;

      try {
        const publicSnap = await getDoc(doc(db, "publicProfiles", uid));
        if (publicSnap.exists()) publicData = publicSnap.data();
      } catch {}

      try {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists()) userData = userSnap.data();
      } catch {}

      return normalizeProfile({ ...(publicData || {}), ...(userData || {}), uid }, uid);
    }

    async function getPublicProfile(uid) {
      try {
        const publicSnap = await getDoc(doc(db, "publicProfiles", uid));
        if (publicSnap.exists()) {
          return normalizeProfile({ id: publicSnap.id, ...publicSnap.data() }, uid);
        }
      } catch {}
      return normalizeProfile({ uid }, uid);
    }

    function getPostOwnerId(post) {
      return post?.userId || post?.authorId || post?.ownerId || post?.uid || "";
    }

    function getPostImage(post) {
      return post?.imageURL || post?.imageUrl || post?.photoURL || post?.mediaUrl || "";
    }

    function getPostCaption(post) {
      return post?.caption || post?.text || post?.content || "";
    }

    async function checkFollowing(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return false;

      try {
        const direct = await getDoc(doc(db, "follows", `${viewerUid}__${targetUid}`));
        if (direct.exists()) return true;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follows"),
            where("followerId", "==", viewerUid),
            where("followingId", "==", targetUid),
            limit(1)
          )
        );
        return !snap.empty;
      } catch {
        return false;
      }
    }

    async function checkRequested(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return false;

      try {
        const direct = await getDoc(doc(db, "follow_requests", `${viewerUid}__${targetUid}`));
        if (direct.exists()) return true;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follow_requests"),
            where("requesterId", "==", viewerUid),
            where("targetId", "==", targetUid),
            limit(1)
          )
        );
        return !snap.empty;
      } catch {
        return false;
      }
    }

    async function findFollowDocId(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return null;

      try {
        const directId = `${viewerUid}__${targetUid}`;
        const direct = await getDoc(doc(db, "follows", directId));
        if (direct.exists()) return directId;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follows"),
            where("followerId", "==", viewerUid),
            where("followingId", "==", targetUid),
            limit(1)
          )
        );
        if (!snap.empty) return snap.docs[0].id;
      } catch {}

      return null;
    }

    async function findRequestDocId(viewerUid, targetUid) {
      if (!viewerUid || !targetUid) return null;

      try {
        const directId = `${viewerUid}__${targetUid}`;
        const direct = await getDoc(doc(db, "follow_requests", directId));
        if (direct.exists()) return directId;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follow_requests"),
            where("requesterId", "==", viewerUid),
            where("targetId", "==", targetUid),
            limit(1)
          )
        );
        if (!snap.empty) return snap.docs[0].id;
      } catch {}

      return null;
    }

    function styleRelationButton(btn, state) {
      if (!btn) return;

      if (!currentUser || !ownerUid || ownerUid === currentUser.uid) {
        btn.classList.add("hidden");
        return;
      }

      btn.classList.remove("hidden");

      if (state === "following") {
        btn.className = "top-follow-btn unfollow";
        btn.textContent = "Unfollow";
      } else if (state === "requested") {
        btn.className = "top-follow-btn requested";
        btn.textContent = "Requested";
      } else if (state === "request") {
        btn.className = "top-follow-btn request";
        btn.textContent = "Request";
      } else {
        btn.className = "top-follow-btn follow";
        btn.textContent = "Follow";
      }
    }

    async function refreshRelationButtons() {
      relationButtons.forEach(btn => {
        if (btn) {
          btn.disabled = false;
          btn.classList.add("hidden");
        }
      });

      if (!currentUser || !ownerUid || ownerUid === currentUser.uid || !ownerProfile) return;

      const following = await checkFollowing(currentUser.uid, ownerUid);
      const requested = !following ? await checkRequested(currentUser.uid, ownerUid) : false;

      if (following) relationState = "following";
      else if (ownerProfile.isPrivate && requested) relationState = "requested";
      else if (ownerProfile.isPrivate) relationState = "request";
      else relationState = "follow";

      relationButtons.forEach(btn => styleRelationButton(btn, relationState));
    }

    async function handleRelationAction() {
      if (!currentUser || !ownerUid || ownerUid === currentUser.uid) return;

      relationButtons.forEach(btn => btn.disabled = true);
      setPageMessage("");

      try {
        if (relationState === "following") {
          const followDocId = await findFollowDocId(currentUser.uid, ownerUid);
          if (followDocId) {
            await deleteDoc(doc(db, "follows", followDocId));
          }
        } else if (relationState === "requested") {
          const requestDocId = await findRequestDocId(currentUser.uid, ownerUid);
          if (requestDocId) {
            await deleteDoc(doc(db, "follow_requests", requestDocId));
          }
        } else if (relationState === "request") {
          await setDoc(doc(db, "follow_requests", `${currentUser.uid}__${ownerUid}`), {
            requesterId: currentUser.uid,
            targetId: ownerUid,
            createdAt: serverTimestamp()
          });
        } else if (relationState === "follow") {
          await setDoc(doc(db, "follows", `${currentUser.uid}__${ownerUid}`), {
            followerId: currentUser.uid,
            followingId: ownerUid,
            createdAt: serverTimestamp()
          });
        }

        await refreshRelationButtons();

        if (!lockedPanel.classList.contains("hidden")) {
          const followingNow = await checkFollowing(currentUser.uid, ownerUid);
          if (!ownerProfile.isPrivate || followingNow) {
            location.reload();
            return;
          }
        }
      } catch (error) {
        console.error("Relation update failed:", error);
        setPageMessage("Could not update follow state.", "error");
      }

      relationButtons.forEach(btn => btn.disabled = false);
    }

    topRelationBtn.addEventListener("click", handleRelationAction);
    lockedRelationBtn.addEventListener("click", handleRelationAction);

    async function refreshLikeUI() {
      if (!currentPostId || !currentUser) return;

      const likesCol = collection(db, "posts", currentPostId, "likes");
      const likesSnap = await getDocs(likesCol);
      const likeRef = doc(db, "posts", currentPostId, "likes", currentUser.uid);
      const myLike = await getDoc(likeRef);

      const liked = myLike.exists();
      likeBtn.dataset.liked = liked ? "yes" : "no";
      likeCount.textContent = String(likesSnap.size);
    }

    function buildCommentElement(commentDoc) {
      const comment = commentDoc.data();
      const commentId = commentDoc.id;
      const canDelete = comment.userId === currentUser.uid || ownerUid === currentUser.uid;

      const wrap = document.createElement("div");
      wrap.className = "comment-item";

      const top = document.createElement("div");
      top.className = "comment-top";

      const left = document.createElement("div");

      const author = document.createElement("div");
      author.className = "comment-author";
      author.textContent = comment.displayName || "Member";
      left.appendChild(author);

      if (comment.username) {
        const username = document.createElement("div");
        username.className = "comment-username";
        username.textContent = "@" + comment.username;
        left.appendChild(username);
      }

      const date = document.createElement("div");
      date.className = "comment-date";
      date.textContent = formatDate(comment.createdAt);
      left.appendChild(date);

      top.appendChild(left);

      if (canDelete) {
        const delBtn = document.createElement("button");
        delBtn.className = "comment-delete-btn";
        delBtn.type = "button";
        delBtn.textContent = "Delete";
        delBtn.addEventListener("click", async () => {
          const ok = confirm("Delete this comment?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "posts", currentPostId, "comments", commentId));
            await refreshCommentsUI();
          } catch (error) {
            console.error(error);
            setFormMessage("Could not delete comment.", "error");
          }
        });
        top.appendChild(delBtn);
      }

      const text = document.createElement("div");
      text.className = "comment-text";
      text.textContent = comment.text || "";

      wrap.appendChild(top);
      wrap.appendChild(text);

      return wrap;
    }

    async function refreshCommentsUI() {
      if (!currentPostId || !currentUser) return;

      commentsList.innerHTML = "";

      const commentsQuery = query(
        collection(db, "posts", currentPostId, "comments"),
        orderBy("createdAt", "asc")
      );

      const commentsSnap = await getDocs(commentsQuery);
      commentCount.textContent = String(commentsSnap.size);

      if (commentsSnap.empty) {
        commentsEmpty.classList.remove("hidden");
        return;
      }

      commentsEmpty.classList.add("hidden");

      commentsSnap.forEach((commentDoc) => {
        commentsList.appendChild(buildCommentElement(commentDoc));
      });
    }

    function renderMeta(profile, isRemoved) {
      const bits = [];

      if (profile?.isPrivate) {
        bits.push(`<span class="badge badge-private">Private</span>`);
      }

      if (profile?.verified) {
        bits.push(`<span class="badge badge-verified">Verified</span>`);
      }

      if (isRemoved) {
        bits.push(`<span class="badge badge-banned">Removed</span>`);
      }

      metaRow.innerHTML = bits.join("");
      metaRow.classList.toggle("hidden", bits.length === 0);
    }

    function setVisibilityMode(showPost) {
      if (showPost) {
        postContent.classList.remove("hidden");
        commentsPanel.classList.remove("hidden");
        lockedPanel.classList.add("hidden");
      } else {
        postContent.classList.add("hidden");
        commentsPanel.classList.add("hidden");
        lockedPanel.classList.remove("hidden");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      currentPostId = new URLSearchParams(window.location.search).get("postId");

      if (!currentPostId) {
        loading.textContent = "No post selected.";
        return;
      }

      try {
        currentUserProfile = await getViewerProfile(user.uid);

        const postSnap = await getDoc(doc(db, "posts", currentPostId));
        if (!postSnap.exists()) {
          loading.textContent = "Post not found.";
          return;
        }

        currentPostData = { id: postSnap.id, ...postSnap.data() };
        ownerUid = getPostOwnerId(currentPostData);

        if (!ownerUid) {
          loading.textContent = "Post owner not found.";
          return;
        }

        ownerProfile = await getPublicProfile(ownerUid);

        const isRemoved =
          currentPostData.hidden ||
          currentPostData.hiddenByAdmin ||
          currentPostData.softDeleted ||
          ownerProfile?.moderationStatus === "banned" ||
          ownerProfile?.isHiddenByAdmin ||
          ownerProfile?.softDeleted;

        const alreadyFollowing = await checkFollowing(user.uid, ownerUid);
        const canViewFull = !isRemoved && (
          user.uid === ownerUid ||
          !ownerProfile?.isPrivate ||
          alreadyFollowing
        );

        if (!isRemoved) {
          await refreshRelationButtons();
        }

        if (!canViewFull) {
          loading.classList.add("hidden");

          if (isRemoved) {
            lockedTitle.textContent = "Removed Post";
            lockedText.textContent = "This content was removed for policy violation.";
            lockedRelationBtn.classList.add("hidden");
          } else {
            lockedTitle.textContent = "Private Post";
            lockedText.textContent = "You need to follow this member to view this post.";
          }

          setVisibilityMode(false);
          return;
        }

        setVisibilityMode(true);

        showAvatar(ownerProfile?.photoURL || currentPostData.userPhotoURL || "");
        ownerLink.textContent = ownerProfile?.displayName || currentPostData.displayName || "Member";
        ownerLink.href = `member.html?uid=${encodeURIComponent(ownerUid)}`;

        if (ownerProfile?.verified) {
          verifiedDot.classList.remove("hidden");
        } else {
          verifiedDot.classList.add("hidden");
        }

        const ownerHandle = ownerProfile?.username || currentPostData.username || "";
        if (ownerHandle) {
          ownerUsername.textContent = "@" + ownerHandle;
          ownerUsername.classList.remove("hidden");
        } else {
          ownerUsername.classList.add("hidden");
        }

        postDate.textContent = formatDate(currentPostData.createdAt);
        renderMeta(ownerProfile, isRemoved);

        const caption = getPostCaption(currentPostData);
        if (caption) {
          postCaption.textContent = caption;
          postCaption.classList.remove("hidden");
        } else {
          postCaption.classList.add("hidden");
        }

        const imageUrl = getPostImage(currentPostData);
        if (imageUrl) {
          postImage.src = imageUrl;
          postImage.classList.remove("hidden");
        } else {
          postImage.classList.add("hidden");
        }

        if (currentUser.uid === ownerUid) {
          deleteBtn.classList.remove("hidden");
          topReportBtn.classList.add("hidden");
        } else {
          deleteBtn.classList.add("hidden");
          topReportBtn.classList.remove("hidden");
          topReportBtn.href = `report.html?type=post&targetId=${encodeURIComponent(currentPostId)}&targetUserId=${encodeURIComponent(ownerUid)}`;
        }

        await refreshLikeUI();
        await refreshCommentsUI();

        loading.classList.add("hidden");
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load post.";
      }
    });

    likeBtn.addEventListener("click", async () => {
      if (!currentUser || !currentPostId || !currentPostData) return;

      const likeRef = doc(db, "posts", currentPostId, "likes", currentUser.uid);
      likeBtn.disabled = true;
      let createdNewLike = false;

      try {
        const existing = await getDoc(likeRef);

        if (existing.exists()) {
          await deleteDoc(likeRef);
        } else {
          await setDoc(likeRef, {
            userId: currentUser.uid,
            createdAt: serverTimestamp()
          });
          createdNewLike = true;
        }

        await refreshLikeUI();
        setPageMessage("");
      } catch (error) {
        console.error("LIKE WRITE FAILED:", error);
        setPageMessage("Like save failed: " + (error?.message || "Unknown error"), "error");
        likeBtn.disabled = false;
        return;
      }

      if (createdNewLike && ownerUid && ownerUid !== currentUser.uid) {
        try {
          const actorName =
            currentUserProfile?.displayName ||
            currentUser.displayName ||
            "Someone";

          await addDoc(collection(db, "notifications", ownerUid, "items"), {
            type: "like",
            title: "New like",
            text: `${actorName} liked your post.`,
            fromUserId: currentUser.uid,
            toUserId: ownerUid,
            postId: currentPostId,
            createdAt: serverTimestamp(),
            isRead: false
          });
        } catch (notifyErr) {
          console.error("LIKE NOTIFICATION FAILED:", notifyErr);
        }
      }

      likeBtn.disabled = false;
    });

    commentForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser || !currentPostId || !currentPostData) return;

      const text = commentInput.value.trim();
      if (!text) return;

      const displayName =
        currentUserProfile?.displayName ||
        currentUser.displayName ||
        "Member";

      const username = currentUserProfile?.username || "";
      const userPhotoURL = currentUserProfile?.photoURL || "";
      const submitBtn = commentForm.querySelector("button");
      submitBtn.disabled = true;

      let commentSaved = false;

      try {
        await addDoc(collection(db, "posts", currentPostId, "comments"), {
          userId: currentUser.uid,
          displayName,
          username,
          userPhotoURL,
          text,
          createdAt: serverTimestamp()
        });

        commentSaved = true;
        commentInput.value = "";
        await refreshCommentsUI();
        setFormMessage("Comment added.", "success");
      } catch (error) {
        console.error("COMMENT WRITE FAILED:", error);
        setFormMessage("Comment save failed: " + (error?.message || "Unknown error"), "error");
        submitBtn.disabled = false;
        return;
      }

      if (commentSaved && ownerUid && ownerUid !== currentUser.uid) {
        try {
          await addDoc(collection(db, "notifications", ownerUid, "items"), {
            type: "comment",
            title: "New comment",
            text: `${displayName} commented on your post.`,
            fromUserId: currentUser.uid,
            toUserId: ownerUid,
            postId: currentPostId,
            createdAt: serverTimestamp(),
            isRead: false
          });
        } catch (notifyErr) {
          console.error("COMMENT NOTIFICATION FAILED:", notifyErr);
        }
      }

      submitBtn.disabled = false;
    });

    deleteBtn.addEventListener("click", async () => {
      if (!currentPostId) return;

      const ok = confirm("Delete this post?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "posts", currentPostId));
        window.location.href = "profile.html";
      } catch (error) {
        console.error(error);
        setPageMessage("Could not delete post.", "error");
      }
    });
  </script>
</body>
</html>
