<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Search</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.045);
      --blue-soft:rgba(76,201,255,.13);
      --green-soft:rgba(61,220,132,.13);
      --yellow-soft:rgba(245,185,66,.13);
      --purple-soft:rgba(167,139,250,.13);
      --red-soft:rgba(255,93,115,.13);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.12);
      --blue-soft:rgba(76,201,255,.13);
      --green-soft:rgba(61,220,132,.13);
      --yellow-soft:rgba(245,185,66,.13);
      --purple-soft:rgba(167,139,250,.13);
      --red-soft:rgba(255,93,115,.13);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn.refresh-top{
      background:var(--green-soft);
      border-color:rgba(61,220,132,.22);
    }

    .top-icon-btn svg{
      width:17px;
      height:17px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
    }

    .hero-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:8px;
      margin-bottom:7px;
    }

    .hero-title{
      font-size:16px;
      font-weight:950;
      line-height:1.15;
      letter-spacing:-.03em;
      margin-bottom:2px;
    }

    .hero-sub{
      color:var(--muted);
      font-size:10.5px;
      line-height:1.35;
    }

    .search-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      border-radius:999px;
      font-size:10.2px;
      font-weight:950;
      border:1px solid rgba(76,201,255,.22);
      background:var(--blue-soft);
      color:var(--text);
      white-space:nowrap;
    }

    .search-wrap{
      position:relative;
      margin-bottom:7px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:10px 39px 10px 11px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:12.5px;
      min-height:38px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:5px;
      top:50%;
      transform:translateY(-50%);
      width:29px;
      height:29px;
      border:none;
      border-radius:9px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:950;
      line-height:1;
    }

    .chip-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:5px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 3px;
      border-radius:11px;
      font-size:9.4px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      min-height:30px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip-blue{background:var(--blue-soft);border-color:rgba(76,201,255,.20)}
    .chip-green{background:var(--green-soft);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:var(--yellow-soft);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:var(--purple-soft);border-color:rgba(167,139,250,.20)}
    .chip-red{background:var(--red-soft);border-color:rgba(255,93,115,.20)}

    .tabs{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:5px;
      margin-bottom:7px;
    }

    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:11px;
      padding:7px 2px;
      font-weight:950;
      font-size:9.7px;
      cursor:pointer;
      min-height:32px;
      white-space:nowrap;
    }

    .tab-btn.active{
      background:var(--blue-soft);
      border-color:rgba(76,201,255,.22);
    }

    .section-title{
      font-size:13.5px;
      font-weight:950;
      margin-bottom:7px;
      letter-spacing:-.02em;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:18px 8px;
      background:var(--surface-2);
      border-radius:14px;
      border:1px dashed var(--line);
      font-size:12.5px;
      line-height:1.45;
      font-weight:850;
    }

    .list{display:grid;gap:6px}

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      box-shadow:var(--soft-shadow);
    }

    .person-card{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .person-avatar,
    .person-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:14px;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .person-avatar{object-fit:cover}

    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      font-size:18px;
      font-weight:950;
      text-align:center;
      padding:6px;
      background:
        radial-gradient(circle at 24% 20%, rgba(76,201,255,.22), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.14), rgba(61,220,132,.10)),
        var(--surface-3);
    }

    .person-body{min-width:0;flex:1}

    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:7px;
      min-width:0;
    }

    .person-main{min-width:0;flex:1}

    .person-name{
      font-size:13px;
      font-weight:950;
      line-height:1.2;
      display:flex;
      align-items:center;
      gap:5px;
      flex-wrap:wrap;
      min-width:0;
    }

    .person-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .verified-badge{
      width:16px;
      height:16px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#ffffff;
      border:1.4px solid rgba(255,255,255,.92);
      flex-shrink:0;
    }

    /* FINAL OwnSpace badge color logic:
       Verified Account = green tick
       Verified Creator = blue tick
       Verified Business = gold tick
    */
    .verified-badge.verified-account,
    .verified-badge.badge-account,
    .verified-badge.account{
      background:linear-gradient(135deg,var(--green),#15975a);
      color:#ffffff;
      box-shadow:0 0 0 2px rgba(61,220,132,.14),0 6px 12px rgba(34,179,108,.14);
    }

    .verified-badge.verified-creator,
    .verified-badge.badge-creator,
    .verified-badge.creator{
      background:linear-gradient(135deg,var(--blue),#1474d4);
      color:#ffffff;
      box-shadow:0 0 0 2px rgba(76,201,255,.14),0 6px 12px rgba(31,143,255,.14);
    }

    .verified-badge.verified-business,
    .verified-badge.badge-business,
    .verified-badge.business{
      background:linear-gradient(135deg,#f7c957,var(--yellow));
      color:#3f2a00;
      box-shadow:0 0 0 2px rgba(245,185,66,.18),0 6px 12px rgba(213,150,23,.16);
    }

    .verified-badge svg{
      width:9px;
      height:9px;
      display:block;
      stroke-width:3;
    }

    .person-username{
      font-size:10.8px;
      color:var(--blue);
      font-weight:850;
      margin-top:1px;
      word-break:break-word;
    }

    .person-meta-line{
      font-size:10.8px;
      color:var(--muted);
      line-height:1.35;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small-pill,
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
      line-height:1;
    }

    .pill-blue,.mini-blue{background:var(--blue-soft);border-color:rgba(76,201,255,.20)}
    .pill-green,.mini-green{background:var(--green-soft);border-color:rgba(61,220,132,.20)}
    .pill-yellow,.mini-yellow{background:var(--yellow-soft);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:var(--purple-soft);border-color:rgba(167,139,250,.20)}
    .mini-red{background:var(--red-soft);border-color:rgba(255,93,115,.20)}

    .badge-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:7px;
    }

    .card-title{
      font-size:14px;
      font-weight:950;
      line-height:1.3;
      margin-bottom:6px;
      word-break:break-word;
    }

    .meta-grid{
      display:grid;
      gap:4px;
      color:var(--text);
      font-size:11.6px;
      line-height:1.4;
      margin-bottom:7px;
    }

    .desc{
      color:var(--text);
      line-height:1.48;
      font-size:12.5px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:8px;
    }

    .post-preview{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:13px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:7px;
    }

    .card-actions{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-top:7px;
      align-items:center;
    }

    .action-btn{
      border:none;
      border-radius:11px;
      padding:7px 8px;
      font-size:10.5px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      cursor:pointer;
      min-height:31px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--surface-3);
      white-space:nowrap;
    }

    .action-btn svg{
      width:13px;
      height:13px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:var(--blue-soft);border-color:rgba(76,201,255,.22)}
    .btn-soft{background:var(--surface-3);border-color:var(--line)}
    .btn-green{background:var(--green-soft);border-color:rgba(61,220,132,.22)}

    .share-btn{margin-left:auto}

    .tile-card{
      padding:0;
      overflow:hidden;
      background:var(--surface-2);
      transition:.16s ease;
    }

    .tile-card:active{
      transform:scale(.992);
    }

    .simple-tile{
      display:grid;
      grid-template-columns:42px 1fr auto;
      align-items:center;
      gap:9px;
      padding:9px;
      min-height:62px;
      cursor:pointer;
      color:var(--text);
    }

    .tile-icon{
      width:42px;
      height:42px;
      border-radius:13px;
      background:var(--surface-3);
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      flex-shrink:0;
    }

    .tile-icon svg{
      width:18px;
      height:18px;
      display:block;
      stroke-width:2.1;
    }

    .tile-event{background:var(--green-soft);border-color:rgba(61,220,132,.22)}
    .tile-place{background:var(--yellow-soft);border-color:rgba(245,185,66,.22)}
    .tile-community{background:var(--purple-soft);border-color:rgba(167,139,250,.22)}

    .tile-body{min-width:0}

    .tile-title{
      font-size:13px;
      font-weight:950;
      line-height:1.22;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:2px;
    }

    .tile-line{
      color:var(--muted);
      font-size:10.8px;
      line-height:1.28;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:820;
    }

    .tile-meta{
      margin-top:4px;
      display:flex;
      align-items:center;
      gap:5px;
      min-width:0;
    }

    .tile-tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 6px;
      border-radius:999px;
      font-size:8.8px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      line-height:1;
      max-width:96px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tile-tag-blue{background:var(--blue-soft);border-color:rgba(76,201,255,.20)}
    .tile-tag-green{background:var(--green-soft);border-color:rgba(61,220,132,.20)}
    .tile-tag-yellow{background:var(--yellow-soft);border-color:rgba(245,185,66,.20)}
    .tile-tag-purple{background:var(--purple-soft);border-color:rgba(167,139,250,.20)}

    .tile-right{
      display:flex;
      align-items:center;
      gap:5px;
      flex-shrink:0;
    }

    .tile-share{
      width:31px;
      height:31px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .tile-share svg{
      width:14px;
      height:14px;
      display:block;
    }

    .tile-arrow{
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      width:18px;
      flex-shrink:0;
    }

    .tile-arrow svg{
      width:16px;
      height:16px;
      display:block;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:var(--blue-soft);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:17px;
      height:17px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    .nav-badge.show{display:flex}

    @media (max-width:700px){
      body{padding:6px 6px 82px}
      .chip-row{gap:4px}
      .chip{font-size:8.8px;padding:6px 2px}
      .tabs{gap:4px}
      .tab-btn{font-size:8.8px;padding:7px 1px}
      .person-card{align-items:flex-start}
      .person-meta-line{white-space:normal;overflow:visible;text-overflow:clip}
      .share-btn{margin-left:0}
      .card-actions .action-btn{flex:1}
      .simple-tile{grid-template-columns:40px 1fr auto;gap:8px;padding:8px;min-height:58px}
      .tile-icon{width:40px;height:40px;border-radius:12px}
      .tile-title{font-size:12.6px}
      .tile-line{font-size:10.3px}
      .tile-share{width:30px;height:30px}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
      .nav-badge{right:8px}
    }

    @media(max-width:390px){
      .tab-btn{font-size:8.2px}
      .chip{font-size:8.1px}
      .action-btn{font-size:10px;padding:7px 7px}
      .card-title{font-size:13.5px}
      .tile-tag{max-width:78px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Search everything</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh search data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-row">
        <div>
          <div class="hero-title">Search</div>
          <div class="hero-sub">Search people, posts, Hub posts, events, places and communities.</div>
        </div>
        <div class="search-pill">Global</div>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Type to search people, posts, events..." />
        <button id="clearBtn" class="clear-btn hidden" type="button" aria-label="Clear search">Ã</button>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");

    const peopleCountChip = document.getElementById("peopleCountChip");

    const sectionTitle = document.getElementById("sectionTitle");

    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentTab = "people";
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let followingIds = new Set();

    let peopleData = [];
    let postsData = [];
    let eventsData = [];

    let communitiesData = [];
    let profilesMap = new Map();

    let liveChannels = [];
    let refreshTimer = null;
    let badgeRefreshTimer = null;

    const ICONS = {
      check: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

      `,

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>

          <path d="m9 18 6-6-6-6"></path>
        </svg>
      `
    };

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();

      if (
        e.key === "ownspace_badges_refresh" ||
        e.key === "ownspace_inbox_refresh" ||
        e.key === "ownspace_chat_read_refresh"
      ) {
        scheduleBadgeRefresh(120);
      }

      if (
        e.key === "ownspace_search_refresh" ||
        e.key === "ownspace_posts_refresh" ||
        e.key === "ownspace_nearby_refresh" ||
        e.key === "ownspace_communities_refresh" ||
        e.key === "ownspace_hub_refresh"
      ) {
        scheduleRefresh(180);
      }
    });

    const themeMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (themeMediaQuery.addEventListener) {
      themeMediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return "";
    }

    function getFirstFilled(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function cleanKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function truthyVerification(value) {
      if (value === true) return true;

      const clean = cleanKey(value);

      return [
        "true",
        "yes",
        "1",
        "verified",
        "approved",
        "account",
        "creator",
        "business",
        "green_tick",
        "blue_tick",
        "gold_tick"
      ].includes(clean);
    }

    function normalizeVerificationType(raw = {}, isVerifiedFallback = false) {
      const rawType = getFirstFilled(raw, [
        "verification_badge",
        "verificationBadge",
        "verification_type",
        "verificationType",
        "badge_type",
        "badgeType",
        "verified_badge",
        "verifiedBadge",
        "verified_type",
        "verifiedType",
        "account_badge",
        "accountBadge"
      ], "");

      const clean = cleanKey(rawType);

      // FINAL OwnSpace badge mapping:
      // account = green, creator = blue, business = gold.
      if (["business", "verified_business", "business_verified", "gold", "gold_tick", "gold_badge"].includes(clean)) return "business";
      if (["creator", "verified_creator", "creator_verified", "blue", "blue_tick", "blue_badge"].includes(clean)) return "creator";
      if (["account", "verified_account", "account_verified", "green", "green_tick", "green_badge", "verified", "standard", "approved"].includes(clean)) return "account";

      const verifiedFlag = getFirstFilled(raw, [
        "is_verified",
        "isVerified",
        "verified",
        "author_verified",
        "authorVerified",
        "user_verified",
        "userVerified"
      ], "");

      return truthyVerification(verifiedFlag) || isVerifiedFallback ? "account" : "";
    }

    function getVerificationLabel(type) {
      const clean = cleanKey(type);
      if (clean === "business") return "Verified Business";
      if (clean === "creator") return "Verified Creator";
      if (clean === "account") return "Verified Account";
      return "Verified";
    }

    function getVerificationClass(type) {
      const clean = cleanKey(type);
      if (clean === "business") return "verified-business";
      if (clean === "creator") return "verified-creator";
      return "verified-account";
    }

    function buildVerifiedBadge(raw = {}) {
      const type = normalizeVerificationType(raw);

      if (!type) return "";

      const label = getVerificationLabel(type);
      const cls = getVerificationClass(type);

      return `
        <span class="verified-badge ${cls}" title="${escapeHtml(label)}" aria-label="${escapeHtml(label)}">
          ${ICONS.check}
        </span>
      `;
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getCreatedMs(obj) {
      const value = obj?.created_at || obj?.createdAt || obj?.timestamp || obj?.created || null;

      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      const ms = new Date(value).getTime();
      return Number.isNaN(ms) ? 0 : ms;
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || d.current_city || d.currentCity || "");
      const province = titleText(d.province || d.state || d.region || d.location_province || d.locationProvince || d.current_province || d.currentProvince || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || d.current_country || d.currentCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function firstLetter(text, fallback = "M") {
      return String(text || fallback).trim().charAt(0).toUpperCase() || fallback;
    }

    function isSchemaError(error) {
      const msg = String(error?.message || error || "").toLowerCase();

      return (
        msg.includes("does not exist") ||
        msg.includes("not found in the schema cache") ||
        msg.includes("could not find") ||
        msg.includes("schema cache") ||
        msg.includes("column") ||
        msg.includes("relation")
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      const city = getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]);
      const province = getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]);
      const country = getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]);

      const blockedUsers = Array.isArray(d.blocked_users)
        ? d.blocked_users
        : Array.isArray(d.blockedUsers)
        ? d.blockedUsers
        : [];

      const verificationType = normalizeVerificationType(d);

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        gender: getField(d, ["gender_custom", "genderCustom", "gender"]),
        keywords: getField(d, ["keywords", "interests", "tags", "search_keywords", "searchKeywords"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!verificationType,
        verificationType,
        moderationStatus: normalizeText(getField(d, ["moderation_status", "moderationStatus", "status"])),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin ?? d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deactivated),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        locationVisibility: getField(d, ["location_visibility", "locationVisibility"]) || "hidden",
        city,
        province,
        country,
        locationSearch: buildLocationSearch(d),
        blockedUsers,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePost(raw, fallbackId = "", sourceName = "posts") {
      const d = raw || {};
      const isHub = sourceName === "hub_posts";

      const title = getField(d, ["title", "name"]);
      const summary = getField(d, ["summary", "subtitle"]);
      const body = getField(d, ["body", "content", "text"]);
      const caption = isHub
        ? [title, summary, body].filter(Boolean).join("\n\n")
        : getField(d, ["caption", "text", "content", "body", "description"]);

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "created_by", "createdBy", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "author_name", "authorName"]),
        creatorUsername: getField(d, ["creator_username", "creatorUsername", "username", "author_username", "authorUsername"]),
        title: title || "",
        caption,
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl", "file_url", "fileUrl"]),
        postType: getField(d, ["post_type", "postType", "type", "category"]),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        published: d.published !== false && d.is_published !== false && d.isPublished !== false,
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};

      return {
        id: d.id || fallbackId || "",
        title: getField(d, ["title", "name"]) || "Untitled Event",
        description: getField(d, ["description", "desc", "about"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        venue: getField(d, ["venue", "spot"]),
        address: getField(d, ["address"]),
        date: getField(d, ["date", "event_date", "eventDate"]),
        time: getField(d, ["time", "event_time", "eventTime"]),
        visibility: normalizeText(getField(d, ["visibility", "event_visibility", "eventVisibility"]) || "public"),
        creatorId: getField(d, ["creator_id", "creatorId", "user_id", "userId", "created_by", "createdBy", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"]) || "Member",
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        lat: readLat(d),
        lng: readLng(d),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = normalizeText(d.status || "");

      const approved =
        d.approved === true ||
        d.verified === true ||
        d.is_verified === true ||
        d.isVerified === true ||
        ["approved", "active", "verified", "public", "published"].includes(status);

      const rejected =
        d.rejected === true ||
        status === "rejected" ||
        status === "declined";

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic"]) || "General",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        approved,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        lat: readLat(d),
        lng: readLng(d),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizeCommunity(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const privacy = getField(d, ["privacy", "visibility", "type"]) || "Public";

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "community_name", "communityName"]) || "Untitled Community",
        description: getField(d, ["description", "desc", "about"]),
        category: getField(d, ["category", "topic"]) || "General",
        privacy,
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "owner_id", "ownerId", "user_id", "userId", "uid"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        memberCount: Number(d.member_count ?? d.memberCount ?? d.members_count ?? d.membersCount ?? 0) || 0,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        approved: d.approved !== false && d.is_approved !== false && d.isApproved !== false,
        rejected: !!(d.rejected || d.is_rejected || d.isRejected),
        createdAtMs: getCreatedMs(d)
      };
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function setTab(tab) {
      currentTab = tab;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      sectionTitle.textContent =
        tab === "people" ? "People" :
        tab === "posts" ? "Posts" :
        tab === "events" ? "Events" :
        tab === "places" ? "Places" :
        "Community";

      searchInput.placeholder =
        tab === "people" ? "Type name, username, bio, city..." :
        tab === "posts" ? "Search posts and Hub posts..." :
        tab === "events" ? "Search events..." :
        tab === "places" ? "Search places..." :
        "Search communities...";

      renderResults();
    }

    function updateClearButton() {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
    }

    function matchesSearch(values, q) {
      if (!q) return true;

      const joined = values
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      return joined.includes(q.toLowerCase());
    }

    function isBlockedByViewer(uid) {
      if (!uid) return false;

      return viewerBlockedUsers.some(item => {
        if (typeof item === "string") return item === uid;

        if (item && typeof item === "object") {
          return item.uid === uid || item.user_id === uid || item.userId === uid || item.blocked_id === uid || item.blockedId === uid;
        }

        return false;
      });
    }

    function canViewProfile(profile) {
      if (!profile) return false;
      if (!profile.uid) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin) return false;
      if (["banned", "deleted", "removed"].includes(profile.moderationStatus)) return false;
      if (isBlockedByViewer(profile.uid)) return false;

      return true;
    }

    function getAuthorProfile(uid) {
      if (!uid) return null;
      if (uid === currentUser?.id && viewerProfile) return viewerProfile;
      return profilesMap.get(uid) || null;
    }

    function canViewPost(post) {
      if (!post || post.hidden || post.published === false) return false;
      if (post.source === "hub_posts") return true;

      const owner = getAuthorProfile(post.userId);

      if (!owner) return post.userId === currentUser.id;
      if (!canViewProfile(owner)) return false;
      if (owner.uid === currentUser.id) return true;
      if (!owner.isPrivate) return true;

      return followingIds.has(owner.uid);
    }

    function getFilteredPeople() {
      const q = searchInput.value.trim();

      if (!q) return [];

      return peopleData
        .filter(p => p.uid !== currentUser.id)
        .filter(canViewProfile)
        .filter(p => matchesSearch([
          p.displayName,
          p.username,
          p.bio,
          p.gender,
          p.keywords,
          p.city,
          p.province,
          p.country,
          provinceAliases(p.province),
          countryAliases(p.country),
          p.locationSearch
        ], q))
        .sort((a, b) => {
          if (a.verified && !b.verified) return -1;
          if (b.verified && !a.verified) return 1;
          if (followingIds.has(a.uid) && !followingIds.has(b.uid)) return -1;
          if (followingIds.has(b.uid) && !followingIds.has(a.uid)) return 1;

          return a.displayName.localeCompare(b.displayName);
        });
    }

    function getFilteredPosts() {
      const q = searchInput.value.trim();

      return postsData
        .filter(canViewPost)
        .filter(post => {
          const owner = getAuthorProfile(post.userId);

          return matchesSearch([
            post.title,
            post.caption,
            post.postType,
            post.creatorName,
            post.creatorUsername,
            owner?.displayName,
            owner?.username,
            owner?.bio,
            owner?.city,
            owner?.province,
            owner?.country
          ], q);
        })
        .sort((a, b) => b.createdAtMs - a.createdAtMs);
    }

    function getFilteredEvents() {
      const q = searchInput.value.trim();

      return eventsData
        .filter(e => !e.hidden)
        .filter(e => {
          const creator = getAuthorProfile(e.creatorId);
          if (creator && !canViewProfile(creator)) return false;

          return e.visibility !== "private" || e.creatorId === currentUser.id;
        })
        .filter(e => matchesSearch([
          e.title,
          e.description,
          e.city,
          e.province,
          e.country,
          e.venue,
          e.address,
          e.creatorName,
          getAuthorProfile(e.creatorId)?.displayName,
          getAuthorProfile(e.creatorId)?.username
        ], q))
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.title.localeCompare(b.title);
        });
    }

    function getFilteredPlaces() {
      const q = searchInput.value.trim();

      return placesData
        .filter(p => !p.hidden && !p.rejected)
        .filter(p => p.approved || p.createdBy === currentUser.id)
        .filter(p => matchesSearch([
          p.name,
          p.category,
          p.description,
          p.city,
          p.province,
          p.country,
          p.address,
          p.website
        ], q))
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.name.localeCompare(b.name);
        });
    }

    function getFilteredCommunities() {
      const q = searchInput.value.trim();

      return communitiesData
        .filter(c => !c.hidden && !c.rejected)
        .filter(c => c.approved || c.creatorId === currentUser.id)
        .filter(c => {
          const creator = getAuthorProfile(c.creatorId);
          if (creator && !canViewProfile(creator)) return false;

          return matchesSearch([
            c.name,
            c.description,
            c.category,
            c.privacy,
            c.city,
            c.province,
            c.country,
            creator?.displayName,
            creator?.username
          ], q);
        })
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.name.localeCompare(b.name);
        });
    }

    function renderCounts() {
      peopleCountChip.textContent = `People ${getFilteredPeople().length}`;
      postsCountChip.textContent = `Posts ${getFilteredPosts().length}`;
      eventsCountChip.textContent = `Events ${getFilteredEvents().length}`;
      placesCountChip.textContent = `Places ${getFilteredPlaces().length}`;
      communitiesCountChip.textContent = `Comm. ${getFilteredCommunities().length}`;
    }

    function buildShareUrl(type, item) {
      const url = new URL(window.location.href);

      if (type === "profile") {
        url.pathname = url.pathname.replace(/[^/]*$/, "member.html");
        url.search = "";
        url.searchParams.set("uid", item.uid);
      }

      if (type === "post") {
        if (item.source === "hub_posts") {
          url.pathname = url.pathname.replace(/[^/]*$/, "hub.html");
          url.search = "";
          url.searchParams.set("postId", item.id);
        } else {
          url.pathname = url.pathname.replace(/[^/]*$/, "post.html");
          url.search = "";
          url.searchParams.set("postId", item.id);
          if (item.source) url.searchParams.set("source", item.source);
        }
      }

      if (type === "event") {
        url.pathname = url.pathname.replace(/[^/]*$/, "event.html");
        url.search = "";
        url.searchParams.set("eventId", item.id);
      }

      if (type === "place") {
        url.pathname = url.pathname.replace(/[^/]*$/, "place.html");
        url.search = "";
        url.searchParams.set("placeId", item.id);
        if (item.source) url.searchParams.set("source", item.source);
      }

      if (type === "community") {
        url.pathname = url.pathname.replace(/[^/]*$/, "community.html");
        url.search = "";
        url.searchParams.set("communityId", item.id);
      }

      return url.toString();
    }

    async function shareItem(type, item, label = "OwnSpace") {
      const url = buildShareUrl(type, item);

      const title =
        type === "profile" ? `${label || "Member"} on OwnSpace` :
        type === "post" ? "Check this post on OwnSpace" :
        type === "event" ? "Check this event on OwnSpace" :
        type === "place" ? "Check this place on OwnSpace" :
        type === "community" ? "Check this community on OwnSpace" :
        "Check this on OwnSpace";

      const text =
        type === "post" ? "Check this post on OwnSpace." :
        `Check out ${label || "this"} on OwnSpace.`;

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Link copied.");
        } else {
          prompt("Copy this link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") {
          console.error("Share failed:", err);
        }
      }
    }

    function makeTileCard({ type, icon, title, line, tag1, tag2, tag3, url, item }) {
      const card = document.createElement("div");
      card.className = "card tile-card";

      card.innerHTML = `
        <div class="simple-tile" role="link" tabindex="0">
          <div class="tile-icon tile-${type}">
            ${icon}
          </div>

          <div class="tile-body">
            <div class="tile-title">${escapeHtml(title || "Untitled")}</div>
            <div class="tile-line">${escapeHtml(line || "No details added")}</div>

            <div class="tile-meta">
              ${tag1 ? `<span class="tile-tag tile-tag-blue">${escapeHtml(tag1)}</span>` : ""}
              ${tag2 ? `<span class="tile-tag tile-tag-green">${escapeHtml(tag2)}</span>` : ""}
              ${tag3 ? `<span class="tile-tag tile-tag-purple">${escapeHtml(tag3)}</span>` : ""}
            </div>
          </div>

          <div class="tile-right">
            <button class="tile-share" type="button" aria-label="Share">${ICONS.share}</button>
            <span class="tile-arrow">${ICONS.arrow}</span>
          </div>
        </div>
      `;

      const tile = card.querySelector(".simple-tile");
      const shareBtn = card.querySelector(".tile-share");

      function openTile() {
        if (url) window.location.href = url;
      }

      tile.addEventListener("click", openTile);
      tile.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openTile();
        }
      });

      shareBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await shareItem(type, item, title);
      });

      return card;
    }

    function renderPosts() {
      const rows = getFilteredPosts();

      if (!rows.length) {
        showEmpty("No matching posts found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(post => {
        const owner = getAuthorProfile(post.userId) || {};
        const card = document.createElement("div");
        card.className = "card";

        const previewHtml = post.imageURL
          ? `<img class="post-preview" src="${escapeHtml(post.imageURL)}" alt="Post image">`
          : "";

        const badges = [];

        if (post.source === "hub_posts") {
          badges.push(`<span class="mini-badge mini-green">Hub</span>`);
          if (post.creatorName) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(post.creatorName)}</span>`);
        } else {
          if (owner.displayName) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(owner.displayName)}</span>`);
          if (owner.username) badges.push(`<span class="mini-badge mini-purple">@${escapeHtml(owner.username)}</span>`);
          if (owner.verified) badges.push(`<span class="mini-badge mini-green">${escapeHtml(getVerificationLabel(owner.verificationType))}</span>`);
        }

        if (post.postType) badges.push(`<span class="mini-badge mini-yellow">${escapeHtml(post.postType)}</span>`);
        if (post.source === "community_posts") badges.push(`<span class="mini-badge mini-purple">Community</span>`);

        const postUrl = post.source === "hub_posts"
          ? `hub.html?postId=${encodeURIComponent(post.id)}`
          : `post.html?postId=${encodeURIComponent(post.id)}${post.source ? `&source=${encodeURIComponent(post.source)}` : ""}`;

        const titleText = post.source === "hub_posts"
          ? (post.title || post.caption || "Hub Post").slice(0, 120)
          : (post.caption || "Post").slice(0, 120);

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    function mergeRawProfile(existing = {}, incoming = {}) {
      const merged = {
        ...(existing || {}),
        ...(incoming || {})
      };

      const existingType = normalizeVerificationType(existing || {});
      const incomingType = normalizeVerificationType(incoming || {});
      const types = [existingType, incomingType].filter(Boolean);

      let strongest = "";
      if (types.includes("business")) strongest = "business";
      else if (types.includes("creator")) strongest = "creator";
      else if (types.includes("account")) strongest = "account";

      if (strongest) {
        merged.is_verified = true;
        merged.verified = true;
        merged.verification_badge = strongest;
        merged.verification_type = strongest;
        merged.badge_type = strongest;
      }

      return merged;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile(
        mergeRawProfile(publicRow || {}, { ...(userRow || {}), uid }),
        uid
      );

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
    }

    async function loadProfiles() {
      let publicRows = [];
      let userRows = [];

      try {
        const { data, error } = await supabase
          .from("public_profiles")
          .select("*");

        if (!error && Array.isArray(data)) {
          publicRows = data;
        }
      } catch {}

      try {
        const { data, error } = await supabase
          .from("users")
          .select("*");

        if (!error && Array.isArray(data)) {
          userRows = data;
        }
      } catch {}

      const byUid = new Map();

      publicRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, mergeRawProfile(byUid.get(uid) || {}, {
          ...row,
          uid
        }));
      });

      userRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, mergeRawProfile(byUid.get(uid) || {}, {
          ...row,
          uid
        }));
      });

      peopleData = Array.from(byUid.values()).map(row => normalizeProfile(row, row.uid || row.id || row.user_id || row.userId));

      profilesMap = new Map();
      peopleData.forEach(p => {
        if (p.uid) profilesMap.set(p.uid, p);
      });
    }

    async function selectRowsWithFallback(table, variants) {
      for (const variant of variants) {
        try {
          let query = supabase.from(table).select("*");

          Object.entries(variant).forEach(([key, value]) => {
            query = query.eq(key, value);
          });

          const { data, error } = await query;

          if (!error) return data || [];
        } catch {}
      }

      return [];
    }

    async function loadFollows() {
      const rows = await selectRowsWithFallback("follows", [
        { follower_id: currentUser.id },
        { followerId: currentUser.id },
        { from_user_id: currentUser.id },
        { fromUserId: currentUser.id }
      ]);

      followingIds = new Set();

      rows.forEach(row => {
        const uid = row.following_id || row.followingId || row.to_user_id || row.toUserId;

        if (uid) followingIds.add(uid);
      });
    }

    async function loadPostsFromTable(tableName) {
      const orderColumns = ["created_at", "createdAt", "timestamp"];

      for (const orderColumn of orderColumns) {
        try {
          const { data, error } = await supabase
            .from(tableName)
            .select("*")
            .order(orderColumn, { ascending: false });

          if (!error) return data || [];
          if (!isSchemaError(error)) console.warn(`${tableName} load error:`, error?.message || error);
        } catch {}
      }

      try {
        const { data, error } = await supabase
          .from(tableName)
          .select("*");

        if (!error) return data || [];
      } catch {}

      return [];
    }

    async function loadPosts() {
      try {
        const [normalPosts, communityPosts, hubPosts] = await Promise.all([
          loadPostsFromTable("posts"),
          loadPostsFromTable("community_posts"),
          loadPostsFromTable("hub_posts")
        ]);

        postsData = [
          ...(normalPosts || []).map(d => normalizePost(d, d.id, "posts")),
          ...(communityPosts || []).map(d => normalizePost(d, d.id, "community_posts")),
          ...(hubPosts || []).map(d => normalizePost(d, d.id, "hub_posts"))
        ].sort((a, b) => b.createdAtMs - a.createdAtMs);
      } catch (err) {
        console.error("Posts load error:", err);
        postsData = [];
      }
    }

    async function loadEvents() {
      try {
        const { data, error } = await supabase
          .from("events")
          .select("*");

        if (error) throw error;

        eventsData = (data || []).map(d => normalizeEvent(d, d.id));
      } catch (err) {
        console.error("Events load error:", err);
        eventsData = [];
      }
    }

    async function loadPlaces() {
      const sources = ["nearby_places", "places", "nudist_places"];
      const map = new Map();

      for (const source of sources) {
        try {
          const { data, error } = await supabase
            .from(source)
            .select("*");

          if (error) continue;

          (data || []).forEach(d => {
            const place = normalizePlace(d, d.id, source);
            if (place.id) map.set(`${source}:${place.id}`, place);
          });
        } catch {}
      }

      placesData = Array.from(map.values());
    }

    async function loadCommunities() {
      const sources = ["communities", "community"];
      const map = new Map();

      for (const source of sources) {
        try {
          const { data, error } = await supabase
            .from(source)
            .select("*");

          if (error) continue;

          (data || []).forEach(d => {
            const community = normalizeCommunity(d, d.id, source);
            if (community.id) map.set(`${source}:${community.id}`, community);
          });
        } catch {}
      }

      communitiesData = Array.from(map.values());
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId", "receiverId", "recipientId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          try {
            const { count, error } = await supabase
              .from("message_requests")
              .select("id", { count: "exact", head: true })
              .eq(targetColumn, uid)
              .eq(statusColumn, "pending");

            if (!error) return count || 0;
          } catch {}
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetColumn, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = normalizeText(getFirstFilled(row, statusColumns, "pending") || "pending");
              return status === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    function readThreadForBadge(raw, fallbackId = "") {
      const d = raw || {};

      return {
        id: String(getFirstFilled(d, ["id"], fallbackId) || fallbackId || ""),
        status: normalizeText(getFirstFilled(d, ["status"], "accepted") || "accepted"),
        participantA: String(getFirstFilled(d, ["participant_a", "participantA"], "") || ""),
        participantB: String(getFirstFilled(d, ["participant_b", "participantB"], "") || ""),
        lastMessageAt: d.last_message_at ?? d.lastMessageAt ?? d.updated_at ?? d.updatedAt ?? d.created_at ?? d.createdAt ?? null
      };
    }

    function readMessageForBadge(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: String(getFirstFilled(d, ["id"], fallbackId) || fallbackId || ""),
        threadId: String(getFirstFilled(d, ["thread_id", "threadId"], "") || ""),
        senderId: String(getFirstFilled(d, ["sender_id", "senderId", "from_user_id", "fromUserId"], "") || ""),
        createdAt: d.created_at ?? d.createdAt ?? d.timestamp ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function badgeTimeMs(value) {
      if (!value) return 0;

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function isInboxMessageUnreadForBadge(msg, uid) {
      if (!msg || msg.senderId === uid) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    async function loadInboxThreadsForBadge(uid) {
      const attempts = [
        ["participant_a", "participant_b"],
        ["participantA", "participantB"]
      ];

      for (const [colA, colB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${colA}.eq.${uid},${colB}.eq.${uid}`);

          if (!error) {
            return (data || [])
              .map(row => readThreadForBadge(row, row.id || ""))
              .filter(thread => thread.id)
              .filter(thread => !thread.status || thread.status === "accepted");
          }
        } catch {}
      }

      return [];
    }

    async function fetchInboxMessagesForBadge(threadIds) {
      if (!threadIds.length) return [];

      const attempts = [
        { threadColumn: "thread_id", orderColumn: "created_at" },
        { threadColumn: "threadId", orderColumn: "createdAt" }
      ];

      for (const attempt of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_messages")
            .select("*")
            .in(attempt.threadColumn, threadIds)
            .order(attempt.orderColumn, { ascending: true });

          if (!error) {
            return (data || []).map(row => readMessageForBadge(row, row.id || ""));
          }
        } catch {}

        try {
          const { data, error } = await supabase
            .from("chat_messages")
            .select("*")
            .in(attempt.threadColumn, threadIds);

          if (!error) {
            return (data || []).map(row => readMessageForBadge(row, row.id || ""));
          }
        } catch {}
      }

      return [];
    }

    async function countUnreadChatMessages(uid) {
      const threads = await loadInboxThreadsForBadge(uid);
      const threadIds = threads.map(thread => thread.id).filter(Boolean);

      if (!threadIds.length) return 0;

      const messages = await fetchInboxMessagesForBadge(threadIds);
      const byThread = new Map();

      messages.forEach(msg => {
        if (!msg.threadId) return;
        if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
        byThread.get(msg.threadId).push(msg);
      });

      let total = 0;

      threads.forEach(thread => {
        const list = (byThread.get(thread.id) || [])
          .sort((a, b) => badgeTimeMs(a.createdAt) - badgeTimeMs(b.createdAt));

        if (!list.length) return;

        const newest = [...list].sort((a, b) => badgeTimeMs(b.createdAt) - badgeTimeMs(a.createdAt))[0];

        if (newest?.senderId === uid) return;

        const lastOutgoingMs = list
          .filter(msg => msg.senderId === uid)
          .reduce((max, msg) => Math.max(max, badgeTimeMs(msg.createdAt)), 0);

        const unreadCount = list.filter(msg => {
          if (msg.senderId === uid) return false;
          if (badgeTimeMs(msg.createdAt) <= lastOutgoingMs) return false;
          return isInboxMessageUnreadForBadge(msg, uid);
        }).length;

        total += unreadCount;
      });

      return total;
    }

    async function loadInboxBadgeCount() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.textContent = "0";
          inboxBadge.classList.remove("show");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.add("show");
        }
      } catch (err) {
        console.warn("Inbox badge count skipped:", err?.message || err);
        inboxBadge.textContent = "0";
        inboxBadge.classList.remove("show");
      }
    }

    async function refreshAll() {
      openLoading();
      refreshBtn.disabled = true;

      try {
        await Promise.all([
          loadProfiles(),
          loadFollows(),
          loadPosts(),
          loadEvents(),
          loadPlaces(),
          loadCommunities(),
          loadInboxBadgeCount()
        ]);

        renderCounts();
        renderResults();
      } catch (err) {
        console.error(err);
        showEmpty("Could not refresh search data.");
      }

      refreshBtn.disabled = false;
    }

    function scheduleRefresh(delay = 350) {
      clearTimeout(refreshTimer);

      refreshTimer = setTimeout(() => {
        refreshAll().catch(err => console.error("Search refresh failed:", err));
      }, delay);
    }

    function scheduleBadgeRefresh(delay = 350) {
      clearTimeout(badgeRefreshTimer);

      badgeRefreshTimer = setTimeout(() => {
        loadInboxBadgeCount().catch(() => {});
      }, delay);
    }

    function clearRealtime() {
      liveChannels.forEach(channel => {
        try {
          supabase.removeChannel(channel);
        } catch {}
      });

      liveChannels = [];
    }

    function setupRealtime() {
      clearRealtime();

      const refreshTables = [
        "public_profiles",
        "users",
        "follows",
        "posts",
        "community_posts",
        "hub_posts",
        "events",
        "nearby_places",
        "places",
        "nudist_places",
        "communities",
        "community"
      ];

      refreshTables.forEach(table => {
        try {
          const channel = supabase
            .channel(`ownspace-search-live-${table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table },
              () => scheduleRefresh(450)
            )
            .subscribe();

          liveChannels.push(channel);
        } catch {}
      });

      ["message_requests", "chat_threads", "chat_messages"].forEach(table => {
        try {
          const channel = supabase
            .channel(`ownspace-search-badge-${table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table },
              () => scheduleBadgeRefresh(180)
            )
            .subscribe();

          liveChannels.push(channel);
        } catch {}
      });
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    searchInput.addEventListener("input", () => {
      updateClearButton();
      renderResults();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateClearButton();
      searchInput.focus();
      renderResults();
    });

    refreshBtn.addEventListener("click", refreshAll);

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "feed.html";
    });

    window.addEventListener("pageshow", () => {
      scheduleBadgeRefresh(120);
    });

    window.addEventListener("focus", () => {
      scheduleBadgeRefresh(180);
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) scheduleBadgeRefresh(160);
    });

    window.addEventListener("ownspace:badges-refresh", () => scheduleBadgeRefresh(120));
    window.addEventListener("ownspace:inbox-refresh", () => scheduleBadgeRefresh(120));
    window.addEventListener("ownspace:chat-read-refresh", () => scheduleBadgeRefresh(120));

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();
        setupRealtime();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearRealtime();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load search page.");
      }
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(refreshTimer);
      clearTimeout(badgeRefreshTimer);
      clearRealtime();
    });

    initPage();

    /*
      OWNSPACE SEARCH FIXED VERSION

      Fixed:
      - Search page now uses the same final OwnSpace badge colors as profile/member/feed:
        Verified Account = green tick
        Verified Creator = blue tick
        Verified Business = gold tick.
      - Search now reads verification_badge, verification_type, badge_type,
        verified_badge, verified_type, account_badge, old camelCase versions,
        and old is_verified/verified booleans.
      - If users and public_profiles disagree, the strongest badge wins:
        business > creator > account.
      - Fixed verified labels in people results and post owner badges.
      - Realtime also listens to both communities and community fallback tables.
      - Preserved âno random people until typingâ behavior.
      - Preserved simple clickable tiles for events, places, and communities.
      - Preserved inbox badge logic: pending message_requests + unread incoming chat_messages only.
    */
  </script>
