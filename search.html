<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Search</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:18px;
      font-weight:950;
      margin-bottom:5px;
    }

    .hero-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 46px 13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:950;
    }

    .chip-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 5px;
      border-radius:12px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      min-height:32px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .tabs{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:5px;
      margin-bottom:12px;
    }

    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:13px;
      padding:9px 3px;
      font-weight:950;
      font-size:10.5px;
      cursor:pointer;
      min-height:38px;
      white-space:nowrap;
    }

    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .section-title{
      font-size:16px;
      font-weight:950;
      margin-bottom:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .person-card{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .person-avatar,
    .person-avatar-placeholder{
      width:52px;
      height:52px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .person-avatar{object-fit:cover}

    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .person-body{min-width:0;flex:1}

    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
    }

    .person-main{
      min-width:0;
      flex:1;
    }

    .person-name{
      font-size:15px;
      font-weight:950;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .person-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .person-name a:hover{text-decoration:underline}

    .verified-badge{
      width:21px;
      height:21px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:
        0 0 0 3px rgba(32,199,111,.18),
        0 8px 18px rgba(32,199,111,.22);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:13px;
      height:13px;
      display:block;
      stroke-width:3;
    }

    .person-username{
      font-size:12px;
      color:var(--blue);
      font-weight:850;
      margin-top:2px;
      word-break:break-word;
    }

    .person-meta-line{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small-pill,
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
    }

    .pill-blue,.mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .pill-green,.mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .pill-yellow,.mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .badge-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .card-title{
      font-size:16px;
      font-weight:950;
      line-height:1.4;
      margin-bottom:9px;
      word-break:break-word;
    }

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }

    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }

    .post-preview{
      width:100%;
      max-height:280px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:12px;
    }

    .card-actions{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:12px;
      align-items:center;
    }

    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 11px;
      font-size:12.5px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:38px;
      color:var(--text);
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{
      background:rgba(76,201,255,.14);
      border:1px solid rgba(76,201,255,.22);
    }

    .btn-soft{
      background:var(--surface-3);
      border:1px solid var(--line);
    }

    .btn-green{
      background:rgba(61,220,132,.14);
      border:1px solid rgba(61,220,132,.22);
    }

    .share-btn{
      margin-left:auto;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}

      .chip-row{
        grid-template-columns:repeat(5,1fr);
        gap:4px;
      }

      .chip{
        font-size:9.5px;
        padding:6px 2px;
      }

      .tabs{
        grid-template-columns:repeat(5,1fr);
        gap:4px;
      }

      .tab-btn{
        font-size:9.5px;
        padding:8px 1px;
      }

      .person-card{
        align-items:flex-start;
      }

      .person-meta-line{
        white-space:normal;
        overflow:visible;
        text-overflow:clip;
      }

      .share-btn{
        margin-left:0;
      }

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .tab-btn{font-size:8.8px}
      .chip{font-size:8.8px}

      .action-btn{
        font-size:11.5px;
        padding:8px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <a href="feed.html" class="top-icon-btn" aria-label="Back to feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Search everything</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn" type="button" aria-label="Refresh search data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-title">Search</div>
      <div class="hero-sub">
        Search people, posts, events, places and communities. People only appear after you type matching keywords.
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Type to search people, posts, events..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">Ã</button>
      </div>

      <div class="chip-row">
        <span class="chip chip-blue" id="peopleCountChip">People 0</span>
        <span class="chip chip-purple" id="postsCountChip">Posts 0</span>
        <span class="chip chip-green" id="eventsCountChip">Events 0</span>
        <span class="chip chip-yellow" id="placesCountChip">Places 0</span>
        <span class="chip chip-red" id="communitiesCountChip">Comm. 0</span>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="people">People</button>
        <button class="tab-btn" data-tab="posts">Posts</button>
        <button class="tab-btn" data-tab="events">Events</button>
        <button class="tab-btn" data-tab="places">Places</button>
        <button class="tab-btn" data-tab="communities">Community</button>
      </div>

      <div id="sectionTitle" class="section-title">People</div>

      <div id="listLoading" class="loading-box">Loading search data...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">Start typing to search people.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const peopleCountChip = document.getElementById("peopleCountChip");
    const postsCountChip = document.getElementById("postsCountChip");
    const eventsCountChip = document.getElementById("eventsCountChip");
    const placesCountChip = document.getElementById("placesCountChip");
    const communitiesCountChip = document.getElementById("communitiesCountChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const sectionTitle = document.getElementById("sectionTitle");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentTab = "people";
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let followingIds = new Set();

    let peopleData = [];
    let postsData = [];
    let eventsData = [];
    let placesData = [];
    let communitiesData = [];
    let profilesMap = new Map();

    const ICONS = {
      verified: `
        <span class="verified-badge" title="Verified">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      `,
      open: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      `,
      share: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.6 13.5 6.8 4"></path>
          <path d="m15.4 6.5-6.8 4"></path>
        </svg>
      `
    };

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const themeMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (themeMediaQuery.addEventListener) {
      themeMediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return "";
    }

    function getFirstFilled(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getCreatedMs(obj) {
      const value = obj?.created_at || obj?.createdAt || obj?.timestamp || obj?.created || null;

      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      const ms = new Date(value).getTime();
      return Number.isNaN(ms) ? 0 : ms;
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || d.current_city || d.currentCity || "");
      const province = titleText(d.province || d.state || d.region || d.location_province || d.locationProvince || d.current_province || d.currentProvince || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || d.current_country || d.currentCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      const city = getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]);
      const province = getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]);
      const country = getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]);

      const blockedUsers = Array.isArray(d.blocked_users)
        ? d.blocked_users
        : Array.isArray(d.blockedUsers)
        ? d.blockedUsers
        : [];

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        gender: getField(d, ["gender_custom", "genderCustom", "gender"]),
        keywords: getField(d, ["keywords", "interests", "tags", "search_keywords", "searchKeywords"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: normalizeText(getField(d, ["moderation_status", "moderationStatus", "status"])),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin ?? d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deactivated),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        locationVisibility: getField(d, ["location_visibility", "locationVisibility"]) || "hidden",
        city,
        province,
        country,
        locationSearch: buildLocationSearch(d),
        blockedUsers,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePost(raw, fallbackId = "", sourceName = "posts") {
      const d = raw || {};

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "created_by", "createdBy", "uid"]),
        caption: getField(d, ["caption", "text", "content", "body", "description"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl", "file_url", "fileUrl"]),
        postType: getField(d, ["post_type", "postType", "type"]),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};

      return {
        id: d.id || fallbackId || "",
        title: getField(d, ["title", "name"]) || "Untitled Event",
        description: getField(d, ["description", "desc", "about"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        venue: getField(d, ["venue", "spot"]),
        address: getField(d, ["address"]),
        date: getField(d, ["date"]),
        time: getField(d, ["time"]),
        visibility: normalizeText(getField(d, ["visibility", "event_visibility", "eventVisibility"]) || "public"),
        creatorId: getField(d, ["creator_id", "creatorId", "user_id", "userId", "created_by", "createdBy", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"]) || "Member",
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        lat: readLat(d),
        lng: readLng(d),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = normalizeText(d.status || "");

      const approved =
        d.approved === true ||
        d.verified === true ||
        d.is_verified === true ||
        d.isVerified === true ||
        ["approved", "active", "verified", "public", "published"].includes(status);

      const rejected =
        d.rejected === true ||
        status === "rejected" ||
        status === "declined";

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic"]) || "General",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        approved,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        lat: readLat(d),
        lng: readLng(d),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizeCommunity(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const privacy = getField(d, ["privacy", "visibility", "type"]) || "Public";

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "community_name", "communityName"]) || "Untitled Community",
        description: getField(d, ["description", "desc", "about"]),
        privacy,
        creatorId: getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "owner_id", "ownerId", "user_id", "userId", "uid"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        memberCount: Number(d.member_count ?? d.memberCount ?? d.members_count ?? d.membersCount ?? 0) || 0,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted),
        createdAtMs: getCreatedMs(d)
      };
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function setTab(tab) {
      currentTab = tab;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      sectionTitle.textContent =
        tab === "people" ? "People" :
        tab === "posts" ? "Posts" :
        tab === "events" ? "Events" :
        tab === "places" ? "Places" :
        "Community";

      searchInput.placeholder =
        tab === "people" ? "Type name, username, bio, city, province or country..." :
        tab === "posts" ? "Search posts..." :
        tab === "events" ? "Search events..." :
        tab === "places" ? "Search places..." :
        "Search communities...";

      renderResults();
    }

    function updateClearButton() {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
    }

    function matchesSearch(values, q) {
      if (!q) return true;

      const joined = values
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      return joined.includes(q.toLowerCase());
    }

    function isBlockedByViewer(uid) {
      if (!uid) return false;

      return viewerBlockedUsers.some(item => {
        if (typeof item === "string") return item === uid;

        if (item && typeof item === "object") {
          return item.uid === uid || item.user_id === uid || item.userId === uid || item.blocked_id === uid || item.blockedId === uid;
        }

        return false;
      });
    }

    function canViewProfile(profile) {
      if (!profile) return false;
      if (!profile.uid) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin) return false;
      if (["banned", "deleted", "removed"].includes(profile.moderationStatus)) return false;
      if (isBlockedByViewer(profile.uid)) return false;

      return true;
    }

    function getAuthorProfile(uid) {
      if (!uid) return null;
      if (uid === currentUser?.id && viewerProfile) return viewerProfile;
      return profilesMap.get(uid) || null;
    }

    function canViewPost(post) {
      if (!post || post.hidden) return false;

      const owner = getAuthorProfile(post.userId);

      if (!owner) return post.userId === currentUser.id;
      if (!canViewProfile(owner)) return false;
      if (owner.uid === currentUser.id) return true;
      if (!owner.isPrivate) return true;

      return followingIds.has(owner.uid);
    }

    function getFilteredPeople() {
      const q = searchInput.value.trim();

      if (!q) return [];

      return peopleData
        .filter(p => p.uid !== currentUser.id)
        .filter(canViewProfile)
        .filter(p => matchesSearch([
          p.displayName,
          p.username,
          p.bio,
          p.gender,
          p.keywords,
          p.city,
          p.province,
          p.country,
          provinceAliases(p.province),
          countryAliases(p.country),
          p.locationSearch
        ], q))
        .sort((a, b) => {
          if (a.verified && !b.verified) return -1;
          if (b.verified && !a.verified) return 1;
          if (followingIds.has(a.uid) && !followingIds.has(b.uid)) return -1;
          if (followingIds.has(b.uid) && !followingIds.has(a.uid)) return 1;

          return a.displayName.localeCompare(b.displayName);
        });
    }

    function getFilteredPosts() {
      const q = searchInput.value.trim();

      return postsData
        .filter(canViewPost)
        .filter(post => {
          const owner = getAuthorProfile(post.userId);

          return matchesSearch([
            post.caption,
            post.postType,
            owner?.displayName,
            owner?.username,
            owner?.bio,
            owner?.city,
            owner?.province,
            owner?.country
          ], q);
        })
        .sort((a, b) => b.createdAtMs - a.createdAtMs);
    }

    function getFilteredEvents() {
      const q = searchInput.value.trim();

      return eventsData
        .filter(e => !e.hidden)
        .filter(e => {
          const creator = getAuthorProfile(e.creatorId);
          if (creator && !canViewProfile(creator)) return false;

          return e.visibility !== "private" || e.creatorId === currentUser.id;
        })
        .filter(e => matchesSearch([
          e.title,
          e.description,
          e.city,
          e.province,
          e.country,
          e.venue,
          e.address,
          e.creatorName,
          getAuthorProfile(e.creatorId)?.displayName,
          getAuthorProfile(e.creatorId)?.username
        ], q))
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.title.localeCompare(b.title);
        });
    }

    function getFilteredPlaces() {
      const q = searchInput.value.trim();

      return placesData
        .filter(p => !p.hidden && !p.rejected)
        .filter(p => p.approved || p.createdBy === currentUser.id)
        .filter(p => matchesSearch([
          p.name,
          p.category,
          p.description,
          p.city,
          p.province,
          p.country,
          p.address,
          p.website
        ], q))
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.name.localeCompare(b.name);
        });
    }

    function getFilteredCommunities() {
      const q = searchInput.value.trim();

      return communitiesData
        .filter(c => !c.hidden)
        .filter(c => {
          const creator = getAuthorProfile(c.creatorId);
          if (creator && !canViewProfile(creator)) return false;

          return matchesSearch([
            c.name,
            c.description,
            c.privacy,
            c.city,
            c.country,
            creator?.displayName,
            creator?.username
          ], q);
        })
        .sort((a, b) => {
          if (b.createdAtMs !== a.createdAtMs) return b.createdAtMs - a.createdAtMs;
          return a.name.localeCompare(b.name);
        });
    }

    function renderCounts() {
      peopleCountChip.textContent = `People ${getFilteredPeople().length}`;
      postsCountChip.textContent = `Posts ${getFilteredPosts().length}`;
      eventsCountChip.textContent = `Events ${getFilteredEvents().length}`;
      placesCountChip.textContent = `Places ${getFilteredPlaces().length}`;
      communitiesCountChip.textContent = `Comm. ${getFilteredCommunities().length}`;
    }

    function buildShareUrl(type, item) {
      const url = new URL(window.location.href);

      if (type === "profile") {
        url.pathname = url.pathname.replace(/[^/]*$/, "member.html");
        url.search = "";
        url.searchParams.set("uid", item.uid);
      }

      if (type === "post") {
        url.pathname = url.pathname.replace(/[^/]*$/, "post.html");
        url.search = "";
        url.searchParams.set("postId", item.id);
        if (item.source) url.searchParams.set("source", item.source);
      }

      if (type === "event") {
        url.pathname = url.pathname.replace(/[^/]*$/, "event.html");
        url.search = "";
        url.searchParams.set("eventId", item.id);
      }

      if (type === "place") {
        url.pathname = url.pathname.replace(/[^/]*$/, "place.html");
        url.search = "";
        url.searchParams.set("placeId", item.id);
        if (item.source) url.searchParams.set("source", item.source);
      }

      if (type === "community") {
        url.pathname = url.pathname.replace(/[^/]*$/, "community.html");
        url.search = "";
        url.searchParams.set("communityId", item.id);
        url.searchParams.set("id", item.id);
      }

      return url.toString();
    }

    async function shareItem(type, item, label = "OwnSpace") {
      const url = buildShareUrl(type, item);

      const title =
        type === "profile" ? `${label || "Member"} on OwnSpace` :
        type === "post" ? "Check this post on OwnSpace" :
        type === "event" ? "Check this event on OwnSpace" :
        type === "place" ? "Check this place on OwnSpace" :
        type === "community" ? "Check this community on OwnSpace" :
        "Check this on OwnSpace";

      const text =
        type === "post" ? "Check this post on OwnSpace." :
        `Check out ${label || "this"} on OwnSpace.`;

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Link copied.");
        } else {
          prompt("Copy this link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") {
          console.error("Share failed:", err);
        }
      }
    }

    function renderPeople() {
      const q = searchInput.value.trim();

      if (!q) {
        showEmpty("Start typing to search people. No random people will show here.");
        return;
      }

      const rows = getFilteredPeople();

      if (!rows.length) {
        showEmpty("No matching people found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(profile => {
        const avatarHtml = profile.photoURL
          ? `<img class="person-avatar" src="${escapeHtml(profile.photoURL)}" alt="Profile photo">`
          : `<div class="person-avatar-placeholder">No photo</div>`;

        const metaParts = [];

        if (profile.city || profile.province || profile.country) {
          metaParts.push([profile.city, profile.province, profile.country].filter(Boolean).join(", "));
        }

        metaParts.push(profile.isPrivate ? "Private" : "Public");
        if (followingIds.has(profile.uid)) metaParts.push("Following");

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="person-card">
            ${avatarHtml}

            <div class="person-body">
              <div class="person-head">
                <div class="person-main">
                  <div class="person-name">
                    <a href="member.html?uid=${encodeURIComponent(profile.uid)}">${escapeHtml(profile.displayName)}</a>
                    ${profile.verified ? ICONS.verified : ""}
                  </div>

                  ${profile.username ? `<div class="person-username">@${escapeHtml(profile.username)}</div>` : ""}
                  <div class="person-meta-line">${escapeHtml(metaParts.join(" â¢ ") || "Member")}</div>
                </div>

                ${followingIds.has(profile.uid)
                  ? `<span class="small-pill pill-blue">Following</span>`
                  : profile.verified
                  ? `<span class="small-pill pill-green">Verified</span>`
                  : profile.isPrivate
                  ? `<span class="small-pill pill-yellow">Private</span>`
                  : ``}
              </div>

              <div class="card-actions">
                <a href="member.html?uid=${encodeURIComponent(profile.uid)}" class="action-btn btn-primary">${ICONS.open}<span>Open</span></a>
                <button class="action-btn btn-green share-btn profile-share-btn" type="button">${ICONS.share}<span>Share</span></button>
              </div>
            </div>
          </div>
        `;

        const img = card.querySelector(".person-avatar");

        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
          });
        }

        const shareBtn = card.querySelector(".profile-share-btn");

        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            await shareItem("profile", profile, profile.displayName);
          });
        }

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderPosts() {
      const rows = getFilteredPosts();

      if (!rows.length) {
        showEmpty("No matching posts found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(post => {
        const owner = getAuthorProfile(post.userId) || {};
        const card = document.createElement("div");
        card.className = "card";

        const previewHtml = post.imageURL
          ? `<img class="post-preview" src="${escapeHtml(post.imageURL)}" alt="Post image">`
          : "";

        const badges = [];
        if (owner.displayName) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(owner.displayName)}</span>`);
        if (owner.username) badges.push(`<span class="mini-badge mini-purple">@${escapeHtml(owner.username)}</span>`);
        if (owner.verified) badges.push(`<span class="mini-badge mini-green">Verified</span>`);
        if (post.postType) badges.push(`<span class="mini-badge mini-yellow">${escapeHtml(post.postType)}</span>`);
        if (post.source === "community_posts") badges.push(`<span class="mini-badge mini-purple">Community Post</span>`);

        const postUrl = `post.html?postId=${encodeURIComponent(post.id)}${post.source ? `&source=${encodeURIComponent(post.source)}` : ""}`;

        card.innerHTML = `
          <div class="card-title">${escapeHtml((post.caption || "Post").slice(0, 120) || "Post")}</div>
          <div class="badge-row">${badges.join("")}</div>
          ${previewHtml}
          <div class="desc">${escapeHtml(post.caption || "No caption added.")}</div>

          <div class="card-actions">
            <a href="${postUrl}" class="action-btn btn-primary">${ICONS.open}<span>Open Post</span></a>
            ${post.userId ? `<a href="member.html?uid=${encodeURIComponent(post.userId)}" class="action-btn btn-soft">Owner</a>` : ""}
            <button class="action-btn btn-green share-btn post-share-btn" type="button">${ICONS.share}<span>Share</span></button>
          </div>
        `;

        const img = card.querySelector(".post-preview");

        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const shareBtn = card.querySelector(".post-share-btn");

        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            await shareItem("post", post, "post");
          });
        }

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderEvents() {
      const rows = getFilteredEvents();

      if (!rows.length) {
        showEmpty("No matching events found.");
        return;

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
    }

    async function loadProfiles() {
      let publicRows = [];
      let userRows = [];

      try {
        const { data, error } = await supabase
          .from("public_profiles")
          .select("*");

        if (!error && Array.isArray(data)) {
          publicRows = data;
        }
      } catch {}

      try {
        const { data, error } = await supabase
          .from("users")
          .select("*");

        if (!error && Array.isArray(data)) {
          userRows = data;
        }
      } catch {}

      const byUid = new Map();

      publicRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      userRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      peopleData = Array.from(byUid.values()).map(row => normalizeProfile(row, row.uid || row.id || row.user_id || row.userId));

      profilesMap = new Map();
      peopleData.forEach(p => {
        if (p.uid) profilesMap.set(p.uid, p);
      });
    }

    async function selectRowsWithFallback(table, variants) {
      for (const variant of variants) {
        try {
          let query = supabase.from(table).select("*");

          Object.entries(variant).forEach(([key, value]) => {
            query = query.eq(key, value);
          });

          const { data, error } = await query;

          if (!error) return data || [];
        } catch {}
      }

      return [];
    }

    async function loadFollows() {
      const rows = await selectRowsWithFallback("follows", [
        { follower_id: currentUser.id },
        { followerId: currentUser.id },
        { from_user_id: currentUser.id },
        { fromUserId: currentUser.id }
      ]);

      followingIds = new Set();

      rows.forEach(row => {
        const uid = row.following_id || row.followingId || row.to_user_id || row.toUserId;

        if (uid) followingIds.add(uid);
      });
    }

    async function loadPostsFromTable(tableName) {
      const orderColumns = ["created_at", "createdAt", "timestamp"];

      for (const orderColumn of orderColumns) {
        try {
          const { data, error } = await supabase
            .from(tableName)
            .select("*")
            .order(orderColumn, { ascending: false });

          if (!error) return data || [];
        } catch {}
      }

      try {
        const { data, error } = await supabase
          .from(tableName)
          .select("*");

        if (!error) return data || [];
      } catch {}

      return [];
    }

    async function loadPosts() {
      try {
        const [normalPosts, communityPosts] = await Promise.all([
          loadPostsFromTable("posts"),
          loadPostsFromTable("community_posts")
        ]);

        postsData = [
          ...(normalPosts || []).map(d => normalizePost(d, d.id, "posts")),
          ...(communityPosts || []).map(d => normalizePost(d, d.id, "community_posts"))
        ].sort((a, b) => b.createdAtMs - a.createdAtMs);
      } catch (err) {
        console.error("Posts load error:", err);
        postsData = [];
      }
    }

    async function loadEvents() {
      try {
        const { data, error } = await supabase
          .from("events")
          .select("*");

        if (error) throw error;

        eventsData = (data || []).map(d => normalizeEvent(d, d.id));
      } catch (err) {
        console.error("Events load error:", err);
        eventsData = [];
      }
    }

    async function loadPlaces() {
      const sources = ["nearby_places", "places", "nudist_places"];
      const map = new Map();

      for (const source of sources) {
        try {
          const { data, error } = await supabase
            .from(source)
            .select("*");

          if (error) continue;

          (data || []).forEach(d => {
            const place = normalizePlace(d, d.id, source);
            if (place.id) map.set(`${source}:${place.id}`, place);
          });
        } catch {}
      }

      placesData = Array.from(map.values());
    }

    async function loadCommunities() {
      const sources = ["communities", "community"];
      const map = new Map();

      for (const source of sources) {
        try {
          const { data, error } = await supabase
            .from(source)
            .select("*");

          if (error) continue;

          (data || []).forEach(d => {
            const community = normalizeCommunity(d, d.id, source);
            if (community.id) map.set(`${source}:${community.id}`, community);
          });
        } catch {}
      }

      communitiesData = Array.from(map.values());
    }

    /*
      Correct OwnSpace Inbox badge rule:
      - Count pending message_requests sent to the logged-in user.
      - Count unread incoming chat_messages only.
      - Do NOT count the general notifications table.
      - If the newest message in a thread is from me, that thread does not keep the red dot alive.
      - Old incoming messages before my latest outgoing reply are ignored.
    */

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId", "receiverId", "recipientId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          try {
            const { count, error } = await supabase
              .from("message_requests")
              .select("id", { count: "exact", head: true })
              .eq(targetColumn, uid)
              .eq(statusColumn, "pending");

            if (!error) return count || 0;
          } catch {}
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetColumn, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = normalizeText(getFirstFilled(row, statusColumns, "pending") || "pending");
              return status === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    function readThreadForBadge(raw, fallbackId = "") {
      const d = raw || {};

      return {
        id: String(getFirstFilled(d, ["id"], fallbackId) || fallbackId || ""),
        status: normalizeText(getFirstFilled(d, ["status"], "accepted") || "accepted"),
        participantA: String(getFirstFilled(d, ["participant_a", "participantA"], "") || ""),
        participantB: String(getFirstFilled(d, ["participant_b", "participantB"], "") || ""),
        lastMessageAt: d.last_message_at ?? d.lastMessageAt ?? d.updated_at ?? d.updatedAt ?? d.created_at ?? d.createdAt ?? null
      };
    }

    function readMessageForBadge(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: String(getFirstFilled(d, ["id"], fallbackId) || fallbackId || ""),
        threadId: String(getFirstFilled(d, ["thread_id", "threadId"], "") || ""),
        senderId: String(getFirstFilled(d, ["sender_id", "senderId", "from_user_id", "fromUserId"], "") || ""),
        createdAt: d.created_at ?? d.createdAt ?? d.timestamp ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function badgeTimeMs(value) {
      if (!value) return 0;

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function isInboxMessageUnreadForBadge(msg, uid) {
      if (!msg || msg.senderId === uid) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    async function loadInboxThreadsForBadge(uid) {
      const attempts = [
        ["participant_a", "participant_b"],
        ["participantA", "participantB"]
      ];

      for (const [colA, colB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${colA}.eq.${uid},${colB}.eq.${uid}`);

          if (!error) {
            return (data || [])
              .map(row => readThreadForBadge(row, row.id || ""))
              .filter(thread => thread.id)
              .filter(thread => !thread.status || thread.status === "accepted");
          }
        } catch {}
      }

      return [];
    }

    async function fetchInboxMessagesForBadge(threadIds) {
      if (!threadIds.length) return [];

      const attempts = [
        { threadColumn: "thread_id", orderColumn: "created_at" },
        { threadColumn: "threadId", orderColumn: "createdAt" }
      ];

      for (const attempt of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_messages")
            .select("*")
            .in(attempt.threadColumn, threadIds)
            .order(attempt.orderColumn, { ascending: true });

          if (!error) {
            return (data || []).map(row => readMessageForBadge(row, row.id || ""));
          }
        } catch {}

        try {
          const { data, error } = await supabase
            .from("chat_messages")
            .select("*")
            .in(attempt.threadColumn, threadIds);

          if (!error) {
            return (data || []).map(row => readMessageForBadge(row, row.id || ""));
          }
        } catch {}
      }

      return [];
    }

    async function countUnreadChatMessages(uid) {
      const threads = await loadInboxThreadsForBadge(uid);
      const threadIds = threads.map(thread => thread.id).filter(Boolean);

      if (!threadIds.length) return 0;

      const messages = await fetchInboxMessagesForBadge(threadIds);
      const byThread = new Map();

      messages.forEach(msg => {
        if (!msg.threadId) return;
        if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
        byThread.get(msg.threadId).push(msg);
      });

      let total = 0;

      threads.forEach(thread => {
        const list = (byThread.get(thread.id) || [])
          .sort((a, b) => badgeTimeMs(a.createdAt) - badgeTimeMs(b.createdAt));

        if (!list.length) return;

        const newest = [...list].sort((a, b) => badgeTimeMs(b.createdAt) - badgeTimeMs(a.createdAt))[0];

        if (newest?.senderId === uid) return;

        const lastOutgoingMs = list
          .filter(msg => msg.senderId === uid)
          .reduce((max, msg) => Math.max(max, badgeTimeMs(msg.createdAt)), 0);

        const unreadCount = list.filter(msg => {
          if (msg.senderId === uid) return false;
          if (badgeTimeMs(msg.createdAt) <= lastOutgoingMs) return false;
          return isInboxMessageUnreadForBadge(msg, uid);
        }).length;

        total += unreadCount;
      });

      return total;
    }

    async function loadInboxBadgeCount() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch (err) {
        console.warn("Inbox badge count skipped:", err?.message || err);
        inboxBadge.classList.add("hidden");
      }
    }

    async function refreshAll() {
      openLoading();

      refreshBtn.disabled = true;

      try {
        await Promise.all([
          loadProfiles(),
          loadFollows(),
          loadPosts(),
          loadEvents(),
          loadPlaces(),
          loadCommunities(),
          loadInboxBadgeCount()
        ]);

        renderCounts();
        renderResults();
      } catch (err) {
        console.error(err);
        showEmpty("Could not refresh search data.");
      }

      refreshBtn.disabled = false;
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    searchInput.addEventListener("input", () => {
      updateClearButton();
      renderResults();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateClearButton();
      searchInput.focus();
      renderResults();
    });

    refreshBtn.addEventListener("click", refreshAll);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load search page.");
      }
    }

    initPage();

    /*
      OWNSPACE SEARCH PAGE UPDATE:

      FIXED:
      - Search page light theme remains default.
      - Inbox badge no longer uses old direct count logic.
      - Inbox badge = pending message_requests + unread incoming chat_messages only.
      - General notifications table is ignored.
      - If newest message in a thread is from you, that thread does not keep the red dot alive.
      - Old incoming messages before your latest outgoing reply are ignored.
      - Posts search now also includes community_posts and passes source to post.html.
    */
  </script>
