<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Search</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 110px;
    }
    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:20px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }
    .hero-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .search-wrap{
      position:relative;
      margin-bottom:12px;
    }
    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:14px 48px 14px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    .search-box::placeholder{color:var(--muted)}
    .clear-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 8px;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .section-title{
      font-size:17px;
      font-weight:800;
      margin-bottom:10px;
    }

    .loading-box{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .empty-box{
      text-align:center;
      padding:22px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .person-card{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .person-avatar,.person-avatar-placeholder{
      width:48px;
      height:48px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }
    .person-avatar{object-fit:cover}
    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }
    .person-body{min-width:0;flex:1}
    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
    }
    .person-main{
      min-width:0;
      flex:1;
    }
    .person-name{
      font-size:15px;
      font-weight:800;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }
    .person-name a{
      color:var(--text);
      text-decoration:none;
    }
    .person-name a:hover{text-decoration:underline}
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }
    .person-username{
      font-size:12px;
      color:var(--blue);
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .person-meta-line{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small-pill,
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      flex-shrink:0;
    }
    .pill-blue,.mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .pill-green,.mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .pill-yellow,.mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .card-title{
      font-size:16px;
      font-weight:800;
      line-height:1.4;
      margin-bottom:10px;
    }
    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }
    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }
    .post-preview{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:12px;
    }
    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
      align-items:center;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .btn-soft{
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      color:var(--text);
      border:1px solid rgba(61,220,132,.20);
    }
    .share-post-btn{
      margin-left:auto;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }
    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media (max-width:700px){
      body{padding:10px 10px 110px}
      .brand{font-size:18px}
      .tabs{grid-template-columns:repeat(2,1fr)}
      .share-post-btn{margin-left:0}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="feed.html" class="top-icon-btn" aria-label="Back to feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Search everything</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn" type="button" aria-label="Refresh search data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-title">Search</div>
      <div class="hero-sub">
        Search people, posts, events and places from one page.
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search people..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">✕</button>
      </div>

      <div class="chip-row">
        <span class="chip chip-blue" id="peopleCountChip">People: -</span>
        <span class="chip chip-purple" id="postsCountChip">Posts: -</span>
        <span class="chip chip-green" id="eventsCountChip">Events: -</span>
        <span class="chip chip-yellow" id="placesCountChip">Places: -</span>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="people">People</button>
        <button class="tab-btn" data-tab="posts">Posts</button>
        <button class="tab-btn" data-tab="events">Events</button>
        <button class="tab-btn" data-tab="places">Places</button>
      </div>

      <div id="sectionTitle" class="section-title">People</div>

      <div id="listLoading" class="loading-box">Loading search data...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No results found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5"></path>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const peopleCountChip = document.getElementById("peopleCountChip");
    const postsCountChip = document.getElementById("postsCountChip");
    const eventsCountChip = document.getElementById("eventsCountChip");
    const placesCountChip = document.getElementById("placesCountChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const sectionTitle = document.getElementById("sectionTitle");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentTab = "people";
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let followingIds = new Set();

    let peopleData = [];
    let postsData = [];
    let eventsData = [];
    let placesData = [];
    let profilesMap = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const themeMediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (themeMediaQuery.addEventListener) {
      themeMediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        locationVisibility: getField(d, ["location_visibility", "locationVisibility"]) || "hidden",
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        blockedUsers: Array.isArray(d.blocked_users)
          ? d.blocked_users
          : Array.isArray(d.blockedUsers)
          ? d.blockedUsers
          : [],
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePost(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        userId: getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "uid"]),
        caption: getField(d, ["caption", "text", "content"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        createdAtMs: getCreatedMs(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        title: getField(d, ["title", "name"]) || "Untitled Event",
        description: getField(d, ["description", "desc"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        date: getField(d, ["date"]),
        time: getField(d, ["time"]),
        visibility: getField(d, ["visibility", "event_visibility", "eventVisibility"]) || "public",
        creatorId: getField(d, ["creator_id", "creatorId", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"]) || "Member",
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || "").toLowerCase();

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        approved: d.approved === true || d.verified === true || d.isVerified === true || ["approved","active","verified"].includes(status),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function getCreatedMs(obj) {
      const value = obj?.created_at || obj?.createdAt || obj?.timestamp || null;
      if (!value) return 0;
      const ms = new Date(value).getTime();
      return Number.isNaN(ms) ? 0 : ms;
    }

    async function sharePost(postId) {
      const url = new URL("post.html", window.location.href);
      url.searchParams.set("postId", postId);

      try {
        if (navigator.share) {
          await navigator.share({
            title: "Check this post on BareWorld",
            text: "Check this post on BareWorld",
            url: url.toString()
          });
        } else {
          await navigator.clipboard.writeText(url.toString());
          alert("Post link copied.");
        }
      } catch (err) {
        console.error("Share failed:", err);
      }
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function setTab(tab) {
      currentTab = tab;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      sectionTitle.textContent =
        tab === "people" ? "People" :
        tab === "posts" ? "Posts" :
        tab === "events" ? "Events" : "Places";

      searchInput.placeholder =
        tab === "people" ? "Search people..." :
        tab === "posts" ? "Search posts..." :
        tab === "events" ? "Search events..." :
        "Search places...";

      renderResults();
    }

    function updateClearButton() {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
    }

    function matchesSearch(values, q) {
      if (!q) return true;
      const joined = values.filter(Boolean).join(" ").toLowerCase();
      return joined.includes(q.toLowerCase());
    }

    function canViewProfile(profile) {
      if (!profile) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin || profile.moderationStatus === "banned") return false;
      if (viewerBlockedUsers.includes(profile.uid)) return false;
      return true;
    }

    function getAuthorProfile(uid) {
      if (uid === currentUser?.id && viewerProfile) return viewerProfile;
      return profilesMap.get(uid) || null;
    }

    function canViewPost(post) {
      if (!post || post.hidden) return false;
      const owner = getAuthorProfile(post.userId);
      if (!owner) return post.userId === currentUser.id;
      if (!canViewProfile(owner)) return false;
      if (owner.uid === currentUser.id) return true;
      if (!owner.isPrivate) return true;
      return followingIds.has(owner.uid);
    }

    function renderCounts() {
      const peopleCount = peopleData.filter(p => p.uid !== currentUser.id && canViewProfile(p)).length;
      const postsCount = postsData.filter(canViewPost).length;
      const eventsCount = eventsData.filter(e => !e.hidden).length;
      const placesCount = placesData.filter(p => !p.hidden && p.approved).length;

      peopleCountChip.textContent = `People: ${peopleCount}`;
      postsCountChip.textContent = `Posts: ${postsCount}`;
      eventsCountChip.textContent = `Events: ${eventsCount}`;
      placesCountChip.textContent = `Places: ${placesCount}`;
    }

    async function loadUnreadCount() {
      try {
        const { count, error } = await supabase
          .from("notifications")
          .select("id", { count: "exact", head: true })
          .eq("to_user_id", currentUser.id)
          .eq("is_read", false);

        if (error) {
          inboxBadge.classList.add("hidden");
          return;
        }

        if (!count) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = count > 99 ? "99+" : String(count);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    function getFilteredPeople() {
      const q = searchInput.value.trim();

      return peopleData
        .filter(p => p.uid !== currentUser.id)
        .filter(canViewProfile)
        .filter(p => matchesSearch([p.displayName, p.username, p.bio, p.city], q))
        .sort((a, b) => {
          if (a.verified && !b.verified) return -1;
          if (b.verified && !a.verified) return 1;
          if (followingIds.has(a.uid) && !followingIds.has(b.uid)) return -1;
          if (followingIds.has(b.uid) && !followingIds.has(a.uid)) return 1;
          return a.displayName.localeCompare(b.displayName);
        });
    }

    function getFilteredPosts() {
      const q = searchInput.value.trim();

      return postsData
        .filter(canViewPost)
        .filter(post => {
          const owner = getAuthorProfile(post.userId);
          return matchesSearch([
            post.caption,
            owner?.displayName,
            owner?.username,
            owner?.bio
          ], q);
        })
        .sort((a, b) => b.createdAtMs - a.createdAtMs);
    }

    function getFilteredEvents() {
      const q = searchInput.value.trim();

      return eventsData
        .filter(e => !e.hidden)
        .filter(e => {
          const creator = getAuthorProfile(e.creatorId);
          if (creator && !canViewProfile(creator)) return false;
          return e.visibility !== "private" || e.creatorId === currentUser.id;
        })
        .filter(e => matchesSearch([e.title, e.description, e.city, e.creatorName], q))
        .sort((a, b) => a.title.localeCompare(b.title));
    }

    function getFilteredPlaces() {
      const q = searchInput.value.trim();

      return placesData
        .filter(p => !p.hidden && p.approved)
        .filter(p => matchesSearch([p.name, p.description, p.city, p.address, p.website], q))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderPeople() {
      const rows = getFilteredPeople();

      if (!rows.length) {
        showEmpty("No matching people found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(profile => {
        const avatarHtml = profile.photoURL
          ? `<img class="person-avatar" src="${escapeHtml(profile.photoURL)}" alt="Profile photo">`
          : `<div class="person-avatar-placeholder">No photo</div>`;

        const metaParts = [];
        if (profile.city) metaParts.push(profile.city);
        metaParts.push(profile.isPrivate ? "Private" : "Public");
        if (followingIds.has(profile.uid)) metaParts.push("Following");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="person-card">
            ${avatarHtml}
            <div class="person-body">
              <div class="person-head">
                <div class="person-main">
                  <div class="person-name">
                    <a href="member.html?uid=${encodeURIComponent(profile.uid)}">${escapeHtml(profile.displayName)}</a>
                    ${profile.verified ? `<span class="verified-dot">✓</span>` : ""}
                  </div>
                  ${profile.username ? `<div class="person-username">@${escapeHtml(profile.username)}</div>` : ""}
                  <div class="person-meta-line">${escapeHtml(metaParts.join(" • ") || "Member")}</div>
                </div>
                ${followingIds.has(profile.uid)
                  ? `<span class="small-pill pill-blue">Following</span>`
                  : profile.verified
                  ? `<span class="small-pill pill-green">Verified</span>`
                  : profile.isPrivate
                  ? `<span class="small-pill pill-yellow">Private</span>`
                  : ``}
              </div>

              <div class="card-actions" style="margin-top:10px;">
                <a href="member.html?uid=${encodeURIComponent(profile.uid)}" class="action-btn btn-primary">Open</a>
              </div>
            </div>
          </div>
        `;

        const img = card.querySelector(".person-avatar");
        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
          });
        }

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderPosts() {
      const rows = getFilteredPosts();

      if (!rows.length) {
        showEmpty("No matching posts found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(post => {
        const owner = getAuthorProfile(post.userId) || {};
        const card = document.createElement("div");
        card.className = "card";

        const previewHtml = post.imageURL
          ? `<img class="post-preview" src="${escapeHtml(post.imageURL)}" alt="Post image">`
          : "";

        const badges = [];
        if (owner.displayName) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(owner.displayName)}</span>`);
        if (owner.username) badges.push(`<span class="mini-badge mini-purple">@${escapeHtml(owner.username)}</span>`);
        if (owner.verified) badges.push(`<span class="mini-badge mini-green">Verified</span>`);

        card.innerHTML = `
          <div class="card-title">${escapeHtml((post.caption || "Post").slice(0, 120) || "Post")}</div>
          <div class="badge-row">${badges.join("")}</div>
          ${previewHtml}
          <div class="desc">${escapeHtml(post.caption || "No caption added.")}</div>
          <div class="card-actions">
            <a href="post.html?postId=${encodeURIComponent(post.id)}" class="action-btn btn-primary">Open Post</a>
            <a href="member.html?uid=${encodeURIComponent(post.userId)}" class="action-btn btn-soft">Owner</a>
            <button class="action-btn btn-green share-post-btn" type="button" data-post-id="${escapeHtml(post.id)}">Share</button>
          </div>
        `;

        const img = card.querySelector(".post-preview");
        if (img) {
          img.addEventListener("error", () => {
            img.style.display = "none";
          });
        }

        const shareBtn = card.querySelector(".share-post-btn");
        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            await sharePost(post.id);
          });
        }

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderEvents() {
      const rows = getFilteredEvents();

      if (!rows.length) {
        showEmpty("No matching events found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(event => {
        const creator = getAuthorProfile(event.creatorId) || {};
        const badges = [];
        badges.push(`<span class="mini-badge ${event.visibility === "private" ? "mini-yellow" : "mini-blue"}">${event.visibility === "private" ? "Private" : "Public"}</span>`);
        if (event.city) badges.push(`<span class="mini-badge mini-purple">${escapeHtml(event.city)}</span>`);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${escapeHtml(event.title)}</div>
          <div class="badge-row">${badges.join("")}</div>
          <div class="meta-grid">
            <div><strong>City:</strong> ${escapeHtml(event.city || "Not added")}</div>
            <div><strong>Date:</strong> ${escapeHtml(event.date || "-")}</div>
            <div><strong>Time:</strong> ${escapeHtml(event.time || "-")}</div>
            <div><strong>Host:</strong> ${escapeHtml(creator.displayName || event.creatorName || "Member")}</div>
          </div>
          <div class="desc">${escapeHtml(event.description || "No description added.")}</div>
          <div class="card-actions">
            <a href="nearby-events.html" class="action-btn btn-primary">Open Events Page</a>
            ${event.creatorId ? `<a href="member.html?uid=${encodeURIComponent(event.creatorId)}" class="action-btn btn-soft">Host Profile</a>` : ""}
          </div>
        `;

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderPlaces() {
      const rows = getFilteredPlaces();

      if (!rows.length) {
        showEmpty("No matching places found.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(place => {
        const badges = [];
        badges.push(`<span class="mini-badge mini-green">Approved</span>`);
        if (place.city) badges.push(`<span class="mini-badge mini-purple">${escapeHtml(place.city)}</span>`);

        const websiteHref = normalizeHref(place.website);
        const openDetail = `place.html?placeId=${encodeURIComponent(place.id)}&source=${encodeURIComponent(place.source || "")}`;

        const websiteHtml = place.website
          ? `<a href="${escapeHtml(websiteHref)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-soft">Open Link</a>`
          : "";

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${escapeHtml(place.name)}</div>
          <div class="badge-row">${badges.join("")}</div>
          <div class="meta-grid">
            <div><strong>City:</strong> ${escapeHtml(place.city || "Not added")}</div>
            ${place.address ? `<div><strong>Address:</strong> ${escapeHtml(place.address)}</div>` : ""}
          </div>
          <div class="desc">${escapeHtml(place.description || "No description added.")}</div>
          <div class="card-actions">
            <a href="${openDetail}" class="action-btn btn-primary">Open Place</a>
            ${websiteHtml}
          </div>
        `;

        listWrap.appendChild(card);
      });

      showList();
    }

    function renderResults() {
      openLoading();

      requestAnimationFrame(() => {
        if (currentTab === "people") renderPeople();
        else if (currentTab === "posts") renderPosts();
        else if (currentTab === "events") renderEvents();
        else renderPlaces();
      });
    }

    async function loadViewer(uid) {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", uid).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", uid).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      viewerProfile = normalizeProfile({
        ...(publicRes.data || {}),
        ...(userRes.data || {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
    }

    async function loadProfiles() {
      const { data, error } = await supabase.from("public_profiles").select("*");
      if (error) throw error;

      peopleData = (data || []).map(d => normalizeProfile(d, d.uid));
      profilesMap = new Map();
      peopleData.forEach(p => profilesMap.set(p.uid, p));
    }

    async function loadFollows() {
      const { data, error } = await supabase
        .from("follows")
        .select("following_id")
        .eq("follower_id", currentUser.id);

      if (error) throw error;

      followingIds = new Set((data || []).map(row => row.following_id).filter(Boolean));
    }

    async function loadPosts() {
      const { data, error } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;
      postsData = (data || []).map(d => normalizePost(d, d.id));
    }

    async function loadEvents() {
      const { data, error } = await supabase
        .from("events")
        .select("*");

      if (error) {
        eventsData = [];
        return;
      }

      eventsData = (data || []).map(d => normalizeEvent(d, d.id));
    }

    async function loadPlaces() {
      const sources = ["nearby_places", "places", "nudist_places"];
      const map = new Map();

      for (const source of sources) {
        try {
          const { data, error } = await supabase.from(source).select("*");
          if (error) continue;

          (data || []).forEach(d => {
            const place = normalizePlace(d, d.id, source);
            map.set(`${source}:${place.id}`, place);
          });
        } catch {}
      }

      placesData = Array.from(map.values());
    }

    async function refreshAll() {
      openLoading();
      await Promise.all([
        loadProfiles(),
        loadFollows(),
        loadPosts(),
        loadEvents(),
        loadPlaces(),
        loadUnreadCount()
      ]);
      renderCounts();
      renderResults();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    searchInput.addEventListener("input", () => {
      updateClearButton();
      renderResults();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateClearButton();
      searchInput.focus();
      renderResults();
    });

    refreshBtn.addEventListener("click", refreshAll);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load search page.");
      }
    }

    initPage();

    /*
      SUPABASE NEEDS FOR THIS PAGE:

      TABLES:
      - users: select
      - public_profiles: select
      - follows: select
      - posts: select
      - events: select
      - nearby_places: select
      - places: select
      - nudist_places: select
      - notifications: select

      AUTH:
      - logged-in user required

      SHARE BUTTON:
      - Added on post result cards inside Posts tab.
      - Uses native mobile share sheet when available.
      - Desktop fallback copies post.html?postId=POST_ID.
    */
  </script>
</body>
</html>
