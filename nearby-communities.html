<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Communities</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
      --shadow-soft:0 10px 22px rgba(20,33,61,.06);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
      --shadow-soft:0 10px 24px rgba(0,0,0,.16);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 10px;
      font-size:13px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      cursor:pointer;
      min-height:46px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
      min-width:0;
    }

    .action-btn svg{
      width:16px;
      height:16px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}

    .status-text{
      min-height:18px;
      font-size:12.5px;
      margin-top:8px;
      line-height:1.45;
      color:var(--muted);
    }

    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin-bottom:10px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px 5px;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:11.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:950;
    }

    .filter-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .filter-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 11px;
      font-size:12px;
      font-weight:950;
      cursor:pointer;
    }

    .filter-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .list{
      display:grid;
      gap:9px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .community-tile{
      width:100%;
      text-decoration:none;
      color:var(--text);
      background:
        linear-gradient(135deg, rgba(255,255,255,.58), rgba(255,255,255,.18)),
        var(--surface-2);
      border:1px solid var(--line);
      border-radius:19px;
      padding:10px;
      display:grid;
      grid-template-columns:56px 1fr 30px;
      gap:10px;
      align-items:center;
      min-height:84px;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease;
      position:relative;
      overflow:hidden;
    }

    html[data-theme="dark"] .community-tile{
      background:
        linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        var(--surface-2);
    }

    .community-tile:hover{
      border-color:rgba(76,201,255,.30);
      box-shadow:0 15px 30px rgba(20,33,61,.10);
    }

    .community-tile:active{
      transform:scale(.992);
    }

    .tile-photo,
    .tile-placeholder{
      width:56px;
      height:56px;
      border-radius:17px;
      border:1px solid var(--line);
      background:var(--surface-3);
      overflow:hidden;
      flex-shrink:0;
    }

    .tile-photo{
      object-fit:cover;
      display:block;
    }

    .tile-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:23px;
      font-weight:950;
      background:
        radial-gradient(circle at 26% 20%, rgba(76,201,255,.24), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.17), rgba(61,220,132,.12)),
        var(--surface-3);
      color:var(--text);
    }

    .tile-main{
      min-width:0;
    }

    .tile-top{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }

    .tile-name{
      font-size:15.5px;
      line-height:1.25;
      font-weight:950;
      letter-spacing:-.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .tile-location{
      display:flex;
      align-items:center;
      gap:5px;
      color:var(--muted);
      margin-top:4px;
      font-size:12px;
      font-weight:850;
      min-width:0;
    }

    .tile-location svg{
      width:12px;
      height:12px;
      flex-shrink:0;
    }

    .tile-location span{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .tile-chips{
      display:flex;
      align-items:center;
      gap:5px;
      flex-wrap:wrap;
      margin-top:7px;
    }

    .tile-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      border-radius:999px;
      padding:5px 7px;
      font-size:10.5px;
      font-weight:950;
      line-height:1;
      color:var(--text);
      background:var(--surface);
      border:1px solid var(--line);
      white-space:nowrap;
    }

    .tile-chip svg{
      width:11px;
      height:11px;
      flex-shrink:0;
    }

    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .tile-arrow{
      width:30px;
      height:30px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--surface);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      flex-shrink:0;
    }

    .tile-arrow svg{
      width:16px;
      height:16px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}

      .top-actions{
        grid-template-columns:1fr 1fr;
        gap:8px;
      }

      .action-btn{
        font-size:12.5px;
        padding:10px 8px;
        min-height:44px;
      }

      .tabs{
        grid-template-columns:repeat(4,1fr);
        gap:6px;
      }

      .tab-link{
        font-size:10.5px;
        padding:8px 3px;
      }

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      body{padding-left:7px;padding-right:7px}

      .action-btn{
        font-size:11.5px;
        padding:9px 6px;
        gap:5px;
      }

      .action-btn svg{
        width:15px;
        height:15px;
      }

      .tab-link{font-size:9.8px}

      .filter-btn{
        font-size:11px;
        padding:8px 10px;
      }

      .community-tile{
        grid-template-columns:50px 1fr 28px;
        gap:8px;
        padding:9px;
        min-height:78px;
      }

      .tile-photo,
      .tile-placeholder{
        width:50px;
        height:50px;
        border-radius:16px;
      }

      .tile-name{font-size:15px}
      .tile-chip{font-size:10px;padding:5px 6px}
      .tile-arrow{width:28px;height:28px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <a href="feed.html" class="top-icon-btn" aria-label="Back to Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Communities</div>
      </div>

      <a href="settings.html" class="top-icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>

        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="top-actions">
        <a href="create-community.html" class="action-btn btn-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Create Community</span>
        </a>

        <a href="hub.html" class="action-btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 19.5V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14.5"></path>
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M8 7h8"></path>
            <path d="M8 11h6"></path>
          </svg>
          <span>OwnSpace Hub</span>
        </a>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link">People</a>
        <a href="nearby-events.html" class="tab-link">Events</a>
        <a href="nearby-places.html" class="tab-link">Places</a>
        <a href="communities.html" class="tab-link active">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search communities, category, city..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">Ã</button>
      </div>

      <div class="filter-row">
        <button class="filter-btn active" type="button" data-filter="all">All</button>
        <button class="filter-btn" type="button" data-filter="featured">Featured</button>
        <button class="filter-btn" type="button" data-filter="new">New</button>
        <button class="filter-btn" type="button" data-filter="popular">Popular</button>
        <button class="filter-btn" type="button" data-filter="joined">Joined</button>
        <button class="filter-btn" type="button" data-filter="created">Created</button>
      </div>

      <div id="listLoading" class="loading-box">Loading communities...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No communities found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const inboxBadge = document.getElementById("inboxBadge");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const filterButtons = document.querySelectorAll(".filter-btn");

    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentProfile = null;
    let currentFilter = "all";

    let communitiesData = [];
    let membershipsData = [];
    let joinedCommunityIds = new Set();
    let memberCountMap = new Map();
    let creatorProfileCache = new Map();

    let realtimeChannels = [];
    let refreshTimer = null;

    const COMMUNITY_TABLE = "communities";
    const MEMBER_TABLES = ["community_members", "communityMembers", "communities_members"];

    const ICONS = {
      check: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 6 9 17l-5-5"></path>

      `,
      star: `

          <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 16.9l-5.4 2.9 1-6.1-4.4-4.3 6.1-.9Z"></path>

      `,

      globe: `

          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>

          <path d="M12 17v5"></path>
          <path d="M9 7 7 3h10l-2 4"></path>
          <path d="M7 14h10l-2-7H9Z"></path>
        </svg>
      `
    };

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return value;
        }
      }

      return fallback;
    }

    function getString(raw, names, fallback = "") {
      const value = getField(raw, names, fallback);
      return value === undefined || value === null ? fallback : String(value).trim();
    }

    function getBool(raw, names, fallback = false) {
      for (const name of names) {
        if (raw?.[name] !== undefined && raw?.[name] !== null) return !!raw[name];
      }

      return fallback;
    }

    function getNumber(raw, names, fallback = 0) {
      const value = getField(raw, names, fallback);
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function toMillis(value) {
      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function isMissingSchemaError(error) {
      const msg = String(error?.message || error || "").toLowerCase();

      return (
        msg.includes("does not exist") ||
        msg.includes("not found in the schema cache") ||
        msg.includes("could not find the table") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        (msg.includes("relation") && msg.includes("does not exist"))
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      return {
        uid: getString(d, ["uid", "id", "user_id", "userId"], fallbackUid) || fallbackUid || "",
        displayName: getString(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"], "Member") || "Member",
        username: getString(d, ["username", "handle", "user_name", "userName"], ""),
        photoURL: getString(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"], ""),
        bio: getString(d, ["bio", "about", "description"], ""),
        verified: getBool(d, ["verified", "is_verified", "isVerified"], false),
        softDeleted: getBool(d, ["soft_deleted", "softDeleted"], false),
        isHiddenByAdmin: getBool(d, ["is_hidden_by_admin", "isHiddenByAdmin"], false),
        moderationStatus: getString(d, ["moderation_status", "moderationStatus", "status"], "")
      };
    }

    function normalizeCommunity(raw, fallbackId = "") {
      const d = raw || {};
      const status = normalizeText(d.status || d.community_status || d.communityStatus || "");

      const privacy = normalizeText(
        getString(d, ["privacy", "visibility", "community_privacy", "communityPrivacy"], "public")
      ) || "public";

      const rejected =
        status === "rejected" ||
        getBool(d, ["rejected", "is_rejected", "isRejected"], false);

      const explicitlyPending =
        status === "pending" ||
        getBool(d, ["pending", "is_pending", "isPending"], false);

      const explicitlyApproved =
        getBool(d, ["approved", "is_approved", "isApproved"], false) ||
        ["active", "approved", "published", "public"].includes(status);

      const approved =
        explicitlyApproved ||
        (!explicitlyPending && !rejected && getField(d, ["approved", "is_approved", "isApproved"], null) === null);

      const createdAt =
        d.created_at ??
        d.createdAt ??
        d.timestamp ??
        d.created ??
        null;

      const coverURL = getString(d, [
        "cover_url",
        "coverURL",
        "coverUrl",
        "image_url",
        "imageURL",
        "imageUrl",
        "photo_url",
        "photoURL",
        "media_url",
        "mediaUrl"
      ], "");

      return {
        id: getString(d, ["id"], fallbackId) || fallbackId || "",
        name: getString(d, ["name", "title", "community_name", "communityName"], "Untitled Community") || "Untitled Community",
        description: getString(d, ["description", "desc", "about", "summary"], ""),
        category: getString(d, ["category", "topic", "type"], "General") || "General",
        privacy,
        city: getString(d, ["city", "location_city", "locationCity"], ""),
        province: getString(d, ["province", "state", "region", "location_province", "locationProvince"], ""),
        country: getString(d, ["country", "location_country", "locationCountry"], ""),
        location: getString(d, ["location", "place", "address", "nearby_location", "nearbyLocation"], ""),
        coverURL,
        creatorId: getString(d, ["creator_id", "creatorId", "created_by", "createdBy", "owner_id", "ownerId", "user_id", "userId", "uid"], ""),
        creatorName: getString(d, ["creator_name", "creatorName", "display_name", "displayName", "owner_name", "ownerName"], "Member") || "Member",
        creatorUsername: getString(d, ["creator_username", "creatorUsername", "owner_username", "ownerUsername"], ""),
        memberCount: getNumber(d, ["member_count", "memberCount", "members_count", "membersCount"], 0),
        postCount: getNumber(d, ["post_count", "postCount", "posts_count", "postsCount"], 0),
        featured: getBool(d, ["featured", "is_featured", "isFeatured"], false),
        pinned: getBool(d, ["pinned", "is_pinned", "isPinned"], false),
        approved,
        pending: explicitlyPending && !approved,
        rejected,
        hidden: !!(
          d.hidden ||
          d.hidden_by_admin ||
          d.hiddenByAdmin ||
          d.soft_deleted ||
          d.softDeleted
        ) || status === "deleted",
        createdAt,
        createdAtMs: toMillis(createdAt),
        searchable: ""
      };
    }

    function normalizeMembership(raw) {
      const d = raw || {};

      return {
        id: getString(d, ["id"], ""),
        communityId: getString(d, ["community_id", "communityId", "group_id", "groupId"], ""),
        userId: getString(d, ["user_id", "userId", "uid", "member_id", "memberId"], ""),
        role: getString(d, ["role"], "member") || "member",
        status: normalizeText(getString(d, ["status", "member_status", "memberStatus"], "active") || "active"),
        joinedAt: d.joined_at ?? d.joinedAt ?? d.created_at ?? d.createdAt ?? null
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getString(d, ["thread_id", "threadId"], ""),
        senderId: getString(d, ["sender_id", "senderId", "from_user_id", "fromUserId"], ""),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function isMessageUnread(msg) {
      if (!msg || msg.senderId === currentUser.id) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase.from(table).select("id", { count: "exact", head: true });
        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = [
        "target_id",
        "to_user_id",
        "receiver_id",
        "recipient_id",
        "targetId",
        "toUserId",
        "receiverId",
        "recipientId"
      ];

      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetColumn, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = getString(row, ["status", "request_status", "requestStatus"], "pending");
              return normalizeText(status || "pending") === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    async function fetchChatThreadsForUser(uid) {
      const map = new Map();

      const attempts = [
        { a: "participant_a", b: "participant_b" },
        { a: "participantA", b: "participantB" }
      ];

      for (const fields of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${fields.a}.eq.${uid},${fields.b}.eq.${uid}`);

          if (!error && Array.isArray(data)) {
            data.forEach(row => {
              if (row.id) map.set(row.id, row);
            });
          }
        } catch {}
      }

      return Array.from(map.values());
    }

    async function fetchMessagesForThreads(threadIds) {
      if (!threadIds.length) return [];

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("thread_id", threadIds)
          .order("created_at", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("threadId", threadIds)
          .order("createdAt", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      return [];
    }

    async function countUnreadChatMessages(uid) {
      try {
        const threads = await fetchChatThreadsForUser(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);

        if (!threadIds.length) return 0;

        const messages = await fetchMessagesForThreads(threadIds);
        const byThread = new Map();

        messages.forEach(msg => {
          if (!msg.threadId) return;

          if (!byThread.has(msg.threadId)) {
            byThread.set(msg.threadId, []);
          }

          byThread.get(msg.threadId).push(msg);
        });

        let total = 0;

        threads.forEach(thread => {
          const list = byThread.get(thread.id) || [];

          if (!list.length) return;

          const newest = [...list].sort((a, b) => toMillis(b.createdAt) - toMillis(a.createdAt))[0];

          if (newest?.senderId === uid) return;

          const lastOutgoingMs = list
            .filter(msg => msg.senderId === uid)
            .reduce((max, msg) => Math.max(max, toMillis(msg.createdAt)), 0);

          const unreadInThread = list.filter(msg => {
            if (msg.senderId === uid) return false;
            if (toMillis(msg.createdAt) <= lastOutgoingMs) return false;
            return isMessageUnread(msg);
          }).length;

          total += unreadInThread;
        });

        return total;
      } catch (err) {
        console.warn("Unread chat count failed:", err?.message || err);
        return 0;
      }
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadMergedProfile(uid) {
      if (!uid) return normalizeProfile({}, "");

      if (creatorProfileCache.has(uid)) {
        return creatorProfileCache.get(uid);
      }

      try {
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);

        const profile = normalizeProfile({
          ...(publicRow || {}),
          ...(userRow || {}),
          uid
        }, uid);

        creatorProfileCache.set(uid, profile);
        return profile;
      } catch {
        const fallback = normalizeProfile({ uid }, uid);
        creatorProfileCache.set(uid, fallback);
        return fallback;
      }
    }

    async function selectMemberRowsFromTable(tableName) {
      try {
        const { data, error } = await supabase
          .from(tableName)
          .select("*");

        if (error) throw error;

        return {
          table: tableName,
          rows: (data || []).map(row => ({
            ...normalizeMembership(row),
            __raw: row,
            __table: tableName
          }))
        };
      } catch (err) {
        if (!isMissingSchemaError(err)) {
          console.warn(`Community member source failed: ${tableName}`, err?.message || err);
        }

        return { table: tableName, rows: [] };
      }
    }

    function getLocationText(model) {
      if (model.location) return model.location;

      const locationParts = [model.city, model.province, model.country].filter(Boolean);
      return locationParts.length ? locationParts.join(", ") : "Location not added";
    }

    async function loadCommunities() {
      try {
        const { data, error } = await supabase
          .from(COMMUNITY_TABLE)
          .select("*");

        if (error) throw error;

        communitiesData = (data || [])
          .map(row => {
            const model = normalizeCommunity(row, row.id);
            const locationText = getLocationText(model);

            model.searchable = [
              model.name,
              model.description,
              model.category,
              model.city,
              model.province,
              model.country,
              model.location,
              locationText,
              model.creatorName,
              model.privacy
            ].filter(Boolean).join(" ").toLowerCase();

            return model;
          });
      } catch (err) {
        console.error("Communities load failed:", err);
        communitiesData = [];

        if (isMissingSchemaError(err)) {
          setPageStatus("Communities table not found yet.", "status-err");
        } else {
          setPageStatus("Could not load communities.", "status-err");
        }
      }
    }

    async function loadMemberships() {
      membershipsData = [];
      joinedCommunityIds = new Set();
      memberCountMap = new Map();

      const results = await Promise.all(MEMBER_TABLES.map(selectMemberRowsFromTable));
      const allRows = [];

      results.forEach(result => {
        result.rows.forEach(row => allRows.push(row));
      });

      membershipsData = allRows.filter(row => row.communityId && row.userId);

      membershipsData.forEach(row => {
        const inactive = ["left", "removed", "declined", "rejected", "banned"].includes(row.status);

        if (inactive) return;

        memberCountMap.set(row.communityId, (memberCountMap.get(row.communityId) || 0) + 1);

        if (row.userId === currentUser.id) {
          joinedCommunityIds.add(row.communityId);
        }
      });
    }

    function isMine(model) {
      return model.creatorId === currentUser?.id;
    }

    function isJoined(model) {
      return joinedCommunityIds.has(model.id);
    }

    function isVisibleCommunity(model) {
      if (model.hidden || model.rejected) return false;

      const mine = isMine(model);
      const joined = isJoined(model);

      if (!model.approved && !mine && !joined) return false;

      if (model.privacy === "private" && !mine && !joined) return false;

      return true;
    }

    function getCommunityMemberCount(model) {
      const liveCount = memberCountMap.get(model.id) || 0;
      return Math.max(Number(model.memberCount || 0), liveCount);
    }

    function getFilteredCommunities() {
      const q = searchInput.value.trim().toLowerCase();

      return communitiesData
        .filter(isVisibleCommunity)
        .map(model => ({
          ...model,
          mine: isMine(model),
          joined: isJoined(model),
          liveMemberCount: getCommunityMemberCount(model)
        }))
        .filter(model => {
          if (q && !model.searchable.includes(q)) return false;

          if (currentFilter === "featured") return model.featured;
          if (currentFilter === "joined") return model.joined && !model.mine;
          if (currentFilter === "created") return model.mine;

          return true;
        })
        .sort((a, b) => {
          if (currentFilter === "new") {
            return b.createdAtMs - a.createdAtMs;
          }

          if (currentFilter === "popular") {
            return b.liveMemberCount - a.liveMemberCount || b.createdAtMs - a.createdAtMs;
          }

          if (a.pinned && !b.pinned) return -1;
          if (b.pinned && !a.pinned) return 1;

          if (a.featured && !b.featured) return -1;
          if (b.featured && !a.featured) return 1;

          if (a.mine && !b.mine) return -1;
          if (b.mine && !a.mine) return 1;

          if (b.liveMemberCount !== a.liveMemberCount) return b.liveMemberCount - a.liveMemberCount;

          return b.createdAtMs - a.createdAtMs || a.name.localeCompare(b.name);
        });
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function updateClearButton() {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
    }

    function buildCommunityUrl(model) {
      return `community.html?communityId=${encodeURIComponent(model.id)}`;
    }

    function getPrivacyLabel(model) {
      if (model.privacy === "private") return "Private";
      if (["request", "approval", "request_only"].includes(model.privacy)) return "Request";
      return "Public";
    }

    function getPrivacyChipClass(model) {
      if (model.privacy === "private") return "chip-yellow";
      if (["request", "approval", "request_only"].includes(model.privacy)) return "chip-purple";
      return "chip-green";
    }

    function getPrivacyIcon(model) {
      if (model.privacy === "private" || ["request", "approval", "request_only"].includes(model.privacy)) {
        return ICONS.lock;
      }

      return ICONS.globe;
    }

    function renderCommunities() {
      openLoading();

      const rows = getFilteredCommunities();

      if (!rows.length) {
        const q = searchInput.value.trim();

        if (q) {
          showEmpty("No communities matched your search.");
        } else if (currentFilter === "featured") {
          showEmpty("No featured communities yet.");
        } else if (currentFilter === "joined") {
          showEmpty("You have not joined any communities yet.");
        } else if (currentFilter === "created") {
          showEmpty("You have not created any communities yet.");
        } else {
          showEmpty("No communities yet. Create the first community.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const tile = document.createElement("a");
        tile.className = "community-tile";
        tile.href = buildCommunityUrl(model);
        tile.setAttribute("aria-label", `Open ${model.name}`);

        const firstLetter = (model.name || "C").trim().charAt(0).toUpperCase() || "C";

        const photoHtml = model.coverURL
          ? `<img class="tile-photo" src="${escapeHtml(model.coverURL)}" alt="">`
          : `<div class="tile-placeholder">${escapeHtml(firstLetter)}</div>`;

        const memberCount = Number(model.liveMemberCount || 0);
        const memberText = `${memberCount} member${memberCount === 1 ? "" : "s"}`;
        const locationText = getLocationText(model);

        const chips = [];

        chips.push(`<span class="tile-chip chip-blue">${escapeHtml(model.category || "General")}</span>`);

        chips.push(`
          <span class="tile-chip ${getPrivacyChipClass(model)}">
            ${getPrivacyIcon(model)}
            ${escapeHtml(getPrivacyLabel(model))}
          </span>
        `);

        chips.push(`<span class="tile-chip">${escapeHtml(memberText)}</span>`);

        if (model.mine) {
          chips.push(`<span class="tile-chip chip-green">${ICONS.check} Mine</span>`);
        } else if (model.joined) {
          chips.push(`<span class="tile-chip chip-green">${ICONS.check} Joined</span>`);
        }

        if (model.featured) {
          chips.push(`<span class="tile-chip chip-purple">${ICONS.star} Featured</span>`);
        }

        if (model.pinned) {
          chips.push(`<span class="tile-chip chip-yellow">${ICONS.star} Pinned</span>`);
        }

        tile.innerHTML = `
          ${photoHtml}

          <div class="tile-main">
            <div class="tile-top">
              <div class="tile-name">${escapeHtml(model.name)}</div>
            </div>

            <div class="tile-location">
              ${ICONS.pin}
              <span>${escapeHtml(locationText)}</span>
            </div>

            <div class="tile-chips">
              ${chips.join("")}
            </div>
          </div>

          <div class="tile-arrow" aria-hidden="true">
            ${ICONS.open}
          </div>
        `;

        const photo = tile.querySelector(".tile-photo");

        if (photo) {
          photo.addEventListener("error", () => {
            photo.outerHTML = `<div class="tile-placeholder">${escapeHtml(firstLetter)}</div>`;
          });
        }

        listWrap.appendChild(tile);
      });

      showList();
    }

    async function refreshAll() {
      openLoading();
      setPageStatus("");

      await Promise.all([
        loadCommunities(),
        loadMemberships(),
        loadInboxBadge()
      ]);

      renderCommunities();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);

      refreshTimer = setTimeout(() => {
        refreshAll().catch(err => {
          console.error("Community refresh failed:", err);
        });
      }, 350);
    }

    function scheduleBadgeRefresh() {
      clearTimeout(refreshTimer);

      refreshTimer = setTimeout(() => {
        loadInboxBadge().catch(() => {});
      }, 350);
    }

    function clearRealtimeChannels() {
      realtimeChannels.forEach(channel => {
        try {
          supabase.removeChannel(channel);
        } catch {}
      });

      realtimeChannels = [];
    }

    function setupRealtime() {
      clearRealtimeChannels();

      const tableGroups = [
        { table: COMMUNITY_TABLE, handler: scheduleRefresh },
        { table: "message_requests", handler: scheduleBadgeRefresh },
        { table: "chat_threads", handler: scheduleBadgeRefresh },
        { table: "chat_messages", handler: scheduleBadgeRefresh },
        { table: "notifications", handler: scheduleBadgeRefresh }
      ];

      MEMBER_TABLES.forEach(table => {
        tableGroups.push({ table, handler: scheduleRefresh });
      });

      tableGroups.forEach(item => {
        try {
          const channel = supabase
            .channel(`ownspace-communities-live-${item.table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table: item.table },
              () => item.handler()
            )
            .subscribe();

          realtimeChannels.push(channel);
        } catch {}
      });
    }

    async function loadCurrentUserProfile() {
      currentProfile = await loadMergedProfile(currentUser.id);
    }

    searchInput.addEventListener("input", () => {
      updateClearButton();
      renderCommunities();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateClearButton();
      searchInput.focus();
      renderCommunities();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        currentFilter = btn.dataset.filter || "all";

        filterButtons.forEach(item => item.classList.remove("active"));
        btn.classList.add("active");

        renderCommunities();
      });
    });

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        clearRealtimeChannels();
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      try {
        await loadCurrentUserProfile();
        await refreshAll();
        setupRealtime();
      } catch (err) {
        console.error(err);
        showEmpty("Could not load communities.");
        setPageStatus("Could not load communities.", "status-err");
      }

      supabase.auth.onAuthStateChange((_event, session) => {
        if (!session?.user) {
          clearRealtimeChannels();
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      clearRealtimeChannels();
    });

    initPage();

    /*
      OWNSPACE COMMUNITIES UPDATE:

      COMPACT CLICKABLE TILE UI:
      - Community list has compact rows only.
      - No Join/Open/Share/extra action buttons inside each row.
      - Full community tile opens community.html?communityId=...
      - Shows photo/initial, community name, location, category, privacy, members, joined/mine/featured/pinned status.

      FIXED:
      - Broken clear button character fixed to Ã.
      - Inbox badge now follows the same cleaned logic:
        pending message_requests + truly unread incoming chat_messages.
      - It does not count general notifications.
      - It does not count all old chat history forever.
      - If newest message in a thread is yours, that thread counts 0 unread.
      - Incoming messages before your latest outgoing message are ignored.
      - Added realtime badge refresh for message_requests, chat_threads, chat_messages, notifications.
    */
  </script>
</body>
</html>
