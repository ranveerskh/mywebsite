<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby Places</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#0b1020;
      --card:#121931;
      --soft:#161f3d;
      --soft2:#0f1630;
      --line:rgba(255,255,255,.08);
      --text:#fff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --card:#ffffff;
      --soft:#eef3fb;
      --soft2:#f7f9fd;
      --line:rgba(15,23,42,.08);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
    }

    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);
      min-height:100vh;
      padding:14px 14px 92px;
    }
    html[data-theme="light"] body{
      background:linear-gradient(180deg,#eef4ff 0%,#f8fbff 100%);
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);
      border:1px solid rgba(255,255,255,.04);
      border-radius:18px;padding:10px 12px;margin-bottom:14px;
      display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:10px;
    }
    html[data-theme="light"] .topbar{
      background:rgba(255,255,255,.88);
      border:1px solid rgba(15,23,42,.06);
    }

    .top-icon-btn,.chip-btn{
      border:none;background:var(--soft);color:var(--text);border-radius:14px;
      padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;border:1px solid var(--line);
      text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;
    }
    .top-icon-btn{width:48px;height:48px;padding:0}
    .top-icon-btn svg{width:20px;height:20px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:22px;font-weight:800;line-height:1.1}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}

    .panel{
      background:rgba(18,25,49,.88);border:1px solid var(--line);border-radius:22px;padding:16px;
      margin-bottom:14px;box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    html[data-theme="light"] .panel{
      background:rgba(255,255,255,.92);
      box-shadow:0 16px 30px rgba(20,33,61,.08);
    }

    .section-title{font-size:20px;font-weight:800;margin-bottom:8px}
    .section-note{color:var(--muted);font-size:13px;line-height:1.6}

    .stats-row{
      display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;
    }
    .stat-chip{
      display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;
      font-size:12px;font-weight:800;border:1px solid var(--line);background:var(--soft2);color:var(--text);
    }
    .stat-chip.blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .stat-chip.green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .stat-chip.yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .stat-chip.purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .toolbar{display:grid;gap:12px}
    .tabs{
      display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    }
    .tab-btn{
      border:none;background:var(--soft2);color:var(--text);border:1px solid var(--line);
      border-radius:14px;padding:11px 10px;font-size:13px;font-weight:800;cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-wrap{position:relative}
    .search-input{
      width:100%;border:none;outline:none;background:var(--soft2);color:var(--text);
      border:1px solid var(--line);border-radius:16px;padding:14px 46px 14px 14px;font-size:14px;
    }
    .search-input::placeholder{color:var(--muted)}
    .clear-search-btn{
      position:absolute;right:8px;top:50%;transform:translateY(-50%);
      width:32px;height:32px;border:none;border-radius:10px;background:var(--soft);color:var(--text);
      border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:800;
    }

    .actions-row{
      display:flex;gap:8px;flex-wrap:wrap;
    }
    .action-btn{
      border:none;background:var(--soft2);color:var(--text);border:1px solid var(--line);
      border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;
      display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;
    }
    .action-btn.primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .action-btn.green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .action-btn.yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .action-btn.purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .list{display:grid;gap:12px}

    .card{
      background:var(--soft2);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:14px;
    }
    html[data-theme="light"] .card{
      border:1px solid rgba(15,23,42,.06);
    }

    .cover-link{
      display:block;text-decoration:none;color:inherit;
    }
    .cover{
      width:100%;max-height:260px;object-fit:cover;border-radius:16px;display:block;background:var(--soft);
      border:1px solid var(--line);margin-bottom:12px;
    }

    .card-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;
    }
    .card-title{
      font-size:17px;font-weight:800;line-height:1.4;
    }
    .card-title a{
      color:var(--text);
      text-decoration:none;
    }
    .card-title a:hover{text-decoration:underline}
    .card-time{
      color:var(--muted);font-size:11px;white-space:nowrap;
    }

    .badge-row{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;
    }
    .badge{
      display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;
      font-size:11px;font-weight:800;border:1px solid transparent;
    }
    .badge.blue{background:rgba(76,201,255,.14);color:#d8f7ff;border-color:rgba(76,201,255,.20)}
    .badge.green{background:rgba(61,220,132,.14);color:#d9ffe8;border-color:rgba(61,220,132,.20)}
    .badge.yellow{background:rgba(245,185,66,.14);color:#ffeab8;border-color:rgba(245,185,66,.20)}
    .badge.purple{background:rgba(167,139,250,.14);color:#efe7ff;border-color:rgba(167,139,250,.20)}

    .meta-grid{
      display:grid;gap:8px;margin-bottom:10px;
    }
    .meta-item{
      background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:10px 12px;
      font-size:13px;line-height:1.55;
    }
    .meta-item strong{
      display:block;margin-bottom:4px;color:var(--muted);font-size:11px;
    }

    .card-text{
      color:#d7def5;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;
    }
    html[data-theme="light"] .card-text{
      color:#33415c;
    }

    .card-actions{
      display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;
    }

    .empty-box{
      text-align:center;padding:28px 10px;color:var(--muted);background:var(--soft2);border-radius:18px;
      border:1px dashed rgba(255,255,255,.08);
    }

    .message{
      min-height:18px;
      font-size:13px;
      margin-top:8px;
    }
    .message.ok{color:#9cf0bf}
    .message.err{color:#ffb3bd}

    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(760px, calc(100% - 20px));
      background:rgba(12,18,35,.92);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px);
      border-radius:20px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    html[data-theme="light"] .bottom-nav{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(15,23,42,.08);
      box-shadow:0 16px 30px rgba(20,33,61,.10);
    }
    .nav-link{
      text-decoration:none;color:#b9c4e3;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 6px;border-radius:14px;font-size:11px;font-weight:700;min-height:58px;
    }
    html[data-theme="light"] .nav-link{color:#6b7893}
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:#d8f7ff;
    }
    html[data-theme="light"] .nav-link.active{color:#1f8fff}
    .nav-link .icon{font-size:18px;line-height:1}

    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{grid-template-columns:48px 1fr}
      .top-actions{grid-column:1 / -1;justify-content:stretch}
      .top-actions .chip-btn{flex:1}
      .brand{font-size:20px}
      .tabs{grid-template-columns:1fr}
      .card-actions .action-btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby Places</div>
      </div>

      <div class="top-actions">
        <a href="add-place.html" class="chip-btn">Add Place</a>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Nearby Places</div>
      <div class="section-note">Browse approved places, pending submissions, and your own added spots. Every card opens full place detail.</div>

      <div class="stats-row">
        <span id="allCountChip" class="stat-chip blue">All: 0</span>
        <span id="verifiedCountChip" class="stat-chip green">Verified: 0</span>
        <span id="pendingCountChip" class="stat-chip yellow">Pending: 0</span>
        <span id="mineCountChip" class="stat-chip purple">Mine: 0</span>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div class="tabs">
          <button class="tab-btn active" data-tab="all" type="button">All</button>
          <button class="tab-btn" data-tab="verified" type="button">Verified</button>
          <button class="tab-btn" data-tab="pending" type="button">Pending</button>
          <button class="tab-btn" data-tab="mine" type="button">Mine</button>
        </div>

        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search places..." />
          <button id="clearSearchBtn" class="clear-search-btn hidden" type="button">✕</button>
        </div>

        <div class="actions-row">
          <button id="refreshBtn" class="action-btn green" type="button">Refresh</button>
          <a href="add-place.html" class="action-btn primary">Add Place</a>
          <a href="nearby.html" class="action-btn">Nearby Hub</a>
        </div>

        <div id="pageMessage" class="message"></div>
      </div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading places...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No places found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link active">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const refreshBtn = document.getElementById("refreshBtn");
    const searchInput = document.getElementById("searchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const pageMessage = document.getElementById("pageMessage");

    const allCountChip = document.getElementById("allCountChip");
    const verifiedCountChip = document.getElementById("verifiedCountChip");
    const pendingCountChip = document.getElementById("pendingCountChip");
    const mineCountChip = document.getElementById("mineCountChip");

    let currentUser = null;
    let currentTab = "all";
    let allPlaces = [];

    const PLACE_SOURCES = ["nearby_places", "places", "nudist_places"];

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (getStoredTheme() === "system") applyTheme("system");
    });

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "nearby.html";
    });

    function setMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function tsMs(ts) {
      if (!ts) return 0;
      try { return ts.toDate().getTime(); } catch {}
      try {
        const ms = new Date(ts).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || "").toLowerCase();
      const approved = d.approved === true || d.verified === true || d.isVerified === true || ["approved", "active", "verified"].includes(status);
      const rejected = status === "rejected" || d.rejected === true;
      const pending = (status === "pending" || d.pending === true || (!approved && !rejected));

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: d.name || d.title || d.placeName || "Unnamed Place",
        category: d.category || d.topic || "General",
        description: d.description || d.desc || d.notes || "",
        city: d.city || d.locationCity || "",
        address: d.address || d.fullAddress || "",
        website: d.website || d.url || d.link || "",
        imageURL: d.imageURL || d.imageUrl || d.photoURL || d.mediaUrl || "",
        createdBy: d.createdBy || d.userId || d.uid || "",
        creatorName: d.creatorName || d.displayName || "Member",
        approved,
        pending,
        rejected,
        hidden: !!d.hidden || !!d.hiddenByAdmin || !!d.softDeleted,
        createdAt: d.createdAt || null
      };
    }

    function updateCounts() {
      const visible = allPlaces.filter(model => !model.hidden && !model.rejected);
      const verifiedCount = visible.filter(model => model.approved).length;
      const pendingCount = visible.filter(model => model.pending && !model.approved).length;
      const mineCount = visible.filter(model => model.createdBy === currentUser.uid).length;

      allCountChip.textContent = `All: ${visible.length}`;
      verifiedCountChip.textContent = `Verified: ${verifiedCount}`;
      pendingCountChip.textContent = `Pending: ${pendingCount}`;
      mineCountChip.textContent = `Mine: ${mineCount}`;
    }

    function matchesSearch(model, queryText) {
      const q = queryText.trim().toLowerCase();
      if (!q) return true;

      return [
        model.name,
        model.description,
        model.city,
        model.address,
        model.category,
        model.creatorName,
        model.source
      ].filter(Boolean).join(" ").toLowerCase().includes(q);
    }

    function filterPlaces() {
      const q = searchInput.value || "";

      return allPlaces.filter(model => {
        if (model.hidden || model.rejected) return false;
        if (!matchesSearch(model, q)) return false;

        if (currentTab === "verified") return model.approved;
        if (currentTab === "pending") return model.pending && !model.approved;
        if (currentTab === "mine") return model.createdBy === currentUser.uid;
        return true;
      }).sort((a, b) => tsMs(b.createdAt) - tsMs(a.createdAt));
    }

    function renderPlaces() {
      list.innerHTML = "";
      const items = filterPlaces();

      if (!items.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent =
          currentTab === "verified" ? "No verified places found." :
          currentTab === "pending" ? "No pending places found." :
          currentTab === "mine" ? "You have not added any places yet." :
          "No places found.";
        return;
      }

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      items.forEach(model => {
        const isMine = model.createdBy === currentUser.uid;
        const statusBadge = model.approved
          ? `<span class="badge green">Verified</span>`
          : `<span class="badge yellow">Pending</span>`;

        const imageHtml = model.imageURL
          ? `<a class="cover-link" href="place.html?placeId=${encodeURIComponent(model.id)}&source=${encodeURIComponent(model.source)}">
               <img class="cover" src="${escapeHtml(model.imageURL)}" alt="Place image">
             </a>`
          : "";

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          ${imageHtml}

          <div class="card-top">
            <div class="card-title">
              <a href="place.html?placeId=${encodeURIComponent(model.id)}&source=${encodeURIComponent(model.source)}">${escapeHtml(model.name)}</a>
            </div>
            <div class="card-time">${escapeHtml(model.city || "No city")}</div>
          </div>

          <div class="badge-row">
            <span class="badge blue">${escapeHtml(model.category || "General")}</span>
            <span class="badge purple">${escapeHtml(model.source)}</span>
            ${statusBadge}
            ${isMine ? `<span class="badge yellow">Mine</span>` : ""}
          </div>

          <div class="meta-grid">
            <div class="meta-item"><strong>Address</strong>${escapeHtml(model.address || "Not added")}</div>
            <div class="meta-item"><strong>Website</strong>${escapeHtml(model.website || "Not added")}</div>
            <div class="meta-item"><strong>Submitted By</strong>${escapeHtml(model.creatorName || "Member")}</div>
          </div>

          <div class="card-text">${escapeHtml(model.description || "No description added.")}</div>

          <div class="card-actions">
            <a class="action-btn primary" href="place.html?placeId=${encodeURIComponent(model.id)}&source=${encodeURIComponent(model.source)}">Open Place</a>
            ${model.website ? `<a class="action-btn green" href="${escapeHtml(model.website)}" target="_blank" rel="noopener noreferrer">Open Link</a>` : ""}
            ${isMine ? `<a class="action-btn purple" href="place.html?placeId=${encodeURIComponent(model.id)}&source=${encodeURIComponent(model.source)}">Manage</a>` : ""}
          </div>
        `;

        const cover = card.querySelector(".cover");
        if (cover) {
          cover.addEventListener("error", () => {
            cover.parentElement.remove();
          });
        }

        list.appendChild(card);
      });
    }

    async function loadPlaces() {
      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");

      try {
        const snapshots = await Promise.all(
          PLACE_SOURCES.map(source =>
            getDocs(collection(db, source)).catch(() => ({ docs: [] }))
          )
        );

        const merged = [];
        snapshots.forEach((snap, index) => {
          const source = PLACE_SOURCES[index];
          snap.docs.forEach(d => {
            merged.push(normalizePlace({ id: d.id, ...d.data() }, d.id, source));
          });
        });

        allPlaces = merged;
        updateCounts();
        renderPlaces();
        loading.classList.add("hidden");
      } catch (err) {
        console.error(err);
        loading.textContent = "Could not load places.";
      }
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentTab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderPlaces();
      });
    });

    searchInput.addEventListener("input", () => {
      clearSearchBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPlaces();
    });

    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearSearchBtn.classList.add("hidden");
      renderPlaces();
      searchInput.focus();
    });

    refreshBtn.addEventListener("click", async () => {
      await loadPlaces();
      setMessage("Places refreshed.", "ok");
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      await loadPlaces();
    });
  </script>
</body>
</html>
