<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby Places</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .chip-row{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 5px;
      border-radius:12px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      min-height:32px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:7px;
      margin-top:9px;
    }

    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 10px;
      font-size:12px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:38px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.22)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .btn-soft{background:var(--surface-3);border-color:var(--line)}

    .action-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .status-text{
      min-height:18px;
      font-size:12.5px;
      margin-top:8px;
      line-height:1.45;
      color:var(--muted);
    }

    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
      margin-bottom:10px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px 6px;
      min-height:38px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:12px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:950;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      overflow:hidden;
    }

    .cover{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:10px;
    }

    .card-title{
      font-size:16px;
      font-weight:950;
      line-height:1.35;
      margin-bottom:8px;
      word-break:break-word;
    }

    .badge-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      white-space:nowrap;
    }

    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }

    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }

    .card-actions{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:10px;
      align-items:center;
    }

    .share-btn{
      margin-left:auto;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}

      .chip-row{
        grid-template-columns:repeat(2,1fr);
        gap:5px;
      }

      .chip{font-size:10px}

      .top-actions{grid-template-columns:1fr}

      .tab-link{
        font-size:11.5px;
        padding:8px 3px;
      }

      .share-btn{margin-left:0}

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .action-btn{
        font-size:11.5px;
        padding:8px 9px;
      }

      .tab-link{font-size:10.8px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="useBrowserLocationBtn" class="top-icon-btn" type="button" aria-label="Use browser GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby places</div>
      </div>

      <a href="settings.html" class="top-icon-btn" aria-label="Nearby settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>
          <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.97 2.97l-.04-.04A1.8 1.8 0 0 0 14.8 19.6a1.8 1.8 0 0 0-1.1 1.65V21.4a2.1 2.1 0 0 1-4.2 0v-.06A1.8 1.8 0 0 0 8.4 19.7a1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 0 1-2.97-2.97l.04-.04A1.8 1.8 0 0 0 3.8 15.1a1.8 1.8 0 0 0-1.65-1.1H2.1a2.1 2.1 0 0 1 0-4.2h.06A1.8 1.8 0 0 0 3.8 8.7a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2.1 2.1 0 0 1 6.37 3.7l.04.04A1.8 1.8 0 0 0 8.4 4.1a1.8 1.8 0 0 0 1.1-1.65V2.4a2.1 2.1 0 0 1 4.2 0v.06a1.8 1.8 0 0 0 1.1 1.64 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 0 1 2.97 2.97l-.04.04A1.8 1.8 0 0 0 19.4 8.7c.28.6.9 1.1 1.65 1.1h.06a2.1 2.1 0 0 1 0 4.2h-.06A1.8 1.8 0 0 0 19.4 15z"></path>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="chip-row">
        <span id="locationChip" class="chip chip-blue">Location -</span>
        <span id="modeChip" class="chip chip-purple">Mode -</span>
        <span id="browserChip" class="chip chip-yellow">GPS off</span>
        <span id="countChip" class="chip chip-green">Places 0</span>
      </div>

      <div class="top-actions">
        <a href="edit-profile.html#location" class="action-btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
            <circle cx="12" cy="9" r="2.5"></circle>
          </svg>
          <span>Edit Location</span>
        </a>

        <button id="gpsBtn2" class="action-btn btn-green" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span>Use GPS</span>
        </button>

        <a href="add-place.html" class="action-btn btn-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Add Place</span>
        </a>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link">People</a>
        <a href="nearby-events.html" class="tab-link">Events</a>
        <a href="nearby-places.html" class="tab-link active">Places</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search place, city, province, country, address..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">×</button>
      </div>

      <div id="listLoading" class="loading-box">Loading places...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No places found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const locationChip = document.getElementById("locationChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");
    const countChip = document.getElementById("countChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const gpsBtn2 = document.getElementById("gpsBtn2");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let allPlaces = [];

    let visitCountMap = new Map();
    let visitCountLooseMap = new Map();
    let userVisitExactMap = new Map();
    let userVisitLooseMap = new Map();

    const PLACE_SOURCES = ["nearby_places", "places", "nudist_places"];

    const ICONS = {
      open: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      `,
      share: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.6 13.5 6.8 4"></path>
          <path d="m15.4 6.5-6.8 4"></path>
        </svg>
      `,
      check: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 6 9 17l-5-5"></path>
        </svg>
      `
    };

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function normalizeNearbyMode(value, fallbackLocationVisibility = "") {
      const v = normalizeText(value);
      const oldVisibility = normalizeText(fallbackLocationVisibility);

      if (["city", "gps", "everywhere"].includes(v)) return v;
      if (oldVisibility === "gps") return "gps";
      return "city";
    }

    function normalizeLocationVisibility(value) {
      const v = normalizeText(value);

      if (v === "gps") return "approximate";
      if (["hidden", "approximate", "city"].includes(v)) return v;
      return "city";
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || "");
      const province = titleText(d.province || d.state || d.region || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function buildPlaceKey(source, placeId) {
      return `${String(source || "").trim()}__${String(placeId || "").trim()}`;
    }

    function isVisitRecord(raw) {
      const status = String(raw?.status || raw?.type || "").toLowerCase();
      return raw?.visited === true || raw?.explored === true || status.includes("visited") || status.includes("explored");
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      const locationVisibilityRaw = getField(d, ["location_visibility", "locationVisibility"]) || "city";
      const nearbyModeRaw = getField(d, ["nearby_discovery_mode", "nearbyDiscoveryMode", "nearby_mode", "nearbyMode"]);

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        nearbyDiscoveryMode: normalizeNearbyMode(nearbyModeRaw, locationVisibilityRaw),
        locationVisibility: normalizeLocationVisibility(locationVisibilityRaw),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || "").toLowerCase();

      const approved =
        d.approved === true ||
        d.verified === true ||
        d.isVerified === true ||
        d.is_approved === true ||
        ["approved", "active", "verified", "published"].includes(status);

      const rejected =
        status === "rejected" ||
        status === "declined" ||
        d.rejected === true;

      const pending =
        d.pending === true ||
        status === "pending" ||
        (!approved && !rejected);

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic", "type"]) || "General",
        description: getField(d, ["description", "desc", "notes", "about"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        locationSearch: buildLocationSearch(d),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName"]) || "Member",
        keywords: getField(d, ["keywords", "tags", "search_keywords", "searchKeywords"]),
        approved,
        pending,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function renderViewerLocation() {
      if (!viewerProfile) return;

      const parts = [viewerProfile.city, viewerProfile.province, viewerProfile.country].filter(Boolean);
      locationChip.textContent = parts.length ? parts.join(", ") : "Location not set";

      if (!browserCoords) {
        browserChip.textContent = "GPS off";
        browserChip.className = "chip chip-yellow";
      }

      updateModeChip();
    }

    function updateModeChip() {
      const q = searchInput.value.trim();
      const mode = viewerProfile?.nearbyDiscoveryMode || "city";

      if (q) {
        modeChip.textContent = "Search all";
      } else if (mode === "gps") {
        modeChip.textContent = "GPS mode";
      } else if (mode === "everywhere") {
        modeChip.textContent = "Everywhere";
      } else {
        modeChip.textContent = "City mode";
      }
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase.from(table).select("id", { count: "exact", head: true });
        const { count, error } = await buildQuery(query);
        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );
          if (count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q =>
          q.eq(targetColumn, uid)
        );
        if (countWithoutStatus !== null) return countWithoutStatus;
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (!Array.isArray(threads) || !threads.length) return 0;

        const threadIds = threads.map(t => t.id).filter(Boolean);
        if (!threadIds.length) return 0;

        const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

        for (const field of seenFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .is(field, null);

            if (!error) return count || 0;
          } catch {}
        }

        const boolFields = ["is_read", "read"];

        for (const field of boolFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .eq(field, false);

            if (!error) return count || 0;
          } catch {}
        }
      } catch {}

      return 0;
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        { match: "uid", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "user_id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "userId", payload: { lat: coords.lat, lng: coords.lng, updatedAt: nowIso() } }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "GPS unsupported";
        browserChip.className = "chip chip-red";
        renderPlaces();
        return;
      }

      browserChip.textContent = "Checking GPS...";
      browserChip.className = "chip chip-yellow";
      setPageStatus("Checking browser location...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            browserChip.textContent = "GPS on";
            browserChip.className = "chip chip-green";

            try {
              await Promise.all([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;

              renderViewerLocation();
              browserChip.textContent = "GPS on";
              browserChip.className = "chip chip-green";
              setPageStatus("GPS enabled. Places with distance data are sorted closer first.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "GPS off";
            browserChip.className = "chip chip-yellow";
            setPageStatus("Could not use browser GPS. Using saved profile location and search.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      renderPlaces();
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
      countChip.textContent = "Places 0";
    }

    function showList(count) {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
      countChip.textContent = `Places ${count}`;
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function getVisitCount(model) {
      const exactKey = buildPlaceKey(model.source, model.id);
      return visitCountMap.get(exactKey) || visitCountLooseMap.get(model.id) || 0;
    }

    function getUserVisitRecord(model) {
      const exactKey = buildPlaceKey(model.source, model.id);
      return userVisitExactMap.get(exactKey) || userVisitLooseMap.get(model.id) || null;
    }

    function hasVisited(model) {
      return !!getUserVisitRecord(model);
    }

    function buildBasePlaceRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return allPlaces
        .filter(model => !model.hidden && !model.rejected)
        .filter(model => model.approved || (model.createdBy === currentUser.id && model.pending))
        .map(model => {
          const city = normalizeText(model.city);
          const province = normalizeText(model.province);
          const country = normalizeText(model.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = sameCountry && !!viewerProvince && !!province && viewerProvince === province;
          const sameCity = sameProvince && !!viewerCity && !!city && viewerCity === city;

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            model.lat !== null &&
            model.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng);
          }

          const searchable = [
            model.name,
            model.description,
            model.category,
            model.address,
            model.website,
            model.creatorName,
            model.keywords,
            model.city,
            model.province,
            model.country,
            model.locationSearch
          ].filter(Boolean).join(" ").toLowerCase();

          const visitCount = getVisitCount(model);
          const visited = hasVisited(model);
          const mine = model.createdBy === currentUser.id;
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...model,
            sameCountry,
            sameProvince,
            sameCity,
            withinGpsRange,
            distanceKm,
            visitCount,
            visited,
            mine,
            distanceLabel: distanceKm !== null ? formatDistance(distanceKm) : "",
            placeLabel: [model.city, model.province, model.country].filter(Boolean).join(", "),
            searchable
          };
        });
    }

    function buildNearbyPlaces() {
      const q = normalizeText(searchInput.value);
      const mode = viewerProfile?.nearbyDiscoveryMode || "city";
      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) &&
        !!normalizeText(viewerProfile?.province) &&
        !!normalizeText(viewerProfile?.country);

      let rows = buildBasePlaceRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (mode === "gps") {
        const hasGps = !!(browserCoords || (viewerProfile?.lat !== null && viewerProfile?.lng !== null));

        if (hasGps) {
          rows = rows.filter(row => row.mine || row.withinGpsRange || row.sameCity || row.sameProvince);
        } else if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.mine || row.sameCity || row.sameProvince);
        } else {
          rows = rows.filter(row => row.mine);
        }
      } else if (mode === "everywhere") {
        rows = rows;
      } else {
        if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.mine || row.sameCity || row.sameProvince);
        } else {
          rows = rows.filter(row => row.mine);
        }
      }

      rows.sort((a, b) => {
        if (a.mine && !b.mine) return -1;
        if (b.mine && !a.mine) return 1;

        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        if (a.pending && !b.pending) return -1;
        if (b.pending && !a.pending) return 1;

        if (b.visitCount !== a.visitCount) return b.visitCount - a.visitCount;

        return a.name.localeCompare(b.name);
      });

      return rows;
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      renderViewerLocation();
    }

    async function fetchSourceRows(tableName) {
      try {
        const { data, error } = await supabase
          .from(tableName)
          .select("*");

        if (error) throw error;
        return data || [];
      } catch (err) {
        console.warn(`Place source skipped: ${tableName}`, err?.message || err);
        return [];
      }
    }

    async function loadPlaces() {
      const results = await Promise.all(PLACE_SOURCES.map(fetchSourceRows));
      const merged = [];

      results.forEach((rows, index) => {
        const source = PLACE_SOURCES[index];

        rows.forEach(row => {
          merged.push(normalizePlace(row, row.id, source));
        });
      });

      allPlaces = merged;
    }

    async function loadVisits() {
      visitCountMap = new Map();
      visitCountLooseMap = new Map();
      userVisitExactMap = new Map();
      userVisitLooseMap = new Map();

      try {
        const { data: allData, error: allError } = await supabase
          .from("place_visits")
          .select("*");

        if (allError) throw allError;

        (allData || []).forEach(raw => {
          if (!isVisitRecord(raw)) return;

          const placeId = raw.place_id || raw.placeId || raw.target_id || raw.targetId || raw.nearby_place_id || raw.nearbyPlaceId || "";
          const source = raw.source || raw.place_source || raw.placeSource || "";

          if (placeId) {
            visitCountLooseMap.set(placeId, (visitCountLooseMap.get(placeId) || 0) + 1);
          }

          if (placeId && source) {
            const exactKey = buildPlaceKey(source, placeId);
            visitCountMap.set(exactKey, (visitCountMap.get(exactKey) || 0) + 1);
          }
        });
      } catch (err) {
        console.warn("Place visits count skipped:", err?.message || err);
      }

      try {
        const { data: myData, error: myError } = await supabase
          .from("place_visits")
          .select("*")
          .eq("user_id", currentUser.id);

        if (myError) throw myError;

        (myData || []).forEach(raw => {
          if (!isVisitRecord(raw)) return;

          const placeId = raw.place_id || raw.placeId || raw.target_id || raw.targetId || raw.nearby_place_id || raw.nearbyPlaceId || "";
          const source = raw.source || raw.place_source || raw.placeSource || "";
          const record = { ...raw, docId: raw.id };

          if (placeId) {
            userVisitLooseMap.set(placeId, record);
          }

          if (placeId && source) {
            const exactKey = buildPlaceKey(source, placeId);
            userVisitExactMap.set(exactKey, record);
          }
        });
      } catch (err) {
        console.warn("My place visits skipped:", err?.message || err);
      }
    }

    async function toggleVisited(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        const existing = getUserVisitRecord(model);

        if (existing) {
          if (existing.docId) {
            const { error } = await supabase
              .from("place_visits")
              .delete()
              .eq("id", existing.docId);

            if (error) throw error;
          } else {
            const { error } = await supabase
              .from("place_visits")
              .delete()
              .eq("user_id", currentUser.id)
              .eq("place_id", model.id)
              .eq("source", model.source);

            if (error) throw error;
          }

          setPageStatus("Removed from visited places.", "status-ok");
        } else {
          const { error } = await supabase
            .from("place_visits")
            .insert({
              user_id: currentUser.id,
              place_id: model.id,
              source: model.source,
              place_source: model.source,
              status: "visited",
              visited: true,
              explored: false,
              place_name: model.name || "",
              city: model.city || "",
              created_at: nowIso(),
              updated_at: nowIso()
            });

          if (error) throw error;
          setPageStatus("Marked as visited.", "status-ok");
        }

        await loadVisits();
        renderPlaces();
      } catch (err) {
        console.error(err);
        setPageStatus("Could not update visited state.", "status-err");
        btn.disabled = false;
      }
    }

    function buildPlaceOpenUrl(model) {
      const url = new URL("place.html", window.location.href);
      url.searchParams.set("placeId", model.id);
      if (model.source) url.searchParams.set("source", model.source);
      return url.toString();
    }

    async function sharePlace(model) {
      const url = buildPlaceOpenUrl(model);
      const title = `${model.name || "Place"} on OwnSpace`;
      const text = "Check this place on OwnSpace.";

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Place link copied.");
        } else {
          prompt("Copy this place link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") console.error("Share failed:", err);
      }
    }

    function renderPlaces() {
      openLoading();
      updateModeChip();

      const q = normalizeText(searchInput.value);
      const mode = viewerProfile?.nearbyDiscoveryMode || "city";
      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) &&
        !!normalizeText(viewerProfile?.province) &&
        !!normalizeText(viewerProfile?.country);

      const rows = buildNearbyPlaces();

      if (!rows.length) {
        if (q) {
          showEmpty("No matching places found. Try another city, province, country, address or category.");
        } else if (mode === "gps") {
          showEmpty("No nearby places found in GPS mode. Try Search Everywhere in profile settings or search a city/country.");
        } else if (mode === "everywhere") {
          showEmpty("No places are visible yet.");
        } else if (!viewerHasLocation) {
          showEmpty("Add your city/province/country, use GPS, or search by city/country/place name.");
        } else {
          showEmpty("No places found near your saved city. Search can still find places from other cities.");
        }
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const imageHtml = model.imageURL
          ? `<img class="cover" src="${escapeHtml(model.imageURL)}" alt="Place image">`
          : "";

        const badges = [];

        if (model.mine) badges.push(`<span class="mini-badge mini-purple">Mine</span>`);
        badges.push(`<span class="mini-badge mini-blue">${escapeHtml(model.category || "General")}</span>`);
        badges.push(`<span class="mini-badge ${model.approved ? "mini-green" : "mini-yellow"}">${model.approved ? "Approved" : "Pending"}</span>`);

        if (model.sameCity) {
          badges.push(`<span class="mini-badge mini-purple">Same city</span>`);
        } else if (model.sameProvince) {
          badges.push(`<span class="mini-badge mini-purple">Same province/state</span>`);
        } else if (model.sameCountry) {
          badges.push(`<span class="mini-badge mini-purple">Same country</span>`);
        }

        if (model.distanceLabel) {
          badges.push(`<span class="mini-badge mini-green">${escapeHtml(model.distanceLabel)}</span>`);
        }

        badges.push(`<span class="mini-badge mini-yellow">${model.visitCount} visited</span>`);

        const websiteHref = normalizeHref(model.website);
        const openUrl = buildPlaceOpenUrl(model);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          ${imageHtml}

          <div class="card-title">${escapeHtml(model.name)}</div>

          <div class="badge-row">${badges.join("")}</div>

          <div class="meta-grid">
            <div><strong>Location:</strong> ${escapeHtml(model.placeLabel || "Not added")}</div>
            <div><strong>Address:</strong> ${escapeHtml(model.address || "Not added")}</div>
            <div><strong>Submitted By:</strong> ${escapeHtml(model.creatorName || "Member")}</div>
          </div>

          <div class="desc">${escapeHtml(model.description || "No description added.")}</div>

          <div class="card-actions">
            <a class="action-btn btn-primary" href="${openUrl}">${ICONS.open}<span>Open</span></a>

            ${websiteHref ? `<a class="action-btn btn-green" href="${escapeHtml(websiteHref)}" target="_blank" rel="noopener noreferrer">Website</a>` : ``}

            ${
              model.mine
                ? `<a class="action-btn btn-purple" href="${openUrl}">Manage</a>`
                : `<button class="action-btn ${model.visited ? "btn-yellow" : "btn-soft"} visit-btn" type="button">${model.visited ? ICONS.check : ""}<span>${model.visited ? "Visited" : "Been There"}</span></button>`
            }

            <button class="action-btn btn-green share-btn" type="button">${ICONS.share}<span>Share</span></button>
          </div>
        `;

        const cover = card.querySelector(".cover");
        if (cover) {
          cover.addEventListener("error", () => {
            cover.style.display = "none";
          });
        }

        const visitBtn = card.querySelector(".visit-btn");
        if (visitBtn) {
          visitBtn.addEventListener("click", async () => {
            await toggleVisited(model, visitBtn);
          });
        }

        const shareBtn = card.querySelector(".share-btn");
        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            await sharePlace(model);
          });
        }

        listWrap.appendChild(card);
      });

      showList(rows.length);
    }

    async function refreshAll() {
      openLoading();

      await Promise.all([
        loadPlaces(),
        loadVisits(),
        loadInboxBadge()
      ]);

      renderViewerLocation();
      renderPlaces();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPlaces();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPlaces();
    });

    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    gpsBtn2.addEventListener("click", requestBrowserLocation);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load places.");
      }
    }

    initPage();
  </script>
</body>
</html>
