<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby Places</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.045);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn.refresh-top{
      background:rgba(61,220,132,.13);
      border-color:rgba(61,220,132,.22);
    }

    .top-icon-btn svg{
      width:17px;
      height:17px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
    }

    .hero-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
      margin-bottom:7px;
    }

    .page-title{
      font-size:16px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.15;
      margin-bottom:2px;
    }

    .page-sub{
      color:var(--muted);
      font-size:10.5px;
      line-height:1.35;
    }

    .mode-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid rgba(76,201,255,.22);
      background:rgba(76,201,255,.13);
      color:var(--text);
      white-space:nowrap;
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-bottom:7px;
    }

    .action-btn{
      border:none;
      border-radius:11px;
      padding:8px 9px;
      font-size:11px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:34px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
      min-width:0;
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.22)}
    .btn-green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.22)}
    .btn-purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.22)}
    .btn-yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.22)}

    .action-btn:disabled{opacity:.65;cursor:not-allowed}

    .meta-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      font-size:10.6px;
      color:var(--muted);
      line-height:1.35;
      padding:1px 2px 0;
    }

    .meta-row strong{color:var(--text);font-weight:950}

    .status-text{
      min-height:0;
      font-size:11px;
      margin-top:5px;
      line-height:1.35;
      color:var(--muted);
    }

    .status-text:not(:empty){min-height:15px}
    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:5px;
      margin-bottom:7px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:11px;
      padding:7px 4px;
      min-height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:10.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:7px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:10px 39px 10px 11px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:12.5px;
      min-height:38px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:5px;
      top:50%;
      transform:translateY(-50%);
      width:29px;
      height:29px;
      border:none;
      border-radius:9px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:950;
      line-height:1;
    }

    .filter-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:7px;
    }

    .filter-chip{
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      border-radius:999px;
      padding:5px 7px;
      font-size:9.8px;
      font-weight:950;
      line-height:1;
    }

    .filter-chip.green{background:rgba(61,220,132,.12);border-color:rgba(61,220,132,.20)}
    .filter-chip.purple{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.20)}
    .filter-chip.yellow{background:rgba(245,185,66,.12);border-color:rgba(245,185,66,.20)}

    .list{display:grid;gap:6px}

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:18px 8px;
      background:var(--surface-2);
      border-radius:14px;
      border:1px dashed var(--line);
      font-size:12.5px;
      line-height:1.45;
    }

    .place-tile{
      display:block;
      text-decoration:none;
      color:inherit;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      overflow:hidden;
      box-shadow:var(--soft-shadow);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .place-tile:hover{
      background:var(--surface-3);
      border-color:rgba(76,201,255,.26);
    }

    .place-tile:active{transform:scale(.992)}

    .place-card{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:0;
    }

    .place-icon{
      width:46px;
      height:46px;
      border-radius:14px;
      flex-shrink:0;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      font-size:19px;
      font-weight:950;
      background:
        radial-gradient(circle at 24% 20%, rgba(76,201,255,.22), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.14), rgba(61,220,132,.10)),
        var(--surface-3);
    }

    .place-body{min-width:0;flex:1}

    .place-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:7px;
      min-width:0;
    }

    .place-main{min-width:0;flex:1}

    .place-title{
      font-size:13px;
      font-weight:950;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .place-category{
      font-size:10.8px;
      color:var(--blue);
      font-weight:900;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .place-meta{
      font-size:10.8px;
      color:var(--muted);
      line-height:1.35;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .place-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid rgba(167,139,250,.20);
      background:rgba(167,139,250,.13);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
      max-width:88px;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }

    .place-pill.green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.20)}
    .place-pill.yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.13);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:17px;
      height:17px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    .nav-badge.show{display:flex}

    @media(max-width:700px){
      body{padding:6px 6px 82px}
      .place-meta{white-space:normal;overflow:visible;text-overflow:clip}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
      .nav-badge{right:8px}
    }

    @media(max-width:420px){
      .top-actions{grid-template-columns:1fr 1fr}
      .action-btn{font-size:10.5px;padding:7px 7px}
      .tab-link{font-size:9.7px;padding:6px 3px}
      .place-pill{max-width:76px;font-size:9px}
      .meta-row{grid-template-columns:1fr;font-size:10.4px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby places</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-row">
        <div>
          <div class="page-title">Nearby Places</div>
          <div class="page-sub">Search by place, city, province, country or category.</div>
        </div>
        <div id="modePill" class="mode-pill">City Mode</div>
      </div>

      <div class="top-actions">
        <button id="gpsToggleBtn" class="action-btn btn-yellow" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span id="gpsBtnText">GPS Off</span>
        </button>

        <a href="add-place.html" class="action-btn btn-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Add Place</span>
        </a>
      </div>

      <div class="meta-row">
        <div id="smallLocationText">Location: -</div>
        <div id="smallCountText"><strong>Places:</strong> 0</div>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link" data-nearby-tab="people">People</a>
        <a href="nearby-events.html" class="tab-link" data-nearby-tab="events">Events</a>
        <a href="nearby-places.html" class="tab-link active" data-nearby-tab="places">Places</a>
        <a href="nearby-communities.html" class="tab-link" data-nearby-tab="communities">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search place, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button" aria-label="Clear search">×</button>
      </div>

      <div class="filter-row">
        <span id="searchChip" class="filter-chip">Search: off</span>
        <span id="gpsChip" class="filter-chip yellow">GPS: off</span>
        <span id="scopeChip" class="filter-chip purple">Scope: city</span>
      </div>

      <div id="listLoading" class="loading-box">Loading places...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No places found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span id="inboxBadge" class="nav-badge">0</span>
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const inboxBadge = document.getElementById("inboxBadge");
    const gpsToggleBtn = document.getElementById("gpsToggleBtn");
    const gpsBtnText = document.getElementById("gpsBtnText");
    const pageStatus = document.getElementById("pageStatus");
    const modePill = document.getElementById("modePill");
    const smallLocationText = document.getElementById("smallLocationText");
    const smallCountText = document.getElementById("smallCountText");
    const searchChip = document.getElementById("searchChip");
    const gpsChip = document.getElementById("gpsChip");
    const scopeChip = document.getElementById("scopeChip");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let allPlaces = [];

    let visitCountMap = new Map();
    let visitCountLooseMap = new Map();

    let liveChannels = [];
    let refreshTimer = null;
    let badgeRefreshTimer = null;

    const PLACE_SOURCES = ["nearby_places", "places", "nudist_places"];

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();

      if (
        e.key === "ownspace_badges_refresh" ||
        e.key === "ownspace_inbox_refresh" ||
        e.key === "ownspace_chat_read_refresh"
      ) {
        scheduleBadgeRefresh(120);
      }
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "nearby.html";
    });

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function setGpsUi(isOn) {
      if (isOn) {
        gpsBtnText.textContent = "GPS On";
        gpsToggleBtn.className = "action-btn btn-green";
        gpsChip.textContent = "GPS: on";
        gpsChip.className = "filter-chip green";
      } else {
        gpsBtnText.textContent = "GPS Off";
        gpsToggleBtn.className = "action-btn btn-yellow";
        gpsChip.textContent = "GPS: off";
        gpsChip.className = "filter-chip yellow";
      }

      updateModeUi();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return fallback;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getCreatedMs(value) {
      if (!value) return 0;

      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : 0;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeNearbyMode(value, fallbackLocationVisibility = "") {
      const v = normalizeText(value);
      const oldVisibility = normalizeText(fallbackLocationVisibility);

      if (["city", "gps", "everywhere"].includes(v)) return v;
      if (oldVisibility === "gps") return "gps";
      return "city";
    }

    function normalizeLocationVisibility(value) {
      const v = normalizeText(value);

      if (v === "gps") return "approximate";
      if (["hidden", "approximate", "city"].includes(v)) return v;
      return "city";
    }

    function currentMode() {
      return browserCoords ? "gps" : (viewerProfile?.nearbyDiscoveryMode || "city");
    }

    function modeLabel(mode = currentMode()) {
      if (mode === "gps") return "GPS Mode";
      if (mode === "everywhere") return "Everywhere";
      return "City Mode";
    }

    function updateModeUi() {
      const mode = currentMode();
      modePill.textContent = modeLabel(mode);
      scopeChip.textContent = `Scope: ${mode === "everywhere" ? "all" : mode}`;
      scopeChip.className = `filter-chip ${mode === "gps" ? "green" : "purple"}`;
    }

    function updateFilterChips(count = null) {
      const q = normalizeText(searchInput.value);
      searchChip.textContent = q ? `Search: ${q.length > 14 ? q.slice(0, 14) + "..." : q}` : "Search: off";
      searchChip.className = q ? "filter-chip green" : "filter-chip";
      updateModeUi();

      if (typeof count === "number") {
        smallCountText.innerHTML = `<strong>Places:</strong> ${count}`;
      }
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || "");
      const province = titleText(d.province || d.state || d.region || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function buildPlaceKey(source, placeId) {
      return `${String(source || "").trim()}__${String(placeId || "").trim()}`;
    }

    function isVisitRecord(raw) {
      if (!raw) return false;

      const status = String(raw.status || raw.type || "").toLowerCase();

      if (["removed", "deleted", "left", "false", "unvisited"].includes(status)) return false;
      if (raw.visited === false) return false;

      const placeId = raw.place_id || raw.placeId || raw.target_id || raw.targetId || raw.nearby_place_id || raw.nearbyPlaceId || "";
      const userId = raw.user_id || raw.userId || raw.uid || raw.member_id || raw.memberId || "";

      if (placeId && userId) return true;
      if (raw.visited === true || raw.explored === true) return true;
      if (status.includes("visited") || status.includes("explored") || status === "active") return true;

      return false;
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";

      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km`;
      return `${Math.round(distanceKm)} km`;
    }

    function flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country) {
      if (!viewerCity || !city) return false;
      if (viewerCity !== city) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;
      if (viewerProvince && province && viewerProvince !== province) return false;

      return true;
    }

    function flexibleSameProvince(viewerProvince, viewerCountry, province, country) {
      if (!viewerProvince || !province) return false;
      if (viewerProvince !== province) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;

      return true;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      const locationVisibilityRaw = getField(d, ["location_visibility", "locationVisibility"]) || "city";
      const nearbyModeRaw = getField(d, ["nearby_discovery_mode", "nearbyDiscoveryMode", "nearby_mode", "nearbyMode"]);

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        nearbyDiscoveryMode: normalizeNearbyMode(nearbyModeRaw, locationVisibilityRaw),
        locationVisibility: normalizeLocationVisibility(locationVisibilityRaw),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || d.place_status || d.placeStatus || "").toLowerCase();
      const visibility = String(d.visibility || d.place_visibility || d.placeVisibility || "").toLowerCase();
      const approvalStatus = String(d.approval_status || d.approvalStatus || d.review_status || d.reviewStatus || "").toLowerCase();

      const approved =
        d.approved === true ||
        d.is_approved === true ||
        d.isApproved === true ||
        d.public === true ||
        d.is_public === true ||
        d.isPublic === true ||
        visibility === "public" ||
        approvalStatus === "approved" ||
        ["approved", "active", "verified", "published", "public"].includes(status);

      const rejected =
        status === "rejected" ||
        status === "declined" ||
        approvalStatus === "rejected" ||
        approvalStatus === "declined" ||
        d.rejected === true;

      const explicitlyPending =
        d.pending === true ||
        status === "pending" ||
        status === "review" ||
        status === "under_review" ||
        approvalStatus === "pending" ||
        approvalStatus === "review" ||
        approvalStatus === "under_review";

      const pending = explicitlyPending && !approved && !rejected;

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic", "type"]) || "General",
        description: getField(d, ["description", "desc", "notes", "about"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        locationSearch: buildLocationSearch(d),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        createdBy: getField(d, ["created_by", "createdBy", "creator_id", "creatorId", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName"]) || "Member",
        keywords: getField(d, ["keywords", "tags", "search_keywords", "searchKeywords"]),
        approved,
        pending,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted) || status === "deleted",
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function isMessageUnread(msg) {
      if (!msg || msg.senderId === currentUser.id) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase
          .from(table)
          .select("id", { count: "exact", head: true });

        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = [
        "target_id",
        "to_user_id",
        "receiver_id",
        "recipient_id",
        "targetId",
        "toUserId",
        "receiverId",
        "recipientId"
      ];

      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetColumn, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = getField(row, ["status", "request_status", "requestStatus"], "pending");
              return String(status || "pending").toLowerCase() === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    async function fetchChatThreadsForUser(uid) {
      const map = new Map();

      const attempts = [
        { a: "participant_a", b: "participant_b" },
        { a: "participantA", b: "participantB" }
      ];

      for (const fields of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${fields.a}.eq.${uid},${fields.b}.eq.${uid}`);

          if (!error && Array.isArray(data)) {
            data.forEach(row => {
              if (row.id) map.set(row.id, row);
            });
          }
        } catch {}
      }

      return Array.from(map.values());
    }

    async function fetchMessagesForThreads(threadIds) {
      if (!threadIds.length) return [];

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("thread_id", threadIds)
          .order("created_at", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("threadId", threadIds)
          .order("createdAt", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      return [];
    }

    async function countUnreadChatMessages(uid) {
      try {
        const threads = await fetchChatThreadsForUser(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);

        if (!threadIds.length) return 0;

        const messages = await fetchMessagesForThreads(threadIds);
        const byThread = new Map();

        messages.forEach(msg => {
          if (!msg.threadId) return;
          if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
          byThread.get(msg.threadId).push(msg);
        });

        let total = 0;

        threads.forEach(thread => {
          const list = byThread.get(thread.id) || [];

          if (!list.length) return;

          const newest = [...list].sort((a, b) => getCreatedMs(b.createdAt) - getCreatedMs(a.createdAt))[0];

          if (newest?.senderId === uid) return;

          const lastOutgoingMs = list
            .filter(msg => msg.senderId === uid)
            .reduce((max, msg) => Math.max(max, getCreatedMs(msg.createdAt)), 0);

          const unreadInThread = list.filter(msg => {
            if (msg.senderId === uid) return false;
            if (getCreatedMs(msg.createdAt) <= lastOutgoingMs) return false;
            return isMessageUnread(msg);
          }).length;

          total += unreadInThread;
        });

        return total;
      } catch (err) {
        console.warn("Unread chat count failed:", err?.message || err);
        return 0;
      }
    }

    function setInboxBadge(count) {
      const total = Number(count || 0);

      if (!total) {
        inboxBadge.textContent = "0";
        inboxBadge.classList.remove("show");
      } else {
        inboxBadge.textContent = total > 99 ? "99+" : String(total);
        inboxBadge.classList.add("show");
      }
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        setInboxBadge(Number(requests || 0) + Number(unreadMessages || 0));
      } catch {
        setInboxBadge(0);
      }
    }

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        {
          match: "uid",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            updated_at: nowIso()
          }
        },
        {
          match: "id",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            updated_at: nowIso()
          }
        },
        {
          match: "user_id",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            updated_at: nowIso()
          }
        },
        {
          match: "userId",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            updatedAt: nowIso()
          }
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS is not supported on this device.", "status-err");
        renderPlaces();
        return;
      }

      gpsBtnText.textContent = "Checking...";
      gpsToggleBtn.disabled = true;
      setPageStatus("Checking browser location...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            setGpsUi(true);

            try {
              await Promise.all([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;

              setPageStatus("GPS On. Places with distance data are sorted closer first.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            setGpsUi(false);
            setPageStatus("GPS Off. Using saved profile location and search.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      gpsToggleBtn.disabled = false;
      renderPlaces();
    }

    function toggleGps() {
      if (browserCoords) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS Off. Using saved location and search.", "status-ok");
        renderPlaces();
        return;
      }

      requestBrowserLocation();
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
      updateFilterChips(0);
    }

    function showList(count) {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
      updateFilterChips(count);
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function getVisitCount(model) {
      const exactKey = buildPlaceKey(model.source, model.id);
      return visitCountMap.get(exactKey) || visitCountLooseMap.get(model.id) || 0;
    }

    function renderViewerMeta() {
      const city = titleText(viewerProfile?.city);
      const province = titleText(viewerProfile?.province);
      const country = titleText(viewerProfile?.country);
      const parts = [city, province, country].filter(Boolean);
      smallLocationText.textContent = parts.length ? `Location: ${parts.join(", ")}` : "Location: not set";
      updateModeUi();
    }

    function buildBasePlaceRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return allPlaces
        .filter(model => !model.hidden && !model.rejected)
        .filter(model => model.approved || model.createdBy === currentUser.id)
        .map(model => {
          const city = normalizeText(model.city);
          const province = normalizeText(model.province);
          const country = normalizeText(model.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = flexibleSameProvince(viewerProvince, viewerCountry, province, country);
          const sameCity = flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country);

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            model.lat !== null &&
            model.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng);
          }

          const searchable = [
            model.name,
            model.description,
            model.category,
            model.address,
            model.website,
            model.creatorName,
            model.keywords,
            model.city,
            model.province,
            model.country,
            provinceAliases(model.province),
            countryAliases(model.country),
            model.locationSearch
          ].filter(Boolean).join(" ").toLowerCase();

          const visitCount = getVisitCount(model);
          const mine = model.createdBy === currentUser.id;
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...model,
            sameCountry,
            sameProvince,
            sameCity,
            withinGpsRange,
            distanceKm,
            visitCount,
            mine,
            distanceLabel: distanceKm !== null ? formatDistance(distanceKm) : "",
            placeLabel: [model.city, model.province, model.country].filter(Boolean).join(", "),
            searchable
          };
        });
    }

    function buildNearbyPlaces() {
      const q = normalizeText(searchInput.value);
      const mode = currentMode();

      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      let rows = buildBasePlaceRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (mode === "gps") {
        const hasGps = !!(browserCoords || (viewerProfile?.lat !== null && viewerProfile?.lng !== null));

        if (hasGps) {
          rows = rows.filter(row => row.mine || row.withinGpsRange || row.sameCity || row.sameProvince || row.sameCountry);
        } else if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.mine || row.sameCity || row.sameProvince || row.sameCountry);
        } else {
          rows = rows.filter(row => row.mine);
        }
      } else if (mode === "everywhere") {
        rows = rows;
      } else {
        if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.mine || row.sameCity || row.sameProvince || row.sameCountry);
        } else {
          rows = rows.filter(row => row.mine);
        }
      }

      rows.sort((a, b) => {
        if (a.mine && !b.mine) return -1;
        if (b.mine && !a.mine) return 1;

        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        if (a.sameCountry && !b.sameCountry) return -1;
        if (b.sameCountry && !a.sameCountry) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        if (b.visitCount !== a.visitCount) return b.visitCount - a.visitCount;

        return a.name.localeCompare(b.name);
      });

      return rows;
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      renderViewerMeta();
    }

    async function fetchSourceRows(tableName) {
      try {
        const { data, error } = await supabase
          .from(tableName)
          .select("*");

        if (error) throw error;

        return data || [];
      } catch (err) {
        console.warn(`Place source skipped: ${tableName}`, err?.message || err);
        return [];
      }
    }

    async function loadPlaces() {
      const results = await Promise.all(PLACE_SOURCES.map(fetchSourceRows));
      const merged = [];

      results.forEach((rows, index) => {
        const source = PLACE_SOURCES[index];

        rows.forEach(row => {
          merged.push(normalizePlace(row, row.id, source));
        });
      });

      allPlaces = merged;
    }

    function readVisitPlaceId(raw) {
      return raw?.place_id || raw?.placeId || raw?.target_id || raw?.targetId || raw?.nearby_place_id || raw?.nearbyPlaceId || "";
    }

    function readVisitSource(raw) {
      return raw?.source || raw?.place_source || raw?.placeSource || raw?.target_source || raw?.targetSource || "";
    }

    async function loadVisits() {
      visitCountMap = new Map();
      visitCountLooseMap = new Map();

      try {
        const { data, error } = await supabase
          .from("place_visits")
          .select("*");

        if (error) throw error;

        (data || []).forEach(raw => {
          if (!isVisitRecord(raw)) return;

          const placeId = readVisitPlaceId(raw);
          const source = readVisitSource(raw);

          if (placeId) {
            visitCountLooseMap.set(placeId, (visitCountLooseMap.get(placeId) || 0) + 1);
          }

          if (placeId && source) {
            const exactKey = buildPlaceKey(source, placeId);
            visitCountMap.set(exactKey, (visitCountMap.get(exactKey) || 0) + 1);
          }
        });
      } catch (err) {
        console.warn("Place visits count skipped:", err?.message || err);
      }
    }

    function buildPlaceOpenUrl(model) {
      const url = new URL("place.html", window.location.href);
      url.searchParams.set("placeId", model.id);
      if (model.source) url.searchParams.set("source", model.source);
      return url.toString();
    }

    function renderPlaces() {
      openLoading();

      const q = normalizeText(searchInput.value);
      const mode = currentMode();

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const rows = buildNearbyPlaces();

      if (!rows.length) {
        if (q) {
          showEmpty("No matching places found. Try another city, province, country or place name.");
        } else if (mode === "gps") {
          showEmpty("No nearby places found with GPS. Try search or add a new place.");
        } else if (mode === "everywhere") {
          showEmpty("No places are visible yet.");
        } else if (!viewerHasLocation) {
          showEmpty("Add your city/province/country, turn GPS on, or search by city/country/place name.");
        } else {
          showEmpty("No places found near your saved location. Search can still find places from other cities.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const openUrl = buildPlaceOpenUrl(model);
        const locationText = model.placeLabel || "Location not added";
        const distanceText = model.distanceLabel ? `${model.distanceLabel} away` : "";
        const visitText = model.visitCount ? `${model.visitCount} visited` : "";
        const pillText = model.distanceLabel || (model.mine ? "Mine" : model.approved ? "Public" : "Draft");
        const pillClass = model.distanceLabel ? "green" : model.approved ? "green" : "yellow";
        const firstLetter = (model.name || "P").charAt(0).toUpperCase();

        const tile = document.createElement("a");
        tile.className = "place-tile";
        tile.href = openUrl;

        tile.innerHTML = `
          <div class="place-card">
            <div class="place-icon">${escapeHtml(firstLetter)}</div>

            <div class="place-body">
              <div class="place-head">
                <div class="place-main">
                  <div class="place-title">${escapeHtml(model.name)}</div>
                  <div class="place-category">${escapeHtml(model.category || "General")}</div>
                  <div class="place-meta">${escapeHtml([locationText, distanceText, visitText].filter(Boolean).join(" • "))}</div>
                </div>

                <span class="place-pill ${pillClass}">${escapeHtml(pillText)}</span>
              </div>
            </div>
          </div>
        `;

        listWrap.appendChild(tile);
      });

      showList(rows.length);
    }

    async function refreshAll() {
      openLoading();

      await Promise.all([
        loadPlaces(),
        loadVisits(),
        loadInboxBadge()
      ]);

      renderPlaces();
    }

    function clearLiveListeners() {
      liveChannels.forEach(ch => {
        try {
          supabase.removeChannel(ch);
        } catch {}
      });

      liveChannels = [];
      clearTimeout(refreshTimer);
      clearTimeout(badgeRefreshTimer);
    }

    function scheduleBadgeRefresh(delay = 350) {
      clearTimeout(badgeRefreshTimer);

      badgeRefreshTimer = setTimeout(() => {
        loadInboxBadge().catch(() => {});
      }, delay);
    }

    function setupRealtime() {
      clearLiveListeners();

      ["message_requests", "chat_threads", "chat_messages", "notifications"].forEach(table => {
        const channel = supabase
          .channel(`ownspace-nearby-places-badge-${table}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table },
            () => scheduleBadgeRefresh()
          )
          .subscribe();

        liveChannels.push(channel);
      });
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPlaces();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPlaces();
    });

    gpsToggleBtn.addEventListener("click", toggleGps);

    refreshBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      refreshBtn.disabled = true;
      setPageStatus("Refreshing...", "");

      try {
        await refreshAll();
        setPageStatus("Refreshed.", "status-ok");
      } catch (err) {
        console.error(err);
        setPageStatus("Could not refresh places.", "status-err");
      }

      refreshBtn.disabled = false;
    });

    window.addEventListener("pageshow", () => scheduleBadgeRefresh(140));
    window.addEventListener("focus", () => scheduleBadgeRefresh(180));
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) scheduleBadgeRefresh(160);
    });

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearLiveListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        setGpsUi(false);
        await loadViewer(currentUser.id);
        await refreshAll();
        setupRealtime();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearLiveListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load places.");
      }
    }

    window.addEventListener("beforeunload", clearLiveListeners);

    initPage();

    /*
      OWNSPACE NEARBY PLACES UPDATE:

      - Kept the newer light/dark theme style.
      - Brought spacing, margins, topbar, bottom nav, compact panels, chips and tile sizing from nearby.html.
      - Topbar now matches Nearby page: Back button on left, Refresh button on right.
      - Kept the People / Events / Places / Community option bar on Nearby Places.
      - Kept compact clickable place rows.
      - Kept Inbox badge fix: pending message_requests + truly unread incoming chat_messages only.
    */
  </script>
</body>
