<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby Places</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }
    .top-icon-btn svg{
      width:18px;
      height:18px;
      display:block;
    }
    .top-center{text-align:center;min-width:0}
    .brand{
      font-size:18px;
      font-weight:800;
      line-height:1.05;
    }
    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:13px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:38px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      border-color:rgba(61,220,132,.20);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      border-color:rgba(167,139,250,.20);
    }
    .btn-yellow{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }
    .btn-red{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.20);
    }
    .btn-soft{
      background:var(--surface-3);
      border-color:var(--line);
    }

    .status-text{
      min-height:18px;
      font-size:13px;
      margin-top:8px;
    }
    .status-ok{color:#86efac}
    .status-err{color:#fda4af}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 8px;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:13px;
      font-weight:800;
    }
    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }
    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    .search-box::placeholder{color:var(--muted)}
    .clear-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:30px;
      height:30px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }
    .cover{
      width:100%;
      max-height:240px;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:10px;
    }
    .card-title{
      font-size:16px;
      font-weight:800;
      line-height:1.35;
      margin-bottom:8px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }
    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }
    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .tab-link{font-size:12px;padding:10px 4px}
      .top-actions .action-btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="useBrowserLocationBtn" class="top-icon-btn" type="button" aria-label="Use browser GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby places</div>
      </div>

      <a href="edit-profile.html#location" class="top-icon-btn" aria-label="Location settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>

    <div class="panel">
      <div class="chip-row">
        <span id="locationChip" class="chip chip-blue">Location: -</span>
        <span id="modeChip" class="chip chip-purple">Mode: Same city</span>
        <span id="browserChip" class="chip chip-yellow">Browser GPS off</span>
        <span id="countChip" class="chip chip-green">Places: 0</span>
      </div>

      <div class="top-actions">
        <a href="edit-profile.html#location" class="action-btn btn-primary">Location Settings</a>
        <button id="gpsBtn2" class="action-btn btn-green" type="button">Use GPS</button>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link">People</a>
        <a href="nearby-events.html" class="tab-link">Events</a>
        <a href="nearby-places.html" class="tab-link active">Places</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search places, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">✕</button>
      </div>

      <div id="listLoading" class="loading-box">Loading nearby places...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No nearby places found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </span>
      <span>Feed</span>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5"></path>

  <script type="module">
    import { supabase } from "./supabase.js";

    const locationChip = document.getElementById("locationChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");
    const countChip = document.getElementById("countChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const gpsBtn2 = document.getElementById("gpsBtn2");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let allPlaces = [];

    let visitCountMap = new Map();
    let visitCountLooseMap = new Map();
    let userVisitExactMap = new Map();
    let userVisitLooseMap = new Map();

    const PLACE_SOURCES = ["nearby_places", "places", "nudist_places"];

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";
      const aliases = [c];
      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain");
      if (c === "canada") aliases.push("ca");
      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || "");
      const province = titleText(d.province || d.state || d.region || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || "");
      return [existing, city, province, country, countryAliases(country)]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function buildPlaceKey(source, placeId) {
      return `${String(source || "").trim()}__${String(placeId || "").trim()}`;
    }

    function isVisitRecord(raw) {
      const status = String(raw?.status || raw?.type || "").toLowerCase();
      return raw?.visited === true || raw?.explored === true || status.includes("visited") || status.includes("explored");
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        locationVisibility: getField(d, ["location_visibility", "locationVisibility", "nearby_mode", "nearbyMode"]) || "city",
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || "").toLowerCase();

      const approved = d.approved === true || d.verified === true || d.isVerified === true || ["approved", "active", "verified"].includes(status);
      const pending = d.pending === true || status === "pending" || (!approved && !d.rejected && status !== "rejected");
      const rejected = status === "rejected" || d.rejected === true;

      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic"]) || "General",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        locationSearch: buildLocationSearch(d),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName"]) || "Member",
        approved,
        pending,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function renderViewerLocation() {
      if (!viewerProfile) return;

      const parts = [viewerProfile.city, viewerProfile.province, viewerProfile.country].filter(Boolean);
      locationChip.textContent = `Location: ${parts.length ? parts.join(", ") : "Not set"}`;

      if (!browserCoords) {
        browserChip.textContent = "Browser GPS off";
        browserChip.className = "chip chip-yellow";
      }

      updateModeChip();
    }

    function updateModeChip() {
      const q = searchInput.value.trim();
      const hasCity = !!normalizeText(viewerProfile?.city);

      if (q) {
        modeChip.textContent = "Mode: Search all";
      } else if (hasCity) {
        modeChip.textContent = "Mode: Same city + mine";
      } else if (browserCoords) {
        modeChip.textContent = "Mode: GPS fallback + mine";
      } else {
        modeChip.textContent = "Mode: Mine only";
      }
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const { data, error } = await supabase
          .from("notifications")
          .select("id")
          .eq("to_user_id", currentUser.id)
          .eq("is_read", false);

        if (error) throw error;

        const count = (data || []).length;
        if (!count) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = count > 99 ? "99+" : String(count);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "Browser GPS unsupported";
        browserChip.className = "chip chip-red";
        renderPlaces();
        return;
      }

      browserChip.textContent = "Checking browser GPS...";
      browserChip.className = "chip chip-yellow";

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            browserChip.textContent = "Browser GPS on";
            browserChip.className = "chip chip-green";

            try {
              await supabase
                .from("users")
                .update({
                  lat: browserCoords.lat,
                  lng: browserCoords.lng
                })
                .eq("uid", currentUser.id);

              await supabase
                .from("public_profiles")
                .update({
                  lat: browserCoords.lat,
                  lng: browserCoords.lng
                })
                .eq("uid", currentUser.id);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;
              renderViewerLocation();
              setPageStatus("Browser GPS enabled. Your city list stays first, and distance labels improve.", "status-ok");
            } catch (err) {
              console.error(err);
            }

            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "Browser GPS off";
            browserChip.className = "chip chip-yellow";
            setPageStatus("Could not use browser GPS. Using saved city instead.", "status-err");
            resolve();
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
        );
      });

      renderPlaces();
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
      countChip.textContent = "Places: 0";
    }

    function showList(count) {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
      countChip.textContent = `Places: ${count}`;
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function getVisitCount(model) {
      const exactKey = buildPlaceKey(model.source, model.id);
      return visitCountMap.get(exactKey) || visitCountLooseMap.get(model.id) || 0;
    }

    function getUserVisitRecord(model) {
      const exactKey = buildPlaceKey(model.source, model.id);
      return userVisitExactMap.get(exactKey) || userVisitLooseMap.get(model.id) || null;
    }

    function hasVisited(model) {
      return !!getUserVisitRecord(model);
    }

    function buildNearbyPlaces() {
      const q = normalizeText(searchInput.value);
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerCoords = getViewerCoords();

      return allPlaces
        .filter(model => !model.hidden && !model.rejected)
        .filter(model => model.approved || (model.createdBy === currentUser.id && model.pending))
        .map(model => {
          const city = normalizeText(model.city);
          const sameCity = !!viewerCity && !!city && viewerCity === city;

          let distanceKm = null;
          if (viewerCoords.lat !== null && viewerCoords.lng !== null && model.lat !== null && model.lng !== null) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng);
          }

          const searchable = [
            model.name,
            model.description,
            model.category,
            model.address,
            model.website,
            model.creatorName,
            model.locationSearch,
            model.source
          ].filter(Boolean).join(" ").toLowerCase();

          const visitCount = getVisitCount(model);
          const visited = hasVisited(model);
          const mine = model.createdBy === currentUser.id;

          return {
            ...model,
            sameCity,
            distanceKm,
            visitCount,
            visited,
            mine,
            distanceLabel: distanceKm !== null ? formatDistance(distanceKm) : "",
            placeLabel: [model.city, model.province, model.country].filter(Boolean).join(", "),
            searchable
          };
        })
        .filter(row => {
          if (q) return row.searchable.includes(q);

          if (row.mine) return true;
          if (viewerCity && row.sameCity) return true;
          if (!viewerCity && browserCoords && row.distanceKm !== null && row.distanceKm <= 25) return true;

          return false;
        })
        .sort((a, b) => {
          if (a.mine && !b.mine) return -1;
          if (b.mine && !a.mine) return 1;

          if (a.sameCity && !b.sameCity) return -1;
          if (b.sameCity && !a.sameCity) return 1;

          if (a.pending && !b.pending) return -1;
          if (b.pending && !a.pending) return 1;

          const aHasDistance = a.distanceKm !== null;
          const bHasDistance = b.distanceKm !== null;
          if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
          if (aHasDistance && !bHasDistance) return -1;
          if (bHasDistance && !aHasDistance) return 1;

          if (b.visitCount !== a.visitCount) return b.visitCount - a.visitCount;

          return a.name.localeCompare(b.name);
        });
    }

    async function loadViewer(uid) {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", uid).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", uid).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      viewerProfile = normalizeProfile({
        ...(publicRes.data || {}),
        ...(userRes.data || {}),
        uid
      }, uid);

      renderViewerLocation();
    }

    async function fetchSourceRows(tableName) {
      try {
        const { data, error } = await supabase.from(tableName).select("*");
        if (error) throw error;
        return data || [];
      } catch (err) {
        console.error(`Failed loading ${tableName}:`, err);
        return [];
      }
    }

    async function loadPlaces() {
      const results = await Promise.all(PLACE_SOURCES.map(fetchSourceRows));

      const merged = [];
      results.forEach((rows, index) => {
        const source = PLACE_SOURCES[index];
        rows.forEach(row => {
          merged.push(normalizePlace(row, row.id, source));
        });
      });

      allPlaces = merged;
    }

    async function loadVisits() {
      visitCountMap = new Map();
      visitCountLooseMap = new Map();
      userVisitExactMap = new Map();
      userVisitLooseMap = new Map();

      try {
        const { data: allData, error: allError } = await supabase
          .from("place_visits")
          .select("*");

        if (allError) throw allError;

        (allData || []).forEach(raw => {
          if (!isVisitRecord(raw)) return;

          const placeId = raw.place_id || raw.placeId || raw.target_id || raw.targetId || raw.nearby_place_id || raw.nearbyPlaceId || "";
          const source = raw.source || raw.place_source || raw.placeSource || "";

          if (placeId) {
            visitCountLooseMap.set(placeId, (visitCountLooseMap.get(placeId) || 0) + 1);
          }

          if (placeId && source) {
            const exactKey = buildPlaceKey(source, placeId);
            visitCountMap.set(exactKey, (visitCountMap.get(exactKey) || 0) + 1);
          }
        });
      } catch (err) {
        console.error("All place visits load error:", err);
      }

      try {
        const { data: myData, error: myError } = await supabase
          .from("place_visits")
          .select("*")
          .eq("user_id", currentUser.id);

        if (myError) throw myError;

        (myData || []).forEach(raw => {
          if (!isVisitRecord(raw)) return;

          const placeId = raw.place_id || raw.placeId || raw.target_id || raw.targetId || raw.nearby_place_id || raw.nearbyPlaceId || "";
          const source = raw.source || raw.place_source || raw.placeSource || "";
          const record = { ...raw, docId: raw.id };

          if (placeId) {
            userVisitLooseMap.set(placeId, record);
          }

          if (placeId && source) {
            const exactKey = buildPlaceKey(source, placeId);
            userVisitExactMap.set(exactKey, record);
          }
        });
      } catch (err) {
        console.error("My place visits load error:", err);
      }
    }

    async function toggleVisited(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        const existing = getUserVisitRecord(model);

        if (existing) {
          if (existing.docId) {
            const { error } = await supabase.from("place_visits").delete().eq("id", existing.docId);
            if (error) throw error;
          } else {
            const { error } = await supabase
              .from("place_visits")
              .delete()
              .eq("user_id", currentUser.id)
              .eq("place_id", model.id)
              .eq("source", model.source);

            if (error) throw error;
          }

          setPageStatus("Removed from visited places.", "status-ok");
        } else {
          const { error } = await supabase
            .from("place_visits")
            .insert({
              user_id: currentUser.id,
              place_id: model.id,
              source: model.source,
              place_source: model.source,
              status: "visited",
              visited: true,
              explored: false,
              place_name: model.name || "",
              city: model.city || "",
              created_at: nowIso(),
              updated_at: nowIso()
            });

          if (error) throw error;
          setPageStatus("Marked as visited.", "status-ok");
        }

        await loadVisits();
        renderPlaces();
      } catch (err) {
        console.error(err);
        setPageStatus("Could not update visited state.", "status-err");
        btn.disabled = false;
      }
    }

    function renderPlaces() {
      openLoading();
      updateModeChip();

      const viewerHasCity = !!normalizeText(viewerProfile?.city);
      const q = searchInput.value.trim();
      const rows = buildNearbyPlaces();

      if (!rows.length) {
        if (!viewerHasCity && !browserCoords && !q) {
          showEmpty("Set your city in profile or use GPS to see nearby places. Your own created places will still show here once you add them.");
        } else if (q) {
          showEmpty("No places matched your search.");
        } else {
          showEmpty("No places found in your city yet. Search can still find places from other cities.");
        }
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const imageHtml = model.imageURL
          ? `<img class="cover" src="${escapeHtml(model.imageURL)}" alt="Place image">`
          : "";

        const badges = [];
        if (model.mine) badges.push(`<span class="mini-badge mini-purple">Mine</span>`);
        badges.push(`<span class="mini-badge mini-blue">${escapeHtml(model.category || "General")}</span>`);
        badges.push(`<span class="mini-badge ${model.approved ? "mini-green" : "mini-yellow"}">${model.approved ? "Approved" : "Pending approval"}</span>`);

        if (model.sameCity) {
          badges.push(`<span class="mini-badge mini-purple">Same city</span>`);
        } else if (model.distanceLabel) {
          badges.push(`<span class="mini-badge mini-purple">${escapeHtml(model.distanceLabel)}</span>`);
        }

        badges.push(`<span class="mini-badge mini-yellow">${model.visitCount} visited</span>`);

        const websiteHref = normalizeHref(model.website);
        const openUrl = `places.html?placeId=${encodeURIComponent(model.id)}&source=${encodeURIComponent(model.source)}`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          ${imageHtml}
          <div class="card-title">${escapeHtml(model.name)}</div>
          <div class="badge-row">${badges.join("")}</div>
          <div class="meta-grid">
            <div><strong>Location:</strong> ${escapeHtml(model.placeLabel || "Not added")}</div>
            <div><strong>Address:</strong> ${escapeHtml(model.address || "Not added")}</div>
            <div><strong>Submitted By:</strong> ${escapeHtml(model.creatorName || "Member")}</div>
            <div><strong>Source:</strong> ${escapeHtml(model.source || "-")}</div>
          </div>
          <div class="desc">${escapeHtml(model.description || "No description added.")}</div>
          <div class="top-actions" style="margin-top:0;">
            <a class="action-btn btn-primary" href="${openUrl}">Open</a>
            ${websiteHref ? `<a class="action-btn btn-green" href="${escapeHtml(websiteHref)}" target="_blank" rel="noopener noreferrer">Open Link</a>` : ``}
            ${
              model.mine
                ? `<a class="action-btn btn-purple" href="${openUrl}">Manage</a>`
                : `<button class="action-btn ${model.visited ? "btn-yellow" : "btn-soft"} visit-btn" type="button">${model.visited ? "Visited" : "Been There"}</button>`
            }
          </div>
        `;

        const cover = card.querySelector(".cover");
        if (cover) {
          cover.addEventListener("error", () => {
            cover.style.display = "none";
          });
        }

        const visitBtn = card.querySelector(".visit-btn");
        if (visitBtn) {
          visitBtn.addEventListener("click", async () => {
            await toggleVisited(model, visitBtn);
          });
        }

        listWrap.appendChild(card);
      });

      showList(rows.length);
    }

    async function refreshAll() {
      openLoading();
      await Promise.all([
        loadPlaces(),
        loadVisits(),
        loadInboxBadge()
      ]);
      renderViewerLocation();
      renderPlaces();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPlaces();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPlaces();
    });

    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    gpsBtn2.addEventListener("click", requestBrowserLocation);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load nearby places.");
      }
    }

    initPage();
  </script>
</body>
