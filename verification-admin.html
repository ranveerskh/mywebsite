<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Verification Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;
      --card:#121931;
      --soft:#161f3d;
      --line:rgba(255,255,255,.08);
      --text:#fff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);
      min-height:100vh;
      padding:14px 14px 92px;
    }
    .app{max-width:980px;margin:0 auto}
    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);
      border:1px solid rgba(255,255,255,.04);
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .left-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .back-btn,.chip-btn{
      border:none;
      background:var(--soft);
      color:#fff;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      border:1px solid var(--line);
      text-decoration:none;
      display:inline-block;
    }
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}

    .panel{
      background:rgba(18,25,49,.88);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    .section-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:8px;
    }
    .section-note{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      margin-bottom:14px;
    }
    .filters{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:10px;
      margin-top:10px;
    }
    input,select,textarea{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:14px;
      background:#0f1630;
      color:#fff;
      border:1px solid rgba(255,255,255,.07);
      font-size:14px;
    }
    select option{color:#000}
    textarea{
      min-height:90px;
      resize:vertical;
    }
    .loading{
      text-align:center;
      color:var(--muted);
      padding:28px 10px;
    }
    .list{
      display:grid;
      gap:14px;
    }
    .card{
      background:#0f1630;
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      padding:14px;
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .card-title{
      font-size:18px;
      font-weight:800;
      line-height:1.4;
    }
    .card-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      margin-top:4px;
      word-break:break-word;
    }
    .status-badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      flex-shrink:0;
    }
    .status-pending{
      background:rgba(245,185,66,.14);
      color:#ffe7b0;
      border:1px solid rgba(245,185,66,.20);
    }
    .status-approved{
      background:rgba(61,220,132,.14);
      color:#c9f7dd;
      border:1px solid rgba(61,220,132,.20);
    }
    .status-rejected{
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border:1px solid rgba(255,93,115,.20);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:8px;
      margin-bottom:12px;
    }
    .info-box{
      background:#111936;
      border:1px solid rgba(255,255,255,.05);
      border-radius:14px;
      padding:12px;
    }
    .info-box small{
      display:block;
      color:var(--muted);
      margin-bottom:6px;
      font-size:12px;
    }
    .info-box div,.info-box a{
      color:#fff;
      font-size:14px;
      line-height:1.6;
      word-break:break-word;
    }
    .info-box a{
      text-decoration:none;
    }
    .info-box a:hover{
      text-decoration:underline;
    }
    .reason-box{
      background:#111936;
      border:1px solid rgba(255,255,255,.05);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }
    .reason-box small{
      display:block;
      color:var(--muted);
      margin-bottom:6px;
      font-size:12px;
    }
    .reason-box div{
      color:#fff;
      font-size:14px;
      line-height:1.7;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:12px;
    }
    .approve-btn,.reject-btn,.save-note-btn,.open-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
    }
    .approve-btn{
      background:rgba(61,220,132,.14);
      color:#c9f7dd;
      border:1px solid rgba(61,220,132,.20);
    }
    .reject-btn{
      background:rgba(255,93,115,.14);
      color:#ffd3d9;
      border:1px solid rgba(255,93,115,.20);
    }
    .save-note-btn{
      background:rgba(167,139,250,.14);
      color:#e8defd;
      border:1px solid rgba(167,139,250,.20);
    }
    .open-btn{
      background:rgba(76,201,255,.14);
      color:#d8f7ff;
      border:1px solid rgba(76,201,255,.20);
    }
    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }
    .message{
      min-height:20px;
      font-size:14px;
      margin-top:10px;
    }
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}
    .empty-box{
      text-align:center;
      padding:28px 10px;
      color:var(--muted);
      background:#0f1630;
      border-radius:18px;
      border:1px dashed rgba(255,255,255,.08);
    }
    .hidden{display:none!important}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(980px, calc(100% - 20px));
      background:rgba(12,18,35,.92);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    .nav-link{
      text-decoration:none;
      color:#b9c4e3;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
    }
    .nav-link .icon{font-size:18px;line-height:1}

    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{padding:10px 12px}
      .brand{font-size:20px}
      .back-btn,.chip-btn{padding:9px 10px;font-size:12px}
      .filters{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="left-wrap">
        <button id="backBtn" class="back-btn" type="button">Back</button>
        <div>
          <div class="brand">BareWorld</div>
          <div class="brand-sub">Verification admin</div>
        </div>
      </div>

      <div class="top-actions">
        <a href="profile.html" class="chip-btn">Profile</a>
        <a href="settings.html" class="chip-btn">Settings</a>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Verification Requests</div>
      <div class="section-note">
        Review verification requests and approve or reject them.
      </div>

      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search by name or email..." />
        <select id="statusFilter">
          <option value="all">All statuses</option>
          <option value="pending">Pending only</option>
          <option value="approved">Approved only</option>
          <option value="rejected">Rejected only</option>
        </select>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading verification requests...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No verification requests found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="nearby-events.html" class="nav-link">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const pageMessage = document.getElementById("pageMessage");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");

    let currentUser = null;
    let allRequests = [];
    let verificationChannel = null;
    let refreshTimer = null;

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "settings.html";
    });

    function nowIso() {
      return new Date().toISOString();
    }

    function setMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function isMissingSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("does not exist") ||
        msg.includes("not found in the schema cache") ||
        msg.includes("could not find the table") ||
        msg.includes("could not find") ||
        msg.includes("column")
      );
    }

    function toMillis(value) {
      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function formatDate(value) {
      if (!value) return "Just now";

      const ms = toMillis(value);
      if (!ms) return "Just now";

      try {
        return new Date(ms).toLocaleString();
      } catch {
        return "Just now";
      }
    }

    function statusBadgeClass(status) {
      if (status === "approved") return "status-approved";
      if (status === "rejected") return "status-rejected";
      return "status-pending";
    }

    function normalizeRequest(row) {
      const d = row || {};
      const uid = String(getField(d, ["uid", "user_id", "userId", "target_user_id", "targetUserId"], "") || "");
      const rowId = String(getField(d, ["id"], "") || "");

      return {
        id: rowId,
        uid: uid || rowId,
        fullName: String(getField(d, ["full_name", "fullName", "name", "real_name", "realName"], "No name") || "No name"),
        email: String(getField(d, ["email"], "") || ""),
        accountType: String(getField(d, ["account_type", "accountType"], "personal") || "personal"),
        socialLink: String(getField(d, ["social_link", "socialLink", "website", "link"], "") || ""),
        idPhotoURL: String(getField(d, ["id_photo_url", "idPhotoURL", "idPhotoUrl"], "") || ""),
        selfieWithIdURL: String(getField(d, ["selfie_with_id_url", "selfieWithIdURL", "selfieWithIdUrl"], "") || ""),
        reason: String(getField(d, ["reason"], "No reason provided") || "No reason provided"),
        adminNote: String(getField(d, ["admin_note", "adminNote"], "") || ""),
        status: String(getField(d, ["status"], "pending") || "pending").toLowerCase(),
        createdAt: d.created_at ?? d.createdAt ?? d.created ?? null,
        updatedAt: d.updated_at ?? d.updatedAt ?? null,
        createdAtMs: toMillis(d.created_at ?? d.createdAt ?? d.created ?? null),
        raw: d
      };
    }

    function getFilteredRequests() {
      const q = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      return allRequests.filter(item => {
        const matchesStatus = status === "all" ? true : (item.status || "pending") === status;
        if (!matchesStatus) return false;

        if (!q) return true;

        const haystack = [
          item.fullName || "",
          item.email || "",
          item.accountType || "",
          item.reason || "",
          item.uid || "",
          item.id || "",
          item.socialLink || ""
        ].join(" ").toLowerCase();

        return haystack.includes(q);
      });
    }

    async function selectByColumn(table, column, value) {
      try {
        const { data, error } = await supabase
          .from(table)
          .select("*")
          .eq(column, value)
          .maybeSingle();

        if (error) throw error;
        return data || null;
      } catch (err) {
        if (!isMissingSchemaError(err)) {
          console.warn(`Select failed ${table}.${column}:`, err?.message || err);
        }
        return null;
      }
    }

    async function checkAdminAccess(uid) {
      const checks = [
        ["admins", "id"],
        ["admins", "uid"],
        ["admins", "user_id"],
        ["admins", "userId"]
      ];

      for (const [table, column] of checks) {
        const row = await selectByColumn(table, column, uid);
        if (row) return true;
      }

      return false;
    }

    async function updateByColumnWithPayloads(table, column, value, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        try {
          const { error } = await supabase
            .from(table)
            .update(payload)
            .eq(column, value);

          if (!error) return true;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error(`Could not update ${table}.`);
    }

    async function updateVerificationRequest(item, status, note) {
      const snakePayload = {
        status,
        admin_note: note || "",
        reviewed_at: nowIso(),
        reviewed_by: currentUser?.id || "",
        updated_at: nowIso()
      };

      const camelPayload = {
        status,
        adminNote: note || "",
        reviewedAt: nowIso(),
        reviewedBy: currentUser?.id || "",
        updatedAt: nowIso()
      };

      const minimalPayload = {
        status,
        updated_at: nowIso()
      };

      const payloads = [snakePayload, camelPayload, minimalPayload];

      const updateTargets = [];

      if (item.id) updateTargets.push(["id", item.id]);
      if (item.uid) {
        updateTargets.push(["uid", item.uid]);
        updateTargets.push(["user_id", item.uid]);
        updateTargets.push(["userId", item.uid]);
      }

      let lastError = null;

      for (const [column, value] of updateTargets) {
        try {
          await updateByColumnWithPayloads("verification_requests", column, value, payloads);
          return true;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not update verification request.");
    }

    async function upsertOrUpdateProfile(table, uid, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        try {
          const { error } = await supabase
            .from(table)
            .upsert({ uid, ...payload }, { onConflict: "uid" });

          if (!error) return true;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      for (const payload of payloads) {
        try {
          const { error } = await supabase
            .from(table)
            .update(payload)
            .eq("uid", uid);

          if (!error) return true;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      for (const payload of payloads) {
        try {
          const { error } = await supabase
            .from(table)
            .update(payload)
            .eq("id", uid);

          if (!error) return true;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error(`Could not update ${table}.`);
    }

    async function updateUserVerified(uid, isVerified) {
      if (!uid) throw new Error("Missing request user id.");

      const userPayloads = [
        {
          is_verified: isVerified,
          verified: isVerified,
          verification_status: isVerified ? "approved" : "rejected",
          updated_at: nowIso()
        },
        {
          isVerified,
          verified: isVerified,
          verificationStatus: isVerified ? "approved" : "rejected",
          updatedAt: nowIso()
        },
        {
          is_verified: isVerified
        }
      ];

      const publicPayloads = [
        {
          is_verified: isVerified,
          verified: isVerified,
          verification_status: isVerified ? "approved" : "rejected",
          updated_at: nowIso()
        },
        {
          isVerified,
          verified: isVerified,
          verificationStatus: isVerified ? "approved" : "rejected",
          updatedAt: nowIso()
        },
        {
          is_verified: isVerified
        }
      ];

      await Promise.all([
        upsertOrUpdateProfile("users", uid, userPayloads),
        upsertOrUpdateProfile("public_profiles", uid, publicPayloads)
      ]);
    }

    async function approveRequest(item, note) {
      await updateVerificationRequest(item, "approved", note);
      await updateUserVerified(item.uid, true);
    }

    async function rejectRequest(item, note) {
      await updateVerificationRequest(item, "rejected", note);
      await updateUserVerified(item.uid, false);
    }

    async function saveAdminNote(item, note) {
      const snakePayload = {
        admin_note: note || "",
        updated_at: nowIso()
      };

      const camelPayload = {
        adminNote: note || "",
        updatedAt: nowIso()
      };

      const minimalPayload = {
        admin_note: note || ""
      };

      const payloads = [snakePayload, camelPayload, minimalPayload];

      const updateTargets = [];

      if (item.id) updateTargets.push(["id", item.id]);
      if (item.uid) {
        updateTargets.push(["uid", item.uid]);
        updateTargets.push(["user_id", item.uid]);
        updateTargets.push(["userId", item.uid]);
      }

      let lastError = null;

      for (const [column, value] of updateTargets) {
        try {
          await updateByColumnWithPayloads("verification_requests", column, value, payloads);
          return true;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not save admin note.");
    }

    function renderList() {
      const items = getFilteredRequests();
      list.innerHTML = "";

      if (!items.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        return;
      }

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      items.forEach((req) => {
        const uid = req.uid;
        const key = req.id || req.uid;

        const socialLink = normalizeHref(req.socialLink);
        const idPhotoLink = normalizeHref(req.idPhotoURL);
        const selfieLink = normalizeHref(req.selfieWithIdURL);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="card-title">${escapeHtml(req.fullName || "No name")}</div>
              <div class="card-sub">
                ${escapeHtml(req.email || "-")} • ${escapeHtml(req.accountType || "personal")}<br>
                UID: ${escapeHtml(uid || "-")}<br>
                Request ID: ${escapeHtml(req.id || "-")}<br>
                Submitted: ${escapeHtml(formatDate(req.createdAt))}
              </div>
            </div>
            <span class="status-badge ${statusBadgeClass(req.status || "pending")}">
              ${escapeHtml((req.status || "pending").toUpperCase())}
            </span>
          </div>

          <div class="grid">
            <div class="info-box">
              <small>Social / Website</small>
              <div>
                ${req.socialLink ? `<a href="${escapeHtml(socialLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(req.socialLink)}</a>` : "Not provided"}
              </div>
            </div>

            <div class="info-box">
              <small>Public Profile</small>
              <div>
                ${uid ? `<a href="member.html?uid=${encodeURIComponent(uid)}" target="_blank" rel="noopener noreferrer">Open member profile</a>` : "Missing UID"}
              </div>
            </div>

            <div class="info-box">
              <small>ID Photo Link</small>
              <div>
                ${req.idPhotoURL ? `<a href="${escapeHtml(idPhotoLink)}" target="_blank" rel="noopener noreferrer">Open ID photo</a>` : "Not provided"}
              </div>
            </div>

            <div class="info-box">
              <small>Selfie with ID Link</small>
              <div>
                ${req.selfieWithIdURL ? `<a href="${escapeHtml(selfieLink)}" target="_blank" rel="noopener noreferrer">Open selfie with ID</a>` : "Not provided"}
              </div>
            </div>
          </div>

          <div class="reason-box">
            <small>Reason</small>
            <div>${escapeHtml(req.reason || "No reason provided")}</div>
          </div>

          <div class="field">
            <label style="display:block;margin-bottom:8px;font-size:13px;color:#d7def5;font-weight:700;">Admin Note</label>
            <textarea class="admin-note-input" data-key="${escapeHtml(key)}" placeholder="Write admin note...">${escapeHtml(req.adminNote || "")}</textarea>
          </div>

          <div class="actions">
            ${uid ? `<a class="open-btn" href="verification.html?uid=${encodeURIComponent(uid)}" target="_blank" rel="noopener noreferrer">Open user page</a>` : ""}
            <button class="save-note-btn" data-action="save-note" data-key="${escapeHtml(key)}">Save Note</button>
            <button class="approve-btn" data-action="approve" data-key="${escapeHtml(key)}">Approve</button>
            <button class="reject-btn" data-action="reject" data-key="${escapeHtml(key)}">Reject</button>
          </div>
        `;

        list.appendChild(card);
      });

      list.querySelectorAll("button[data-action]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const key = btn.getAttribute("data-key");
          const action = btn.getAttribute("data-action");
          const noteInput = list.querySelector(`.admin-note-input[data-key="${CSS.escape(key)}"]`);
          const note = noteInput ? noteInput.value.trim() : "";
          const item = allRequests.find(x => (x.id || x.uid) === key);

          if (!item) return;

          btn.disabled = true;
          setMessage("");

          try {
            if (action === "save-note") {
              await saveAdminNote(item, note);
              item.adminNote = note;
              setMessage("Admin note saved.", "success");
            } else if (action === "approve") {
              await approveRequest(item, note);
              item.status = "approved";
              item.adminNote = note;
              renderList();
              setMessage("Verification approved.", "success");
            } else if (action === "reject") {
              await rejectRequest(item, note);
              item.status = "rejected";
              item.adminNote = note;
              renderList();
              setMessage("Verification rejected.", "success");
            }
          } catch (error) {
            console.error(error);
            setMessage(error?.message || "Action failed.", "error");
          }

          btn.disabled = false;
        });
      });
    }

    searchInput.addEventListener("input", renderList);
    statusFilter.addEventListener("change", renderList);

    async function loadVerificationRequests(showLoading = true) {
      if (showLoading) {
        loading.classList.remove("hidden");
        list.classList.add("hidden");
        emptyBox.classList.add("hidden");
      }

      let rows = [];
      let lastError = null;

      try {
        const { data, error } = await supabase
          .from("verification_requests")
          .select("*")
          .order("created_at", { ascending: false });

        if (!error) {
          rows = data || [];
          lastError = null;
        } else {
          lastError = error;
        }
      } catch (err) {
        lastError = err;
      }

      if (lastError) {
        try {
          const { data, error } = await supabase
            .from("verification_requests")
            .select("*")
            .order("createdAt", { ascending: false });

          if (!error) {
            rows = data || [];
            lastError = null;
          } else {
            lastError = error;
          }
        } catch (err) {
          lastError = err;
        }
      }

      if (lastError) {
        try {
          const { data, error } = await supabase
            .from("verification_requests")
            .select("*");

          if (error) throw error;
          rows = data || [];
        } catch (err) {
          console.error(err);
          loading.textContent = "Could not load verification requests.";
          return;
        }
      }

      allRequests = rows
        .map(row => normalizeRequest({ id: row.id, ...row }))
        .sort((a, b) => b.createdAtMs - a.createdAtMs);

      loading.classList.add("hidden");
      renderList();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        loadVerificationRequests(false).catch(err => console.error("Verification refresh failed:", err));
      }, 350);
    }

    function setupRealtime() {
      if (verificationChannel) {
        try {
          supabase.removeChannel(verificationChannel);
        } catch {}
      }

      verificationChannel = supabase
        .channel(`verification-admin-live-${currentUser.id}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "verification_requests" },
          () => scheduleRefresh()
        )
        .subscribe();
    }

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      const isAdmin = await checkAdminAccess(currentUser.id);

      if (!isAdmin) {
        loading.textContent = "Access denied. Admin only.";
        return;
      }

      await loadVerificationRequests(true);
      setupRealtime();

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      if (verificationChannel) {
        try {
          supabase.removeChannel(verificationChannel);
        } catch {}
      }
    });

    initPage().catch((error) => {
      console.error(error);
      loading.textContent = "Could not load verification requests.";
    });

    /*
      SUPABASE NEEDS FOR THIS PAGE:

      TABLES:
      - admins: select
      - verification_requests: select, update, realtime optional
      - users: update, upsert
      - public_profiles: update, upsert

      AUTH:
      - logged-in user required
      - admin user required

      IMPORTANT COLUMNS:
      verification_requests:
      - id
      - uid / user_id
      - full_name
      - email
      - account_type
      - social_link
      - id_photo_url
      - selfie_with_id_url
      - reason
      - admin_note
      - status
      - reviewed_at
      - reviewed_by
      - created_at
      - updated_at

      users:
      - uid
      - is_verified
      - verification_status
      - updated_at

      public_profiles:
      - uid
      - is_verified
      - verification_status
      - updated_at

      RLS IDEA:
      - Only admins can select/update all verification_requests
      - Only admins can update is_verified on users/public_profiles
      - Users can select their own verification request on verification.html
      - Users can insert/update their own pending request only before review

      SHARE BUTTON:
      - Not needed on verification admin page because it does not display post cards.
    */
  </script>
</body>
</html>
