<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Follow Requests</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 18px 36px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --red:#e74c66;
      --yellow:#d59617;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 16px 28px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .top-icon-btn svg{width:18px;height:18px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:18px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:10px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:13px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .compact-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }
    .compact-title{
      font-size:17px;
      font-weight:800;
      line-height:1.25;
      margin-bottom:4px;
    }
    .compact-sub{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .chip-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .quick-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .quick-btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .quick-btn.primary{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .loading,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 12px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      line-height:1.55;
      font-size:14px;
    }

    .message{
      min-height:18px;
      font-size:13px;
      margin-top:8px;
    }
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .list{display:grid;gap:10px}

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }
    .card-top{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }

    .avatar,
    .avatar-placeholder{
      width:58px;
      height:58px;
      border-radius:16px;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }
    .avatar{object-fit:cover}
    .avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px;
      color:var(--muted);
      font-size:10px;
      line-height:1.3;
    }

    .body{flex:1;min-width:0}
    .name-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:2px;
    }
    .name{
      font-size:15px;
      font-weight:800;
      line-height:1.3;
    }
    .name a{color:var(--text);text-decoration:none}
    .name a:hover{text-decoration:underline}

    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }

    .username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
      word-break:break-word;
    }

    .meta-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .meta-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .meta-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .meta-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .bio{
      color:var(--text);
      line-height:1.55;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .accept-btn,.decline-btn,.view-btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
    }
    .accept-btn{
      background:rgba(61,220,132,.14);
      color:var(--text);
      border:1px solid rgba(61,220,132,.20);
    }
    .decline-btn{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .view-btn{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{font-size:18px;line-height:1}
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .quick-actions .quick-btn,
      .actions > *{flex:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Follow requests</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="compact-head">
        <div>
          <div class="compact-title">Pending Follow Requests</div>
          <div class="compact-sub">Accept or decline people who want to follow your private profile.</div>
        </div>
      </div>

      <div class="chip-row">
        <span class="chip chip-blue">Private profile access</span>
        <span class="chip chip-green">Approve instantly</span>
        <span class="chip chip-purple">Live updates</span>
      </div>

      <div class="quick-actions">
        <a href="profile.html" class="quick-btn">My Profile</a>
        <a href="settings.html" class="quick-btn">Settings</a>
        <a href="feed.html" class="quick-btn primary">Feed</a>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading follow requests...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No pending follow requests.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link active">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const pageMessage = document.getElementById("pageMessage");

    let currentUser = null;
    let myName = "Someone";
    let requestsChannel = null;
    let refreshTimer = null;

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", resolveTheme(getStoredTheme()));
    }

    applyTheme();

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme();
      });
    }

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme();
    });

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "profile.html";
    });

    function setMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function formatDate(value) {
      if (!value) return "Just now";

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().toLocaleString();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return new Date(value.seconds * 1000).toLocaleString();
        }
      } catch {}

      try {
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? "Just now" : d.toLocaleString();
      } catch {
        return "Just now";
      }
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: getField(d, ["uid", "id", "user_id", "userId"]) || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "user_name", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified)
      };
    }

    function normalizeRequest(raw) {
      const d = raw || {};
      return {
        id: getField(d, ["id"]),
        requesterId: getField(d, ["requester_id", "requesterId", "from_user_id", "fromUserId", "from_uid", "fromUid"]),
        targetId: getField(d, ["target_id", "targetId", "to_user_id", "toUserId", "to_uid", "toUid"]),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadMergedProfile(uid) {
      if (!uid) return normalizeProfile({}, "");

      try {
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);

        return normalizeProfile({
          ...(publicRow || {}),
          ...(userRow || {}),
          uid
        }, uid);
      } catch {
        return normalizeProfile({ uid }, uid);
      }
    }

    async function insertWithFallback(table, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        try {
          const { data, error } = await supabase
            .from(table)
            .insert(payload)
            .select()
            .maybeSingle();

          if (!error) return data || null;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    async function sendNotificationSafe(toUserId, payload = {}) {
      if (!toUserId || toUserId === currentUser?.id) return;

      const snakePayload = {
        type: payload.type || "notification",
        title: payload.title || "",
        text: payload.text || "",
        from_user_id: payload.from_user_id || payload.fromUserId || currentUser?.id || "",
        to_user_id: toUserId,
        created_at: nowIso(),
        is_read: false
      };

      const camelPayload = {
        type: payload.type || "notification",
        title: payload.title || "",
        text: payload.text || "",
        fromUserId: payload.from_user_id || payload.fromUserId || currentUser?.id || "",
        toUserId: toUserId,
        createdAt: nowIso(),
        isRead: false
      };

      try {
        await insertWithFallback("notifications", [
          snakePayload,
          camelPayload,
          {
            type: snakePayload.type,
            text: snakePayload.text,
            to_user_id: toUserId,
            created_at: nowIso()
          }
        ]);
      } catch (err) {
        console.warn("Notification failed:", err?.message || err);
      }
    }

    async function loadFollowRequests() {
      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");
      list.innerHTML = "";

      let rows = [];
      let lastError = null;

      const targetColumns = ["target_id", "targetId", "to_user_id", "toUserId"];

      for (const column of targetColumns) {
        try {
          const { data, error } = await supabase
            .from("follow_requests")
            .select("*")
            .eq(column, currentUser.id)
            .order("created_at", { ascending: false });

          if (!error) {
            rows = data || [];
            lastError = null;
            break;
          }

          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      if (lastError) {
        console.error("Load requests failed:", lastError);
        loading.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = "Could not load follow requests.";
        return;
      }

      const requests = rows.map(normalizeRequest).filter(r => r.requesterId && r.targetId === currentUser.id);

      await renderRequests(requests);
    }

    async function deleteAllMatchingRequests(requesterId, targetId) {
      const variants = [
        { requesterCol: "requester_id", targetCol: "target_id" },
        { requesterCol: "requesterId", targetCol: "targetId" },
        { requesterCol: "from_user_id", targetCol: "to_user_id" },
        { requesterCol: "fromUserId", targetCol: "toUserId" }
      ];

      let deletedAny = false;
      let lastError = null;

      for (const v of variants) {
        try {
          const { error } = await supabase
            .from("follow_requests")
            .delete()
            .eq(v.requesterCol, requesterId)
            .eq(v.targetCol, targetId);

          if (!error) {
            deletedAny = true;
          } else {
            lastError = error;
          }
        } catch (err) {
          lastError = err;
        }
      }

      if (!deletedAny && lastError) throw lastError;
    }

    async function findExistingFollow(requesterId, targetId) {
      const variants = [
        { followerCol: "follower_id", followingCol: "following_id" },
        { followerCol: "followerId", followingCol: "followingId" }
      ];

      for (const v of variants) {
        try {
          const { data, error } = await supabase
            .from("follows")
            .select("*")
            .eq(v.followerCol, requesterId)
            .eq(v.followingCol, targetId)
            .limit(1);

          if (!error && data && data.length) return data[0];
        } catch {}
      }

      return null;
    }

    async function acceptRequest(request) {
      const requesterId = request.requesterId;
      const targetId = request.targetId;

      if (!requesterId || !targetId) {
        throw new Error("Invalid follow request.");
      }

      const existingFollow = await findExistingFollow(requesterId, targetId);

      if (!existingFollow) {
        await insertWithFallback("follows", [
          {
            follower_id: requesterId,
            following_id: targetId,
            created_at: nowIso()
          },
          {
            followerId: requesterId,
            followingId: targetId,
            createdAt: nowIso()
          }
        ]);
      }

      await sendNotificationSafe(requesterId, {
        type: "follow_accept",
        title: "Follow request accepted",
        text: `${myName} accepted your follow request.`,
        from_user_id: targetId,
        to_user_id: requesterId
      });

      await deleteAllMatchingRequests(requesterId, targetId);
    }

    async function declineRequest(request) {
      const requesterId = request.requesterId;
      const targetId = request.targetId;

      if (!requesterId || !targetId) {
        throw new Error("Invalid follow request.");
      }

      await deleteAllMatchingRequests(requesterId, targetId);
    }

    async function renderRequests(requests) {
      loading.classList.add("hidden");
      list.innerHTML = "";

      if (!requests.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = "No pending follow requests.";
        return;
      }

      const requesterIds = [...new Set(requests.map(r => r.requesterId).filter(Boolean))];

      const profileEntries = await Promise.all(
        requesterIds.map(async (uid) => {
          const profile = await loadMergedProfile(uid);
          return [uid, profile];
        })
      );

      const profilesMap = new Map(profileEntries);

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      requests.forEach((request) => {
        const profile = profilesMap.get(request.requesterId) || {};
        const displayName = profile.displayName || "Member";
        const username = profile.username || "";
        const bio = profile.bio?.trim() ? profile.bio : "No bio added yet.";
        const photoURL = profile.photoURL || "";
        const verified = !!profile.verified;

        const card = document.createElement("div");
        card.className = "card";

        const avatarHtml = photoURL
          ? `<img class="avatar" src="${escapeHtml(photoURL)}" alt="Profile Photo">`
          : `<div class="avatar-placeholder">No photo</div>`;

        card.innerHTML = `
          <div class="card-top">
            ${avatarHtml}
            <div class="body">
              <div class="name-row">
                <div class="name">
                  <a href="member.html?uid=${encodeURIComponent(request.requesterId)}">${escapeHtml(displayName)}</a>
                </div>
                ${verified ? `<span class="verified-dot">✓</span>` : ""}
              </div>

              ${username ? `<div class="username">@${escapeHtml(username)}</div>` : ""}

              <div class="meta-row">
                <span class="meta-badge meta-purple">Requested</span>
                <span class="meta-badge meta-blue">${escapeHtml(formatDate(request.createdAt))}</span>
              </div>

              <div class="bio">${escapeHtml(bio)}</div>

              <div class="actions">
                <a class="view-btn" href="member.html?uid=${encodeURIComponent(request.requesterId)}">View Profile</a>
                <button class="accept-btn" data-id="${escapeHtml(request.id)}">Accept</button>
                <button class="decline-btn" data-id="${escapeHtml(request.id)}">Decline</button>
              </div>
            </div>
          </div>
        `;

        const avatarImg = card.querySelector(".avatar");
        if (avatarImg) {
          avatarImg.addEventListener("error", () => {
            avatarImg.outerHTML = `<div class="avatar-placeholder">No photo</div>`;
          });
        }

        const acceptBtn = card.querySelector(".accept-btn");
        const declineBtn = card.querySelector(".decline-btn");

        acceptBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await acceptRequest(request);
            setMessage("Follow request accepted.", "success");
            await loadFollowRequests();
          } catch (err) {
            console.error("Accept failed:", err);
            setMessage(err?.message || "Could not accept request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        declineBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await declineRequest(request);
            setMessage("Follow request declined.", "success");
            await loadFollowRequests();
          } catch (err) {
            console.error("Decline failed:", err);
            setMessage(err?.message || "Could not decline request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        list.appendChild(card);
      });
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        loadFollowRequests().catch(err => {
          console.error("Refresh failed:", err);
        });
      }, 350);
    }

    function startRequestsRealtime() {
      if (requestsChannel) {
        try {
          supabase.removeChannel(requestsChannel);
        } catch {}
      }

      requestsChannel = supabase
        .channel(`follow-requests-live-${currentUser.id}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "follow_requests" },
          () => scheduleRefresh()
        )
        .subscribe();
    }

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      try {
        const myProfile = await loadMergedProfile(currentUser.id);
        myName = myProfile.displayName || currentUser.user_metadata?.display_name || "Someone";

        await loadFollowRequests();
        startRequestsRealtime();
      } catch (err) {
        console.error("Follow requests load failed:", err);
        loading.textContent = "Could not load follow requests.";
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      if (requestsChannel) {
        try {
          supabase.removeChannel(requestsChannel);
        } catch {}
      }
    });

    initPage();

    /*
      SUPABASE NEEDS FOR THIS PAGE:

      TABLES:
      - users: select
      - public_profiles: select
      - follow_requests: select, delete, realtime
      - follows: select, insert
      - notifications: insert

      IMPORTANT COLUMNS:
      follow_requests:
      - id
      - requester_id
      - target_id
      - created_at

      follows:
      - id
      - follower_id
      - following_id
      - created_at

      notifications:
      - id
      - type
      - title
      - text
      - from_user_id
      - to_user_id
      - created_at
      - is_read

      SHARE BUTTON:
      - Not needed on this page because it does not display post cards.
    */
  </script>
</body>
</html>
