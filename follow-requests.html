<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Follow Requests</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --red:#e74c66;
      --yellow:#d59617;
      --purple:#7f63ff;
      --nav-bg:rgba(255,255,255,.98);
      --topbar-bg:rgba(255,255,255,.94);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.045);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --nav-bg:rgba(9,15,31,.98);
      --topbar-bg:rgba(9,15,31,.92);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    body{
      background:
        radial-gradient(circle at 14% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 84% 10%, rgba(167,139,250,.06), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .top-icon-btn svg{width:17px;height:17px;display:block}

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
    }

    .compact-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:6px;
    }

    .compact-title{
      font-size:14px;
      font-weight:950;
      line-height:1.2;
      margin-bottom:2px;
      letter-spacing:-.01em;
    }

    .compact-sub{
      color:var(--muted);
      font-size:10.5px;
      line-height:1.38;
    }

    .chip-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      margin-top:7px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 5px;
      border-radius:10px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      min-height:27px;
      white-space:nowrap;
      line-height:1;
      text-align:center;
    }

    .chip-blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.20)}
    .chip-purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.20)}
    .chip-yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}

    .quick-actions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      margin-top:6px;
    }

    .quick-btn{
      border:none;
      border-radius:10px;
      padding:7px 7px;
      font-size:10.5px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:32px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      line-height:1;
      white-space:nowrap;
    }

    .quick-btn.primary{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.20);
    }

    .loading,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:18px 10px;
      background:var(--surface-2);
      border-radius:13px;
      border:1px dashed var(--line);
      line-height:1.5;
      font-size:12.5px;
    }

    .message{
      min-height:0;
      font-size:11px;
      margin-top:6px;
      line-height:1.35;
      color:var(--muted);
    }

    .message:not(:empty){min-height:15px}
    .success{color:#16a34a}
    .error{color:#e11d48}
    html[data-theme="dark"] .success{color:#9cf0bf}
    html[data-theme="dark"] .error{color:#ffb3bd}

    .list{display:grid;gap:7px}

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      box-shadow:var(--soft-shadow);
    }

    .card-top{
      display:flex;
      gap:9px;
      align-items:flex-start;
    }

    .avatar,
    .avatar-placeholder{
      width:44px;
      height:44px;
      border-radius:14px;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .avatar{object-fit:cover}

    .avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      color:var(--muted);
      font-size:8.5px;
      line-height:1.15;
      font-weight:900;
    }

    .body{flex:1;min-width:0}

    .name-row{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:nowrap;
      margin-bottom:1px;
      min-width:0;
    }

    .name{
      font-size:12.8px;
      font-weight:950;
      line-height:1.2;
      min-width:0;
    }

    .name a{
      color:var(--text);
      text-decoration:none;
      display:block;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .name a:hover{text-decoration:underline}

    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:16px;
      height:16px;
      border-radius:999px;
      background:#20c76f;
      color:#fff;
      border:1.5px solid rgba(255,255,255,.90);
      box-shadow:0 0 0 2px rgba(32,199,111,.14);
      flex-shrink:0;
    }

    .verified-dot svg{
      width:9.5px;
      height:9.5px;
      display:block;
      stroke-width:3;
    }

    .username{
      color:var(--blue);
      font-size:10.5px;
      font-weight:900;
      margin-bottom:5px;
      word-break:break-word;
      line-height:1.2;
    }

    .meta-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }

    .meta-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      line-height:1;
      min-height:20px;
    }

    .meta-blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .meta-purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.20)}

    .bio{
      color:var(--text);
      line-height:1.45;
      font-size:11.5px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:7px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:5px;
    }

    .accept-btn,
    .decline-btn,
    .view-btn{
      border:none;
      border-radius:10px;
      padding:7px 7px;
      font-size:10.5px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:31px;
      color:var(--text);
      line-height:1;
      white-space:nowrap;
    }

    .accept-btn{
      background:rgba(61,220,132,.13);
      border:1px solid rgba(61,220,132,.20);
    }

    .decline-btn{
      background:rgba(255,93,115,.13);
      border:1px solid rgba(255,93,115,.20);
    }

    .view-btn{
      background:rgba(76,201,255,.13);
      border:1px solid rgba(76,201,255,.20);
    }

    .accept-btn:disabled,
    .decline-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{width:17px;height:17px;display:block}

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media(max-width:700px){
      body{padding:6px 6px 82px}

      .topbar{
        grid-template-columns:34px 1fr 34px;
        border-radius:14px;
        margin-bottom:6px;
      }

      .brand{font-size:15.5px}

      .panel{
        padding:7px;
        border-radius:15px;
        margin-bottom:6px;
      }

      .chip-row{
        grid-template-columns:1fr;
      }

      .quick-actions{
        grid-template-columns:repeat(3,1fr);
      }

      .quick-btn{
        font-size:10px;
        padding:7px 4px;
        min-height:30px;
      }

      .card{
        border-radius:13px;
        padding:8px;
      }

      .card-top{
        gap:8px;
      }

      .avatar,
      .avatar-placeholder{
        width:42px;
        height:42px;
        border-radius:13px;
      }

      .actions{
        grid-template-columns:1fr 1fr 1fr;
        gap:4px;
      }

      .accept-btn,
      .decline-btn,
      .view-btn{
        font-size:10px;
        padding:7px 4px;
        min-height:30px;
      }

      .bottom-nav{
        padding:5px;
        gap:4px;
      }

      .nav-link{
        font-size:9.2px;
        padding:5px 2px;
        min-height:41px;
      }

      .nav-badge{right:8px}
    }

    @media(max-width:390px){
      .quick-actions,
      .actions{
        grid-template-columns:1fr;
      }

      .quick-btn,
      .accept-btn,
      .decline-btn,
      .view-btn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Follow requests</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="compact-head">
        <div>
          <div class="compact-title">Pending Follow Requests</div>
          <div class="compact-sub">Accept or decline people who want to follow your private profile.</div>
        </div>
      </div>

      <div class="chip-row">
        <span class="chip chip-blue">Private access</span>
        <span class="chip chip-green">Approve instantly</span>
        <span id="countChip" class="chip chip-purple">Requests: 0</span>
      </div>

      <div class="quick-actions">
        <a href="profile.html" class="quick-btn">My Profile</a>
        <a href="settings.html" class="quick-btn">Settings</a>
        <a href="feed.html" class="quick-btn primary">Feed</a>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading follow requests...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No pending follow requests.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const pageMessage = document.getElementById("pageMessage");
    const countChip = document.getElementById("countChip");
    const inboxBadge = document.getElementById("inboxBadge");

    let currentUser = null;
    let myName = "Someone";
    let requestsChannel = null;
    let refreshTimer = null;

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", resolveTheme(getStoredTheme()));
    }

    applyTheme();

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme();
      });
    }

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
      if (
        e.key === "ownspace_badges_refresh" ||
        e.key === "ownspace_inbox_refresh" ||
        e.key === "ownspace_chat_read_refresh"
      ) {
        loadInboxBadge().catch(() => {});
      }
    });

    window.addEventListener("ownspace:badges-refresh", () => loadInboxBadge().catch(() => {}));
    window.addEventListener("ownspace:inbox-refresh", () => loadInboxBadge().catch(() => {}));
    window.addEventListener("ownspace:chat-read-refresh", () => loadInboxBadge().catch(() => {}));

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "profile.html";
    });

    function setMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function announceRefresh() {
      try {
        localStorage.setItem("ownspace_badges_refresh", String(Date.now()));
        localStorage.setItem("ownspace_notifications_refresh", String(Date.now()));
      } catch {}

      try { window.dispatchEvent(new CustomEvent("ownspace:badges-refresh")); } catch {}
      try { window.dispatchEvent(new CustomEvent("ownspace:notifications-refresh")); } catch {}
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function isMissingSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("does not exist") ||
        msg.includes("not found in the schema cache") ||
        msg.includes("could not find the table") ||
        msg.includes("could not find") ||
        msg.includes("column")
      );
    }

    function formatDate(value) {
      if (!value) return "Just now";

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().toLocaleString();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return new Date(value.seconds * 1000).toLocaleString();
        }
      } catch {}

      try {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "Just now";

        const diff = Date.now() - d.getTime();
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if (diff < minute) return "Now";
        if (diff < hour) return `${Math.floor(diff / minute)}m ago`;
        if (diff < day) return `${Math.floor(diff / hour)}h ago`;
        if (diff < day * 7) return `${Math.floor(diff / day)}d ago`;

        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      } catch {
        return "Just now";
      }
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: getField(d, ["uid", "id", "user_id", "userId"]) || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "user_name", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin)
      };
    }

    function normalizeRequest(raw) {
      const d = raw || {};
      const status = String(d.status || d.request_status || d.requestStatus || "pending").toLowerCase();

      return {
        id: getField(d, ["id"]),
        requesterId: getField(d, ["requester_id", "requesterId", "from_user_id", "fromUserId", "from_uid", "fromUid", "follower_id", "followerId"]),
        targetId: getField(d, ["target_id", "targetId", "to_user_id", "toUserId", "to_uid", "toUid", "following_id", "followingId"]),
        status,
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadMergedProfile(uid) {
      if (!uid) return normalizeProfile({}, "");

      try {
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);

        return normalizeProfile({
          ...(publicRow || {}),
          ...(userRow || {}),
          uid
        }, uid);
      } catch {
        return normalizeProfile({ uid }, uid);
      }
    }

    async function insertWithFallback(table, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        try {
          const { data, error } = await supabase
            .from(table)
            .insert(payload)
            .select()
            .maybeSingle();

          if (!error) return data || null;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase
          .from(table)
          .select("id", { count: "exact", head: true });

        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q =>
          q.eq(targetColumn, uid)
        );

        if (countWithoutStatus !== null) return countWithoutStatus;
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads, error: threadError } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (!threadError && Array.isArray(threads) && threads.length) {
          const threadIds = threads.map(t => t.id).filter(Boolean);

          if (threadIds.length) {
            const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

            for (const field of seenFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .is(field, null);

                if (!error) return count || 0;
              } catch {}
            }

            const boolFields = ["is_read", "read"];

            for (const field of boolFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .eq(field, false);

                if (!error) return count || 0;
              } catch {}
            }
          }
        }
      } catch {}

      const receiverColumns = ["receiver_id", "recipient_id", "to_user_id", "target_id", "receiverId", "recipientId", "toUserId"];
      const seenColumns = ["seen_at", "read_at", "seenAt", "readAt"];

      for (const receiverColumn of receiverColumns) {
        for (const seenColumn of seenColumns) {
          const count = await countRows("chat_messages", q =>
            q.eq(receiverColumn, uid).neq("sender_id", uid).is(seenColumn, null)
          );

          if (count !== null) return count;
        }

        const unreadBoolCount = await countRows("chat_messages", q =>
          q.eq(receiverColumn, uid).neq("sender_id", uid).eq("is_read", false)
        );

        if (unreadBoolCount !== null) return unreadBoolCount;

        const readBoolCount = await countRows("chat_messages", q =>
          q.eq(receiverColumn, uid).neq("sender_id", uid).eq("read", false)
        );

        if (readBoolCount !== null) return readBoolCount;
      }

      return 0;
    }

    async function loadInboxBadge() {
      if (!currentUser || !inboxBadge) return;

      try {
        const [pendingRequests, unreadChats] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(pendingRequests || 0) + Number(unreadChats || 0);

        if (total > 0) {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        } else {
          inboxBadge.textContent = "0";
          inboxBadge.classList.add("hidden");
        }
      } catch {
        inboxBadge.textContent = "0";
        inboxBadge.classList.add("hidden");
      }
    }

    async function sendNotificationSafe(toUserId, payload = {}) {
      if (!toUserId || toUserId === currentUser?.id) return;

      const snakePayload = {
        type: payload.type || "notification",
        title: payload.title || "",
        text: payload.text || "",
        from_user_id: payload.from_user_id || payload.fromUserId || currentUser?.id || "",
        to_user_id: toUserId,
        user_id: toUserId,
        created_at: nowIso(),
        is_read: false,
        read: false
      };

      const camelPayload = {
        type: payload.type || "notification",
        title: payload.title || "",
        text: payload.text || "",
        fromUserId: payload.from_user_id || payload.fromUserId || currentUser?.id || "",
        toUserId: toUserId,
        userId: toUserId,
        createdAt: nowIso(),
        isRead: false,
        read: false
      };

      try {
        await insertWithFallback("notifications", [
          snakePayload,
          camelPayload,
          {
            type: snakePayload.type,
            text: snakePayload.text,
            to_user_id: toUserId,
            user_id: toUserId,
            created_at: nowIso(),
            is_read: false
          }
        ]);
      } catch (err) {
        console.warn("Notification failed:", err?.message || err);
      }
    }

    async function loadFollowRequests() {
      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");
      list.innerHTML = "";

      let rows = [];
      let loaded = false;
      let lastError = null;

      const targetColumns = ["target_id", "targetId", "to_user_id", "toUserId", "to_uid", "toUid", "following_id", "followingId"];

      for (const column of targetColumns) {
        try {
          const { data, error } = await supabase
            .from("follow_requests")
            .select("*")
            .eq(column, currentUser.id);

          if (!error) {
            rows = data || [];
            loaded = true;
            break;
          }

          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      if (!loaded && lastError) {
        console.error("Load requests failed:", lastError);
        loading.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = "Could not load follow requests.";
        countChip.textContent = "Requests: 0";
        return;
      }

      const requests = rows
        .map(normalizeRequest)
        .filter(r => {
          if (!r.requesterId || r.targetId !== currentUser.id) return false;
          return !r.status || r.status === "pending" || r.status === "requested";
        })
        .sort((a, b) => {
          const aTime = new Date(a.createdAt || 0).getTime() || 0;
          const bTime = new Date(b.createdAt || 0).getTime() || 0;
          return bTime - aTime;
        });

      countChip.textContent = `Requests: ${requests.length}`;

      await renderRequests(requests);
      await loadInboxBadge();
    }

    async function deleteAllMatchingRequests(requesterId, targetId) {
      const variants = [
        { requesterCol: "requester_id", targetCol: "target_id" },
        { requesterCol: "requesterId", targetCol: "targetId" },
        { requesterCol: "from_user_id", targetCol: "to_user_id" },
        { requesterCol: "fromUserId", targetCol: "toUserId" },
        { requesterCol: "from_uid", targetCol: "to_uid" },
        { requesterCol: "fromUid", targetCol: "toUid" },
        { requesterCol: "follower_id", targetCol: "following_id" },
        { requesterCol: "followerId", targetCol: "followingId" }
      ];

      let deletedAny = false;
      let lastError = null;

      for (const v of variants) {
        try {
          const { error } = await supabase
            .from("follow_requests")
            .delete()
            .eq(v.requesterCol, requesterId)
            .eq(v.targetCol, targetId);

          if (!error) {
            deletedAny = true;
          } else {
            lastError = error;
          }
        } catch (err) {
          lastError = err;
        }
      }

      if (!deletedAny && lastError && !isMissingSchemaError(lastError)) throw lastError;
    }

    async function findExistingFollow(requesterId, targetId) {
      const variants = [
        { followerCol: "follower_id", followingCol: "following_id" },
        { followerCol: "followerId", followingCol: "followingId" }
      ];

      for (const v of variants) {
        try {
          const { data, error } = await supabase
            .from("follows")
            .select("*")
            .eq(v.followerCol, requesterId)
            .eq(v.followingCol, targetId)
            .limit(1);

          if (!error && data && data.length) return data[0];
        } catch {}
      }

      return null;
    }

    async function acceptRequest(request) {
      const requesterId = request.requesterId;
      const targetId = request.targetId;

      if (!requesterId || !targetId) {
        throw new Error("Invalid follow request.");
      }

      const existingFollow = await findExistingFollow(requesterId, targetId);

      if (!existingFollow) {
        await insertWithFallback("follows", [
          {
            follower_id: requesterId,
            following_id: targetId,
            created_at: nowIso()
          },
          {
            followerId: requesterId,
            followingId: targetId,
            createdAt: nowIso()
          }
        ]);
      }

      await sendNotificationSafe(requesterId, {
        type: "follow_accept",
        title: "Follow request accepted",
        text: `${myName} accepted your follow request.`,
        from_user_id: targetId,
        to_user_id: requesterId
      });

      await deleteAllMatchingRequests(requesterId, targetId);
      announceRefresh();
    }

    async function declineRequest(request) {
      const requesterId = request.requesterId;
      const targetId = request.targetId;

      if (!requesterId || !targetId) {
        throw new Error("Invalid follow request.");
      }

      await deleteAllMatchingRequests(requesterId, targetId);
      announceRefresh();
    }

    async function renderRequests(requests) {
      loading.classList.add("hidden");
      list.innerHTML = "";

      if (!requests.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = "No pending follow requests.";
        return;
      }

      const requesterIds = [...new Set(requests.map(r => r.requesterId).filter(Boolean))];

      const profileEntries = await Promise.all(
        requesterIds.map(async (uid) => {
          const profile = await loadMergedProfile(uid);
          return [uid, profile];
        })
      );

      const profilesMap = new Map(profileEntries);

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      requests.forEach((request) => {
        const profile = profilesMap.get(request.requesterId) || {};
        const displayName = profile.displayName || "Member";
        const username = profile.username || "";
        const bio = profile.bio?.trim() ? profile.bio : "No bio added yet.";
        const photoURL = profile.photoURL || "";
        const verified = !!profile.verified;

        if (profile.softDeleted || profile.isHiddenByAdmin || profile.moderationStatus === "banned") {
          return;
        }

        const card = document.createElement("div");
        card.className = "card";

        const avatarHtml = photoURL
          ? `<img class="avatar" src="${escapeHtml(photoURL)}" alt="Profile Photo">`
          : `<div class="avatar-placeholder">No photo</div>`;

        const verifiedHtml = verified
          ? `
            <span class="verified-dot" title="Verified">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </span>
          `
          : "";

        card.innerHTML = `
          <div class="card-top">
            ${avatarHtml}
            <div class="body">
              <div class="name-row">
                <div class="name">
                  <a href="member.html?uid=${encodeURIComponent(request.requesterId)}">${escapeHtml(displayName)}</a>
                </div>
                ${verifiedHtml}
              </div>

              ${username ? `<div class="username">@${escapeHtml(username)}</div>` : ""}

              <div class="meta-row">
                <span class="meta-badge meta-purple">Requested</span>
                <span class="meta-badge meta-blue">${escapeHtml(formatDate(request.createdAt))}</span>
              </div>

              <div class="bio">${escapeHtml(bio)}</div>

              <div class="actions">
                <a class="view-btn" href="member.html?uid=${encodeURIComponent(request.requesterId)}">View</a>
                <button class="accept-btn" data-id="${escapeHtml(request.id)}" type="button">Accept</button>
                <button class="decline-btn" data-id="${escapeHtml(request.id)}" type="button">Decline</button>
              </div>
            </div>
          </div>
        `;

        const avatarImg = card.querySelector(".avatar");
        if (avatarImg) {
          avatarImg.addEventListener("error", () => {
            avatarImg.outerHTML = `<div class="avatar-placeholder">No photo</div>`;
          });
        }

        const acceptBtn = card.querySelector(".accept-btn");
        const declineBtn = card.querySelector(".decline-btn");

        acceptBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await acceptRequest(request);
            setMessage("Follow request accepted.", "success");
            await loadFollowRequests();
          } catch (err) {
            console.error("Accept failed:", err);
            setMessage(err?.message || "Could not accept request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        declineBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await declineRequest(request);
            setMessage("Follow request declined.", "success");
            await loadFollowRequests();
          } catch (err) {
            console.error("Decline failed:", err);
            setMessage(err?.message || "Could not decline request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        list.appendChild(card);
      });

      if (!list.children.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent = "No pending follow requests.";
      }
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        loadFollowRequests().catch(err => {
          console.error("Refresh failed:", err);
        });
      }, 350);
    }

    function startRequestsRealtime() {
      if (requestsChannel) {
        try {
          supabase.removeChannel(requestsChannel);
        } catch {}
      }

      requestsChannel = supabase
        .channel(`follow-requests-live-${currentUser.id}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "follow_requests" },
          () => scheduleRefresh()
        )
        .subscribe();
    }

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      try {
        const myProfile = await loadMergedProfile(currentUser.id);
        myName = myProfile.displayName || currentUser.user_metadata?.display_name || "Someone";

        await loadFollowRequests();
        startRequestsRealtime();
      } catch (err) {
        console.error("Follow requests load failed:", err);
        loading.textContent = "Could not load follow requests.";
        countChip.textContent = "Requests: 0";
        await loadInboxBadge();
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("pageshow", () => {
      if (currentUser) loadInboxBadge().catch(() => {});
    });

    window.addEventListener("focus", () => {
      if (currentUser) loadInboxBadge().catch(() => {});
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && currentUser) loadInboxBadge().catch(() => {});
    });

    window.addEventListener("beforeunload", () => {
      clearTimeout(refreshTimer);

      if (requestsChannel) {
        try {
          supabase.removeChannel(requestsChannel);
        } catch {}
      }
    });

    initPage();

    /*
      OWNSPACE FOLLOW REQUESTS COMPACT PREMIUM UPDATE:

      UI:
      - Default theme changed to light.
      - Slimmed topbar, panels, chips, cards, buttons, and bottom nav.
      - Verified badge made smaller and cleaner.
      - Follow request cards now feel closer to the compact Inbox/Notifications style.
      - Reduced large empty spacing and heavy dark-page feel.

      FIXED:
      - Theme fallback no longer defaults to dark.
      - System theme detection now uses prefers-color-scheme: dark correctly.
      - Success/error colors work properly in light and dark mode.
      - After accept/decline, page announces badge/notification refresh to other OwnSpace pages.

      PRESERVED:
      - Accept inserts follows row and deletes matching request.
      - Decline deletes matching request.
      - Hidden/deleted/banned requester profiles are not displayed.
      - Realtime refresh stays active for follow_requests.
      - Inbox badge counts only pending message_requests + unread chat_messages.
    */
  </script>
</body>
</html>
