<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Follow Requests</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;--card:#121931;--soft:#161f3d;--line:rgba(255,255,255,.08);
      --text:#fff;--muted:#9aa7c7;--blue:#4cc9ff;--green:#3ddc84;--red:#ff5d73;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);min-height:100vh;padding:14px 14px 92px;
    }
    .app{max-width:760px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);border:1px solid rgba(255,255,255,.04);
      border-radius:18px;padding:12px 14px;margin-bottom:14px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    }
    .left-wrap{display:flex;align-items:center;gap:10px;min-width:0}
    .back-btn,.chip-btn{
      border:none;background:var(--soft);color:#fff;border-radius:12px;padding:10px 12px;
      font-size:13px;font-weight:800;cursor:pointer;border:1px solid var(--line);text-decoration:none;display:inline-block;
    }
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    .panel{
      background:rgba(18,25,49,.88);border:1px solid var(--line);border-radius:22px;padding:16px;
      margin-bottom:14px;box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    .section-title{font-size:20px;font-weight:800;margin-bottom:8px}
    .section-note{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:6px}
    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .list{display:grid;gap:12px}
    .card{
      background:#0f1630;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px;
    }
    .card-top{display:flex;gap:12px;align-items:flex-start}
    .avatar{
      width:64px;height:64px;border-radius:18px;object-fit:cover;border:1px solid rgba(255,255,255,.10);
      background:#1b2445;flex-shrink:0;
    }
    .avatar-placeholder{
      width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;
      text-align:center;padding:8px;background:#1b2445;border:1px solid rgba(255,255,255,.10);
      color:var(--muted);font-size:11px;line-height:1.3;flex-shrink:0;
    }
    .body{flex:1;min-width:0}
    .name{font-size:17px;font-weight:800;line-height:1.3;margin-bottom:4px}
    .name a{color:#fff;text-decoration:none}
    .name a:hover{text-decoration:underline}
    .username{color:#8fdfff;font-size:13px;font-weight:700;margin-bottom:6px}
    .meta{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:8px}
    .bio{color:#e8eeff;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word;margin-bottom:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .accept-btn,.decline-btn,.view-btn{
      border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;
    }
    .accept-btn{background:rgba(61,220,132,.14);color:#c9f7dd;border:1px solid rgba(61,220,132,.20)}
    .decline-btn{background:rgba(255,93,115,.14);color:#ffd3d9;border:1px solid rgba(255,93,115,.20)}
    .view-btn{background:rgba(76,201,255,.14);color:#d8f7ff;border:1px solid rgba(76,201,255,.20)}
    .message{min-height:20px;font-size:14px;margin-top:10px}
    .success{color:#9cf0bf}
    .error{color:#ffb3bd}
    .empty-box{
      text-align:center;padding:28px 10px;color:var(--muted);background:#0f1630;border-radius:18px;
      border:1px dashed rgba(255,255,255,.08);
    }
    .hidden{display:none!important}
    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(760px, calc(100% - 20px));
      background:rgba(12,18,35,.92);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px);
      border-radius:20px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    .nav-link{
      text-decoration:none;color:#b9c4e3;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 6px;border-radius:14px;font-size:11px;font-weight:700;min-height:58px;
    }
    .nav-link .icon{font-size:18px;line-height:1}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="left-wrap">
        <button id="backBtn" class="back-btn" type="button">Back</button>
        <div>
          <div class="brand">BareWorld</div>
          <div class="brand-sub">Follow requests</div>
        </div>
      </div>

      <div class="top-actions">
        <a href="profile.html" class="chip-btn">Profile</a>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Pending Follow Requests</div>
      <div class="section-note">Accept or decline people who want to follow your private profile.</div>
      <div id="pageMessage" class="message"></div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading follow requests...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No pending follow requests.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="events.html" class="nav-link">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      query,
      where,
      getDocs,
      doc,
      getDoc,
      setDoc,
      deleteDoc,
      addDoc,
      serverTimestamp,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const pageMessage = document.getElementById("pageMessage");

    let currentUser = null;
    let myName = "Someone";

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "profile.html";
    });

    function setMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch { return "Just now"; }
    }

    async function sendNotificationSafe(toUserId, payload) {
      try {
        await addDoc(collection(db, "notifications", toUserId, "items"), payload);
      } catch (err) {
        console.warn("Notification failed:", err);
      }
    }

    async function deleteAllMatchingRequests(requesterId, targetId) {
      const q = query(
        collection(db, "follow_requests"),
        where("requesterId", "==", requesterId),
        where("targetId", "==", targetId)
      );

      const snap = await getDocs(q);
      await Promise.all(
        snap.docs.map(d => deleteDoc(doc(db, "follow_requests", d.id)))
      );
    }

    async function acceptRequest(requestDoc) {
      const data = requestDoc.data();
      const followId = `${data.requesterId}__${data.targetId}`;

      const existingFollowSnap = await getDocs(
        query(
          collection(db, "follows"),
          where("followerId", "==", data.requesterId),
          where("followingId", "==", data.targetId),
          limit(1)
        )
      );

      if (existingFollowSnap.empty) {
        await setDoc(doc(db, "follows", followId), {
          followerId: data.requesterId,
          followingId: data.targetId,
          createdAt: serverTimestamp()
        });
      }

      await sendNotificationSafe(data.requesterId, {
        type: "follow_accept",
        title: "Follow request accepted",
        text: `${myName} accepted your follow request.`,
        fromUserId: data.targetId,
        toUserId: data.requesterId,
        createdAt: serverTimestamp(),
        isRead: false
      });

      await deleteAllMatchingRequests(data.requesterId, data.targetId);
    }

    async function declineRequest(requestDoc) {
      const data = requestDoc.data();
      await deleteAllMatchingRequests(data.requesterId, data.targetId);
    }

    async function loadRequests() {
      const q = query(
        collection(db, "follow_requests"),
        where("targetId", "==", currentUser.uid)
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        loading.classList.add("hidden");
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        return;
      }

      const requesterIds = [...new Set(snap.docs.map(d => d.data().requesterId))];

      const profileEntries = await Promise.all(
        requesterIds.map(async (uid) => {
          try {
            const p = await getDoc(doc(db, "publicProfiles", uid));
            if (p.exists()) return [uid, p.data()];
          } catch {}
          return [uid, null];
        })
      );

      const profilesMap = new Map(profileEntries);

      loading.classList.add("hidden");
      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");
      list.innerHTML = "";

      snap.docs.forEach((requestDoc) => {
        const data = requestDoc.data();
        const profile = profilesMap.get(data.requesterId) || {};
        const displayName = profile?.displayName || "Member";
        const username = profile?.username || "";
        const bio = profile?.bio?.trim() ? profile.bio : "No bio added yet.";
        const photoURL = profile?.photoURL || "";

        const card = document.createElement("div");
        card.className = "card";

        const avatarHtml = photoURL
          ? `<img class="avatar" src="${escapeHtml(photoURL)}" alt="Profile Photo">`
          : `<div class="avatar-placeholder">No photo</div>`;

        card.innerHTML = `
          <div class="card-top">
            ${avatarHtml}
            <div class="body">
              <div class="name">
                <a href="member.html?uid=${encodeURIComponent(data.requesterId)}">
                  ${escapeHtml(displayName)}
                </a>
              </div>
              ${username ? `<div class="username">@${escapeHtml(username)}</div>` : ""}
              <div class="meta">Requested: ${escapeHtml(formatDate(data.createdAt))}</div>
              <div class="bio">${escapeHtml(bio)}</div>

              <div class="actions">
                <a class="view-btn" href="member.html?uid=${encodeURIComponent(data.requesterId)}">View Profile</a>
                <button class="accept-btn" data-id="${requestDoc.id}">Accept</button>
                <button class="decline-btn" data-id="${requestDoc.id}">Decline</button>
              </div>
            </div>
          </div>
        `;

        const avatarImg = card.querySelector(".avatar");
        if (avatarImg) {
          avatarImg.addEventListener("error", () => {
            avatarImg.outerHTML = `<div class="avatar-placeholder">No photo</div>`;
          });
        }

        const acceptBtn = card.querySelector(".accept-btn");
        const declineBtn = card.querySelector(".decline-btn");

        acceptBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await acceptRequest(requestDoc);
            card.remove();
            setMessage("Follow request accepted.", "success");

            if (!list.children.length) {
              list.classList.add("hidden");
              emptyBox.classList.remove("hidden");
            }
          } catch (err) {
            console.error("Accept failed:", err);
            setMessage(err?.message || "Could not accept request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        declineBtn.addEventListener("click", async () => {
          acceptBtn.disabled = true;
          declineBtn.disabled = true;
          setMessage("");

          try {
            await declineRequest(requestDoc);
            card.remove();
            setMessage("Follow request declined.", "success");

            if (!list.children.length) {
              list.classList.add("hidden");
              emptyBox.classList.remove("hidden");
            }
          } catch (err) {
            console.error("Decline failed:", err);
            setMessage(err?.message || "Could not decline request.", "error");
            acceptBtn.disabled = false;
            declineBtn.disabled = false;
          }
        });

        list.appendChild(card);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const myPublic = await getDoc(doc(db, "publicProfiles", user.uid));
        myName = myPublic.exists()
          ? (myPublic.data().displayName || "Someone")
          : (user.displayName || "Someone");

        await loadRequests();
      } catch (err) {
        console.error("Follow requests load failed:", err);
        loading.textContent = "Could not load follow requests.";
      }
    });
  </script>
</body>
</html>
