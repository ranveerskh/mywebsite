<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Member</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 112px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:20px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .loading-box,.empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      line-height:1.6;
    }

    .profile-head{
      display:grid;
      grid-template-columns:86px 1fr;
      gap:14px;
      align-items:start;
    }

    .avatar,.avatar-placeholder{
      width:86px;
      height:86px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--surface-2);
      flex-shrink:0;
    }

    .avatar{object-fit:cover}

    .avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      font-size:12px;
      padding:8px;
      line-height:1.3;
    }

    .name-line{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:3px;
    }

    .display-name{
      font-size:24px;
      font-weight:900;
      line-height:1.15;
      word-break:break-word;
    }

    .verified-dot{
      width:20px;
      height:20px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:11px;
      font-weight:900;
    }

    .username{
      color:var(--blue);
      font-size:13px;
      font-weight:800;
      margin-bottom:8px;
      word-break:break-word;
    }

    .bio{
      color:var(--text);
      font-size:14px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }

    .link-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:10px;
    }

    .bio-link{
      color:var(--text);
      text-decoration:none;
      font-size:12px;
      font-weight:800;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(76,201,255,.20);
      background:rgba(76,201,255,.12);
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin:12px 0;
    }

    .stat{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 8px;
      text-align:center;
      cursor:pointer;
      text-decoration:none;
      color:var(--text);
    }

    .stat strong{
      display:block;
      font-size:18px;
      line-height:1.1;
    }

    .stat span{
      display:block;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      margin-top:4px;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:10px 0;
    }

    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }

    .badge-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .badge-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .badge-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .badge-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}
    .badge-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .action-btn{
      border:none;
      border-radius:13px;
      padding:11px 13px;
      font-size:13px;
      font-weight:900;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:42px;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      flex:1;
    }

    .btn-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .action-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:2px;
    }

    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 13px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      cursor:pointer;
    }

    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .list{
      display:grid;
      gap:12px;
    }

    .post-card,.info-card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      overflow:hidden;
    }

    .post-img{
      width:100%;
      max-height:520px;
      object-fit:cover;
      display:block;
      border-radius:16px;
      border:1px solid var(--line);
      background:var(--surface-3);
      margin-bottom:10px;
    }

    .post-caption,.desc{
      color:var(--text);
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:10px;
    }

    .mini-meta{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      margin-bottom:8px;
    }

    .card-title{
      font-size:16px;
      font-weight:900;
      line-height:1.4;
      margin-bottom:6px;
    }

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .mini-btn{
      border:none;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 11px;
      font-size:12px;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
      min-height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .share-btn{margin-left:auto}

    .show-more{
      margin-top:12px;
      width:100%;
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      font-weight:900;
      color:var(--text);
      background:rgba(76,201,255,.14);
      border:1px solid rgba(76,201,255,.22);
      cursor:pointer;
    }

    .message-line{
      margin-top:10px;
      min-height:20px;
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }

    .success{color:#9cf0bf}
    .error{color:#ffb3bd}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media(max-width:700px){
      body{padding:10px 10px 112px}
      .brand{font-size:18px}
      .profile-head{grid-template-columns:72px 1fr;gap:12px}
      .avatar,.avatar-placeholder{width:72px;height:72px}
      .display-name{font-size:21px}
      .stats{gap:6px}
      .action-row .action-btn{flex:1 1 calc(50% - 8px)}
      .share-btn{margin-left:0}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Member profile</div>
      </div>

      <a href="search.html" class="top-icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </a>
    </div>

    <div id="loadingPanel" class="panel">
      <div class="loading-box">Loading member...</div>
    </div>

    <div id="profilePanel" class="panel hidden">
      <div class="profile-head">
        <img id="avatar" class="avatar hidden" alt="Profile photo" />
        <div id="avatarPlaceholder" class="avatar-placeholder">No photo</div>

        <div>
          <div class="name-line">
            <div id="displayName" class="display-name">Member</div>
            <span id="verifiedDot" class="verified-dot hidden">✓</span>
          </div>

          <div id="username" class="username hidden">@username</div>
          <div id="bio" class="bio">No bio added yet.</div>

          <div id="linksRow" class="link-row hidden"></div>

          <div class="badge-row">
            <span id="privacyBadge" class="badge badge-blue">Public</span>
            <span id="followStateBadge" class="badge badge-purple hidden">Following</span>
            <span id="moderationBadge" class="badge badge-red hidden">Restricted</span>
          </div>
        </div>
      </div>

      <div class="stats">
        <a id="followersStat" href="#" class="stat">
          <strong id="followersCount">0</strong>
          <span>Followers</span>
        </a>
        <a id="followingStat" href="#" class="stat">
          <strong id="followingCount">0</strong>
          <span>Following</span>
        </a>
        <div class="stat">
          <strong id="postsCount">0</strong>
          <span>Posts</span>
        </div>
      </div>

      <div class="action-row">
        <button id="followBtn" class="action-btn btn-blue" type="button">Follow</button>
        <button id="messageBtn" class="action-btn btn-green" type="button">Message</button>
        <button id="reportBtn" class="action-btn btn-red" type="button">Report</button>
      </div>

      <div id="profileMessage" class="message-line"></div>
    </div>

    <div id="privatePanel" class="panel hidden">
      <div class="empty-box">
        This profile is private. Follow this member to see posts, photos, events and places.
      </div>
    </div>

    <div id="tabsPanel" class="panel hidden">
      <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
        <button class="tab-btn" data-tab="photos">Photos</button>
        <button class="tab-btn" data-tab="events">Events</button>
        <button class="tab-btn" data-tab="places">Places</button>
      </div>
    </div>

    <div id="contentPanel" class="panel hidden">
      <div id="contentList" class="list"></div>
      <button id="showMoreBtn" class="show-more hidden" type="button">Show More</button>
      <div id="contentEmpty" class="empty-box hidden">Nothing to show yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5"></path>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");

    const loadingPanel = document.getElementById("loadingPanel");
    const profilePanel = document.getElementById("profilePanel");
    const privatePanel = document.getElementById("privatePanel");
    const tabsPanel = document.getElementById("tabsPanel");
    const contentPanel = document.getElementById("contentPanel");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const displayNameEl = document.getElementById("displayName");
    const verifiedDot = document.getElementById("verifiedDot");
    const usernameEl = document.getElementById("username");
    const bioEl = document.getElementById("bio");
    const linksRow = document.getElementById("linksRow");

    const privacyBadge = document.getElementById("privacyBadge");
    const followStateBadge = document.getElementById("followStateBadge");
    const moderationBadge = document.getElementById("moderationBadge");

    const followersCount = document.getElementById("followersCount");
    const followingCount = document.getElementById("followingCount");
    const postsCount = document.getElementById("postsCount");

    const followBtn = document.getElementById("followBtn");
    const messageBtn = document.getElementById("messageBtn");
    const reportBtn = document.getElementById("reportBtn");
    const profileMessage = document.getElementById("profileMessage");

    const contentList = document.getElementById("contentList");
    const contentEmpty = document.getElementById("contentEmpty");
    const showMoreBtn = document.getElementById("showMoreBtn");

    const inboxBadge = document.getElementById("inboxBadge");

    let currentUser = null;
    let targetUid = "";
    let targetProfile = null;
    let viewerProfile = null;

    let isFollowing = false;
    let hasPendingRequest = false;
    let activeTab = "dashboard";
    let visibleLimit = 10;

    let postsData = [];
    let eventsData = [];
    let placesData = [];

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "feed.html";
    });

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function setMessage(text, type = "") {
      profileMessage.textContent = text || "";
      profileMessage.className = `message-line ${type}`;
    }

    function isValidUuid(value) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || "").trim());
    }

    function getParamUid() {
      const params = new URLSearchParams(window.location.search);
      return (
        params.get("uid") ||
        params.get("userId") ||
        params.get("id") ||
        ""
      ).trim();
    }

    function normalizeUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return value;
        }
      }
      return fallback;
    }

    function getBool(raw, names, fallback = false) {
      for (const name of names) {
        if (raw?.[name] !== undefined && raw?.[name] !== null) return !!raw[name];
      }
      return fallback;
    }

    function normalizeProfile(raw = {}, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: String(getField(d, ["uid", "id", "user_id", "userId"], fallbackUid) || fallbackUid || ""),
        displayName: String(getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"], "Member") || "Member"),
        username: String(getField(d, ["username", "handle", "user_name", "userName"], "") || ""),
        bio: String(getField(d, ["bio", "about", "description"], "") || ""),
        photoURL: String(getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"], "") || ""),
        link1: String(getField(d, ["link1", "website1", "bio_link_1", "bioLink1"], "") || ""),
        link2: String(getField(d, ["link2", "website2", "bio_link_2", "bioLink2"], "") || ""),
        isPrivate: getBool(d, ["is_private", "isPrivate", "private_profile", "privateProfile", "private", "account_private", "accountPrivate"], false),
        isVerified: getBool(d, ["is_verified", "isVerified", "verified"], false),
        moderationStatus: String(getField(d, ["moderation_status", "moderationStatus", "status"], "") || ""),
        isHiddenByAdmin: getBool(d, ["is_hidden_by_admin", "isHiddenByAdmin"], false),
        softDeleted: getBool(d, ["soft_deleted", "softDeleted"], false),
        city: String(getField(d, ["city", "location_city", "locationCity"], "") || "")
      };
    }

    function normalizePost(raw = {}) {
      const d = raw || {};
      return {
        id: String(getField(d, ["id"], "") || ""),
        userId: String(getField(d, ["user_id", "userId", "author_id", "authorId", "owner_id", "ownerId", "uid"], "") || ""),
        caption: String(getField(d, ["caption", "text", "content"], "") || ""),
        imageURL: String(getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"], "") || ""),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        createdAt: d.created_at || d.createdAt || null,
        createdAtMs: getDateMs(d.created_at || d.createdAt)
      };
    }

    function normalizeEvent(raw = {}) {
      const d = raw || {};
      return {
        id: String(getField(d, ["id"], "") || ""),
        creatorId: String(getField(d, ["creator_id", "creatorId", "created_by", "createdBy", "user_id", "userId", "uid"], "") || ""),
        title: String(getField(d, ["title", "name"], "Untitled Event") || "Untitled Event"),
        description: String(getField(d, ["description", "desc"], "") || ""),
        city: String(getField(d, ["city"], "") || ""),
        date: String(getField(d, ["date"], "") || ""),
        time: String(getField(d, ["time"], "") || ""),
        eventAt: d.event_at || d.eventAt || d.start_time || d.startTime || null,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted)
      };
    }

    function normalizePlace(raw = {}, source = "") {
      const d = raw || {};
      return {
        id: String(getField(d, ["id"], "") || ""),
        source,
        createdBy: String(getField(d, ["created_by", "createdBy", "creator_id", "creatorId", "user_id", "userId", "uid"], "") || ""),
        name: String(getField(d, ["name", "title", "place_name", "placeName"], "Unnamed Place") || "Unnamed Place"),
        city: String(getField(d, ["city"], "") || ""),
        category: String(getField(d, ["category", "topic"], "Place") || "Place"),
        description: String(getField(d, ["description", "desc", "notes"], "") || ""),
        approved: d.approved === true || d.verified === true || ["approved","active","verified"].includes(String(d.status || "").toLowerCase()),
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted)
      };
    }

    function getDateMs(value) {
      if (!value) return 0;
      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : 0;
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString();
    }

    function canViewFullProfile() {
      if (!targetProfile) return false;
      if (targetProfile.uid === currentUser.id) return true;
      if (targetProfile.isHiddenByAdmin || targetProfile.softDeleted || targetProfile.moderationStatus === "banned") return false;
      if (!targetProfile.isPrivate) return true;
      return isFollowing;
    }

    async function selectProfile(uid) {
      const [publicRes, userRes] = await Promise.all([
        supabase.from("public_profiles").select("*").eq("uid", uid).maybeSingle(),
        supabase.from("users").select("*").eq("uid", uid).maybeSingle()
      ]);

      if (publicRes.error && publicRes.error.code !== "PGRST116") throw publicRes.error;
      if (userRes.error && userRes.error.code !== "PGRST116") throw userRes.error;

      return normalizeProfile({
        ...(publicRes.data || {}),
        ...(userRes.data || {}),
        uid
      }, uid);
    }

    async function loadProfile() {
      targetUid = getParamUid();

      if (!isValidUuid(targetUid)) {
        loadingPanel.innerHTML = `<div class="empty-box">Invalid or missing member ID.</div>`;
        return;
      }

      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      if (targetUid === currentUser.id) {
        window.location.href = "profile.html";
        return;
      }

      viewerProfile = await selectProfile(currentUser.id);
      targetProfile = await selectProfile(targetUid);

      if (!targetProfile || !targetProfile.uid) {
        loadingPanel.innerHTML = `<div class="empty-box">Member not found.</div>`;
        return;
      }

      await Promise.all([
        checkFollowState(),
        loadCounts(),
        loadContent(),
        loadInboxBadgeCount()
      ]);

      renderProfile();
      renderCurrentTab();

      loadingPanel.classList.add("hidden");
      profilePanel.classList.remove("hidden");

      if (canViewFullProfile()) {
        privatePanel.classList.add("hidden");
        tabsPanel.classList.remove("hidden");
        contentPanel.classList.remove("hidden");
      } else {
        privatePanel.classList.remove("hidden");
        tabsPanel.classList.add("hidden");
        contentPanel.classList.add("hidden");
      }
    }

    async function checkFollowState() {
      const followRes = await supabase
        .from("follows")
        .select("id")
        .eq("follower_id", currentUser.id)
        .eq("following_id", targetUid)
        .maybeSingle();

      isFollowing = !!followRes.data;

      const requestRes = await supabase
        .from("follow_requests")
        .select("id,status")
        .eq("requester_id", currentUser.id)
        .eq("target_id", targetUid)
        .eq("status", "pending")
        .maybeSingle();

      hasPendingRequest = !!requestRes.data;
    }

    async function loadCounts() {
      const [followersRes, followingRes, postsRes] = await Promise.all([
        supabase.from("follows").select("id", { count: "exact", head: true }).eq("following_id", targetUid),
        supabase.from("follows").select("id", { count: "exact", head: true }).eq("follower_id", targetUid),
        supabase.from("posts").select("id", { count: "exact", head: true }).eq("user_id", targetUid).eq("hidden", false)
      ]);

      followersCount.textContent = followersRes.count || 0;
      followingCount.textContent = followingRes.count || 0;
      postsCount.textContent = postsRes.count || 0;
    }

    async function loadContent() {
      const [postsRes, eventsRes] = await Promise.all([
        supabase.from("posts").select("*").eq("user_id", targetUid).order("created_at", { ascending:false }),
        supabase.from("events").select("*").or(`creator_id.eq.${targetUid},created_by.eq.${targetUid},user_id.eq.${targetUid}`)
      ]);

      postsData = (postsRes.data || []).map(normalizePost).filter(p => !p.hidden);
      eventsData = (eventsRes.data || []).map(normalizeEvent).filter(e => !e.hidden);

      const placeSources = ["nearby_places", "places", "nudist_places"];
      const allPlaces = [];

      for (const source of placeSources) {
        try {
          const { data } = await supabase
            .from(source)
            .select("*")
            .eq("created_by", targetUid);

          (data || []).forEach(row => allPlaces.push(normalizePlace(row, source)));
        } catch {}
      }

      placesData = allPlaces.filter(p => !p.hidden);
    }

    function renderProfile() {
      displayNameEl.textContent = targetProfile.displayName || "Member";

      if (targetProfile.isVerified) verifiedDot.classList.remove("hidden");
      else verifiedDot.classList.add("hidden");

      if (targetProfile.username) {
        usernameEl.textContent = "@" + targetProfile.username;
        usernameEl.classList.remove("hidden");
      } else {
        usernameEl.classList.add("hidden");
      }

      bioEl.textContent = targetProfile.bio || "No bio added yet.";

      if (targetProfile.photoURL) {
        avatar.src = targetProfile.photoURL;
        avatar.classList.remove("hidden");
        avatarPlaceholder.classList.add("hidden");
      } else {
        avatar.classList.add("hidden");
        avatarPlaceholder.classList.remove("hidden");
      }

      const profileLinks = [targetProfile.link1, targetProfile.link2].filter(Boolean);
      linksRow.innerHTML = "";

      profileLinks.forEach((link, index) => {
        const a = document.createElement("a");
        a.className = "bio-link";
        a.href = normalizeUrl(link);
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = index === 0 ? "Link 1" : "Link 2";
        linksRow.appendChild(a);
      });

      linksRow.classList.toggle("hidden", !profileLinks.length);

      privacyBadge.textContent = targetProfile.isPrivate ? "Private" : "Public";
      privacyBadge.className = `badge ${targetProfile.isPrivate ? "badge-yellow" : "badge-blue"}`;

      if (isFollowing) {
        followStateBadge.textContent = "Following";
        followStateBadge.className = "badge badge-green";
        followStateBadge.classList.remove("hidden");
      } else if (hasPendingRequest) {
        followStateBadge.textContent = "Requested";
        followStateBadge.className = "badge badge-yellow";
        followStateBadge.classList.remove("hidden");
      } else {
        followStateBadge.classList.add("hidden");
      }

      if (targetProfile.moderationStatus && targetProfile.moderationStatus !== "active") {
        moderationBadge.textContent = targetProfile.moderationStatus;
        moderationBadge.classList.remove("hidden");
      } else {
        moderationBadge.classList.add("hidden");
      }

      if (isFollowing) {
        followBtn.textContent = "Unfollow";
        followBtn.className = "action-btn btn-yellow";
      } else if (hasPendingRequest) {
        followBtn.textContent = "Requested";
        followBtn.className = "action-btn btn-yellow";
      } else if (targetProfile.isPrivate) {
        followBtn.textContent = "Request Follow";
        followBtn.className = "action-btn btn-blue";
      } else {
        followBtn.textContent = "Follow";
        followBtn.className = "action-btn btn-blue";
      }
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    async function handleFollowClick() {
      if (!isValidUuid(targetUid)) {
        setMessage("Invalid member ID.", "error");
        return;
      }

      followBtn.disabled = true;
      setMessage("");

      try {
        if (isFollowing) {
          await supabase
            .from("follows")
            .delete()
            .eq("follower_id", currentUser.id)
            .eq("following_id", targetUid);

          isFollowing = false;
          setMessage("Unfollowed.", "success");
        } else if (hasPendingRequest) {
          const { error } = await supabase
            .from("follow_requests")
            .delete()
            .eq("requester_id", currentUser.id)
            .eq("target_id", targetUid)
            .eq("status", "pending");

          if (error) throw error;

          hasPendingRequest = false;
          setMessage("Follow request cancelled.", "success");
        } else if (targetProfile.isPrivate) {
          const { error } = await supabase
            .from("follow_requests")
            .insert({
              requester_id: currentUser.id,
              target_id: targetUid,
              from_user_id: currentUser.id,
              to_user_id: targetUid,
              status: "pending",
              created_at: new Date().toISOString(),
              updated_at: new Date().toISOString()
            });

          if (error) throw error;

          hasPendingRequest = true;
          setMessage("Follow request sent.", "success");
        } else {
          const { error } = await supabase
            .from("follows")
            .insert({
              follower_id: currentUser.id,
              following_id: targetUid,
              created_at: new Date().toISOString()
            });

          if (error) throw error;

          isFollowing = true;
          setMessage("Following.", "success");
        }

        await Promise.all([checkFollowState(), loadCounts(), loadContent()]);
        renderProfile();
        renderCurrentTab();

        if (canViewFullProfile()) {
          privatePanel.classList.add("hidden");
          tabsPanel.classList.remove("hidden");
          contentPanel.classList.remove("hidden");
        } else {
          privatePanel.classList.remove("hidden");
          tabsPanel.classList.add("hidden");
          contentPanel.classList.add("hidden");
        }
      } catch (err) {
        console.error(err);
        setMessage(err.message || "Follow action failed.", "error");
      }

      followBtn.disabled = false;
    }

    async function handleMessageClick() {
      if (!currentUser) return;

      const cleanTargetUid = String(targetUid || "").trim();

      if (!isValidUuid(cleanTargetUid)) {
        alert("Cannot message this user. Missing user ID.");
        return;
      }

      if (cleanTargetUid === currentUser.id) {
        alert("You cannot message yourself.");
        return;
      }

      messageBtn.disabled = true;
      setMessage("");

      try {
        const { data: existingThreads, error: threadFindError } = await supabase
          .from("chat_threads")
          .select("*")
          .or(
            `and(participant_a.eq.${currentUser.id},participant_b.eq.${cleanTargetUid}),and(participant_a.eq.${cleanTargetUid},participant_b.eq.${currentUser.id})`
          )
          .limit(1);

        if (threadFindError) throw threadFindError;

        if (Array.isArray(existingThreads) && existingThreads.length) {
          window.location.href = `chat.html?threadId=${encodeURIComponent(existingThreads[0].id)}`;
          return;
        }

        const text = prompt("Write your first message request:");

        if (!text || !text.trim()) {
          messageBtn.disabled = false;
          return;
        }

        const { data: existingRequests, error: requestFindError } = await supabase
          .from("message_requests")
          .select("*")
          .eq("requester_id", currentUser.id)
          .eq("target_id", cleanTargetUid)
          .eq("status", "pending")
          .limit(1);

        if (requestFindError) throw requestFindError;

        if (Array.isArray(existingRequests) && existingRequests.length) {
          setMessage("Message request already sent.", "success");
          messageBtn.disabled = false;
          return;
        }

        const { error: requestError } = await supabase
          .from("message_requests")
          .insert({
            requester_id: currentUser.id,
            target_id: cleanTargetUid,
            text: text.trim(),
            status: "pending",
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          });

        if (requestError) throw requestError;

        setMessage("Message request sent.", "success");
      } catch (err) {
        console.error("Message failed:", err);
        alert("Unable to message: " + (err.message || "Unknown error"));
      }

      messageBtn.disabled = false;
    }

    function handleReportClick() {
      if (!isValidUuid(targetUid)) {
        setMessage("Invalid member ID.", "error");
        return;
      }

      window.location.href = `report.html?type=profile&targetId=${encodeURIComponent(targetUid)}&targetUserId=${encodeURIComponent(targetUid)}`;
    }

    async function sharePost(postId) {
      const url = new URL("post.html", window.location.href);
      url.searchParams.set("postId", postId);

      try {
        if (navigator.share) {
          await navigator.share({
            title: "Check this post on BareWorld",
            text: "Check this post on BareWorld",
            url: url.toString()
          });
        } else {
          await navigator.clipboard.writeText(url.toString());
          alert("Post link copied.");
        }
      } catch (err) {
        console.error("Share failed:", err);
      }
    }

    function getCurrentRows() {
      if (activeTab === "dashboard") return postsData;
      if (activeTab === "photos") return postsData.filter(p => p.imageURL);
      if (activeTab === "events") return eventsData;
      if (activeTab === "places") return placesData;
      return [];
    }

    function renderCurrentTab() {
      contentList.innerHTML = "";
      contentEmpty.classList.add("hidden");
      showMoreBtn.classList.add("hidden");

      if (!canViewFullProfile()) return;

      const rows = getCurrentRows();
      const shown = rows.slice(0, visibleLimit);

      if (!shown.length) {
        contentEmpty.textContent =
          activeTab === "photos" ? "No photos yet." :
          activeTab === "events" ? "No events yet." :
          activeTab === "places" ? "No places yet." :
          "No posts yet.";
        contentEmpty.classList.remove("hidden");
        return;
      }

      if (activeTab === "events") {
        shown.forEach(renderEventCard);
      } else if (activeTab === "places") {
        shown.forEach(renderPlaceCard);
      } else {
        shown.forEach(renderPostCard);
      }

      if (rows.length > visibleLimit) {
        showMoreBtn.classList.remove("hidden");
      }
    }

    function renderPostCard(post) {
      const card = document.createElement("div");
      card.className = "post-card";

      card.innerHTML = `
        ${post.imageURL ? `<img class="post-img" src="${escapeHtml(post.imageURL)}" alt="Post image">` : ""}
        <div class="post-caption">${escapeHtml(post.caption || "No caption.")}</div>
        <div class="mini-meta">${post.createdAt ? escapeHtml(formatDate(post.createdAt)) : ""}</div>
        <div class="card-actions">
          <a href="post.html?postId=${encodeURIComponent(post.id)}" class="mini-btn btn-blue">Open</a>
          <button class="mini-btn share-btn btn-green" type="button">Share</button>
          <a href="report.html?type=post&targetId=${encodeURIComponent(post.id)}&targetUserId=${encodeURIComponent(post.userId)}" class="mini-btn btn-red">Report</a>
        </div>
      `;

      const img = card.querySelector(".post-img");
      if (img) {
        img.addEventListener("error", () => {
          img.style.display = "none";
        });
      }

      card.querySelector(".share-btn").addEventListener("click", () => {
        sharePost(post.id);
      });

      contentList.appendChild(card);
    }

    function renderEventCard(event) {
      const card = document.createElement("div");
      card.className = "info-card";

      card.innerHTML = `
        <div class="card-title">${escapeHtml(event.title)}</div>
        <div class="mini-meta">
          ${escapeHtml([event.city, event.date, event.time].filter(Boolean).join(" • ") || "Event")}
        </div>
        <div class="desc">${escapeHtml(event.description || "No description.")}</div>
        <div class="card-actions">
          <a href="nearby-events.html" class="mini-btn btn-blue">Open Events</a>
          <a href="report.html?type=event&targetId=${encodeURIComponent(event.id)}&targetUserId=${encodeURIComponent(event.creatorId)}" class="mini-btn btn-red">Report</a>
        </div>
      `;

      contentList.appendChild(card);
    }

    function renderPlaceCard(place) {
      const card = document.createElement("div");
      card.className = "info-card";

      card.innerHTML = `
        <div class="card-title">${escapeHtml(place.name)}</div>
        <div class="mini-meta">
          ${escapeHtml([place.category, place.city].filter(Boolean).join(" • ") || "Place")}
        </div>
        <div class="desc">${escapeHtml(place.description || "No description.")}</div>
        <div class="card-actions">
          <a href="place.html?placeId=${encodeURIComponent(place.id)}&source=${encodeURIComponent(place.source)}" class="mini-btn btn-blue">Open Place</a>
          <a href="report.html?type=place&targetId=${encodeURIComponent(place.id)}&targetUserId=${encodeURIComponent(place.createdBy)}&source=${encodeURIComponent(place.source)}" class="mini-btn btn-red">Report</a>
        </div>
      `;

      contentList.appendChild(card);
    }

    async function loadInboxBadgeCount() {
      try {
        let unreadTotal = 0;

        const { count: requestCount } = await supabase
          .from("message_requests")
          .select("id", { count: "exact", head: true })
          .eq("target_id", currentUser.id)
          .eq("status", "pending");

        if (requestCount) unreadTotal += requestCount;

        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${currentUser.id},participant_b.eq.${currentUser.id}`);

        if (Array.isArray(threads) && threads.length) {
          const threadIds = threads.map(t => t.id).filter(Boolean);

          if (threadIds.length) {
            const { count: messageCount } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", currentUser.id)
              .is("seen_at", null);

            if (messageCount) unreadTotal += messageCount;
          }
        }

        if (!unreadTotal) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = unreadTotal > 99 ? "99+" : String(unreadTotal);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        visibleLimit = 10;

        document.querySelectorAll(".tab-btn").forEach(b => {
          b.classList.toggle("active", b.dataset.tab === activeTab);
        });

        renderCurrentTab();
      });
    });

    showMoreBtn.addEventListener("click", () => {
      visibleLimit += 10;
      renderCurrentTab();
    });

    followBtn.addEventListener("click", handleFollowClick);
    messageBtn.addEventListener("click", handleMessageClick);
    reportBtn.addEventListener("click", handleReportClick);

    supabase.auth.onAuthStateChange((event, session) => {
      if (!session?.user) {
        window.location.href = "login.html";
      }
    });

    loadProfile().catch(err => {
      console.error(err);
      loadingPanel.innerHTML = `<div class="empty-box">Could not load member profile.<br>${escapeHtml(err.message || "")}</div>`;
    });
  </script>
</body>
</html>
