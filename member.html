<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Member</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .wrap { max-width: 850px; margin: 0 auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .brand { font-size: 30px; font-weight: 800; }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    .btn-back { background: #64748b; color: #fff; }
    .btn-feed { background: #38bdf8; color: #082f49; }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .loading {
      text-align: center;
      color: #cbd5e1;
      padding: 30px 10px;
    }

    .hidden { display: none !important; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
    }

    .avatar-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      color: #94a3b8;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      line-height: 1.4;
    }

    .profile-main h2 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .bio {
      margin-top: 10px;
      color: #e2e8f0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .info-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
    }

    .info-box small {
      display: block;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .info-box span {
      font-weight: 700;
      color: #fff;
      word-break: break-word;
    }

    .private-box, .note-box, .error-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      line-height: 1.6;
    }

    .private-box {
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fde68a;
    }

    .note-box {
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.2);
      color: #dbeafe;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fecaca;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      .profile-header { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">BareWorld</div>
      <div class="top-actions">
        <a href="feed.html" class="btn btn-feed">Back to Feed</a>
        <a href="profile.html" class="btn btn-back">My Profile</a>
      </div>
    </div>

    <div class="card">
      <div id="loading" class="loading">Loading member profile...</div>

      <div id="content" class="hidden">
        <div class="profile-header">
          <img id="avatar" class="avatar hidden" alt="Profile Photo" />
          <div id="avatarPlaceholder" class="avatar-placeholder">No profile photo</div>

          <div class="profile-main">
            <h2 id="displayName">Member</h2>
            <div class="muted" id="subtitle">Member profile</div>
            <div class="bio" id="bio">No bio added yet.</div>
          </div>
        </div>

        <div class="grid">
          <div class="info-box">
            <small>City</small>
            <span id="city">Hidden</span>
          </div>

          <div class="info-box">
            <small>Gender</small>
            <span id="gender">Hidden</span>
          </div>

          <div class="info-box">
            <small>Profile Type</small>
            <span id="profileType">Public</span>
          </div>

          <div class="info-box">
            <small>Verified</small>
            <span id="verified">No</span>
          </div>

          <div class="info-box">
            <small>Member ID</small>
            <span id="uid">-</span>
          </div>

          <div class="info-box">
            <small>Photo Status</small>
            <span id="photoStatus">No photo</span>
          </div>
        </div>

        <div id="privateBox" class="private-box hidden">
          This member has a private profile. Only limited preview is visible.
        </div>

        <div id="noteBox" class="note-box hidden"></div>
        <div id="errorBox" class="error-box hidden"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      collection,
      query,
      where,
      limit,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const content = document.getElementById("content");
    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const displayNameEl = document.getElementById("displayName");
    const subtitleEl = document.getElementById("subtitle");
    const bioEl = document.getElementById("bio");
    const cityEl = document.getElementById("city");
    const genderEl = document.getElementById("gender");
    const profileTypeEl = document.getElementById("profileType");
    const verifiedEl = document.getElementById("verified");
    const uidEl = document.getElementById("uid");
    const photoStatusEl = document.getElementById("photoStatus");
    const privateBox = document.getElementById("privateBox");
    const noteBox = document.getElementById("noteBox");
    const errorBox = document.getElementById("errorBox");

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();

      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        photoStatusEl.textContent = "No photo";
        return;
      }

      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
      photoStatusEl.textContent = "Photo added";
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
      photoStatusEl.textContent = "Photo could not load";
    });

    function showContent() {
      loading.classList.add("hidden");
      content.classList.remove("hidden");
    }

    function showNote(text) {
      noteBox.textContent = text;
      noteBox.classList.remove("hidden");
    }

    function showError(text) {
      errorBox.textContent = text;
      errorBox.classList.remove("hidden");
    }

    function genderLabel(gender, custom) {
      const map = {
        male: "Male",
        female: "Female",
        non_binary: "Non-binary",
        trans_man: "Trans Man",
        trans_woman: "Trans Woman",
        genderqueer: "Genderqueer",
        agender: "Agender",
        prefer_not_to_say: "Prefer not to say",
        self_describe: custom || "Self-described"
      };

      return map[gender] || "Not added";
    }

    function applyProfileData(data, fallbackUid) {
      const p = data || {};

      displayNameEl.textContent = p.displayName || "Member";
      subtitleEl.textContent = p.isPrivate ? "Private member profile" : "Public member profile";
      bioEl.textContent = p.bio && p.bio.trim() ? p.bio : "No bio added yet.";
      cityEl.textContent = p.cityVisible ? (p.city || "Not added") : "Hidden";
      genderEl.textContent = p.genderVisible ? genderLabel(p.gender, p.genderCustom) : "Hidden";
      profileTypeEl.textContent = p.isPrivate ? "Private" : "Public";
      verifiedEl.textContent = p.isVerified ? "Yes" : "No";
      uidEl.textContent = p.uid || fallbackUid || "-";

      showAvatar(p.photoURL || p.userPhotoURL || "");

      if (p.isPrivate) {
        privateBox.classList.remove("hidden");
      } else {
        privateBox.classList.add("hidden");
      }

      showContent();
    }

    async function loadPublicProfile(uid) {
      const ref = doc(db, "publicProfiles", uid);
      const snap = await getDoc(ref);
      return snap.exists() ? snap.data() : null;
    }

    async function loadFallbackFromPosts(uid) {
      const q = query(
        collection(db, "posts"),
        where("userId", "==", uid),
        limit(1)
      );

      const snap = await getDocs(q);
      if (snap.empty) return null;

      const post = snap.docs[0].data();

      return {
        uid,
        displayName: post.displayName || "Member",
        photoURL: post.userPhotoURL || "",
        bio: "",
        city: "",
        cityVisible: false,
        isPrivate: false,
        isVerified: false,
        gender: "",
        genderCustom: "",
        genderVisible: false
      };
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");

      if (!uid) {
        loading.textContent = "No member selected.";
        return;
      }

      try {
        const publicProfile = await loadPublicProfile(uid);

        if (publicProfile) {
          applyProfileData(publicProfile, uid);
          return;
        }

        const fallback = await loadFallbackFromPosts(uid);

        if (fallback) {
          applyProfileData(fallback, uid);
          showNote("Full public profile not found yet. Showing basic info from a post.");
          return;
        }

        loading.textContent = "Member profile not found.";
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load member profile.";
        showError(error.message || "Unknown error");
      }
    });
  </script>
</body>
</html>
