<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Member</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 850px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .brand {
      font-size: 30px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    .btn-back {
      background: #64748b;
      color: #fff;
    }

    .btn-feed {
      background: #38bdf8;
      color: #082f49;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .loading {
      text-align: center;
      color: #cbd5e1;
      padding: 30px 10px;
    }

    .hidden {
      display: none !important;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
    }

    .avatar-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      color: #94a3b8;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      line-height: 1.4;
    }

    .profile-main h2 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .bio {
      margin-top: 10px;
      color: #e2e8f0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .info-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
    }

    .info-box small {
      display: block;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .info-box span {
      font-weight: 700;
      color: #fff;
      word-break: break-word;
    }

    .private-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fde68a;
      line-height: 1.6;
    }

    .error-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fecaca;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .profile-header {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">BareWorld</div>
      <div class="top-actions">
        <a href="feed.html" class="btn btn-feed">Back to Feed</a>
        <a href="profile.html" class="btn btn-back">My Profile</a>
      </div>
    </div>

    <div class="card">
      <div id="loading" class="loading">Loading member profile...</div>

      <div id="content" class="hidden">
        <div class="profile-header">
          <img id="avatar" class="avatar hidden" alt="Profile Photo" />
          <div id="avatarPlaceholder" class="avatar-placeholder">No profile photo</div>

          <div class="profile-main">
            <h2 id="displayName">Member</h2>
            <div class="muted" id="subtitle">Member profile</div>
            <div class="bio" id="bio">No bio added yet.</div>
          </div>
        </div>

        <div class="grid">
          <div class="info-box">
            <small>City</small>
            <span id="city">Hidden</span>
          </div>

          <div class="info-box">
            <small>Profile Type</small>
            <span id="profileType">Public</span>
          </div>

          <div class="info-box">
            <small>Verified</small>
            <span id="verified">No</span>
          </div>

          <div class="info-box">
            <small>Member ID</small>
            <span id="uid">-</span>
          </div>
        </div>

        <div id="privateBox" class="private-box hidden">
          This member has a private profile. Only limited preview is visible.
        </div>

        <div id="errorBox" class="error-box hidden"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      collection,
      query,
      where,
      orderBy,
      limit,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const content = document.getElementById("content");
    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const displayNameEl = document.getElementById("displayName");
    const subtitleEl = document.getElementById("subtitle");
    const bioEl = document.getElementById("bio");
    const cityEl = document.getElementById("city");
    const profileTypeEl = document.getElementById("profileType");
    const verifiedEl = document.getElementById("verified");
    const uidEl = document.getElementById("uid");
    const privateBox = document.getElementById("privateBox");
    const errorBox = document.getElementById("errorBox");

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();

      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }

      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    function showContent() {
      loading.classList.add("hidden");
      content.classList.remove("hidden");
    }

    function showError(text) {
      errorBox.textContent = text;
      errorBox.classList.remove("hidden");
    }

    function applyProfileData(data, fallbackUid) {
      const safeData = data || {};

      displayNameEl.textContent = safeData.displayName || "Member";
      subtitleEl.textContent = safeData.isPrivate ? "Private member profile" : "Public member profile";
      bioEl.textContent = safeData.bio && safeData.bio.trim() ? safeData.bio : "No bio added yet.";
      cityEl.textContent = safeData.cityVisible ? (safeData.city || "Not added") : "Hidden";
      profileTypeEl.textContent = safeData.isPrivate ? "Private" : "Public";
      verifiedEl.textContent = safeData.isVerified ? "Yes" : "No";
      uidEl.textContent = safeData.uid || fallbackUid || "-";

      showAvatar(safeData.photoURL || safeData.userPhotoURL || "");

      if (safeData.isPrivate) {
        privateBox.classList.remove("hidden");
      } else {
        privateBox.classList.add("hidden");
      }

      showContent();
    }

    async function loadFromPublicProfiles(uid) {
      const ref = doc(db, "publicProfiles", uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) return null;
      return snap.data();
    }

    async function loadFallbackFromPosts(uid) {
      const postsRef = collection(db, "posts");
      const q = query(
        postsRef,
        where("userId", "==", uid),
        orderBy("createdAt", "desc"),
        limit(1)
      );

      const snap = await getDocs(q);

      if (snap.empty) return null;

      const post = snap.docs[0].data();

      return {
        uid: uid,
        displayName: post.displayName || "Member",
        photoURL: post.userPhotoURL || "",
        bio: "",
        city: "",
        cityVisible: false,
        isPrivate: false,
        isVerified: false
      };
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");

      if (!uid) {
        loading.textContent = "No member selected.";
        return;
      }

      try {
        const publicProfile = await loadFromPublicProfiles(uid);

        if (publicProfile) {
          applyProfileData(publicProfile, uid);
          return;
        }

        const fallbackProfile = await loadFallbackFromPosts(uid);

        if (fallbackProfile) {
          applyProfileData(fallbackProfile, uid);
          showError("Full public profile not found yet. Showing basic info from latest post.");
          return;
        }

        loading.textContent = "Member profile not found.";
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load member profile.";
      }
    });
  </script>
</body>
</html>
