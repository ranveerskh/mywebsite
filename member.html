<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Member</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;
      --card:#121931;
      --soft:#161f3d;
      --line:rgba(255,255,255,.08);
      --text:#fff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --red:#ff5d73;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);
      min-height:100vh;
      padding:14px 14px 92px;
    }
    .app{max-width:760px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:30;
      backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);
      border:1px solid rgba(255,255,255,.04);
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:14px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;
    }
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    .chip-btn{
      border:none;background:var(--soft);color:#fff;border-radius:12px;
      padding:10px 12px;text-decoration:none;font-size:13px;font-weight:700;
      cursor:pointer;border:1px solid var(--line);display:inline-block;
    }
    .panel{
      background:rgba(18,25,49,.88);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .hidden{display:none!important}
    .profile-head{
      display:grid;
      grid-template-columns:92px 1fr;
      gap:16px;
      align-items:start;
    }
    .avatar{
      width:92px;height:92px;border-radius:50%;object-fit:cover;
      background:#1b2445;border:1px solid rgba(255,255,255,.1);
    }
    .avatar-placeholder{
      width:92px;height:92px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;text-align:center;
      padding:8px;background:#1b2445;border:1px solid rgba(255,255,255,.1);
      color:var(--muted);font-size:12px;line-height:1.3;
    }
    .display-name{font-size:24px;font-weight:800;line-height:1.2}
    .bio{
      color:#e8eeff;line-height:1.7;font-size:14px;
      white-space:pre-wrap;word-break:break-word;margin-top:8px;
    }
    .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .follow-btn,.unfollow-btn,.self-btn{
      border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;
    }
    .follow-btn{background:rgba(76,201,255,.14);color:#d8f7ff}
    .unfollow-btn{background:rgba(255,93,115,.14);color:#ffd3d9}
    .self-btn{background:#182248;color:#c9d5ff;cursor:not-allowed}
    .stats{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;
    }
    .stat{
      background:#0f1630;border:1px solid rgba(255,255,255,.06);
      border-radius:16px;padding:14px 10px;text-align:center;
    }
    .stat-value{font-size:18px;font-weight:800;margin-bottom:4px}
    .stat-label{font-size:12px;color:var(--muted)}
    .section-title{font-size:20px;font-weight:800;margin-bottom:12px}
    .posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .post-tile{
      aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#0f1630;
      border:1px solid rgba(255,255,255,.06);
    }
    .post-tile img{width:100%;height:100%;object-fit:cover;display:block}
    .post-fallback{
      width:100%;height:100%;padding:10px;display:flex;align-items:flex-end;
      color:#e8eeff;font-size:12px;line-height:1.5;background:linear-gradient(180deg,#19244a,#0f1630);
    }
    .empty-box{
      text-align:center;padding:24px 10px;color:var(--muted);
      background:#0f1630;border-radius:16px;border:1px dashed rgba(255,255,255,.08);
    }
    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(12,18,35,.92);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      border-radius:20px;padding:8px;
      display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
      z-index:50;box-shadow:0 20px 40px rgba(0,0,0,.25);
    }
    .nav-link{
      text-decoration:none;color:#b9c4e3;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 6px;border-radius:14px;
      font-size:11px;font-weight:700;min-height:58px;
    }
    .nav-link .icon{font-size:18px;line-height:1}
    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{padding:10px 12px}
      .brand{font-size:20px}
      .chip-btn{padding:9px 10px;font-size:12px}
      .profile-head{grid-template-columns:78px 1fr}
      .avatar,.avatar-placeholder{width:78px;height:78px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Member profile</div>
      </div>

      <div class="top-actions">
        <a href="feed.html" class="chip-btn">Feed</a>
        <a href="profile.html" class="chip-btn">My Profile</a>
      </div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading member profile...</div>

      <div id="content" class="hidden">
        <div class="profile-head">
          <img id="avatar" class="avatar hidden" alt="Profile Photo" />
          <div id="avatarPlaceholder" class="avatar-placeholder">No photo</div>

          <div>
            <div class="display-name" id="displayName">Member</div>
            <div class="bio" id="bio">No bio added yet.</div>

            <div class="action-row" id="followArea"></div>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="postsCount">0</div>
            <div class="stat-label">Posts</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="followersCount">0</div>
            <div class="stat-label">Followers</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="followingCount">0</div>
            <div class="stat-label">Following</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="friendsCount">0</div>
            <div class="stat-label">Friends</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Posts</div>
      <div id="postsGrid" class="posts-grid hidden"></div>
      <div id="postsEmpty" class="empty-box hidden">No posts yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="create-event.html" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="events.html" class="nav-link">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      collection,
      getDocs,
      setDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const content = document.getElementById("content");
    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const displayNameEl = document.getElementById("displayName");
    const bioEl = document.getElementById("bio");
    const followArea = document.getElementById("followArea");

    const postsCountEl = document.getElementById("postsCount");
    const followersCountEl = document.getElementById("followersCount");
    const followingCountEl = document.getElementById("followingCount");
    const friendsCountEl = document.getElementById("friendsCount");
    const postsGrid = document.getElementById("postsGrid");
    const postsEmpty = document.getElementById("postsEmpty");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    function renderPosts(posts) {
      postsGrid.innerHTML = "";
      postsCountEl.textContent = String(posts.length);

      if (!posts.length) {
        postsGrid.classList.add("hidden");
        postsEmpty.classList.remove("hidden");
        return;
      }

      postsEmpty.classList.add("hidden");
      postsGrid.classList.remove("hidden");

      posts.forEach(post => {
        const tile = document.createElement("div");
        tile.className = "post-tile";

        if (post.imageURL) {
          tile.innerHTML = `<img src="${escapeHtml(post.imageURL)}" alt="Post image">`;
          const img = tile.querySelector("img");
          img.addEventListener("error", () => {
            tile.innerHTML = `<div class="post-fallback">${escapeHtml((post.caption || "Post").slice(0, 80))}</div>`;
          });
        } else {
          tile.innerHTML = `<div class="post-fallback">${escapeHtml((post.caption || "Post").slice(0, 80))}</div>`;
        }

        postsGrid.appendChild(tile);
      });
    }

    async function renderFollowButton(viewerUid, memberUid) {
      followArea.innerHTML = "";

      if (viewerUid === memberUid) {
        followArea.innerHTML = `<button class="self-btn" disabled>This is you</button>`;
        return;
      }

      const followId = `${viewerUid}__${memberUid}`;
      const followRef = doc(db, "follows", followId);
      const existing = await getDoc(followRef);

      if (existing.exists()) {
        const btn = document.createElement("button");
        btn.className = "unfollow-btn";
        btn.textContent = "Unfollow";
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          await deleteDoc(followRef);
          await location.reload();
        });
        followArea.appendChild(btn);
      } else {
        const btn = document.createElement("button");
        btn.className = "follow-btn";
        btn.textContent = "Follow";
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          await setDoc(followRef, {
            followerId: viewerUid,
            followingId: memberUid,
            createdAt: serverTimestamp()
          });
          await location.reload();
        });
        followArea.appendChild(btn);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const memberUid = params.get("uid");

      if (!memberUid) {
        loading.textContent = "No member selected.";
        return;
      }

      try {
        const [profileSnap, postsSnap, followsSnap] = await Promise.all([
          getDoc(doc(db, "publicProfiles", memberUid)),
          getDocs(collection(db, "posts")),
          getDocs(collection(db, "follows"))
        ]);

        let profile = null;

        if (profileSnap.exists()) {
          profile = profileSnap.data();
        } else {
          const fallbackPost = postsSnap.docs.map(d => d.data()).find(p => p.userId === memberUid);
          profile = fallbackPost ? {
            uid: memberUid,
            displayName: fallbackPost.displayName || "Member",
            bio: "",
            photoURL: fallbackPost.userPhotoURL || ""
          } : null;
        }

        if (!profile) {
          loading.textContent = "Member profile not found.";
          return;
        }

        displayNameEl.textContent = profile.displayName || "Member";
        bioEl.textContent = profile.bio?.trim() ? profile.bio : "No bio added yet.";
        showAvatar(profile.photoURL || "");

        const memberPosts = postsSnap.docs.map(d => d.data()).filter(p => p.userId === memberUid);
        renderPosts(memberPosts);

        const follows = followsSnap.docs.map(d => d.data());
        const followers = follows.filter(f => f.followingId === memberUid).map(f => f.followerId);
        const following = follows.filter(f => f.followerId === memberUid).map(f => f.followingId);
        const followingSet = new Set(following);
        const friends = followers.filter(id => followingSet.has(id));

        followersCountEl.textContent = String(followers.length);
        followingCountEl.textContent = String(following.length);
        friendsCountEl.textContent = String(friends.length);

        await renderFollowButton(user.uid, memberUid);

        loading.classList.add("hidden");
        content.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load member profile.";
      }
    });
  </script>
</body>
</html>
