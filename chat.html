<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OwnSpace - Chat</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --mine:#dcf8f0;
      --other:#f1f5fb;
      --topbar-bg:rgba(255,255,255,.94);
      --composer-bg:rgba(255,255,255,.96);
      --shadow:0 16px 30px rgba(20,33,61,.08);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --mine:#123c4c;
      --other:#121f39;
      --topbar-bg:rgba(9,15,31,.92);
      --composer-bg:rgba(9,15,31,.96);
      --shadow:0 22px 44px rgba(0,0,0,.22);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html,body{min-height:100%}

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.12), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(61,220,132,.10), transparent 25%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow:hidden;
    }

    .app{
      width:min(860px, 100%);
      margin:0 auto;
      height:100vh;
      height:100dvh;
      padding:calc(10px + var(--safe-top)) 10px calc(10px + var(--safe-bottom));
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:10px;
    }

    .hidden{display:none!important}

    .topbar{
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      border-radius:22px;
      padding:8px;
      display:grid;
      grid-template-columns:46px 1fr 46px;
      gap:8px;
      align-items:center;
      min-height:64px;
    }

    .top-icon-btn{
      width:46px;
      height:46px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:16px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{width:20px;height:20px;display:block}

    .chat-head{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .chat-avatar,
    .chat-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .chat-avatar{object-fit:cover}

    .chat-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .chat-head-text{min-width:0;flex:1}

    .chat-title-row{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }

    .chat-title{
      font-size:16px;
      font-weight:900;
      color:var(--text);
      text-decoration:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.2;
      min-width:0;
    }

    .chat-title:hover{text-decoration:underline}

    .verified-badge{
      width:19px;
      height:19px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(61,220,132,.14);
      color:#20c76f;
      border:1px solid rgba(61,220,132,.25);
      flex-shrink:0;
    }

    html[data-theme="dark"] .verified-badge{color:#8cffb4}

    .verified-badge svg{width:13px;height:13px;display:block}

    .chat-subline{
      margin-top:4px;
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
      flex-wrap:wrap;
    }

    .chat-username{
      color:var(--blue);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:160px;
    }

    .chat-state{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .state-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--green);
      display:inline-block;
      flex-shrink:0;
    }

    .page-message{
      min-height:18px;
      font-size:13px;
      line-height:1.5;
      padding:0 4px;
      color:var(--muted);
    }

    .page-message.ok{color:#16a34a}
    .page-message.err{color:#e11d48}
    html[data-theme="dark"] .page-message.ok{color:#86efac}
    html[data-theme="dark"] .page-message.err{color:#fda4af}

    .chat-stage{
      min-height:0;
      display:grid;
      grid-template-rows:1fr;
      position:relative;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:0;
    }

    .blocked-panel,
    .request-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:14px;
      align-self:start;
    }

    .blocked-box,
    .request-box{
      background:var(--surface-2);
      border:1px dashed var(--line);
      border-radius:18px;
      padding:16px;
      color:var(--muted);
      text-align:center;
      line-height:1.6;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .request-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
      justify-content:center;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 14px;
      font-size:13px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      min-height:42px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      text-decoration:none;
    }

    .action-btn svg{width:16px;height:16px;display:block}
    .action-btn:disabled{opacity:.65;cursor:not-allowed}

    .btn-green{
      background:rgba(61,220,132,.14);
      border-color:rgba(61,220,132,.22);
    }

    .btn-red{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.22);
    }

    .messages-panel{
      display:grid;
      grid-template-rows:auto 1fr;
      min-height:0;
    }

    .messages-toolbar{
      padding:10px 12px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .toolbar-title{
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .toolbar-chip{
      font-size:11px;
      font-weight:900;
      color:var(--text);
      background:rgba(76,201,255,.12);
      border:1px solid rgba(76,201,255,.18);
      border-radius:999px;
      padding:6px 9px;
      white-space:nowrap;
    }

    .messages-body{
      min-height:0;
      overflow:auto;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      scroll-behavior:smooth;
      background:
        radial-gradient(circle at 18% 8%, rgba(76,201,255,.05), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(61,220,132,.05), transparent 24%),
        var(--surface);
    }

    .messages-loading,
    .messages-empty{
      margin:auto;
      width:min(420px, 100%);
      padding:18px 14px;
      border-radius:18px;
      border:1px dashed var(--line);
      background:var(--surface-2);
      color:var(--muted);
      text-align:center;
      font-size:14px;
      line-height:1.6;
    }

    .day-divider{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      margin:6px 0;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .day-divider::before,
    .day-divider::after{
      content:"";
      height:1px;
      background:var(--line);
      flex:1;
    }

    .bubble-row{
      width:100%;
      display:flex;
      align-items:flex-end;
      gap:8px;
    }

    .bubble-row.mine{justify-content:flex-end}
    .bubble-row.other{justify-content:flex-start}

    .bubble{
      max-width:min(76%, 560px);
      border:1px solid var(--line);
      border-radius:22px;
      padding:11px 12px 9px;
      box-shadow:0 10px 22px rgba(0,0,0,.08);
      position:relative;
    }

    .bubble.mine{
      background:linear-gradient(180deg, color-mix(in srgb, var(--mine) 92%, #fff 8%), var(--mine));
      border-color:rgba(76,201,255,.16);
      border-bottom-right-radius:8px;
    }

    .bubble.other{
      background:var(--other);
      border-color:var(--line);
      border-bottom-left-radius:8px;
    }

    .bubble-text{
      color:var(--text);
      font-size:15px;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .bubble-meta{
      margin-top:7px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:6px;
      color:var(--muted);
      font-size:10.5px;
      white-space:nowrap;
    }

    .read-tick{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:14px;
      margin-left:1px;
      color:var(--muted);
      flex-shrink:0;
    }

    .read-tick.seen{color:var(--green)}
    .read-tick svg{width:18px;height:14px;display:block;stroke:currentColor}

    .composer-panel{
      background:var(--composer-bg);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      border-radius:24px;
      padding:10px;
      min-height:76px;
    }

    .composer{display:grid;gap:7px}

    .input-row{
      display:grid;
      grid-template-columns:1fr 52px;
      gap:8px;
      align-items:end;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px 15px;
      border-radius:20px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:15px;
      min-height:52px;
      max-height:132px;
      line-height:1.45;
    }

    .input::placeholder{color:var(--muted)}

    .send-btn{
      width:52px;
      height:52px;
      border:none;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(61,220,132,.20), rgba(61,220,132,.12));
      color:var(--text);
      border:1px solid rgba(61,220,132,.25);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .send-btn svg{width:20px;height:20px;display:block}
    .send-btn:disabled{opacity:.65;cursor:not-allowed}

    .form-message{
      min-height:16px;
      font-size:12px;
      line-height:1.35;
      padding:0 4px;
      color:var(--muted);
    }

    .form-message.ok{color:#16a34a}
    .form-message.err{color:#e11d48}
    html[data-theme="dark"] .form-message.ok{color:#86efac}
    html[data-theme="dark"] .form-message.err{color:#fda4af}

    .composer-note{
      color:var(--muted);
      font-size:11.5px;
      line-height:1.35;
      padding:0 4px;
    }

    .utility-hidden{display:none}

    @media (max-width:700px){
      .app{
        padding:calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom));
        gap:8px;
      }

      .topbar{
        border-radius:20px;
        grid-template-columns:44px 1fr 44px;
      }

      .top-icon-btn{width:44px;height:44px}

      .chat-avatar,
      .chat-avatar-placeholder{
        width:42px;
        height:42px;
      }

      .chat-title{font-size:15px}
      .chat-username{max-width:125px}
      .messages-body{padding:11px}
      .bubble{max-width:84%}
      .composer-panel{border-radius:22px}
    }

    @media (max-width:390px){
      .bubble{max-width:88%}
      .chat-username{max-width:95px}
      .chat-state{font-size:11px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="chat-head">
        <img id="avatar" class="chat-avatar hidden" alt="User photo" />
        <div id="avatarPlaceholder" class="chat-avatar-placeholder">No photo</div>

        <div class="chat-head-text">
          <div class="chat-title-row">
            <a id="targetNameLink" href="#" class="chat-title">OwnSpace Chat</a>
            <span id="verifiedDot" class="verified-badge hidden" title="Verified">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </span>
          </div>

          <div class="chat-subline">
            <span id="targetUsername" class="chat-username hidden">@username</span>
            <span class="state-dot" aria-hidden="true"></span>
            <span id="topSub" class="chat-state">Loading...</span>
          </div>
        </div>
      </div>

      <a id="profileBtn" href="profile.html" class="top-icon-btn" aria-label="View profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="pageMessage" class="page-message"></div>

    <div class="utility-hidden">
      <span id="modeChip">Chat</span>
      <span id="statusChip">Loading</span>
      <a id="memberProfileBtn" href="#">Profile</a>
      <div id="targetBio"></div>
    </div>

    <div class="chat-stage">
      <div id="blockedPanel" class="blocked-panel hidden">
        <div id="blockedText" class="blocked-box">This conversation is not available.</div>
      </div>

      <div id="requestInfoPanel" class="request-panel hidden">
        <div id="requestInfoBox" class="request-box">
          You can send one message request. They must accept it before full chat opens.
        </div>

        <div id="requestActionRow" class="request-actions hidden">
          <button id="acceptRequestBtn" class="action-btn btn-green" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
            Accept Request
          </button>

          <button id="declineRequestBtn" class="action-btn btn-red" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
            Decline
          </button>
        </div>

        <div id="requestPreviewBox" class="request-box hidden" style="margin-top:12px;"></div>
      </div>

      <div id="messagesPanel" class="messages-panel panel hidden">
        <div class="messages-toolbar">
          <div class="toolbar-title">Conversation</div>
          <div id="toolbarChip" class="toolbar-chip">Secure chat</div>
        </div>

        <div id="messagesBody" class="messages-body">
          <div id="messagesLoading" class="messages-loading hidden">Loading messages...</div>
          <div id="messagesEmpty" class="messages-empty hidden">No messages yet. Say hello.</div>
          <div id="messagesList" class="hidden"></div>
        </div>
      </div>
    </div>

    <div id="composerPanel" class="composer-panel hidden">
      <div class="composer">
        <div class="input-row">
          <textarea id="messageInput" class="input" placeholder="Write your message..."></textarea>

          <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 2 11 13"></path>
              <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
            </svg>
          </button>
        </div>

        <div id="formMessage" class="form-message"></div>
        <div id="composerNote" class="composer-note"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const topSub = document.getElementById("topSub");
    const toolbarChip = document.getElementById("toolbarChip");
    const profileBtn = document.getElementById("profileBtn");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const targetNameLink = document.getElementById("targetNameLink");
    const verifiedDot = document.getElementById("verifiedDot");
    const targetUsername = document.getElementById("targetUsername");
    const targetBio = document.getElementById("targetBio");
    const modeChip = document.getElementById("modeChip");
    const statusChip = document.getElementById("statusChip");
    const memberProfileBtn = document.getElementById("memberProfileBtn");

    const pageMessage = document.getElementById("pageMessage");

    const blockedPanel = document.getElementById("blockedPanel");
    const blockedText = document.getElementById("blockedText");

    const messagesPanel = document.getElementById("messagesPanel");
    const messagesBody = document.getElementById("messagesBody");
    const messagesLoading = document.getElementById("messagesLoading");
    const messagesList = document.getElementById("messagesList");
    const messagesEmpty = document.getElementById("messagesEmpty");

    const requestInfoPanel = document.getElementById("requestInfoPanel");
    const requestInfoBox = document.getElementById("requestInfoBox");
    const requestActionRow = document.getElementById("requestActionRow");
    const requestPreviewBox = document.getElementById("requestPreviewBox");
    const acceptRequestBtn = document.getElementById("acceptRequestBtn");
    const declineRequestBtn = document.getElementById("declineRequestBtn");

    const composerPanel = document.getElementById("composerPanel");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const formMessage = document.getElementById("formMessage");
    const composerNote = document.getElementById("composerNote");

    let currentUser = null;
    let currentViewerProfile = null;
    let currentTargetUid = "";
    let currentTargetProfile = null;
    let currentThreadId = "";
    let currentThreadData = null;
    let currentMode = "loading";
    let requestDocModel = null;

    let messageChannels = [];
    let requestChannel = null;
    let threadChannel = null;
    let refreshTimer = null;

    let iBlockedTarget = false;
    let targetBlockedMe = false;
    let readMarkingThreads = new Set();

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setPageMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `page-message ${type}`;
    }

    function setFormMessage(text = "", type = "") {
      formMessage.textContent = text;
      formMessage.className = `form-message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function hasOwn(obj, key) {
      return Object.prototype.hasOwnProperty.call(obj || {}, key);
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }
      return "";
    }

    function getSortedPair(a, b) {
      return [a, b].sort((x, y) => x.localeCompare(y));
    }

    function tsMs(ts) {
      if (!ts) return 0;
      const n = new Date(ts).getTime();
      return Number.isFinite(n) ? n : 0;
    }

    function formatTime(ts) {
      if (!ts) return "Just now";
      try {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "Just now";
        return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      } catch {
        return "Just now";
      }
    }

    function formatDay(ts) {
      if (!ts) return "Today";

      try {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "Today";

        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(today.getDate() - 1);

        const key = d.toDateString();

        if (key === today.toDateString()) return "Today";
        if (key === yesterday.toDateString()) return "Yesterday";

        return d.toLocaleDateString([], {
          month: "short",
          day: "numeric",
          year: d.getFullYear() === today.getFullYear() ? undefined : "numeric"
        });
      } catch {
        return "Today";
      }
    }

    function isMissingSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("does not exist") ||
        msg.includes("schema cache") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        msg.includes("relation")
      );
    }

    async function tryUpdate(table, payload, buildQuery) {
      try {
        let q = supabase.from(table).update(payload);
        q = buildQuery(q);
        const { error } = await q;
        return !error;
      } catch {
        return false;
      }
    }

    async function tryInsert(table, payload) {
      try {
        const { data, error } = await supabase.from(table).insert(payload).select("*").maybeSingle();
        if (!error) return { ok: true, data: data || null };
        return { ok: false, error };
      } catch (error) {
        return { ok: false, error };
      }
    }

    async function insertWithFallback(table, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        const result = await tryInsert(table, payload);
        if (result.ok) return result.data;
        lastError = result.error || lastError;
      }

      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    function buildNotificationReadPayloads() {
      const now = nowIso();

      return [
        { is_read: true, read_at: now, updated_at: now },
        { is_read: true, updated_at: now },
        { is_read: true },
        { read: true, updated_at: now },
        { read: true },
        { isRead: true, readAt: now, updatedAt: now },
        { isRead: true },
        { readAt: now }
      ];
    }

    async function markThreadNotificationsRead(threadId) {
      if (!currentUser || !threadId) return;

      const toColumns = ["to_user_id", "user_id", "toUserId", "userId"];
      const threadColumns = ["thread_id", "threadId"];
      const payloads = buildNotificationReadPayloads();

      const attempts = [];

      for (const payload of payloads) {
        for (const toCol of toColumns) {
          for (const threadCol of threadColumns) {
            attempts.push(
              tryUpdate("notifications", payload, q =>
                q.eq(toCol, currentUser.id).eq(threadCol, threadId)
              )
            );
          }
        }
      }

      await Promise.allSettled(attempts);
    }

    async function markRequestNotificationsRead(requestId) {
      if (!currentUser || !requestId) return;

      const toColumns = ["to_user_id", "user_id", "toUserId", "userId"];
      const requestColumns = ["request_id", "requestId", "message_request_id", "messageRequestId"];
      const payloads = buildNotificationReadPayloads();

      const attempts = [];

      for (const payload of payloads) {
        for (const toCol of toColumns) {
          for (const requestCol of requestColumns) {
            attempts.push(
              tryUpdate("notifications", payload, q =>
                q.eq(toCol, currentUser.id).eq(requestCol, requestId)
              )
            );
          }
        }
      }

      await Promise.allSettled(attempts);
    }

    function getReadPayloadFromRaw(raw) {
      const now = nowIso();
      const payload = {};

      if (hasOwn(raw, "seen_at")) payload.seen_at = now;
      if (hasOwn(raw, "read_at")) payload.read_at = now;
      if (hasOwn(raw, "is_read")) payload.is_read = true;
      if (hasOwn(raw, "read")) payload.read = true;

      if (hasOwn(raw, "seenAt")) payload.seenAt = now;
      if (hasOwn(raw, "readAt")) payload.readAt = now;
      if (hasOwn(raw, "isRead")) payload.isRead = true;

      return payload;
    }

    function getThreadColumnFromRaw(raw) {
      if (hasOwn(raw, "thread_id")) return "thread_id";
      if (hasOwn(raw, "threadId")) return "threadId";
      return "";
    }

    function getSenderColumnFromRaw(raw) {
      if (hasOwn(raw, "sender_id")) return "sender_id";
      if (hasOwn(raw, "senderId")) return "senderId";
      if (hasOwn(raw, "from_user_id")) return "from_user_id";
      if (hasOwn(raw, "fromUserId")) return "fromUserId";
      return "";
    }

    async function markMessagesReadFast(threadId, messages = []) {
      if (!threadId || !currentUser) return;

      const incoming = messages.filter(msg => msg.senderId && msg.senderId !== currentUser.id);

      const sample = incoming.find(msg => {
        const raw = msg.__raw || {};
        const payload = getReadPayloadFromRaw(raw);
        return getThreadColumnFromRaw(raw) && getSenderColumnFromRaw(raw) && Object.keys(payload).length;
      });

      if (sample) {
        const raw = sample.__raw || {};
        const payload = getReadPayloadFromRaw(raw);
        const threadColumn = getThreadColumnFromRaw(raw);
        const senderColumn = getSenderColumnFromRaw(raw);

        const ok = await tryUpdate("chat_messages", payload, q =>
          q.eq(threadColumn, threadId).neq(senderColumn, currentUser.id)
        );

        if (ok) return;
      }

      const fallbackFilterSets = [
        { thread: "thread_id", sender: "sender_id" },
        { thread: "threadId", sender: "senderId" },
        { thread: "thread_id", sender: "from_user_id" },
        { thread: "threadId", sender: "fromUserId" }
      ];

      const now = nowIso();
      const fallbackPayloads = [
        { seen_at: now },
        { read_at: now },
        { is_read: true },
        { read: true },
        { seenAt: now },
        { readAt: now },
        { isRead: true }
      ];

      const attempts = [];

      for (const filter of fallbackFilterSets) {
        for (const payload of fallbackPayloads) {
          attempts.push(
            tryUpdate("chat_messages", payload, q =>
              q.eq(filter.thread, threadId).neq(filter.sender, currentUser.id)
            )
          );
        }
      }

      await Promise.allSettled(attempts);
    }

    function markMessagesSeenInBackground(threadId, messages = []) {
      if (!threadId || !currentUser) return;
      if (readMarkingThreads.has(threadId)) return;

      readMarkingThreads.add(threadId);

      Promise.resolve()
        .then(async () => {
          await Promise.allSettled([
            markMessagesReadFast(threadId, messages),
            markThreadNotificationsRead(threadId)
          ]);
          notifyBadgeRefresh();
        })
        .catch(err => {
          console.warn("Read update skipped:", err?.message || err);
        })
        .finally(() => {
          readMarkingThreads.delete(threadId);
        });
    }

    async function markRequestTouched(requestId) {
      if (!currentUser || !requestId) return;

      const now = nowIso();

      const payloads = [
        { seen_at: now, read_at: now, updated_at: now },
        { read_at: now, updated_at: now },
        { seen_at: now, updated_at: now },
        { seenAt: now, readAt: now, updatedAt: now },
        { is_read: true },
        { read: true },
        { isRead: true }
      ];

      const attempts = payloads.map(payload =>
        tryUpdate("message_requests", payload, q => q.eq("id", requestId))
      );

      attempts.push(markRequestNotificationsRead(requestId));

      await Promise.allSettled(attempts);
      notifyBadgeRefresh();
    }

    function normalizeMessage(raw, fallbackId = "") {

      const seenAt = d.seen_at ?? d.seenAt ?? d.read_at ?? d.readAt ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        text: getField(d, ["text", "message", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenAt,
        isRead: readValue === true,
        __raw: d
      };
    }

    async function fetchMessages(threadId) {
      const attempts = [
        { threadColumn: "thread_id", orderColumn: "created_at" },
        { threadColumn: "threadId", orderColumn: "createdAt" },
        { threadColumn: "thread_id", orderColumn: "" },
        { threadColumn: "threadId", orderColumn: "" }
      ];

      for (const attempt of attempts) {
        try {
          let q = supabase
            .from("chat_messages")
            .select("*")
            .eq(attempt.threadColumn, threadId);

          if (attempt.orderColumn) q = q.order(attempt.orderColumn, { ascending: true });

          const { data, error } = await q;

          if (!error) {
            return (data || [])
              .map(row => normalizeMessage(row, row.id))
              .sort((a, b) => tsMs(a.createdAt) - tsMs(b.createdAt));
          }

          if (!isMissingSchemaError(error)) console.warn("Messages query failed:", error.message);
        } catch {}
      }

      return [];
    }

    function buildReadTickHtml(msg) {
      const seen = !!(msg.seenAt || msg.isRead === true);

      if (seen) {
        return `
          <span class="read-tick seen" title="Seen" aria-label="Seen">
            <svg viewBox="0 0 24 16" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 8.4 5.8 12 13.2 3.8"></path>
              <path d="M10.8 11.8 13.2 14 22 3"></path>
            </svg>
          </span>
        `;
      }

      return `
        <span class="read-tick sent" title="Sent" aria-label="Sent">
          <svg viewBox="0 0 18 16" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 8.4 6 12 16 3.8"></path>
          </svg>
        </span>
      `;
    }

    function renderMessages(messages) {
      messagesLoading.classList.add("hidden");
      messagesList.innerHTML = "";
      messagesList.className = "";

      const finalMessages = [...messages].sort((a, b) => tsMs(a.createdAt) - tsMs(b.createdAt));

      if (!finalMessages.length && currentThreadData?.starterText) {
        finalMessages.push({
          id: "starter-fallback",
          threadId: currentThreadId,
          senderId: currentThreadData.starterFrom || currentTargetUid,
          text: currentThreadData.starterText,
          createdAt: currentThreadData.createdAt || currentThreadData.lastMessageAt || null,
          seenAt: null,
          isRead: false
        });
      }

      if (!finalMessages.length) {
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        return;
      }

      messagesEmpty.classList.add("hidden");
      messagesList.classList.remove("hidden");

      let lastDay = "";

      finalMessages.forEach(msg => {
        const day = formatDay(msg.createdAt);

        if (day !== lastDay) {
          lastDay = day;
          const divider = document.createElement("div");
          divider.className = "day-divider";
          divider.textContent = day;
          messagesList.appendChild(divider);
        }

        const mine = msg.senderId === currentUser.id;

        const row = document.createElement("div");
        row.className = `bubble-row ${mine ? "mine" : "other"}`;

        row.innerHTML = `
          <div class="bubble ${mine ? "mine" : "other"}">
            <div class="bubble-text">${escapeHtml(msg.text || "")}</div>
            <div class="bubble-meta">
              <span>${escapeHtml(formatTime(msg.createdAt))}</span>
              ${mine ? buildReadTickHtml(msg) : ""}
            </div>
          </div>
        `;

        messagesList.appendChild(row);
      });

      scrollMessagesToBottom();
    }

    async function refreshMessages(threadId, options = {}) {
      try {
        const messages = await fetchMessages(threadId);
        renderMessages(messages);

        if (options.markRead !== false) {
          markMessagesSeenInBackground(threadId, messages);
        }
      } catch (err) {
        console.error(err);
        messagesLoading.classList.add("hidden");
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        messagesEmpty.textContent = "Could not load messages.";
      }
    }

    function scheduleMessageRefresh(threadId) {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        refreshMessages(threadId).catch(() => {});
      }, 160);

    function listenToMessages(threadId) {
      clearMessageListener();

      messagesPanel.classList.remove("hidden");
      messagesLoading.classList.remove("hidden");
      messagesList.classList.add("hidden");
      messagesEmpty.classList.add("hidden");

      refreshMessages(threadId);

      const messageFilters = [`thread_id=eq.${threadId}`, `threadId=eq.${threadId}`];

      messageFilters.forEach((filter, index) => {
        try {
          const channel = supabase
            .channel(`ownspace-chat-messages-${threadId}-${index}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table: "chat_messages", filter },
              () => scheduleMessageRefresh(threadId)
            )
            .subscribe();

          messageChannels.push(channel);
        } catch {}
      });

      try {
        threadChannel = supabase
          .channel(`ownspace-chat-thread-${threadId}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "chat_threads", filter: `id=eq.${threadId}` },
            async (payload) => {
              if (payload?.new) {
                currentThreadData = normalizeThread(payload.new, payload.new.id);
              }
              scheduleMessageRefresh(threadId);
            }
          )
          .subscribe();
      } catch {}
    }

    async function findExistingThreadByUsers(uidA, uidB) {
      const attempts = [
        ["participant_a", uidA, "participant_b", uidB],
        ["participant_a", uidB, "participant_b", uidA],
        ["participantA", uidA, "participantB", uidB],
        ["participantA", uidB, "participantB", uidA]
      ];

      for (const [colA, valA, colB, valB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq(colA, valA)
            .eq(colB, valB)
            .limit(1);

          if (!error && data && data.length) {
            return normalizeThread(data[0], data[0].id);
          }
        } catch {}
      }

      return null;
    }

    async function loadRequestBetween(requesterId, targetId) {
      const attempts = [
        ["requester_id", requesterId, "target_id", targetId, "created_at"],
        ["requesterId", requesterId, "targetId", targetId, "createdAt"],
        ["from_user_id", requesterId, "to_user_id", targetId, "created_at"],
        ["sender_id", requesterId, "receiver_id", targetId, "created_at"]
      ];

      for (const [colA, valA, colB, valB, orderCol] of attempts) {
        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(colA, valA)
            .eq(colB, valB)
            .order(orderCol, { ascending: false })
            .limit(1);

          if (!error && data && data.length) return normalizeRequest(data[0], data[0].id);
        } catch {}
      }

      return null;
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;

      const createdAt = payload.created_at || nowIso();

      const variants = [
        {
          ...payload,
          from_user_id: currentUser.id,
          to_user_id: targetUid,
          user_id: targetUid,
          created_at: createdAt,
          is_read: false,
          read: false
        },
        {
          type: payload.type || "notification",
          title: payload.title || "",
          text: payload.text || "",
          fromUserId: currentUser.id,
          toUserId: targetUid,
          userId: targetUid,
          threadId: payload.thread_id || payload.threadId || "",
          requestId: payload.request_id || payload.requestId || "",
          createdAt: createdAt,
          isRead: false,
          read: false
        },
        {
          type: payload.type || "notification",
          text: payload.text || "",
          to_user_id: targetUid,
          user_id: targetUid,
          thread_id: payload.thread_id || "",
          request_id: payload.request_id || "",
          created_at: createdAt,
          is_read: false
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function checkFollowing(viewerUid, targetUid) {
      const attempts = [
        ["follower_id", viewerUid, "following_id", targetUid],
        ["followerId", viewerUid, "followingId", targetUid],
        ["from_user_id", viewerUid, "to_user_id", targetUid]
      ];

      for (const [colA, valA, colB, valB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("follows")
            .select("id")
            .eq(colA, valA)
            .eq(colB, valB)
            .limit(1);

          if (!error) return !!(data && data.length);
        } catch {}
      }

      return false;
    }

    async function openThread(threadModel) {
      clearAllListeners();

      currentThreadId = threadModel.id;
      currentThreadData = threadModel;
      currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;

      setModeUI("chat");
      listenToMessages(currentThreadId);

      currentTargetProfile = await loadFullProfile(currentTargetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(currentTargetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
      }
    }

    async function listenToPendingRequest(requestId, direction) {
      clearRequestListener();

      if (direction === "incoming") {
        markRequestTouched(requestId).catch(() => {});
      }

      requestChannel = supabase
        .channel(`ownspace-message-request-${requestId}-${Math.random().toString(36).slice(2)}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "message_requests", filter: `id=eq.${requestId}` },
          async () => {
            try {
              const { data, error } = await supabase
                .from("message_requests")
                .select("*")
                .eq("id", requestId)
                .maybeSingle();

              if (error || !data) return;

              requestDocModel = normalizeRequest(data, data.id);

              if (direction === "incoming") {
                markRequestTouched(requestId).catch(() => {});
              }

              if (requestDocModel.status === "accepted") {
                let thread = null;

                for (let i = 0; i < 5; i++) {
                  thread = await findExistingThreadByUsers(requestDocModel.requesterId, requestDocModel.targetId);
                  if (thread) break;
                  await sleep(250);
                }

                if (thread) {
                  await openThread(thread);
                  setPageMessage("Request accepted.", "ok");
                  return;
                }
              }

              if (requestDocModel.status === "declined") {
                setModeUI("request_declined");
                return;
              }

              setModeUI(direction === "incoming" ? "request_incoming_pending" : "request_outgoing_pending");
            } catch (err) {
              console.error(err);
            }
          }
        )
        .subscribe();
    }

    async function openByTargetUid(targetUid) {
      clearAllListeners();

      currentTargetUid = targetUid;
      currentTargetProfile = await loadFullProfile(targetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(targetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      const existingThread = await findExistingThreadByUsers(currentUser.id, targetUid);

      if (existingThread && existingThread.status === "accepted") {
        await openThread(existingThread);
        return;
      }

      const outgoingReq = await loadRequestBetween(currentUser.id, targetUid);
      if (outgoingReq && outgoingReq.status === "pending") {
        requestDocModel = outgoingReq;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(outgoingReq.id, "outgoing");
        return;
      }

      const incomingReq = await loadRequestBetween(targetUid, currentUser.id);
      if (incomingReq && incomingReq.status === "pending") {
        requestDocModel = incomingReq;
        setModeUI("request_incoming_pending");
        markRequestTouched(incomingReq.id).catch(() => {});
        await listenToPendingRequest(incomingReq.id, "incoming");
        return;
      }

      const iFollowTarget = await checkFollowing(currentUser.id, targetUid);

      if (iFollowTarget) {
        currentThreadId = "";
        currentThreadData = null;
        setModeUI("direct_new");
        return;
      }

      setModeUI("request_compose");
    }

    async function ensureDirectThread() {
      if (currentThreadId) {
        const { data, error } = await supabase
          .from("chat_threads")
          .select("*")
          .eq("id", currentThreadId)
          .maybeSingle();

        if (!error && data) {
          currentThreadData = normalizeThread(data, data.id);
          return currentThreadData;
        }
      }

      const existing = await findExistingThreadByUsers(currentUser.id, currentTargetUid);

      if (existing) {
        currentThreadId = existing.id;
        currentThreadData = existing;
        return existing;
      }

      const pair = getSortedPair(currentUser.id, currentTargetUid);
      const createdAt = nowIso();

      const created = await insertWithFallback("chat_threads", [
        {
          type: "direct",
          status: "accepted",
          participant_a: pair[0],
          participant_b: pair[1],
          created_by: currentUser.id,
          created_at: createdAt,
          updated_at: createdAt,
          last_message_text: "",
          last_message_at: createdAt,
          last_sender_id: ""
        },
        {
          type: "direct",
          status: "accepted",
          participantA: pair[0],
          participantB: pair[1],
          createdBy: currentUser.id,
          createdAt: createdAt,
          updatedAt: createdAt,
          lastMessageText: "",
          lastMessageAt: createdAt,
          lastSenderId: ""
        },
        {
          participant_a: pair[0],
          participant_b: pair[1],
          status: "accepted",
          created_at: createdAt
        }
      ]);

      const thread = normalizeThread(created, created?.id || "");
      currentThreadId = thread.id;
      currentThreadData = thread;
      return thread;
    }

    async function insertChatMessage(threadId, text, createdAt, senderId = currentUser.id) {
      await insertWithFallback("chat_messages", [
        {
          thread_id: threadId,
          sender_id: senderId,
          text,
          created_at: createdAt,
          seen_at: null,
          read_at: null,
          is_read: false,
          read: false
        },
        {
          thread_id: threadId,
          sender_id: senderId,
          text,
          created_at: createdAt,
          seen_at: null
        },
        {
          thread_id: threadId,
          sender_id: senderId,
          text,
          created_at: createdAt
        },
        {
          threadId: threadId,
          senderId: senderId,
          text,
          createdAt: createdAt,
          seenAt: null,
          readAt: null,
          isRead: false
        },
        {
          threadId: threadId,
          senderId: senderId,
          text,
          createdAt: createdAt
        }
      ]);
    }

    async function updateThreadAfterMessage(threadId, text, createdAt, senderId = currentUser.id) {
      const payloads = [
        {
          status: "accepted",
          last_message_text: text,
          last_message_at: createdAt,
          last_sender_id: senderId,
          updated_at: createdAt
        },
        {
          status: "accepted",
          lastMessageText: text,
          lastMessageAt: createdAt,
          lastSenderId: senderId,
          updatedAt: createdAt
        },
        {
          last_message_text: text,
          last_message_at: createdAt,
          last_sender_id: senderId
        }
      ];

      for (const payload of payloads) {
        const ok = await tryUpdate("chat_threads", payload, q => q.eq("id", threadId));
        if (ok) return;
      }
    }

    async function sendDirectMessage(text) {
      const thread = await ensureDirectThread();
      const createdAt = nowIso();

      await insertChatMessage(thread.id, text, createdAt, currentUser.id);
      await updateThreadAfterMessage(thread.id, text, createdAt, currentUser.id);

      await createNotificationSafe(currentTargetUid, {
        type: "message",
        title: "New message",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        thread_id: thread.id,
        created_at: createdAt,
        is_read: false,
        read: false
      });

      currentThreadId = thread.id;
      currentThreadData = thread;

      setModeUI("chat");

      if (!messageChannels.length) {
        listenToMessages(thread.id);
      } else {
        scheduleMessageRefresh(thread.id);
      }

      notifyBadgeRefresh();
    }

    async function sendRequestMessage(text) {
      const existingPending = await loadRequestBetween(currentUser.id, currentTargetUid);

      if (existingPending && existingPending.status === "pending") {
        requestDocModel = existingPending;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(existingPending.id, "outgoing");
        return;
      }

      const createdAt = nowIso();

      const row = await insertWithFallback("message_requests", [
        {
          requester_id: currentUser.id,
          target_id: currentTargetUid,
          from_user_id: currentUser.id,
          to_user_id: currentTargetUid,
          text,
          message: text,
          status: "pending",
          created_at: createdAt,
          updated_at: createdAt
        },
        {
          requesterId: currentUser.id,
          targetId: currentTargetUid,
          fromUserId: currentUser.id,
          toUserId: currentTargetUid,
          text,
          message: text,
          status: "pending",
          createdAt: createdAt,
          updatedAt: createdAt
        },
        {
          requester_id: currentUser.id,
          target_id: currentTargetUid,
          text,
          status: "pending",
          created_at: createdAt
        }
      ]);

      requestDocModel = normalizeRequest(row, row?.id || "");

      await createNotificationSafe(currentTargetUid, {
        type: "message_request",
        title: "New message request",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message request.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        request_id: requestDocModel.id,
        created_at: createdAt,
        is_read: false,
        read: false
      });

      setModeUI("request_outgoing_pending");
      await listenToPendingRequest(requestDocModel.id, "outgoing");
      notifyBadgeRefresh();
    }

    async function updateMessageRequestStatus(requestId, status) {
      const now = nowIso();

      const payloads = status === "accepted"
        ? [
            { status: "accepted", accepted_at: now, accepted_by: currentUser.id, updated_at: now },
            { status: "accepted", acceptedAt: now, acceptedBy: currentUser.id, updatedAt: now },
            { status: "accepted" }
          ]
        : [
            { status: "declined", declined_at: now, declined_by: currentUser.id, updated_at: now },
            { status: "declined", declinedAt: now, declinedBy: currentUser.id, updatedAt: now },
            { status: "declined" }
          ];

      let worked = false;

      for (const payload of payloads) {
        const ok = await tryUpdate("message_requests", payload, q => q.eq("id", requestId));
        if (ok) worked = true;
      }

      if (!worked) throw new Error("Could not update request.");
    }

    async function createThreadFromRequest(requestModel) {
      let thread = await findExistingThreadByUsers(requestModel.requesterId, requestModel.targetId);
      const createdAt = nowIso();

      if (!thread) {
        const pair = getSortedPair(requestModel.requesterId, requestModel.targetId);

        const row = await insertWithFallback("chat_threads", [
          {
            type: "direct",
            status: "accepted",
            participant_a: pair[0],
            participant_b: pair[1],
            created_by: currentUser.id,
            accepted_from_request_id: requestModel.id,
            starter_text: requestModel.text || "",
            starter_from: requestModel.requesterId || "",
            created_at: createdAt,
            updated_at: createdAt,
            last_message_text: requestModel.text || "",
            last_message_at: requestModel.createdAt || createdAt,
            last_sender_id: requestModel.requesterId || ""
          },
          {
            type: "direct",
            status: "accepted",
            participantA: pair[0],
            participantB: pair[1],
            createdBy: currentUser.id,
            acceptedFromRequestId: requestModel.id,
            starterText: requestModel.text || "",
            starterFrom: requestModel.requesterId || "",
            createdAt: createdAt,
            updatedAt: createdAt,
            lastMessageText: requestModel.text || "",
            lastMessageAt: requestModel.createdAt || createdAt,
            lastSenderId: requestModel.requesterId || ""
          },
          {
            participant_a: pair[0],
            participant_b: pair[1],
            status: "accepted",
            created_at: createdAt
          }
        ]);

        thread = normalizeThread(row, row?.id || "");
      } else {
        const updatePayloads = [
          {
            status: "accepted",
            accepted_from_request_id: requestModel.id,
            starter_text: thread.starterText || requestModel.text || "",
            starter_from: thread.starterFrom || requestModel.requesterId || "",
            last_message_text: thread.lastMessageText || requestModel.text || "",
            last_message_at: thread.lastMessageAt || requestModel.createdAt || createdAt,
            last_sender_id: thread.lastSenderId || requestModel.requesterId || "",
            updated_at: createdAt
          },
          {
            status: "accepted",
            acceptedFromRequestId: requestModel.id,
            starterText: thread.starterText || requestModel.text || "",
            starterFrom: thread.starterFrom || requestModel.requesterId || "",
            lastMessageText: thread.lastMessageText || requestModel.text || "",
            lastMessageAt: thread.lastMessageAt || requestModel.createdAt || createdAt,
            lastSenderId: thread.lastSenderId || requestModel.requesterId || "",
            updatedAt: createdAt
          },
          { status: "accepted" }
        ];

        for (const payload of updatePayloads) {
          const ok = await tryUpdate("chat_threads", payload, q => q.eq("id", thread.id));
          if (ok) break;
        }
      }

      if (requestModel.text) {
        const existingMessages = await fetchMessages(thread.id);
        const alreadyHasStarter = existingMessages.some(msg =>
          msg.senderId === requestModel.requesterId &&
          String(msg.text || "").trim() === String(requestModel.text || "").trim()
        );

        if (!alreadyHasStarter) {
          try {
            await insertChatMessage(thread.id, requestModel.text, requestModel.createdAt || createdAt, requestModel.requesterId);
          } catch {}
        }
      }

      return thread;
    }

    async function acceptIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateMessageRequestStatus(requestDocModel.id, "accepted");
        markRequestTouched(requestDocModel.id).catch(() => {});

        const thread = await createThreadFromRequest(requestDocModel);

        await createNotificationSafe(requestDocModel.requesterId, {
          type: "message_request_accepted",
          title: "Message request accepted",
          text: `${currentViewerProfile?.displayName || "Someone"} accepted your message request.`,
          from_user_id: currentUser.id,
          to_user_id: requestDocModel.requesterId,
          thread_id: thread.id,
          request_id: requestDocModel.id,
          created_at: nowIso(),
          is_read: false,
          read: false
        });

        await openThread(thread);
        setPageMessage("Request accepted.", "ok");
        notifyBadgeRefresh();
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not accept request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function declineIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateMessageRequestStatus(requestDocModel.id, "declined");
        markRequestTouched(requestDocModel.id).catch(() => {});
        setModeUI("request_declined");
        setPageMessage("Request declined.", "ok");
        notifyBadgeRefresh();
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not decline request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function handleSend() {
      const text = messageInput.value.trim();
      if (!text) return;

      if (text.length > 2000) {
        setFormMessage("Message is too long. Keep it under 2000 characters.", "err");
        return;
      }

      if (!currentUser || !currentTargetUid) return;
      if (iBlockedTarget || targetBlockedMe) return;

      sendBtn.disabled = true;
      setFormMessage("");

      try {
        if (currentMode === "chat" || currentMode === "direct_new") {
          messageInput.value = "";
          autoResizeMessageBox();
          await sendDirectMessage(text);
          setFormMessage("Sent.", "ok");
        } else if (currentMode === "request_compose") {
          messageInput.value = "";
          autoResizeMessageBox();
          await sendRequestMessage(text);
          setFormMessage("Request sent.", "ok");
        }
      } catch (err) {
        console.error(err);
        setFormMessage(err?.message || "Could not send message.", "err");
        messageInput.value = text;
        autoResizeMessageBox();
      }

      sendBtn.disabled = false;
      messageInput.focus();
    }

    sendBtn.addEventListener("click", handleSend);
    acceptRequestBtn.addEventListener("click", acceptIncomingRequest);
    declineRequestBtn.addEventListener("click", declineIncomingRequest);

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "inbox.html";
    });

    function autoResizeMessageBox() {
      messageInput.style.height = "52px";
      const nextHeight = Math.min(messageInput.scrollHeight, 132);
      messageInput.style.height = nextHeight + "px";
    }

    messageInput.addEventListener("input", autoResizeMessageBox);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearAllListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;
      currentViewerProfile = await loadFullProfile(currentUser.id);

      const params = new URLSearchParams(window.location.search);
      const threadIdParam = (params.get("threadId") || params.get("thread_id") || "").trim();
      const uidParam = (params.get("uid") || params.get("userId") || params.get("user_id") || "").trim();

      if (!threadIdParam && !uidParam) {
        showBlocked("No conversation selected.");
        return;
      }

      try {
        if (threadIdParam) {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq("id", threadIdParam)
            .maybeSingle();

          if (error) throw error;

          if (!data) {
            showBlocked("Chat not found.");
            return;
          }

          const threadModel = normalizeThread(data, data.id);

          const isParticipant =
            threadModel.participantA === currentUser.id ||
            threadModel.participantB === currentUser.id;

          if (!isParticipant) {
            showBlocked("This chat is not available to you.");
            return;
          }

          if (threadModel.status === "accepted") {
            await openThread(threadModel);
          } else {
            currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;
            currentTargetProfile = await loadFullProfile(currentTargetUid);
            setHeader(currentTargetProfile);

            const incomingReq = await loadRequestBetween(currentTargetUid, currentUser.id);
            if (incomingReq && incomingReq.status === "pending") {
              requestDocModel = incomingReq;
              setModeUI("request_incoming_pending");
              markRequestTouched(incomingReq.id).catch(() => {});
              await listenToPendingRequest(incomingReq.id, "incoming");
            } else {
              const outgoingReq = await loadRequestBetween(currentUser.id, currentTargetUid);
              if (outgoingReq && outgoingReq.status === "pending") {
                requestDocModel = outgoingReq;
                setModeUI("request_outgoing_pending");
                await listenToPendingRequest(outgoingReq.id, "outgoing");
              } else {
                showBlocked("This request is no longer available.");
              }
            }
          }
        }

        if (uidParam) {
          if (uidParam === currentUser.id) {
            showBlocked("You cannot chat with yourself.");
            return;
          }

          await openByTargetUid(uidParam);
        }

        autoResizeMessageBox();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearAllListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showBlocked("Could not load chat.");
      }
    }

    window.addEventListener("beforeunload", () => {
      clearAllListeners();
    });

    initPage();

    /*
      OWNSPACE CHAT PERFORMANCE + READ FIX:

      FIXED:
      - Light theme is default now, but still respects osTheme / bwTheme.
      - Chat messages render first; read-update runs in the background.
      - This removes the 4s + 6s feeling caused by slow fallback read updates.
      - Broken tick text is replaced with clean SVG ticks.
      - Opening a chat marks incoming chat_messages as read/seen using detected schema columns.
      - Read update no longer sends one payload with many possibly-
