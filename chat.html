<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OwnSpace - Chat</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --red:#e74c66;
      --purple:#7f63ff;
      --mine:#dcf8f0;
      --other:#f1f5fb;
      --topbar-bg:rgba(255,255,255,.94);
      --composer-bg:rgba(255,255,255,.96);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.055);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --red:#ff5d73;
      --purple:#a78bfa;
      --mine:#123c4c;
      --other:#121f39;
      --topbar-bg:rgba(9,15,31,.92);
      --composer-bg:rgba(9,15,31,.96);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.13);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html,body{min-height:100%}

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 22%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow:hidden;
    }

    .app{
      width:min(760px, 100%);
      margin:0 auto;
      height:100vh;
      height:100dvh;
      padding:calc(6px + var(--safe-top)) 6px calc(6px + var(--safe-bottom));
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:6px;
    }

    .hidden{display:none!important}

    .topbar{
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      border-radius:14px;
      padding:5px 6px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      gap:6px;
      align-items:center;
      min-height:46px;
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      position:relative;
      flex-shrink:0;
    }

    .top-icon-btn svg{width:17px;height:17px;display:block}

    .chat-head{
      min-width:0;
      display:flex;
      align-items:center;
      gap:7px;
    }

    .chat-avatar,
    .chat-avatar-placeholder{
      width:34px;
      height:34px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--surface-3);
      flex-shrink:0;
    }

    .chat-avatar{object-fit:cover}

    .chat-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:7.5px;
      text-align:center;
      padding:4px;
      line-height:1.05;
      font-weight:900;
    }

    .chat-head-text{min-width:0;flex:1}

    .chat-title-row{
      display:flex;
      align-items:center;
      gap:5px;
      min-width:0;
    }

    .chat-title{
      font-size:13.5px;
      font-weight:950;
      color:var(--text);
      text-decoration:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.15;
      min-width:0;
    }

    .chat-title:hover{text-decoration:underline}

    .verified-badge{
      width:16px;
      height:16px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#fff;
      border:1.5px solid rgba(255,255,255,.92);
      box-shadow:0 0 0 2px rgba(32,199,111,.13);
      flex-shrink:0;
    }

    .verified-badge svg{width:9.5px;height:9.5px;display:block}

    .chat-subline{
      margin-top:1px;
      display:flex;
      align-items:center;
      gap:5px;
      min-width:0;
      flex-wrap:nowrap;
    }

    .chat-username{
      color:var(--blue);
      font-size:10px;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:150px;
      line-height:1.15;
    }

    .chat-state{
      color:var(--muted);
      font-size:10px;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.15;
    }

    .state-dot{
      width:5px;
      height:5px;
      border-radius:50%;
      background:var(--green);
      display:inline-block;
      flex-shrink:0;
    }

    .page-message{
      min-height:0;
      font-size:11.5px;
      line-height:1.35;
      padding:0 3px;
      color:var(--muted);
    }

    .page-message:not(:empty){min-height:16px}
    .page-message.ok{color:#16a34a}
    .page-message.err{color:#e11d48}
    html[data-theme="dark"] .page-message.ok{color:#86efac}
    html[data-theme="dark"] .page-message.err{color:#fda4af}

    .chat-stage{
      min-height:0;
      display:grid;
      grid-template-rows:1fr;
      position:relative;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:0;
    }

    .blocked-panel,
    .request-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:9px;
      align-self:start;
    }

    .blocked-box,
    .request-box{
      background:var(--surface-2);
      border:1px dashed var(--line);
      border-radius:14px;
      padding:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.5;
      font-size:12.5px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .request-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
      justify-content:center;
    }

    .action-btn{
      border:none;
      border-radius:11px;
      padding:8px 10px;
      font-size:11px;
      font-weight:950;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:32px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      text-decoration:none;
    }

    .action-btn svg{width:13px;height:13px;display:block}
    .action-btn:disabled{opacity:.65;cursor:not-allowed}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}

    .messages-panel{
      display:grid;
      grid-template-rows:auto 1fr;
      min-height:0;
    }

    .messages-toolbar{
      padding:7px 9px;
      border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .toolbar-title{
      font-size:9.5px;
      font-weight:950;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .toolbar-chip{
      font-size:10px;
      font-weight:950;
      color:var(--text);
      background:rgba(76,201,255,.12);
      border:1px solid rgba(76,201,255,.18);
      border-radius:999px;
      padding:4px 7px;
      white-space:nowrap;
      line-height:1;
    }

    .messages-body{
      min-height:0;
      overflow:auto;
      padding:9px;
      display:flex;
      flex-direction:column;
      gap:7px;
      scroll-behavior:smooth;
      background:
        radial-gradient(circle at 18% 8%, rgba(76,201,255,.04), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(61,220,132,.04), transparent 24%),
        var(--surface);
    }

    .messages-loading,
    .messages-empty{
      margin:auto;
      width:min(420px, 100%);
      padding:14px 11px;
      border-radius:14px;
      border:1px dashed var(--line);
      background:var(--surface-2);
      color:var(--muted);
      text-align:center;
      font-size:12.5px;
      line-height:1.5;
    }

    .messages-list{
      display:flex;
      flex-direction:column;
      gap:7px;
      width:100%;
    }

    .day-divider{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:9px;
      font-weight:950;
      margin:4px 0;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .day-divider::before,
    .day-divider::after{
      content:"";
      height:1px;
      background:var(--line);
      flex:1;
    }

    .bubble-row{
      width:100%;
      display:flex;
      align-items:flex-end;
      gap:6px;
    }

    .bubble-row.mine{justify-content:flex-end}
    .bubble-row.other{justify-content:flex-start}

    .bubble{
      max-width:min(78%, 560px);
      border:1px solid var(--line);
      border-radius:17px;
      padding:8px 9px 7px;
      box-shadow:var(--soft-shadow);
      position:relative;
    }

    .bubble.mine{
      background:var(--mine);
      border-color:rgba(76,201,255,.16);
      border-bottom-right-radius:6px;
    }

    .bubble.other{
      background:var(--other);
      border-color:var(--line);
      border-bottom-left-radius:6px;
    }

    .bubble-text{
      color:var(--text);
      font-size:13px;
      line-height:1.43;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .bubble-meta{
      margin-top:5px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:5px;
      color:var(--muted);
      font-size:9.5px;
      white-space:nowrap;
    }

    .read-tick{
      color:var(--green);
      font-weight:950;
      letter-spacing:-.10em;
      font-size:10.5px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      min-width:12px;
    }

    .composer-panel{
      background:var(--composer-bg);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      border-radius:16px;
      padding:6px;
      min-height:56px;
    }

    .composer{display:grid;gap:4px}

    .input-row{
      display:grid;
      grid-template-columns:1fr 42px;
      gap:6px;
      align-items:end;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:10px 12px;
      border-radius:14px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:13px;
      min-height:42px;
      max-height:112px;
      line-height:1.35;
    }

    .input::placeholder{color:var(--muted)}

    .send-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(61,220,132,.20), rgba(61,220,132,.12));
      color:var(--text);
      border:1px solid rgba(61,220,132,.25);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .send-btn svg{width:17px;height:17px;display:block}
    .send-btn:disabled{opacity:.65;cursor:not-allowed}

    .form-message{
      min-height:0;
      font-size:10.5px;
      line-height:1.25;
      padding:0 3px;
      color:var(--muted);
    }

    .form-message:not(:empty){min-height:14px}
    .form-message.ok{color:#16a34a}
    .form-message.err{color:#e11d48}
    html[data-theme="dark"] .form-message.ok{color:#86efac}
    html[data-theme="dark"] .form-message.err{color:#fda4af}

    .composer-note{
      color:var(--muted);
      font-size:10px;
      line-height:1.25;
      padding:0 3px;
    }

    .composer-note:empty{display:none}

    .utility-hidden{display:none}

    @media(max-width:700px){
      .app{
        padding:calc(6px + var(--safe-top)) 6px calc(6px + var(--safe-bottom));
        gap:6px;
      }

      .topbar{
        border-radius:14px;
        grid-template-columns:34px 1fr 34px;
      }

      .top-icon-btn{width:34px;height:34px}
      .chat-avatar,.chat-avatar-placeholder{width:33px;height:33px}
      .chat-title{font-size:13px}
      .chat-username{max-width:112px}
      .messages-body{padding:8px}
      .bubble{max-width:84%}
      .composer-panel{border-radius:16px}
    }

    @media(max-width:390px){
      .bubble{max-width:88%}
      .chat-username{max-width:88px}
      .chat-state{font-size:9.5px}
      .bubble-text{font-size:12.8px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="chat-head">
        <img id="avatar" class="chat-avatar hidden" alt="User photo" />
        <div id="avatarPlaceholder" class="chat-avatar-placeholder">No photo</div>

        <div class="chat-head-text">
          <div class="chat-title-row">
            <a id="targetNameLink" href="#" class="chat-title">OwnSpace Chat</a>
            <span id="verifiedDot" class="verified-badge hidden" title="Verified">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </span>
          </div>

          <div class="chat-subline">
            <span id="targetUsername" class="chat-username hidden">@username</span>
            <span class="state-dot" aria-hidden="true"></span>
            <span id="topSub" class="chat-state">Loading...</span>
          </div>
        </div>
      </div>

      <a id="profileBtn" href="profile.html" class="top-icon-btn" aria-label="View profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="pageMessage" class="page-message"></div>

    <div class="utility-hidden">
      <span id="modeChip">Chat</span>
      <span id="statusChip">Loading</span>
      <a id="memberProfileBtn" href="#">Profile</a>
      <div id="targetBio"></div>
    </div>

    <div class="chat-stage">
      <div id="blockedPanel" class="blocked-panel hidden">
        <div id="blockedText" class="blocked-box">This conversation is not available.</div>
      </div>

      <div id="requestInfoPanel" class="request-panel hidden">
        <div id="requestInfoBox" class="request-box">
          You can send one message request. They must accept it before full chat opens.
        </div>

        <div id="requestActionRow" class="request-actions hidden">
          <button id="acceptRequestBtn" class="action-btn btn-green" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
            Accept Request
          </button>

          <button id="declineRequestBtn" class="action-btn btn-red" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
            Decline
          </button>
        </div>

        <div id="requestPreviewBox" class="request-box hidden" style="margin-top:8px;"></div>
      </div>

      <div id="messagesPanel" class="messages-panel panel hidden">
        <div class="messages-toolbar">
          <div class="toolbar-title">Conversation</div>
          <div id="toolbarChip" class="toolbar-chip">Direct chat</div>
        </div>

        <div id="messagesBody" class="messages-body">
          <div id="messagesLoading" class="messages-loading hidden">Loading messages...</div>
          <div id="messagesEmpty" class="messages-empty hidden">No messages yet. Say hello.</div>
          <div id="messagesList" class="messages-list hidden"></div>
        </div>
      </div>
    </div>

    <div id="composerPanel" class="composer-panel hidden">
      <div class="composer">
        <div class="input-row">
          <textarea id="messageInput" class="input" placeholder="Write your message..."></textarea>

          <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 2 11 13"></path>
              <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
            </svg>
          </button>
        </div>

        <div id="formMessage" class="form-message"></div>
        <div id="composerNote" class="composer-note"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const topSub = document.getElementById("topSub");
    const toolbarChip = document.getElementById("toolbarChip");
    const profileBtn = document.getElementById("profileBtn");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const targetNameLink = document.getElementById("targetNameLink");
    const verifiedDot = document.getElementById("verifiedDot");
    const targetUsername = document.getElementById("targetUsername");
    const targetBio = document.getElementById("targetBio");
    const modeChip = document.getElementById("modeChip");
    const statusChip = document.getElementById("statusChip");
    const memberProfileBtn = document.getElementById("memberProfileBtn");

    const pageMessage = document.getElementById("pageMessage");

    const blockedPanel = document.getElementById("blockedPanel");
    const blockedText = document.getElementById("blockedText");

    const messagesPanel = document.getElementById("messagesPanel");
    const messagesBody = document.getElementById("messagesBody");
    const messagesLoading = document.getElementById("messagesLoading");
    const messagesList = document.getElementById("messagesList");
    const messagesEmpty = document.getElementById("messagesEmpty");

    const requestInfoPanel = document.getElementById("requestInfoPanel");
    const requestInfoBox = document.getElementById("requestInfoBox");
    const requestActionRow = document.getElementById("requestActionRow");
    const requestPreviewBox = document.getElementById("requestPreviewBox");
    const acceptRequestBtn = document.getElementById("acceptRequestBtn");
    const declineRequestBtn = document.getElementById("declineRequestBtn");

    const composerPanel = document.getElementById("composerPanel");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const formMessage = document.getElementById("formMessage");
    const composerNote = document.getElementById("composerNote");

    let currentUser = null;
    let currentViewerProfile = null;
    let currentTargetUid = "";
    let currentTargetProfile = null;
    let currentThreadId = "";
    let currentThreadData = null;
    let currentMode = "loading";
    let requestDocModel = null;

    let messageChannel = null;
    let requestChannel = null;
    let threadChannel = null;
    let refreshTimer = null;
    let readRefreshTimer = null;

    let iBlockedTarget = false;
    let targetBlockedMe = false;
    let isMarkingRead = false;

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setPageMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `page-message ${type}`;
    }

    function setFormMessage(text = "", type = "") {
      formMessage.textContent = text;
      formMessage.className = `form-message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }
      return "";
    }

    function normalizeStatus(value, fallback = "") {
      return String(value || fallback || "").trim().toLowerCase();
    }

    function getSortedPair(a, b) {
      return [a, b].sort((x, y) => x.localeCompare(y));
    }

    function tsMs(ts) {
      if (!ts) return 0;
      const n = new Date(ts).getTime();
      return Number.isFinite(n) ? n : 0;
    }

    function formatTime(ts) {
      if (!ts) return "Just now";
      try {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "Just now";
        return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      } catch {
        return "Just now";
      }
    }

    function formatDay(ts) {
      if (!ts) return "Today";

      try {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "Today";

        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(today.getDate() - 1);

        const key = d.toDateString();

        if (key === today.toDateString()) return "Today";
        if (key === yesterday.toDateString()) return "Yesterday";

        return d.toLocaleDateString([], {
          month: "short",
          day: "numeric",
          year: d.getFullYear() === today.getFullYear() ? undefined : "numeric"
        });
      } catch {
        return "Today";
      }
    }

    function notifyBadgeRefresh() {
      const stamp = String(Date.now());

      try {
        localStorage.setItem("ownspace_chat_read_refresh", stamp);
        localStorage.setItem("ownspace_inbox_refresh", stamp);
        localStorage.setItem("ownspace_badges_refresh", stamp);
      } catch {}

      try { window.dispatchEvent(new CustomEvent("ownspace:chat-read-refresh")); } catch {}
      try { window.dispatchEvent(new CustomEvent("ownspace:inbox-refresh")); } catch {}
      try { window.dispatchEvent(new CustomEvent("ownspace:badges-refresh")); } catch {}

      try {
        if (window.OwnSpaceBadges && typeof window.OwnSpaceBadges.refresh === "function") {
          window.OwnSpaceBadges.refresh();
        }
      } catch {}
    }

    function isColumnOrSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("could not find") ||
        msg.includes("schema cache") ||
        msg.includes("column") ||
        msg.includes("does not exist") ||
        msg.includes("relation")
      );
    }

    async function tryUpdate(table, payload, buildQuery) {
      try {
        let q = supabase.from(table).update(payload);
        q = buildQuery(q);
        const { error } = await q;

        if (error) {
          if (!isColumnOrSchemaError(error)) {
            console.warn("Update failed:", table, error.message);
          }
          return false;
        }

        return true;
      } catch (err) {
        console.warn("Update exception:", table, err?.message || err);
        return false;
      }
    }

    async function tryInsert(table, payload) {
      try {
        const { data, error } = await supabase.from(table).insert(payload).select("*").maybeSingle();
        if (!error) return { ok: true, data: data || null };
        return { ok: false, error };
      } catch (error) {
        return { ok: false, error };
      }
    }

    async function insertWithFallback(table, payloads) {
      let lastError = null;

      for (const payload of payloads) {
        const result = await tryInsert(table, payload);
        if (result.ok) return result.data;
        lastError = result.error || lastError;
      }

      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    async function markThreadNotificationsReadFast(threadId) {
      if (!currentUser?.id || !threadId) return;

      const now = nowIso();

      const payloads = [
        { is_read: true, read: true, read_at: now, updated_at: now },
        { is_read: true, read_at: now, updated_at: now },
        { is_read: true, updated_at: now },
        { is_read: true }
      ];

      for (const payload of payloads) {
        const ok1 = await tryUpdate("notifications", payload, q =>
          q.eq("user_id", currentUser.id)
           .eq("thread_id", threadId)
        );

        const ok2 = await tryUpdate("notifications", payload, q =>
          q.eq("to_user_id", currentUser.id)
           .eq("thread_id", threadId)
        );

        if (ok1 || ok2) break;
      }
    }

    async function markRequestNotificationsReadFast(requestId) {
      if (!currentUser?.id || !requestId) return;

      const now = nowIso();

      const payloads = [
        { is_read: true, read: true, read_at: now, updated_at: now },
        { is_read: true, read_at: now, updated_at: now },
        { is_read: true, updated_at: now },
        { is_read: true }
      ];

      for (const payload of payloads) {
        const ok1 = await tryUpdate("notifications", payload, q =>
          q.eq("user_id", currentUser.id)
           .eq("request_id", requestId)
        );

        const ok2 = await tryUpdate("notifications", payload, q =>
          q.eq("to_user_id", currentUser.id)
           .eq("request_id", requestId)
        );

        if (ok1 || ok2) break;
      }
    }

    async function markRequestTouchedFast(requestId) {
      if (!currentUser?.id || !requestId) return;

      const now = nowIso();

      tryUpdate("message_requests", {
        seen_at: now,
        read_at: now,
        is_read: true,
        read: true,
        updated_at: now
      }, q => q.eq("id", requestId)).catch(() => {});

      markRequestNotificationsReadFast(requestId).catch(() => {});
      notifyBadgeRefresh();
    }

    async function markMessagesSeenFast(threadId) {
      if (!threadId || !currentUser?.id || isMarkingRead) return;

      isMarkingRead = true;

      try {
        const now = nowIso();

        await tryUpdate("chat_messages", {
          seen_at: now,
          read_at: now,
          is_read: true,
          read: true,
          updated_at: now
        }, q =>
          q.eq("thread_id", threadId)
           .neq("sender_id", currentUser.id)
        );

        markThreadNotificationsReadFast(threadId).catch(() => {});
        notifyBadgeRefresh();
      } finally {
        isMarkingRead = false;
      }
    }

    function scheduleReadCleanup(delay = 450) {
      clearTimeout(readRefreshTimer);

      readRefreshTimer = setTimeout(() => {
        if (currentThreadId && currentUser?.id && currentMode === "chat") {
          markMessagesSeenFast(currentThreadId).catch(() => {});
        }
      }, delay);
    }

        ...(userRow || {}),

    async function fetchMessages(threadId) {
      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .eq("thread_id", threadId)
          .order("created_at", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      return [];
    }

    function getMessageReadState(msg) {
      return !!(msg.seenAt || msg.readAt || msg.isRead === true || msg.read === true);
    }

    function renderMessages(messages) {
      messagesLoading.classList.add("hidden");
      messagesList.innerHTML = "";
      messagesList.className = "messages-list";

      const finalMessages = [...messages].sort((a, b) => tsMs(a.createdAt) - tsMs(b.createdAt));

      if (!finalMessages.length && currentThreadData?.starterText) {
        finalMessages.push({
          id: "starter-fallback",
          threadId: currentThreadId,
          senderId: currentThreadData.starterFrom || currentTargetUid,
          text: currentThreadData.starterText,
          createdAt: currentThreadData.createdAt || currentThreadData.lastMessageAt || null,
          seenAt: null,
          readAt: null,
          isRead: false,
          read: false
        });
      }

      if (!finalMessages.length) {
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        return;
      }

      messagesEmpty.classList.add("hidden");
      messagesList.classList.remove("hidden");

      let lastDay = "";

      finalMessages.forEach(msg => {
        const day = formatDay(msg.createdAt);

        if (day !== lastDay) {
          lastDay = day;
          const divider = document.createElement("div");
          divider.className = "day-divider";
          divider.textContent = day;
          messagesList.appendChild(divider);
        }

        const mine = msg.senderId === currentUser.id;

        const row = document.createElement("div");
        row.className = `bubble-row ${mine ? "mine" : "other"}`;

        const tickHtml = getMessageReadState(msg) ? "&#10003;&#10003;" : "&#10003;";

        row.innerHTML = `
          <div class="bubble ${mine ? "mine" : "other"}">
            <div class="bubble-text">${escapeHtml(msg.text || "")}</div>
            <div class="bubble-meta">
              <span>${escapeHtml(formatTime(msg.createdAt))}</span>
              ${mine ? `<span class="read-tick">${tickHtml}</span>` : ""}
            </div>
          </div>
        `;

        messagesList.appendChild(row);
      });

      scrollMessagesToBottom();
    }

        messagesEmpty.textContent = "Could not load messages.";

    function listenToMessages(threadId) {
      clearMessageListener();

      messagesPanel.classList.remove("hidden");
      messagesLoading.classList.remove("hidden");
      messagesList.classList.add("hidden");
      messagesEmpty.classList.add("hidden");

      refreshMessages(threadId, true);

      messageChannel = supabase
        .channel(`ownspace-chat-messages-${threadId}-${Math.random().toString(36).slice(2)}`)
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "chat_messages",
            filter: `thread_id=eq.${threadId}`
          },
          () => {
            scheduleMessageRefresh(threadId);
            scheduleReadCleanup(650);
          }
        )
        .subscribe();

      threadChannel = supabase
        .channel(`ownspace-chat-thread-${threadId}-${Math.random().toString(36).slice(2)}`)
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "chat_threads",
            filter: `id=eq.${threadId}`
          },
          async (payload) => {
            if (payload?.new) {
              currentThreadData = normalizeThread(payload.new, payload.new.id);
            }
          }
        )
        .subscribe();
    }

    async function findExistingThreadByUsers(uidA, uidB) {
      const attempts = [
        ["participant_a", uidA, "participant_b", uidB],
        ["participant_a", uidB, "participant_b", uidA]
      ];

      for (const [colA, valA, colB, valB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq(colA, valA)
            .eq(colB, valB)
            .limit(1);

          if (!error && data && data.length) {
            return normalizeThread(data[0], data[0].id);
          }
        } catch {}
      }

      return null;
    }

    async function loadRequestBetween(requesterId, targetId) {
      const attempts = [
        ["requester_id", requesterId, "target_id", targetId, "created_at"],
        ["from_user_id", requesterId, "to_user_id", targetId, "created_at"],
        ["sender_id", requesterId, "receiver_id", targetId, "created_at"]
      ];

      for (const [colA, valA, colB, valB, orderCol] of attempts) {
        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(colA, valA)
            .eq(colB, valB)
            .order(orderCol, { ascending: false })
            .limit(1);

          if (!error && data && data.length) return normalizeRequest(data[0], data[0].id);
        } catch {}
      }

      return null;
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;

      const createdAt = payload.created_at || payload.createdAt || nowIso();

      const variants = [
        {
          ...payload,
          from_user_id: currentUser.id,
          to_user_id: targetUid,
          user_id: targetUid,
          created_at: createdAt,
          is_read: false,
          read: false
        },
        {
          type: payload.type || "notification",
          text: payload.text || "",
          from_user_id: currentUser.id,
          to_user_id: targetUid,
          user_id: targetUid,
          thread_id: payload.thread_id || "",
          request_id: payload.request_id || "",
          created_at: createdAt,
          is_read: false
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function checkFollowing(viewerUid, targetUid) {
      const attempts = [
        ["follower_id", viewerUid, "following_id", targetUid],
        ["from_user_id", viewerUid, "to_user_id", targetUid]
      ];

      for (const [colA, valA, colB, valB] of attempts) {
        try {
          const { data, error } = await supabase
            .from("follows")
            .select("id")
            .eq(colA, valA)
            .eq(colB, valB)
            .limit(1);

          if (!error) return !!(data && data.length);
        } catch {}
      }

      return false;
    }

    async function openThread(threadModel) {
      clearAllListeners();

      currentThreadId = threadModel.id;
      currentThreadData = threadModel;
      currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;

      setTemporaryHeader(currentTargetUid);
      setModeUI("chat");
      topSub.textContent = "Opening chat...";
      listenToMessages(currentThreadId);

      currentTargetProfile = await loadFullProfile(currentTargetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(currentTargetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      setModeUI("chat");

      setTimeout(() => {
        markMessagesSeenFast(currentThreadId).catch(() => {});
      }, 700);
    }

    async function listenToPendingRequest(requestId, direction) {
      clearRequestListener();

      if (direction === "incoming") {
        markRequestTouchedFast(requestId).catch(() => {});
      }

      requestChannel = supabase
        .channel(`ownspace-message-request-${requestId}-${Math.random().toString(36).slice(2)}`)
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "message_requests",
            filter: `id=eq.${requestId}`
          },
          async () => {
            try {
              const { data, error } = await supabase
                .from("message_requests")
                .select("*")
                .eq("id", requestId)
                .maybeSingle();

              if (error || !data) return;

              requestDocModel = normalizeRequest(data, data.id);

              if (direction === "incoming") {
                markRequestTouchedFast(requestId).catch(() => {});
              }

              if (requestDocModel.status === "accepted") {
                let thread = null;

                for (let i = 0; i < 5; i++) {
                  thread = await findExistingThreadByUsers(requestDocModel.requesterId, requestDocModel.targetId);
                  if (thread) break;
                  await sleep(250);
                }

                if (thread) {
                  await openThread(thread);
                  setPageMessage("Request accepted.", "ok");
                  return;
                }
              }

              if (requestDocModel.status === "declined") {
                setModeUI("request_declined");
                return;
              }

              setModeUI(direction === "incoming" ? "request_incoming_pending" : "request_outgoing_pending");
            } catch (err) {
              console.error(err);
            }
          }
        )
        .subscribe();
    }

    async function openByTargetUid(targetUid) {
      clearAllListeners();

      currentTargetUid = targetUid;
      setTemporaryHeader(targetUid);

      currentTargetProfile = await loadFullProfile(targetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(targetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      const existingThread = await findExistingThreadByUsers(currentUser.id, targetUid);

      if (existingThread && existingThread.status === "accepted") {
        await openThread(existingThread);
        return;
      }

      const outgoingReq = await loadRequestBetween(currentUser.id, targetUid);
      if (outgoingReq && outgoingReq.status === "pending") {
        requestDocModel = outgoingReq;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(outgoingReq.id, "outgoing");
        return;
      }

      const incomingReq = await loadRequestBetween(targetUid, currentUser.id);
      if (incomingReq && incomingReq.status === "pending") {
        requestDocModel = incomingReq;
        setModeUI("request_incoming_pending");
        markRequestTouchedFast(incomingReq.id).catch(() => {});
        await listenToPendingRequest(incomingReq.id, "incoming");
        return;
      }

      const iFollowTarget = await checkFollowing(currentUser.id, targetUid);

      if (iFollowTarget) {
        currentThreadId = "";
        currentThreadData = null;
        setModeUI("direct_new");
        return;
      }

      setModeUI("request_compose");
    }

    async function ensureDirectThread() {
      if (currentThreadId) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq("id", currentThreadId)
            .maybeSingle();

          if (!error && data) {
            currentThreadData = normalizeThread(data, data.id);
            return currentThreadData;
          }
        } catch {}
      }

      const existing = await findExistingThreadByUsers(currentUser.id, currentTargetUid);

      if (existing) {
        currentThreadId = existing.id;
        currentThreadData = existing;
        return existing;
      }

      const pair = getSortedPair(currentUser.id, currentTargetUid);
      const createdAt = nowIso();

      const created = await insertWithFallback("chat_threads", [
        {
          type: "direct",
          status: "accepted",
          participant_a: pair[0],
          participant_b: pair[1],
          created_by: currentUser.id,
          created_at: createdAt,
          updated_at: createdAt,
          last_message_text: "",
          last_message_at: createdAt,
          last_sender_id: ""
        },
        {
          participant_a: pair[0],
          participant_b: pair[1],
          status: "accepted",
          created_at: createdAt
        }
      ]);

      const thread = normalizeThread(created, created?.id || "");
      currentThreadId = thread.id;
      currentThreadData = thread;
      return thread;
    }

    async function insertChatMessage(threadId, text, createdAt, senderId = currentUser.id) {
      await insertWithFallback("chat_messages", [
        {
          thread_id: threadId,
          sender_id: senderId,
          text,
          created_at: createdAt,
          seen_at: null,
          read_at: null,
          is_read: false,
          read: false
        },
        {
          thread_id: threadId,
          sender_id: senderId,
          text,
          created_at: createdAt
        }
      ]);
    }

    async function updateThreadAfterMessage(threadId, text, createdAt, senderId = currentUser.id) {
      const payloads = [
        {
          status: "accepted",
          last_message_text: text,
          last_message_at: createdAt,
          last_sender_id: senderId,
          updated_at: createdAt
        },
        {
          last_message_text: text,
          last_message_at: createdAt,
          last_sender_id: senderId
        }
      ];

      for (const payload of payloads) {
        const ok = await tryUpdate("chat_threads", payload, q => q.eq("id", threadId));
        if (ok) return;
      }
    }

    async function sendDirectMessage(text) {
      const thread = await ensureDirectThread();
      const createdAt = nowIso();

      await insertChatMessage(thread.id, text, createdAt, currentUser.id);
      await updateThreadAfterMessage(thread.id, text, createdAt, currentUser.id);

      createNotificationSafe(currentTargetUid, {
        type: "message",
        title: "New message",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        thread_id: thread.id,
        created_at: createdAt,
        is_read: false,
        read: false
      }).catch(() => {});

      currentThreadId = thread.id;
      currentThreadData = thread;
      setModeUI("chat");
      listenToMessages(thread.id);
      notifyBadgeRefresh();
    }

    async function sendRequestMessage(text) {
      const existingPending = await loadRequestBetween(currentUser.id, currentTargetUid);

      if (existingPending && existingPending.status === "pending") {
        requestDocModel = existingPending;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(existingPending.id, "outgoing");
        return;
      }

      const createdAt = nowIso();

      const row = await insertWithFallback("message_requests", [
        {
          requester_id: currentUser.id,
          target_id: currentTargetUid,
          from_user_id: currentUser.id,
          to_user_id: currentTargetUid,
          text,
          message: text,
          status: "pending",
          created_at: createdAt,
          updated_at: createdAt
        },
        {
          requester_id: currentUser.id,
          target_id: currentTargetUid,
          text,
          status: "pending",
          created_at: createdAt
        }
      ]);

      requestDocModel = normalizeRequest(row, row?.id || "");

      createNotificationSafe(currentTargetUid, {
        type: "message_request",
        title: "New message request",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message request.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        request_id: requestDocModel.id,
        created_at: createdAt,
        is_read: false,
        read: false
      }).catch(() => {});

      setModeUI("request_outgoing_pending");
      await listenToPendingRequest(requestDocModel.id, "outgoing");
      notifyBadgeRefresh();
    }

    async function updateMessageRequestStatus(requestId, status) {
      const now = nowIso();

      const payload = status === "accepted"
        ? { status: "accepted", accepted_at: now, accepted_by: currentUser.id, updated_at: now }
        : { status: "declined", declined_at: now, declined_by: currentUser.id, updated_at: now };

      const ok = await tryUpdate("message_requests", payload, q => q.eq("id", requestId));

      if (!ok) {
        const fallbackOk = await tryUpdate("message_requests", { status }, q => q.eq("id", requestId));
        if (!fallbackOk) throw new Error("Could not update request.");
      }
    }

    async function createThreadFromRequest(requestModel) {
      let thread = await findExistingThreadByUsers(requestModel.requesterId, requestModel.targetId);
      const createdAt = nowIso();

      if (!thread) {
        const pair = getSortedPair(requestModel.requesterId, requestModel.targetId);

        const row = await insertWithFallback("chat_threads", [
          {
            type: "direct",
            status: "accepted",
            participant_a: pair[0],
            participant_b: pair[1],
            created_by: currentUser.id,
            accepted_from_request_id: requestModel.id,
            starter_text: requestModel.text || "",
            starter_from: requestModel.requesterId || "",
            created_at: createdAt,
            updated_at: createdAt,
            last_message_text: requestModel.text || "",
            last_message_at: requestModel.createdAt || createdAt,
            last_sender_id: requestModel.requesterId || ""
          },
          {
            participant_a: pair[0],
            participant_b: pair[1],
            status: "accepted",
            created_at: createdAt
          }
        ]);

        thread = normalizeThread(row, row?.id || "");
      } else {
        await tryUpdate("chat_threads", {
          status: "accepted",
          accepted_from_request_id: requestModel.id,
          starter_text: thread.starterText || requestModel.text || "",
          starter_from: thread.starterFrom || requestModel.requesterId || "",
          last_message_text: thread.lastMessageText || requestModel.text || "",
          last_message_at: thread.lastMessageAt || requestModel.createdAt || createdAt,
          last_sender_id: thread.lastSenderId || requestModel.requesterId || "",
          updated_at: createdAt
        }, q => q.eq("id", thread.id));
      }

      if (requestModel.text) {
        const existingMessages = await fetchMessages(thread.id);
        const alreadyHasStarter = existingMessages.some(msg =>
          msg.senderId === requestModel.requesterId &&
          String(msg.text || "").trim() === String(requestModel.text || "").trim()
        );

        if (!alreadyHasStarter) {
          try {
            await insertChatMessage(thread.id, requestModel.text, requestModel.createdAt || createdAt, requestModel.requesterId);
          } catch {}
        }
      }

      return thread;
    }

    async function acceptIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateMessageRequestStatus(requestDocModel.id, "accepted");
        markRequestTouchedFast(requestDocModel.id).catch(() => {});

        const thread = await createThreadFromRequest(requestDocModel);

        createNotificationSafe(requestDocModel.requesterId, {
          type: "message_request_accepted",
          title: "Message request accepted",
          text: `${currentViewerProfile?.displayName || "Someone"} accepted your message request.`,
          from_user_id: currentUser.id,
          to_user_id: requestDocModel.requesterId,
          thread_id: thread.id,
          request_id: requestDocModel.id,
          created_at: nowIso(),
          is_read: false,
          read: false
        }).catch(() => {});

        await openThread(thread);
        setPageMessage("Request accepted.", "ok");
        notifyBadgeRefresh();
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not accept request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function declineIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateMessageRequestStatus(requestDocModel.id, "declined");
        markRequestTouchedFast(requestDocModel.id).catch(() => {});
        setModeUI("request_declined");
        setPageMessage("Request declined.", "ok");
        notifyBadgeRefresh();
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not decline request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function handleSend() {
      const text = messageInput.value.trim();
      if (!text) return;

      if (text.length > 2000) {
        setFormMessage("Message is too long. Keep it under 2000 characters.", "err");
        return;
      }

      if (!currentUser || !currentTargetUid) return;
      if (iBlockedTarget || targetBlockedMe) return;

      sendBtn.disabled = true;
      setFormMessage("");

      try {
        if (currentMode === "chat" || currentMode === "direct_new") {
          messageInput.value = "";
          autoResizeMessageBox();
          await sendDirectMessage(text);
          setFormMessage("Sent.", "ok");
        } else if (currentMode === "request_compose") {
          messageInput.value = "";
          autoResizeMessageBox();
          await sendRequestMessage(text);
          setFormMessage("Request sent.", "ok");
        }
      } catch (err) {
        console.error(err);
        setFormMessage(err?.message || "Could not send message.", "err");
        messageInput.value = text;
        autoResizeMessageBox();
      }

      sendBtn.disabled = false;
      messageInput.focus();
    }

    sendBtn.addEventListener("click", handleSend);
    acceptRequestBtn.addEventListener("click", acceptIncomingRequest);
    declineRequestBtn.addEventListener("click", declineIncomingRequest);

    backBtn.addEventListener("click", () => {
      if (currentThreadId) {
        markMessagesSeenFast(currentThreadId).catch(() => {});
      }

      notifyBadgeRefresh();

      setTimeout(() => {
        if (document.referrer) history.back();
        else window.location.href = "inbox.html";
      }, 80);
    });

    function autoResizeMessageBox() {
      messageInput.style.height = "42px";
      const nextHeight = Math.min(messageInput.scrollHeight, 112);
      messageInput.style.height = nextHeight + "px";
    }

    messageInput.addEventListener("input", autoResizeMessageBox);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && currentThreadId) {
        markMessagesSeenFast(currentThreadId).catch(() => {});
      }
    });

    window.addEventListener("pageshow", () => {
      if (currentThreadId) {
        markMessagesSeenFast(currentThreadId).catch(() => {});
      }
    });

    window.addEventListener("focus", () => {
      if (currentThreadId) {
        markMessagesSeenFast(currentThreadId).catch(() => {});
      }
    });

    messagesBody.addEventListener("scroll", () => {
      if (currentThreadId && currentMode === "chat") {
        scheduleReadCleanup(900);
      }
    }, { passive: true });

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearAllListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      loadFullProfile(currentUser.id).then(profile => {
        currentViewerProfile = profile;
      }).catch(() => {
        currentViewerProfile = normalizeProfile({}, currentUser.id);
      });

      const params = new URLSearchParams(window.location.search);
      const threadIdParam = (params.get("threadId") || params.get("thread_id") || "").trim();
      const uidParam = (params.get("uid") || params.get("userId") || params.get("user_id") || "").trim();

      if (!threadIdParam && !uidParam) {
        showBlocked("No conversation selected.");
        return;
      }

      try {
        if (threadIdParam) {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq("id", threadIdParam)
            .maybeSingle();

          if (error) throw error;

          if (!data) {
            showBlocked("Chat not found.");
            return;
          }

          const threadModel = normalizeThread(data, data.id);

          const isParticipant =
            threadModel.participantA === currentUser.id ||
            threadModel.participantB === currentUser.id;

          if (!isParticipant) {
            showBlocked("This chat is not available to you.");
            return;
          }

          if (threadModel.status === "accepted") {
            await openThread(threadModel);
          } else {
            currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;
            setTemporaryHeader(currentTargetUid);
            currentTargetProfile = await loadFullProfile(currentTargetUid);
            setHeader(currentTargetProfile);

            const incomingReq = await loadRequestBetween(currentTargetUid, currentUser.id);

            if (incomingReq && incomingReq.status === "pending") {
              requestDocModel = incomingReq;
              setModeUI("request_incoming_pending");
              markRequestTouchedFast(incomingReq.id).catch(() => {});
              await listenToPendingRequest(incomingReq.id, "incoming");
            } else {
              const outgoingReq = await loadRequestBetween(currentUser.id, currentTargetUid);

              if (outgoingReq && outgoingReq.status === "pending") {
                requestDocModel = outgoingReq;
                setModeUI("request_outgoing_pending");
                await listenToPendingRequest(outgoingReq.id, "outgoing");
              } else {
                showBlocked("This request is no longer available.");
              }
            }
          }
        }

        if (uidParam) {
          if (uidParam === currentUser.id) {
            showBlocked("You cannot chat with yourself.");
            return;
          }

          await openByTargetUid(uidParam);
        }

        autoResizeMessageBox();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearAllListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showBlocked("Could not load chat.");
      }
    }

    window.addEventListener("beforeunload", () => {
      if (currentThreadId) {
        try {
          notifyBadgeRefresh();
        } catch {}
      }

      clearAllListeners();
    });

    initPage();

    /*
      OWNSPACE CHAT COMPACT PREMIUM UPDATE:

      UI FIXED:
      - Slimmed topbar to match Feed/Profile/Member/Post/Inbox.
      - Smaller chat avatar, name, username, verified badge, profile/back buttons.
      - Cleaner compact message toolbar.
      - Message bubbles are smaller, cleaner, and more premium.
      - Composer/send box is shorter and easier on mobile.
      - Request/blocked panels are tighter and less bulky.
      - Removed extra visual weight from notes and spacing.

      LOGIC PRESERVED:
      - Opens by threadId or uid.
      - Supports direct chat, new chat, outgoing request, incoming request, accept, decline.
      - Realtime message updates remain filtered by thread_id.
      - Read cleanup still happens in background.
      - Inbox badge refresh keys still trigger after read/send/request actions.
    */
  </script>
</body>
</html>
