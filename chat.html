<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BareWorld - Chat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#08111f;
      --surface:#0c1628;
      --surface-2:#122035;
      --surface-3:#192b44;
      --line:rgba(255,255,255,.07);
      --line-soft:rgba(255,255,255,.04);
      --text:#f5f8ff;
      --muted:#91a0be;
      --blue:#65c7ff;
      --green:#39d39f;
      --green-soft:rgba(57,211,159,.14);
      --other:#162233;
      --mine:#113845;
      --red:#ff7286;
      --yellow:#f3c461;
      --purple:#9e8cff;
      --shadow:0 20px 40px rgba(0,0,0,.22);
      --topbar-bg:rgba(9,16,30,.88);
      --composer-bg:rgba(9,16,30,.92);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html[data-theme="light"]{
      --bg:#eef2f8;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#eef3fb;
      --line:rgba(20,33,61,.08);
      --line-soft:rgba(20,33,61,.04);
      --text:#1c2743;
      --muted:#73809d;
      --blue:#228fff;
      --green:#25b97a;
      --green-soft:rgba(37,185,122,.14);
      --other:#f1f4f9;
      --mine:#dff4ef;
      --red:#e65d72;
      --yellow:#d89a1e;
      --purple:#8267ff;
      --shadow:0 16px 28px rgba(20,33,61,.08);
      --topbar-bg:rgba(255,255,255,.92);
      --composer-bg:rgba(255,255,255,.95);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    body{
      background:
        radial-gradient(circle at 15% 10%, rgba(101,199,255,.08), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(57,211,159,.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, #000 15%) 100%);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px calc(14px + var(--safe-bottom));
    }

    .app{
      max-width:760px;
      margin:0 auto;
      min-height:calc(100vh - 26px - var(--safe-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      display:grid;
      grid-template-columns:48px 1fr 48px;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:22px;
      background:var(--topbar-bg);
      backdrop-filter:blur(16px);
      border:1px solid var(--line-soft);
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:48px;
      height:48px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:16px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }
    .top-icon-btn svg{width:20px;height:20px;display:block}

    .chat-head{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .chat-avatar,
    .chat-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .chat-avatar{
      object-fit:cover;
    }

    .chat-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:5px;
    }

    .chat-head-text{
      min-width:0;
      flex:1;
    }

    .chat-title-row{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
      flex-wrap:wrap;
    }

    .chat-title{
      color:var(--text);
      text-decoration:none;
      font-size:17px;
      font-weight:800;
      line-height:1.2;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-title:hover{text-decoration:underline}

    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(57,211,159,.14);
      color:#dfffee;
      border:1px solid rgba(57,211,159,.2);
      font-size:10px;
      font-weight:900;
      flex-shrink:0;
    }

    .chat-subline{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:3px;
      min-width:0;
      flex-wrap:wrap;
    }

    .chat-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-state{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .page-message{
      min-height:18px;
      font-size:13px;
      padding:0 4px;
    }
    .page-message.ok{color:#86efac}
    .page-message.err{color:#fda4af}

    .utility-hidden{
      display:none;
    }

    .request-panel,
    .blocked-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .request-box,
    .blocked-box{
      background:var(--surface-2);
      border:1px dashed var(--line);
      border-radius:18px;
      padding:16px 14px;
      color:var(--muted);
      text-align:center;
      line-height:1.65;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .request-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 14px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:42px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-primary{
      background:rgba(101,199,255,.14);
      border-color:rgba(101,199,255,.2);
    }
    .btn-green{
      background:rgba(57,211,159,.14);
      border-color:rgba(57,211,159,.2);
    }
    .btn-red{
      background:rgba(255,114,134,.14);
      border-color:rgba(255,114,134,.2);
    }

    .chat-stage{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .messages-panel{
      flex:1;
      min-height:300px;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .messages-loading,
    .messages-empty{
      margin:14px;
      padding:18px 14px;
      border-radius:18px;
      border:1px dashed var(--line);
      background:var(--surface-2);
      color:var(--muted);
      text-align:center;
      font-size:14px;
      line-height:1.6;
    }

    .messages-shell{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:14px;
      display:grid;
      gap:10px;
      background:
        radial-gradient(circle at 20% 10%, rgba(101,199,255,.05), transparent 25%),
        radial-gradient(circle at 78% 18%, rgba(57,211,159,.05), transparent 22%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 88%, #000 12%) 0%, var(--surface) 100%);
    }

    .bubble-row{
      display:flex;
      width:100%;
    }
    .bubble-row.mine{justify-content:flex-end}
    .bubble-row.other{justify-content:flex-start}

    .bubble{
      max-width:min(76%, 520px);
      border-radius:22px;
      padding:12px 13px 10px;
      border:1px solid var(--line);
      box-shadow:0 10px 20px rgba(0,0,0,.06);
    }
    .bubble.mine{
      background:linear-gradient(180deg, color-mix(in srgb, var(--mine) 92%, #fff 8%), var(--mine));
      border-color:rgba(101,199,255,.14);
      border-bottom-right-radius:8px;
    }
    .bubble.other{
      background:var(--other);
      border-color:var(--line);
      border-bottom-left-radius:8px;
    }

    .bubble-text{
      color:var(--text);
      font-size:15px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .bubble-meta{
      display:flex;
      justify-content:flex-end;
      margin-top:7px;
    }

    .bubble-time{
      color:var(--muted);
      font-size:10.5px;
      letter-spacing:.1px;
      white-space:nowrap;
      opacity:.95;
    }

    .composer-panel{
      position:sticky;
      bottom:calc(10px + var(--safe-bottom));
      z-index:30;
      background:var(--composer-bg);
      border:1px solid var(--line);
      border-radius:24px;
      padding:12px;
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
    }

    .composer{
      display:grid;
      gap:10px;
    }

    .input-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:end;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px 15px;
      border-radius:20px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:15px;
      min-height:56px;
      max-height:132px;
      line-height:1.45;
    }
    .input::placeholder{color:var(--muted)}

    .send-btn{
      width:56px;
      height:56px;
      border:none;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(57,211,159,.18), rgba(57,211,159,.12));
      color:var(--text);
      border:1px solid rgba(57,211,159,.22);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    .send-btn svg{width:20px;height:20px;display:block}
    .send-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .form-message{
      min-height:18px;
      font-size:13px;
      padding:0 4px;
    }
    .form-message.ok{color:#86efac}
    .form-message.err{color:#fda4af}

    .composer-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      padding:0 4px;
    }

    @media (max-width:700px){
      body{
        padding:10px 10px calc(12px + var(--safe-bottom));
      }

      .topbar{
        grid-template-columns:46px 1fr 46px;
        padding:9px;
      }

      .chat-title{
        font-size:16px;
      }

      .messages-shell{
        padding:12px;
      }

      .bubble{
        max-width:82%;
      }

      .input-row{
        grid-template-columns:1fr auto;
      }
    }

    @media (max-width:420px){
      .bubble{
        max-width:86%;
      }

      .chat-avatar,
      .chat-avatar-placeholder{
        width:42px;
        height:42px;
      }

      .send-btn{
        width:52px;
        height:52px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="chat-head">
        <img id="avatar" class="chat-avatar hidden" alt="User photo" />
        <div id="avatarPlaceholder" class="chat-avatar-placeholder">No photo</div>

        <div class="chat-head-text">
          <div class="chat-title-row">
            <a id="targetNameLink" href="#" class="chat-title">Member</a>
            <span id="verifiedDot" class="verified-dot hidden">✓</span>
          </div>

          <div class="chat-subline">
            <span id="targetUsername" class="chat-username hidden">@username</span>
            <span id="topSub" class="chat-state">Chat</span>
          </div>
        </div>
      </div>

      <a id="profileBtn" href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="pageMessage" class="page-message"></div>

    <div class="utility-hidden">
      <span id="modeChip">Chat</span>
      <span id="statusChip">Loading...</span>
      <a id="memberProfileBtn" href="#">Profile</a>
      <div id="targetBio"></div>
    </div>

    <div id="blockedPanel" class="blocked-panel hidden">
      <div id="blockedText" class="blocked-box">
        This conversation is not available.
      </div>
    </div>

    <div id="requestInfoPanel" class="request-panel hidden">
      <div id="requestInfoBox" class="request-box">
        You can send one request message. They must accept it before chat opens.
      </div>

      <div id="requestActionRow" class="request-actions hidden">
        <button id="acceptRequestBtn" class="action-btn btn-green" type="button">Accept Request</button>
        <button id="declineRequestBtn" class="action-btn btn-red" type="button">Decline Request</button>
      </div>

      <div id="requestPreviewBox" class="request-box hidden" style="margin-top:12px;"></div>
    </div>

    <div class="chat-stage">
      <div id="messagesPanel" class="messages-panel hidden">
        <div id="messagesLoading" class="messages-loading hidden">Loading messages...</div>
        <div id="messagesList" class="messages-shell hidden"></div>
        <div id="messagesEmpty" class="messages-empty hidden">No messages yet.</div>
      </div>

      <div id="composerPanel" class="composer-panel hidden">
        <div class="composer">
          <div class="input-row">
            <textarea id="messageInput" class="input" placeholder="Write your message..."></textarea>

            <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 2 11 13"></path>
                <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
              </svg>
            </button>
          </div>

          <div id="formMessage" class="form-message"></div>
          <div id="composerNote" class="composer-note"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const topSub = document.getElementById("topSub");
    const profileBtn = document.getElementById("profileBtn");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const targetNameLink = document.getElementById("targetNameLink");
    const verifiedDot = document.getElementById("verifiedDot");
    const targetUsername = document.getElementById("targetUsername");
    const targetBio = document.getElementById("targetBio");
    const modeChip = document.getElementById("modeChip");
    const statusChip = document.getElementById("statusChip");
    const memberProfileBtn = document.getElementById("memberProfileBtn");

    const pageMessage = document.getElementById("pageMessage");

    const blockedPanel = document.getElementById("blockedPanel");
    const blockedText = document.getElementById("blockedText");

    const messagesPanel = document.getElementById("messagesPanel");
    const messagesLoading = document.getElementById("messagesLoading");
    const messagesList = document.getElementById("messagesList");
    const messagesEmpty = document.getElementById("messagesEmpty");

    const requestInfoPanel = document.getElementById("requestInfoPanel");
    const requestInfoBox = document.getElementById("requestInfoBox");
    const requestActionRow = document.getElementById("requestActionRow");
    const requestPreviewBox = document.getElementById("requestPreviewBox");
    const acceptRequestBtn = document.getElementById("acceptRequestBtn");
    const declineRequestBtn = document.getElementById("declineRequestBtn");

    const composerPanel = document.getElementById("composerPanel");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const formMessage = document.getElementById("formMessage");
    const composerNote = document.getElementById("composerNote");

    let currentUser = null;
    let currentViewerProfile = null;
    let currentTargetUid = "";
    let currentTargetProfile = null;
    let currentThreadId = "";
    let currentThreadData = null;
    let currentMode = "loading";
    let requestDocModel = null;
    let messageChannel = null;
    let requestChannel = null;
    let threadChannel = null;
    let iBlockedTarget = false;
    let targetBlockedMe = false;

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setPageMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `page-message ${type}`;
    }

    function setFormMessage(text = "", type = "") {
      formMessage.textContent = text;
      formMessage.className = `form-message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatDate(ts) {
      if (!ts) return "Just now";
      try {
        const d = new Date(ts);
        return Number.isNaN(d.getTime()) ? "Just now" : d.toLocaleString();
      } catch {
        return "Just now";
      }
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function getSortedPair(a, b) {
      return [a, b].sort((x, y) => x.localeCompare(y));
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        bio: getField(d, ["bio"]),
        blockedUsers: Array.isArray(d.blocked_users)
          ? d.blocked_users
          : Array.isArray(d.blockedUsers)
          ? d.blockedUsers
          : [],
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted)
      };
    }

    function normalizeThread(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        type: getField(d, ["type"]) || "direct",
        status: getField(d, ["status"]) || "accepted",
        participantA: getField(d, ["participant_a", "participantA"]),
        participantB: getField(d, ["participant_b", "participantB"]),
        createdBy: getField(d, ["created_by", "createdBy"]),
        acceptedFromRequestId: getField(d, ["accepted_from_request_id", "acceptedFromRequestId"]),
        starterText: getField(d, ["starter_text", "starterText"]),
        starterFrom: getField(d, ["starter_from", "starterFrom"]),
        lastMessageText: getField(d, ["last_message_text", "lastMessageText"]),
        lastMessageAt: d.last_message_at ?? d.lastMessageAt ?? d.created_at ?? d.createdAt ?? null,
        lastSenderId: getField(d, ["last_sender_id", "lastSenderId"]),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    function normalizeRequest(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        requesterId: getField(d, ["requester_id", "requesterId"]),
        targetId: getField(d, ["target_id", "targetId"]),
        text: getField(d, ["text", "message", "starter_text", "starterText"]),
        status: getField(d, ["status"]) || "pending",
        createdAt: d.created_at ?? d.createdAt ?? null,
        updatedAt: d.updated_at ?? d.updatedAt ?? null
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId"]),
        text: getField(d, ["text", "message", "body"]),
        createdAt: d.created_at ?? d.createdAt ?? null
      };
    }

    async function loadFullProfile(uid) {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", uid).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", uid).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      return normalizeProfile({
        ...(publicRes.data || {}),
        ...(userRes.data || {}),
        uid
      }, uid);
    }

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    function setHeader(profile) {
      targetNameLink.textContent = profile.displayName || "Member";
      targetNameLink.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;
      memberProfileBtn.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;
      profileBtn.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;

      if (profile.username) {
        targetUsername.textContent = "@" + profile.username;
        targetUsername.classList.remove("hidden");
      } else {
        targetUsername.classList.add("hidden");
      }

      if (profile.verified) verifiedDot.classList.remove("hidden");
      else verifiedDot.classList.add("hidden");

      targetBio.textContent = profile.bio?.trim() ? profile.bio : "BareWorld member";
      showAvatar(profile.photoURL || "");
    }

    function clearMessageListener() {
      if (messageChannel) {
        try { supabase.removeChannel(messageChannel); } catch {}
        messageChannel = null;
      }
      if (threadChannel) {
        try { supabase.removeChannel(threadChannel); } catch {}
        threadChannel = null;
      }
    }

    function clearRequestListener() {
      if (requestChannel) {
        try { supabase.removeChannel(requestChannel); } catch {}
        requestChannel = null;
      }
    }

    function clearAllListeners() {
      clearMessageListener();
      clearRequestListener();
    }

    function showBlocked(text) {
      blockedText.textContent = text;
      blockedPanel.classList.remove("hidden");
      messagesPanel.classList.add("hidden");
      requestInfoPanel.classList.add("hidden");
      composerPanel.classList.add("hidden");
    }

    function hideBlocked() {
      blockedPanel.classList.add("hidden");
    }

    function setModeUI(mode) {
      currentMode = mode;
      hideBlocked();

      messagesPanel.classList.add("hidden");
      requestInfoPanel.classList.add("hidden");
      composerPanel.classList.add("hidden");

      requestActionRow.classList.add("hidden");
      requestPreviewBox.classList.add("hidden");
      setFormMessage("");

      if (mode === "chat") {
        modeChip.textContent = "Chat";
        statusChip.textContent = "Accepted";
        messagesPanel.classList.remove("hidden");
        composerPanel.classList.remove("hidden");
        composerNote.textContent = "This is a direct chat.";
        topSub.textContent = "Chat";
      }

      if (mode === "direct_new") {
        modeChip.textContent = "Chat";
        statusChip.textContent = "Ready to start";
        messagesPanel.classList.remove("hidden");
        messagesEmpty.classList.remove("hidden");
        messagesList.classList.add("hidden");
        messagesLoading.classList.add("hidden");
        composerPanel.classList.remove("hidden");
        composerNote.textContent = "Your first message will start the chat.";
        topSub.textContent = "New chat";
      }

      if (mode === "request_compose") {
        modeChip.textContent = "Request";
        statusChip.textContent = "One message allowed";
        requestInfoPanel.classList.remove("hidden");
        composerPanel.classList.remove("hidden");
        requestInfoBox.textContent = "You are not a follower yet. Send one message request. They must accept it before full chat opens.";
        composerNote.textContent = "Only one request message is allowed until accepted.";
        topSub.textContent = "Message request";
      }

      if (mode === "request_outgoing_pending") {
        modeChip.textContent = "Request";
        statusChip.textContent = "Pending";
        requestInfoPanel.classList.remove("hidden");
        requestPreviewBox.classList.remove("hidden");
        requestPreviewBox.textContent = requestDocModel?.text
          ? `Your request message:\n\n${requestDocModel.text}`
          : "Your request is pending.";
        requestInfoBox.textContent = "Your message request is pending. Full chat will open after they accept.";
        topSub.textContent = "Request pending";
      }

      if (mode === "request_incoming_pending") {
        modeChip.textContent = "Request";
        statusChip.textContent = "Incoming request";
        requestInfoPanel.classList.remove("hidden");
        requestActionRow.classList.remove("hidden");
        requestPreviewBox.classList.remove("hidden");
        requestPreviewBox.textContent = requestDocModel?.text
          ? `Request message:\n\n${requestDocModel.text}`
          : "No request message.";
        requestInfoBox.textContent = "This person is not an approved chat yet. Accept to open full chat.";
        topSub.textContent = "Incoming request";
      }

      if (mode === "request_declined") {
        modeChip.textContent = "Request";
        statusChip.textContent = "Declined";
        requestInfoPanel.classList.remove("hidden");
        requestInfoBox.textContent = "This request was declined.";
        topSub.textContent = "Request declined";
      }
    }

    function scrollMessagesToBottom() {
      requestAnimationFrame(() => {
        messagesList.scrollTop = messagesList.scrollHeight + 200;
      });
    }

    async function fetchMessages(threadId) {
      const { data, error } = await supabase
        .from("chat_messages")
        .select("*")
        .eq("thread_id", threadId)
        .order("created_at", { ascending: true });

      if (error) throw error;
      return (data || []).map(row => normalizeMessage(row, row.id));
    }

    function renderMessages(messages) {
      messagesLoading.classList.add("hidden");
      messagesList.innerHTML = "";

      const finalMessages = [...messages];

      if (!finalMessages.length && currentThreadData?.starterText) {
        finalMessages.push({
          id: "starter-fallback",
          threadId: currentThreadId,
          senderId: currentThreadData.starterFrom || currentTargetUid,
          text: currentThreadData.starterText,
          createdAt: currentThreadData.createdAt || currentThreadData.lastMessageAt || null
        });
      }

      if (!finalMessages.length) {
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        return;
      }

      messagesEmpty.classList.add("hidden");
      messagesList.classList.remove("hidden");

      finalMessages.forEach(msg => {
        const mine = msg.senderId === currentUser.id;

        const row = document.createElement("div");
        row.className = `bubble-row ${mine ? "mine" : "other"}`;

        row.innerHTML = `
          <div class="bubble ${mine ? "mine" : "other"}">
            <div class="bubble-text">${escapeHtml(msg.text || "")}</div>
            <div class="bubble-meta">
              <div class="bubble-time">${escapeHtml(formatDate(msg.createdAt))}</div>
            </div>
          </div>
        `;

        messagesList.appendChild(row);
      });

      scrollMessagesToBottom();
    }

    async function refreshMessages(threadId) {
      try {
        const messages = await fetchMessages(threadId);
        renderMessages(messages);
      } catch (err) {
        console.error(err);
        messagesLoading.classList.add("hidden");
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        messagesEmpty.textContent = "Could not load messages.";
      }
    }

    function listenToMessages(threadId) {
      clearMessageListener();

      messagesPanel.classList.remove("hidden");
      messagesLoading.classList.remove("hidden");
      messagesList.classList.add("hidden");
      messagesEmpty.classList.add("hidden");

      refreshMessages(threadId);

      messageChannel = supabase
        .channel(`chat-messages-${threadId}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "chat_messages", filter: `thread_id=eq.${threadId}` },
          () => refreshMessages(threadId)
        )
        .subscribe();

      threadChannel = supabase
        .channel(`chat-thread-${threadId}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "chat_threads", filter: `id=eq.${threadId}` },
          async (payload) => {
            if (payload?.new) {
              currentThreadData = normalizeThread(payload.new, payload.new.id);
            } else {
              const { data } = await supabase.from("chat_threads").select("*").eq("id", threadId).maybeSingle();
              if (data) currentThreadData = normalizeThread(data, data.id);
            }
          }
        )
        .subscribe();
    }

    async function findExistingThreadByUsers(uidA, uidB) {
      const { data: first, error: firstError } = await supabase
        .from("chat_threads")
        .select("*")
        .eq("participant_a", uidA)
        .eq("participant_b", uidB)
        .limit(1);

      if (firstError) throw firstError;
      if (first && first.length) return normalizeThread(first[0], first[0].id);

      const { data: second, error: secondError } = await supabase
        .from("chat_threads")
        .select("*")
        .eq("participant_a", uidB)
        .eq("participant_b", uidA)
        .limit(1);

      if (secondError) throw secondError;
      if (second && second.length) return normalizeThread(second[0], second[0].id);

      return null;
    }

    async function loadRequestBetween(requesterId, targetId) {
      const { data, error } = await supabase
        .from("message_requests")
        .select("*")
        .eq("requester_id", requesterId)
        .eq("target_id", targetId)
        .order("created_at", { ascending: false })
        .limit(1);

      if (error) throw error;
      if (!data || !data.length) return null;
      return normalizeRequest(data[0], data[0].id);
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;
      try {
        await supabase.from("notifications").insert(payload);
      } catch {}
    }

    async function checkFollowing(viewerUid, targetUid) {
      const { data, error } = await supabase
        .from("follows")
        .select("id")
        .eq("follower_id", viewerUid)
        .eq("following_id", targetUid)
        .limit(1);

      if (error) return false;
      return !!(data && data.length);
    }

    async function openThread(threadModel) {
      clearAllListeners();

      currentThreadId = threadModel.id;
      currentThreadData = threadModel;
      currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;
      currentTargetProfile = await loadFullProfile(currentTargetUid);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        setHeader(currentTargetProfile);
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(currentTargetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      setHeader(currentTargetProfile);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      setModeUI("chat");
      listenToMessages(currentThreadId);
    }

    async function listenToPendingRequest(requestId, direction) {
      clearRequestListener();

      requestChannel = supabase
        .channel(`message-request-${requestId}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "message_requests", filter: `id=eq.${requestId}` },
          async () => {
            try {
              const { data, error } = await supabase
                .from("message_requests")
                .select("*")
                .eq("id", requestId)
                .maybeSingle();

              if (error) return;
              if (!data) return;

              requestDocModel = normalizeRequest(data, data.id);

              if (requestDocModel.status === "accepted") {
                let thread = null;

                for (let i = 0; i < 5; i++) {
                  thread = await findExistingThreadByUsers(requestDocModel.requesterId, requestDocModel.targetId);
                  if (thread) break;
                  await sleep(250);
                }

                if (thread) {
                  await openThread(thread);
                  setPageMessage("Request accepted.", "ok");
                  return;
                }
              }

              if (requestDocModel.status === "declined") {
                setModeUI("request_declined");
                if (direction === "outgoing") {
                  requestPreviewBox.classList.remove("hidden");
                  requestPreviewBox.textContent = requestDocModel.text
                    ? `Your request message:\n\n${requestDocModel.text}`
                    : "Request declined.";
                }
                return;
              }

              setModeUI(direction === "incoming" ? "request_incoming_pending" : "request_outgoing_pending");
            } catch (err) {
              console.error(err);
            }
          }
        )
        .subscribe();
    }

    async function openByTargetUid(targetUid) {
      clearAllListeners();

      currentTargetUid = targetUid;
      currentTargetProfile = await loadFullProfile(targetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(targetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.id);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      const existingThread = await findExistingThreadByUsers(currentUser.id, targetUid);
      if (existingThread && existingThread.status === "accepted") {
        await openThread(existingThread);
        return;
      }

      const outgoingReq = await loadRequestBetween(currentUser.id, targetUid);
      if (outgoingReq && outgoingReq.status === "pending") {
        requestDocModel = outgoingReq;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(outgoingReq.id, "outgoing");
        return;
      }

      const incomingReq = await loadRequestBetween(targetUid, currentUser.id);
      if (incomingReq && incomingReq.status === "pending") {
        requestDocModel = incomingReq;
        setModeUI("request_incoming_pending");
        await listenToPendingRequest(incomingReq.id, "incoming");
        return;
      }

      const iFollowTarget = await checkFollowing(currentUser.id, targetUid);

      if (iFollowTarget) {
        currentThreadId = "";
        currentThreadData = null;
        setModeUI("direct_new");
        return;
      }

      setModeUI("request_compose");
    }

    async function ensureDirectThread() {
      if (currentThreadId) {
        const { data, error } = await supabase
          .from("chat_threads")
          .select("*")
          .eq("id", currentThreadId)
          .maybeSingle();

        if (!error && data) {
          currentThreadData = normalizeThread(data, data.id);
          return currentThreadData;
        }
      }

      let existing = await findExistingThreadByUsers(currentUser.id, currentTargetUid);
      if (existing) {
        currentThreadId = existing.id;
        currentThreadData = existing;
        return existing;
      }

      const pair = getSortedPair(currentUser.id, currentTargetUid);
      const { data, error } = await supabase
        .from("chat_threads")
        .insert({
          type: "direct",
          status: "accepted",
          participant_a: pair[0],
          participant_b: pair[1],
          created_by: currentUser.id,
          created_at: nowIso(),
          last_message_text: "",
          last_message_at: nowIso(),
          last_sender_id: ""
        })
        .select("*")
        .single();

      if (error) throw error;

      const created = normalizeThread(data, data.id);
      currentThreadId = created.id;
      currentThreadData = created;
      return created;
    }

    async function sendDirectMessage(text) {
      const thread = await ensureDirectThread();

      const { error: messageError } = await supabase
        .from("chat_messages")
        .insert({
          thread_id: thread.id,
          sender_id: currentUser.id,
          text,
          created_at: nowIso()
        });

      if (messageError) throw messageError;

      const { error: threadError } = await supabase
        .from("chat_threads")
        .update({
          status: "accepted",
          last_message_text: text,
          last_message_at: nowIso(),
          last_sender_id: currentUser.id
        })
        .eq("id", thread.id);

      if (threadError) throw threadError;

      await createNotificationSafe(currentTargetUid, {
        type: "message",
        title: "New message",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        thread_id: thread.id,
        created_at: nowIso(),
        is_read: false
      });

      currentThreadId = thread.id;
      currentThreadData = thread;
      setModeUI("chat");
      listenToMessages(thread.id);
    }

    async function sendRequestMessage(text) {
      const existingPending = await loadRequestBetween(currentUser.id, currentTargetUid);

      if (existingPending && existingPending.status === "pending") {
        requestDocModel = existingPending;
        setModeUI("request_outgoing_pending");
        await listenToPendingRequest(existingPending.id, "outgoing");
        return;
      }

      const { data, error } = await supabase
        .from("message_requests")
        .insert({
          requester_id: currentUser.id,
          target_id: currentTargetUid,
          text,
          status: "pending",
          created_at: nowIso(),
          updated_at: nowIso()
        })
        .select("*")
        .single();

      if (error) throw error;

      requestDocModel = normalizeRequest(data, data.id);

      await createNotificationSafe(currentTargetUid, {
        type: "message_request",
        title: "New message request",
        text: `${currentViewerProfile?.displayName || "Someone"} sent you a message request.`,
        from_user_id: currentUser.id,
        to_user_id: currentTargetUid,
        request_id: requestDocModel.id,
        created_at: nowIso(),
        is_read: false
      });

      setModeUI("request_outgoing_pending");
      await listenToPendingRequest(requestDocModel.id, "outgoing");
    }

    async function acceptIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        const { error: requestError } = await supabase
          .from("message_requests")
          .update({
            status: "accepted",
            accepted_at: nowIso(),
            accepted_by: currentUser.id,
            updated_at: nowIso()
          })
          .eq("id", requestDocModel.id);

        if (requestError) throw requestError;

        let thread = await findExistingThreadByUsers(requestDocModel.requesterId, requestDocModel.targetId);

        if (!thread) {
          const pair = getSortedPair(requestDocModel.requesterId, requestDocModel.targetId);
          const { data: threadRow, error: threadInsertError } = await supabase
            .from("chat_threads")
            .insert({
              type: "direct",
              status: "accepted",
              participant_a: pair[0],
              participant_b: pair[1],
              created_by: currentUser.id,
              accepted_from_request_id: requestDocModel.id,
              starter_text: requestDocModel.text || "",
              starter_from: requestDocModel.requesterId || "",
              created_at: nowIso(),
              last_message_text: requestDocModel.text || "",
              last_message_at: nowIso(),
              last_sender_id: requestDocModel.requesterId || ""
            })
            .select("*")
            .single();

          if (threadInsertError) throw threadInsertError;
          thread = normalizeThread(threadRow, threadRow.id);
        } else {
          const updatePayload = {
            status: "accepted",
            accepted_from_request_id: requestDocModel.id,
            last_message_at: nowIso()
          };

          if (requestDocModel.text) {
            updatePayload.starter_text = thread.starterText || requestDocModel.text;
            updatePayload.starter_from = thread.starterFrom || requestDocModel.requesterId;
            updatePayload.last_message_text = thread.lastMessageText || requestDocModel.text;
            updatePayload.last_sender_id = thread.lastSenderId || requestDocModel.requesterId;
          }

          const { error: threadUpdateError } = await supabase
            .from("chat_threads")
            .update(updatePayload)
            .eq("id", thread.id);

          if (threadUpdateError) throw threadUpdateError;
        }

        await createNotificationSafe(requestDocModel.requesterId, {
          type: "message_request_accepted",
          title: "Message request accepted",
          text: `${currentViewerProfile?.displayName || "Someone"} accepted your message request.`,
          from_user_id: currentUser.id,
          to_user_id: requestDocModel.requesterId,
          thread_id: thread.id,
          created_at: nowIso(),
          is_read: false
        });

        await openThread(thread);
        setPageMessage("Request accepted.", "ok");
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not accept request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function declineIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        const { error } = await supabase
          .from("message_requests")
          .update({
            status: "declined",
            declined_at: nowIso(),
            declined_by: currentUser.id,
            updated_at: nowIso()
          })
          .eq("id", requestDocModel.id);

        if (error) throw error;

        setModeUI("request_declined");
        setPageMessage("Request declined.", "ok");
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not decline request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", async () => {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!currentUser || !currentTargetUid) return;
      if (iBlockedTarget || targetBlockedMe) return;

      sendBtn.disabled = true;
      setFormMessage("");

      try {
        if (currentMode === "chat" || currentMode === "direct_new") {
          await sendDirectMessage(text);
          messageInput.value = "";
          autoResizeMessageBox();
          setFormMessage("Message sent.", "ok");
        } else if (currentMode === "request_compose") {
          await sendRequestMessage(text);
          messageInput.value = "";
          autoResizeMessageBox();
          setFormMessage("Request sent.", "ok");
        }
      } catch (err) {
        console.error(err);
        setFormMessage(err?.message || "Could not send message.", "err");
      }

      sendBtn.disabled = false;
    });

    acceptRequestBtn.addEventListener("click", acceptIncomingRequest);
    declineRequestBtn.addEventListener("click", declineIncomingRequest);

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "inbox.html";
    });

    function autoResizeMessageBox() {
      messageInput.style.height = "56px";
      const nextHeight = Math.min(messageInput.scrollHeight, 132);
      messageInput.style.height = nextHeight + "px";
    }

    messageInput.addEventListener("input", autoResizeMessageBox);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearAllListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;
      currentViewerProfile = await loadFullProfile(currentUser.id);

      const params = new URLSearchParams(window.location.search);
      const threadIdParam = (params.get("threadId") || "").trim();
      const uidParam = (params.get("uid") || "").trim();

      if (!threadIdParam && !uidParam) {
        showBlocked("No conversation selected.");
        return;
      }

      try {
        if (threadIdParam) {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .eq("id", threadIdParam)
            .maybeSingle();

          if (error) throw error;
          if (!data) {
            showBlocked("Chat not found.");
            return;
          }

          const threadModel = normalizeThread(data, data.id);

          const isParticipant =
            threadModel.participantA === currentUser.id ||
            threadModel.participantB === currentUser.id;

          if (!isParticipant) {
            showBlocked("This chat is not available to you.");
            return;
          }

          if (threadModel.status === "accepted") {
            await openThread(threadModel);
          } else {
            currentTargetUid = threadModel.participantA === currentUser.id ? threadModel.participantB : threadModel.participantA;
            currentTargetProfile = await loadFullProfile(currentTargetUid);
            setHeader(currentTargetProfile);

            const incomingReq = await loadRequestBetween(currentTargetUid, currentUser.id);
            if (incomingReq && incomingReq.status === "pending") {
              requestDocModel = incomingReq;
              setModeUI("request_incoming_pending");
              await listenToPendingRequest(incomingReq.id, "incoming");
            } else {
              const outgoingReq = await loadRequestBetween(currentUser.id, currentTargetUid);
              if (outgoingReq && outgoingReq.status === "pending") {
                requestDocModel = outgoingReq;
                setModeUI("request_outgoing_pending");
                await listenToPendingRequest(outgoingReq.id, "outgoing");
              } else {
                showBlocked("This request is no longer available.");
              }
            }
          }
        }

        if (uidParam) {
          if (uidParam === currentUser.id) {
            showBlocked("You cannot chat with yourself.");
            return;
          }

          await openByTargetUid(uidParam);
        }

        autoResizeMessageBox();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            clearAllListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showBlocked("Could not load chat.");
      }
    }

    window.addEventListener("beforeunload", () => {
      clearAllListeners();
    });

    initPage();
  </script>
</body>
</html>
