<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BareWorld - Chat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#08111f;
      --surface:#0c1628;
      --surface-2:#122035;
      --surface-3:#192b44;
      --line:rgba(255,255,255,.07);
      --line-soft:rgba(255,255,255,.04);
      --text:#f5f8ff;
      --muted:#91a0be;
      --blue:#65c7ff;
      --green:#39d39f;
      --green-soft:rgba(57,211,159,.14);
      --other:#162233;
      --mine:#113845;
      --red:#ff7286;
      --yellow:#f3c461;
      --purple:#9e8cff;
      --shadow:0 20px 40px rgba(0,0,0,.22);
      --topbar-bg:rgba(9,16,30,.88);
      --composer-bg:rgba(9,16,30,.92);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    html[data-theme="light"]{
      --bg:#eef2f8;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#eef3fb;
      --line:rgba(20,33,61,.08);
      --line-soft:rgba(20,33,61,.04);
      --text:#1c2743;
      --muted:#73809d;
      --blue:#228fff;
      --green:#25b97a;
      --green-soft:rgba(37,185,122,.14);
      --other:#f1f4f9;
      --mine:#dff4ef;
      --red:#e65d72;
      --yellow:#d89a1e;
      --purple:#8267ff;
      --shadow:0 16px 28px rgba(20,33,61,.08);
      --topbar-bg:rgba(255,255,255,.92);
      --composer-bg:rgba(255,255,255,.95);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    body{
      background:
        radial-gradient(circle at 15% 10%, rgba(101,199,255,.08), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(57,211,159,.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, #000 15%) 100%);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px calc(14px + var(--safe-bottom));
    }

    .app{
      max-width:760px;
      margin:0 auto;
      min-height:calc(100vh - 26px - var(--safe-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      display:grid;
      grid-template-columns:48px 1fr 48px;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:22px;
      background:var(--topbar-bg);
      backdrop-filter:blur(16px);
      border:1px solid var(--line-soft);
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:48px;
      height:48px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:16px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }
    .top-icon-btn svg{width:20px;height:20px;display:block}

    .chat-head{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .chat-avatar,
    .chat-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .chat-avatar{
      object-fit:cover;
    }

    .chat-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:5px;
    }

    .chat-head-text{
      min-width:0;
      flex:1;
    }

    .chat-title-row{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
      flex-wrap:wrap;
    }

    .chat-title{
      color:var(--text);
      text-decoration:none;
      font-size:17px;
      font-weight:800;
      line-height:1.2;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-title:hover{text-decoration:underline}

    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(57,211,159,.14);
      color:#dfffee;
      border:1px solid rgba(57,211,159,.2);
      font-size:10px;
      font-weight:900;
      flex-shrink:0;
    }

    .chat-subline{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:3px;
      min-width:0;
      flex-wrap:wrap;
    }

    .chat-username{
      color:var(--blue);
      font-size:12px;
      font-weight:700;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-state{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .page-message{
      min-height:18px;
      font-size:13px;
      padding:0 4px;
    }
    .page-message.ok{color:#86efac}
    .page-message.err{color:#fda4af}

    .utility-hidden{
      display:none;
    }

    .request-panel,
    .blocked-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .request-box,
    .blocked-box{
      background:var(--surface-2);
      border:1px dashed var(--line);
      border-radius:18px;
      padding:16px 14px;
      color:var(--muted);
      text-align:center;
      line-height:1.65;
      font-size:14px;
    }

    .request-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 14px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:42px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-primary{
      background:rgba(101,199,255,.14);
      border-color:rgba(101,199,255,.2);
    }
    .btn-green{
      background:rgba(57,211,159,.14);
      border-color:rgba(57,211,159,.2);
    }
    .btn-red{
      background:rgba(255,114,134,.14);
      border-color:rgba(255,114,134,.2);
    }

    .chat-stage{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .messages-panel{
      flex:1;
      min-height:300px;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .messages-loading,
    .messages-empty{
      margin:14px;
      padding:18px 14px;
      border-radius:18px;
      border:1px dashed var(--line);
      background:var(--surface-2);
      color:var(--muted);
      text-align:center;
      font-size:14px;
      line-height:1.6;
    }

    .messages-shell{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:14px;
      display:grid;
      gap:10px;
      background:
        radial-gradient(circle at 20% 10%, rgba(101,199,255,.05), transparent 25%),
        radial-gradient(circle at 78% 18%, rgba(57,211,159,.05), transparent 22%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 88%, #000 12%) 0%, var(--surface) 100%);
    }

    .bubble-row{
      display:flex;
      width:100%;
    }
    .bubble-row.mine{justify-content:flex-end}
    .bubble-row.other{justify-content:flex-start}

    .bubble{
      max-width:min(76%, 520px);
      border-radius:22px;
      padding:12px 13px 10px;
      border:1px solid var(--line);
      box-shadow:0 10px 20px rgba(0,0,0,.06);
    }
    .bubble.mine{
      background:linear-gradient(180deg, color-mix(in srgb, var(--mine) 92%, #fff 8%), var(--mine));
      border-color:rgba(101,199,255,.14);
      border-bottom-right-radius:8px;
    }
    .bubble.other{
      background:var(--other);
      border-color:var(--line);
      border-bottom-left-radius:8px;
    }

    .bubble-text{
      color:var(--text);
      font-size:15px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .bubble-meta{
      display:flex;
      justify-content:flex-end;
      margin-top:7px;
    }

    .bubble-time{
      color:var(--muted);
      font-size:10.5px;
      letter-spacing:.1px;
      white-space:nowrap;
      opacity:.95;
    }

    .composer-panel{
      position:sticky;
      bottom:calc(10px + var(--safe-bottom));
      z-index:30;
      background:var(--composer-bg);
      border:1px solid var(--line);
      border-radius:24px;
      padding:12px;
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
    }

    .composer{
      display:grid;
      gap:10px;
    }

    .input-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:end;
    }

    .input{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px 15px;
      border-radius:20px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:15px;
      min-height:56px;
      max-height:132px;
      line-height:1.45;
    }
    .input::placeholder{color:var(--muted)}

    .send-btn{
      width:56px;
      height:56px;
      border:none;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(57,211,159,.18), rgba(57,211,159,.12));
      color:var(--text);
      border:1px solid rgba(57,211,159,.22);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    .send-btn svg{width:20px;height:20px;display:block}

    .form-message{
      min-height:18px;
      font-size:13px;
      padding:0 4px;
    }
    .form-message.ok{color:#86efac}
    .form-message.err{color:#fda4af}

    .composer-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      padding:0 4px;
    }

    @media (max-width:700px){
      body{
        padding:10px 10px calc(12px + var(--safe-bottom));
      }

      .topbar{
        grid-template-columns:46px 1fr 46px;
        padding:9px;
      }

      .chat-title{
        font-size:16px;
      }

      .messages-shell{
        padding:12px;
      }

      .bubble{
        max-width:82%;
      }

      .input-row{
        grid-template-columns:1fr auto;
      }
    }

    @media (max-width:420px){
      .bubble{
        max-width:86%;
      }

      .chat-avatar,
      .chat-avatar-placeholder{
        width:42px;
        height:42px;
      }

      .send-btn{
        width:52px;
        height:52px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="chat-head">
        <img id="avatar" class="chat-avatar hidden" alt="User photo" />
        <div id="avatarPlaceholder" class="chat-avatar-placeholder">No photo</div>

        <div class="chat-head-text">
          <div class="chat-title-row">
            <a id="targetNameLink" href="#" class="chat-title">Member</a>
            <span id="verifiedDot" class="verified-dot hidden">✓</span>
          </div>

          <div class="chat-subline">
            <span id="targetUsername" class="chat-username hidden">@username</span>
            <span id="topSub" class="chat-state">Chat</span>
          </div>
        </div>
      </div>

      <a id="profileBtn" href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="pageMessage" class="page-message"></div>

    <div class="utility-hidden">
      <span id="modeChip">Chat</span>
      <span id="statusChip">Loading...</span>
      <a id="memberProfileBtn" href="#">Profile</a>
      <div id="targetBio"></div>
    </div>

    <div id="blockedPanel" class="blocked-panel hidden">
      <div id="blockedText" class="blocked-box">
        This conversation is not available.
      </div>
    </div>

    <div id="requestInfoPanel" class="request-panel hidden">
      <div id="requestInfoBox" class="request-box">
        You can send one request message. They must accept it before chat opens.
      </div>

      <div id="requestActionRow" class="request-actions hidden">
        <button id="acceptRequestBtn" class="action-btn btn-green" type="button">Accept Request</button>
        <button id="declineRequestBtn" class="action-btn btn-red" type="button">Decline Request</button>
      </div>

      <div id="requestPreviewBox" class="request-box hidden" style="margin-top:12px;"></div>
    </div>

    <div class="chat-stage">
      <div id="messagesPanel" class="messages-panel hidden">
        <div id="messagesLoading" class="messages-loading hidden">Loading messages...</div>
        <div id="messagesList" class="messages-shell hidden"></div>
        <div id="messagesEmpty" class="messages-empty hidden">No messages yet.</div>
      </div>

      <div id="composerPanel" class="composer-panel hidden">
        <div class="composer">
          <div class="input-row">
            <textarea id="messageInput" class="input" placeholder="Write your message..."></textarea>

            <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 2 11 13"></path>
                <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
              </svg>
            </button>
          </div>

          <div id="formMessage" class="form-message"></div>
          <div id="composerNote" class="composer-note"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      setDoc,
      updateDoc,
      addDoc,
      getDocs,
      collection,
      query,
      where,
      orderBy,
      limit,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const topSub = document.getElementById("topSub");
    const profileBtn = document.getElementById("profileBtn");

    const avatar = document.getElementById("avatar");
    const avatarPlaceholder = document.getElementById("avatarPlaceholder");
    const targetNameLink = document.getElementById("targetNameLink");
    const verifiedDot = document.getElementById("verifiedDot");
    const targetUsername = document.getElementById("targetUsername");
    const targetBio = document.getElementById("targetBio");
    const modeChip = document.getElementById("modeChip");
    const statusChip = document.getElementById("statusChip");
    const memberProfileBtn = document.getElementById("memberProfileBtn");

    const pageMessage = document.getElementById("pageMessage");

    const blockedPanel = document.getElementById("blockedPanel");
    const blockedText = document.getElementById("blockedText");

    const messagesPanel = document.getElementById("messagesPanel");
    const messagesLoading = document.getElementById("messagesLoading");
    const messagesList = document.getElementById("messagesList");
    const messagesEmpty = document.getElementById("messagesEmpty");

    const requestInfoPanel = document.getElementById("requestInfoPanel");
    const requestInfoBox = document.getElementById("requestInfoBox");
    const requestActionRow = document.getElementById("requestActionRow");
    const requestPreviewBox = document.getElementById("requestPreviewBox");
    const acceptRequestBtn = document.getElementById("acceptRequestBtn");
    const declineRequestBtn = document.getElementById("declineRequestBtn");

    const composerPanel = document.getElementById("composerPanel");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const formMessage = document.getElementById("formMessage");
    const composerNote = document.getElementById("composerNote");

    let currentUser = null;
    let currentViewerProfile = null;
    let currentTargetUid = "";
    let currentTargetProfile = null;
    let currentThreadId = "";
    let currentThreadData = null;
    let currentMode = "loading";
    let requestDocModel = null;
    let messagesUnsub = null;
    let requestDocUnsub = null;
    let iBlockedTarget = false;
    let targetBlockedMe = false;

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `page-message ${type}`;
    }

    function setFormMessage(text = "", type = "") {
      formMessage.textContent = text;
      formMessage.className = `form-message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatDate(ts) {
      if (!ts) return "Just now";
      try { return ts.toDate().toLocaleString(); }
      catch {
        try {
          const d = new Date(ts);
          return Number.isNaN(d.getTime()) ? "Just now" : d.toLocaleString();
        } catch {
          return "Just now";
        }
      }
    }

    function getSortedPair(a, b) {
      return [a, b].sort((x, y) => x.localeCompare(y));
    }

    function makeThreadId(a, b) {
      return getSortedPair(a, b).join("__");
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        verified: !!(d.verified || d.isVerified),
        bio: d.bio || "",
        blockedUsers: Array.isArray(d.blockedUsers) ? d.blockedUsers : [],
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted
      };
    }

    function normalizeThread(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        type: d.type || "direct",
        status: d.status || "accepted",
        participantA: d.participantA || "",
        participantB: d.participantB || "",
        createdBy: d.createdBy || "",
        acceptedFromRequestId: d.acceptedFromRequestId || "",
        starterText: d.starterText || "",
        starterFrom: d.starterFrom || "",
        lastMessageText: d.lastMessageText || "",
        lastMessageAt: d.lastMessageAt || d.createdAt || null,
        lastSenderId: d.lastSenderId || "",
        createdAt: d.createdAt || null
      };
    }

    function normalizeRequest(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        requesterId: d.requesterId || "",
        targetId: d.targetId || "",
        text: d.text || "",
        status: d.status || "pending",
        createdAt: d.createdAt || null,
        updatedAt: d.updatedAt || null
      };
    }

    async function loadFullProfile(uid) {
      const [userSnap, publicSnap] = await Promise.all([
        getDoc(doc(db, "users", uid)).catch(() => null),
        getDoc(doc(db, "publicProfiles", uid)).catch(() => null)
      ]);

      return normalizeProfile({
        ...(publicSnap?.exists ? publicSnap.data() : {}),
        ...(userSnap?.exists ? userSnap.data() : {}),
        uid
      }, uid);
    }

    function showAvatar(url) {
      const cleanUrl = (url || "").trim();
      if (!cleanUrl) {
        avatar.classList.add("hidden");
        avatar.removeAttribute("src");
        avatarPlaceholder.classList.remove("hidden");
        return;
      }
      avatar.src = cleanUrl;
      avatar.classList.remove("hidden");
      avatarPlaceholder.classList.add("hidden");
    }

    avatar.addEventListener("error", () => {
      avatar.classList.add("hidden");
      avatarPlaceholder.classList.remove("hidden");
    });

    function setHeader(profile) {
      targetNameLink.textContent = profile.displayName || "Member";
      targetNameLink.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;
      memberProfileBtn.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;
      profileBtn.href = `member.html?uid=${encodeURIComponent(profile.uid)}`;

      if (profile.username) {
        targetUsername.textContent = "@" + profile.username;
        targetUsername.classList.remove("hidden");
      } else {
        targetUsername.classList.add("hidden");
      }

      if (profile.verified) verifiedDot.classList.remove("hidden");
      else verifiedDot.classList.add("hidden");

      targetBio.textContent = profile.bio?.trim() ? profile.bio : "BareWorld member";
      showAvatar(profile.photoURL || "");
    }

    function clearMessageListener() {
      if (messagesUnsub) {
        try { messagesUnsub(); } catch {}
        messagesUnsub = null;
      }
    }

    function clearRequestListener() {
      if (requestDocUnsub) {
        try { requestDocUnsub(); } catch {}
        requestDocUnsub = null;
      }
    }

    function clearAllListeners() {
      clearMessageListener();
      clearRequestListener();
    }

    function showBlocked(text) {
      blockedText.textContent = text;
      blockedPanel.classList.remove("hidden");
      messagesPanel.classList.add("hidden");
      requestInfoPanel.classList.add("hidden");
      composerPanel.classList.add("hidden");
    }

    function hideBlocked() {
      blockedPanel.classList.add("hidden");
    }

    function setModeUI(mode) {
      currentMode = mode;
      hideBlocked();

      messagesPanel.classList.add("hidden");
      requestInfoPanel.classList.add("hidden");
      composerPanel.classList.add("hidden");

      requestActionRow.classList.add("hidden");
      requestPreviewBox.classList.add("hidden");
      setFormMessage("");

      if (mode === "chat") {
        modeChip.textContent = "Chat";
        modeChip.className = "chip chip-blue";
        statusChip.textContent = "Accepted";
        statusChip.className = "chip chip-green";
        messagesPanel.classList.remove("hidden");
        composerPanel.classList.remove("hidden");
        composerNote.textContent = "This is a direct chat.";
        topSub.textContent = "Chat";
      }

      if (mode === "direct_new") {
        modeChip.textContent = "Chat";
        modeChip.className = "chip chip-blue";
        statusChip.textContent = "Ready to start";
        statusChip.className = "chip chip-purple";
        messagesPanel.classList.remove("hidden");
        messagesEmpty.classList.remove("hidden");
        messagesList.classList.add("hidden");
        messagesLoading.classList.add("hidden");
        composerPanel.classList.remove("hidden");
        composerNote.textContent = "Your first message will start the chat.";
        topSub.textContent = "New chat";
      }

      if (mode === "request_compose") {
        modeChip.textContent = "Request";
        modeChip.className = "chip chip-yellow";
        statusChip.textContent = "One message allowed";
        statusChip.className = "chip chip-purple";
        requestInfoPanel.classList.remove("hidden");
        composerPanel.classList.remove("hidden");
        requestInfoBox.textContent = "You are not a follower yet. Send one message request. They must accept it before full chat opens.";
        composerNote.textContent = "Only one request message is allowed until accepted.";
        topSub.textContent = "Message request";
      }

      if (mode === "request_outgoing_pending") {
        modeChip.textContent = "Request";
        modeChip.className = "chip chip-yellow";
        statusChip.textContent = "Pending";
        statusChip.className = "chip chip-purple";
        requestInfoPanel.classList.remove("hidden");
        requestPreviewBox.classList.remove("hidden");
        requestPreviewBox.textContent = requestDocModel?.text
          ? `Your request message:\n\n${requestDocModel.text}`
          : "Your request is pending.";
        requestInfoBox.textContent = "Your message request is pending. Full chat will open after they accept.";
        topSub.textContent = "Request pending";
      }

      if (mode === "request_incoming_pending") {
        modeChip.textContent = "Request";
        modeChip.className = "chip chip-yellow";
        statusChip.textContent = "Incoming request";
        statusChip.className = "chip chip-purple";
        requestInfoPanel.classList.remove("hidden");
        requestActionRow.classList.remove("hidden");
        requestPreviewBox.classList.remove("hidden");
        requestPreviewBox.textContent = requestDocModel?.text
          ? `Request message:\n\n${requestDocModel.text}`
          : "No request message.";
        requestInfoBox.textContent = "This person is not an approved chat yet. Accept to open full chat.";
        topSub.textContent = "Incoming request";
      }

      if (mode === "request_declined") {
        modeChip.textContent = "Request";
        modeChip.className = "chip chip-yellow";
        statusChip.textContent = "Declined";
        statusChip.className = "chip chip-red";
        requestInfoPanel.classList.remove("hidden");
        requestInfoBox.textContent = "This request was declined.";
        topSub.textContent = "Request declined";
      }
    }

    function scrollMessagesToBottom() {
      requestAnimationFrame(() => {
        messagesList.scrollTop = messagesList.scrollHeight + 200;
      });
    }

    function listenToMessages(threadId) {
      clearMessageListener();

      messagesPanel.classList.remove("hidden");
      messagesLoading.classList.remove("hidden");
      messagesList.classList.add("hidden");
      messagesEmpty.classList.add("hidden");

      const q = query(
        collection(db, "chat_threads", threadId, "messages"),
        orderBy("createdAt", "asc")
      );

      messagesUnsub = onSnapshot(q, (snap) => {
        messagesLoading.classList.add("hidden");
        messagesList.innerHTML = "";

        if (snap.empty) {
          messagesList.classList.add("hidden");
          messagesEmpty.classList.remove("hidden");
          return;
        }

        messagesEmpty.classList.add("hidden");
        messagesList.classList.remove("hidden");

        snap.docs.forEach(d => {
          const msg = d.data();
          const mine = msg.senderId === currentUser.uid;

          const row = document.createElement("div");
          row.className = `bubble-row ${mine ? "mine" : "other"}`;

          row.innerHTML = `
            <div class="bubble ${mine ? "mine" : "other"}">
              <div class="bubble-text">${escapeHtml(msg.text || "")}</div>
              <div class="bubble-meta">
                <div class="bubble-time">${escapeHtml(formatDate(msg.createdAt))}</div>
              </div>
            </div>
          `;

          messagesList.appendChild(row);
        });

        scrollMessagesToBottom();
      }, (err) => {
        console.error(err);
        messagesLoading.classList.add("hidden");
        messagesList.classList.add("hidden");
        messagesEmpty.classList.remove("hidden");
        messagesEmpty.textContent = "Could not load messages.";
      });
    }

    function listenToPendingRequest(requestId, direction) {
      clearRequestListener();

      requestDocUnsub = onSnapshot(doc(db, "message_requests", requestId), async (snap) => {
        if (!snap.exists()) return;

        requestDocModel = normalizeRequest({ id: snap.id, ...snap.data() }, snap.id);

        if (requestDocModel.status === "accepted") {
          const threadId = makeThreadId(requestDocModel.requesterId, requestDocModel.targetId);
          const threadSnap = await getDoc(doc(db, "chat_threads", threadId));

          if (threadSnap.exists()) {
            await openThread(normalizeThread({ id: threadSnap.id, ...threadSnap.data() }, threadSnap.id));
            setPageMessage("Request accepted.", "ok");
            return;
          }
        }

        if (requestDocModel.status === "declined") {
          setModeUI("request_declined");
          if (direction === "outgoing") {
            requestPreviewBox.classList.remove("hidden");
            requestPreviewBox.textContent = requestDocModel.text
              ? `Your request message:\n\n${requestDocModel.text}`
              : "Request declined.";
          }
          return;
        }

        setModeUI(direction === "incoming" ? "request_incoming_pending" : "request_outgoing_pending");
      });
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.uid) return;
      try {
        await addDoc(collection(db, "notifications", targetUid, "items"), payload);
      } catch {}
    }

    async function checkFollowing(viewerUid, targetUid) {
      try {
        const direct = await getDoc(doc(db, "follows", `${viewerUid}__${targetUid}`));
        if (direct.exists()) return true;
      } catch {}

      try {
        const snap = await getDocs(
          query(
            collection(db, "follows"),
            where("followerId", "==", viewerUid),
            where("followingId", "==", targetUid),
            limit(1)
          )
        );
        return !snap.empty;
      } catch {
        return false;
      }
    }

    async function findExistingThreadByUsers(uidA, uidB) {
      const threadId = makeThreadId(uidA, uidB);
      const snap = await getDoc(doc(db, "chat_threads", threadId));
      if (!snap.exists()) return null;
      return normalizeThread({ id: snap.id, ...snap.data() }, snap.id);
    }

    async function loadRequestBetween(requesterId, targetId) {
      const requestId = `${requesterId}__${targetId}`;
      const snap = await getDoc(doc(db, "message_requests", requestId));
      if (!snap.exists()) return null;
      return normalizeRequest({ id: snap.id, ...snap.data() }, snap.id);
    }

    async function openThread(threadModel) {
      clearAllListeners();

      currentThreadId = threadModel.id;
      currentThreadData = threadModel;
      currentTargetUid = threadModel.participantA === currentUser.uid ? threadModel.participantB : threadModel.participantA;
      currentTargetProfile = await loadFullProfile(currentTargetUid);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        setHeader(currentTargetProfile);
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(currentTargetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.uid);

      setHeader(currentTargetProfile);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      setModeUI("chat");
      listenToMessages(currentThreadId);
    }

    async function openByTargetUid(targetUid) {
      clearAllListeners();

      currentTargetUid = targetUid;
      currentTargetProfile = await loadFullProfile(targetUid);
      setHeader(currentTargetProfile);

      if (
        currentTargetProfile.softDeleted ||
        currentTargetProfile.isHiddenByAdmin ||
        currentTargetProfile.moderationStatus === "banned"
      ) {
        showBlocked("This account is not available for chat.");
        return;
      }

      iBlockedTarget = (currentViewerProfile.blockedUsers || []).includes(targetUid);
      targetBlockedMe = (currentTargetProfile.blockedUsers || []).includes(currentUser.uid);

      if (iBlockedTarget || targetBlockedMe) {
        showBlocked(
          iBlockedTarget
            ? "You blocked this member. Unblock them from settings to chat again."
            : "This member is not available for chat."
        );
        return;
      }

      const existingThread = await findExistingThreadByUsers(currentUser.uid, targetUid);
      if (existingThread && existingThread.status === "accepted") {
        await openThread(existingThread);
        return;
      }

      const outgoingReq = await loadRequestBetween(currentUser.uid, targetUid);
      if (outgoingReq && outgoingReq.status === "pending") {
        requestDocModel = outgoingReq;
        setModeUI("request_outgoing_pending");
        listenToPendingRequest(outgoingReq.id, "outgoing");
        return;
      }

      const incomingReq = await loadRequestBetween(targetUid, currentUser.uid);
      if (incomingReq && incomingReq.status === "pending") {
        requestDocModel = incomingReq;
        setModeUI("request_incoming_pending");
        listenToPendingRequest(incomingReq.id, "incoming");
        return;
      }

      const iFollowTarget = await checkFollowing(currentUser.uid, targetUid);

      if (iFollowTarget) {
        currentThreadId = makeThreadId(currentUser.uid, targetUid);
        currentThreadData = null;
        setModeUI("direct_new");
        return;
      }

      setModeUI("request_compose");
    }

    async function sendDirectMessage(text) {
      const threadId = makeThreadId(currentUser.uid, currentTargetUid);
      const threadRef = doc(db, "chat_threads", threadId);
      const threadSnap = await getDoc(threadRef);

      if (!threadSnap.exists()) {
        await setDoc(threadRef, {
          type: "direct",
          status: "accepted",
          participantA: getSortedPair(currentUser.uid, currentTargetUid)[0],
          participantB: getSortedPair(currentUser.uid, currentTargetUid)[1],
          createdBy: currentUser.uid,
          createdAt: serverTimestamp(),
          lastMessageText: text,
          lastMessageAt: serverTimestamp(),
          lastSenderId: currentUser.uid
        });
      } else {
        await updateDoc(threadRef, {
          status: "accepted",
          lastMessageText: text,
          lastMessageAt: serverTimestamp(),
          lastSenderId: currentUser.uid
        });
      }

      await addDoc(collection(db, "chat_threads", threadId, "messages"), {
        senderId: currentUser.uid,
        text,
        createdAt: serverTimestamp()
      });

      await createNotificationSafe(currentTargetUid, {
        type: "message",
        title: "New message",
        text: `${currentViewerProfile?.displayName || currentUser.displayName || "Someone"} sent you a message.`,
        fromUserId: currentUser.uid,
        toUserId: currentTargetUid,
        threadId,
        createdAt: serverTimestamp(),
        isRead: false
      });

      const finalThreadSnap = await getDoc(threadRef);
      currentThreadData = normalizeThread({ id: finalThreadSnap.id, ...finalThreadSnap.data() }, finalThreadSnap.id);
      currentThreadId = threadId;
      setModeUI("chat");
      listenToMessages(threadId);
    }

    async function sendRequestMessage(text) {
      const requestId = `${currentUser.uid}__${currentTargetUid}`;

      await setDoc(doc(db, "message_requests", requestId), {
        requesterId: currentUser.uid,
        targetId: currentTargetUid,
        text,
        status: "pending",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      await createNotificationSafe(currentTargetUid, {
        type: "message_request",
        title: "New message request",
        text: `${currentViewerProfile?.displayName || currentUser.displayName || "Someone"} sent you a message request.`,
        fromUserId: currentUser.uid,
        toUserId: currentTargetUid,
        requestId,
        createdAt: serverTimestamp(),
        isRead: false
      });

      requestDocModel = {
        id: requestId,
        requesterId: currentUser.uid,
        targetId: currentTargetUid,
        text,
        status: "pending",
        createdAt: new Date()
      };

      setModeUI("request_outgoing_pending");
      listenToPendingRequest(requestId, "outgoing");
    }

    async function acceptIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateDoc(doc(db, "message_requests", requestDocModel.id), {
          status: "accepted",
          acceptedAt: serverTimestamp(),
          acceptedBy: currentUser.uid
        });

        const threadId = makeThreadId(requestDocModel.requesterId, requestDocModel.targetId);
        const threadRef = doc(db, "chat_threads", threadId);
        const threadSnap = await getDoc(threadRef);

        if (!threadSnap.exists()) {
          await setDoc(threadRef, {
            type: "direct",
            status: "accepted",
            participantA: getSortedPair(requestDocModel.requesterId, requestDocModel.targetId)[0],
            participantB: getSortedPair(requestDocModel.requesterId, requestDocModel.targetId)[1],
            createdBy: currentUser.uid,
            acceptedFromRequestId: requestDocModel.id,
            starterText: requestDocModel.text || "",
            starterFrom: requestDocModel.requesterId,
            createdAt: serverTimestamp(),
            lastMessageText: "",
            lastMessageAt: serverTimestamp(),
            lastSenderId: ""
          });
        }

        await createNotificationSafe(requestDocModel.requesterId, {
          type: "message_request_accepted",
          title: "Message request accepted",
          text: `${currentViewerProfile?.displayName || currentUser.displayName || "Someone"} accepted your message request.`,
          fromUserId: currentUser.uid,
          toUserId: requestDocModel.requesterId,
          threadId,
          createdAt: serverTimestamp(),
          isRead: false
        });

        const freshThreadSnap = await getDoc(threadRef);
        await openThread(normalizeThread({ id: freshThreadSnap.id, ...freshThreadSnap.data() }, freshThreadSnap.id));
        setPageMessage("Request accepted.", "ok");
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not accept request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    async function declineIncomingRequest() {
      if (!requestDocModel) return;

      acceptRequestBtn.disabled = true;
      declineRequestBtn.disabled = true;
      setPageMessage("");

      try {
        await updateDoc(doc(db, "message_requests", requestDocModel.id), {
          status: "declined",
          declinedAt: serverTimestamp(),
          declinedBy: currentUser.uid
        });

        setModeUI("request_declined");
        setPageMessage("Request declined.", "ok");
      } catch (err) {
        console.error(err);
        setPageMessage(err?.message || "Could not decline request.", "err");
        acceptRequestBtn.disabled = false;
        declineRequestBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", async () => {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!currentUser || !currentTargetUid) return;
      if (iBlockedTarget || targetBlockedMe) return;

      sendBtn.disabled = true;
      setFormMessage("");

      try {
        if (currentMode === "chat" || currentMode === "direct_new") {
          await sendDirectMessage(text);
          messageInput.value = "";
          autoResizeMessageBox();
          setFormMessage("Message sent.", "ok");
        } else if (currentMode === "request_compose") {
          await sendRequestMessage(text);
          messageInput.value = "";
          autoResizeMessageBox();
          setFormMessage("Request sent.", "ok");
        }
      } catch (err) {
        console.error(err);
        setFormMessage(err?.message || "Could not send message.", "err");
      }

      sendBtn.disabled = false;
    });

    acceptRequestBtn.addEventListener("click", acceptIncomingRequest);
    declineRequestBtn.addEventListener("click", declineIncomingRequest);

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "inbox.html";
    });

    function autoResizeMessageBox() {
      messageInput.style.height = "56px";
      const nextHeight = Math.min(messageInput.scrollHeight, 132);
      messageInput.style.height = nextHeight + "px";
    }

    messageInput.addEventListener("input", autoResizeMessageBox);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearAllListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      currentViewerProfile = await loadFullProfile(user.uid);

      const params = new URLSearchParams(window.location.search);
      const threadIdParam = (params.get("threadId") || "").trim();
      const uidParam = (params.get("uid") || "").trim();

      if (!threadIdParam && !uidParam) {
        showBlocked("No conversation selected.");
        return;
      }

      try {
        if (threadIdParam) {
          const threadSnap = await getDoc(doc(db, "chat_threads", threadIdParam));
          if (!threadSnap.exists()) {
            showBlocked("Chat not found.");
            return;
          }

          const threadModel = normalizeThread({ id: threadSnap.id, ...threadSnap.data() }, threadSnap.id);

          const isParticipant =
            threadModel.participantA === currentUser.uid ||
            threadModel.participantB === currentUser.uid;

          if (!isParticipant) {
            showBlocked("This chat is not available to you.");
            return;
          }

          if (threadModel.status === "accepted") {
            await openThread(threadModel);
            return;
          }

          currentTargetUid = threadModel.participantA === currentUser.uid ? threadModel.participantB : threadModel.participantA;
          currentTargetProfile = await loadFullProfile(currentTargetUid);
          setHeader(currentTargetProfile);

          const incomingReq = await loadRequestBetween(currentTargetUid, currentUser.uid);
          if (incomingReq && incomingReq.status === "pending") {
            requestDocModel = incomingReq;
            setModeUI("request_incoming_pending");
            listenToPendingRequest(incomingReq.id, "incoming");
            return;
          }

          const outgoingReq = await loadRequestBetween(currentUser.uid, currentTargetUid);
          if (outgoingReq && outgoingReq.status === "pending") {
            requestDocModel = outgoingReq;
            setModeUI("request_outgoing_pending");
            listenToPendingRequest(outgoingReq.id, "outgoing");
            return;
          }

          showBlocked("This request is no longer available.");
          return;
        }

        if (uidParam) {
          if (uidParam === currentUser.uid) {
            showBlocked("You cannot chat with yourself.");
            return;
          }

          await openByTargetUid(uidParam);
        }

        autoResizeMessageBox();
      } catch (err) {
        console.error(err);
        showBlocked("Could not load chat.");
      }
    });

    window.addEventListener("beforeunload", () => {
      clearAllListeners();
    });
  </script>
</body>
</html>
