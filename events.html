<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Events</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;--card:#121931;--card-soft:#161f3d;--line:rgba(255,255,255,0.08);
      --text:#ffffff;--muted:#9aa7c7;--blue:#4cc9ff;--green:#3ddc84;--yellow:#f5b942;--red:#ff5d73;--purple:#a78bfa;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%, #0d1326 100%);
      color:var(--text);min-height:100vh;padding:14px 14px 92px;
    }
    .app{max-width:720px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
      background:rgba(11,16,32,0.82);border:1px solid rgba(255,255,255,0.04);
      border-radius:18px;padding:12px 14px;margin-bottom:14px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;
    }
    .brand-wrap{display:flex;flex-direction:column;gap:2px}
    .brand{font-size:22px;font-weight:800;letter-spacing:.2px}
    .brand-sub{font-size:12px;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    .chip-btn{
      border:none;background:var(--card-soft);color:#fff;border-radius:12px;padding:10px 12px;
      text-decoration:none;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);
    }
    .chip-btn.primary{
      background:rgba(61,220,132,0.14);color:#c9f7dd;border-color:rgba(61,220,132,0.20);
    }
    .panel{
      background:rgba(18,25,49,0.88);border:1px solid var(--line);border-radius:22px;padding:16px;
      margin-bottom:14px;box-shadow:0 20px 40px rgba(0,0,0,0.18);
    }
    .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .section-title{font-size:20px;font-weight:800}
    .section-note{color:var(--muted);font-size:12px;line-height:1.5}
    .filters{display:grid;grid-template-columns:1fr 170px;gap:10px;margin-top:12px}
    input,select{
      width:100%;padding:13px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.07);
      background:#0f1630;color:#fff;outline:none;font-size:14px;
    }
    input::placeholder{color:#7f8cad}
    select option{color:#000}
    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .message{min-height:20px;font-size:14px;margin-top:10px}
    .success{color:#9cf0bf}.error{color:#ffb3bd}
    .events-grid{display:grid;gap:12px}
    .event-card{
      background:#0f1630;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:14px;
    }
    .event-title{font-size:18px;font-weight:800;line-height:1.4;margin-bottom:10px}
    .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .badge{
      display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;
    }
    .badge-public{background:rgba(76,201,255,0.14);color:#d8f7ff;border:1px solid rgba(76,201,255,0.20)}
    .badge-private{background:rgba(245,185,66,0.14);color:#ffe7b0;border:1px solid rgba(245,185,66,0.20)}
    .badge-joined{background:rgba(61,220,132,0.14);color:#c9f7dd;border:1px solid rgba(61,220,132,0.20)}
    .badge-mine{background:rgba(167,139,250,0.14);color:#e8defd;border:1px solid rgba(167,139,250,0.20)}
    .event-meta{display:grid;gap:6px;color:#d7def5;font-size:13px;line-height:1.6;margin-bottom:10px}
    .event-desc{color:#e8eeff;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word;margin-bottom:12px}
    .event-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .action-btn{
      border:none;cursor:pointer;font-weight:800;border-radius:12px;padding:10px 14px;font-size:13px;
    }
    .join-btn{background:rgba(61,220,132,0.14);color:#c9f7dd;border:1px solid rgba(61,220,132,0.20)}
    .leave-btn{background:rgba(255,93,115,0.14);color:#ffd3d9;border:1px solid rgba(255,93,115,0.20)}
    .mine-btn{background:#182248;color:#c9d5ff;border:1px solid rgba(255,255,255,0.06);cursor:not-allowed}
    .empty-box{
      text-align:center;padding:24px 10px;color:var(--muted);background:#0f1630;border-radius:16px;
      border:1px dashed rgba(255,255,255,0.08);
    }
    .hidden{display:none!important}
    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(720px, calc(100% - 20px));
      background:rgba(12,18,35,0.92);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(18px);
      border-radius:20px;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:50;
      box-shadow:0 20px 40px rgba(0,0,0,0.25);
    }
    .nav-link{
      text-decoration:none;color:#b9c4e3;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:10px 6px;border-radius:14px;font-size:11px;font-weight:700;min-height:58px;
      border:none;background:transparent;cursor:pointer;
    }
    .nav-link .icon{font-size:18px;line-height:1}
    .nav-link.active{background:rgba(76,201,255,0.14);color:#d8f7ff}
    @media (max-width:700px){
      body{padding:12px 12px 92px}
      .topbar{padding:10px 12px}
      .brand{font-size:20px}
      .chip-btn{padding:9px 10px;font-size:12px}
      .filters{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand-wrap">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Events</div>
      </div>

      <div class="top-actions">
        <a href="create-event.html" class="chip-btn primary">Create Event</a>
        <a href="settings.html" class="chip-btn">Settings</a>
      </div>
    </div>

    <div class="panel">
      <div class="section-head">
        <div class="section-title">Browse Events</div>
        <div class="section-note">Join or leave events</div>
      </div>

      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search events..." />
        <select id="typeFilter">
          <option value="all">All Events</option>
          <option value="public">Public Only</option>
          <option value="private">Private Only</option>
          <option value="joined">Joined By Me</option>
          <option value="mine">Created By Me</option>
        </select>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading events...</div>
      <div id="eventsGrid" class="events-grid hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="events.html" class="nav-link active">
      <span class="icon">◈</span>
      <span>Events</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      getDocs,
      doc,
      getDoc,
      setDoc,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const eventsGrid = document.getElementById("eventsGrid");
    const emptyBox = document.getElementById("emptyBox");
    const pageMessage = document.getElementById("pageMessage");
    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");

    let currentUser = null;
    let allEvents = [];
    let joinedEventIds = new Set();

    function setMessage(text, type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatCreatedAt(ts) {
      if (!ts) return "Recently added";
      try {
        return ts.toDate().toLocaleString();
      } catch {
        return "Recently added";
      }
    }

    function sortEvents(events) {
      return [...events].sort((a, b) => {
        const aTime = a.createdAt?.seconds || 0;
        const bTime = b.createdAt?.seconds || 0;
        return bTime - aTime;
      });
    }

    function getFilteredEvents() {
      const q = searchInput.value.trim().toLowerCase();
      const filter = typeFilter.value;

      let filtered = allEvents.filter(event => {
        if (!event || !event.id) return false;

        if (filter === "public" && event.visibility !== "public") return false;
        if (filter === "private" && event.visibility !== "private") return false;
        if (filter === "joined" && !joinedEventIds.has(event.id)) return false;
        if (filter === "mine" && event.creatorId !== currentUser.uid) return false;

        if (!q) return true;

        const haystack = [
          event.title || "",
          event.city || "",
          event.description || "",
          event.creatorName || "",
          event.date || "",
          event.time || ""
        ].join(" ").toLowerCase();

        return haystack.includes(q);
      });

      return sortEvents(filtered);
    }

    async function loadJoinedState(events) {
      const joined = new Set();

      for (const event of events) {
        try {
          const joinRef = doc(db, "events", event.id, "members", currentUser.uid);
          const joinSnap = await getDoc(joinRef);
          if (joinSnap.exists()) {
            joined.add(event.id);
          }
        } catch (error) {
          console.error("Join state error:", error);
        }
      }

      joinedEventIds = joined;
    }

    async function joinEvent(eventId) {
      try {
        const joinRef = doc(db, "events", eventId, "members", currentUser.uid);
        await setDoc(joinRef, {
          uid: currentUser.uid
        });

        joinedEventIds.add(eventId);
        renderEvents();
        setMessage("Event joined.", "success");
      } catch (error) {
        console.error(error);
        setMessage("Could not join event.", "error");
      }
    }

    async function leaveEvent(eventId) {
      try {
        const joinRef = doc(db, "events", eventId, "members", currentUser.uid);
        await deleteDoc(joinRef);

        joinedEventIds.delete(eventId);
        renderEvents();
        setMessage("Event left.", "success");
      } catch (error) {
        console.error(error);
        setMessage("Could not leave event.", "error");
      }
    }

    function renderEvents() {
      const events = getFilteredEvents();
      eventsGrid.innerHTML = "";

      if (!events.length) {
        eventsGrid.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        return;
      }

      emptyBox.classList.add("hidden");
      eventsGrid.classList.remove("hidden");

      events.forEach(event => {
        const joined = joinedEventIds.has(event.id);
        const isMine = event.creatorId === currentUser.uid;

        const card = document.createElement("div");
        card.className = "event-card";

        card.innerHTML = `
          <div class="event-title">${escapeHtml(event.title || "Untitled Event")}</div>

          <div class="badge-row">
            <span class="badge ${event.visibility === "private" ? "badge-private" : "badge-public"}">
              ${event.visibility === "private" ? "Private" : "Public"}
            </span>
            ${joined ? `<span class="badge badge-joined">Joined</span>` : ""}
            ${isMine ? `<span class="badge badge-mine">My Event</span>` : ""}
          </div>

          <div class="event-meta">
            <div><strong>City:</strong> ${escapeHtml(event.city || "Not added")}</div>
            <div><strong>Date:</strong> ${escapeHtml(event.date || "-")}</div>
            <div><strong>Time:</strong> ${escapeHtml(event.time || "-")}</div>
            <div><strong>Host:</strong> ${escapeHtml(event.creatorName || "Member")}</div>
            <div><strong>Added:</strong> ${escapeHtml(formatCreatedAt(event.createdAt))}</div>
          </div>

          <div class="event-desc">${escapeHtml(event.description || "No description added.")}</div>

          <div class="event-actions">
            ${
              isMine
                ? `<button class="action-btn mine-btn" disabled>You created this</button>`
                : joined
                  ? `<button class="action-btn leave-btn action-event-btn" data-action="leave" data-id="${event.id}">Leave</button>`
                  : `<button class="action-btn join-btn action-event-btn" data-action="join" data-id="${event.id}">Join</button>`
            }
          </div>
        `;

        eventsGrid.appendChild(card);
      });

      document.querySelectorAll(".action-event-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const eventId = btn.getAttribute("data-id");
          const action = btn.getAttribute("data-action");

          btn.disabled = true;

          if (action === "join") {
            await joinEvent(eventId);
          } else {
            await leaveEvent(eventId);
          }

          btn.disabled = false;
        });
      });
    }

    searchInput.addEventListener("input", renderEvents);
    typeFilter.addEventListener("change", renderEvents);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const snap = await getDocs(collection(db, "events"));
        allEvents = snap.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));

        await loadJoinedState(allEvents);

        loading.classList.add("hidden");
        renderEvents();
      } catch (error) {
        console.error(error);
        loading.textContent = "Could not load events.";
      }
    });
  </script>
</body>
</html>
