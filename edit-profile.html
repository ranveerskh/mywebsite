<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Edit Profile</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;--card:#121931;--soft:#161f3d;--line:rgba(255,255,255,.08);
      --text:#fff;--muted:#9aa7c7;--blue:#4cc9ff;--green:#22c55e;--yellow:#f5b942;--purple:#a78bfa;--red:#ff5d73;
    }
    body{
      background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);
      color:var(--text);min-height:100vh;padding:14px 14px 92px;
    }
    .app{max-width:760px;margin:0 auto}

    .topbar{
      position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
      background:rgba(11,16,32,.82);border:1px solid rgba(255,255,255,.04);
      border-radius:18px;padding:10px 12px;margin-bottom:14px;
      display:grid;grid-template-columns:48px 1fr 48px;align-items:center;gap:10px;
    }
    .top-icon-btn{
      width:48px;height:48px;border:none;background:var(--soft);color:#fff;border-radius:14px;
      cursor:pointer;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
      text-decoration:none;
    }
    .top-icon-btn svg{width:20px;height:20px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}

    .panel{
      background:rgba(18,25,49,.88);border:1px solid var(--line);border-radius:22px;
      padding:16px;margin-bottom:14px;box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .hidden{display:none!important}

    .meta-box{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;
    }
    .meta-item{
      background:#0f1630;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px;
    }
    .meta-item small{
      display:block;color:var(--muted);margin-bottom:6px;font-size:12px;
    }
    .meta-item span{font-weight:800}

    .photo-card{
      background:#0f1630;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:16px;margin-bottom:18px;
    }
    .photo-preview-wrap{
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px;
    }
    .photo-preview{
      width:120px;height:120px;border-radius:20px;object-fit:cover;background:#1b2445;border:1px solid rgba(255,255,255,.10);
    }
    .photo-placeholder{
      width:120px;height:120px;border-radius:20px;display:flex;align-items:center;justify-content:center;
      text-align:center;padding:10px;background:#1b2445;border:1px solid rgba(255,255,255,.10);
      color:var(--muted);font-size:13px;line-height:1.4;
    }

    .field{margin-bottom:16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{
      display:block;margin-bottom:8px;font-size:14px;color:#cbd5e1;
    }
    input[type="text"], textarea, select{
      width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);color:#fff;outline:none;font-size:15px;
    }
    textarea{min-height:110px;resize:vertical}
    input::placeholder, textarea::placeholder{color:#94a3b8}
    select option{color:#000}

    .check-row{
      display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;border-radius:12px;
      background:rgba(255,255,255,.05);
    }
    .check-row input{width:auto;transform:scale(1.08)}

    .row-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700;text-decoration:none;display:inline-block;
    }
    .btn-back{background:#334155;color:#fff}
    .btn-feed{background:rgba(76,201,255,.14);color:#d8f7ff;border:1px solid rgba(76,201,255,.20)}
    .btn-save{width:100%;background:var(--green);color:#052e16;font-size:16px;margin-top:8px}
    .btn-muted{background:#475569;color:#cbd5e1;cursor:not-allowed;opacity:.85}

    .message{
      margin-top:14px;min-height:22px;font-size:14px;text-align:center;
    }
    .success{color:#86efac}
    .error{color:#fda4af}

    .small-note,.note,.username-note{
      color:#94a3b8;line-height:1.5;font-size:12px;
    }
    .small-note,.username-note{margin-top:8px}
    .note{margin-top:12px}

    .username-status{
      margin-top:8px;font-size:12px;font-weight:700;min-height:18px;
    }
    .username-ok{color:#86efac}
    .username-bad{color:#fda4af}

    @media (max-width:640px){
      .meta-box,.grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="profile.html" class="top-icon-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Edit profile</div>
      </div>

      <a href="feed.html" class="top-icon-btn" aria-label="Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.5L12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading profile...</div>

      <div id="profileContent" class="hidden">
        <div class="meta-box">
          <div class="meta-item">
            <small>Email</small>
            <span id="emailText">-</span>
          </div>
          <div class="meta-item">
            <small>Verified Status</small>
            <span id="verifiedText">No</span>
          </div>
        </div>

        <div class="photo-card">
          <div class="photo-preview-wrap">
            <img id="photoPreview" class="photo-preview hidden" alt="Profile Preview" />
            <div id="photoPlaceholder" class="photo-placeholder">No profile photo yet</div>
          </div>

          <div class="field">
            <label for="photoURL">Profile Photo Link</label>
            <input type="text" id="photoURL" placeholder="Paste direct image link (jpg, png, webp)" />
            <div class="small-note">Example: https://example.com/photo.jpg</div>
          </div>

          <div class="row-actions">
            <button type="button" id="previewBtn" class="btn btn-back">Preview Link</button>
            <button type="button" class="btn btn-muted" disabled>Upload Photo Coming Soon</button>
          </div>
        </div>

        <form id="profileForm">
          <div class="field">
            <label for="displayName">Display Name</label>
            <input type="text" id="displayName" placeholder="Your public profile name" required />
          </div>

          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose a unique username" required />
            <div class="username-note">
              3–20 characters. Use only letters, numbers, dot and underscore. Example: ranveer_94
            </div>
            <div id="usernameStatus" class="username-status"></div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="city">City</label>
              <input type="text" id="city" placeholder="Your city" />
            </div>

            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender">
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="non_binary">Non-binary</option>
                <option value="trans_man">Trans Man</option>
                <option value="trans_woman">Trans Woman</option>
                <option value="genderqueer">Genderqueer</option>
                <option value="agender">Agender</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
                <option value="self_describe">Self-describe</option>
              </select>
            </div>
          </div>

          <div class="field hidden" id="genderCustomWrap">
            <label for="genderCustom">Describe Your Gender</label>
            <input type="text" id="genderCustom" placeholder="Write your gender" />
          </div>

          <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" placeholder="Write a short bio..."></textarea>
          </div>

          <div class="check-row">
            <input type="checkbox" id="cityVisible" />
            <label for="cityVisible" style="margin:0;">Show my city on profile</label>
          </div>

          <div class="check-row">
            <input type="checkbox" id="genderVisible" />
            <label for="genderVisible" style="margin:0;">Show my gender on profile</label>
          </div>

          <div class="check-row">
            <input type="checkbox" id="isPrivate" />
            <label for="isPrivate" style="margin:0;">Make my profile private</label>
          </div>

          <button type="submit" class="btn btn-save" id="saveBtn">Save Profile</button>
          <div id="message" class="message"></div>
        </form>

        <div class="note">
          Your real name is not shown here. It stays private for verification/admin use only.
        </div>

        <div class="row-actions" style="margin-top:14px;">
          <button id="logoutBtn" class="btn" style="background:#ef4444;color:#fff;">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      onAuthStateChanged,
      signOut,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      setDoc,
      writeBatch,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const loading = document.getElementById("loading");
    const profileContent = document.getElementById("profileContent");
    const logoutBtn = document.getElementById("logoutBtn");
    const profileForm = document.getElementById("profileForm");
    const saveBtn = document.getElementById("saveBtn");
    const previewBtn = document.getElementById("previewBtn");
    const message = document.getElementById("message");

    const emailText = document.getElementById("emailText");
    const verifiedText = document.getElementById("verifiedText");

    const displayNameInput = document.getElementById("displayName");
    const usernameInput = document.getElementById("username");
    const usernameStatus = document.getElementById("usernameStatus");
    const cityInput = document.getElementById("city");
    const bioInput = document.getElementById("bio");
    const cityVisibleInput = document.getElementById("cityVisible");
    const isPrivateInput = document.getElementById("isPrivate");
    const photoURLInput = document.getElementById("photoURL");
    const genderInput = document.getElementById("gender");
    const genderCustomInput = document.getElementById("genderCustom");
    const genderCustomWrap = document.getElementById("genderCustomWrap");
    const genderVisibleInput = document.getElementById("genderVisible");

    const photoPreview = document.getElementById("photoPreview");
    const photoPlaceholder = document.getElementById("photoPlaceholder");

    let currentUser = null;
    let verifiedStatus = false;
    let originalUsernameLower = "";

    function showMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function normalizeUsername(value) {
      return String(value || "").trim().toLowerCase();
    }

    function isValidUsername(username) {
      return /^[a-z0-9._]{3,20}$/.test(username);
    }

    function setUsernameStatus(text = "", ok = false) {
      usernameStatus.textContent = text;
      usernameStatus.className = `username-status ${text ? (ok ? "username-ok" : "username-bad") : ""}`;
    }

    function showPreview(url) {
      const cleanUrl = (url || "").trim();

      if (!cleanUrl) {
        photoPreview.classList.add("hidden");
        photoPreview.removeAttribute("src");
        photoPlaceholder.classList.remove("hidden");
        photoPlaceholder.textContent = "No profile photo yet";
        return;
      }

      photoPreview.src = cleanUrl;
      photoPreview.classList.remove("hidden");
      photoPlaceholder.classList.add("hidden");
    }

    function toggleGenderCustom() {
      if (genderInput.value === "self_describe") {
        genderCustomWrap.classList.remove("hidden");
      } else {
        genderCustomWrap.classList.add("hidden");
        genderCustomInput.value = "";
      }
    }

    async function checkUsernameAvailability(rawValue) {
      const username = normalizeUsername(rawValue);

      if (!username) {
        setUsernameStatus("Username is required.", false);
        return { ok: false, reason: "empty", username: "" };
      }

      if (!isValidUsername(username)) {
        setUsernameStatus("Invalid username format.", false);
        return { ok: false, reason: "invalid", username };
      }

      try {
        const usernameSnap = await getDoc(doc(db, "usernames", username));

        if (!usernameSnap.exists()) {
          setUsernameStatus("Username available.", true);
          return { ok: true, reason: "available", username };
        }

        const ownerUid = usernameSnap.data()?.uid || "";
        if (ownerUid === auth.currentUser?.uid) {
          setUsernameStatus("This is your current username.", true);
          return { ok: true, reason: "own", username };
        }

        setUsernameStatus("Username already taken.", false);
        return { ok: false, reason: "taken", username };
      } catch (err) {
        console.error("Username check failed:", err);
        setUsernameStatus("Could not verify username.", false);
        return { ok: false, reason: "error", username };
      }
    }

    genderInput.addEventListener("change", toggleGenderCustom);

    usernameInput.addEventListener("input", () => {
      const normalized = normalizeUsername(usernameInput.value);
      if (usernameInput.value !== normalized) {
        usernameInput.value = normalized;
      }

      if (!normalized) {
        setUsernameStatus("");
        return;
      }

      setUsernameStatus("");
    });

    usernameInput.addEventListener("blur", async () => {
      const normalized = normalizeUsername(usernameInput.value);
      usernameInput.value = normalized;

      if (!normalized) {
        setUsernameStatus("Username is required.", false);
        return;
      }

      await checkUsernameAvailability(normalized);
    });

    usernameInput.addEventListener("change", async () => {
      const normalized = normalizeUsername(usernameInput.value);
      usernameInput.value = normalized;

      if (!normalized) {
        setUsernameStatus("Username is required.", false);
        return;
      }

      await checkUsernameAvailability(normalized);
    });

    photoPreview.addEventListener("error", () => {
      photoPreview.classList.add("hidden");
      photoPlaceholder.classList.remove("hidden");
      photoPlaceholder.textContent = "Image could not be loaded";
    });

    photoPreview.addEventListener("load", () => {
      photoPreview.classList.remove("hidden");
      photoPlaceholder.classList.add("hidden");
    });

    previewBtn.addEventListener("click", () => {
      const url = photoURLInput.value.trim();

      if (!url) {
        showMessage("Paste a photo link first.", "error");
        showPreview("");
        return;
      }

      showPreview(url);
      showMessage("Preview updated.", "success");
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      emailText.textContent = user.email || "-";

      try {
        const userRef = doc(db, "users", user.uid);
        const publicRef = doc(db, "publicProfiles", user.uid);

        const [userSnap, publicSnap] = await Promise.all([
          getDoc(userRef),
          getDoc(publicRef)
        ]);

        const userData = userSnap.exists() ? userSnap.data() : {};
        const publicData = publicSnap.exists() ? publicSnap.data() : {};
        const merged = { ...publicData, ...userData };

        displayNameInput.value = merged.displayName || user.displayName || "";
        usernameInput.value = normalizeUsername(merged.username || merged.handle || merged.userName || "");
        cityInput.value = merged.city || "";
        bioInput.value = merged.bio || "";
        cityVisibleInput.checked = !!merged.cityVisible;
        isPrivateInput.checked = !!(merged.isPrivate || merged.privateProfile || merged.private || merged.accountPrivate);
        photoURLInput.value = merged.photoURL || "";
        genderInput.value = merged.gender || "";
        genderCustomInput.value = merged.genderCustom || "";
        genderVisibleInput.checked = !!merged.genderVisible;

        verifiedStatus = !!(merged.isVerified || merged.verified);
        verifiedText.textContent = verifiedStatus ? "Yes" : "No";

        originalUsernameLower = normalizeUsername(merged.username || "");
        toggleGenderCustom();
        showPreview(merged.photoURL || "");

        if (usernameInput.value) {
          await checkUsernameAvailability(usernameInput.value);
        }

        loading.classList.add("hidden");
        profileContent.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        loading.textContent = "Error loading profile.";
      }
    });

    profileForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentUser) return;

      const displayName = displayNameInput.value.trim();
      const username = normalizeUsername(usernameInput.value);
      const city = cityInput.value.trim();
      const bio = bioInput.value.trim();
      const cityVisible = cityVisibleInput.checked;
      const isPrivate = isPrivateInput.checked;
      const photoURL = photoURLInput.value.trim();
      const gender = genderInput.value;
      const genderCustom = gender === "self_describe" ? genderCustomInput.value.trim() : "";
      const genderVisible = genderVisibleInput.checked;

      if (!displayName) {
        showMessage("Display name is required.", "error");
        return;
      }

      if (!username) {
        showMessage("Username is required.", "error");
        setUsernameStatus("Username is required.", false);
        return;
      }

      if (!isValidUsername(username)) {
        showMessage("Username must be 3-20 characters and only use letters, numbers, dot or underscore.", "error");
        setUsernameStatus("Invalid username format.", false);
        return;
      }

      if (gender === "self_describe" && !genderCustom) {
        showMessage("Please describe your gender.", "error");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const availability = await checkUsernameAvailability(username);
        if (!availability.ok && availability.reason !== "own") {
          showMessage("Please choose a different username.", "error");
          saveBtn.disabled = false;
          saveBtn.textContent = "Save Profile";
          return;
        }

        const batch = writeBatch(db);

        if (originalUsernameLower && originalUsernameLower !== username) {
          batch.delete(doc(db, "usernames", originalUsernameLower));
        }

        batch.set(doc(db, "usernames", username), {
          uid: currentUser.uid,
          username,
          updatedAt: serverTimestamp()
        }, { merge: true });

        const userRef = doc(db, "users", currentUser.uid);
        const publicProfileRef = doc(db, "publicProfiles", currentUser.uid);

        batch.set(userRef, {
          uid: currentUser.uid,
          email: currentUser.email || "",
          displayName,
          displayNameLower: displayName.toLowerCase(),
          username,
          usernameLower: username,
          city,
          bio,
          cityVisible,
          isPrivate,
          privateProfile: isPrivate,
          isVerified: verifiedStatus,
          verified: verifiedStatus,
          photoURL,
          gender,
          genderCustom,
          genderVisible,
          updatedAt: serverTimestamp()
        }, { merge: true });

        batch.set(publicProfileRef, {
          uid: currentUser.uid,
          displayName,
          displayNameLower: displayName.toLowerCase(),
          username,
          usernameLower: username,
          city,
          bio,
          cityVisible,
          isPrivate,
          privateProfile: isPrivate,
          isVerified: verifiedStatus,
          verified: verifiedStatus,
          photoURL,
          gender,
          genderCustom,
          genderVisible,
          updatedAt: serverTimestamp()
        }, { merge: true });

        await batch.commit();

        await updateProfile(currentUser, {
          displayName,
          photoURL
        });

        originalUsernameLower = username;
        showPreview(photoURL);
        setUsernameStatus("Username saved.", true);
        showMessage("Profile updated successfully.", "success");
      } catch (error) {
        console.error(error);
        showMessage("Could not save profile.", "error");
      }

      saveBtn.disabled = false;
      saveBtn.textContent = "Save Profile";
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (error) {
        console.error(error);
        showMessage("Logout failed.", "error");
      }
    });
  </script>
</body>
</html>
