<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Place</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
      --blue-soft:rgba(76,201,255,.13);
      --green-soft:rgba(61,220,132,.13);
      --yellow-soft:rgba(245,185,66,.13);
      --purple-soft:rgba(167,139,250,.13);
      --red-soft:rgba(255,93,115,.13);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
      --blue-soft:rgba(76,201,255,.13);
      --green-soft:rgba(61,220,132,.13);
      --yellow-soft:rgba(245,185,66,.13);
      --purple-soft:rgba(167,139,250,.13);
      --red-soft:rgba(255,93,115,.13);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      line-height:1.6;
      font-size:14px;
    }

    .hero-image{
      width:100%;
      max-height:360px;
      object-fit:cover;
      display:block;
      border-radius:18px;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:12px;
    }

    .place-title{
      font-size:22px;
      font-weight:950;
      line-height:1.3;
      margin-bottom:10px;
      letter-spacing:-.02em;
      word-break:break-word;
    }

    .badge-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      line-height:1;
    }

    .badge svg{
      width:13px;
      height:13px;
      flex-shrink:0;
    }

    .badge-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .badge-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .badge-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .badge-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .badge-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}
    .badge-account{background:var(--green-soft);border-color:rgba(61,220,132,.22);color:var(--green)}
    .badge-creator{background:var(--blue-soft);border-color:rgba(76,201,255,.22);color:var(--blue)}
    .badge-business{background:var(--yellow-soft);border-color:rgba(245,185,66,.24);color:var(--yellow)}

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-bottom:12px;
    }

    .meta-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px;
      font-size:14px;
      line-height:1.55;
      word-break:break-word;
      min-width:0;
    }

    .meta-item strong{
      display:block;
      margin-bottom:4px;
      font-size:12px;
      color:var(--muted);
    }

    .desc{
      color:var(--text);
      line-height:1.65;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }

    .submitter-card{
      display:flex;
      gap:12px;
      align-items:center;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .submitter-avatar,
    .submitter-avatar-placeholder{
      width:56px;
      height:56px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .submitter-avatar{object-fit:cover}

    .submitter-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
      background:
        radial-gradient(circle at 26% 18%, rgba(76,201,255,.22), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.14), rgba(61,220,132,.10)),
        var(--surface-3);
    }

    .submitter-body{min-width:0;flex:1}

    .submitter-name{
      font-size:15px;
      font-weight:950;
      line-height:1.3;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .submitter-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .submitter-name a:hover{text-decoration:underline}

    /* FINAL OwnSpace badge color logic:
       Verified Account = green tick
       Verified Creator = blue tick
       Verified Business = gold tick
    */
    .verified-badge{
      width:21px;
      height:21px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:12px;
      height:12px;
      display:block;
      stroke-width:3;
    }

    .verified-badge.verified-account{
      background:linear-gradient(135deg,var(--green),#15975a);
      color:#ffffff;
      box-shadow:0 0 0 3px rgba(61,220,132,.16),0 8px 18px rgba(34,179,108,.14);
    }

    .verified-badge.verified-creator{
      background:linear-gradient(135deg,var(--blue),#1474d4);
      color:#ffffff;
      box-shadow:0 0 0 3px rgba(76,201,255,.16),0 8px 18px rgba(31,143,255,.14);
    }

    .verified-badge.verified-business{
      background:linear-gradient(135deg,#f7c957,var(--yellow));
      color:#3f2a00;
      box-shadow:0 0 0 3px rgba(245,185,66,.18),0 8px 18px rgba(213,150,23,.16);
    }

    .submitter-username{
      font-size:12px;
      color:var(--blue);
      font-weight:850;
      margin-top:3px;
      word-break:break-word;
    }

    .submitter-bio{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
      word-break:break-word;
    }

    .section-title{
      font-size:17px;
      font-weight:950;
      margin-bottom:10px;
      letter-spacing:-.01em;
    }

    .action-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:12px;
    }

    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12.5px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      gap:7px;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--surface-2);
      white-space:nowrap;
    }

    .action-btn svg{
      width:16px;
      height:16px;
      display:block;
      flex-shrink:0;
    }

    .action-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-soft{background:var(--surface-2);border-color:var(--line)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-green.active{background:rgba(61,220,132,.24);border-color:rgba(61,220,132,.40)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}

    .share-action{margin-left:auto}

    .message{
      min-height:18px;
      font-size:13px;
      margin-top:10px;
      line-height:1.5;
      color:var(--muted);
    }

    .message.ok{color:#22b36c}
    .message.err{color:#e74c66}
    html[data-theme="dark"] .message.ok{color:#9cf0bf}
    html[data-theme="dark"] .message.err{color:#ffb3bd}

    .edit-form{
      display:grid;
      gap:12px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    .label{
      font-size:13px;
      font-weight:950;
      color:var(--text);
    }

    .input,
    .textarea,
    .select{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .textarea{
      min-height:120px;
      resize:vertical;
      line-height:1.55;
    }

    .input::placeholder,
    .textarea::placeholder{
      color:var(--muted);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}
      .place-title{font-size:20px}
      .meta-grid{grid-template-columns:1fr}
      .grid-2{grid-template-columns:1fr}
      .share-action{margin-left:0}

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .action-btn{
        font-size:11.5px;
        padding:8px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Place detail</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="loadingPanel" class="panel">
      <div class="loading-box">Loading place...</div>
    </div>

    <div id="notFoundPanel" class="panel hidden">
      <div id="notFoundText" class="empty-box">Place not found.</div>
    </div>

    <div id="placePanel" class="hidden">
      <div class="panel">
        <img id="heroImage" class="hero-image hidden" alt="Place image" />

        <div id="placeTitle" class="place-title">Unnamed Place</div>
        <div id="badgeRow" class="badge-row"></div>

        <div class="meta-grid">
          <div class="meta-item">
            <strong>Category</strong>
            <span id="categoryText">-</span>
          </div>

          <div class="meta-item">
            <strong>City</strong>
            <span id="cityText">-</span>
          </div>

          <div class="meta-item">
            <strong>Province / State</strong>
            <span id="provinceText">-</span>
          </div>

          <div class="meta-item">
            <strong>Country</strong>
            <span id="countryText">-</span>
          </div>

          <div class="meta-item">
            <strong>Address</strong>
            <span id="addressText">-</span>
          </div>

          <div class="meta-item">
            <strong>Review</strong>
            <span id="reviewStatusText">-</span>
          </div>
        </div>

        <div id="descText" class="desc">No description added.</div>

        <div class="action-row" id="topActionRow"></div>
        <div id="topMessage" class="message"></div>
      </div>

      <div class="panel">
        <div class="section-title">Submitted By</div>
        <div id="submitterCard" class="submitter-card"></div>
      </div>

      <div id="editPanel" class="panel hidden">
        <div class="section-title">Edit Place</div>

        <form id="editForm" class="edit-form">
          <div class="grid-2">
            <div class="field">
              <label class="label" for="editName">Place Name</label>
              <input id="editName" class="input" type="text" placeholder="Place name" />
            </div>

            <div class="field">
              <label class="label" for="editCategory">Category</label>
              <select id="editCategory" class="select">
                <option value="General">General</option>
                <option value="Park">Park</option>
                <option value="Beach">Beach</option>
                <option value="Club">Club</option>
                <option value="Retreat">Retreat</option>
                <option value="Private Spot">Private Spot</option>
                <option value="Wellness">Wellness</option>
                <option value="Community">Community</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editCity">City</label>
              <input id="editCity" class="input" type="text" placeholder="City" />
            </div>

            <div class="field">
              <label class="label" for="editProvince">Province / State</label>
              <input id="editProvince" class="input" type="text" placeholder="Province / State" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editCountry">Country</label>
              <input id="editCountry" class="input" type="text" placeholder="Country" />
            </div>

            <div class="field">
              <label class="label" for="editAddress">Address</label>
              <input id="editAddress" class="input" type="text" placeholder="Address" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editWebsite">Website / Link</label>
              <input id="editWebsite" class="input" type="text" placeholder="example.com" />
            </div>

            <div class="field">
              <label class="label" for="editImageURL">Image Link</label>
              <input id="editImageURL" class="input" type="text" placeholder="https://example.com/photo.jpg" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editLat">Latitude</label>
              <input id="editLat" class="input" type="text" placeholder="Latitude" />
            </div>

            <div class="field">
              <label class="label" for="editLng">Longitude</label>
              <input id="editLng" class="input" type="text" placeholder="Longitude" />
            </div>
          </div>

          <div class="field">
            <label class="label" for="editDescription">Description</label>
            <textarea id="editDescription" class="textarea" placeholder="Description"></textarea>
          </div>

          <div class="action-row">
            <button id="saveEditBtn" type="submit" class="action-btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <path d="M17 21v-8H7v8"></path>
                <path d="M7 3v5h8"></path>
              </svg>
              <span>Save Changes</span>
            </button>

            <button id="cancelEditBtn" type="button" class="action-btn btn-soft">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
              <span>Cancel</span>
            </button>
          </div>

          <div id="editMessage" class="message"></div>
        </form>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">

        </svg>

    };

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();

      if (
        e.key === "ownspace_badges_refresh" ||
        e.key === "ownspace_inbox_refresh" ||
        e.key === "ownspace_chat_read_refresh"
      ) {
        updateInboxBadge().catch(() => {});
      }
    });

    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    if (mq.addEventListener) {
      mq.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "nearby-places.html";
    });

    function setTopMessage(text = "", type = "") {
      topMessage.textContent = text;
      topMessage.className = `message ${type}`;
    }

    function setEditMessage(text = "", type = "") {
      editMessage.textContent = text;
      editMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(city, province, country) {
      return [
        titleText(city),
        titleText(province),
        titleText(country),
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function buildFullSearchText(place) {
      return [
        place.name,
        place.category,
        place.description,
        place.city,
        place.province,
        place.country,
        place.address,
        place.website,
        place.creatorName,
        buildLocationSearch(place.city, place.province, place.country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }

      return fallback;
    }

    function getFirstFilled(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }

      return fallback;
    }

    function cleanKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function truthyVerification(value) {
      if (value === true) return true;

      const clean = cleanKey(value);

      return [
        "true",
        "yes",
        "1",
        "verified",
        "approved",
        "account",
        "creator",
        "business",
        "green_tick",
        "blue_tick",
        "gold_tick"
      ].includes(clean);
    }

    function normalizeVerificationType(row = {}, isVerifiedFallback = false) {
      const rawType = getFirstFilled(row, [
        "verification_badge",
        "verificationBadge",
        "verification_type",
        "verificationType",
        "badge_type",
        "badgeType",
        "verified_badge",
        "verifiedBadge",
        "verified_type",
        "verifiedType",
        "account_badge",
        "accountBadge",
        "creator_verification_type",
        "creatorVerificationType",
        "creator_verification_badge",
        "creatorVerificationBadge",
        "submitter_verification_type",
        "submitterVerificationType",
        "submitter_verification_badge",
        "submitterVerificationBadge",
        "user_verification_type",
        "userVerificationType"
      ], "");

      const clean = cleanKey(rawType);

      // FINAL OwnSpace mapping:
      // account = green, creator = blue, business = gold.
      if (["business", "verified_business", "business_verified", "gold", "gold_tick", "gold_badge"].includes(clean)) return "business";
      if (["creator", "verified_creator", "creator_verified", "blue", "blue_tick", "blue_badge"].includes(clean)) return "creator";
      if (["account", "verified_account", "account_verified", "green", "green_tick", "green_badge", "verified", "standard", "approved"].includes(clean)) return "account";

      const verifiedFlag = getFirstFilled(row, [
        "is_verified",
        "isVerified",
        "verified",
        "creator_verified",
        "creatorVerified",
        "submitter_verified",
        "submitterVerified",
        "user_verified",
        "userVerified"
      ], "");

      return truthyVerification(verifiedFlag) || isVerifiedFallback ? "account" : "";
    }

    function strongestVerificationType(...types) {
      const cleaned = types.map(cleanKey).filter(Boolean);

      if (cleaned.includes("business")) return "business";
      if (cleaned.includes("creator")) return "creator";
      if (cleaned.includes("account")) return "account";

      return "";
    }

    function mergeProfileRows(existing = {}, incoming = {}) {
      const existingType = normalizeVerificationType(existing);
      const incomingType = normalizeVerificationType(incoming);
      const strongest = strongestVerificationType(existingType, incomingType);

      const merged = {
        ...(existing || {}),
        ...(incoming || {})
      };

      if (strongest) {
        merged.verified = true;
        merged.is_verified = true;
        merged.isVerified = true;
        merged.verification_badge = strongest;
        merged.verification_type = strongest;
        merged.badge_type = strongest;
      }

      return merged;
    }

    function getVerificationLabel(type) {
      const clean = cleanKey(type);

      if (clean === "business") return "Verified Business";
      if (clean === "creator") return "Verified Creator";
      if (clean === "account") return "Verified Account";

      return "Verified";
    }

    function getVerificationClass(type) {
      const clean = cleanKey(type);

      if (clean === "business") return "verified-business";
      if (clean === "creator") return "verified-creator";

      return "verified-account";
    }

    function verificationDotHtml(profile) {
      const type = profile?.verificationType || normalizeVerificationType(profile || {});

      if (!type) return "";

      const label = getVerificationLabel(type);
      const cls = getVerificationClass(type);

      return `<span class="verified-badge ${cls}" title="${escapeHtml(label)}" aria-label="${escapeHtml(label)}">${ICONS.check}</span>`;
    }

    function verificationBadgeHtml(profile) {
      const type = profile?.verificationType || normalizeVerificationType(profile || {});

      if (!type) return "";

      const clean = cleanKey(type);
      const label = getVerificationLabel(type);

      return `<span class="badge badge-${escapeHtml(clean || "account")}">${escapeHtml(label)}</span>`;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function isMissingSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();

      return (
        msg.includes("schema cache") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        msg.includes("does not exist") ||
        msg.includes("relation") ||
        msg.includes("not found")
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      const verificationType = normalizeVerificationType(d);

      return {
        uid: getField(d, ["uid", "id", "user_id", "userId"]) || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "user_name", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        verified: !!verificationType,
        verificationType,
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = normalizeText(d.status || d.place_status || d.placeStatus || "");
      const visibility = normalizeText(d.visibility || d.place_visibility || d.placeVisibility || "");
      const approvalStatus = normalizeText(d.approval_status || d.approvalStatus || d.review_status || d.reviewStatus || "");

      const hidden =
        !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted || d.deleted) ||
        ["hidden", "deleted", "removed"].includes(status);

      const rejected =
        ["rejected", "declined", "denied"].includes(status) ||
        ["rejected", "declined", "denied"].includes(approvalStatus) ||
        d.rejected === true ||
        d.is_rejected === true ||
        d.isRejected === true;

      const explicitlyPending =
        ["pending", "review", "under_review", "under review", "needs_review", "needs review"].includes(status) ||
        ["pending", "review", "under_review", "under review", "needs_review", "needs review"].includes(approvalStatus) ||
        d.pending === true ||
        d.is_pending === true ||
        d.isPending === true;

      const explicitlyApproved =
        d.approved === true ||
        d.is_approved === true ||
        d.isApproved === true ||
        d.public === true ||
        d.is_public === true ||
        d.isPublic === true ||
        d.verified === true ||
        d.is_verified === true ||
        d.isVerified === true ||
        ["approved", "active", "verified", "public", "published"].includes(status) ||
        ["approved", "active", "verified", "public", "published"].includes(approvalStatus) ||
        ["public", "published"].includes(visibility);

      const hasAnyReviewField =
        d.approved !== undefined ||
        d.is_approved !== undefined ||
        d.isApproved !== undefined ||
        d.public !== undefined ||
        d.is_public !== undefined ||
        d.isPublic !== undefined ||
        d.verified !== undefined ||
        d.is_verified !== undefined ||
        d.isVerified !== undefined ||
        d.pending !== undefined ||
        d.is_pending !== undefined ||
        d.isPending !== undefined ||
        d.rejected !== undefined ||
        d.is_rejected !== undefined ||
        d.isRejected !== undefined ||
        status ||
        approvalStatus ||
        visibility;

      const approved = explicitlyApproved || (!hasAnyReviewField && !explicitlyPending && !rejected && !hidden);
      const pending = explicitlyPending && !approved && !rejected;

      return {
        id: getField(d, ["id"]) || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic"]) || "General",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid", "owner_id", "ownerId", "creator_id", "creatorId"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName"]) || "Member",
        creatorUsername: getField(d, ["creator_username", "creatorUsername"]),
        creatorVerified: truthyVerification(getFirstFilled(d, ["creator_verified", "creatorVerified", "submitter_verified", "submitterVerified"], "")),
        creatorVerificationType: normalizeVerificationType(d),
        approved,
        pending,
        rejected,
        hidden,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadProfile(uid) {
      if (!uid) return normalizeProfile({}, "");

      try {
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);

        const placeFallback = currentPlace && currentPlace.createdBy === uid
          ? {
              uid,
              display_name: currentPlace.creatorName,
              username: currentPlace.creatorUsername,
              verified: currentPlace.creatorVerified,
              verification_type: currentPlace.creatorVerificationType,
              verification_badge: currentPlace.creatorVerificationType
            }
          : { uid };

        return normalizeProfile(
          mergeProfileRows(
            mergeProfileRows(placeFallback, publicRow || {}),
            userRow || {}
          ),
          uid
        );
      } catch {
        return normalizeProfile({ uid }, uid);
      }
    }

    async function findPlace(placeId, source) {
      const cleanSource = String(source || "").trim();
      const sources = cleanSource && PLACE_SOURCES.includes(cleanSource)
        ? [cleanSource, ...PLACE_SOURCES.filter(item => item !== cleanSource)]
        : PLACE_SOURCES;

      for (const tableName of sources) {
        try {
          const { data, error } = await supabase
            .from(tableName)
            .select("*")
            .eq("id", placeId)
            .maybeSingle();

          if (!error && data) {
            return normalizePlace({ id: data.id, ...data }, data.id, tableName);
          }
        } catch {}
      }

      return null;
    }

    async function updatePlaceById(tableName, placeId, payloadVariants) {
      let lastError = null;

      for (const payload of payloadVariants) {
        try {
          const { error } = await supabase
            .from(tableName)
            .update(payload)
            .eq("id", placeId);

          if (!error) return;

          lastError = error;

          if (!isMissingSchemaError(error)) {
            console.warn("Place update attempt failed:", error?.message || error);
          }
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not update place.");
    }

    async function deletePlaceById(tableName, placeId) {
      let deleteError = null;

      try {
        const { error } = await supabase
          .from(tableName)
          .delete()
          .eq("id", placeId);

        if (!error) return;
        deleteError = error;
      } catch (err) {
        deleteError = err;
      }

      try {
        await updatePlaceById(tableName, placeId, [
          {
            hidden: true,
            soft_deleted: true,
            deleted_at: nowIso(),
            updated_at: nowIso()
          },
          {
            hidden: true,
            softDeleted: true,
            deletedAt: nowIso(),
            updatedAt: nowIso()
          },
          {
            hidden: true
          }
        ]);
      } catch (err) {
        throw deleteError || err;
      }
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase
          .from(table)
          .select("id", { count: "exact", head: true });

        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q =>
          q.eq(targetColumn, uid)
        );

        if (countWithoutStatus !== null) return countWithoutStatus;
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (Array.isArray(threads) && threads.length) {
          const threadIds = threads.map(t => t.id).filter(Boolean);

          if (threadIds.length) {
            try {
              const { count, error } = await supabase
                .from("chat_messages")
                .select("id", { count: "exact", head: true })
                .in("thread_id", threadIds)
                .neq("sender_id", uid)
                .is("seen_at", null)
                .is("read_at", null)
                .eq("is_read", false);

              if (!error) return count || 0;
            } catch {}

            try {
              const { count, error } = await supabase
                .from("chat_messages")
                .select("id", { count: "exact", head: true })
                .in("thread_id", threadIds)
                .neq("sender_id", uid)
                .eq("read", false);

              if (!error) return count || 0;
            } catch {}
          }
        }
      } catch {}

      return 0;
    }

    async function updateInboxBadge() {
      if (!currentUser || !inboxBadge) return;

      try {
        const [pendingRequests, unreadChats] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(pendingRequests || 0) + Number(unreadChats || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function loadVisitState() {
      if (!currentUser?.id || !currentPlaceId) return false;

      const source = currentSource || "nearby_places";

      try {
        const { data, error } = await supabase
          .from("place_visits")
          .select("id")
          .eq("uid", currentUser.id)
          .eq("place_id", String(currentPlaceId))
          .eq("source", String(source))
          .maybeSingle();

        if (error) throw error;

        return !!data;
      } catch (err) {
        console.warn("Could not check visited state using uid:", err?.message || err);
      }

      try {
        const { data, error } = await supabase
          .from("place_visits")
          .select("id")
          .eq("user_id", currentUser.id)
          .eq("place_id", String(currentPlaceId))
          .eq("source", String(source))
          .maybeSingle();

        if (error) throw error;

        return !!data;
      } catch (err) {
        console.warn("Could not check visited state using user_id:", err?.message || err);
      }

      return false;
    }

    function parseVisitRpcResult(data) {
      const item = Array.isArray(data) ? data[0] : data;

      if (typeof item === "boolean") return item;

      if (item && typeof item === "object") {
        const possibleBoolean =
          item.visited ??
          item.is_visited ??
          item.has_visited ??
          item.active ??
          item.is_active ??
          item.exists;

        if (typeof possibleBoolean === "boolean") return possibleBoolean;

        const action = String(item.action || item.status || item.result || "").toLowerCase();

        if (["added", "created", "visited", "true", "on"].includes(action)) return true;
        if (["removed", "deleted", "unvisited", "false", "off"].includes(action)) return false;
      }

      return null;
    }

    async function toggleBeenThere(button) {
      if (!currentUser?.id) {
        setTopMessage("Please login first.", "err");
        return;
      }

      if (!currentPlace || !currentPlaceId) {
        setTopMessage("Missing place details.", "err");
        return;
      }

      button.disabled = true;
      setTopMessage("");

      try {
        const source = currentSource || "nearby_places";

        const { data, error } = await supabase.rpc("toggle_place_visit", {
          p_place_id: String(currentPlaceId),
          p_source: String(source),
          p_place_name: String(currentPlace.name || "Unnamed Place"),
          p_city: String(currentPlace.city || "")
        });

        if (error) throw error;

        const rpcState = parseVisitRpcResult(data);
        hasVisited = typeof rpcState === "boolean" ? rpcState : await loadVisitState();

        renderBadges();
        renderTopActions();

        setTopMessage(
          hasVisited ? "Added to your visited places." : "Removed from your visited places.",
          "ok"
        );
      } catch (err) {
        console.error("Visited toggle failed:", err);
        setTopMessage(err?.message || "Could not update visited state.", "err");
        button.disabled = false;
      }
    }

    function buildMapUrl() {
      if (!currentPlace) return "";

      if (currentPlace.lat !== null && currentPlace.lng !== null) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${currentPlace.lat},${currentPlace.lng}`)}`;
      }

      const query = [
        currentPlace.name,
        currentPlace.address,
        currentPlace.city,
        currentPlace.province,
        currentPlace.country
      ].filter(Boolean).join(", ");

      if (!query.trim()) return "";

      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    }

    function buildShareUrl() {
      const url = new URL("place.html", window.location.href);
      url.searchParams.set("placeId", currentPlaceId);
      url.searchParams.set("source", currentSource || "nearby_places");
      return url.toString();
    }

    async function sharePlace(button) {
      if (!currentPlace) return;

      button.disabled = true;
      setTopMessage("");

      const shareUrl = buildShareUrl();

      const shareData = {
        title: `${currentPlace.name || "Place"} on OwnSpace`,
        text: `Check out ${currentPlace.name || "this place"} on OwnSpace.`,
        url: shareUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
          setTopMessage("Place shared.", "ok");
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(shareUrl);
          setTopMessage("Place link copied.", "ok");
        } else {
          prompt("Copy this place link:", shareUrl);
          setTopMessage("Copy the place link.", "ok");
        }
      } catch (err) {
        if (err?.name !== "AbortError") {
          console.error(err);
          setTopMessage("Could not share this place.", "err");
        }
      }

      button.disabled = false;
    }

    function getReviewLabel() {
      if (!currentPlace) return "-";
      if (currentPlace.approved) return "Public";
      if (currentPlace.rejected) return isCreator ? "Needs update" : "Not available";
      return isCreator ? "Under review" : "Not public";
    }

    function getReviewBadge() {
      if (currentPlace.approved) {
        return {
          className: "badge-green",
          icon: ICONS.check,
          text: "Public"
        };
      }

      if (currentPlace.rejected) {
        return {
          className: "badge-red",
          icon: ICONS.report,
          text: isCreator ? "Needs update" : "Not available"
        };
      }

      return {
        className: "badge-yellow",
        icon: ICONS.star,
        text: isCreator ? "Under review" : "Not public"
      };
    }

    function renderBadges() {
      const review = getReviewBadge();

      const badges = [];

      badges.push(`
        <span class="badge badge-blue">
          ${ICONS.mapPin}
          ${escapeHtml(currentPlace.category || "General")}
        </span>
      `);

      badges.push(`
        <span class="badge ${review.className}">
          ${review.icon}
          ${escapeHtml(review.text)}
        </span>
      `);

      if (currentSubmitterProfile?.verified) {
        badges.push(verificationBadgeHtml(currentSubmitterProfile));
      }

      if (hasVisited) {
        badges.push(`
          <span class="badge badge-green">
            ${ICONS.check}
            Visited
          </span>
        `);
      }

      if (isCreator) {
        badges.push(`
          <span class="badge badge-purple">
            ${ICONS.star}
            Your Place
          </span>
        `);
      }

      if (currentPlace.city) {
        badges.push(`
          <span class="badge badge-blue">
            ${escapeHtml(currentPlace.city)}
          </span>
        `);
      }

      badgeRow.innerHTML = badges.join("");
    }

    function renderSubmitter() {
      const profileUrl = currentPlace.createdBy
        ? `member.html?uid=${encodeURIComponent(currentPlace.createdBy)}`
        : "search.html";

      const avatarHtml = currentSubmitterProfile?.photoURL
        ? `<img class="submitter-avatar" src="${escapeHtml(currentSubmitterProfile.photoURL)}" alt="Submitter photo">`
        : `<div class="submitter-avatar-placeholder">No photo</div>`;

      submitterCard.innerHTML = `
        ${avatarHtml}

        <div class="submitter-body">
          <div class="submitter-name">
            <a href="${profileUrl}">${escapeHtml(currentSubmitterProfile?.displayName || currentPlace.creatorName || "Member")}</a>
            ${verificationDotHtml(currentSubmitterProfile)}
          </div>

          ${currentSubmitterProfile?.username ? `<div class="submitter-username">@${escapeHtml(currentSubmitterProfile.username)}</div>` : ""}
          <div class="submitter-bio">${escapeHtml(currentSubmitterProfile?.bio || "Member profile")}</div>
        </div>
      `;

      const img = submitterCard.querySelector(".submitter-avatar");

      if (img) {
        img.addEventListener("error", () => {
          img.outerHTML = `<div class="submitter-avatar-placeholder">No photo</div>`;
        });
      }
    }

    function fillEditForm() {
      editName.value = currentPlace.name || "";
      editCategory.value = currentPlace.category || "General";
      editCity.value = currentPlace.city || "";
      editProvince.value = currentPlace.province || "";
      editCountry.value = currentPlace.country || "";
      editAddress.value = currentPlace.address || "";
      editWebsite.value = currentPlace.website || "";
      editImageURL.value = currentPlace.imageURL || "";
      editLat.value = currentPlace.lat ?? "";
      editLng.value = currentPlace.lng ?? "";
      editDescription.value = currentPlace.description || "";
      setEditMessage("");
    }

    function renderTopActions() {
      const buttons = [];
      const siteHref = normalizeHref(currentPlace.website);
      const mapHref = buildMapUrl();

      buttons.push(`
        <button id="beenThereBtn" class="action-btn btn-green ${hasVisited ? "active" : ""}" type="button">
          ${hasVisited ? ICONS.check : ICONS.mapPin}
          <span>${hasVisited ? "Visited" : "Been There"}</span>
        </button>
      `);

      if (mapHref) {
        buttons.push(`
          <a href="${escapeHtml(mapHref)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-primary">
            ${ICONS.mapPin}
            <span>Open Map</span>
          </a>
        `);
      }

      if (currentPlace.website) {
        buttons.push(`
          <a href="${escapeHtml(siteHref)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-primary">
            ${ICONS.link}
            <span>Website</span>
          </a>
        `);
      }

      if (currentPlace.createdBy) {
        buttons.push(`
          <a href="member.html?uid=${encodeURIComponent(currentPlace.createdBy)}" class="action-btn btn-soft">
            ${ICONS.user}
            <span>Profile</span>
          </a>
        `);
      }

      if (isCreator) {
        buttons.push(`
          <button id="toggleEditBtn" class="action-btn btn-purple" type="button">
            ${ICONS.edit}
            <span>Edit</span>
          </button>
        `);

        buttons.push(`
          <button id="deletePlaceBtn" class="action-btn btn-red" type="button">
            ${ICONS.trash}
            <span>Delete</span>
          </button>
        `);
      } else {
        buttons.push(`
          <a href="report.html?type=place&targetId=${encodeURIComponent(currentPlaceId)}&targetUserId=${encodeURIComponent(currentPlace.createdBy || "")}&source=${encodeURIComponent(currentSource || "")}" class="action-btn btn-yellow">
            ${ICONS.report}
            <span>Report</span>
          </a>
        `);
      }

      buttons.push(`
        <button id="sharePlaceBtn" class="action-btn btn-green share-action" type="button">
          ${ICONS.share}
          <span>Share</span>
        </button>
      `);

      topActionRow.innerHTML = buttons.join("");

      const beenThereBtn = document.getElementById("beenThereBtn");
      const sharePlaceBtn = document.getElementById("sharePlaceBtn");
      const toggleEditBtn = document.getElementById("toggleEditBtn");
      const deletePlaceBtn = document.getElementById("deletePlaceBtn");

      if (beenThereBtn) {
        beenThereBtn.addEventListener("click", () => toggleBeenThere(beenThereBtn));
      }

      if (sharePlaceBtn) {
        sharePlaceBtn.addEventListener("click", () => sharePlace(sharePlaceBtn));
      }

      if (toggleEditBtn) {
        toggleEditBtn.addEventListener("click", () => {
          const opening = editPanel.classList.contains("hidden");

          if (opening) {
            fillEditForm();
            editPanel.classList.remove("hidden");
            editPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            toggleEditBtn.innerHTML = `${ICONS.edit}<span>Hide Edit</span>`;
          } else {
            editPanel.classList.add("hidden");
            toggleEditBtn.innerHTML = `${ICONS.edit}<span>Edit</span>`;
          }
        });
      }

      if (deletePlaceBtn) {
        deletePlaceBtn.addEventListener("click", async () => {
          const ok = confirm("Delete this place?");
          if (!ok) return;

          deletePlaceBtn.disabled = true;
          setTopMessage("");

          try {
            await deletePlaceById(currentSource, currentPlaceId);
            window.location.href = "nearby-places.html";
          } catch (err) {
            console.error(err);
            setTopMessage("Could not delete place.", "err");
            deletePlaceBtn.disabled = false;
          }
        });
      }
    }

    async function renderPlaceView() {
      placeTitle.textContent = currentPlace.name || "Unnamed Place";
      categoryText.textContent = currentPlace.category || "General";
      cityText.textContent = currentPlace.city || "-";
      provinceText.textContent = currentPlace.province || "-";
      countryText.textContent = currentPlace.country || "-";
      addressText.textContent = currentPlace.address || "-";
      reviewStatusText.textContent = getReviewLabel();
      descText.textContent = currentPlace.description || "No description added.";

      if (currentPlace.imageURL) {
        heroImage.src = currentPlace.imageURL;
        heroImage.classList.remove("hidden");
      } else {
        heroImage.removeAttribute("src");
        heroImage.classList.add("hidden");
      }

      renderBadges();
      renderSubmitter();
      renderTopActions();
    }

    cancelEditBtn.addEventListener("click", () => {
      editPanel.classList.add("hidden");

      const toggleEditBtn = document.getElementById("toggleEditBtn");
      if (toggleEditBtn) toggleEditBtn.innerHTML = `${ICONS.edit}<span>Edit</span>`;
    });

    heroImage.addEventListener("error", () => {
      heroImage.classList.add("hidden");
    });

    editForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentPlace || !isCreator) return;

      const name = editName.value.trim();
      const category = editCategory.value.trim() || "General";
      const city = editCity.value.trim();
      const province = editProvince.value.trim();
      const country = editCountry.value.trim();
      const address = editAddress.value.trim();
      const website = normalizeHref(editWebsite.value.trim());
      const imageURL = editImageURL.value.trim();
      const description = editDescription.value.trim();
      const latText = editLat.value.trim();
      const lngText = editLng.value.trim();

      if (!name) {
        setEditMessage("Place name is required.", "err");
        return;
      }

      if (!city || !province || !country) {
        setEditMessage("City, province/state and country are required.", "err");
        return;
      }

      if (!description) {
        setEditMessage("Description is required.", "err");
        return;
      }

      const lat = latText ? Number(latText) : null;
      const lng = lngText ? Number(lngText) : null;

      if (latText && !Number.isFinite(lat)) {
        setEditMessage("Latitude must be a valid number.", "err");
        return;
      }

      if (lngText && !Number.isFinite(lng)) {
        setEditMessage("Longitude must be a valid number.", "err");
        return;
      }

      if (lat !== null && (lat < -90 || lat > 90)) {
        setEditMessage("Latitude must be between -90 and 90.", "err");
        return;
      }

      if (lng !== null && (lng < -180 || lng > 180)) {
        setEditMessage("Longitude must be between -180 and 180.", "err");
        return;
      }

      const saveBtn = document.getElementById("saveEditBtn");
      saveBtn.disabled = true;
      setEditMessage("");

      try {
        const updatedAt = nowIso();

        const previewPlace = {
          ...currentPlace,
          name,
          category,
          city,
          province,
          country,
          address,
          website,
          imageURL,
          description,
          lat,
          lng
        };

        const locationSearch = buildLocationSearch(city, province, country);
        const searchText = buildFullSearchText(previewPlace);

        const fullSnakePayload = {
          name,
          place_name: name,
          category,
          description,
          city,
          province,
          state: province,
          region: province,
          country,
          location_search: locationSearch,
          search_text: searchText,
          keywords: searchText,
          address,
          website,
          url: website,
          link: website,
          image_url: imageURL,
          lat,
          lng,
          updated_at: updatedAt
        };

        const commonSnakePayload = {
          name,
          category,
          description,
          city,
          province,
          country,
          location_search: locationSearch,
          search_text: searchText,
          address,
          website,
          image_url: imageURL,
          lat,
          lng,
          updated_at: updatedAt
        };

        const minimalSnakePayload = {
          name,
          category,
          description,
          city,
          province,
          country,
          address,
          website,
          image_url: imageURL,
          lat,
          lng,
          updated_at: updatedAt
        };

        const camelPayload = {
          name,
          placeName: name,
          category,
          description,
          city,
          province,
          country,
          locationSearch,
          searchText,
          address,
          website,
          imageURL,
          lat,
          lng,
          updatedAt: updatedAt
        };

        const ultraMinimalPayload = {
          name,
          category,
          description,
          city,
          province,
          country,
          address,
          website,
          lat,
          lng
        };

        await updatePlaceById(currentSource, currentPlaceId, [
          fullSnakePayload,
          commonSnakePayload,
          minimalSnakePayload,
          camelPayload,
          ultraMinimalPayload
        ]);

        currentPlace = previewPlace;

        await renderPlaceView();
        setEditMessage("Place updated.", "ok");
        setTopMessage("Place updated.", "ok");
      } catch (err) {
        console.error(err);
        setEditMessage("Could not update place.", "err");
      }

      saveBtn.disabled = false;
    });

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;
      updateInboxBadge().catch(() => {});

      const params = new URLSearchParams(window.location.search);
      currentPlaceId = params.get("placeId") || params.get("id") || params.get("targetId") || "";
      currentSource = params.get("source") || "";

      if (!currentPlaceId) {
        loadingPanel.classList.add("hidden");
        notFoundPanel.classList.remove("hidden");
        notFoundText.textContent = "Place not found.";
        return;
      }

      try {
        currentPlace = await findPlace(currentPlaceId, currentSource);

        if (!currentPlace || currentPlace.hidden) {
          loadingPanel.classList.add("hidden");
          notFoundPanel.classList.remove("hidden");
          notFoundText.textContent = "Place not found.";
          return;
        }

        currentSource = currentPlace.source || currentSource || "nearby_places";
        isCreator = currentPlace.createdBy === currentUser.id;

        if (!isCreator && (currentPlace.pending || currentPlace.rejected)) {
          loadingPanel.classList.add("hidden");
          notFoundPanel.classList.remove("hidden");
          notFoundText.textContent = "This place is not public yet.";
          return;
        }

        currentSubmitterProfile = await loadProfile(currentPlace.createdBy);
        hasVisited = await loadVisitState();

        await renderPlaceView();

        loadingPanel.classList.add("hidden");
        placePanel.classList.remove("hidden");
      } catch (err) {
        console.error(err);
        loadingPanel.classList.add("hidden");
        notFoundPanel.classList.remove("hidden");
        notFoundText.textContent = "Could not load this place.";
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    initPage();

    /*
      OWNSPACE PLACE PAGE BADGE UPDATE:

      FIXED:
      - Verified Account = green tick.
      - Verified Creator = blue tick.
      - Verified Business = gold tick.
      - Submitted By card now uses the final badge resolver.
      - Top place badges can show submitter verification status.
      - Reads verification_badge, verification_type, badge_type,
        verified_badge, verified_type, account_badge,
        creator/submitter/user verification fields,
        camelCase versions, and old is_verified / verified booleans.
      - If users and public_profiles disagree, strongest badge wins:
        business > creator > account.

      KEPT:
      - Been There Supabase RPC logic:
        public.toggle_place_visit(p_place_id, p_source, p_place_name, p_city)
      - Visit state checks public.place_visits using uid/user_id + place_id + source.
      - Existing page UI, edit, delete, report, share, map, submitter card, and inbox badge are preserved.
    */
  </script>
</body>
</html>
