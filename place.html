<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Place</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 90%, #000 10%));
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      line-height:1.6;
      font-size:14px;
    }

    .hero-image{
      width:100%;
      max-height:360px;
      object-fit:cover;
      display:block;
      border-radius:18px;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:12px;
    }

    .place-title{
      font-size:22px;
      font-weight:950;
      line-height:1.3;
      margin-bottom:10px;
      letter-spacing:-.02em;
      word-break:break-word;
    }

    .badge-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      line-height:1;
    }

    .badge svg{
      width:13px;
      height:13px;
      flex-shrink:0;
    }

    .badge-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .badge-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .badge-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .badge-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .badge-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-bottom:12px;
    }

    .meta-item{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px;
      font-size:14px;
      line-height:1.55;
      word-break:break-word;
      min-width:0;
    }

    .meta-item strong{
      display:block;
      margin-bottom:4px;
      font-size:12px;
      color:var(--muted);
    }

    .desc{
      color:var(--text);
      line-height:1.65;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }

    .submitter-card{
      display:flex;
      gap:12px;
      align-items:center;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .submitter-avatar,
    .submitter-avatar-placeholder{
      width:56px;
      height:56px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .submitter-avatar{object-fit:cover}

    .submitter-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .submitter-body{min-width:0;flex:1}

    .submitter-name{
      font-size:15px;
      font-weight:950;
      line-height:1.3;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .submitter-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .submitter-name a:hover{text-decoration:underline}

    .verified-badge{
      width:21px;
      height:21px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:
        0 0 0 3px rgba(32,199,111,.18),
        0 8px 18px rgba(32,199,111,.22);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:13px;
      height:13px;
      display:block;
      stroke-width:3;
    }

    .submitter-username{
      font-size:12px;
      color:var(--blue);
      font-weight:850;
      margin-top:3px;
      word-break:break-word;
    }

    .submitter-bio{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
      word-break:break-word;
    }

    .section-title{
      font-size:17px;
      font-weight:950;
      margin-bottom:10px;
      letter-spacing:-.01em;
    }

    .action-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:12px;
    }

    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12.5px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      gap:7px;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
      color:var(--text);
      border:1px solid var(--line);
      background:var(--surface-2);
      white-space:nowrap;
    }

    .action-btn svg{
      width:16px;
      height:16px;
      display:block;
      flex-shrink:0;
    }

    .action-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-soft{background:var(--surface-2);border-color:var(--line)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-green.active{background:rgba(61,220,132,.24);border-color:rgba(61,220,132,.40)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}

    .share-action{margin-left:auto}

    .message{
      min-height:18px;
      font-size:13px;
      margin-top:10px;
      line-height:1.5;
      color:var(--muted);
    }

    .message.ok{color:#9cf0bf}
    .message.err{color:#ffb3bd}

    .edit-form{
      display:grid;
      gap:12px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    .label{
      font-size:13px;
      font-weight:950;
      color:var(--text);
    }

    .input,
    .textarea,
    .select{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .textarea{
      min-height:120px;
      resize:vertical;
      line-height:1.55;
    }

    .input::placeholder,
    .textarea::placeholder{
      color:var(--muted);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}
      .place-title{font-size:20px}
      .meta-grid{grid-template-columns:1fr}
      .grid-2{grid-template-columns:1fr}
      .share-action{margin-left:0}

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .action-btn{
        font-size:11.5px;
        padding:8px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Place detail</div>
      </div>

      <a href="profile.html" class="top-icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </a>
    </div>

    <div id="loadingPanel" class="panel">
      <div class="loading-box">Loading place...</div>
    </div>

    <div id="notFoundPanel" class="panel hidden">
      <div class="empty-box">Place not found.</div>
    </div>

    <div id="placePanel" class="hidden">
      <div class="panel">
        <img id="heroImage" class="hero-image hidden" alt="Place image" />

        <div id="placeTitle" class="place-title">Unnamed Place</div>
        <div id="badgeRow" class="badge-row"></div>

        <div class="meta-grid">
          <div class="meta-item">
            <strong>Category</strong>
            <span id="categoryText">-</span>
          </div>

          <div class="meta-item">
            <strong>City</strong>
            <span id="cityText">-</span>
          </div>

          <div class="meta-item">
            <strong>Province / State</strong>
            <span id="provinceText">-</span>
          </div>

          <div class="meta-item">
            <strong>Country</strong>
            <span id="countryText">-</span>
          </div>

          <div class="meta-item">
            <strong>Address</strong>
            <span id="addressText">-</span>
          </div>

          <div class="meta-item">
            <strong>Status</strong>
            <span id="adminStatusText">-</span>
          </div>
        </div>

        <div id="descText" class="desc">No description added.</div>

        <div class="action-row" id="topActionRow"></div>
        <div id="topMessage" class="message"></div>
      </div>

      <div class="panel">
        <div class="section-title">Submitted By</div>
        <div id="submitterCard" class="submitter-card"></div>
      </div>

      <div id="editPanel" class="panel hidden">
        <div class="section-title">Edit Place</div>

        <form id="editForm" class="edit-form">
          <div class="grid-2">
            <div class="field">
              <label class="label" for="editName">Place Name</label>
              <input id="editName" class="input" type="text" placeholder="Place name" />
            </div>

            <div class="field">
              <label class="label" for="editCategory">Category</label>
              <select id="editCategory" class="select">
                <option value="General">General</option>
                <option value="Park">Park</option>
                <option value="Beach">Beach</option>
                <option value="Club">Club</option>
                <option value="Retreat">Retreat</option>
                <option value="Private Spot">Private Spot</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editCity">City</label>
              <input id="editCity" class="input" type="text" placeholder="City" />
            </div>

            <div class="field">
              <label class="label" for="editProvince">Province / State</label>
              <input id="editProvince" class="input" type="text" placeholder="Province / State" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editCountry">Country</label>
              <input id="editCountry" class="input" type="text" placeholder="Country" />
            </div>

            <div class="field">
              <label class="label" for="editAddress">Address</label>
              <input id="editAddress" class="input" type="text" placeholder="Address" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editWebsite">Website / Link</label>
              <input id="editWebsite" class="input" type="text" placeholder="https://example.com" />
            </div>

            <div class="field">
              <label class="label" for="editImageURL">Image Link</label>
              <input id="editImageURL" class="input" type="text" placeholder="https://example.com/photo.jpg" />
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label class="label" for="editLat">Latitude</label>
              <input id="editLat" class="input" type="text" placeholder="Latitude" />
            </div>

            <div class="field">
              <label class="label" for="editLng">Longitude</label>
              <input id="editLng" class="input" type="text" placeholder="Longitude" />
            </div>
          </div>

          <div class="field">
            <label class="label" for="editDescription">Description</label>
            <textarea id="editDescription" class="textarea" placeholder="Description"></textarea>
          </div>

          <div class="action-row">
            <button id="saveEditBtn" type="submit" class="action-btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <path d="M17 21v-8H7v8"></path>
                <path d="M7 3v5h8"></path>
              </svg>
              <span>Save Changes</span>
            </button>

            <button id="cancelEditBtn" type="button" class="action-btn btn-soft">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
              <span>Cancel</span>
            </button>
          </div>

          <div id="editMessage" class="message"></div>
        </form>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");

    const loadingPanel = document.getElementById("loadingPanel");
    const notFoundPanel = document.getElementById("notFoundPanel");
    const placePanel = document.getElementById("placePanel");

    const heroImage = document.getElementById("heroImage");
    const placeTitle = document.getElementById("placeTitle");
    const badgeRow = document.getElementById("badgeRow");
    const categoryText = document.getElementById("categoryText");
    const cityText = document.getElementById("cityText");
    const provinceText = document.getElementById("provinceText");
    const countryText = document.getElementById("countryText");
    const addressText = document.getElementById("addressText");
    const adminStatusText = document.getElementById("adminStatusText");
    const descText = document.getElementById("descText");
    const topActionRow = document.getElementById("topActionRow");
    const topMessage = document.getElementById("topMessage");

    const submitterCard = document.getElementById("submitterCard");

    const editPanel = document.getElementById("editPanel");
    const editForm = document.getElementById("editForm");
    const editName = document.getElementById("editName");
    const editCategory = document.getElementById("editCategory");
    const editCity = document.getElementById("editCity");
    const editProvince = document.getElementById("editProvince");
    const editCountry = document.getElementById("editCountry");
    const editAddress = document.getElementById("editAddress");
    const editWebsite = document.getElementById("editWebsite");

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mq = window.matchMedia("(prefers-color-scheme: light)");
    if (mq.addEventListener) {
      mq.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "nearby-places.html";
    });

    function setTopMessage(text = "", type = "") {
      topMessage.textContent = text;
      topMessage.className = `message ${type}`;
    }

    function setEditMessage(text = "", type = "") {
      editMessage.textContent = text;
      editMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain");
      if (c === "canada") aliases.push("ca");

      return aliases.join(" ");
    }

    function buildLocationSearch(city, province, country) {
      return [
        titleText(city),
        titleText(province),
        titleText(country),
        countryAliases(country)
      ]
      .filter(Boolean)
      .join(" ")
      .trim()
      .toLowerCase();
    }

    function normalizeHref(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }

      return fallback;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      return {
        uid: getField(d, ["uid", "id", "user_id", "userId"]) || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "full_name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "user_name", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatar_url", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        verificationType: getField(d, ["verification_type", "verificationType", "badge_type", "badgeType"]),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted)
      };
    }

    function normalizePlace(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      const status = String(d.status || "").toLowerCase();

      const approved =
        d.approved === true ||
        d.verified === true ||
        d.is_verified === true ||
        d.isVerified === true ||
        ["approved", "active", "verified"].includes(status);

      const rejected =
        status === "rejected" ||
        d.rejected === true;

      const pending =
        d.pending === true ||
        status === "pending" ||
        (!approved && !rejected);

      return {
        id: getField(d, ["id"]) || fallbackId || "",
        source: sourceName,
        name: getField(d, ["name", "title", "place_name", "placeName"]) || "Unnamed Place",
        category: getField(d, ["category", "topic"]) || "General",
        description: getField(d, ["description", "desc", "notes"]),
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        website: getField(d, ["website", "url", "link"]),
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        createdBy: getField(d, ["created_by", "createdBy", "user_id", "userId", "uid"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName"]) || "Member",
        creatorUsername: getField(d, ["creator_username", "creatorUsername"]),
        approved,
        pending,
        rejected,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadProfile(uid) {
      if (!uid) return normalizeProfile({}, "");

      try {
        const [publicRow, userRow] = await Promise.all([
          selectProfileRow("public_profiles", uid),
          selectProfileRow("users", uid)
        ]);

        return normalizeProfile({
          ...(publicRow || {}),
          ...(userRow || {}),
          uid
        }, uid);
      } catch {
        return normalizeProfile({ uid }, uid);
      }
    }

    async function findPlace(placeId, source) {
      if (source && PLACE_SOURCES.includes(source)) {
        try {
          const { data, error } = await supabase
            .from(source)
            .select("*")
            .eq("id", placeId)
            .maybeSingle();

          if (!error && data) {
            return normalizePlace({ id: data.id, ...data }, data.id, source);
          }
        } catch {}
      }

      for (const tableName of PLACE_SOURCES) {
        try {
          const { data, error } = await supabase
            .from(tableName)
            .select("*")
            .eq("id", placeId)
            .maybeSingle();

          if (!error && data) {
            return normalizePlace({ id: data.id, ...data }, data.id, tableName);
          }
        } catch {}
      }

      return null;
    }

    async function updatePlaceById(tableName, placeId, payloadVariants) {
      let lastError = null;

      for (const payload of payloadVariants) {
        try {
          const { error } = await supabase
            .from(tableName)
            .update(payload)
            .eq("id", placeId);

          if (!error) return;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not update place.");
    }

    async function deletePlaceById(tableName, placeId) {
      try {
        const { error } = await supabase
          .from(tableName)
          .delete()
          .eq("id", placeId);

        if (!error) return;
      } catch {}

      await updatePlaceById(tableName, placeId, [
        {
          hidden: true,
          soft_deleted: true,
          deleted_at: nowIso(),
          updated_at: nowIso()
        },
        {
          hidden: true,
          softDeleted: true,
          deletedAt: nowIso(),
          updatedAt: nowIso()
        },
        {
          hidden: true
        }
      ]);
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];

      for (const col of targetColumns) {
        try {
          const { count, error } = await supabase
            .from("message_requests")
            .select("id", { count: "exact", head: true })
            .eq(col, uid)
            .eq("status", "pending");

          if (!error) return count || 0;
        } catch {}
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (Array.isArray(threads) && threads.length) {
          const threadIds = threads.map(t => t.id).filter(Boolean);

          if (threadIds.length) {
            const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

            for (const field of seenFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .is(field, null);

                if (!error) return count || 0;
              } catch {}
            }

            const boolFields = ["is_read", "read"];

            for (const field of boolFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .eq(field, false);

                if (!error) return count || 0;
              } catch {}
            }
          }
        }
      } catch {}

      const receiverColumns = ["receiver_id", "recipient_id", "to_user_id", "target_id", "receiverId", "recipientId", "toUserId"];
      const seenColumns = ["seen_at", "read_at", "seenAt", "readAt"];

      for (const receiverColumn of receiverColumns) {
        for (const seenColumn of seenColumns) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .eq(receiverColumn, uid)
              .neq("sender_id", uid)
              .is(seenColumn, null);

            if (!error) return count || 0;
          } catch {}
        }

        try {
          const { count, error } = await supabase
            .from("chat_messages")
            .select("id", { count: "exact", head: true })
            .eq(receiverColumn, uid)
            .neq("sender_id", uid)
            .eq("is_read", false);

          if (!error) return count || 0;
        } catch {}

        try {
          const { count, error } = await supabase
            .from("chat_messages")
            .select("id", { count: "exact", head: true })
            .eq(receiverColumn, uid)
            .neq("sender_id", uid)
            .eq("read", false);

          if (!error) return count || 0;
        } catch {}
      }

      return 0;
    }

    async function updateInboxBadge() {
      if (!currentUser || !inboxBadge) return;

      try {
        const [pendingRequests, unreadChats] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(pendingRequests || 0) + Number(unreadChats || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function loadVisitState() {
      if (!currentUser || !currentPlaceId) return false;

      const userColumns = ["user_id", "uid", "userId"];
      const placeColumns = ["place_id", "placeId", "target_id", "targetId", "nearby_place_id", "nearbyPlaceId"];

      for (const userColumn of userColumns) {
        for (const placeColumn of placeColumns) {
          try {
            let query = supabase
              .from("place_visits")
              .select("id")
              .eq(userColumn, currentUser.id)
              .eq(placeColumn, currentPlaceId)
              .limit(1);

            const { data, error } = await query;

            if (!error) {
              return Array.isArray(data) && data.length > 0;
            }
          } catch {}
        }
      }

      return false;
    }

    async function insertVisitManually() {
      const payloads = [
        {
          user_id: currentUser.id,
          place_id: currentPlaceId,
          source: currentSource || "nearby_places",
          place_source: currentSource || "nearby_places",
          status: "visited",
          visited: true,
          explored: false,
          place_name: currentPlace?.name || "",
          city: currentPlace?.city || "",
          created_at: nowIso(),
          updated_at: nowIso()
        },
        {
          userId: currentUser.id,
          placeId: currentPlaceId,
          source: currentSource || "nearby_places",
          status: "visited",
          visited: true,
          placeName: currentPlace?.name || "",
          city: currentPlace?.city || "",
          createdAt: nowIso(),
          updatedAt: nowIso()
        }
      ];

      let lastError = null;

      for (const payload of payloads) {
        try {
          const { error } = await supabase
            .from("place_visits")
            .insert(payload);

          if (!error) return;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not add visit.");
    }

    async function removeVisitManually() {
      const userColumns = ["user_id", "uid", "userId"];
      const placeColumns = ["place_id", "placeId", "target_id", "targetId", "nearby_place_id", "nearbyPlaceId"];

      for (const userColumn of userColumns) {
        for (const placeColumn of placeColumns) {
          try {
            const { error } = await supabase
              .from("place_visits")
              .delete()
              .eq(userColumn, currentUser.id)
              .eq(placeColumn, currentPlaceId);

            if (!error) return;
          } catch {}
        }
      }
    }

    function parseVisitRpcResult(data) {
      const item = Array.isArray(data) ? data[0] : data;

      if (typeof item === "boolean") return item;

      if (item && typeof item === "object") {
        const possibleBoolean =
          item.visited ??
          item.is_visited ??
          item.has_visited ??
          item.active ??
          item.is_active ??
          item.exists;

        if (typeof possibleBoolean === "boolean") return possibleBoolean;

        const action = String(item.action || item.status || item.result || "").toLowerCase();

        if (["added", "created", "visited", "true", "on"].includes(action)) return true;
        if (["removed", "deleted", "unvisited", "false", "off"].includes(action)) return false;
      }

      return null;
    }

    async function toggleBeenThere(button) {
      if (!currentUser || !currentPlace) return;

      button.disabled = true;
      setTopMessage("");

      try {
        let rpcWorked = false;

        try {
          const { data, error } = await supabase.rpc("toggle_place_visit", {
            p_place_id: currentPlaceId,
            p_source: currentSource || "nearby_places",
            p_place_name: currentPlace.name || "Unnamed Place",
            p_city: currentPlace.city || ""
          });

          if (!error) {
            const rpcState = parseVisitRpcResult(data);
            hasVisited = typeof rpcState === "boolean" ? rpcState : await loadVisitState();
            rpcWorked = true;
          }
        } catch {}

        if (!rpcWorked) {
          if (hasVisited) {
            await removeVisitManually();
            hasVisited = false;
          } else {
            await insertVisitManually();
            hasVisited = true;
          }
        }

        renderBadges();
        renderTopActions();
        setTopMessage(hasVisited ? "Marked as visited." : "Removed from visited places.", "ok");
      } catch (err) {
        console.error(err);
        setTopMessage("Could not update visited state.", "err");
        button.disabled = false;
      }
    }

    function buildMapUrl() {
      if (!currentPlace) return "";

      if (currentPlace.lat !== null && currentPlace.lng !== null) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${currentPlace.lat},${currentPlace.lng}`)}`;
      }

      const query = [
        currentPlace.name,
        currentPlace.address,
        currentPlace.city,
        currentPlace.province,
        currentPlace.country
      ].filter(Boolean).join(", ");

      if (!query.trim()) return "";

      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    }

    function buildShareUrl() {
      const url = new URL("place.html", window.location.href);
      url.searchParams.set("placeId", currentPlaceId);
      url.searchParams.set("source", currentSource || "nearby_places");
      return url.toString();
    }

    async function sharePlace(button) {
      if (!currentPlace) return;

      button.disabled = true;
      setTopMessage("");

      const shareUrl = buildShareUrl();

      const shareData = {
        title: `${currentPlace.name || "Place"} on OwnSpace`,
        text: `Check out ${currentPlace.name || "this place"} on OwnSpace.`,
        url: shareUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
          setTopMessage("Place shared.", "ok");
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(shareUrl);
          setTopMessage("Place link copied.", "ok");
        } else {
          prompt("Copy this place link:", shareUrl);
          setTopMessage("Copy the place link.", "ok");
        }
      } catch (err) {
        if (err?.name !== "AbortError") {
          console.error(err);
          setTopMessage("Could not share this place.", "err");
        }
      }

      button.disabled = false;
    }

    function renderBadges() {
      const badges = [];

      badges.push(`
        <span class="badge badge-blue">
          ${ICONS.mapPin}
          ${escapeHtml(currentPlace.category || "General")}
        </span>
      `);

      badges.push(`
        <span class="badge ${currentPlace.approved ? "badge-green" : currentPlace.rejected ? "badge-red" : "badge-yellow"}">
          ${currentPlace.approved ? ICONS.check : currentPlace.rejected ? ICONS.report : ICONS.star}
          ${currentPlace.approved ? "Approved" : currentPlace.rejected ? "Rejected" : "Pending"}
        </span>
      `);

      if (hasVisited) {
        badges.push(`
          <span class="badge badge-green">
            ${ICONS.check}
            Visited
          </span>
        `);
      }

      if (isCreator) {
        badges.push(`
          <span class="badge badge-purple">
            ${ICONS.star}
            Your Place
          </span>
        `);
      }

      if (currentPlace.city) {
        badges.push(`
          <span class="badge badge-blue">
            ${escapeHtml(currentPlace.city)}
          </span>
        `);
      }

      badgeRow.innerHTML = badges.join("");
    }

    function renderSubmitter() {
      const profileUrl = currentPlace.createdBy
        ? `member.html?uid=${encodeURIComponent(currentPlace.createdBy)}`
        : "search.html";

      const avatarHtml = currentSubmitterProfile?.photoURL
        ? `<img class="submitter-avatar" src="${escapeHtml(currentSubmitterProfile.photoURL)}" alt="Submitter photo">`
        : `<div class="submitter-avatar-placeholder">No photo</div>`;

      const verifiedHtml = currentSubmitterProfile?.verified
        ? `
          <span class="verified-badge" title="${escapeHtml(currentSubmitterProfile.verificationType || "Verified")}">
            ${ICONS.check}
          </span>
        `
        : "";

      submitterCard.innerHTML = `
        ${avatarHtml}

        <div class="submitter-body">
          <div class="submitter-name">
            <a href="${profileUrl}">${escapeHtml(currentSubmitterProfile?.displayName || currentPlace.creatorName || "Member")}</a>
            ${verifiedHtml}
          </div>

          ${currentSubmitterProfile?.username ? `<div class="submitter-username">@${escapeHtml(currentSubmitterProfile.username)}</div>` : ""}
          <div class="submitter-bio">${escapeHtml(currentSubmitterProfile?.bio || "Member profile")}</div>
        </div>
      `;

      const img = submitterCard.querySelector(".submitter-avatar");

      if (img) {
        img.addEventListener("error", () => {
          img.outerHTML = `<div class="submitter-avatar-placeholder">No photo</div>`;
        });
      }
    }

    function fillEditForm() {
      editName.value = currentPlace.name || "";
      editCategory.value = currentPlace.category || "General";
      editCity.value = currentPlace.city || "";
      editProvince.value = currentPlace.province || "";
      editCountry.value = currentPlace.country || "";
      editAddress.value = currentPlace.address || "";
      editWebsite.value = currentPlace.website || "";
      editImageURL.value = currentPlace.imageURL || "";
      editLat.value = currentPlace.lat ?? "";
      editLng.value = currentPlace.lng ?? "";
      editDescription.value = currentPlace.description || "";
      setEditMessage("");
    }

    function renderTopActions() {
      const buttons = [];
      const siteHref = normalizeHref(currentPlace.website);
      const mapHref = buildMapUrl();

      buttons.push(`
        <button id="beenThereBtn" class="action-btn btn-green ${hasVisited ? "active" : ""}" type="button">
          ${hasVisited ? ICONS.check : ICONS.mapPin}
          <span>${hasVisited ? "Visited" : "Been There"}</span>
        </button>
      `);

      if (mapHref) {
        buttons.push(`
          <a href="${escapeHtml(mapHref)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-primary">
            ${ICONS.mapPin}
            <span>Open Map</span>
          </a>
        `);
      }

      if (currentPlace.website) {
        buttons.push(`
          <a href="${escapeHtml(siteHref)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-primary">
            ${ICONS.link}
            <span>Website</span>
          </a>
        `);
      }

      if (currentPlace.createdBy) {
        buttons.push(`
          <a href="member.html?uid=${encodeURIComponent(currentPlace.createdBy)}" class="action-btn btn-soft">
            ${ICONS.user}
            <span>Profile</span>
          </a>
        `);
      }

      if (isCreator) {
        buttons.push(`
          <button id="toggleEditBtn" class="action-btn btn-purple" type="button">
            ${ICONS.edit}
            <span>Edit</span>
          </button>
        `);

        buttons.push(`
          <button id="deletePlaceBtn" class="action-btn btn-red" type="button">
            ${ICONS.trash}
            <span>Delete</span>
          </button>
        `);
      } else {
        buttons.push(`
          <a href="report.html?type=place&targetId=${encodeURIComponent(currentPlaceId)}&targetUserId=${encodeURIComponent(currentPlace.createdBy || "")}&source=${encodeURIComponent(currentSource || "")}" class="action-btn btn-yellow">
            ${ICONS.report}
            <span>Report</span>
          </a>
        `);
      }

      buttons.push(`
        <button id="sharePlaceBtn" class="action-btn btn-green share-action" type="button">
          ${ICONS.share}
          <span>Share</span>
        </button>
      `);

      topActionRow.innerHTML = buttons.join("");

      const beenThereBtn = document.getElementById("beenThereBtn");
      const sharePlaceBtn = document.getElementById("sharePlaceBtn");
      const toggleEditBtn = document.getElementById("toggleEditBtn");
      const deletePlaceBtn = document.getElementById("deletePlaceBtn");

      if (beenThereBtn) {
        beenThereBtn.addEventListener("click", () => toggleBeenThere(beenThereBtn));
      }

      if (sharePlaceBtn) {
        sharePlaceBtn.addEventListener("click", () => sharePlace(sharePlaceBtn));
      }

      if (toggleEditBtn) {
        toggleEditBtn.addEventListener("click", () => {
          const opening = editPanel.classList.contains("hidden");

          if (opening) {
            fillEditForm();
            editPanel.classList.remove("hidden");
            editPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            toggleEditBtn.innerHTML = `${ICONS.edit}<span>Hide Edit</span>`;
          } else {
            editPanel.classList.add("hidden");
            toggleEditBtn.innerHTML = `${ICONS.edit}<span>Edit</span>`;
          }
        });
      }

      if (deletePlaceBtn) {
        deletePlaceBtn.addEventListener("click", async () => {
          const ok = confirm("Delete this place?");
          if (!ok) return;

          deletePlaceBtn.disabled = true;
          setTopMessage("");

          try {
            await deletePlaceById(currentSource, currentPlaceId);
            window.location.href = "nearby-places.html";
          } catch (err) {
            console.error(err);
            setTopMessage("Could not delete place.", "err");
            deletePlaceBtn.disabled = false;
          }
        });
      }
    }

    async function renderPlaceView() {
      placeTitle.textContent = currentPlace.name || "Unnamed Place";
      categoryText.textContent = currentPlace.category || "General";
      cityText.textContent = currentPlace.city || "-";
      provinceText.textContent = currentPlace.province || "-";
      countryText.textContent = currentPlace.country || "-";
      addressText.textContent = currentPlace.address || "-";
      adminStatusText.textContent = currentPlace.approved ? "Approved" : currentPlace.rejected ? "Rejected" : "Pending approval";
      descText.textContent = currentPlace.description || "No description added.";

      if (currentPlace.imageURL) {
        heroImage.src = currentPlace.imageURL;
        heroImage.classList.remove("hidden");
      } else {
        heroImage.removeAttribute("src");
        heroImage.classList.add("hidden");
      }

      renderBadges();
      renderSubmitter();
      renderTopActions();
    }

    cancelEditBtn.addEventListener("click", () => {
      editPanel.classList.add("hidden");

      const toggleEditBtn = document.getElementById("toggleEditBtn");
      if (toggleEditBtn) toggleEditBtn.innerHTML = `${ICONS.edit}<span>Edit</span>`;
    });

    heroImage.addEventListener("error", () => {
      heroImage.classList.add("hidden");
    });

    editForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentPlace || !isCreator) return;

      const name = editName.value.trim();
      const category = editCategory.value.trim() || "General";
      const city = editCity.value.trim();
      const province = editProvince.value.trim();
      const country = editCountry.value.trim();
      const address = editAddress.value.trim();
      const website = editWebsite.value.trim();
      const imageURL = editImageURL.value.trim();
      const description = editDescription.value.trim();
      const latText = editLat.value.trim();
      const lngText = editLng.value.trim();

      if (!name) {
        setEditMessage("Place name is required.", "err");
        return;
      }

      if (!city) {
        setEditMessage("City is required.", "err");
        return;
      }

      if (!province) {
        setEditMessage("Province / State is required.", "err");
        return;
      }

      if (!country) {
        setEditMessage("Country is required.", "err");
        return;
      }

      if (!description) {
        setEditMessage("Description is required.", "err");
        return;
      }

      const lat = latText ? Number(latText) : null;
      const lng = lngText ? Number(lngText) : null;

      if (latText && !Number.isFinite(lat)) {
        setEditMessage("Latitude must be a valid number.", "err");
        return;
      }

      if (lngText && !Number.isFinite(lng)) {
        setEditMessage("Longitude must be a valid number.", "err");
        return;
      }

      const saveBtn = document.getElementById("saveEditBtn");
      saveBtn.disabled = true;
      setEditMessage("");

      try {
        const locationSearch = buildLocationSearch(city, province, country);

        const snakePayload = {
          name,
          category,
          city,
          location_city: city,
          current_city: city,
          province,
          state: province,
          region: province,
          location_province: province,
          current_province: province,
          country,
          location_country: country,
          current_country: country,
          location_search: locationSearch,
          address,
          website,
          image_url: imageURL,
          description,
          lat,
          lng,
          updated_at: nowIso()
        };

        const camelPayload = {
          name,
          category,
          city,
          locationCity: city,
          currentCity: city,
          province,
          state: province,
          region: province,
          locationProvince: province,
          currentProvince: province,
          country,
          locationCountry: country,
          currentCountry: country,
          locationSearch,
          address,
          website,
          imageURL,
          description,
          lat,
          lng,
          updatedAt: nowIso()
        };

        const minimalSnakePayload = {
          name,
          category,
          city,
          province,
          country,
          address,
          website,
          image_url: imageURL,
          description,
          lat,
          lng,
          updated_at: nowIso()
        };

        const minimalCamelPayload = {
          name,
          category,
          city,
          province,
          country,
          address,
          website,
          imageURL,
          description,
          lat,
          lng,
          updatedAt: nowIso()
        };

        const ultraMinimalPayload = {
          name,
          category,
          city,
          province,
          country,
          address,
          website,
          description,
          lat,
          lng
        };

        await updatePlaceById(currentSource, currentPlaceId, [
          snakePayload,
          camelPayload,
          minimalSnakePayload,
          minimalCamelPayload,
          ultraMinimalPayload
        ]);

        currentPlace = {
          ...currentPlace,
          name,
          category,
          city,
          province,
          country,
          address,
          website,
          imageURL,
          description,
          lat,
          lng
        };

        await renderPlaceView();
        setEditMessage("Place updated.", "ok");
        setTopMessage("Place updated.", "ok");
      } catch (err) {
        console.error(err);
        setEditMessage("Could not update place.", "err");
      }

      saveBtn.disabled = false;
    });

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;
      updateInboxBadge();

      const params = new URLSearchParams(window.location.search);
      currentPlaceId = params.get("placeId") || params.get("id") || "";
      currentSource = params.get("source") || "";

      if (!currentPlaceId) {
        loadingPanel.classList.add("hidden");
        notFoundPanel.classList.remove("hidden");
        return;
      }

      try {
        currentPlace = await findPlace(currentPlaceId, currentSource);

        if (!currentPlace || currentPlace.hidden) {
          loadingPanel.classList.add("hidden");
          notFoundPanel.classList.remove("hidden");
          return;
        }

        currentSource = currentPlace.source || currentSource || "nearby_places";
        currentSubmitterProfile = await loadProfile(currentPlace.createdBy);
        isCreator = currentPlace.createdBy === currentUser.id;
        hasVisited = await loadVisitState();

        if (!isCreator && (currentPlace.pending || currentPlace.rejected)) {
          loadingPanel.classList.add("hidden");
          notFoundPanel.classList.remove("hidden");
          notFoundPanel.querySelector(".empty-box").textContent = "This place is not public yet.";
          return;
        }

        await renderPlaceView();

        loadingPanel.classList.add("hidden");
        placePanel.classList.remove("hidden");
      } catch (err) {
        console.error(err);
        loadingPanel.classList.add("hidden");
        notFoundPanel.classList.remove("hidden");
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    initPage();

    /*
      OWNSPACE PLACE DETAIL UPDATE:

      FIXED / ADDED:
      - Cleaned UI to match nearby.html / nearby-events.html / nearby-places.html.
      - Bottom nav changed back to consistent 5 buttons.
      - Removed extra Create button from bottom nav.
      - Green verified badge is brighter and visible.
      - Website button label instead of Open Link.
      - Share button placed cleanly.
      - Report button stays for non-creators.
      - Edit/Delete buttons stay only for creator.
      - Been There / Visited logic supports RPC first, then manual fallback.
      - Inbox badge counts only:
        pending message_requests + unread chat_messages.
      - Supports both:
        place.html?placeId=...
        place.html?placeId=...&source=...
      - Theme supports osTheme and old bwTheme.
    */
  </script>
</body>
</html>
