<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby People</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .chip-row{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr;
      gap:6px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 5px;
      border-radius:12px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      min-height:32px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
      margin-top:9px;
    }

    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 10px;
      font-size:12px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:38px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.22)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}

    .action-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .status-text{
      min-height:18px;
      font-size:12.5px;
      margin-top:8px;
      line-height:1.45;
      color:var(--muted);
    }

    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin-bottom:10px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px 4px;
      min-height:38px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:11.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:950;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      overflow:hidden;
    }

    .person-card{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .person-avatar,
    .person-avatar-placeholder{
      width:54px;
      height:54px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .person-avatar{object-fit:cover}

    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .person-body{
      min-width:0;
      flex:1;
    }

    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
    }

    .person-main{
      min-width:0;
      flex:1;
    }

    .person-name{
      font-size:15px;
      font-weight:950;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .person-name a{
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .person-name a:hover{text-decoration:underline}

    .verified-badge{
      width:21px;
      height:21px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:
        0 0 0 3px rgba(32,199,111,.18),
        0 8px 18px rgba(32,199,111,.22);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:13px;
      height:13px;
      display:block;
      stroke-width:3;
    }

    .person-username{
      font-size:12px;
      color:var(--blue);
      font-weight:850;
      margin-top:2px;
      word-break:break-word;
    }

    .person-meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .person-bio{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
      word-break:break-word;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .small-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
    }

    .pill-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .pill-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .pill-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .pill-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .card-actions{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:10px;
      align-items:center;
    }

    .share-btn{
      margin-left:auto;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}

      .chip-row{
        grid-template-columns:1fr;
        gap:5px;
      }

      .chip{
        font-size:10px;
      }

      .top-actions{
        grid-template-columns:1fr;
      }

      .tabs{
        grid-template-columns:repeat(4,1fr);
        gap:4px;
      }

      .tab-link{
        font-size:10.5px;
        padding:8px 2px;
      }

      .person-card{
        align-items:flex-start;
      }

      .person-meta{
        white-space:normal;
        overflow:visible;
        text-overflow:clip;
      }

      .share-btn{
        margin-left:0;
      }

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .action-btn{
        font-size:11.5px;
        padding:8px 9px;
      }

      .tab-link{
        font-size:9.8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="useBrowserLocationBtn" class="top-icon-btn" type="button" aria-label="Use GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby people</div>
      </div>

      <a href="edit-profile.html#location" class="top-icon-btn" aria-label="Edit location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="chip-row">
        <span id="locationChip" class="chip chip-blue">Location -</span>
        <span id="browserChip" class="chip chip-yellow">GPS off</span>
        <span id="countChip" class="chip chip-green">People 0</span>
      </div>

      <div class="top-actions">
        <a href="edit-profile.html#location" class="action-btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
            <circle cx="12" cy="9" r="2.5"></circle>
          </svg>
          <span>Edit Location</span>
        </a>

        <button id="gpsBtn2" class="action-btn btn-green" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span>Use GPS</span>
        </button>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link active">People</a>
        <a href="nearby-events.html" class="tab-link">Events</a>
        <a href="nearby-places.html" class="tab-link">Places</a>
        <a href="nearby-communities.html" class="tab-link">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search name, username, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">×</button>
      </div>

      <div id="listLoading" class="loading-box">Loading people...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No people found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const locationChip = document.getElementById("locationChip");
    const browserChip = document.getElementById("browserChip");
    const countChip = document.getElementById("countChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const gpsBtn2 = document.getElementById("gpsBtn2");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let browserCoords = null;

    let peopleData = [];
    let followMap = new Map();
    let requestMap = new Map();

    const ICONS = {
      verified: `
        <span class="verified-badge" title="Verified">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      `,
      open: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      `,
      share: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.6 13.5 6.8 4"></path>
          <path d="m15.4 6.5-6.8 4"></path>
        </svg>
      `
    };

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return "";
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || d.current_city || d.currentCity || "");
      const province = titleText(d.province || d.state || d.region || d.location_province || d.locationProvince || d.current_province || d.currentProvince || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || d.current_country || d.currentCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      const city = getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]);
      const province = getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]);
      const country = getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]);

      const blockedUsers = Array.isArray(d.blocked_users)
        ? d.blocked_users
        : Array.isArray(d.blockedUsers)
        ? d.blockedUsers
        : [];

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        gender: getField(d, ["gender_custom", "genderCustom", "gender"]),
        keywords: getField(d, ["keywords", "interests", "tags", "search_keywords", "searchKeywords"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: normalizeText(getField(d, ["moderation_status", "moderationStatus", "status"])),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin ?? d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deactivated),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        city,
        province,
        country,
        locationSearch: buildLocationSearch(d),
        blockedUsers,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function renderViewerLocation() {
      if (!viewerProfile) return;

      const city = titleText(viewerProfile.city);
      const province = titleText(viewerProfile.province);
      const country = titleText(viewerProfile.country);
      const parts = [city, province, country].filter(Boolean);

      locationChip.textContent = parts.length ? parts.join(", ") : "Location not set";

      if (!browserCoords) {
        browserChip.textContent = "GPS off";
        browserChip.className = "chip chip-yellow";
      }
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase.from(table).select("id", { count: "exact", head: true });
        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q =>
          q.eq(targetColumn, uid)
        );

        if (countWithoutStatus !== null) return countWithoutStatus;
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (Array.isArray(threads) && threads.length) {
          const threadIds = threads.map(t => t.id).filter(Boolean);

          if (threadIds.length) {
            const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

            for (const field of seenFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .is(field, null);

                if (!error) return count || 0;
              } catch {}
            }

            const boolFields = ["is_read", "read"];

            for (const field of boolFields) {
              try {
                const { count, error } = await supabase
                  .from("chat_messages")
                  .select("id", { count: "exact", head: true })
                  .in("thread_id", threadIds)
                  .neq("sender_id", uid)
                  .eq(field, false);

                if (!error) return count || 0;
              } catch {}
            }
          }
        }
      } catch {}

      return 0;
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        { match: "uid", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "user_id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "userId", payload: { lat: coords.lat, lng: coords.lng, updatedAt: nowIso() } }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "GPS unsupported";
        browserChip.className = "chip chip-red";
        renderPeople();
        return;
      }

      browserChip.textContent = "Checking GPS...";
      browserChip.className = "chip chip-yellow";
      setPageStatus("Checking browser location...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            browserChip.textContent = "GPS on";
            browserChip.className = "chip chip-green";

            try {
              await Promise.all([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;

              renderViewerLocation();

              browserChip.textContent = "GPS on";
              browserChip.className = "chip chip-green";
              setPageStatus("GPS enabled. People with coordinates are sorted closer first.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "GPS off";
            browserChip.className = "chip chip-yellow";
            setPageStatus("Could not use browser GPS. Using saved location and search instead.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      renderPeople();
    }

      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";

    function showEmpty(text) {

      listWrap.classList.add("hidden");

      countChip.textContent = "People 0";

    function isBlockedByViewer(profile) {
      if (!profile?.uid) return false;

      return viewerBlockedUsers.some(item => {
        if (typeof item === "string") return item === profile.uid;

        if (item && typeof item === "object") {
          return item.uid === profile.uid || item.user_id === profile.uid || item.userId === profile.uid;
        }

        return false;
      });
    }

    function canUseProfile(profile) {
      if (!profile) return false;
      if (!profile.uid) return false;
      if (profile.uid === currentUser.id) return false;
      if (!profile.showInNearby) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin) return false;
      if (["banned", "deleted", "removed"].includes(profile.moderationStatus)) return false;
      if (isBlockedByViewer(profile)) return false;

      return true;
    }

    function findRelation(profileUid) {
      if (followMap.has(profileUid)) return "following";
      if (requestMap.has(profileUid)) return "requested";

      const profile = peopleData.find(p => p.uid === profileUid);
      if (profile?.isPrivate) return "request";

      return "follow";
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country) {
      if (!viewerCity || !city) return false;
      if (viewerCity !== city) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;
      if (viewerProvince && province && viewerProvince !== province) return false;

      return true;
    }

    function flexibleSameProvince(viewerProvince, viewerCountry, province, country) {
      if (!viewerProvince || !province) return false;
      if (viewerProvince !== province) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;

      return true;
    }

    function buildBaseRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return peopleData
        .filter(canUseProfile)
        .map(profile => {
          const city = normalizeText(profile.city);
          const province = normalizeText(profile.province);
          const country = normalizeText(profile.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = flexibleSameProvince(viewerProvince, viewerCountry, province, country);
          const sameCity = flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country);

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            profile.lat !== null &&
            profile.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, profile.lat, profile.lng);
          }

          const searchable = [
            profile.displayName,
            profile.username,
            profile.bio,
            profile.gender,
            profile.keywords,
            profile.city,
            profile.province,
            profile.country,
            provinceAliases(profile.province),
            countryAliases(profile.country),
            profile.locationSearch
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          const placeLabel = [titleText(profile.city), titleText(profile.province), titleText(profile.country)]
            .filter(Boolean)
            .join(", ");

          const distanceLabel = distanceKm !== null ? formatDistance(distanceKm) : "";
          const relation = findRelation(profile.uid);
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...profile,
            sameCountry,
            sameProvince,
            sameCity,
            distanceKm,
            withinGpsRange,
            relation,
            searchable,
            placeLabel,
            distanceLabel
          };
        });
    }

    function buildPeopleRows() {
      const q = normalizeText(searchInput.value);

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const hasGps =
        !!browserCoords ||
        (viewerProfile?.lat !== null && viewerProfile?.lng !== null);

      let rows = buildBaseRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (hasGps) {
        rows = rows.filter(row => row.withinGpsRange || row.sameCity || row.sameProvince || row.sameCountry);
      } else if (viewerHasLocation) {
        rows = rows.filter(row => row.sameCity || row.sameProvince || row.sameCountry);
      } else {
        rows = [];
      }

      rows.sort((a, b) => {
        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        if (a.sameCountry && !b.sameCountry) return -1;
        if (b.sameCountry && !a.sameCountry) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        if (followMap.has(a.uid) && !followMap.has(b.uid)) return -1;
        if (followMap.has(b.uid) && !followMap.has(a.uid)) return 1;

        if (a.verified && !b.verified) return -1;
        if (b.verified && !a.verified) return 1;

        return a.displayName.localeCompare(b.displayName);
      });

      return rows;
    }

    function buildRelationButton(row) {
      if (row.relation === "following") {
        return `<button class="action-btn btn-red relation-btn" data-action="unfollow" data-uid="${escapeHtml(row.uid)}" type="button">Unfollow</button>`;
      }

      if (row.relation === "requested") {
        return `<button class="action-btn btn-yellow relation-btn" data-action="cancel" data-uid="${escapeHtml(row.uid)}" type="button">Requested</button>`;
      }

      if (row.relation === "request") {
        return `<button class="action-btn btn-purple relation-btn" data-action="request" data-uid="${escapeHtml(row.uid)}" type="button">Request</button>`;
      }

      return `<button class="action-btn btn-green relation-btn" data-action="follow" data-uid="${escapeHtml(row.uid)}" type="button">Follow</button>`;
    }

    async function insertWithFallback(table, payloadVariants) {
      let lastError = null;

      for (const payload of payloadVariants) {
        try {
          const { data, error } = await supabase
            .from(table)
            .insert(payload)
            .select("id")
            .maybeSingle();

          if (!error) return data || null;

          lastError = error || lastError;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error(`Could not insert into ${table}.`);
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;

      const variants = [
        payload,
        {
          type: payload.type || "notification",
          title: payload.title || "",
          text: payload.text || "",
          fromUserId: payload.from_user_id || currentUser.id,
          toUserId: targetUid,
          createdAt: nowIso(),
          isRead: false,
          read: false
        },
        {
          type: payload.type || "notification",
          text: payload.text || "",
          to_user_id: targetUid,
          from_user_id: currentUser.id,
          created_at: nowIso(),
          is_read: false
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function deleteMatchingRows(table, variants) {
      let worked = false;
      let lastError = null;

      for (const item of variants) {
        try {
          let query = supabase.from(table).delete();

          Object.entries(item).forEach(([key, value]) => {
            query = query.eq(key, value);
          });

          const { error } = await query;

          if (!error) worked = true;
          else lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      if (!worked && lastError) throw lastError;
    }

          if (!error) return;
        } catch {}

      await deleteMatchingRows("follows", [
        { follower_id: currentUser.id, following_id: row.uid },
        { followerId: currentUser.id, followingId: row.uid },
        { from_user_id: currentUser.id, to_user_id: row.uid }

    async function shareProfile(row) {
      const url = buildProfileShareUrl(row.uid);
      const title = `${row.displayName || "Member"} on OwnSpace`;
      const text = `Check ${row.displayName || "this member"} on OwnSpace.`;

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Profile link copied.");
        } else {
          prompt("Copy this profile link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") console.error("Share failed:", err);
      }
    }

    function renderPeople() {
      openLoading();

      const q = normalizeText(searchInput.value);

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const hasGps =
        !!browserCoords ||
        (viewerProfile?.lat !== null && viewerProfile?.lng !== null);

      const rows = buildPeopleRows();

      if (!q && !viewerHasLocation && !hasGps) {
        showEmpty("Set your location in profile, use GPS, or search by city/country/name.");
        return;
      }

      if (!rows.length) {
        if (q) {
          showEmpty("No matching people found. Try another city, province, country, name or keyword.");
        } else if (hasGps) {
          showEmpty("No nearby people found with GPS/location. Try search.");
        } else {
          showEmpty("No people found near your saved location. Try search or update your location.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(row => {
        const avatarHtml = row.photoURL
          ? `<img class="person-avatar" src="${escapeHtml(row.photoURL)}" alt="Profile photo">`
          : `<div class="person-avatar-placeholder">No photo</div>`;

        const metaParts = [];

        if (row.placeLabel) metaParts.push(row.placeLabel);
        if (row.distanceLabel) metaParts.push(row.distanceLabel);
        else if (row.sameCity) metaParts.push("Same city");
        else if (row.sameProvince) metaParts.push("Same province/state");
        else if (row.sameCountry) metaParts.push("Same country");

        let topPill = "";

        if (followMap.has(row.uid)) {
          topPill = `<span class="small-pill pill-blue">Following</span>`;
        } else if (requestMap.has(row.uid)) {
          topPill = `<span class="small-pill pill-yellow">Requested</span>`;
        } else if (row.verified) {
          topPill = `<span class="small-pill pill-green">Verified</span>`;
        } else if (row.isPrivate) {
          topPill = `<span class="small-pill pill-yellow">Private</span>`;
        } else if (row.distanceLabel) {
          topPill = `<span class="small-pill pill-purple">${escapeHtml(row.distanceLabel)}</span>`;
        }

        const bioHtml = row.bio ? `<div class="person-bio">${escapeHtml(row.bio)}</div>` : "";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="person-card">
            ${avatarHtml}

            <div class="person-body">
              <div class="person-head">
                <div class="person-main">
                  <div class="person-name">
                    <a href="member.html?uid=${encodeURIComponent(row.uid)}">${escapeHtml(row.displayName)}</a>
                    ${row.verified ? ICONS.verified : ""}
                  </div>

                  ${row.username ? `<div class="person-username">@${escapeHtml(row.username)}</div>` : ""}
                  <div class="person-meta">${escapeHtml(metaParts.join(" • ") || "OwnSpace member")}</div>
                  ${bioHtml}
                </div>

                ${topPill}
              </div>

              <div class="card-actions">
                <a href="member.html?uid=${encodeURIComponent(row.uid)}" class="action-btn btn-primary">${ICONS.open}<span>Open</span></a>
                ${buildRelationButton(row)}
                <button class="action-btn btn-green share-btn" data-share-uid="${escapeHtml(row.uid)}" type="button">${ICONS.share}<span>Share</span></button>
              </div>
            </div>
          </div>
        `;

        const img = card.querySelector(".person-avatar");

        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
          });
        }

        listWrap.appendChild(card);
      });

      listWrap.querySelectorAll(".relation-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const uid = btn.getAttribute("data-uid");
          const action = btn.getAttribute("data-action");
          const row = rows.find(r => r.uid === uid);

          if (!row) return;

          btn.disabled = true;
          setPageStatus("");

          try {
            if (action === "follow") await followPerson(row);
            else if (action === "unfollow") await unfollowPerson(row);
            else if (action === "request") await requestFollow(row);
            else if (action === "cancel") await cancelRequest(row);

            await loadRelations();
            renderPeople();

            const messages = {
              follow: "Now following member.",
              unfollow: "Unfollowed member.",
              request: "Follow request sent.",
              cancel: "Follow request cancelled."
            };

            setPageStatus(messages[action] || "Updated.", "status-ok");
          } catch (err) {
            console.error(err);
            setPageStatus("Could not update follow state.", "status-err");
            btn.disabled = false;
          }
        });
      });

      listWrap.querySelectorAll(".share-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const uid = btn.getAttribute("data-share-uid");
          const row = rows.find(r => r.uid === uid);

          if (row) await shareProfile(row);
        });
      });

      showList(rows.length);
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
      renderViewerLocation();
    }

    async function loadPeople() {
      let publicRows = [];
      let userRows = [];

      try {
        const { data, error } = await supabase
          .from("public_profiles")
          .select("*");

        if (error) throw error;
        publicRows = data || [];
      } catch (err) {
        console.error("public_profiles load error:", err);
        publicRows = [];
      }

      try {
        const { data, error } = await supabase
          .from("users")
          .select("*");

        if (!error && Array.isArray(data)) {
          userRows = data;
        }
      } catch {}

      const byUid = new Map();

      publicRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      userRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      peopleData = Array.from(byUid.values()).map(row => normalizeProfile(row, row.uid || row.id || row.user_id || row.userId));
    }

    async function selectRowsWithFallback(table, variants) {
      for (const variant of variants) {
        try {
          let query = supabase.from(table).select("*");

          Object.entries(variant).forEach(([key, value]) => {
            query = query.eq(key, value);
          });

          const { data, error } = await query;

          if (!error) return data || [];
        } catch {}
      }

      return [];
    }

    async function loadRelations() {
      followMap = new Map();
      requestMap = new Map();

      const followsRows = await selectRowsWithFallback("follows", [
        { follower_id: currentUser.id },
        { followerId: currentUser.id },
        { from_user_id: currentUser.id }
      ]);

      followsRows.forEach(row => {
        const uid = row.following_id || row.followingId || row.to_user_id || row.toUserId;

        if (uid) followMap.set(uid, row.id || "");
      });

      const requestRows = await selectRowsWithFallback("follow_requests", [
        { requester_id: currentUser.id, status: "pending" },
        { requesterId: currentUser.id, status: "pending" },
        { from_user_id: currentUser.id, status: "pending" },
        { requester_id: currentUser.id },
        { requesterId: currentUser.id },
        { from_user_id: currentUser.id }
      ]);

      requestRows.forEach(row => {
        const status = normalizeText(row.status || row.request_status || row.requestStatus || "pending");
        if (status && status !== "pending") return;

        const uid = row.target_id || row.targetId || row.to_user_id || row.toUserId;

        if (uid) requestMap.set(uid, row.id || "");
      });
    }

    async function refreshAll() {
      openLoading();

      await Promise.all([
        loadPeople(),
        loadRelations(),
        loadInboxBadge()
      ]);

      renderViewerLocation();
      renderPeople();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPeople();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPeople();
    });

    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    gpsBtn2.addEventListener("click", requestBrowserLocation);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load people.");
      }
    }

    initPage();
  </script>
</body>
</html>
