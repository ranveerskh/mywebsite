<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby People</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.045);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }

    .top-icon-btn.refresh-top{
      background:rgba(61,220,132,.13);
      border-color:rgba(61,220,132,.22);
    }

    .top-icon-btn svg{
      width:17px;
      height:17px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
    }

    .hero-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
      margin-bottom:7px;
    }

    .page-title{
      font-size:16px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.15;
      margin-bottom:2px;
    }

    .page-sub{
      color:var(--muted);
      font-size:10.5px;
      line-height:1.35;
    }

    .mode-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid rgba(76,201,255,.22);
      background:rgba(76,201,255,.13);
      color:var(--text);
      white-space:nowrap;
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-bottom:7px;
    }

    .action-btn{
      border:none;
      border-radius:11px;
      padding:8px 9px;
      font-size:11px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:34px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.22)}
    .btn-green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.22)}
    .btn-yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.22)}

    .action-btn:disabled{opacity:.65;cursor:not-allowed}

    .meta-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      font-size:10.6px;
      color:var(--muted);
      line-height:1.35;
      padding:1px 2px 0;
    }

    .meta-row strong{color:var(--text);font-weight:950}

    .status-text{
      min-height:0;
      font-size:11px;
      margin-top:5px;
      line-height:1.35;
      color:var(--muted);
    }

    .status-text:not(:empty){min-height:15px}
    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:5px;
      margin-bottom:7px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:11px;
      padding:7px 4px;
      min-height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:10.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:7px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:10px 39px 10px 11px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:12.5px;
      min-height:38px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:5px;
      top:50%;
      transform:translateY(-50%);
      width:29px;
      height:29px;
      border:none;
      border-radius:9px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:950;
      line-height:1;
    }

    .filter-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:7px;
    }

    .filter-chip{
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      border-radius:999px;
      padding:5px 7px;
      font-size:9.8px;
      font-weight:950;
      line-height:1;
    }

    .filter-chip.green{background:rgba(61,220,132,.12);border-color:rgba(61,220,132,.20)}
    .filter-chip.purple{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.20)}
    .filter-chip.yellow{background:rgba(245,185,66,.12);border-color:rgba(245,185,66,.20)}

    .list{display:grid;gap:6px}

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:18px 8px;
      background:var(--surface-2);
      border-radius:14px;
      border:1px dashed var(--line);
      font-size:12.5px;
      line-height:1.45;
    }

    .person-tile{
      display:block;
      text-decoration:none;
      color:inherit;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      overflow:hidden;
      box-shadow:var(--soft-shadow);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .person-tile:hover{
      background:var(--surface-3);
      border-color:rgba(76,201,255,.26);
    }

    .person-tile:active{transform:scale(.992)}

    .person-card{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:0;
    }

    .person-avatar,
    .person-avatar-placeholder{
      width:46px;
      height:46px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .person-avatar{object-fit:cover}

    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:9px;
      text-align:center;
      padding:5px;
      font-weight:900;
    }

    .person-body{min-width:0;flex:1}

    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:7px;
      min-width:0;
    }

    .person-main{min-width:0;flex:1}

    .person-name{
      font-size:13px;
      font-weight:950;
      line-height:1.2;
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }

    .person-name span:first-child{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .verified-badge{
      width:17px;
      height:17px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#20c76f;
      color:#ffffff;
      border:2px solid rgba(255,255,255,.92);
      box-shadow:0 0 0 3px rgba(32,199,111,.14);
      flex-shrink:0;
    }

    .verified-badge svg{
      width:10px;
      height:10px;
      display:block;
      stroke-width:3;
    }

    .person-username{
      font-size:10.8px;
      color:var(--blue);
      font-weight:900;
      margin-top:2px;
      word-break:break-word;
    }

    .person-meta{
      font-size:10.8px;
      color:var(--muted);
      line-height:1.35;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .distance-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid rgba(167,139,250,.20);
      background:rgba(167,139,250,.13);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
      max-width:88px;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.13);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:17px;
      height:17px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    .nav-badge.show{display:flex}

    @media(max-width:700px){
      body{padding:6px 6px 82px}
      .person-meta{white-space:normal;overflow:visible;text-overflow:clip}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
      .nav-badge{right:8px}
    }

    @media(max-width:420px){
      .top-actions{grid-template-columns:1fr 1fr}
      .action-btn{font-size:10.5px;padding:7px 7px}
      .tab-link{font-size:9.7px;padding:6px 3px}
      .distance-pill{max-width:76px;font-size:9px}
      .meta-row{grid-template-columns:1fr;font-size:10.4px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby people</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-row">
        <div>
          <div class="page-title">Nearby People</div>
          <div class="page-sub">Search by name, username, city, province, country or keyword.</div>
        </div>
        <div id="modePill" class="mode-pill">City Mode</div>
      </div>

      <div class="top-actions">
        <button id="gpsBtn" class="action-btn btn-yellow" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span id="gpsBtnText">GPS Off</span>
        </button>

        <a href="edit-profile.html#location" class="action-btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
          </svg>
          <span>Edit Profile</span>
        </a>
      </div>

      <div class="meta-row">
        <div id="smallLocationText">Location: -</div>
        <div id="smallCountText"><strong>People:</strong> 0</div>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link active" data-nearby-tab="people">People</a>
        <a href="nearby-events.html" class="tab-link" data-nearby-tab="events">Events</a>
        <a href="nearby-places.html" class="tab-link" data-nearby-tab="places">Places</a>
        <a href="nearby-communities.html" class="tab-link" data-nearby-tab="communities">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search name, username, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button" aria-label="Clear search">Ã</button>
      </div>

      <div class="filter-row">
        <span id="searchChip" class="filter-chip">Search: off</span>
        <span id="gpsChip" class="filter-chip yellow">GPS: off</span>
        <span id="scopeChip" class="filter-chip purple">Scope: city</span>
      </div>

      <div id="listLoading" class="loading-box">Loading people...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No people found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span id="inboxBadge" class="nav-badge">0</span>
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const smallLocationText = document.getElementById("smallLocationText");
    const smallCountText = document.getElementById("smallCountText");
    const inboxBadge = document.getElementById("inboxBadge");
    const modePill = document.getElementById("modePill");
    const gpsBtn = document.getElementById("gpsBtn");
    const gpsBtnText = document.getElementById("gpsBtnText");
    const pageStatus = document.getElementById("pageStatus");
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const searchChip = document.getElementById("searchChip");
    const gpsChip = document.getElementById("gpsChip");
    const scopeChip = document.getElementById("scopeChip");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let browserCoords = null;
    let gpsEnabled = false;
    let peopleData = [];
    let liveChannels = [];
    let refreshTimer = null;
    let badgeRefreshTimer = null;

    const ICONS = {
      verified: `
        <span class="verified-badge" title="Verified">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      `
    };

    function nowIso() {
      return new Date().toISOString();
    }

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();

      if (

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return fallback;
    }

    function getCreatedMs(value) {
      if (!value) return 0;

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeLocationVisibility(value) {
      const v = normalizeText(value);

      if (v === "gps") return "approximate";
      if (v === "hidden") return "hidden";
      if (v === "approximate") return "approximate";

      return "city";
    }

    function normalizeNearbyMode(rawMode, rawLocationVisibility) {
      const mode = normalizeText(rawMode);
      const visibility = normalizeLocationVisibility(rawLocationVisibility);

      if (["city", "gps", "everywhere"].includes(mode)) return mode;
      if (visibility === "approximate") return "gps";

      return "city";
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || d.current_city || d.currentCity || "");
      const province = titleText(d.province || d.state || d.region || d.location_province || d.locationProvince || d.current_province || d.currentProvince || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || d.current_country || d.currentCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";

      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km`;
      return `${Math.round(distanceKm)} km`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      const locationVisibilityRaw = getField(d, ["location_visibility", "locationVisibility"]);
      const nearbyModeRaw = getField(d, ["nearby_discovery_mode", "nearbyDiscoveryMode", "nearby_mode", "nearbyMode"]);

      const city = getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]);
      const province = getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]);
      const country = getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]);

      const blockedUsers = Array.isArray(d.blocked_users)
        ? d.blocked_users
        : Array.isArray(d.blockedUsers)
        ? d.blockedUsers
        : [];

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "avatar_url", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        gender: getField(d, ["gender_custom", "genderCustom", "gender"]),
        keywords: getField(d, ["keywords", "interests", "tags", "search_keywords", "searchKeywords"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: normalizeText(getField(d, ["moderation_status", "moderationStatus", "status"])),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin ?? d.hidden_by_admin ?? d.hiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted ?? d.deactivated),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        nearbyDiscoveryMode: normalizeNearbyMode(nearbyModeRaw, locationVisibilityRaw),
        locationVisibility: normalizeLocationVisibility(locationVisibilityRaw),
        city,
        province,
        country,
        locationSearch: buildLocationSearch(d),
        blockedUsers,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function isMessageUnread(msg) {
      if (!msg || msg.senderId === currentUser.id) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    function isSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();
      return (
        msg.includes("schema cache") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        msg.includes("does not exist") ||
        msg.includes("relation")
      );
    }

    async function safeSelect(table, buildQuery) {
      try {
        let q = supabase.from(table).select("*");
        q = buildQuery ? buildQuery(q) : q;

        const { data, error } = await q;

        if (error) {
          if (!isSchemaError(error)) console.warn(`Skipped ${table}:`, error.message || error);
          return [];
        }

        return data || [];
      } catch (err) {
        console.warn(`Skipped ${table}:`, err?.message || err);
        return [];
      }
    }

    async function countPendingMessageRequests(uid) {
      const map = new Map();

      const targetColumns = [
        "target_id",
        "to_user_id",
        "receiver_id",
        "recipient_id",
        "targetId",
        "toUserId",
        "receiverId",
        "recipientId"
      ];

      for (const col of targetColumns) {
        const rows = await safeSelect("message_requests", q => q.eq(col, uid));

        rows.forEach(row => {
          const id = row.id || `${col}-${Math.random()}`;
          const status = normalizeText(getField(row, ["status", "request_status", "requestStatus"]) || "pending");

          if (status === "pending") {
            map.set(id, row);
          }
        });
      }

      return map.size;
    }

    async function fetchChatThreadsForUser(uid) {
      const map = new Map();

      const attempts = [
        { a: "participant_a", b: "participant_b" },
        { a: "participantA", b: "participantB" }
      ];

      for (const fields of attempts) {
        const rows = await safeSelect("chat_threads", q =>
          q.or(`${fields.a}.eq.${uid},${fields.b}.eq.${uid}`)
        );

        rows.forEach(row => {
          const status = normalizeText(getField(row, ["status"]) || "accepted");
          if (row.id && status === "accepted") map.set(row.id, row);
        });
      }

      return Array.from(map.values());
    }

    async function fetchMessagesForThreads(threadIds) {
      if (!threadIds.length) return [];

      const rowsA = await safeSelect("chat_messages", q =>
        q.in("thread_id", threadIds).order("created_at", { ascending: true })
      );

      if (rowsA.length) return rowsA.map(row => normalizeMessage(row, row.id));

      const rowsB = await safeSelect("chat_messages", q =>
        q.in("threadId", threadIds).order("createdAt", { ascending: true })
      );

      return rowsB.map(row => normalizeMessage(row, row.id));
    }

    async function countUnreadChatMessages(uid) {
      try {
        const threads = await fetchChatThreadsForUser(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);

        if (!threadIds.length) return 0;

        const messages = await fetchMessagesForThreads(threadIds);
        const byThread = new Map();

        messages.forEach(msg => {
          if (!msg.threadId) return;
          if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
          byThread.get(msg.threadId).push(msg);
        });

        let total = 0;

        threads.forEach(thread => {
          const list = byThread.get(thread.id) || [];
          if (!list.length) return;

          const newest = [...list].sort((a, b) => getCreatedMs(b.createdAt) - getCreatedMs(a.createdAt))[0];

          if (newest?.senderId === uid) return;

          const lastOutgoingMs = list
            .filter(msg => msg.senderId === uid)
            .reduce((max, msg) => Math.max(max, getCreatedMs(msg.createdAt)), 0);

          const unreadInThread = list.filter(msg => {
            if (msg.senderId === uid) return false;
            if (getCreatedMs(msg.createdAt) <= lastOutgoingMs) return false;
            return isMessageUnread(msg);
          }).length;

          total += unreadInThread;
        });

        return total;
      } catch (err) {
        console.warn("Unread chat count failed:", err?.message || err);
        return 0;
      }
    }

    function setInboxBadge(count) {

    async function loadInboxBadge() {

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        {
          match: "uid",
          payload: { lat: coords.lat, lng: coords.lng, nearby_discovery_mode: "gps", updated_at: nowIso() }
        },
        {
          match: "id",
          payload: { lat: coords.lat, lng: coords.lng, nearby_discovery_mode: "gps", updated_at: nowIso() }
        },
        {
          match: "user_id",
          payload: { lat: coords.lat, lng: coords.lng, nearby_discovery_mode: "gps", updated_at: nowIso() }
        },
        {
          match: "userId",
          payload: { lat: coords.lat, lng: coords.lng, nearbyDiscoveryMode: "gps", updatedAt: nowIso() }
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function toggleBrowserLocation() {
      if (gpsEnabled) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS turned off. Using saved profile location.", "status-ok");
        renderPeople();
        return;
      }

      await requestBrowserLocation();
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("Browser GPS is not supported on this device.", "status-err");
        renderPeople();
        return;
      }

      gpsBtn.disabled = true;
      setPageStatus("Checking browser GPS...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            setGpsUi(true);

            try {
              await Promise.allSettled([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;
              viewerProfile.nearbyDiscoveryMode = "gps";

              try {
                localStorage.setItem("ownspace_nearby_refresh", String(Date.now()));
              } catch {}

              setPageStatus("GPS enabled. People are sorted by distance.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            setGpsUi(false);
            setPageStatus("Could not use browser GPS. Using saved city/profile location.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      gpsBtn.disabled = false;
      renderPeople();
    }

    function blockedListHas(list, uid) {
      return (list || []).some(item => {
        if (typeof item === "string") return item === uid;

        if (item && typeof item === "object") {
          return item.uid === uid || item.user_id === uid || item.userId === uid || item.id === uid;
        }

        return false;
      });
    }

    function canUseProfile(profile) {
      if (!profile) return false;
      if (!profile.uid) return false;
      if (profile.uid === currentUser.id) return false;
      if (!profile.showInNearby) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin) return false;
      if (["banned", "deleted", "removed"].includes(profile.moderationStatus)) return false;
      if (blockedListHas(viewerBlockedUsers, profile.uid)) return false;
      if (blockedListHas(profile.blockedUsers, currentUser.id)) return false;

      return true;
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country) {
      if (!viewerCity || !city) return false;
      if (viewerCity !== city) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;
      if (viewerProvince && province && viewerProvince !== province) return false;

      return true;
    }

    function flexibleSameProvince(viewerProvince, viewerCountry, province, country) {
      if (!viewerProvince || !province) return false;
      if (viewerProvince !== province) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;

      return true;
    }

    function buildBaseRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return peopleData
        .filter(canUseProfile)
        .map(profile => {
          const city = normalizeText(profile.city);
          const province = normalizeText(profile.province);
          const country = normalizeText(profile.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = flexibleSameProvince(viewerProvince, viewerCountry, province, country);
          const sameCity = flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country);

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            profile.lat !== null &&
            profile.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, profile.lat, profile.lng);
          }

          const searchable = [
            profile.displayName,
            profile.username,
            profile.bio,
            profile.gender,
            profile.keywords,
            profile.city,
            profile.province,
            profile.country,
            provinceAliases(profile.province),
            countryAliases(profile.country),
            profile.locationSearch
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          const placeLabel = [
            titleText(profile.city),
            titleText(profile.province),
            titleText(profile.country)
          ]
            .filter(Boolean)
            .join(", ");

          const distanceLabel = distanceKm !== null ? formatDistance(distanceKm) : "";
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...profile,
            sameCountry,
            sameProvince,
            sameCity,
            distanceKm,
            withinGpsRange,
            searchable,
            placeLabel,
            distanceLabel
          };
        });
    }

    function buildPeopleRows() {
      const q = normalizeText(searchInput.value);
      const mode = gpsEnabled ? "gps" : (viewerProfile?.nearbyDiscoveryMode || "city");

      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      let rows = buildBaseRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (mode === "gps") {
        const hasGps = !!(browserCoords || (viewerProfile?.lat !== null && viewerProfile?.lng !== null));

        if (hasGps) {
          rows = rows.filter(row => row.withinGpsRange || row.sameCity || row.sameProvince);
        } else if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.sameCity || row.sameProvince || row.sameCountry);
        } else {
          rows = [];
        }
      } else if (mode === "everywhere") {
        rows = rows;
      } else {
        if (viewerHasSavedLocation) {
          rows = rows.filter(row => row.sameCity || row.sameProvince || row.sameCountry);
        } else {
          rows = [];
        }
      }

      rows.sort((a, b) => {
        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        if (a.sameCountry && !b.sameCountry) return -1;
        if (b.sameCountry && !a.sameCountry) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        if (a.verified && !b.verified) return -1;
        if (b.verified && !a.verified) return 1;

        return a.displayName.localeCompare(b.displayName);
      });

      return rows;
    }

    function updateFilterChips(rowsCount = 0) {
      const q = normalizeText(searchInput.value);
      const mode = gpsEnabled ? "gps" : (viewerProfile?.nearbyDiscoveryMode || "city");

      searchChip.textContent = q ? `Search: ${q}` : "Search: off";
      scopeChip.textContent = `Scope: ${mode}`;
      smallCountText.innerHTML = `<strong>People:</strong> ${rowsCount}`;
      updateModeUi();
    }

    function renderPeople() {
      openLoading();

      const q = normalizeText(searchInput.value);
      const mode = gpsEnabled ? "gps" : (viewerProfile?.nearbyDiscoveryMode || "city");

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const rows = buildPeopleRows();
      updateFilterChips(rows.length);

      if (!q && mode !== "everywhere" && !viewerHasLocation && !browserCoords) {
        showEmpty("Set your city/province/country in profile, use GPS, or search by city/country/name.");
        return;
      }

      if (!rows.length) {
        if (q) {
          showEmpty("No matching people found. Try another city, province, country, name or keyword.");
        } else if (mode === "gps") {
          showEmpty("No nearby people found in GPS mode. Try searching a city, province, country or name.");
        } else if (mode === "everywhere") {
          showEmpty("No people are visible in Nearby yet.");
        } else {
          showEmpty("No people found near your saved location. Try search or update your profile location.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(row => {
        const avatarHtml = row.photoURL
          ? `<img class="person-avatar" src="${escapeHtml(row.photoURL)}" alt="Profile photo">`
          : `<div class="person-avatar-placeholder">No photo</div>`;

        const locationText = row.placeLabel || "Location not added";
        const distanceText = row.distanceLabel ? `${row.distanceLabel} away` : "";

        const tile = document.createElement("a");
        tile.className = "person-tile";
        tile.href = `member.html?uid=${encodeURIComponent(row.uid)}`;

        tile.innerHTML = `
          <div class="person-card">
            ${avatarHtml}

            <div class="person-body">
              <div class="person-head">
                <div class="person-main">
                  <div class="person-name">
                    <span>${escapeHtml(row.displayName)}</span>
                    ${row.verified ? ICONS.verified : ""}
                  </div>

                  ${row.username ? `<div class="person-username">@${escapeHtml(row.username)}</div>` : ""}
                  <div class="person-meta">${escapeHtml([locationText, distanceText].filter(Boolean).join(" â¢ "))}</div>
                </div>

                ${distanceText ? `<span class="distance-pill">${escapeHtml(row.distanceLabel)}</span>` : ""}
              </div>
            </div>
          </div>
        `;

        const img = tile.querySelector(".person-avatar");

        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
          });
        }

        listWrap.appendChild(tile);
      });

      showList(rows.length);
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
      renderViewerMeta(0);
      updateModeUi();
    }

    async function loadPeople() {
      const [publicRows, userRows] = await Promise.all([
        safeSelect("public_profiles"),
        safeSelect("users")
      ]);

      const byUid = new Map();

      publicRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      userRows.forEach(row => {
        const uid = row.uid || row.id || row.user_id || row.userId || "";
        if (!uid) return;

        byUid.set(uid, {
          ...(byUid.get(uid) || {}),
          ...row,
          uid
        });
      });

      peopleData = Array.from(byUid.values()).map(row =>
        normalizeProfile(row, row.uid || row.id || row.user_id || row.userId)
      );
    }

    async function refreshAll(showStatus = false) {
      openLoading();

      await Promise.allSettled([
        loadViewer(currentUser.id),
        loadPeople(),
        loadInboxBadge()
      ]);

      renderPeople();

      if (showStatus) {
        setPageStatus("Nearby refreshed.", "status-ok");
      }
    }

    function clearLiveListeners() {
      liveChannels.forEach(ch => {
        try {
          supabase.removeChannel(ch);
        } catch {}
      });

      liveChannels = [];
    }

    function scheduleRefresh(delay = 350) {
      clearTimeout(refreshTimer);

      refreshTimer = setTimeout(() => {
        refreshAll(false).catch(err => {
          console.error("Nearby refresh failed:", err);
        });
      }, delay);
    }

    function setupRealtime() {
      clearLiveListeners();

      ["users", "public_profiles", "message_requests", "chat_threads", "chat_messages", "notifications"].forEach(table => {
        try {
          const channel = supabase
            .channel(`ownspace-nearby-people-live-${table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table },
              () => {
                if (table === "users" || table === "public_profiles") scheduleRefresh(300);
                else scheduleInboxBadgeRefresh(180);
              }
            )
            .subscribe();

          liveChannels.push(channel);
        } catch {}
      });
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPeople();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPeople();
    });

    gpsBtn.addEventListener("click", toggleBrowserLocation);

    refreshBtn.addEventListener("click", async () => {
      refreshBtn.disabled = true;
      setPageStatus("Refreshing nearby...", "");

      try {
        await refreshAll(true);
      } catch {
        setPageStatus("Could not refresh nearby.", "status-err");
      }

      refreshBtn.disabled = false;
    });

    window.addEventListener("ownspace:badges-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:inbox-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:chat-read-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:profile-refresh", () => scheduleRefresh(160));
    window.addEventListener("ownspace:nearby-refresh", () => scheduleRefresh(160));

    window.addEventListener("pageshow", () => {
      scheduleRefresh(120);
      scheduleInboxBadgeRefresh(120);
    });

    window.addEventListener("focus", () => {
      scheduleRefresh(180);
      scheduleInboxBadgeRefresh(180);
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        scheduleRefresh(160);
        scheduleInboxBadgeRefresh(160);
      }
    });

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearLiveListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        try {
          localStorage.setItem("ownspace_nearby_last_tab", "people");
        } catch {}

        setGpsUi(false);
        await refreshAll(false);
        setupRealtime();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearLiveListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load people.");
      }
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(refreshTimer);
      clearTimeout(badgeRefreshTimer);
      clearLiveListeners();
    });

    initPage();

    /*
      OWNSPACE NEARBY PEOPLE COMPACT UPDATE:

      UI:
      - Compact premium style matching Settings/Edit Profile.
      - Removed duplicate top GPS button. Topbar now has Back + Refresh.
      - Fixed broken characters: clear button is Ã and row separator is â¢.
      - Bottom nav compact style.
      - People tiles stay simple: photo, name, username, location, distance.

      NEARBY LOGIC:
      - Search works across name, username, bio, city, province/state, country and keywords.
      - When search text exists, only matching keyword results show.
      - City Mode uses same city/province/country fallback.
      - GPS Mode sorts by distance and includes nearby/same-region people.
      - Everywhere mode shows all visible Nearby profiles.
      - Hidden, deleted, banned, blocked users are not shown.
      - Supports current_city/current_province/current_country fallback columns too.

      BADGE LOGIC:
      - Inbox badge counts only pending message_requests + unread incoming chat_messages.
      - General notifications do not trigger the Inbox red dot.
      - Refreshes on realtime changes and localStorage refresh events.
    */
  </script>
</body>
