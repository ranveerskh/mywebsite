<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby People</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }
    .top-icon-btn svg{
      width:18px;
      height:18px;
      display:block;
    }
    .top-center{text-align:center;min-width:0}
    .brand{
      font-size:18px;
      font-weight:800;
      line-height:1.05;
    }
    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:13px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:38px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      border-color:rgba(61,220,132,.20);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      border-color:rgba(167,139,250,.20);
    }
    .btn-yellow{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }
    .btn-red{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.20);
    }

    .status-text{
      min-height:18px;
      font-size:13px;
      margin-top:8px;
    }
    .status-ok{color:#86efac}
    .status-err{color:#fda4af}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 8px;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:13px;
      font-weight:800;
    }
    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }
    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    .search-box::placeholder{color:var(--muted)}
    .clear-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:30px;
      height:30px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .person-card{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .person-avatar,.person-avatar-placeholder{
      width:52px;
      height:52px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }
    .person-avatar{object-fit:cover}
    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .person-body{
      min-width:0;
      flex:1;
    }
    .person-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
    }
    .person-main{
      min-width:0;
      flex:1;
    }
    .person-name{
      font-size:15px;
      font-weight:800;
      line-height:1.25;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }
    .person-name a{
      color:var(--text);
      text-decoration:none;
    }
    .person-name a:hover{text-decoration:underline}
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }
    .person-username{
      font-size:12px;
      color:var(--blue);
      font-weight:700;
      margin-top:2px;
      word-break:break-word;
    }
    .person-meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      flex-shrink:0;
    }
    .pill-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .pill-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .pill-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .pill-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }
    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .tab-link{font-size:12px;padding:10px 4px}
      .person-meta{white-space:normal;overflow:visible;text-overflow:clip}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="useBrowserLocationBtn" class="top-icon-btn" type="button" aria-label="Use browser GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby people</div>
      </div>

      <a href="edit-profile.html#location" class="top-icon-btn" aria-label="Location settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="chip-row">
        <span id="locationChip" class="chip chip-blue">Location: -</span>
        <span id="modeChip" class="chip chip-purple">Mode: -</span>
        <span id="browserChip" class="chip chip-yellow">Browser GPS off</span>
        <span id="countChip" class="chip chip-green">People: 0</span>
      </div>

      <div class="top-actions">
        <a href="edit-profile.html#location" class="action-btn btn-primary">Location Settings</a>
        <button id="gpsBtn2" class="action-btn btn-green" type="button">Use GPS</button>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link active">People</a>
        <a href="nearby-events.html" class="tab-link">Events</a>
        <a href="nearby-places.html" class="tab-link">Places</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search people, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">✕</button>
      </div>

      <div id="listLoading" class="loading-box">Loading nearby people...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No nearby people found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5"></path>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const locationChip = document.getElementById("locationChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");
    const countChip = document.getElementById("countChip");
    const inboxBadge = document.getElementById("inboxBadge");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const gpsBtn2 = document.getElementById("gpsBtn2");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let browserCoords = null;

    let peopleData = [];
    let followMap = new Map();
    let requestMap = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";
      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain");
      if (c === "canada") aliases.push("ca");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || d.current_city || d.currentCity || "");
      const province = titleText(d.province || d.state || d.region || d.location_province || d.locationProvince || d.current_province || d.currentProvince || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || d.current_country || d.currentCountry || "");
      const pieces = [
        existing,
        city,
        province,
        country,
        countryAliases(country)
      ].filter(Boolean);

      return pieces.join(" ").trim().toLowerCase();
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName"]),
        photoURL: getField(d, ["photo_url", "photoURL", "avatar", "avatarUrl", "user_photo_url", "userPhotoURL"]),
        bio: getField(d, ["bio", "about", "description"]),
        isPrivate: !!(d.is_private ?? d.isPrivate ?? d.privateProfile ?? d.private ?? d.accountPrivate),
        verified: !!(d.is_verified ?? d.verified ?? d.isVerified),
        moderationStatus: getField(d, ["moderation_status", "moderationStatus", "status"]),
        isHiddenByAdmin: !!(d.is_hidden_by_admin ?? d.isHiddenByAdmin),
        softDeleted: !!(d.soft_deleted ?? d.softDeleted),
        showInNearby: (d.show_in_nearby ?? d.showInNearby) !== false,
        locationVisibility: getField(d, ["location_visibility", "locationVisibility", "nearby_mode", "nearbyMode"]) || "city",
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        locationSearch: buildLocationSearch(d),
        blockedUsers: Array.isArray(d.blocked_users)
          ? d.blocked_users
          : Array.isArray(d.blockedUsers)
          ? d.blockedUsers
          : [],
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function renderViewerLocation() {
      if (!viewerProfile) return;

      const city = titleText(viewerProfile.city);
      const province = titleText(viewerProfile.province);
      const country = titleText(viewerProfile.country);

      const parts = [city, province, country].filter(Boolean);
      locationChip.textContent = `Location: ${parts.length ? parts.join(", ") : "Not set"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "city"}`;
      countChip.textContent = "People: 0";

      if (!browserCoords) {
        browserChip.textContent = "Browser GPS off";
        browserChip.className = "chip chip-yellow";
      }
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const { data, error } = await supabase
          .from("notifications")
          .select("id")
          .eq("to_user_id", currentUser.id)
          .eq("is_read", false);

        if (error) throw error;

        const count = (data || []).length;
        if (!count) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = count > 99 ? "99+" : String(count);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "Browser GPS unsupported";
        browserChip.className = "chip chip-red";
        renderPeople();
        return;
      }

      browserChip.textContent = "Checking browser GPS...";
      browserChip.className = "chip chip-yellow";

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            browserChip.textContent = "Browser GPS on";
            browserChip.className = "chip chip-green";

            try {
              await supabase
                .from("users")
                .update({
                  lat: browserCoords.lat,
                  lng: browserCoords.lng
                })
                .eq("uid", currentUser.id);

              await supabase
                .from("public_profiles")
                .update({
                  lat: browserCoords.lat,
                  lng: browserCoords.lng
                })
                .eq("uid", currentUser.id);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;
              renderViewerLocation();
              setPageStatus("Browser GPS enabled for better distance sorting.", "status-ok");
            } catch (err) {
              console.error(err);
            }

            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "Browser GPS off";
            browserChip.className = "chip chip-yellow";
            setPageStatus("Could not use browser GPS. Using saved location instead.", "status-err");
            resolve();
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
        );
      });

      renderPeople();
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
      countChip.textContent = "People: 0";
    }

    function showList(count) {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
      countChip.textContent = `People: ${count}`;
    }

    function canUseProfile(profile) {
      if (!profile) return false;
      if (profile.uid === currentUser.id) return false;
      if (!profile.showInNearby) return false;
      if (profile.softDeleted || profile.isHiddenByAdmin || profile.moderationStatus === "banned") return false;
      if (viewerBlockedUsers.includes(profile.uid)) return false;
      return true;
    }

    function findRelation(profileUid) {
      if (followMap.has(profileUid)) return "following";
      if (requestMap.has(profileUid)) return "requested";

      const profile = peopleData.find(p => p.uid === profileUid);
      if (profile?.isPrivate) return "request";
      return "follow";
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function buildNearbyRows() {
      const q = normalizeText(searchInput.value);
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerHasSavedLocation = !!viewerCity && !!viewerProvince && !!viewerCountry;
      const viewerCoords = getViewerCoords();

      return peopleData
        .filter(canUseProfile)
        .map(profile => {
          const city = normalizeText(profile.city);
          const province = normalizeText(profile.province);
          const country = normalizeText(profile.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = sameCountry && !!viewerProvince && !!province && viewerProvince === province;
          const sameCity = sameProvince && !!viewerCity && !!city && viewerCity === city;

          let distanceKm = null;
          if (viewerCoords.lat !== null && viewerCoords.lng !== null && profile.lat !== null && profile.lng !== null) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, profile.lat, profile.lng);
          }

          const withinGpsRange = distanceKm !== null && distanceKm <= 100;
          const matchesNearby = (viewerHasSavedLocation && sameCity) || withinGpsRange;
          const relation = findRelation(profile.uid);

          const searchable = [
            profile.displayName,
            profile.username,
            profile.bio,
            profile.locationSearch
          ].filter(Boolean).join(" ").toLowerCase();

          const placeLabel = [titleText(profile.city), titleText(profile.province), titleText(profile.country)]
            .filter(Boolean)
            .join(", ");

          const distanceLabel = distanceKm !== null ? formatDistance(distanceKm) : "";

          return {
            ...profile,
            sameCity,
            distanceKm,
            withinGpsRange,
            matchesNearby,
            relation,
            searchable,
            placeLabel,
            distanceLabel
          };
        })
        .filter(row => row.matchesNearby)
        .filter(row => !q || row.searchable.includes(q))
        .sort((a, b) => {
          if (a.sameCity && !b.sameCity) return -1;
          if (b.sameCity && !a.sameCity) return 1;

          const aHasDistance = a.distanceKm !== null;
          const bHasDistance = b.distanceKm !== null;
          if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
          if (aHasDistance && !bHasDistance) return -1;
          if (bHasDistance && !aHasDistance) return 1;

          if (followMap.has(a.uid) && !followMap.has(b.uid)) return -1;
          if (followMap.has(b.uid) && !followMap.has(a.uid)) return 1;

          if (a.verified && !b.verified) return -1;
          if (b.verified && !a.verified) return 1;

          return a.displayName.localeCompare(b.displayName);
        });
    }

    function buildRelationButton(row) {
      if (row.relation === "following") {
        return `<button class="action-btn btn-red relation-btn" data-action="unfollow" data-uid="${escapeHtml(row.uid)}" type="button">Unfollow</button>`;
      }
      if (row.relation === "requested") {
        return `<button class="action-btn btn-yellow relation-btn" data-action="cancel" data-uid="${escapeHtml(row.uid)}" type="button">Requested</button>`;
      }
      if (row.relation === "request") {
        return `<button class="action-btn btn-purple relation-btn" data-action="request" data-uid="${escapeHtml(row.uid)}" type="button">Request</button>`;
      }
      return `<button class="action-btn btn-green relation-btn" data-action="follow" data-uid="${escapeHtml(row.uid)}" type="button">Follow</button>`;
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;
      try {
        await supabase.from("notifications").insert(payload);
      } catch {}
    }

    async function followPerson(row) {
      const { error } = await supabase.from("follows").insert({
        follower_id: currentUser.id,
        following_id: row.uid,
        created_at: nowIso()
      });

      if (error) throw error;

      await createNotificationSafe(row.uid, {
        type: "follow",
        title: "New follower",
        text: `${viewerProfile?.displayName || currentUser.email || "Someone"} started following you.`,
        from_user_id: currentUser.id,
        to_user_id: row.uid,
        created_at: nowIso(),
        is_read: false
      });
    }

    async function unfollowPerson(row) {
      const rowId = followMap.get(row.uid);

      if (rowId) {
        const { error } = await supabase.from("follows").delete().eq("id", rowId);
        if (error) throw error;
        return;
      }

      const { error } = await supabase
        .from("follows")
        .delete()
        .eq("follower_id", currentUser.id)
        .eq("following_id", row.uid);

      if (error) throw error;
    }

    async function requestFollow(row) {
      const { error } = await supabase.from("follow_requests").insert({
        requester_id: currentUser.id,
        target_id: row.uid,
        status: "pending",
        created_at: nowIso()
      });

      if (error) throw error;

      await createNotificationSafe(row.uid, {
        type: "follow_request",
        title: "Follow request",
        text: `${viewerProfile?.displayName || currentUser.email || "Someone"} sent you a follow request.`,
        from_user_id: currentUser.id,
        to_user_id: row.uid,
        created_at: nowIso(),
        is_read: false
      });
    }

    async function cancelRequest(row) {
      const rowId = requestMap.get(row.uid);

      if (rowId) {
        const { error } = await supabase.from("follow_requests").delete().eq("id", rowId);
        if (error) throw error;
        return;
      }

      const { error } = await supabase
        .from("follow_requests")
        .delete()
        .eq("requester_id", currentUser.id)
        .eq("target_id", row.uid);

      if (error) throw error;
    }

    function renderPeople() {
      openLoading();

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) &&
        !!normalizeText(viewerProfile?.province) &&
        !!normalizeText(viewerProfile?.country);

      const rows = buildNearbyRows();

      if (!viewerHasLocation && !browserCoords) {
        showEmpty("Set your location in profile or use GPS to see nearby people.");
        return;
      }

      if (!rows.length) {
        showEmpty("No nearby people found for your current location.");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(row => {
        const avatarHtml = row.photoURL
          ? `<img class="person-avatar" src="${escapeHtml(row.photoURL)}" alt="Profile photo">`
          : `<div class="person-avatar-placeholder">No photo</div>`;

        const metaParts = [];
        if (row.placeLabel) metaParts.push(row.placeLabel);
        if (row.distanceLabel) metaParts.push(row.distanceLabel);
        else if (row.sameCity) metaParts.push("Same city");

        let topPill = "";
        if (followMap.has(row.uid)) topPill = `<span class="small-pill pill-blue">Following</span>`;
        else if (row.verified) topPill = `<span class="small-pill pill-green">Verified</span>`;
        else if (row.isPrivate) topPill = `<span class="small-pill pill-yellow">Private</span>`;
        else if (row.distanceLabel) topPill = `<span class="small-pill pill-purple">${escapeHtml(row.distanceLabel)}</span>`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="person-card">
            ${avatarHtml}
            <div class="person-body">
              <div class="person-head">
                <div class="person-main">
                  <div class="person-name">
                    <a href="member.html?uid=${encodeURIComponent(row.uid)}">${escapeHtml(row.displayName)}</a>
                    ${row.verified ? `<span class="verified-dot">✓</span>` : ""}
                  </div>
                  ${row.username ? `<div class="person-username">@${escapeHtml(row.username)}</div>` : ""}
                  <div class="person-meta">${escapeHtml(metaParts.join(" • ") || "Nearby member")}</div>
                </div>
                ${topPill}
              </div>

              <div class="card-actions">
                <a href="member.html?uid=${encodeURIComponent(row.uid)}" class="action-btn btn-primary">Open</a>
                ${buildRelationButton(row)}
              </div>
            </div>
          </div>
        `;

        const img = card.querySelector(".person-avatar");
        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
          });
        }

        listWrap.appendChild(card);
      });

      listWrap.querySelectorAll(".relation-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const uid = btn.getAttribute("data-uid");
          const action = btn.getAttribute("data-action");
          const row = rows.find(r => r.uid === uid);
          if (!row) return;

          btn.disabled = true;
          setPageStatus("");

          try {
            if (action === "follow") await followPerson(row);
            else if (action === "unfollow") await unfollowPerson(row);
            else if (action === "request") await requestFollow(row);
            else if (action === "cancel") await cancelRequest(row);

            await loadRelations();
            renderPeople();

            const messages = {
              follow: "Now following member.",
              unfollow: "Unfollowed member.",
              request: "Follow request sent.",
              cancel: "Follow request cancelled."
            };
            setPageStatus(messages[action] || "Updated.", "status-ok");
          } catch (err) {
            console.error(err);
            setPageStatus("Could not update follow state.", "status-err");
            btn.disabled = false;
          }
        });
      });

      showList(rows.length);
    }

    async function loadViewer(uid) {
      const [userRes, publicRes] = await Promise.all([
        supabase.from("users").select("*").eq("uid", uid).maybeSingle(),
        supabase.from("public_profiles").select("*").eq("uid", uid).maybeSingle()
      ]);

      if (userRes.error) throw userRes.error;
      if (publicRes.error) throw publicRes.error;

      viewerProfile = normalizeProfile({
        ...(publicRes.data || {}),
        ...(userRes.data || {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
      renderViewerLocation();
    }

    async function loadPeople() {
      const { data, error } = await supabase.from("public_profiles").select("*");
      if (error) throw error;
      peopleData = (data || []).map(row => normalizeProfile(row, row.uid));
    }

    async function loadRelations() {
      followMap = new Map();
      requestMap = new Map();

      const [followsRes, requestsRes] = await Promise.all([
        supabase.from("follows").select("*").eq("follower_id", currentUser.id),
        supabase.from("follow_requests").select("*").eq("requester_id", currentUser.id).eq("status", "pending")
      ]);

      if (followsRes.error) throw followsRes.error;
      if (requestsRes.error) throw requestsRes.error;

      (followsRes.data || []).forEach(row => {
        if (row.following_id) {
          followMap.set(row.following_id, row.id);
        }
      });

      (requestsRes.data || []).forEach(row => {
        if (row.target_id) {
          requestMap.set(row.target_id, row.id);
        }
      });
    }

    async function refreshAll() {
      openLoading();
      await Promise.all([
        loadPeople(),
        loadRelations(),
        loadInboxBadge()
      ]);
      renderViewerLocation();
      renderPeople();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderPeople();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderPeople();
    });

    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    gpsBtn2.addEventListener("click", requestBrowserLocation);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load nearby people.");
      }
    }

    initPage();
  </script>
</body>
