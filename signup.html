<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Sign Up</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:540px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:26px;
      padding:30px;
      backdrop-filter:blur(12px);
      box-shadow:0 20px 40px rgba(0,0,0,0.25);
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(34,197,94,0.14);
      border:1px solid rgba(34,197,94,0.25);
      color:#bbf7d0;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
    }

    h1{
      font-size:34px;
      margin-bottom:10px;
    }

    .sub{
      color:#cbd5e1;
      line-height:1.7;
      font-size:14px;
      margin-bottom:22px;
    }

    .field{
      margin-bottom:15px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    input, select, textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);
      color:#fff;
      outline:none;
      font-size:15px;
    }

    input::placeholder,
    textarea::placeholder{
      color:#94a3b8;
    }

    select option{
      color:#000;
    }

    .check-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
    }

    .check-row input{
      width:auto;
      margin-top:3px;
      transform:scale(1.1);
    }

    .check-row label{
      margin:0;
      font-size:14px;
      line-height:1.5;
      color:#e2e8f0;
    }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .message{
      min-height:20px;
      font-size:14px;
    }

    .success{ color:#86efac; }
    .error{ color:#fda4af; }

    .btn{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      cursor:pointer;
      font-weight:700;
      font-size:15px;
    }

    .btn-primary{
      background:#22c55e;
      color:#052e16;
      min-width:170px;
    }

    .bottom{
      text-align:center;
      margin-top:20px;
      color:#cbd5e1;
      font-size:14px;
    }

    .bottom a{
      color:#7dd3fc;
      text-decoration:none;
      font-weight:700;
    }

    .note{
      margin-top:14px;
      color:#94a3b8;
      font-size:12px;
      line-height:1.6;
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }

      .actions{
        align-items:stretch;
      }

      .btn-primary{
        width:100%;
      }

      .card{
        padding:22px;
      }

      h1{
        font-size:30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">Create your account</div>
      <h1>Join BareWorld</h1>
      <div class="sub">
        Create your member profile. Your real name stays private and is used only for account/admin purposes.
      </div>

      <form id="signupForm">
        <div class="field">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" placeholder="Public profile name" required />
        </div>

        <div class="field">
          <label for="realName">Real Name</label>
          <input type="text" id="realName" placeholder="Private real name" required />
        </div>

        <div class="grid">
          <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Your city" />
          </div>

          <div class="field">
            <label for="profileType">Profile Type</label>
            <select id="profileType" required>
              <option value="public">Public</option>
              <option value="private">Private</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required />
        </div>

        <div class="check-row">
          <input type="checkbox" id="cityVisible" />
          <label for="cityVisible">Show my city on my profile</label>
        </div>

        <div class="check-row">
          <input type="checkbox" id="isAdult" required />
          <label for="isAdult">I confirm that I am 18+</label>
        </div>

        <div class="actions">
          <div id="message" class="message"></div>
          <button type="submit" id="signupBtn" class="btn btn-primary">Create Account</button>
        </div>
      </form>

      <div class="bottom">
        Already have an account? <a href="login.html">Login</a>
      </div>

      <div class="note">
        Public profile data is stored separately from private account data for safety.
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      createUserWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const signupForm = document.getElementById("signupForm");
    const signupBtn = document.getElementById("signupBtn");
    const message = document.getElementById("message");

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "feed.html";
      }
    });

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const displayName = document.getElementById("displayName").value.trim();
      const realName = document.getElementById("realName").value.trim();
      const city = document.getElementById("city").value.trim();
      const profileType = document.getElementById("profileType").value;
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const cityVisible = document.getElementById("cityVisible").checked;
      const isAdult = document.getElementById("isAdult").checked;

      if (!displayName || !realName || !email || !password) {
        setMessage("Please fill all required fields.", "error");
        return;
      }

      if (!isAdult) {
        setMessage("18+ confirmation is required.", "error");
        return;
      }

      if (password.length < 6) {
        setMessage("Password must be at least 6 characters.", "error");
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "Creating...";

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        await updateProfile(user, { displayName });

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          displayName,
          realName,
          email,
          city,
          cityVisible,
          isPrivate: profileType === "private",
          isVerified: false,
          isAdult: true,
          bio: "",
          photoURL: "",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        await setDoc(doc(db, "publicProfiles", user.uid), {
          uid: user.uid,
          displayName,
          city,
          cityVisible,
          isPrivate: profileType === "private",
          isVerified: false,
          bio: "",
          photoURL: "",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        setMessage("Account created successfully. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "feed.html";
        }, 900);

      } catch (error) {
        console.error(error);

        let msg = "Could not create account.";

        if (error.code === "auth/email-already-in-use") {
          msg = "This email is already in use.";
        } else if (error.code === "auth/invalid-email") {
          msg = "Invalid email address.";
        } else if (error.code === "auth/weak-password") {
          msg = "Password is too weak.";
        }

        setMessage(msg, "error");
        signupBtn.disabled = false;
        signupBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
