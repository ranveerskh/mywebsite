<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
</head>
<body>
  <h1>Sign Up</h1>

  <form id="signupForm">
    <input type="text" id="displayName" placeholder="Display Name" required /><br><br>
    <input type="text" id="realName" placeholder="Real Name" required /><br><br>
    <input type="text" id="city" placeholder="City" /><br><br>
    <input type="email" id="email" placeholder="Email" required /><br><br>
    <input type="password" id="password" placeholder="Password" required /><br><br>

    <label>
      <input type="checkbox" id="cityVisible" />
      Show my city
    </label>
    <br><br>

    <label>
      <input type="checkbox" id="isPrivate" />
      Private profile
    </label>
    <br><br>

    <label>
      <input type="checkbox" id="isAdult" required />
      I am 18+
    </label>
    <br><br>

    <button type="submit">Create Account</button>
  </form>

  <p id="msg"></p>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const displayName = document.getElementById("displayName").value.trim();
      const realName = document.getElementById("realName").value.trim();
      const city = document.getElementById("city").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const cityVisible = document.getElementById("cityVisible").checked;
      const isPrivate = document.getElementById("isPrivate").checked;
      const isAdult = document.getElementById("isAdult").checked;

      if (!isAdult) {
        msg.textContent = "18+ confirmation required";
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        await updateProfile(user, { displayName });

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          displayName,
          realName,
          email,
          city,
          cityVisible,
          isPrivate,
          isVerified: false,
          isAdult: true,
          createdAt: serverTimestamp()
        });

        msg.textContent = "Signup successful";
        window.location.href = "login.html";
      } catch (err) {
        msg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
