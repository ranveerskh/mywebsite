<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - School</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 110px;
    }
    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:20px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }
    .hero-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .btn-soft{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }

    .search-wrap{
      position:relative;
      margin-bottom:12px;
    }
    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:14px 48px 14px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    .search-box::placeholder{color:var(--muted)}
    .clear-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
    }

    .category-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .category-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .category-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .list{
      display:grid;
      gap:12px;
    }
    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .cover{
      width:100%;
      max-height:260px;
      object-fit:cover;
      display:block;
      border-radius:16px;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:12px;
    }
    .card-title{
      font-size:17px;
      font-weight:800;
      line-height:1.4;
      margin-bottom:8px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .summary{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }
    .body{
      color:var(--text);
      line-height:1.65;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      padding-top:12px;
      margin-top:12px;
      border-top:1px solid var(--line-soft);
    }
    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .loading-box{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .empty-box{
      text-align:center;
      padding:22px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{
      font-size:18px;
      line-height:1;
      display:block;
    }

    @media (max-width:700px){
      body{padding:10px 10px 110px}
      .brand{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="feed.html" class="top-icon-btn" aria-label="Back to feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">School</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn" type="button" aria-label="Refresh school">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-title">School</div>
      <div class="hero-sub">
        Learning space for guides, lessons, tips and explanations. You can update content later from your admin side.
      </div>

      <div class="chip-row">
        <span class="chip chip-blue" id="lessonCountChip">Lessons: -</span>
        <span class="chip chip-purple" id="categoryCountChip">Categories: -</span>
        <span class="chip chip-green" id="statusChip">Ready</span>
      </div>

      <div class="action-row">
        <button id="refreshHeroBtn" class="action-btn btn-primary" type="button">Refresh</button>
        <a href="feed.html" class="action-btn btn-soft">Back to Feed</a>
        <a href="settings.html" class="action-btn btn-purple">Settings</a>
      </div>
    </div>

    <div class="panel">
      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search lessons..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">✕</button>
      </div>

      <div id="categoryRow" class="category-row"></div>

      <div id="listLoading" class="loading-box">Loading school content...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No school lessons yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDocs,
      collection
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const lessonCountChip = document.getElementById("lessonCountChip");
    const categoryCountChip = document.getElementById("categoryCountChip");
    const statusChip = document.getElementById("statusChip");

    const refreshBtn = document.getElementById("refreshBtn");
    const refreshHeroBtn = document.getElementById("refreshHeroBtn");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const categoryRow = document.getElementById("categoryRow");

    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let currentCategory = "all";
    let lessonsData = [];

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (getStoredTheme() === "system") applyTheme("system");
    });

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function getCreatedMs(obj) {
      const value = obj?.createdAt || obj?.timestamp || null;
      if (!value) return 0;
      if (value?.toDate) return value.toDate().getTime();
      const ms = new Date(value).getTime();
      return Number.isNaN(ms) ? 0 : ms;
    }

    function normalizeLesson(raw, fallbackId = "", sourceName = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        source: sourceName,
        title: d.title || d.name || "Untitled Lesson",
        summary: d.summary || d.description || d.subtitle || "",
        body: d.body || d.content || d.text || "",
        imageURL: d.imageURL || d.imageUrl || d.photoURL || d.mediaUrl || "",
        category: (d.category || d.topic || "General").trim(),
        externalURL: d.externalURL || d.url || d.link || "",
        published: d.published !== false,
        hidden: !!d.hidden || !!d.hiddenByAdmin || !!d.softDeleted,
        createdAtMs: getCreatedMs(d),
        order: Number.isFinite(Number(d.order)) ? Number(d.order) : null
      };
    }

    function updateCounts() {
      const visibleLessons = lessonsData.filter(item => item.published && !item.hidden);
      const categories = [...new Set(visibleLessons.map(item => item.category).filter(Boolean))];

      lessonCountChip.textContent = `Lessons: ${visibleLessons.length}`;
      categoryCountChip.textContent = `Categories: ${categories.length}`;
      statusChip.textContent = visibleLessons.length ? "Live" : "Ready";
      statusChip.className = `chip ${visibleLessons.length ? "chip-green" : "chip-yellow"}`;
    }

    function updateClearButton() {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function renderCategories() {
      const visibleLessons = lessonsData.filter(item => item.published && !item.hidden);
      const categories = [...new Set(visibleLessons.map(item => item.category).filter(Boolean))].sort((a, b) => a.localeCompare(b));

      const allButtons = [
        { key: "all", label: "All" },
        ...categories.map(cat => ({ key: cat, label: cat }))
      ];

      categoryRow.innerHTML = "";

      allButtons.forEach(item => {
        const btn = document.createElement("button");
        btn.className = `category-btn ${currentCategory === item.key ? "active" : ""}`;
        btn.type = "button";
        btn.textContent = item.label;
        btn.addEventListener("click", () => {
          currentCategory = item.key;
          renderCategories();
          renderLessons();
        });
        categoryRow.appendChild(btn);
      });
    }

    function getFilteredLessons() {
      const q = searchInput.value.trim().toLowerCase();

      return lessonsData
        .filter(item => item.published && !item.hidden)
        .filter(item => currentCategory === "all" || item.category === currentCategory)
        .filter(item => {
          if (!q) return true;
          const joined = [
            item.title,
            item.summary,
            item.body,
            item.category
          ].filter(Boolean).join(" ").toLowerCase();
          return joined.includes(q);
        })
        .sort((a, b) => {
          if (a.order !== null && b.order !== null) return a.order - b.order;
          if (a.order !== null) return -1;
          if (b.order !== null) return 1;
          return b.createdAtMs - a.createdAtMs || a.title.localeCompare(b.title);
        });
    }

    function renderLessons() {
      openLoading();

      requestAnimationFrame(() => {
        const rows = getFilteredLessons();

        if (!rows.length) {
          const emptyText = lessonsData.length
            ? "No lessons match your search."
            : "School page is ready. Add lessons later from your admin side.";
          showEmpty(emptyText);
          return;
        }

        listWrap.innerHTML = "";

        rows.forEach((lesson, index) => {
          const card = document.createElement("div");
          card.className = "card";

          const imageHtml = lesson.imageURL
            ? `<img class="cover" src="${escapeHtml(lesson.imageURL)}" alt="Lesson image">`
            : "";

          const badges = [];
          if (lesson.category) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(lesson.category)}</span>`);
          if (lesson.createdAtMs) badges.push(`<span class="mini-badge mini-purple">${new Date(lesson.createdAtMs).toLocaleDateString()}</span>`);
          if (lesson.externalURL) badges.push(`<span class="mini-badge mini-green">Link</span>`);

          const bodyId = `lessonBody_${index}`;

          card.innerHTML = `
            ${imageHtml}
            <div class="card-title">${escapeHtml(lesson.title)}</div>
            <div class="badge-row">${badges.join("")}</div>
            <div class="summary">${escapeHtml(lesson.summary || "Open this lesson to read more.")}</div>

            <div class="card-actions">
              <button class="action-btn btn-primary toggle-btn" type="button" data-target="${bodyId}">
                Read Lesson
              </button>
              ${lesson.externalURL ? `<a href="${escapeHtml(lesson.externalURL)}" target="_blank" rel="noopener noreferrer" class="action-btn btn-soft">Open Link</a>` : ""}
            </div>

            <div id="${bodyId}" class="body hidden">${escapeHtml(lesson.body || lesson.summary || "")}</div>
          `;

          const img = card.querySelector(".cover");
          if (img) {
            img.addEventListener("error", () => {
              img.style.display = "none";
            });
          }

          listWrap.appendChild(card);
        });

        listWrap.querySelectorAll(".toggle-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const targetId = btn.getAttribute("data-target");
            const body = document.getElementById(targetId);
            if (!body) return;

            const willOpen = body.classList.contains("hidden");
            body.classList.toggle("hidden");
            btn.textContent = willOpen ? "Hide Lesson" : "Read Lesson";
          });
        });

        showList();
      });
    }

    async function loadLessons() {
      const sources = ["school_posts", "schoolLessons", "school"];
      const map = new Map();

      for (const source of sources) {
        try {
          const snap = await getDocs(collection(db, source));
          snap.forEach(d => {
            const lesson = normalizeLesson({ id: d.id, ...d.data() }, d.id, source);
            map.set(`${source}:${lesson.id}`, lesson);
          });
        } catch {}
      }

      lessonsData = Array.from(map.values());
      updateCounts();
      renderCategories();
      renderLessons();
    }

    async function refreshAll() {
      openLoading();
      await loadLessons();
    }

    searchInput.addEventListener("input", () => {
      updateClearButton();
      renderLessons();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateClearButton();
      searchInput.focus();
      renderLessons();
    });

    refreshBtn.addEventListener("click", refreshAll);
    refreshHeroBtn.addEventListener("click", refreshAll);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        await refreshAll();
      } catch (err) {
        console.error(err);
        showEmpty("Could not load school page.");
      }
    });
  </script>
</body>
</html>
