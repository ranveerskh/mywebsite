<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Moderation History</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    :root{
      --bg:#0b1020;--card:#121931;--soft:#161f3d;--line:rgba(255,255,255,.08);
      --text:#fff;--muted:#9aa7c7;--green:#3ddc84;--red:#ff5d73;--yellow:#f5b942;--purple:#a78bfa;
    }
    body{background:linear-gradient(180deg,#070b16 0%,#0d1326 100%);color:var(--text);min-height:100vh;padding:14px}
    .app{max-width:980px;margin:0 auto}
    .topbar,.panel{background:rgba(18,25,49,.88);border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:14px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .left-wrap{display:flex;align-items:center;gap:10px}
    .back-btn{border:none;background:var(--soft);color:#fff;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;border:1px solid var(--line)}
    .brand{font-size:22px;font-weight:800}
    .brand-sub{font-size:12px;color:var(--muted)}
    .section-title{font-size:20px;font-weight:800;margin-bottom:8px}
    .section-note{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:14px}
    .filters{display:grid;grid-template-columns:1fr 180px;gap:10px}
    input,select{
      width:100%;border:none;outline:none;padding:13px 14px;border-radius:14px;background:#0f1630;color:#fff;
      border:1px solid rgba(255,255,255,.07);font-size:14px
    }
    select option{color:#000}
    .loading{text-align:center;color:var(--muted);padding:28px 10px}
    .list{display:grid;gap:12px}
    .card{background:#0f1630;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px}
    .card-title{font-size:16px;font-weight:800;margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--muted);line-height:1.7}
    .note{margin-top:10px;color:#fff;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:8px}
    .warn{background:rgba(245,185,66,.14);color:#ffe7b0;border:1px solid rgba(245,185,66,.20)}
    .suspend{background:rgba(167,139,250,.14);color:#e8defd;border:1px solid rgba(167,139,250,.20)}
    .ban{background:rgba(255,93,115,.14);color:#ffd3d9;border:1px solid rgba(255,93,115,.20)}
    .dismiss{background:#182248;color:#c9d5ff;border:1px solid rgba(255,255,255,.06)}
    .empty-box{text-align:center;padding:28px 10px;color:var(--muted);background:#0f1630;border-radius:18px;border:1px dashed rgba(255,255,255,.08)}

    @media(max-width:700px){
      body{padding:10px}
      .filters{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="left-wrap">
        <button id="backBtn" class="back-btn" type="button">Back</button>
        <div>
          <div class="brand">BareWorld</div>
          <div class="brand-sub">Moderation history</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">History</div>
      <div class="section-note">Every moderation action is saved here.</div>
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search by user id, note, category..." />
        <select id="actionFilter">
          <option value="all">All actions</option>
          <option value="warn">Warn</option>
          <option value="suspend">Suspend</option>
          <option value="ban">Ban</option>
          <option value="dismiss">Dismiss</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading history...</div>
      <div id="list" class="list" style="display:none;"></div>
      <div id="emptyBox" class="empty-box" style="display:none;">No moderation history found.</div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const searchInput = document.getElementById("searchInput");
    const actionFilter = document.getElementById("actionFilter");

    let currentUser = null;
    let allLogs = [];
    let historyChannel = null;
    let refreshTimer = null;

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "admin.html";
    });

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function toMillis(value) {
      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function formatDate(value) {
      if (!value) return "-";

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().toLocaleString();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return new Date(value.seconds * 1000).toLocaleString();
        }
      } catch {}

      try {
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? "-" : d.toLocaleString();
      } catch {
        return "-";
      }
    }

    function normalizeAction(rawAction = "") {
      const action = String(rawAction || "").toLowerCase();

      if (action.includes("warn")) return "warn";
      if (action.includes("suspend")) return "suspend";
      if (action.includes("ban")) return "ban";
      if (action.includes("dismiss")) return "dismiss";
      if (action.includes("resolve")) return "dismiss";
      if (action.includes("reject")) return "dismiss";
      if (action.includes("approved")) return "dismiss";
      if (action.includes("hidden")) return "dismiss";
      if (action.includes("delete")) return "ban";

      return action || "action";
    }

    function normalizeLog(raw) {
      const d = raw || {};
      const actionRaw = getField(d, ["action_type", "actionType", "action"], "action");
      const actionType = normalizeAction(actionRaw);

      return {
        id: getField(d, ["id"], ""),
        actionRaw,
        actionType,

        targetUserId: getField(d, [
          "target_user_id",
          "targetUserId",
          "reported_user_id",
          "reportedUserId",
          "user_id",
          "userId"
        ], ""),

        sourceReportId: getField(d, [
          "source_report_id",
          "sourceReportId",
          "report_id",
          "reportId"
        ], ""),

        targetType: getField(d, ["target_type", "targetType"], ""),
        targetId: getField(d, ["target_id", "targetId"], ""),
        category: getField(d, ["category", "reason", "source"], ""),

        durationDays: getField(d, [
          "duration_days",
          "durationDays",
          "days"
        ], ""),

        activeUntil: d.active_until ?? d.activeUntil ?? d.warning_until ?? d.warningUntil ?? d.suspension_until ?? d.suspensionUntil ?? null,

        createdAt: d.created_at ?? d.createdAt ?? d.created ?? null,

        adminUid: getField(d, [
          "admin_uid",
          "adminUid",
          "admin_id",
          "adminId"
        ], ""),

        adminNote: getField(d, [
          "admin_note",
          "adminNote",
          "note",
          "message",
          "description"
        ], "")
      };
    }

    function getFilteredLogs() {
      const q = searchInput.value.trim().toLowerCase();
      const action = actionFilter.value;

      return allLogs.filter(log => {
        if (action !== "all" && log.actionType !== action) return false;
        if (!q) return true;

        const haystack = [
          log.targetUserId || "",
          log.actionRaw || "",
          log.actionType || "",
          log.category || "",
          log.adminNote || "",
          log.targetType || "",
          log.targetId || "",
          log.sourceReportId || "",
          log.adminUid || ""
        ].join(" ").toLowerCase();

        return haystack.includes(q);
      });
    }

    function renderLogs() {
      const items = getFilteredLogs();
      list.innerHTML = "";

      if (!items.length) {
        list.style.display = "none";
        emptyBox.style.display = "block";
        return;
      }

      emptyBox.style.display = "none";
      list.style.display = "grid";

      items.forEach(log => {
        const card = document.createElement("div");
        card.className = "card";

        const badgeClass =
          log.actionType === "warn" ? "warn" :
          log.actionType === "suspend" ? "suspend" :
          log.actionType === "ban" ? "ban" : "dismiss";

        const durationText = log.durationDays === "" || log.durationDays == null
          ? "-"
          : `${log.durationDays} days`;

        card.innerHTML = `
          <span class="badge ${badgeClass}">${escapeHtml(String(log.actionRaw || log.actionType || "action").toUpperCase())}</span>
          <div class="card-title">User: ${escapeHtml(log.targetUserId || "-")}</div>
          <div class="card-sub">
            Report: ${escapeHtml(log.sourceReportId || "-")}<br>
            Target: ${escapeHtml(log.targetType || "-")} • ${escapeHtml(log.targetId || "-")}<br>
            Category: ${escapeHtml(log.category || "-")}<br>
            Duration: ${escapeHtml(durationText)}<br>
            Active until: ${escapeHtml(formatDate(log.activeUntil))}<br>
            Created: ${escapeHtml(formatDate(log.createdAt))}<br>
            Admin: ${escapeHtml(log.adminUid || "-")}
          </div>
          <div class="note">${escapeHtml(log.adminNote || "No admin note")}</div>
        `;

        list.appendChild(card);
      });
    }

    searchInput.addEventListener("input", renderLogs);
    actionFilter.addEventListener("change", renderLogs);

    async function checkAdminAccess(uid) {
      const columns = ["id", "uid", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from("admins")
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return true;
        } catch {}
      }

      return false;
    }

    async function loadHistory() {
      loading.style.display = "block";
      list.style.display = "none";
      emptyBox.style.display = "none";

      let rows = [];
      let lastError = null;

      try {
        const { data, error } = await supabase
          .from("moderation_history")
          .select("*")
          .order("created_at", { ascending: false });

        if (!error) {
          rows = data || [];
          lastError = null;
        } else {
          lastError = error;
        }
      } catch (err) {
        lastError = err;
      }

      if (lastError) {
        try {
          const { data, error } = await supabase
            .from("moderation_history")
            .select("*");

          if (error) throw error;
          rows = data || [];
        } catch (err) {
          console.error(err);
          loading.textContent = "Could not load moderation history.";
          return;
        }
      }

      allLogs = rows
        .map(normalizeLog)
        .sort((a, b) => toMillis(b.createdAt) - toMillis(a.createdAt));

      loading.style.display = "none";
      renderLogs();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        loadHistory().catch(err => console.error("History refresh failed:", err));
      }, 350);
    }

    function setupRealtime() {
      if (historyChannel) {
        try {
          supabase.removeChannel(historyChannel);
        } catch {}
      }

      historyChannel = supabase
        .channel(`moderation-history-live-${currentUser.id}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "moderation_history" },
          () => scheduleRefresh()
        )
        .subscribe();
    }

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      const isAdmin = await checkAdminAccess(currentUser.id);

      if (!isAdmin) {
        loading.textContent = "Access denied. Admin only.";
        return;
      }

      await loadHistory();
      setupRealtime();

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      if (historyChannel) {
        try {
          supabase.removeChannel(historyChannel);
        } catch {}
      }
    });

    initPage().catch((error) => {
      console.error(error);
      loading.textContent = "Could not load moderation history.";
    });

    /*
      SUPABASE NEEDS FOR THIS PAGE:

      TABLES:
      - admins: select
      - moderation_history: select, realtime

      IMPORTANT COLUMNS SUPPORTED:
      moderation_history:
      - id
      - action OR action_type
      - admin_uid
      - target_user_id
      - target_type
      - target_id
      - report_id
      - source
      - category
      - admin_note
      - duration_days
      - active_until
      - created_at

      SHARE BUTTON:
      - Not needed on this page because it does not display post cards.
    */
  </script>
</body>
</html>
