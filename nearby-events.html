<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby Events</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:44px 1fr auto;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn,.chip-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      border:1px solid var(--line);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:42px;
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      padding:0;
    }
    .top-icon-btn svg{width:18px;height:18px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:18px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:10px;color:var(--muted);margin-top:2px}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:13px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .hero-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .section-title{font-size:18px;font-weight:800;margin-bottom:4px}
    .section-note{color:var(--muted);font-size:12px;line-height:1.5}

    .hero-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .stats-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .stat-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .stat-chip.blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .stat-chip.green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .stat-chip.yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .stat-chip.purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .toolbar{
      display:grid;
      gap:10px;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }
    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 10px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-wrap{
      position:relative;
    }
    .search-input{
      width:100%;
      border:none;
      outline:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:15px;
      padding:13px 42px 13px 14px;
      font-size:14px;
    }
    .search-input::placeholder{color:var(--muted)}
    .clear-search-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:30px;
      height:30px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
    }

    .actions-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .action-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:40px;
    }
    .action-btn.primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .action-btn.green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .action-btn.yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .action-btn.red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}
    .action-btn.purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .loading{
      text-align:center;
      color:var(--muted);
      padding:24px 10px;
      font-size:14px;
    }
    .list{display:grid;gap:10px}

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .cover-link{
      display:block;
      text-decoration:none;
      color:inherit;
    }
    .cover{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:10px;
    }

    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .card-title{
      font-size:16px;
      font-weight:800;
      line-height:1.35;
    }
    .card-title a{
      color:var(--text);
      text-decoration:none;
    }
    .card-title a:hover{text-decoration:underline}
    .card-time{
      color:var(--muted);
      font-size:11px;
      white-space:nowrap;
      flex-shrink:0;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:9px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid transparent;
    }
    .badge.blue{background:rgba(76,201,255,.14);color:#d8f7ff;border-color:rgba(76,201,255,.20)}
    .badge.green{background:rgba(61,220,132,.14);color:#d9ffe8;border-color:rgba(61,220,132,.20)}
    .badge.yellow{background:rgba(245,185,66,.14);color:#ffeab8;border-color:rgba(245,185,66,.20)}
    .badge.purple{background:rgba(167,139,250,.14);color:#efe7ff;border-color:rgba(167,139,250,.20)}
    .badge.red{background:rgba(255,93,115,.14);color:#ffd6dd;border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:9px;
    }
    .meta-item{
      background:var(--surface-3);
      border:1px solid var(--line);
      border-radius:13px;
      padding:10px 11px;
      font-size:12px;
      line-height:1.5;
    }
    .meta-item strong{
      display:block;
      margin-bottom:4px;
      color:var(--muted);
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.2px;
    }

    .card-text{
      color:#d7def5;
      font-size:13px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }
    html[data-theme="light"] .card-text{color:#33415c}

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:11px;
    }

    .empty-box{
      text-align:center;
      padding:24px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .message{
      min-height:18px;
      font-size:13px;
      margin-top:4px;
    }
    .message.ok{color:#9cf0bf}
    .message.err{color:#ffb3bd}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .nav-link .icon{font-size:18px;line-height:1}

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .topbar{grid-template-columns:44px 1fr}
      .top-actions{grid-column:1 / -1}
      .top-actions .chip-btn{flex:1}
      .tabs{grid-template-columns:1fr}
      .meta-grid{grid-template-columns:1fr}
      .actions-row .action-btn,
      .card-actions .action-btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby Events</div>
      </div>

      <div class="top-actions">
        <a href="create-event.html" class="chip-btn">Create Event</a>
      </div>
    </div>

    <div class="panel">
      <div class="hero-head">
        <div>
          <div class="section-title">Nearby Events</div>
          <div class="section-note">Discover public events, see joined ones, and open full event detail pages.</div>
        </div>

        <div class="hero-actions">
          <button id="refreshBtn" class="action-btn green" type="button">Refresh</button>
          <a href="create-event.html" class="action-btn primary">Create</a>
        </div>
      </div>

      <div class="stats-row">
        <span id="allCountChip" class="stat-chip blue">All: 0</span>
        <span id="joinedCountChip" class="stat-chip green">Joined: 0</span>
        <span id="upcomingCountChip" class="stat-chip yellow">Upcoming: 0</span>
        <span id="privateCountChip" class="stat-chip purple">Private Access: 0</span>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div class="tabs">
          <button class="tab-btn active" data-tab="all" type="button">All</button>
          <button class="tab-btn" data-tab="joined" type="button">Joined</button>
          <button class="tab-btn" data-tab="mine" type="button">Mine</button>
        </div>

        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search events..." />
          <button id="clearSearchBtn" class="clear-search-btn hidden" type="button">✕</button>
        </div>

        <div class="actions-row">
          <a href="nearby.html" class="action-btn">Nearby Hub</a>
          <a href="profile.html" class="action-btn">Profile</a>
        </div>

        <div id="pageMessage" class="message"></div>
      </div>
    </div>

    <div class="panel">
      <div id="loading" class="loading">Loading events...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link active">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      getDocs,
      doc,
      getDoc,
      setDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const refreshBtn = document.getElementById("refreshBtn");
    const searchInput = document.getElementById("searchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const pageMessage = document.getElementById("pageMessage");

    const allCountChip = document.getElementById("allCountChip");
    const joinedCountChip = document.getElementById("joinedCountChip");
    const upcomingCountChip = document.getElementById("upcomingCountChip");
    const privateCountChip = document.getElementById("privateCountChip");

    let currentUser = null;
    let currentTab = "all";
    let allEvents = [];
    let memberMap = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "nearby.html";
    });

    function setMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        title: d.title || d.name || "Untitled Event",
        description: d.description || d.desc || "",
        city: d.city || "",
        venue: d.venue || d.spot || "",
        address: d.address || "",
        date: d.date || "",
        time: d.time || "",
        visibility: d.visibility || "public",
        creatorId: d.creatorId || d.userId || d.uid || "",
        creatorName: d.creatorName || d.displayName || "Member",
        imageURL: d.imageURL || d.imageUrl || d.photoURL || d.mediaUrl || "",
        hidden: !!d.hidden || !!d.hiddenByAdmin || !!d.softDeleted,
        createdAt: d.createdAt || null
      };
    }

    function parseEventDateTime(dateStr, timeStr) {
      const dateRaw = String(dateStr || "").trim();
      if (!dateRaw) return null;

      let year, month, day;

      const isoMatch = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (isoMatch) {
        year = Number(isoMatch[1]);
        month = Number(isoMatch[2]) - 1;
        day = Number(isoMatch[3]);
      } else {
        const parsed = new Date(dateRaw);
        if (Number.isNaN(parsed.getTime())) return null;
        year = parsed.getFullYear();
        month = parsed.getMonth();
        day = parsed.getDate();
      }

      let hour = 23;
      let minute = 59;

      const timeRaw = String(timeStr || "").trim().toLowerCase();
      if (timeRaw) {
        let match = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
        if (match) {
          hour = Number(match[1]) % 12;
          minute = Number(match[2]);
          if (match[3] === "pm") hour += 12;
        } else {
          match = timeRaw.match(/^(\d{1,2})\s*(am|pm)$/);
          if (match) {
            hour = Number(match[1]) % 12;
            minute = 0;
            if (match[2] === "pm") hour += 12;
          } else {
            match = timeRaw.match(/^(\d{1,2}):(\d{2})$/);
            if (match) {
              hour = Number(match[1]);
              minute = Number(match[2]);
            }
          }
        }
      }

      return new Date(year, month, day, hour, minute, 0, 0);
    }

    function isExpired(model) {
      const dt = parseEventDateTime(model.date, model.time);
      return dt ? Date.now() > dt.getTime() : false;
    }

    function isJoined(eventId) {
      return memberMap.has(eventId) && memberMap.get(eventId) === true;
    }

    function canViewEvent(model) {
      if (model.hidden) return false;
      if (model.creatorId === currentUser.uid) return true;
      if (model.visibility !== "private") return true;
      return isJoined(model.id);
    }

    function updateCounts() {
      const visible = allEvents.filter(canViewEvent);
      const joinedCount = allEvents.filter(model => isJoined(model.id)).length;
      const upcomingCount = visible.filter(model => !isExpired(model)).length;
      const privateCount = allEvents.filter(model => model.visibility === "private" && canViewEvent(model)).length;

      allCountChip.textContent = `All: ${visible.length}`;
      joinedCountChip.textContent = `Joined: ${joinedCount}`;
      upcomingCountChip.textContent = `Upcoming: ${upcomingCount}`;
      privateCountChip.textContent = `Private Access: ${privateCount}`;
    }

    function matchesSearch(model, queryText) {
      const q = queryText.trim().toLowerCase();
      if (!q) return true;

      return [
        model.title,
        model.description,
        model.city,
        model.venue,
        model.address,
        model.creatorName
      ].filter(Boolean).join(" ").toLowerCase().includes(q);
    }

    function sortEvents(items) {
      return [...items].sort((a, b) => {
        const aExpired = isExpired(a);
        const bExpired = isExpired(b);

        if (aExpired !== bExpired) return aExpired ? 1 : -1;

        const aTime = parseEventDateTime(a.date, a.time)?.getTime() || 0;
        const bTime = parseEventDateTime(b.date, b.time)?.getTime() || 0;
        return aTime - bTime;
      });
    }

    function filterEvents() {
      const q = searchInput.value || "";

      const filtered = allEvents.filter(model => {
        if (!canViewEvent(model)) return false;
        if (!matchesSearch(model, q)) return false;
        if (currentTab === "joined") return isJoined(model.id);
        if (currentTab === "mine") return model.creatorId === currentUser.uid;
        return true;
      });

      return sortEvents(filtered);
    }

    async function joinEvent(model, btn) {
      btn.disabled = true;
      setMessage("");

      try {
        await setDoc(doc(db, "events", model.id, "members", currentUser.uid), {
          userId: currentUser.uid,
          joinedAt: serverTimestamp()
        }, { merge: true });

        memberMap.set(model.id, true);
        updateCounts();
        renderEvents();
        setMessage("Joined event.", "ok");
      } catch (err) {
        console.error(err);
        setMessage("Could not join event.", "err");
        btn.disabled = false;
      }
    }

    async function leaveEvent(model, btn) {
      btn.disabled = true;
      setMessage("");

      try {
        await deleteDoc(doc(db, "events", model.id, "members", currentUser.uid));
        memberMap.set(model.id, false);
        updateCounts();
        renderEvents();
        setMessage("Left event.", "ok");
      } catch (err) {
        console.error(err);
        setMessage("Could not leave event.", "err");
        btn.disabled = false;
      }
    }

    function renderEvents() {
      list.innerHTML = "";
      const items = filterEvents();

      if (!items.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");
        emptyBox.textContent =
          currentTab === "joined" ? "No joined events yet." :
          currentTab === "mine" ? "You have not created any events yet." :
          "No events found.";
        return;
      }

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      items.forEach(model => {
        const expired = isExpired(model);
        const joined = isJoined(model.id);
        const isMine = model.creatorId === currentUser.uid;

        const card = document.createElement("div");
        card.className = "card";

        const imageHtml = model.imageURL
          ? `<a class="cover-link" href="event.html?eventId=${encodeURIComponent(model.id)}">
               <img class="cover" src="${escapeHtml(model.imageURL)}" alt="Event image">
             </a>`
          : "";

        const venueText = [model.venue, model.address].filter(Boolean).join(" • ") || "Not added";

        card.innerHTML = `
          ${imageHtml}

          <div class="card-top">
            <div class="card-title">
              <a href="event.html?eventId=${encodeURIComponent(model.id)}">${escapeHtml(model.title)}</a>
            </div>
            <div class="card-time">${escapeHtml(model.date || "No date")}</div>
          </div>

          <div class="badge-row">
            <span class="badge ${model.visibility === "private" ? "purple" : "blue"}">${escapeHtml(model.visibility === "private" ? "Private" : "Public")}</span>
            ${joined ? `<span class="badge green">Joined</span>` : ""}
            ${isMine ? `<span class="badge yellow">Mine</span>` : ""}
            ${expired ? `<span class="badge red">Expired</span>` : `<span class="badge green">Upcoming</span>`}
          </div>

          <div class="meta-grid">
            <div class="meta-item"><strong>Time</strong>${escapeHtml(model.time || "Not added")}</div>
            <div class="meta-item"><strong>City</strong>${escapeHtml(model.city || "Not added")}</div>
            <div class="meta-item"><strong>Venue</strong>${escapeHtml(venueText)}</div>
            <div class="meta-item"><strong>Host</strong>${escapeHtml(model.creatorName || "Member")}</div>
          </div>

          <div class="card-text">${escapeHtml(model.description || "No description added.")}</div>

          <div class="card-actions">
            <a class="action-btn primary" href="event.html?eventId=${encodeURIComponent(model.id)}">Open</a>
            ${
              isMine
                ? `<a class="action-btn purple" href="event.html?eventId=${encodeURIComponent(model.id)}">Manage</a>`
                : expired
                ? `<button class="action-btn red" type="button" disabled>Expired</button>`
                : joined
                ? `<button class="action-btn red leave-btn" data-id="${escapeHtml(model.id)}" type="button">Leave</button>`
                : `<button class="action-btn green join-btn" data-id="${escapeHtml(model.id)}" type="button">Join</button>`
            }
          </div>
        `;

        const cover = card.querySelector(".cover");
        if (cover) {
          cover.addEventListener("error", () => {
            cover.parentElement.remove();
          });
        }

        const joinBtn = card.querySelector(".join-btn");
        if (joinBtn) {
          joinBtn.addEventListener("click", async () => {
            await joinEvent(model, joinBtn);
          });
        }

        const leaveBtn = card.querySelector(".leave-btn");
        if (leaveBtn) {
          leaveBtn.addEventListener("click", async () => {
            await leaveEvent(model, leaveBtn);
          });
        }

        list.appendChild(card);
      });
    }

    async function loadJoinedState(events) {
      const results = await Promise.all(events.map(async model => {
        try {
          const memberSnap = await getDoc(doc(db, "events", model.id, "members", currentUser.uid));
          return { eventId: model.id, joined: memberSnap.exists() };
        } catch {
          return { eventId: model.id, joined: false };
        }
      }));

      memberMap = new Map(results.map(x => [x.eventId, x.joined]));
    }

    async function loadEvents() {
      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");

      try {
        const snap = await getDocs(collection(db, "events"));
        allEvents = snap.docs
          .map(d => normalizeEvent({ id: d.id, ...d.data() }, d.id))
          .filter(model => !model.hidden);

        await loadJoinedState(allEvents);
        updateCounts();
        renderEvents();
        loading.classList.add("hidden");
      } catch (err) {
        console.error(err);
        loading.textContent = "Could not load events.";
      }
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentTab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderEvents();
      });
    });

    searchInput.addEventListener("input", () => {
      clearSearchBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderEvents();
    });

    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearSearchBtn.classList.add("hidden");
      renderEvents();
      searchInput.focus();
    });

    refreshBtn.addEventListener("click", async () => {
      await loadEvents();
      setMessage("Events refreshed.", "ok");
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      await loadEvents();
    });
  </script>
</body>
</html>
