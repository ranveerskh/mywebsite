<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby Events</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 110px;
    }
    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:20px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }
    .hero-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .btn-soft{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      color:var(--text);
      border:1px solid rgba(61,220,132,.20);
    }
    .btn-red{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .btn-yellow{
      background:rgba(245,185,66,.14);
      color:var(--text);
      border:1px solid rgba(245,185,66,.20);
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 10px;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
      margin-bottom:12px;
    }
    .search-box::placeholder{color:var(--muted)}

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .card-title{
      font-size:17px;
      font-weight:800;
      line-height:1.4;
      margin-bottom:10px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }
    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }
    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .loading-box{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .empty-box{
      text-align:center;
      padding:22px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .status-text{
      min-height:18px;
      font-size:13px;
      margin-top:10px;
    }
    .status-ok{color:#86efac}
    .status-err{color:#fda4af}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{
      font-size:18px;
      line-height:1;
      display:block;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    @media (max-width:700px){
      body{padding:10px 10px 110px}
      .brand{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="nearby.html" class="top-icon-btn" aria-label="Back to nearby">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby events</div>
      </div>

      <a href="create-event.html" class="top-icon-btn" aria-label="Create event">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="hero-title">Events Around You</div>
      <div class="hero-sub">
        Browse upcoming events, join before expiry, and keep your joined events easy to find.
      </div>

      <div class="chip-row">
        <span class="chip chip-blue" id="cityChip">City: -</span>
        <span class="chip chip-purple" id="modeChip">Mode: -</span>
        <span class="chip chip-yellow" id="browserChip">Browser location off</span>
      </div>

      <div class="action-row">
        <button id="useBrowserLocationBtn" class="action-btn btn-primary" type="button">Use Browser Location</button>
        <button id="refreshBtn" class="action-btn btn-soft" type="button">Refresh Events</button>
        <a href="create-event.html" class="action-btn btn-purple">Create Event</a>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
        <button class="tab-btn" data-tab="joined">Joined</button>
        <button class="tab-btn" data-tab="past">Past</button>
      </div>

      <input id="searchInput" class="search-box" type="text" placeholder="Search nearby events..." />

      <div id="listLoading" class="loading-box">Loading events...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link active">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      getDocs,
      setDoc,
      deleteDoc,
      addDoc,
      collection,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const cityChip = document.getElementById("cityChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let browserCoords = null;
    let currentTab = "upcoming";

    let eventsData = [];
    let creatorProfiles = new Map();
    let joinedEventIds = new Set();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (getStoredTheme() === "system") applyTheme("system");
    });

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        bio: d.bio || d.about || d.description || "",
        showInNearby: !!d.showInNearby,
        locationVisibility: d.locationVisibility || "hidden",
        city: d.city || d.locationCity || d.currentCity || "",
        verified: !!(d.verified || d.isVerified),
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted,
        blockedUsers: Array.isArray(d.blockedUsers) ? d.blockedUsers : [],
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        title: d.title || d.name || "Untitled Event",
        description: d.description || d.desc || "",
        city: d.city || d.locationCity || "",
        date: d.date || "",
        time: d.time || "",
        visibility: d.visibility || d.eventVisibility || "public",
        creatorId: d.creatorId || d.userId || d.uid || "",
        creatorName: d.creatorName || d.displayName || d.hostName || "Member",
        hidden: !!d.hidden || !!d.hiddenByAdmin || !!d.softDeleted,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function parseEventDateTime(dateStr, timeStr) {
      const dateRaw = String(dateStr || "").trim();
      if (!dateRaw) return null;

      let year, month, day;

      const isoMatch = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (isoMatch) {
        year = Number(isoMatch[1]);
        month = Number(isoMatch[2]) - 1;
        day = Number(isoMatch[3]);
      } else {
        const parsed = new Date(dateRaw);
        if (Number.isNaN(parsed.getTime())) return null;
        year = parsed.getFullYear();
        month = parsed.getMonth();
        day = parsed.getDate();
      }

      let hour = 23;
      let minute = 59;

      const timeRaw = String(timeStr || "").trim().toLowerCase();
      if (timeRaw) {
        let match = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
        if (match) {
          hour = Number(match[1]) % 12;
          minute = Number(match[2]);
          if (match[3] === "pm") hour += 12;
        } else {
          match = timeRaw.match(/^(\d{1,2})\s*(am|pm)$/);
          if (match) {
            hour = Number(match[1]) % 12;
            minute = 0;
            if (match[2] === "pm") hour += 12;
          } else {
            match = timeRaw.match(/^(\d{1,2}):(\d{2})$/);
            if (match) {
              hour = Number(match[1]);
              minute = Number(match[2]);
            }
          }
        }
      }

      return new Date(year, month, day, hour, minute, 0, 0);
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function sameCity(a, b) {
      const aa = String(a || "").trim().toLowerCase();
      const bb = String(b || "").trim().toLowerCase();
      return aa && bb && aa === bb;
    }

    function formatDistanceLabel(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "Browser location unsupported";
        browserChip.className = "chip chip-red";
        renderEvents();
        return;
      }

      browserChip.textContent = "Checking browser location...";
      browserChip.className = "chip chip-yellow";

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            browserChip.textContent = "Browser location on";
            browserChip.className = "chip chip-green";
            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "Browser location off";
            browserChip.className = "chip chip-yellow";
            resolve();
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
        );
      });

      renderEvents();
    }

    function renderViewerChips() {
      if (!viewerProfile) return;

      cityChip.textContent = `City: ${viewerProfile.city || "Not added"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "hidden"}`;

      cityChip.className = "chip chip-blue";
      modeChip.className = "chip chip-purple";

      if (!browserCoords) {
        browserChip.textContent = "Browser location off";
        browserChip.className = "chip chip-yellow";
      }
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function buildEventViewModel(event) {
      const creator = creatorProfiles.get(event.creatorId) || null;
      const viewerLat = browserCoords?.lat ?? viewerProfile?.lat ?? null;
      const viewerLng = browserCoords?.lng ?? viewerProfile?.lng ?? null;

      let distanceKm = null;
      let score = 0;

      if (viewerLat !== null && viewerLng !== null && event.lat !== null && event.lng !== null) {
        distanceKm = kmDistance(viewerLat, viewerLng, event.lat, event.lng);
        if (distanceKm !== null) score = Math.max(0, 500 - distanceKm);
      } else if (sameCity(viewerProfile?.city, event.city)) {
        score = 250;
      }

      const eventDateTime = parseEventDateTime(event.date, event.time);
      const eventMs = eventDateTime ? eventDateTime.getTime() : 0;
      const expired = eventDateTime ? Date.now() > eventMs : false;
      const joined = joinedEventIds.has(event.id);
      const ownEvent = event.creatorId === currentUser.uid;

      return {
        ...event,
        creator,
        distanceKm,
        distanceLabel: distanceKm !== null ? formatDistanceLabel(distanceKm) : (sameCity(viewerProfile?.city, event.city) ? "Same city" : ""),
        score,
        eventMs,
        expired,
        joined,
        ownEvent
      };
    }

    function matchesSearch(event, q) {
      if (!q) return true;
      const joined = [
        event.title,
        event.description,
        event.city,
        event.creatorName,
        event.creator?.displayName,
        event.creator?.username
      ].filter(Boolean).join(" ").toLowerCase();

      return joined.includes(q.toLowerCase());
    }

    function getFilteredEvents() {
      const q = searchInput.value.trim();

      return eventsData
        .filter(e => !e.hidden)
        .filter(e => {
          const creator = creatorProfiles.get(e.creatorId);
          if (!creator) return true;
          if (creator.softDeleted || creator.isHiddenByAdmin || creator.moderationStatus === "banned") return false;
          if (viewerBlockedUsers.includes(creator.uid)) return false;
          return true;
        })
        .filter(e => e.visibility !== "private" || e.creatorId === currentUser.uid || joinedEventIds.has(e.id))
        .map(buildEventViewModel)
        .filter(e => matchesSearch(e, q))
        .filter(e => {
          if (currentTab === "upcoming") return !e.expired;
          if (currentTab === "joined") return e.joined || e.ownEvent;
          if (currentTab === "past") return e.expired;
          return true;
        })
        .sort((a, b) => {
          if (currentTab === "past") {
            return b.eventMs - a.eventMs || a.title.localeCompare(b.title);
          }
          return a.eventMs - b.eventMs || b.score - a.score || a.title.localeCompare(b.title);
        });
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.uid) return;
      try {
        await addDoc(collection(db, "notifications", targetUid, "items"), payload);
      } catch {}
    }

    async function joinEvent(event) {
      await setDoc(doc(db, "events", event.id, "members", currentUser.uid), {
        userId: currentUser.uid,
        displayName: viewerProfile?.displayName || currentUser.displayName || "Member",
        username: viewerProfile?.username || "",
        joinedAt: serverTimestamp()
      }, { merge: true });

      joinedEventIds.add(event.id);

      await createNotificationSafe(event.creatorId, {
        type: "event_join",
        title: "Event joined",
        text: `${viewerProfile?.displayName || currentUser.displayName || "Someone"} joined your event.`,
        fromUserId: currentUser.uid,
        toUserId: event.creatorId,
        eventId: event.id,
        createdAt: serverTimestamp(),
        isRead: false
      });
    }

    async function leaveEvent(event) {
      await deleteDoc(doc(db, "events", event.id, "members", currentUser.uid));
      joinedEventIds.delete(event.id);
    }

    function buildActionButtons(model) {
      const actions = [];

      if (model.ownEvent) {
        actions.push(`<a href="create-event.html" class="action-btn btn-purple">Your Event</a>`);
      } else if (model.expired) {
        actions.push(`<button class="action-btn btn-soft" type="button" disabled>Expired</button>`);
      } else if (model.joined) {
        actions.push(`<button class="action-btn btn-red leave-btn" data-id="${escapeHtml(model.id)}" type="button">Leave</button>`);
      } else {
        actions.push(`<button class="action-btn btn-green join-btn" data-id="${escapeHtml(model.id)}" type="button">Join</button>`);
      }

      if (model.creatorId) {
        actions.push(`<a href="member.html?uid=${encodeURIComponent(model.creatorId)}" class="action-btn btn-soft">Host Profile</a>`);
      }

      return actions.join("");
    }

    function renderEvents() {
      openLoading();

      requestAnimationFrame(() => {
        const rows = getFilteredEvents();

        if (!rows.length) {
          const emptyText = currentTab === "joined"
            ? "No joined events yet."
            : currentTab === "past"
            ? "No past events found."
            : "No upcoming events found.";
          showEmpty(emptyText);
          return;
        }

        listWrap.innerHTML = "";

        rows.forEach(model => {
          const creatorName = model.creator?.displayName || model.creatorName || "Member";
          const creatorUsername = model.creator?.username ? `@${model.creator.username}` : "";
          const badges = [];

          badges.push(`<span class="mini-badge ${model.visibility === "private" ? "mini-yellow" : "mini-blue"}">${model.visibility === "private" ? "Private" : "Public"}</span>`);

          if (model.ownEvent) badges.push(`<span class="mini-badge mini-purple">Your Event</span>`);
          if (model.joined && !model.ownEvent) badges.push(`<span class="mini-badge mini-green">Joined</span>`);
          if (model.expired) badges.push(`<span class="mini-badge mini-red">Expired</span>`);
          if (model.distanceLabel) badges.push(`<span class="mini-badge mini-blue">${escapeHtml(model.distanceLabel)}</span>`);

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-title">${escapeHtml(model.title)}</div>

            <div class="badge-row">
              ${badges.join("")}
            </div>

            <div class="meta-grid">
              <div><strong>City:</strong> ${escapeHtml(model.city || "Not added")}</div>
              <div><strong>Date:</strong> ${escapeHtml(model.date || "-")}</div>
              <div><strong>Time:</strong> ${escapeHtml(model.time || "-")}</div>
              <div><strong>Host:</strong> ${escapeHtml(creatorName)} ${creatorUsername ? `(${escapeHtml(creatorUsername)})` : ""}</div>
            </div>

            <div class="desc">${escapeHtml(model.description || "No description added.")}</div>

            <div class="card-actions">
              ${buildActionButtons(model)}
            </div>
          `;

          listWrap.appendChild(card);
        });

        listWrap.querySelectorAll(".join-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const event = rows.find(e => e.id === id);
            if (!event) return;

            btn.disabled = true;
            setPageStatus("");

            try {
              await joinEvent(event);
              setPageStatus("Joined event.", "status-ok");
              renderEvents();
            } catch (err) {
              console.error(err);
              setPageStatus("Could not join event.", "status-err");
              btn.disabled = false;
            }
          });
        });

        listWrap.querySelectorAll(".leave-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const event = rows.find(e => e.id === id);
            if (!event) return;

            const ok = confirm("Leave this event?");
            if (!ok) return;

            btn.disabled = true;
            setPageStatus("");

            try {
              await leaveEvent(event);
              setPageStatus("Left event.", "status-ok");
              renderEvents();
            } catch (err) {
              console.error(err);
              setPageStatus("Could not leave event.", "status-err");
              btn.disabled = false;
            }
          });
        });

        showList();
      });
    }

    async function loadViewer(uid) {
      const [userSnap, publicSnap] = await Promise.all([
        getDoc(doc(db, "users", uid)),
        getDoc(doc(db, "publicProfiles", uid))
      ]);

      viewerProfile = normalizeProfile({
        ...(publicSnap.exists() ? publicSnap.data() : {}),
        ...(userSnap.exists() ? userSnap.data() : {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];

      cityChip.textContent = `City: ${viewerProfile.city || "Not added"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "hidden"}`;
    }

    async function loadCreatorProfiles() {
      const snap = await getDocs(collection(db, "publicProfiles"));
      creatorProfiles = new Map();
      snap.forEach(d => {
        const profile = normalizeProfile({ id: d.id, ...d.data() }, d.id);
        creatorProfiles.set(profile.uid || d.id, profile);
      });
    }

    async function loadEvents() {
      const snap = await getDocs(collection(db, "events"));
      eventsData = snap.docs.map(d => normalizeEvent({ id: d.id, ...d.data() }, d.id));
    }

    async function loadJoinedMemberships() {
      joinedEventIds = new Set();

      await Promise.all(eventsData.map(async (event) => {
        try {
          const snap = await getDoc(doc(db, "events", event.id, "members", currentUser.uid));
          if (snap.exists()) joinedEventIds.add(event.id);
        } catch {}
      }));
    }

    async function refreshAll() {
      openLoading();
      await Promise.all([
        loadCreatorProfiles(),
        loadEvents()
      ]);
      await loadJoinedMemberships();
      renderViewerChips();
      renderEvents();
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      renderEvents();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    searchInput.addEventListener("input", renderEvents);
    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    refreshBtn.addEventListener("click", refreshAll);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        await loadViewer(user.uid);
        await refreshAll();
      } catch (err) {
        console.error(err);
        showEmpty("Could not load nearby events.");
      }
    });
  </script>
</body>
</html>
