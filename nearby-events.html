<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby Events</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
    }
    .top-icon-btn svg{
      width:18px;
      height:18px;
      display:block;
    }
    .top-center{text-align:center;min-width:0}
    .brand{
      font-size:18px;
      font-weight:800;
      line-height:1.05;
    }
    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:13px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:38px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      border-color:rgba(61,220,132,.20);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      border-color:rgba(167,139,250,.20);
    }
    .btn-yellow{
      background:rgba(245,185,66,.14);
      border-color:rgba(245,185,66,.20);
    }
    .btn-red{
      background:rgba(255,93,115,.14);
      border-color:rgba(255,93,115,.20);
    }

    .status-text{
      min-height:18px;
      font-size:13px;
      margin-top:8px;
    }
    .status-ok{color:#86efac}
    .status-err{color:#fda4af}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 8px;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:13px;
      font-weight:800;
    }
    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }
    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:15px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }
    .search-box::placeholder{color:var(--muted)}
    .clear-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:30px;
      height:30px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }
    .cover{
      width:100%;
      max-height:240px;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:10px;
    }
    .card-title{
      font-size:16px;
      font-weight:800;
      line-height:1.35;
      margin-bottom:8px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }
    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }
    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }
    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    @media (max-width:700px){
      body{padding:10px 10px 108px}
      .brand{font-size:18px}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .tab-link{font-size:12px;padding:10px 4px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button id="useBrowserLocationBtn" class="top-icon-btn" type="button" aria-label="Use browser GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby events</div>
      </div>

      <a href="edit-profile.html#location" class="top-icon-btn" aria-label="Location settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>

        </svg>

    <div class="panel">
      <div class="chip-row">
        <span id="locationChip" class="chip chip-blue">Location: -</span>
        <span id="modeChip" class="chip chip-purple">Mode: -</span>
        <span id="browserChip" class="chip chip-yellow">Browser GPS off</span>
        <span id="countChip" class="chip chip-green">Events: 0</span>
      </div>

      <div class="top-actions">
        <a href="edit-profile.html#location" class="action-btn btn-primary">Location Settings</a>
        <button id="gpsBtn2" class="action-btn btn-green" type="button">Use GPS</button>
        <button id="refreshBtn" class="action-btn btn-yellow" type="button">Refresh</button>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link">People</a>
        <a href="nearby-events.html" class="tab-link active">Events</a>
        <a href="nearby-places.html" class="tab-link">Places</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search events, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">✕</button>
      </div>

      <div id="listLoading" class="loading-box">Loading nearby events...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No nearby events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <span class="icon-svg" aria-hidden="true">

          <path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path>

    <a href="search.html" class="nav-link">

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16v12H4z"></path>
          <path d="M4 7l8 6 8-6"></path>

    <a href="profile.html" class="nav-link">

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      getDocs,
      setDoc,
      deleteDoc,
      collection,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const locationChip = document.getElementById("locationChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");
    const countChip = document.getElementById("countChip");

    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const gpsBtn2 = document.getElementById("gpsBtn2");
    const refreshBtn = document.getElementById("refreshBtn");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let eventsData = [];
    let memberStats = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return [];
      const aliases = [c];
      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      return aliases;
    }

    function buildLocationParts(city, province, country) {
      return [titleText(city), titleText(province), titleText(country)].filter(Boolean);
    }

    function buildLocationSearch(raw) {
      const city = titleText(raw.city || raw.locationCity || "");
      const province = titleText(raw.province || raw.state || raw.region || raw.locationProvince || "");
      const country = titleText(raw.country || raw.locationCountry || "");
      const saved = titleText(raw.locationSearch || "");
      return [
        saved,
        city,
        province,
        country,
        ...countryAliases(country)
      ].filter(Boolean).join(" ").trim().toLowerCase();
    }

    function textMatchesQuery(text, query) {
      const q = normalizeText(query);
      if (!q) return true;
      const base = normalizeText(text);
      if (!base) return false;
      if (base.includes(q)) return true;
      const tokens = q.split(/[\s,]+/).filter(Boolean);
      return tokens.every(token => base.includes(token));
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function parseEventDateTime(dateStr, timeStr) {
      const dateRaw = String(dateStr || "").trim();
      if (!dateRaw) return null;

      let year, month, day;
      const iso = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);

      if (iso) {
        year = Number(iso[1]);
        month = Number(iso[2]) - 1;
        day = Number(iso[3]);
      } else {
        const parsed = new Date(dateRaw);
        if (Number.isNaN(parsed.getTime())) return null;
        year = parsed.getFullYear();
        month = parsed.getMonth();
        day = parsed.getDate();
      }

      let hour = 23;
      let minute = 59;
      const timeRaw = String(timeStr || "").trim().toLowerCase();

      if (timeRaw) {
        let match = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
        if (match) {
          hour = Number(match[1]) % 12;
          minute = Number(match[2]);
          if (match[3] === "pm") hour += 12;
        } else {
          match = timeRaw.match(/^(\d{1,2})\s*(am|pm)$/);
          if (match) {
            hour = Number(match[1]) % 12;
            minute = 0;
            if (match[2] === "pm") hour += 12;
          } else {
            match = timeRaw.match(/^(\d{1,2}):(\d{2})$/);
            if (match) {
              hour = Number(match[1]);
              minute = Number(match[2]);
            }
          }
        }
      }

      return new Date(year, month, day, hour, minute, 0, 0);
    }

    function isExpired(model) {
      const dt = parseEventDateTime(model.date, model.time);
      return dt ? Date.now() > dt.getTime() : false;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        city: d.city || d.locationCity || d.currentCity || "",
        province: d.province || d.state || d.region || d.locationProvince || d.currentProvince || "",
        country: d.country || d.locationCountry || d.currentCountry || "",
        locationVisibility: d.locationVisibility || d.nearbyMode || "city",
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      return {
        id: d.id || fallbackId || "",
        title: d.title || d.name || "Untitled Event",
        description: d.description || d.desc || "",
        city: d.city || d.locationCity || "",
        province: d.province || d.state || d.region || "",
        country: d.country || d.locationCountry || "",
        locationSearch: buildLocationSearch(d),
        venue: d.venue || d.spot || "",
        address: d.address || "",
        date: d.date || "",
        time: d.time || "",
        visibility: d.visibility || d.eventVisibility || "public",
        creatorId: d.creatorId || d.userId || d.uid || "",
        creatorName: d.creatorName || d.displayName || "Member",
        imageURL: d.imageURL || d.imageUrl || d.photoURL || d.mediaUrl || "",
        hidden: !!d.hidden || !!d.hiddenByAdmin || !!d.softDeleted,
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function renderViewerLocation() {
      if (!viewerProfile) return;
      const parts = buildLocationParts(viewerProfile.city, viewerProfile.province, viewerProfile.country);
      locationChip.textContent = `Location: ${parts.length ? parts.join(", ") : "Not set"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "city"}`;
      if (!browserCoords) {
        browserChip.textContent = "Browser GPS off";
        browserChip.className = "chip chip-yellow";
      }
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "Browser GPS unsupported";
        browserChip.className = "chip chip-red";
        renderEvents();
        return;
      }

      browserChip.textContent = "Checking browser GPS...";
      browserChip.className = "chip chip-yellow";

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            browserChip.textContent = "Browser GPS on";
            browserChip.className = "chip chip-green";

            try {
              await Promise.all([
                setDoc(doc(db, "users", currentUser.uid), {
                  lat: browserCoords.lat,
                  lng: browserCoords.lng,
                  locationVisibility: "gps",
                  nearbyMode: "gps",
                  showInNearby: true
                }, { merge: true }),
                setDoc(doc(db, "publicProfiles", currentUser.uid), {
                  lat: browserCoords.lat,
                  lng: browserCoords.lng,
                  locationVisibility: "gps",
                  nearbyMode: "gps",
                  showInNearby: true
                }, { merge: true })
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;
              viewerProfile.locationVisibility = "gps";
              renderViewerLocation();
              setPageStatus("Browser GPS enabled for better distance sorting.", "status-ok");
            } catch (err) {
              console.error(err);
            }

            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "Browser GPS off";
            browserChip.className = "chip chip-yellow";
            setPageStatus("Could not use browser GPS. Using saved location instead.", "status-err");
            resolve();
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
        );
      });

      renderEvents();
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text, countLabel = "Events: 0") {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
      countChip.textContent = countLabel;
    }

    function showList(count, labelPrefix = "Events") {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
      countChip.textContent = `${labelPrefix}: ${count}`;
    }

    function getMemberStat(eventId) {
      return memberStats.get(eventId) || { joined: false, count: 0 };
    }

    function isJoined(eventId) {
      return getMemberStat(eventId).joined === true;
    }

    function getDisplayMemberCount(model) {
      const raw = getMemberStat(model.id).count || 0;
      return Math.max(raw, model.creatorId ? 1 : 0);
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function eventMatchesSavedLocation(model) {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);

      const city = normalizeText(model.city);
      const province = normalizeText(model.province);
      const country = normalizeText(model.country);

      const countryOk = !viewerCountry || !country || viewerCountry === country || countryAliases(country).includes(viewerCountry);
      const provinceOk = !viewerProvince || !province || viewerProvince === province;

      const exactCity = !!viewerCity && !!city && viewerCity === city && provinceOk && countryOk;

      if (exactCity) return { ok: true, rank: 1 };

      if (!viewerCity && viewerProvince && province && viewerProvince === province && countryOk) {
        return { ok: true, rank: 2 };
      }

      if (!viewerCity && !viewerProvince && viewerCountry && country && countryOk) {
        return { ok: true, rank: 3 };
      }

      return { ok: false, rank: 99 };
    }

    function buildAllRows() {
      const viewerCoords = getViewerCoords();

      return eventsData
        .filter(model => !model.hidden)
        .filter(model => model.visibility !== "private" || model.creatorId === currentUser.uid || isJoined(model.id))
        .map(model => {
          const nearbyMatch = eventMatchesSavedLocation(model);
          const distanceKm =
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            model.lat !== null &&
            model.lng !== null
              ? kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng)
              : null;

          const gpsNearby = distanceKm !== null && distanceKm <= 100;

          const searchable = [
            model.title,
            model.description,
            model.creatorName,
            model.venue,
            model.address,
            model.locationSearch
          ].filter(Boolean).join(" ").toLowerCase();

          return {
            ...model,
            joined: isJoined(model.id),
            memberCount: getDisplayMemberCount(model),
            expired: isExpired(model),
            distanceKm,
            distanceLabel: formatDistance(distanceKm),
            nearbySaved: nearbyMatch.ok,
            nearbyRank: nearbyMatch.rank,
            nearbyGps: gpsNearby,
            searchable,
            placeLabel: buildLocationParts(model.city, model.province, model.country).join(", ")
          };
        });
    }

    function buildVisibleRows() {
      const q = normalizeText(searchInput.value);
      const allRows = buildAllRows();

      if (q) {
        return allRows
          .filter(row => textMatchesQuery(row.searchable, q))
          .sort((a, b) => {
            const aTitleStarts = normalizeText(a.title).startsWith(q) ? 1 : 0;
            const bTitleStarts = normalizeText(b.title).startsWith(q) ? 1 : 0;
            if (aTitleStarts !== bTitleStarts) return bTitleStarts - aTitleStarts;

            const aLocationStarts = normalizeText(a.placeLabel).startsWith(q) ? 1 : 0;
            const bLocationStarts = normalizeText(b.placeLabel).startsWith(q) ? 1 : 0;
            if (aLocationStarts !== bLocationStarts) return bLocationStarts - aLocationStarts;

            if (a.expired !== b.expired) return a.expired ? 1 : -1;

            const aHasDistance = a.distanceKm !== null;
            const bHasDistance = b.distanceKm !== null;
            if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
            if (aHasDistance && !bHasDistance) return -1;
            if (bHasDistance && !aHasDistance) return 1;

            const aTime = parseEventDateTime(a.date, a.time)?.getTime() || 0;
            const bTime = parseEventDateTime(b.date, b.time)?.getTime() || 0;
            return aTime - bTime;
          });
      }

      return allRows
        .filter(row => row.nearbySaved || row.nearbyGps)
        .sort((a, b) => {
          if (a.nearbySaved && !b.nearbySaved) return -1;
          if (b.nearbySaved && !a.nearbySaved) return 1;

          if (a.nearbyRank !== b.nearbyRank) return a.nearbyRank - b.nearbyRank;

          const aHasDistance = a.distanceKm !== null;
          const bHasDistance = b.distanceKm !== null;
          if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
          if (aHasDistance && !bHasDistance) return -1;
          if (bHasDistance && !aHasDistance) return 1;

          if (a.expired !== b.expired) return a.expired ? 1 : -1;

          const aTime = parseEventDateTime(a.date, a.time)?.getTime() || 0;
          const bTime = parseEventDateTime(b.date, b.time)?.getTime() || 0;
          return aTime - bTime;
        });
    }

    async function joinEvent(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        await setDoc(doc(db, "events", model.id, "members", currentUser.uid), {
          userId: currentUser.uid,
          joinedAt: serverTimestamp()
        }, { merge: true });

        const current = getMemberStat(model.id);
        memberStats.set(model.id, {
          joined: true,
          count: Math.max((current.count || 0) + 1, 1)
        });

        renderEvents();
        setPageStatus("Joined event.", "status-ok");
      } catch (err) {
        console.error(err);
        setPageStatus("Could not join event.", "status-err");
        btn.disabled = false;
      }
    }

    async function leaveEvent(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        await deleteDoc(doc(db, "events", model.id, "members", currentUser.uid));

        const current = getMemberStat(model.id);
        memberStats.set(model.id, {
          joined: false,
          count: Math.max((current.count || 1) - 1, model.creatorId ? 1 : 0)
        });

        renderEvents();
        setPageStatus("Left event.", "status-ok");
      } catch (err) {
        console.error(err);
        setPageStatus("Could not leave event.", "status-err");
        btn.disabled = false;
      }
    }

    function renderEvents() {
      openLoading();

      const q = normalizeText(searchInput.value);
      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const rows = buildVisibleRows();

      if (!q && !viewerHasSavedLocation && !browserCoords) {
        showEmpty("Set your location in profile, use GPS, or type a city/province/country to search events.", "Events: 0");
        return;
      }

      if (!rows.length) {
        showEmpty(q ? "No matching events found." : "No nearby events found for your current location.", q ? "Results: 0" : "Events: 0");
        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const imageHtml = model.imageURL
          ? `<img class="cover" src="${escapeHtml(model.imageURL)}" alt="Event image">`
          : "";

        const badges = [];
        badges.push(`<span class="mini-badge ${model.visibility === "private" ? "mini-yellow" : "mini-blue"}">${model.visibility === "private" ? "Private" : "Public"}</span>`);
        if (model.joined) badges.push(`<span class="mini-badge mini-green">Joined</span>`);
        if (model.creatorId === currentUser.uid) badges.push(`<span class="mini-badge mini-purple">Mine</span>`);
        if (model.expired) badges.push(`<span class="mini-badge mini-red">Expired</span>`);
        else badges.push(`<span class="mini-badge mini-green">Upcoming</span>`);
        if (model.distanceLabel) badges.push(`<span class="mini-badge mini-purple">${escapeHtml(model.distanceLabel)}</span>`);
        badges.push(`<span class="mini-badge mini-blue">${model.memberCount} going</span>`);

        const venueText = [model.venue, model.address].filter(Boolean).join(" • ") || "Not added";

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          ${imageHtml}
          <div class="card-title">${escapeHtml(model.title)}</div>
          <div class="badge-row">${badges.join("")}</div>
          <div class="meta-grid">
            <div><strong>Location:</strong> ${escapeHtml(model.placeLabel || model.city || "Not added")}</div>
            <div><strong>Date:</strong> ${escapeHtml(model.date || "-")}</div>
            <div><strong>Time:</strong> ${escapeHtml(model.time || "-")}</div>
            <div><strong>Venue:</strong> ${escapeHtml(venueText)}</div>
            <div><strong>Host:</strong> ${escapeHtml(model.creatorName || "Member")}</div>
          </div>
          <div class="desc">${escapeHtml(model.description || "No description added.")}</div>
          <div class="top-actions" style="margin-top:0;">
            <a class="action-btn btn-primary" href="event.html?eventId=${encodeURIComponent(model.id)}">Open</a>
            ${
              model.creatorId === currentUser.uid
                ? `<a class="action-btn btn-purple" href="event.html?eventId=${encodeURIComponent(model.id)}">Manage</a>`
                : model.expired
                ? `<button class="action-btn btn-red" type="button" disabled>Expired</button>`
                : model.joined
                ? `<button class="action-btn btn-red leave-btn" data-id="${escapeHtml(model.id)}" type="button">Leave</button>`
                : `<button class="action-btn btn-green join-btn" data-id="${escapeHtml(model.id)}" type="button">Join</button>`
            }
          </div>
        `;

        const cover = card.querySelector(".cover");
        if (cover) {
          cover.addEventListener("error", () => {
            cover.style.display = "none";
          });
        }

        const joinBtn = card.querySelector(".join-btn");
        if (joinBtn) {
          joinBtn.addEventListener("click", async () => {
            await joinEvent(model, joinBtn);
          });
        }

        const leaveBtn = card.querySelector(".leave-btn");
        if (leaveBtn) {
          leaveBtn.addEventListener("click", async () => {
            await leaveEvent(model, leaveBtn);
          });
        }

        listWrap.appendChild(card);
      });

      showList(rows.length, q ? "Results" : "Events");
    }

    async function loadViewer(uid) {
      const [userSnap, publicSnap] = await Promise.all([
        getDoc(doc(db, "users", uid)),
        getDoc(doc(db, "publicProfiles", uid))
      ]);

      viewerProfile = normalizeProfile({
        ...(publicSnap.exists() ? publicSnap.data() : {}),
        ...(userSnap.exists() ? userSnap.data() : {}),
        uid
      }, uid);

      renderViewerLocation();
    }

    async function loadEvents() {
      const snap = await getDocs(collection(db, "events"));
      eventsData = snap.docs.map(d => normalizeEvent({ id: d.id, ...d.data() }, d.id));
    }

    async function loadMembershipStats(events) {
      const results = await Promise.all(
        events.map(async model => {
          try {
            const membersSnap = await getDocs(collection(db, "events", model.id, "members"));
            const joined = membersSnap.docs.some(d => d.id === currentUser.uid);
            return {
              eventId: model.id,
              joined,
              count: membersSnap.size
            };
          } catch {
            return {
              eventId: model.id,
              joined: false,
              count: 0
            };
          }
        })
      );

      memberStats = new Map(results.map(x => [x.eventId, { joined: x.joined, count: x.count }]));
    }

    async function refreshAll() {
      openLoading();
      await loadEvents();
      await loadMembershipStats(eventsData);
      renderViewerLocation();
      renderEvents();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderEvents();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderEvents();
    });

    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);
    gpsBtn2.addEventListener("click", requestBrowserLocation);
    refreshBtn.addEventListener("click", refreshAll);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        await loadViewer(user.uid);
        await refreshAll();
      } catch (err) {
        console.error(err);
        showEmpty("Could not load nearby events.");
      }
    });
  </script>
</body>
