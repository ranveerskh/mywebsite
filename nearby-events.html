<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby Events</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.06);
      --soft-shadow:0 6px 14px rgba(20,33,61,.045);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 14px 28px rgba(0,0,0,.16);
      --soft-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.06), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn.refresh-top{
      background:rgba(61,220,132,.13);
      border-color:rgba(61,220,132,.22);
    }

    .top-icon-btn svg{
      width:17px;
      height:17px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
    }

    .hero-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
      margin-bottom:7px;
    }

    .page-title{
      font-size:16px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.15;
      margin-bottom:2px;
    }

    .page-sub{
      color:var(--muted);
      font-size:10.5px;
      line-height:1.35;
    }

    .mode-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:950;
      border:1px solid rgba(76,201,255,.22);
      background:rgba(76,201,255,.13);
      color:var(--text);
      white-space:nowrap;
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-bottom:7px;
    }

    .action-btn{
      border:none;
      border-radius:11px;
      padding:8px 9px;
      font-size:11px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      min-height:34px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
      min-width:0;
    }

    .action-btn svg{
      width:15px;
      height:15px;
      display:block;
      flex-shrink:0;
    }

    .btn-green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.22)}
    .btn-purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.22)}
    .btn-yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.22)}
    .btn-blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.22)}

    .action-btn:disabled{opacity:.65;cursor:not-allowed}

    .meta-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      font-size:10.6px;
      color:var(--muted);
      line-height:1.35;
      padding:1px 2px 0;
    }

    .meta-row strong{color:var(--text);font-weight:950}

    .status-text{
      min-height:0;
      font-size:11px;
      margin-top:5px;
      line-height:1.35;
      color:var(--muted);
    }

    .status-text:not(:empty){min-height:15px}
    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:5px;
      margin-bottom:7px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:11px;
      padding:7px 4px;
      min-height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:10.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:7px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:10px 39px 10px 11px;
      border-radius:13px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:12.5px;
      min-height:38px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:5px;
      top:50%;
      transform:translateY(-50%);
      width:29px;
      height:29px;
      border:none;
      border-radius:9px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:950;
      line-height:1;
    }

    .filter-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:7px;
    }

    .filter-chip{
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      border-radius:999px;
      padding:5px 7px;
      font-size:9.8px;
      font-weight:950;
      line-height:1;
    }

    .filter-chip.green{background:rgba(61,220,132,.12);border-color:rgba(61,220,132,.20)}
    .filter-chip.purple{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.20)}
    .filter-chip.yellow{background:rgba(245,185,66,.12);border-color:rgba(245,185,66,.20)}

    .list{display:grid;gap:6px}

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:18px 8px;
      background:var(--surface-2);
      border-radius:14px;
      border:1px dashed var(--line);
      font-size:12.5px;
      line-height:1.45;
    }

    .event-tile{
      display:block;
      text-decoration:none;
      color:inherit;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      overflow:hidden;
      box-shadow:var(--soft-shadow);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .event-tile:hover{
      background:var(--surface-3);
      border-color:rgba(76,201,255,.26);
    }

    .event-tile:active{transform:scale(.992)}

    .event-card{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:0;
    }

    .event-thumb,
    .event-thumb-placeholder{
      width:46px;
      height:46px;
      border-radius:14px;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }

    .event-thumb{object-fit:cover}

    .event-thumb-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      font-size:19px;
      font-weight:950;
      background:
        radial-gradient(circle at 24% 20%, rgba(76,201,255,.22), transparent 36%),
        linear-gradient(135deg, rgba(167,139,250,.14), rgba(61,220,132,.10)),
        var(--surface-3);
    }

    .event-body{min-width:0;flex:1}

    .event-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:7px;
      min-width:0;
    }

    .event-main{min-width:0;flex:1}

    .event-title{
      font-size:13px;
      font-weight:950;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .event-date{
      font-size:10.8px;
      color:var(--blue);
      font-weight:900;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .event-meta{
      font-size:10.8px;
      color:var(--muted);
      line-height:1.35;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .event-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid rgba(167,139,250,.20);
      background:rgba(167,139,250,.13);
      color:var(--text);
      flex-shrink:0;
      white-space:nowrap;
      max-width:88px;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
    }

    .event-pill.green{background:rgba(61,220,132,.13);border-color:rgba(61,220,132,.20)}
    .event-pill.red{background:rgba(255,93,115,.13);border-color:rgba(255,93,115,.20)}
    .event-pill.blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .event-pill.yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.13);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:17px;
      height:17px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:9px;
      font-weight:950;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    .nav-badge.show{display:flex}

    @media(max-width:700px){
      body{padding:6px 6px 82px}
      .event-meta{white-space:normal;overflow:visible;text-overflow:clip}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
      .nav-badge{right:8px}
    }

    @media(max-width:420px){
      .top-actions{grid-template-columns:1fr 1fr}
      .action-btn{font-size:10.5px;padding:7px 7px}
      .tab-link{font-size:9.7px;padding:6px 3px}
      .event-pill{max-width:76px;font-size:9px}
      .meta-row{grid-template-columns:1fr;font-size:10.4px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby events</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh events">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-row">
        <div>
          <div class="page-title">Nearby Events</div>
          <div class="page-sub">Search by event, city, province, country or category.</div>
        </div>
        <div id="modePill" class="mode-pill">City Mode</div>
      </div>

      <div class="top-actions">
        <button id="gpsToggleBtn" class="action-btn btn-yellow" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span id="gpsBtnText">GPS Off</span>
        </button>

        <a href="create-event.html" class="action-btn btn-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Create Event</span>
        </a>
      </div>

      <div class="meta-row">
        <div id="smallLocationText">Location: -</div>
        <div id="smallCountText"><strong>Events:</strong> 0</div>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link" data-nearby-tab="people">People</a>
        <a href="nearby-events.html" class="tab-link active" data-nearby-tab="events">Events</a>
        <a href="nearby-places.html" class="tab-link" data-nearby-tab="places">Places</a>
        <a href="nearby-communities.html" class="tab-link" data-nearby-tab="communities">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search event, city, province, country..." />
        <button id="clearBtn" class="clear-btn hidden" type="button" aria-label="Clear search">×</button>
      </div>

      <div class="filter-row">
        <span id="searchChip" class="filter-chip">Search: off</span>
        <span id="gpsChip" class="filter-chip yellow">GPS: off</span>
        <span id="scopeChip" class="filter-chip purple">Scope: city</span>
      </div>

      <div id="listLoading" class="loading-box">Loading events...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span id="inboxBadge" class="nav-badge">0</span>
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const inboxBadge = document.getElementById("inboxBadge");
    const gpsToggleBtn = document.getElementById("gpsToggleBtn");
    const gpsBtnText = document.getElementById("gpsBtnText");
    const pageStatus = document.getElementById("pageStatus");
    const modePill = document.getElementById("modePill");
    const smallLocationText = document.getElementById("smallLocationText");
    const smallCountText = document.getElementById("smallCountText");
    const searchChip = document.getElementById("searchChip");
    const gpsChip = document.getElementById("gpsChip");
    const scopeChip = document.getElementById("scopeChip");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let eventsData = [];
    let memberMap = new Map();

    let liveChannels = [];
    let badgeRefreshTimer = null;
    let fullRefreshTimer = null;

    rememberNearbyTab();

    function rememberNearbyTab() {
      try {
        localStorage.setItem("ownspace_nearby_tab", "events");
        localStorage.setItem("ownspace_nearby_last_tab", "events");
      } catch {}
    }

    document.querySelectorAll("[data-nearby-tab]").forEach(link => {
      link.addEventListener("click", () => {
        try {
          localStorage.setItem("ownspace_nearby_tab", link.dataset.nearbyTab || "events");
          localStorage.setItem("ownspace_nearby_last_tab", link.dataset.nearbyTab || "events");
        } catch {}
      });
    });

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];

        if (value != null && String(value).trim()) {
          return String(value).trim();
        }
      }

      return fallback;
    }

    function nowIso() {

    function getCreatedMs(value) {
      if (!value) return 0;

      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : 0;

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeLocationVisibility(value) {
      const v = normalizeText(value);

      if (v === "gps") return "approximate";

    function normalizeNearbyMode(rawMode, rawLocationVisibility) {
      const mode = normalizeText(rawMode);

      if (["city", "gps", "everywhere"].includes(mode)) return mode;
      if (visibility === "approximate") return "gps";

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || "");
      const province = titleText(d.province || d.state || d.region || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";

      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km`;
      return `${Math.round(distanceKm)} km`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      const locationVisibilityRaw = getField(d, ["location_visibility", "locationVisibility"]) || "city";
      const nearbyModeRaw = getField(d, ["nearby_discovery_mode", "nearbyDiscoveryMode", "nearby_mode", "nearbyMode"]);

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),
        city: getField(d, ["city", "location_city", "locationCity", "current_city", "currentCity"]),
        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),
        nearbyDiscoveryMode: normalizeNearbyMode(nearbyModeRaw, locationVisibilityRaw),
        locationVisibility: normalizeLocationVisibility(locationVisibilityRaw),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      const status = String(d.status || d.event_status || d.eventStatus || "").toLowerCase();
      const approvalStatus = String(d.approval_status || d.approvalStatus || d.review_status || d.reviewStatus || "").toLowerCase();
      const visibility = String(d.visibility || d.event_visibility || d.eventVisibility || "public").toLowerCase();

      return {
        id: d.id || fallbackId || "",
        title: getField(d, ["title", "name", "event_title", "eventTitle"]) || "Untitled Event",
        description: getField(d, ["description", "desc", "about", "details"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        locationSearch: buildLocationSearch(d),
        venue: getField(d, ["venue", "spot", "place_name", "placeName"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        date: getField(d, ["date", "event_date", "eventDate", "start_date", "startDate"]),
        time: getField(d, ["time", "event_time", "eventTime", "start_time", "startTime"]),
        startAt: d.start_at || d.event_at || d.startAt || d.eventAt || d.starts_at || d.startsAt || d.datetime || d.date_time || d.dateTime || null,
        visibility,
        approvalStatus,
        creatorId: getField(d, ["creator_id", "creatorId", "user_id", "userId", "uid", "created_by", "createdBy"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"]) || "Member",
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        category: getField(d, ["category", "topic", "type"]) || "Event",
        keywords: getField(d, ["keywords", "tags", "search_keywords", "searchKeywords"]),
        status,
        cancelled: status === "cancelled" || status === "canceled" || d.cancelled === true || d.canceled === true,
        rejected: status === "rejected" || status === "declined" || approvalStatus === "rejected" || approvalStatus === "declined",
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted) || status === "deleted" || status === "removed",
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function normalizeMessage(raw, fallbackId = "") {
      const d = raw || {};
      const seenValue = d.seen_at ?? d.read_at ?? d.seenAt ?? d.readAt ?? null;
      const readValue = d.is_read ?? d.read ?? d.isRead ?? null;

      return {
        id: d.id || fallbackId || "",
        threadId: getField(d, ["thread_id", "threadId"]),
        senderId: getField(d, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        createdAt: d.created_at ?? d.createdAt ?? null,
        seenValue,
        readValue,
        hasSeenColumn:
          Object.prototype.hasOwnProperty.call(d, "seen_at") ||
          Object.prototype.hasOwnProperty.call(d, "read_at") ||
          Object.prototype.hasOwnProperty.call(d, "seenAt") ||
          Object.prototype.hasOwnProperty.call(d, "readAt"),
        hasReadColumn:
          Object.prototype.hasOwnProperty.call(d, "is_read") ||
          Object.prototype.hasOwnProperty.call(d, "read") ||
          Object.prototype.hasOwnProperty.call(d, "isRead")
      };
    }

    function isMessageUnread(msg) {
      if (!msg || msg.senderId === currentUser.id) return false;

      if (msg.hasReadColumn) {
        if (msg.readValue === true) return false;
        if (msg.readValue === false) return true;
      }

      if (msg.hasSeenColumn) {
        return !msg.seenValue;
      }

      return false;
    }

    function parseEventDateTime(dateStr, timeStr, startAt = null) {
      if (startAt) {
        const direct = new Date(startAt);
        if (!Number.isNaN(direct.getTime())) return direct;
      }

      const dateRaw = String(dateStr || "").trim();

      if (!dateRaw) return null;

      let year;
      let month;
      let day;

      const iso = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);

      if (iso) {
        year = Number(iso[1]);
        month = Number(iso[2]) - 1;
        day = Number(iso[3]);
      } else {
        const parsed = new Date(dateRaw);

        if (Number.isNaN(parsed.getTime())) return null;

        year = parsed.getFullYear();
        month = parsed.getMonth();
        day = parsed.getDate();
      }

      let hour = 23;
      let minute = 59;
      const timeRaw = String(timeStr || "").trim().toLowerCase();

      if (timeRaw) {
        let match = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);

        if (match) {
          hour = Number(match[1]) % 12;
          minute = Number(match[2]);
          if (match[3] === "pm") hour += 12;
        } else {
          match = timeRaw.match(/^(\d{1,2})\s*(am|pm)$/);

          if (match) {
            hour = Number(match[1]) % 12;
            minute = 0;
            if (match[2] === "pm") hour += 12;
          } else {
            match = timeRaw.match(/^(\d{1,2}):(\d{2})$/);

            if (match) {
              hour = Number(match[1]);
              minute = Number(match[2]);
            }
          }
        }
      }

      return new Date(year, month, day, hour, minute, 0, 0);
    }

    function isExpired(model) {
      const dt = parseEventDateTime(model.date, model.time, model.startAt);
      return dt ? Date.now() > dt.getTime() : false;
    }

    function eventTimeMs(model) {
      const dt = parseEventDateTime(model.date, model.time, model.startAt);
      return dt ? dt.getTime() : Number.MAX_SAFE_INTEGER;
    }

    function formatEventDate(model) {
      const dt = parseEventDateTime(model.date, model.time, model.startAt);

      if (dt) {
        try {
          return dt.toLocaleDateString([], {
            month: "short",
            day: "numeric",
            year: dt.getFullYear() === new Date().getFullYear() ? undefined : "numeric"
          });
        } catch {}
      }

      return model.date || "Date not added";
    }

    function isSchemaError(error) {
      const msg = String(error?.message || "").toLowerCase();

      return (
        msg.includes("schema cache") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        msg.includes("does not exist") ||
        msg.includes("relation")
      );
    }

    async function safeSelect(table, buildQuery) {
      try {
        let q = supabase.from(table).select("*");
        q = buildQuery ? buildQuery(q) : q;

        const { data, error } = await q;

        if (error) {
          if (!isSchemaError(error)) console.warn(`Skipped ${table}:`, error.message || error);
          return [];
        }

        return data || [];
      } catch (err) {
        console.warn(`Skipped ${table}:`, err?.message || err);
        return [];
      }
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase
          .from(table)
          .select("id", { count: "exact", head: true });

        const { count, error } = await buildQuery(query);

        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = [
        "target_id",
        "to_user_id",
        "receiver_id",
        "recipient_id",
        "targetId",
        "toUserId",
        "receiverId",
        "recipientId"
      ];

      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        try {
          const { data, error } = await supabase
            .from("message_requests")
            .select("*")
            .eq(targetColumn, uid);

          if (!error) {
            return (data || []).filter(row => {
              const status = getField(row, ["status", "request_status", "requestStatus"], "pending");
              return String(status || "pending").toLowerCase() === "pending";
            }).length;
          }
        } catch {}
      }

      return 0;
    }

    async function fetchChatThreadsForUser(uid) {
      const map = new Map();

      const attempts = [
        { a: "participant_a", b: "participant_b" },
        { a: "participantA", b: "participantB" }
      ];

      for (const fields of attempts) {
        try {
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${fields.a}.eq.${uid},${fields.b}.eq.${uid}`);

          if (!error && Array.isArray(data)) {
            data.forEach(row => {
              const status = normalizeText(getField(row, ["status"], "accepted"));
              if (row.id && status === "accepted") map.set(row.id, row);
            });
          }
        } catch {}
      }

      return Array.from(map.values());
    }

    async function fetchMessagesForThreads(threadIds) {
      if (!threadIds.length) return [];

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("thread_id", threadIds)
          .order("created_at", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      try {
        const { data, error } = await supabase
          .from("chat_messages")
          .select("*")
          .in("threadId", threadIds)
          .order("createdAt", { ascending: true });

        if (!error) return (data || []).map(row => normalizeMessage(row, row.id));
      } catch {}

      return [];
    }

    async function countUnreadChatMessages(uid) {
      try {
        const threads = await fetchChatThreadsForUser(uid);
        const threadIds = threads.map(t => t.id).filter(Boolean);

        if (!threadIds.length) return 0;

        const messages = await fetchMessagesForThreads(threadIds);
        const byThread = new Map();

        messages.forEach(msg => {
          if (!msg.threadId) return;
          if (!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
          byThread.get(msg.threadId).push(msg);
        });

        let total = 0;

        threads.forEach(thread => {
          const list = byThread.get(thread.id) || [];

          if (!list.length) return;

          const newest = [...list].sort((a, b) => getCreatedMs(b.createdAt) - getCreatedMs(a.createdAt))[0];

          if (newest?.senderId === uid) return;

          const lastOutgoingMs = list
            .filter(msg => msg.senderId === uid)
            .reduce((max, msg) => Math.max(max, getCreatedMs(msg.createdAt)), 0);

          const unreadInThread = list.filter(msg => {
            if (msg.senderId === uid) return false;
            if (getCreatedMs(msg.createdAt) <= lastOutgoingMs) return false;
            return isMessageUnread(msg);
          }).length;

          total += unreadInThread;
        });

        return total;
      } catch (err) {
        console.warn("Unread chat count failed:", err?.message || err);
        return 0;
      }
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.textContent = "0";
          inboxBadge.classList.remove("show");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.add("show");
        }
      } catch {
        inboxBadge.textContent = "0";
        inboxBadge.classList.remove("show");
      }
    }

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        {
          match: "uid",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            nearby_discovery_mode: "gps",
            updated_at: nowIso()
          }
        },
        {
          match: "id",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            nearby_discovery_mode: "gps",
            updated_at: nowIso()
          }
        },
        {
          match: "user_id",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            nearby_discovery_mode: "gps",
            updated_at: nowIso()
          }
        },
        {
          match: "userId",
          payload: {
            lat: coords.lat,
            lng: coords.lng,
            nearbyDiscoveryMode: "gps",
            updatedAt: nowIso()
          }
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS is not supported on this device.", "status-err");
        renderEvents();
        return;
      }

      gpsBtnText.textContent = "Checking...";
      gpsToggleBtn.disabled = true;
      setPageStatus("Checking browser location...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            setGpsUi(true);

            try {
              await Promise.allSettled([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;
              viewerProfile.nearbyDiscoveryMode = "gps";

              try {
                localStorage.setItem("ownspace_nearby_refresh", String(Date.now()));
              } catch {}

              setPageStatus("GPS On. Events with distance data are sorted closer first.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            setGpsUi(false);
            setPageStatus("GPS Off. Using saved profile location and search.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      gpsToggleBtn.disabled = false;
      renderEvents();
    }

    function toggleGps() {
      if (browserCoords) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS Off. Using saved location and search.", "status-ok");
        renderEvents();
        return;
      }

      requestBrowserLocation();
    }

    function flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country) {
      if (!viewerCity || !city) return false;
      if (viewerCity !== city) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;
      if (viewerProvince && province && viewerProvince !== province) return false;

      return true;
    }

    function flexibleSameProvince(viewerProvince, viewerCountry, province, country) {
      if (!viewerProvince || !province) return false;
      if (viewerProvince !== province) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;

      return true;
    }

    function renderViewerMeta(count = null) {
      if (!viewerProfile) return;

      const location = [viewerProfile.city, viewerProfile.province, viewerProfile.country]
        .map(titleText)
        .filter(Boolean)
        .join(", ");

      smallLocationText.textContent = location ? `Location: ${location}` : "Location: not set";

      if (count !== null) {
        smallCountText.innerHTML = `<strong>Events:</strong> ${count}`;
      }

      updateModeUi();
    }

    function buildBaseEventRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return eventsData
        .filter(model => !model.hidden && !model.cancelled && !model.rejected)
        .filter(model => model.id)
        .filter(model => model.visibility !== "private" || model.creatorId === currentUser.id || isJoined(model.id))
        .map(model => {
          const city = normalizeText(model.city);
          const province = normalizeText(model.province);
          const country = normalizeText(model.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = flexibleSameProvince(viewerProvince, viewerCountry, province, country);
          const sameCity = flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country);

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            model.lat !== null &&
            model.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng);
          }

          const searchable = [
            model.title,
            model.description,
            model.creatorName,
            model.category,
            model.venue,
            model.address,
            model.city,
            model.province,
            model.country,
            provinceAliases(model.province),
            countryAliases(model.country),
            model.keywords,
            model.locationSearch
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          const mine = model.creatorId === currentUser.id;
          const joined = isJoined(model.id);
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...model,
            sameCountry,
            sameProvince,
            sameCity,
            withinGpsRange,
            distanceKm,
            mine,
            joined,
            expired: isExpired(model),
            distanceLabel: distanceKm !== null ? formatDistance(distanceKm) : "",
            placeLabel: [model.city, model.province, model.country].filter(Boolean).join(", "),
            searchable
          };
        });
    }

    function buildNearbyEvents() {
      const q = normalizeText(searchInput.value);
      const mode = currentMode();

      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      let rows = buildBaseEventRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (mode === "gps" || browserCoords) {
        rows = rows.filter(row => row.mine || row.joined || row.withinGpsRange || row.sameCity || row.sameProvince || row.sameCountry);
      } else if (mode === "everywhere") {
        rows = rows;
      } else if (viewerHasSavedLocation) {
        rows = rows.filter(row => row.mine || row.joined || row.sameCity || row.sameProvince || row.sameCountry);
      } else {
        rows = rows.filter(row => row.mine || row.joined);
      }

      rows.sort((a, b) => {
        if (a.mine && !b.mine) return -1;
        if (b.mine && !a.mine) return 1;

        if (a.joined && !b.joined) return -1;
        if (b.joined && !a.joined) return 1;

        if (a.expired !== b.expired) return a.expired ? 1 : -1;

        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        if (a.sameCountry && !b.sameCountry) return -1;
        if (b.sameCountry && !a.sameCountry) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        return eventTimeMs(a) - eventTimeMs(b);
      });

      return rows;
    }

    function renderEvents() {
      openLoading();

      const q = normalizeText(searchInput.value);

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const rows = buildNearbyEvents();

      if (!rows.length) {
        if (q) {
          showEmpty("No matching events found. Try another city, province, country or event title.");
        } else if (browserCoords) {
          showEmpty("No nearby events found with GPS. Try search or create a new event.");
        } else if (!viewerHasLocation) {
          showEmpty("Add your city/province/country, turn GPS on, or search by city/country/event name.");
        } else {
          showEmpty("No events found near your saved location. Search can still find events from other cities.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const openUrl = `event.html?eventId=${encodeURIComponent(model.id)}`;
        const dateLabel = formatEventDate(model);
        const locationText = model.placeLabel || "Location not added";
        const distanceText = model.distanceLabel ? `${model.distanceLabel} away` : "";
        const rightPillText = model.expired ? "Expired" : model.distanceLabel ? model.distanceLabel : model.joined ? "Joined" : model.mine ? "Mine" : "Upcoming";
        const rightPillClass = model.expired ? "red" : model.joined ? "green" : model.mine ? "blue" : "";

        const imageHtml = model.imageURL
          ? `<img class="event-thumb" src="${escapeHtml(model.imageURL)}" alt="Event image">`
          : `<div class="event-thumb-placeholder">${escapeHtml((model.title || "E").charAt(0).toUpperCase())}</div>`;

        const tile = document.createElement("a");
        tile.className = "event-tile";
        tile.href = openUrl;

        tile.innerHTML = `
          <div class="event-card">
            ${imageHtml}

            <div class="event-body">
              <div class="event-head">
                <div class="event-main">
                  <div class="event-title">${escapeHtml(model.title)}</div>
                  <div class="event-date">${escapeHtml(dateLabel)}</div>
                  <div class="event-meta">${escapeHtml([locationText, distanceText].filter(Boolean).join(" • "))}</div>
                </div>

                <span class="event-pill ${rightPillClass}">${escapeHtml(rightPillText)}</span>
              </div>
            </div>
          </div>
        `;

        const img = tile.querySelector(".event-thumb");

        if (img) {
          img.addEventListener("error", () => {
            img.outerHTML = `<div class="event-thumb-placeholder">${escapeHtml((model.title || "E").charAt(0).toUpperCase())}</div>`;
          });
        }

        listWrap.appendChild(tile);
      });

      showList(rows.length);
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);

      renderViewerMeta(0);
    }

    async function loadEvents() {
      const rows = await safeSelect("events");
      eventsData = (rows || []).map(row => normalizeEvent(row, row.id));
    }

    async function loadJoinedState() {
      memberMap = new Map();

      const attempts = [
        ["user_id", "event_id"],
        ["userId", "eventId"]
      ];

      for (const [userColumn, eventColumn] of attempts) {
        try {
          const { data, error } = await supabase
            .from("event_members")
            .select("*")
            .eq(userColumn, currentUser.id);

          if (error) throw error;

          (data || []).forEach(row => {
            const eventId = row[eventColumn] || row.event_id || row.eventId;
            const status = normalizeText(row.status || row.member_status || row.memberStatus || "active");

            if (!eventId) return;
            if (["removed", "left", "declined", "rejected", "banned"].includes(status)) return;

            memberMap.set(eventId, true);
          });

          return;
        } catch (err) {
          console.warn("event_members load attempt skipped:", err?.message || err);
        }
      }
    }

    async function refreshAll(showOk = false) {
      openLoading();

      await Promise.all([
        loadEvents(),
        loadJoinedState(),
        loadInboxBadge()
      ]);

      renderEvents();

      if (showOk) setPageStatus("Events refreshed.", "status-ok");
    }

    function clearLiveListeners() {
      liveChannels.forEach(ch => {
        try {
          supabase.removeChannel(ch);
        } catch {}
      });

      liveChannels = [];
    }

    function scheduleBadgeRefresh(delay = 350) {
      clearTimeout(badgeRefreshTimer);

      badgeRefreshTimer = setTimeout(() => {
        loadInboxBadge().catch(() => {});
      }, delay);
    }

    function scheduleFullRefresh(delay = 450) {
      clearTimeout(fullRefreshTimer);

      fullRefreshTimer = setTimeout(() => {
        refreshAll(false).catch(err => console.error("Events refresh failed:", err));
      }, delay);
    }

    function setupRealtime() {
      clearLiveListeners();

      ["events", "event_members"].forEach(table => {
        const channel = supabase
          .channel(`ownspace-nearby-events-live-${table}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table },
            () => scheduleFullRefresh()
          )
          .subscribe();

        liveChannels.push(channel);
      });

      ["message_requests", "chat_threads", "chat_messages"].forEach(table => {
        const channel = supabase
          .channel(`ownspace-nearby-events-badge-${table}-${Math.random().toString(36).slice(2)}`)
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table },
            () => scheduleBadgeRefresh()
          )
          .subscribe();

        liveChannels.push(channel);
      });
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderEvents();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderEvents();
    });

    gpsToggleBtn.addEventListener("click", toggleGps);

    refreshBtn.addEventListener("click", async () => {
      refreshBtn.disabled = true;
      setPageStatus("Refreshing events...", "");

      try {
        await refreshAll(true);
      } catch (err) {
        console.error(err);
        setPageStatus("Could not refresh events.", "status-err");
      }

      refreshBtn.disabled = false;
    });

    backBtn.addEventListener("click", () => {
      rememberNearbyTab();

      if (document.referrer) history.back();
      else window.location.href = "nearby.html";
    });

    window.addEventListener("pageshow", () => {
      scheduleBadgeRefresh(120);
      scheduleFullRefresh(250);
    });

    window.addEventListener("focus", () => {
      scheduleBadgeRefresh(180);
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        scheduleBadgeRefresh(160);
      }
    });

    window.addEventListener("ownspace:badges-refresh", () => scheduleBadgeRefresh(120));
    window.addEventListener("ownspace:inbox-refresh", () => scheduleBadgeRefresh(120));
    window.addEventListener("ownspace:chat-read-refresh", () => scheduleBadgeRefresh(120));

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        clearLiveListeners();
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        setGpsUi(false);
        await loadViewer(currentUser.id);
        await refreshAll(false);
        setupRealtime();

        supabase.auth.onAuthStateChange((_event, session) => {
          if (!session?.user) {
            clearLiveListeners();
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load events.");
      }
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(badgeRefreshTimer);
      clearTimeout(fullRefreshTimer);
      clearLiveListeners();
    });

    initPage();

    /*
      OWNSPACE NEARBY EVENTS UPDATE:

      FIXED:
      - Matched Nearby People / Nearby Places compact margins and sizing.
      - Added hero title row with City/GPS/Everywhere mode pill.
      - Added Search / GPS / Scope chips under search.
      - Reduced topbar, panel, buttons, tabs, cards, and bottom nav height.
      - Fixed bottom inbox badge to count only message requests + unread chat messages.
      - Removed general notifications from inbox badge realtime logic.
      - Kept Create Event, GPS sorting, search, event_members joined state, and realtime refresh.
      - Kept light theme default with dark theme support.
      - Tabs now match the compact Nearby page style.
    */
  </script>
</body>
