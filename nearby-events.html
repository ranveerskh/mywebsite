<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Nearby Events</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(61,220,132,.08), transparent 24%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:8px 8px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      flex-shrink:0;
      position:relative;
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 10px;
      font-size:13px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      cursor:pointer;
      min-height:46px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      white-space:nowrap;
      min-width:0;
    }

    .action-btn svg{
      width:16px;
      height:16px;
      display:block;
      flex-shrink:0;
    }

    .btn-primary{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.22)}
    .btn-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.22)}
    .btn-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.22)}
    .btn-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.22)}
    .btn-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.22)}
    .btn-soft{background:var(--surface-3);border-color:var(--line)}

    .action-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .status-text{
      min-height:18px;
      font-size:12.5px;
      margin-top:8px;
      line-height:1.45;
      color:var(--muted);
    }

    .status-ok{color:#22b36c}
    .status-err{color:#e74c66}
    html[data-theme="dark"] .status-ok{color:#9cf0bf}
    html[data-theme="dark"] .status-err{color:#ffb3bd}

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin-bottom:10px;
    }

    .tab-link{
      text-decoration:none;
      color:var(--text);
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px 5px;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:11.5px;
      font-weight:950;
      white-space:nowrap;
    }

    .tab-link.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 44px 13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
    }

    .search-box::placeholder{color:var(--muted)}

    .clear-btn{
      position:absolute;
      right:7px;
      top:50%;
      transform:translateY(-50%);
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:950;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .loading-box,
    .empty-box{
      text-align:center;
      color:var(--muted);
      padding:22px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      overflow:hidden;
    }

    .cover{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:16px;
      display:block;
      background:var(--surface-3);
      border:1px solid var(--line);
      margin-bottom:10px;
    }

    .card-title{
      font-size:16px;
      font-weight:950;
      line-height:1.35;
      margin-bottom:8px;
      word-break:break-word;
    }

    .badge-row{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
      white-space:nowrap;
    }

    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .mini-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .meta-grid{
      display:grid;
      gap:6px;
      color:var(--text);
      font-size:13px;
      line-height:1.52;
      margin-bottom:10px;
    }

    .desc{
      color:var(--text);
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      word-break:break-word;
      margin-bottom:12px;
    }

    .card-actions{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:10px;
      align-items:center;
    }

    .share-btn{
      margin-left:auto;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:20px;
      height:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:20px;
      height:20px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:5px;
      right:10px;
      min-width:17px;
      height:17px;
      padding:0 4px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      font-size:10px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      border:2px solid var(--nav-bg);
    }

    @media (max-width:700px){
      .brand{font-size:17px}

      .top-actions{
        grid-template-columns:1fr 1fr;
        gap:8px;
      }

      .action-btn{
        font-size:12.5px;
        padding:10px 8px;
        min-height:44px;
      }

      .tabs{
        grid-template-columns:repeat(4,1fr);
        gap:6px;
      }

      .tab-link{
        font-size:10.5px;
        padding:8px 3px;
      }

      .share-btn{margin-left:0}

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }

    @media(max-width:390px){
      .action-btn{
        font-size:11.5px;
        padding:9px 6px;
        gap:5px;
      }

      .action-btn svg{
        width:15px;
        height:15px;
      }

      .tab-link{font-size:9.8px}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="topGpsBtn" class="top-icon-btn" type="button" aria-label="Toggle GPS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Nearby events</div>
      </div>

      <a href="settings.html" class="top-icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2.05 2.05 0 0 1-2.9 2.9l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .56 1.7 1.7 0 0 0-.4 1.04V21a2.05 2.05 0 0 1-4.1 0v-.06a1.7 1.7 0 0 0-.4-1.04 1.7 1.7 0 0 0-1-.56 1.7 1.7 0 0 0-1.84.38l-.04.04a2.05 2.05 0 0 1-2.9-2.9l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.56-1 1.7 1.7 0 0 0-1.04-.4H3a2.05 2.05 0 0 1 0-4.1h.06a1.7 1.7 0 0 0 1.04-.4 1.7 1.7 0 0 0 .56-1 1.7 1.7 0 0 0-.38-1.84l-.04-.04a2.05 2.05 0 0 1 2.9-2.9l.04.04A1.7 1.7 0 0 0 9 4.6c.38-.08.74-.27 1-.56.26-.29.4-.66.4-1.04V3a2.05 2.05 0 0 1 4.1 0v.06c0 .38.14.75.4 1.04.26.29.62.48 1 .56a1.7 1.7 0 0 0 1.84-.38l.04-.04a2.05 2.05 0 0 1 2.9 2.9l-.04.04A1.7 1.7 0 0 0 19.4 9c.08.38.27.74.56 1 .29.26.66.4 1.04.4H21a2.05 2.05 0 0 1 0 4.1h-.06c-.38 0-.75.14-1.04.4-.29.26-.48.62-.5 1.1z"></path>
        </svg>
      </a>
    </div>

    <div class="panel">
      <div class="top-actions">
        <button id="gpsToggleBtn" class="action-btn btn-yellow" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
          </svg>
          <span id="gpsBtnText">GPS Off</span>
        </button>

        <a href="create-event.html" class="action-btn btn-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>Create Event</span>
        </a>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <a href="nearby.html" class="tab-link">People</a>
        <a href="nearby-events.html" class="tab-link active">Events</a>
        <a href="nearby-places.html" class="tab-link">Places</a>
        <a href="communities.html" class="tab-link">Community</a>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search-box" type="text" placeholder="Search event, city, province, country, venue..." />
        <button id="clearBtn" class="clear-btn hidden" type="button">×</button>
      </div>

      <div id="listLoading" class="loading-box">Loading events...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No events found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
      <span id="inboxBadge" class="nav-badge hidden">0</span>
    </a>

    <a href="profile.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const inboxBadge = document.getElementById("inboxBadge");
    const topGpsBtn = document.getElementById("topGpsBtn");
    const gpsToggleBtn = document.getElementById("gpsToggleBtn");
    const gpsBtnText = document.getElementById("gpsBtnText");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let browserCoords = null;
    let eventsData = [];
    let memberMap = new Map();
    let memberRowMap = new Map();

    const ICONS = {
      open: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      `,
      share: `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="m8.6 13.5 6.8 4"></path>
          <path d="m15.4 6.5-6.8 4"></path>
        </svg>
      `
    };

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function setGpsUi(isOn) {
      if (isOn) {
        gpsBtnText.textContent = "GPS On";
        gpsToggleBtn.className = "action-btn btn-green";
      } else {
        gpsBtnText.textContent = "GPS Off";
        gpsToggleBtn.className = "action-btn btn-yellow";
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function titleText(value) {
      return String(value || "").trim();
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function getField(raw, names) {
      for (const name of names) {
        const value = raw?.[name];
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function countryAliases(country) {
      const c = normalizeText(country);
      if (!c) return "";

      const aliases = [c];

      if (c === "united states") aliases.push("usa", "us", "america");
      if (c === "united kingdom") aliases.push("uk", "britain", "england");
      if (c === "canada") aliases.push("ca");
      if (c === "india") aliases.push("bharat", "hindustan");

      return aliases.join(" ");
    }

    function provinceAliases(province) {
      const p = normalizeText(province);
      if (!p) return "";

      const aliases = [p];

      if (p === "ontario") aliases.push("on", "ont");
      if (p === "british columbia") aliases.push("bc", "b.c.");
      if (p === "alberta") aliases.push("ab");
      if (p === "quebec") aliases.push("qc");
      if (p === "manitoba") aliases.push("mb");
      if (p === "saskatchewan") aliases.push("sk");
      if (p === "nova scotia") aliases.push("ns");
      if (p === "new brunswick") aliases.push("nb");
      if (p === "newfoundland and labrador") aliases.push("nl");
      if (p === "prince edward island") aliases.push("pei", "pe");
      if (p === "yukon") aliases.push("yt");

      return aliases.join(" ");
    }

    function buildLocationSearch(d) {
      const existing = titleText(d.location_search || d.locationSearch);
      const city = titleText(d.city || d.location_city || d.locationCity || "");
      const province = titleText(d.province || d.state || d.region || "");
      const country = titleText(d.country || d.location_country || d.locationCountry || "");

      return [
        existing,
        city,
        province,
        country,
        provinceAliases(province),
        countryAliases(country)
      ]
        .filter(Boolean)
        .join(" ")
        .trim()
        .toLowerCase();
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};

      return {
        uid: d.uid || d.id || d.user_id || d.userId || fallbackUid || "",
        displayName: getField(d, ["display_name", "displayName", "name", "fullName", "full_name", "username"]) || "Member",
        username: getField(d, ["username", "handle", "userName", "user_name"]),

        province: getField(d, ["province", "state", "region", "location_province", "locationProvince", "current_province", "currentProvince"]),
        country: getField(d, ["country", "location_country", "locationCountry", "current_country", "currentCountry"]),

      };

    function normalizeEvent(raw, fallbackId = "") {
      const d = raw || {};
      const status = String(d.status || d.event_status || d.eventStatus || "").toLowerCase();

      return {
        id: d.id || fallbackId || "",
        title: getField(d, ["title", "name", "event_title", "eventTitle"]) || "Untitled Event",
        description: getField(d, ["description", "desc", "about", "details"]),
        city: getField(d, ["city", "location_city", "locationCity"]),
        province: getField(d, ["province", "state", "region"]),
        country: getField(d, ["country", "location_country", "locationCountry"]),
        locationSearch: buildLocationSearch(d),
        venue: getField(d, ["venue", "spot", "place_name", "placeName"]),
        address: getField(d, ["address", "full_address", "fullAddress"]),
        date: getField(d, ["date", "event_date", "eventDate", "start_date", "startDate"]),
        time: getField(d, ["time", "event_time", "eventTime", "start_time", "startTime"]),
        startAt: d.start_at || d.startAt || d.starts_at || d.startsAt || d.datetime || d.date_time || d.dateTime || null,
        visibility: getField(d, ["visibility", "event_visibility", "eventVisibility"]) || "public",
        creatorId: getField(d, ["creator_id", "creatorId", "user_id", "userId", "uid", "created_by", "createdBy"]),
        creatorName: getField(d, ["creator_name", "creatorName", "display_name", "displayName", "host_name", "hostName"]) || "Member",
        imageURL: getField(d, ["image_url", "imageURL", "imageUrl", "photo_url", "photoURL", "media_url", "mediaUrl"]),
        category: getField(d, ["category", "topic", "type"]) || "Event",
        keywords: getField(d, ["keywords", "tags", "search_keywords", "searchKeywords"]),
        status,
        cancelled: status === "cancelled" || status === "canceled" || d.cancelled === true || d.canceled === true,
        hidden: !!(d.hidden || d.hidden_by_admin || d.hiddenByAdmin || d.soft_deleted || d.softDeleted),
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function parseEventDateTime(dateStr, timeStr, startAt = null) {
      if (startAt) {
        const direct = new Date(startAt);
        if (!Number.isNaN(direct.getTime())) return direct;
      }

      const dateRaw = String(dateStr || "").trim();
      if (!dateRaw) return null;

      let year;
      let month;
      let day;

      const iso = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);

      if (iso) {
        year = Number(iso[1]);
        month = Number(iso[2]) - 1;
        day = Number(iso[3]);
      } else {
        const parsed = new Date(dateRaw);
        if (Number.isNaN(parsed.getTime())) return null;

        year = parsed.getFullYear();
        month = parsed.getMonth();
        day = parsed.getDate();
      }

      let hour = 23;
      let minute = 59;
      const timeRaw = String(timeStr || "").trim().toLowerCase();

      if (timeRaw) {
        let match = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);

        if (match) {
          hour = Number(match[1]) % 12;
          minute = Number(match[2]);
          if (match[3] === "pm") hour += 12;
        } else {
          match = timeRaw.match(/^(\d{1,2})\s*(am|pm)$/);

          if (match) {
            hour = Number(match[1]) % 12;
            minute = 0;
            if (match[2] === "pm") hour += 12;
          } else {
            match = timeRaw.match(/^(\d{1,2}):(\d{2})$/);

            if (match) {
              hour = Number(match[1]);
              minute = Number(match[2]);
            }
          }
        }
      }

      return new Date(year, month, day, hour, minute, 0, 0);
    }

    function isExpired(model) {
      const dt = parseEventDateTime(model.date, model.time, model.startAt);
      return dt ? Date.now() > dt.getTime() : false;
    }

    function eventTimeMs(model) {
      const dt = parseEventDateTime(model.date, model.time, model.startAt);
      return dt ? dt.getTime() : Number.MAX_SAFE_INTEGER;
    }

    async function countRows(table, buildQuery) {
      try {
        const query = supabase.from(table).select("id", { count: "exact", head: true });
        const { count, error } = await buildQuery(query);
        if (!error) return count || 0;
      } catch {}

      return null;
    }

    async function countPendingMessageRequests(uid) {
      const targetColumns = ["target_id", "to_user_id", "receiver_id", "recipient_id", "targetId", "toUserId"];
      const statusColumns = ["status", "request_status", "requestStatus"];

      for (const targetColumn of targetColumns) {
        for (const statusColumn of statusColumns) {
          const count = await countRows("message_requests", q =>
            q.eq(targetColumn, uid).eq(statusColumn, "pending")
          );

          if (count !== null) return count;
        }

        const countWithoutStatus = await countRows("message_requests", q =>
          q.eq(targetColumn, uid)
        );

        if (countWithoutStatus !== null) return countWithoutStatus;
      }

      return 0;
    }

    async function countUnreadChatMessages(uid) {
      try {
        const { data: threads } = await supabase
          .from("chat_threads")
          .select("id")
          .or(`participant_a.eq.${uid},participant_b.eq.${uid}`);

        if (!Array.isArray(threads) || !threads.length) return 0;

        const threadIds = threads.map(t => t.id).filter(Boolean);
        if (!threadIds.length) return 0;

        const seenFields = ["seen_at", "read_at", "seenAt", "readAt"];

        for (const field of seenFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .is(field, null);

            if (!error) return count || 0;
          } catch {}
        }

        const boolFields = ["is_read", "read"];

        for (const field of boolFields) {
          try {
            const { count, error } = await supabase
              .from("chat_messages")
              .select("id", { count: "exact", head: true })
              .in("thread_id", threadIds)
              .neq("sender_id", uid)
              .eq(field, false);

            if (!error) return count || 0;
          } catch {}
        }
      } catch {}

      return 0;
    }

    async function loadInboxBadge() {
      if (!currentUser) return;

      try {
        const [requests, unreadMessages] = await Promise.all([
          countPendingMessageRequests(currentUser.id),
          countUnreadChatMessages(currentUser.id)
        ]);

        const total = Number(requests || 0) + Number(unreadMessages || 0);

        if (!total) {
          inboxBadge.classList.add("hidden");
        } else {
          inboxBadge.textContent = total > 99 ? "99+" : String(total);
          inboxBadge.classList.remove("hidden");
        }
      } catch {
        inboxBadge.classList.add("hidden");
      }
    }

    async function updateCoordsInTable(table, uid, coords) {
      const variants = [
        { match: "uid", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "user_id", payload: { lat: coords.lat, lng: coords.lng, updated_at: nowIso() } },
        { match: "userId", payload: { lat: coords.lat, lng: coords.lng, updatedAt: nowIso() } }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase
            .from(table)
            .update(item.payload)
            .eq(item.match, uid);

          if (!error) return true;
        } catch {}
      }

      return false;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS is not supported on this device.", "status-err");
        renderEvents();
        return;
      }

      gpsBtnText.textContent = "Checking...";
      gpsToggleBtn.disabled = true;
      setPageStatus("Checking browser location...", "");

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            setGpsUi(true);

            try {
              await Promise.all([
                updateCoordsInTable("users", currentUser.id, browserCoords),
                updateCoordsInTable("public_profiles", currentUser.id, browserCoords)
              ]);

              viewerProfile.lat = browserCoords.lat;
              viewerProfile.lng = browserCoords.lng;

              setPageStatus("GPS On. Events with distance data are sorted closer first.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("GPS worked, but saved location could not be updated.", "status-err");
            }

            resolve();
          },
          () => {
            browserCoords = null;
            setGpsUi(false);
            setPageStatus("GPS Off. Using saved profile location and search.", "status-err");
            resolve();
          },
          {
            enableHighAccuracy: false,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      });

      gpsToggleBtn.disabled = false;
      renderEvents();
    }

    function toggleGps() {
      if (browserCoords) {
        browserCoords = null;
        setGpsUi(false);
        setPageStatus("GPS Off. Using saved location and search.", "status-ok");
        renderEvents();
        return;
      }

      requestBrowserLocation();
    }

    function isJoined(eventId) {
      return memberMap.has(eventId) && memberMap.get(eventId) === true;
    }

    function getViewerCoords() {
      return {
        lat: browserCoords?.lat ?? viewerProfile?.lat ?? null,
        lng: browserCoords?.lng ?? viewerProfile?.lng ?? null
      };
    }

    function flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country) {
      if (!viewerCity || !city) return false;
      if (viewerCity !== city) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;
      if (viewerProvince && province && viewerProvince !== province) return false;

      return true;
    }

    function flexibleSameProvince(viewerProvince, viewerCountry, province, country) {
      if (!viewerProvince || !province) return false;
      if (viewerProvince !== province) return false;

      if (viewerCountry && country && viewerCountry !== country) return false;

      return true;
    }

    function buildBaseEventRows() {
      const viewerCity = normalizeText(viewerProfile?.city);
      const viewerProvince = normalizeText(viewerProfile?.province);
      const viewerCountry = normalizeText(viewerProfile?.country);
      const viewerCoords = getViewerCoords();

      return eventsData
        .filter(model => !model.hidden && !model.cancelled)
        .filter(model => model.visibility !== "private" || model.creatorId === currentUser.id || isJoined(model.id))
        .map(model => {
          const city = normalizeText(model.city);
          const province = normalizeText(model.province);
          const country = normalizeText(model.country);

          const sameCountry = !!viewerCountry && !!country && viewerCountry === country;
          const sameProvince = flexibleSameProvince(viewerProvince, viewerCountry, province, country);
          const sameCity = flexibleSameCity(viewerCity, viewerProvince, viewerCountry, city, province, country);

          let distanceKm = null;

          if (
            viewerCoords.lat !== null &&
            viewerCoords.lng !== null &&
            model.lat !== null &&
            model.lng !== null
          ) {
            distanceKm = kmDistance(viewerCoords.lat, viewerCoords.lng, model.lat, model.lng);
          }

          const searchable = [
            model.title,
            model.description,
            model.creatorName,
            model.category,
            model.venue,
            model.address,
            model.city,
            model.province,
            model.country,
            provinceAliases(model.province),
            countryAliases(model.country),
            model.keywords,
            model.locationSearch
          ].filter(Boolean).join(" ").toLowerCase();

          const mine = model.creatorId === currentUser.id;
          const withinGpsRange = distanceKm !== null && distanceKm <= 100;

          return {
            ...model,
            sameCountry,
            sameProvince,
            sameCity,
            withinGpsRange,
            distanceKm,
            mine,
            joined: isJoined(model.id),
            expired: isExpired(model),
            distanceLabel: distanceKm !== null ? formatDistance(distanceKm) : "",
            placeLabel: [model.city, model.province, model.country].filter(Boolean).join(", "),
            searchable
          };
        });
    }

    function buildNearbyEvents() {
      const q = normalizeText(searchInput.value);

      const viewerHasSavedLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      let rows = buildBaseEventRows();

      if (q) {
        rows = rows.filter(row => row.searchable.includes(q));
      } else if (browserCoords) {
        rows = rows.filter(row => row.mine || row.joined || row.withinGpsRange || row.sameCity || row.sameProvince || row.sameCountry);
      } else if (viewerHasSavedLocation) {
        rows = rows.filter(row => row.mine || row.joined || row.sameCity || row.sameProvince || row.sameCountry);
      } else {
        rows = rows.filter(row => row.mine || row.joined);
      }

      rows.sort((a, b) => {
        if (a.mine && !b.mine) return -1;
        if (b.mine && !a.mine) return 1;

        if (a.joined && !b.joined) return -1;
        if (b.joined && !a.joined) return 1;

        if (a.expired !== b.expired) return a.expired ? 1 : -1;

        if (a.sameCity && !b.sameCity) return -1;
        if (b.sameCity && !a.sameCity) return 1;

        if (a.sameProvince && !b.sameProvince) return -1;
        if (b.sameProvince && !a.sameProvince) return 1;

        if (a.sameCountry && !b.sameCountry) return -1;
        if (b.sameCountry && !a.sameCountry) return 1;

        const aHasDistance = a.distanceKm !== null;
        const bHasDistance = b.distanceKm !== null;

        if (aHasDistance && bHasDistance && a.distanceKm !== b.distanceKm) return a.distanceKm - b.distanceKm;
        if (aHasDistance && !bHasDistance) return -1;
        if (bHasDistance && !aHasDistance) return 1;

        return eventTimeMs(a) - eventTimeMs(b);
      });

      return rows;
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.id) return;

      const variants = [
        payload,
        {
          type: payload.type || "notification",
          title: payload.title || "",
          text: payload.text || "",
          fromUserId: payload.from_user_id || currentUser.id,
          toUserId: targetUid,
          eventId: payload.event_id || "",
          createdAt: nowIso(),
          isRead: false,
          read: false
        },
        {
          type: payload.type || "notification",
          title: payload.title || "",
          text: payload.text || "",
          from_user_id: currentUser.id,
          to_user_id: targetUid,
          user_id: targetUid,
          event_id: payload.event_id || "",
          created_at: nowIso(),
          is_read: false
        }
      ];

      for (const item of variants) {
        try {
          const { error } = await supabase.from("notifications").insert(item);
          if (!error) return;
        } catch {}
      }
    }

    async function joinEvent(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        const payloads = [
          {
            event_id: model.id,
            user_id: currentUser.id,
            display_name: viewerProfile?.displayName || currentUser.email || "Member",
            username: viewerProfile?.username || "",
            joined_at: nowIso()
          },
          {
            eventId: model.id,
            userId: currentUser.id,
            displayName: viewerProfile?.displayName || currentUser.email || "Member",
            username: viewerProfile?.username || "",
            joinedAt: nowIso()
          },
          {
            event_id: model.id,
            user_id: currentUser.id
          }
        ];

        let inserted = null;
        let lastError = null;

        for (const payload of payloads) {
          try {
            const { data, error } = await supabase
              .from("event_members")
              .insert(payload)
              .select("id")
              .maybeSingle();

            if (!error) {
              inserted = data || null;
              lastError = null;
              break;
            }

            lastError = error;
          } catch (err) {
            lastError = err;
          }
        }

        if (lastError) throw lastError;

        memberMap.set(model.id, true);

        if (inserted?.id) {
          memberRowMap.set(model.id, inserted.id);
        }

        await createNotificationSafe(model.creatorId, {
          type: "event_join",
          title: "Event joined",
          text: `${viewerProfile?.displayName || currentUser.email || "Someone"} joined your event.`,
          from_user_id: currentUser.id,
          to_user_id: model.creatorId,
          event_id: model.id,
          created_at: nowIso(),
          is_read: false
        });

        await loadJoinedState();
        renderEvents();
        setPageStatus("Joined event.", "status-ok");
      } catch (err) {
        console.error(err);
        setPageStatus("Could not join event.", "status-err");
        btn.disabled = false;
      }
    }

    async function leaveEvent(model, btn) {
      btn.disabled = true;
      setPageStatus("");

      try {
        const rowId = memberRowMap.get(model.id);

        if (rowId) {
          const { error } = await supabase
            .from("event_members")
            .delete()
            .eq("id", rowId);

          if (error) throw error;
        } else {
          const attempts = [
            ["event_id", "user_id"],
            ["eventId", "userId"]
          ];

          let done = false;
          let lastError = null;

          for (const [eventCol, userCol] of attempts) {
            try {
              const { error } = await supabase
                .from("event_members")
                .delete()
                .eq(eventCol, model.id)
                .eq(userCol, currentUser.id);

              if (!error) {
                done = true;
                break;
              }

              lastError = error;
            } catch (err) {
              lastError = err;
            }
          }

          if (!done && lastError) throw lastError;
        }

        memberMap.set(model.id, false);
        memberRowMap.delete(model.id);

        await loadJoinedState();
        renderEvents();
        setPageStatus("Left event.", "status-ok");
      } catch (err) {
        console.error(err);
        setPageStatus("Could not leave event.", "status-err");
        btn.disabled = false;
      }
    }

    function buildEventShareUrl(eventId) {
      const url = new URL("event.html", window.location.href);
      url.searchParams.set("eventId", eventId);
      return url.toString();
    }

    async function shareEvent(model) {
      const url = buildEventShareUrl(model.id);
      const title = `${model.title || "Event"} on OwnSpace`;
      const text = "Check this event on OwnSpace.";

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Event link copied.");
        } else {
          prompt("Copy this event link:", url);
        }
      } catch (err) {
        if (err?.name !== "AbortError") console.error("Share failed:", err);
      }
    }

    function renderEvents() {
      openLoading();

      const q = normalizeText(searchInput.value);

      const viewerHasLocation =
        !!normalizeText(viewerProfile?.city) ||
        !!normalizeText(viewerProfile?.province) ||
        !!normalizeText(viewerProfile?.country);

      const rows = buildNearbyEvents();

      if (!rows.length) {
        if (q) {
          showEmpty("No matching events found. Try another city, province, country, venue or event title.");
        } else if (browserCoords) {
          showEmpty("No nearby events found with GPS. Try search or create a new event.");
        } else if (!viewerHasLocation) {
          showEmpty("Add your city/province/country, turn GPS on, or search by city/country/event name.");
        } else {
          showEmpty("No events found near your saved location. Search can still find events from other cities.");
        }

        return;
      }

      listWrap.innerHTML = "";

      rows.forEach(model => {
        const imageHtml = model.imageURL
          ? `<img class="cover" src="${escapeHtml(model.imageURL)}" alt="Event image">`
          : "";

        const badges = [];

        if (model.mine) badges.push(`<span class="mini-badge mini-purple">Mine</span>`);
        badges.push(`<span class="mini-badge mini-blue">${escapeHtml(model.category || "Event")}</span>`);
        badges.push(`<span class="mini-badge ${model.visibility === "private" ? "mini-yellow" : "mini-blue"}">${model.visibility === "private" ? "Private" : "Public"}</span>`);

        if (model.joined) badges.push(`<span class="mini-badge mini-green">Joined</span>`);
        if (model.expired) badges.push(`<span class="mini-badge mini-red">Expired</span>`);
        else badges.push(`<span class="mini-badge mini-green">Upcoming</span>`);

        if (model.sameCity) {
          badges.push(`<span class="mini-badge mini-purple">Same city</span>`);
        } else if (model.sameProvince) {
          badges.push(`<span class="mini-badge mini-purple">Same province/state</span>`);
        } else if (model.sameCountry) {
          badges.push(`<span class="mini-badge mini-purple">Same country</span>`);
        }

        if (model.distanceLabel) {
          badges.push(`<span class="mini-badge mini-green">${escapeHtml(model.distanceLabel)}</span>`);
        }

        const venueText = [model.venue, model.address].filter(Boolean).join(" • ") || "Not added";
        const openUrl = `event.html?eventId=${encodeURIComponent(model.id)}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          ${imageHtml}

          <div class="card-title">${escapeHtml(model.title)}</div>

          <div class="badge-row">${badges.join("")}</div>

          <div class="meta-grid">
            <div><strong>Location:</strong> ${escapeHtml(model.placeLabel || "Not added")}</div>
            <div><strong>Date:</strong> ${escapeHtml(model.date || "-")}</div>
            <div><strong>Time:</strong> ${escapeHtml(model.time || "-")}</div>
            <div><strong>Venue:</strong> ${escapeHtml(venueText)}</div>
            <div><strong>Host:</strong> ${escapeHtml(model.creatorName || "Member")}</div>
          </div>

          <div class="desc">${escapeHtml(model.description || "No description added.")}</div>

          <div class="card-actions">
            <a class="action-btn btn-primary" href="${openUrl}">${ICONS.open}<span>Open</span></a>

            ${
              model.mine
                ? `<a class="action-btn btn-purple" href="${openUrl}">Manage</a>`
                : model.expired
                ? `<button class="action-btn btn-red" type="button" disabled>Expired</button>`
                : model.joined
                ? `<button class="action-btn btn-red leave-btn" type="button">Leave</button>`
                : `<button class="action-btn btn-green join-btn" type="button">Join</button>`
            }

            <button class="action-btn btn-green share-btn" type="button">${ICONS.share}<span>Share</span></button>
          </div>
        `;

        const cover = card.querySelector(".cover");

        if (cover) {
          cover.addEventListener("error", () => {
            cover.style.display = "none";
          });
        }

        const joinBtn = card.querySelector(".join-btn");

        if (joinBtn) {
          joinBtn.addEventListener("click", async () => {
            await joinEvent(model, joinBtn);
          });
        }

        const leaveBtn = card.querySelector(".leave-btn");

        if (leaveBtn) {
          leaveBtn.addEventListener("click", async () => {
            await leaveEvent(model, leaveBtn);
          });
        }

        const shareBtn = card.querySelector(".share-btn");

        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            await shareEvent(model);
          });
        }

        listWrap.appendChild(card);
      });

      showList();
    }

    async function selectProfileRow(table, uid) {
      const columns = ["uid", "id", "user_id", "userId"];

      for (const column of columns) {
        try {
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .eq(column, uid)
            .maybeSingle();

          if (!error && data) return data;
        } catch {}
      }

      return null;
    }

    async function loadViewer(uid) {
      const [userRow, publicRow] = await Promise.all([
        selectProfileRow("users", uid),
        selectProfileRow("public_profiles", uid)
      ]);

      viewerProfile = normalizeProfile({
        ...(publicRow || {}),
        ...(userRow || {}),
        uid
      }, uid);
    }

    async function loadEvents() {
      const { data, error } = await supabase
        .from("events")
        .select("*");

      if (error) throw error;

      eventsData = (data || []).map(row => normalizeEvent(row, row.id));
    }

    async function loadJoinedState() {
      memberMap = new Map();
      memberRowMap = new Map();

      const attempts = [
        ["user_id", "event_id"],
        ["userId", "eventId"]
      ];

      for (const [userColumn, eventColumn] of attempts) {
        try {
          const { data, error } = await supabase
            .from("event_members")
            .select("*")
            .eq(userColumn, currentUser.id);

          if (error) throw error;

          (data || []).forEach(row => {
            const eventId = row[eventColumn] || row.event_id || row.eventId;

            if (eventId) {
              memberMap.set(eventId, true);

              if (row.id) {
                memberRowMap.set(eventId, row.id);
              }
            }
          });

          return;
        } catch (err) {
          console.warn("event_members load attempt skipped:", err?.message || err);
        }
      }
    }

    async function refreshAll() {
      openLoading();

      await Promise.all([
        loadEvents(),
        loadJoinedState(),
        loadInboxBadge()
      ]);

      renderEvents();
    }

    searchInput.addEventListener("input", () => {
      clearBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderEvents();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      searchInput.focus();
      renderEvents();
    });

    topGpsBtn.addEventListener("click", toggleGps);
    gpsToggleBtn.addEventListener("click", toggleGps);

    async function initPage() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = authData.user;

      try {
        setGpsUi(false);
        await loadViewer(currentUser.id);
        await refreshAll();

        supabase.auth.onAuthStateChange((event, session) => {
          if (!session?.user) {
            window.location.href = "login.html";
          }
        });
      } catch (err) {
        console.error(err);
        showEmpty("Could not load events.");
      }
    }

    initPage();
  </script>
</body>
