<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Notifications</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 18px 36px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 28px rgba(20,33,61,.08);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.10), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(167,139,250,.08), transparent 24%),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 90%, #000 10%));
      color:var(--text);
      min-height:100vh;
      padding:10px 10px 108px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:7px 9px;
      margin-bottom:10px;
      display:grid;
      grid-template-columns:42px 1fr 42px;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:42px;
      height:42px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:13px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .top-icon-btn.refresh-top{
      background:rgba(61,220,132,.13);
      border-color:rgba(61,220,132,.22);
    }

    .top-icon-btn svg{
      width:19px;
      height:19px;
      display:block;
    }

    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:18px;
      font-weight:900;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
    }

    .compact-controls{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
      display:grid;
      gap:8px;
    }

    .summary-row{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:6px;
    }

    .stat-chip{
      min-height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      border-radius:12px;
      font-size:11px;
      font-weight:900;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      white-space:nowrap;
    }

    .stat-chip.blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .stat-chip.yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}
    .stat-chip.purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.20)}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
    }

    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 7px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      min-height:34px;
      white-space:nowrap;
    }

    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-actions-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:6px;
      align-items:center;
    }

    .search-wrap{
      position:relative;
      min-width:0;
    }

    .search-input{
      width:100%;
      border:none;
      outline:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:13px;
      padding:10px 38px 10px 12px;
      font-size:13px;
      min-height:38px;
    }

    .search-input::placeholder{color:var(--muted)}

    .clear-search-btn{
      position:absolute;
      right:5px;
      top:50%;
      transform:translateY(-50%);
      width:28px;
      height:28px;
      border:none;
      border-radius:9px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:900;
    }

    .action-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 10px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:38px;
      white-space:nowrap;
    }

    .action-btn.primary{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.20);
    }

    .message{
      min-height:16px;
      font-size:12px;
      line-height:1.35;
      color:var(--muted);
      padding:0 2px;
    }

    .message.ok{color:#9cf0bf}
    .message.err{color:#ffb3bd}

    .list-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .loading{
      text-align:center;
      color:var(--muted);
      padding:24px 10px;
      font-size:14px;
    }

    .list{
      display:grid;
      gap:9px;
    }

    .item{
      display:block;
      text-decoration:none;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
      color:var(--text);
    }

    .item.unread{
      border-color:rgba(76,201,255,.28);
      box-shadow:0 0 0 1px rgba(76,201,255,.08) inset;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:6px;
    }

    .item-title{
      font-size:14px;
      font-weight:900;
      line-height:1.35;
    }

    .item-time{
      color:var(--muted);
      font-size:10.5px;
      white-space:nowrap;
      flex-shrink:0;
    }

    .item-text{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      margin-bottom:8px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .item-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .type-wrap{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .item-type{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 8px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:900;
      border:1px solid transparent;
    }

    .type-default{background:rgba(76,201,255,.13);color:var(--text);border-color:rgba(76,201,255,.20)}
    .type-follow{background:rgba(167,139,250,.13);color:var(--text);border-color:rgba(167,139,250,.20)}
    .type-like{background:rgba(255,93,115,.13);color:var(--text);border-color:rgba(255,93,115,.20)}
    .type-comment{background:rgba(245,185,66,.13);color:var(--text);border-color:rgba(245,185,66,.20)}
    .type-request{background:rgba(61,220,132,.13);color:var(--text);border-color:rgba(61,220,132,.20)}
    .type-event{background:rgba(76,201,255,.13);color:var(--text);border-color:rgba(76,201,255,.20)}
    .type-place{background:rgba(167,139,250,.13);color:var(--text);border-color:rgba(167,139,250,.20)}
    .type-verification{background:rgba(61,220,132,.13);color:var(--text);border-color:rgba(61,220,132,.20)}
    .type-unread{background:rgba(245,185,66,.13);color:var(--text);border-color:rgba(245,185,66,.20)}

    .mini-btn{
      border:none;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 9px;
      font-size:11.5px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
    }

    .empty-box{
      text-align:center;
      padding:26px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
      font-size:14px;
      line-height:1.55;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:9px 5px;
      border-radius:14px;
      font-size:10.5px;
      font-weight:800;
      min-height:56px;
      border:none;
      background:transparent;
      cursor:pointer;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .nav-link svg{
      width:19px;
      height:19px;
      display:block;
    }

    @media (max-width:700px){
      body{padding:8px 8px 104px}

      .topbar{
        grid-template-columns:42px 1fr 42px;
        border-radius:16px;
        margin-bottom:8px;
      }

      .brand{font-size:17px}

      .compact-controls{
        padding:8px;
        gap:6px;
        margin-bottom:8px;
        border-radius:18px;
      }

      .summary-row,
      .tabs{
        gap:5px;
      }

      .stat-chip{
        font-size:10.5px;
        padding:5px 5px;
        min-height:30px;
      }

      .tab-btn{
        font-size:11.5px;
        padding:7px 5px;
        min-height:32px;
      }

      .search-actions-row{
        grid-template-columns:1fr;
      }

      .action-btn{
        min-height:36px;
      }

      .list-panel{
        padding:8px;
        border-radius:18px;
      }

      .item{
        border-radius:15px;
        padding:10px;
      }

      .bottom-nav{
        padding:7px;
        gap:5px;
      }

      .nav-link{
        font-size:10px;
        padding:8px 3px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Notifications</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="compact-controls">
      <div class="summary-row">
        <span id="allCountChip" class="stat-chip blue">All 0</span>
        <span id="unreadCountChip" class="stat-chip yellow">Unread 0</span>
        <span id="requestCountChip" class="stat-chip purple">Requests 0</span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="all" type="button">All</button>
        <button class="tab-btn" data-tab="unread" type="button">Unread</button>
        <button class="tab-btn" data-tab="requests" type="button">Requests</button>
      </div>

      <div class="search-actions-row">
        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search..." />
          <button id="clearSearchBtn" class="clear-search-btn hidden" type="button" aria-label="Clear search">×</button>
        </div>

        <button id="markAllBtn" class="action-btn primary" type="button">Mark Read</button>
        <a href="follow-requests.html" class="action-btn" id="followRequestsLink">Follow Req.</a>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="list-panel">
      <div id="loading" class="loading">Loading notifications...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No notifications yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 10.5 12 3l9 7.5"></path>
        <path d="M5 10v10h14V10"></path>
        <path d="M9 20v-6h6v6"></path>
      </svg>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
        <circle cx="12" cy="9" r="2.5"></circle>
      </svg>
      <span>Nearby</span>
    </a>

    <a href="feed.html#composerPanel" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </svg>
      <span>Create</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
      </svg>
      <span>Inbox</span>
    </a>

    <a href="profile.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 21a8 8 0 0 0-16 0"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const markAllBtn = document.getElementById("markAllBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const searchInput = document.getElementById("searchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const pageMessage = document.getElementById("pageMessage");
    const allCountChip = document.getElementById("allCountChip");
    const unreadCountChip = document.getElementById("unreadCountChip");
    const requestCountChip = document.getElementById("requestCountChip");
    const followRequestsLink = document.getElementById("followRequestsLink");

    let currentUser = null;
    let currentTab = "all";
    let allDocs = [];
    let notificationsChannel = null;
    let refreshTimer = null;

    function getStoredTheme() {
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue = getStoredTheme()) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if (e.key === "osTheme" || e.key === "bwTheme") applyTheme();
    });

    const themeMediaQuery = window.matchMedia("(prefers-color-scheme: light)");
    if (themeMediaQuery.addEventListener) {
      themeMediaQuery.addEventListener("change", () => {
        if (getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if (document.referrer) history.back();
      else window.location.href = "profile.html";
    });

    function nowIso() {
      return new Date().toISOString();
    }

    function setMessage(text = "", type = "") {
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names, fallback = "") {
      for (const name of names) {
        const value = raw?.[name];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function toMillis(value) {
      if (!value) return 0;

      try {
        if (typeof value === "object" && typeof value.toDate === "function") {
          return value.toDate().getTime();
        }
      } catch {}

      try {
        if (typeof value === "object" && typeof value.seconds === "number") {
          return value.seconds * 1000;
        }
      } catch {}

      try {
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      } catch {
        return 0;
      }
    }

    function formatDate(value) {
      if (!value) return "Just now";

      try {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "Just now";

        const now = Date.now();
        const diff = now - d.getTime();
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if (diff < minute) return "Now";
        if (diff < hour) return `${Math.floor(diff / minute)}m`;
        if (diff < day) return `${Math.floor(diff / hour)}h`;
        if (diff < day * 7) return `${Math.floor(diff / day)}d`;

        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      } catch {
        return "Just now";
      }
    }

    function isUnread(item) {
      return item.isRead !== true && item.read !== true && item.is_read !== true;
    }

    function normalizeNotification(raw) {
      const d = raw || {};

      return {
        id: getField(d, ["id"], ""),
        type: getField(d, ["type"], "activity"),
        title: getField(d, ["title"], "Notification"),
        text: getField(d, ["text", "message", "body"], "No details"),

        fromUserId: getField(d, ["from_user_id", "fromUserId", "from_uid", "fromUid"], ""),
        toUserId: getField(d, ["to_user_id", "toUserId", "user_id", "userId", "uid"], ""),

        postId: getField(d, ["post_id", "postId"], ""),
        threadId: getField(d, ["thread_id", "threadId"], ""),
        requestId: getField(d, ["request_id", "requestId"], ""),
        eventId: getField(d, ["event_id", "eventId"], ""),
        placeId: getField(d, ["place_id", "placeId"], ""),
        source: getField(d, ["source", "place_source", "placeSource"], ""),

        isRead: !!(d.is_read ?? d.isRead ?? d.read),
        read: !!(d.read ?? d.isRead ?? d.is_read),
        createdAt: d.created_at ?? d.createdAt ?? d.created ?? null,
        createdAtMs: toMillis(d.created_at ?? d.createdAt ?? d.created ?? null)
      };
    }

    function normalizeType(type = "") {
      const t = String(type || "").toLowerCase();

      if (t === "follow") return { label: "Follow", cls: "type-follow" };
      if (t === "follow_request") return { label: "Request", cls: "type-request" };
      if (t === "follow_accept") return { label: "Accepted", cls: "type-follow" };
      if (t === "like") return { label: "Like", cls: "type-like" };
      if (t === "comment") return { label: "Comment", cls: "type-comment" };
      if (t === "message_request") return { label: "Msg Request", cls: "type-request" };
      if (t === "message_request_accepted") return { label: "Msg Accepted", cls: "type-request" };
      if (t === "message") return { label: "Message", cls: "type-default" };
      if (t === "verification" || t === "verification_update" || t === "verification_note") return { label: "Verification", cls: "type-verification" };
      if (t === "event_join" || t === "event_comment" || t === "event") return { label: "Event", cls: "type-event" };
      if (t === "place_update" || t === "place_approved" || t === "place_rejected" || t === "place") return { label: "Place", cls: "type-place" };

      return { label: t || "Activity", cls: "type-default" };
    }

    function getTargetUrl(item) {
      const t = String(item.type || "").toLowerCase();

      if (t === "follow" && item.fromUserId) {
        return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;
      }

      if (t === "follow_request") {
        return "follow-requests.html";
      }

      if (t === "follow_accept" && item.fromUserId) {
        return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;
      }

      if (t === "message" && item.threadId) {
        return `chat.html?threadId=${encodeURIComponent(item.threadId)}`;
      }

      if (t === "message_request") {
        return "inbox.html";
      }

      if (t === "message_request_accepted" && item.threadId) {
        return `chat.html?threadId=${encodeURIComponent(item.threadId)}`;
      }

      if (t.includes("verification")) {
        return "verification.html";
      }

      if ((t === "like" || t === "comment") && item.postId) {
        return `post.html?postId=${encodeURIComponent(item.postId)}`;
      }

      if (item.eventId) {
        return `event.html?eventId=${encodeURIComponent(item.eventId)}`;
      }

      if (item.placeId) {
        const sourcePart = item.source ? `&source=${encodeURIComponent(item.source)}` : "";
        return `place.html?placeId=${encodeURIComponent(item.placeId)}${sourcePart}`;
      }

      if (item.fromUserId) {
        return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;
      }

      return "feed.html";
    }

    function getActionLabel(item) {
      const t = String(item.type || "").toLowerCase();

      if (t === "follow_request") return "Requests";
      if (t === "message" || t === "message_request_accepted") return "Chat";
      if (t === "message_request") return "Inbox";
      if (t.includes("verification")) return "Verify";
      if (item.postId) return "Post";
      if (item.eventId) return "Event";
      if (item.placeId) return "Place";
      if (item.fromUserId) return "Profile";
      return "Open";
    }

    function isRequestType(item) {
      const t = String(item.type || "").toLowerCase();
      return t === "follow_request" || t === "message_request" || t === "message_request_accepted";
    }

    function updateCounts(items) {
      const allCount = items.length;
      const unreadCount = items.filter(isUnread).length;
      const requestCount = items.filter(isRequestType).length;
      const unreadRequestCount = items.filter(item => item.type === "follow_request" && isUnread(item)).length;

      allCountChip.textContent = `All ${allCount}`;
      unreadCountChip.textContent = `Unread ${unreadCount}`;
      requestCountChip.textContent = `Requests ${requestCount}`;

      followRequestsLink.textContent = unreadRequestCount > 0
        ? `Follow Req. (${unreadRequestCount > 99 ? "99+" : unreadRequestCount})`
        : "Follow Req.";
    }

    function matchesSearch(item, queryText) {
      const q = queryText.trim().toLowerCase();
      if (!q) return true;

      return [
        item.title,
        item.text,
        item.type,
        item.fromUserId,
        item.postId,
        item.eventId,
        item.placeId
      ].filter(Boolean).join(" ").toLowerCase().includes(q);
    }

    function filterItems() {
      const queryText = searchInput.value || "";

      return allDocs.filter(item => {
        if (!matchesSearch(item, queryText)) return false;
        if (currentTab === "unread") return isUnread(item);
        if (currentTab === "requests") return isRequestType(item);
        return true;
      });
    }

    function renderItems(items) {
      list.innerHTML = "";

      if (!items.length) {
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");

        emptyBox.textContent =
          currentTab === "unread" ? "No unread notifications." :
          currentTab === "requests" ? "No requests yet." :
          "No notifications yet.";

        return;
      }

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      items.forEach((item) => {
        const a = document.createElement("a");
        a.className = `item ${isUnread(item) ? "unread" : ""}`;
        a.href = getTargetUrl(item);
        a.dataset.id = item.id;

        const typeInfo = normalizeType(item.type);

        a.innerHTML = `
          <div class="item-top">
            <div class="item-title">${escapeHtml(item.title || "Notification")}</div>
            <div class="item-time">${escapeHtml(formatDate(item.createdAt))}</div>
          </div>

          <div class="item-text">${escapeHtml(item.text || "No details")}</div>

          <div class="item-bottom">
            <div class="type-wrap">
              <span class="item-type ${typeInfo.cls}">${escapeHtml(typeInfo.label)}</span>
              ${isUnread(item) ? `<span class="item-type type-unread">Unread</span>` : ""}
            </div>

            <span class="mini-btn">${escapeHtml(getActionLabel(item))}</span>
          </div>
        `;

        a.addEventListener("click", async (e) => {
          e.preventDefault();

          if (isUnread(item)) {
            await markOneAsRead(item.id);
          }

          window.location.href = a.href;
        });

        list.appendChild(a);
      });
    }

    async function updateNotificationById(notificationId, payloadVariants = []) {
      let lastError = null;

      for (const payload of payloadVariants) {
        try {
          const { error } = await supabase
            .from("notifications")
            .update(payload)
            .eq("id", notificationId);

          if (!error) return;
          lastError = error;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error("Could not update notification.");
    }

    async function markOneAsRead(notificationId) {
      if (!currentUser || !notificationId) return;

      try {
        await updateNotificationById(notificationId, [
          {
            is_read: true,
            read: true,
            read_at: nowIso(),
            updated_at: nowIso()
          },
          {
            isRead: true,
            read: true,
            readAt: nowIso(),
            updatedAt: nowIso()
          },
          {
            is_read: true
          }
        ]);

        const target = allDocs.find(d => d.id === notificationId);
        if (target) {
          target.isRead = true;
          target.is_read = true;
          target.read = true;
        }

        updateCounts(allDocs);
        renderItems(filterItems());
      } catch (err) {
        console.warn("Could not mark notification read:", err?.message || err);
      }
    }

    async function markAllAsRead() {
      if (!currentUser) return;

      const unreadItems = allDocs.filter(isUnread);

      if (!unreadItems.length) {
        setMessage("Everything is already read.", "ok");
        return;
      }

      markAllBtn.disabled = true;
      setMessage("");

      try {
        const ids = unreadItems.map(item => item.id).filter(Boolean);

        let done = false;

        try {
          const { error } = await supabase
            .from("notifications")
            .update({
              is_read: true,
              read: true,
              read_at: nowIso(),
              updated_at: nowIso()
            })
            .in("id", ids);

          if (!error) done = true;
        } catch {}

        if (!done) {
          const { error } = await supabase
            .from("notifications")
            .update({
              isRead: true,
              read: true,
              readAt: nowIso(),
              updatedAt: nowIso()
            })
            .in("id", ids);

          if (error) throw error;
        }

        unreadItems.forEach(item => {
          item.isRead = true;
          item.is_read = true;
          item.read = true;
        });

        updateCounts(allDocs);
        renderItems(filterItems());
        setMessage("All notifications marked as read.", "ok");
      } catch (err) {
        console.error(err);
        setMessage("Could not mark all notifications as read.", "err");
      }

      markAllBtn.disabled = false;
    }

    function renderFromState() {
      updateCounts(allDocs);
      renderItems(filterItems());
      loading.classList.add("hidden");
    }

    function setActiveTab(tab) {
      currentTab = tab;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      renderFromState();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        setActiveTab(btn.dataset.tab);
      });
    });

    searchInput.addEventListener("input", () => {
      clearSearchBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderFromState();
    });

    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearSearchBtn.classList.add("hidden");
      renderFromState();
      searchInput.focus();
    });

    markAllBtn.addEventListener("click", markAllAsRead);

    async function loadNotifications() {
      if (!currentUser) return;

      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");

      let rows = [];
      let lastError = null;

      try {
        const { data, error } = await supabase
          .from("notifications")
          .select("*")
          .eq("to_user_id", currentUser.id)
          .order("created_at", { ascending: false });

        if (!error) {
          rows = data || [];
          lastError = null;
        } else {
          lastError = error;
        }
      } catch (err) {
        lastError = err;
      }

      if (lastError) {
        try {
          const { data, error } = await supabase
            .from("notifications")
            .select("*")
            .eq("toUserId", currentUser.id)
            .order("createdAt", { ascending: false });

          if (!error) {
            rows = data || [];
            lastError = null;
          } else {
            lastError = error;
          }
        } catch (err) {
          lastError = err;
        }
      }

      if (lastError) {
        try {
          const { data, error } = await supabase
            .from("notifications")
            .select("*");

          if (error) throw error;

          rows = (data || []).filter(row => {
            const toUserId = getField(row, ["to_user_id", "toUserId", "user_id", "userId", "uid"], "");
            return toUserId === currentUser.id;
          });
        } catch (err) {
          console.error(err);
          loading.textContent = "Could not load notifications.";
          return;
        }
      }

      allDocs = rows
        .map(normalizeNotification)
        .sort((a, b) => b.createdAtMs - a.createdAtMs);

      renderFromState();
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        loadNotifications().catch(err => console.error("Notification refresh failed:", err));
      }, 350);
    }

    function subscribeNotifications() {
      if (notificationsChannel) {
        try {
          supabase.removeChannel(notificationsChannel);
        } catch {}
      }

      notificationsChannel = supabase
        .channel(`ownspace-notifications-live-${currentUser.id}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "notifications" },
          () => scheduleRefresh()
        )
        .subscribe();
    }

    refreshBtn.addEventListener("click", async () => {
      if (!currentUser) return;

      try {
        await loadNotifications();
        setMessage("Refreshed.", "ok");
      } catch (err) {
        console.error(err);
        setMessage("Could not refresh.", "err");
      }
    });

    async function initPage() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data?.user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      await loadNotifications();
      subscribeNotifications();

      supabase.auth.onAuthStateChange((event, session) => {
        if (!session?.user) {
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      if (notificationsChannel) {
        try {
          supabase.removeChannel(notificationsChannel);
        } catch {}
      }
    });

    initPage().catch((err) => {
      console.error(err);
      loading.textContent = "Could not load notifications.";
    });

    /*
      OWNSPACE / SUPABASE NOTES FOR THIS PAGE:

      UI FIXES:
      - Removed top Feed button.
      - Refresh button moved to top-right bar.
      - Filters/stats/search/actions made compact.
      - Options area now stays small instead of covering the page.
      - BareWorld renamed to OwnSpace.
      - Bottom nav icons replaced with clean SVG icons.

      NOTIFICATION LOGIC:
      - This page reads general notifications only.
      - Inbox badge logic stays separate in inbox.html/chat.html.
      - Requests tab includes follow/message request style notifications.
    */
  </script>
</body>
</html>
