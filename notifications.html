<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OwnSpace - Notifications</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;-webkit-tap-highlight-color:transparent}

    :root,
    html[data-theme="light"]{
      --bg:#f3f6fb;--surface:#fff;--surface-2:#f7f9fd;--surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);--line-soft:rgba(15,23,42,.05);
      --text:#14213d;--muted:#6b7893;--blue:#1f8fff;--green:#22b36c;
      --yellow:#d59617;--purple:#7f63ff;--red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);--nav-bg:rgba(255,255,255,.98);
      --shadow:0 10px 22px rgba(20,33,61,.06);--soft-shadow:0 6px 14px rgba(20,33,61,.045);
    }

    html[data-theme="dark"]{
      --bg:#07101f;--surface:#0c1630;--surface-2:#111d3d;--surface-3:#15244a;
      --line:rgba(255,255,255,.08);--line-soft:rgba(255,255,255,.05);
      --text:#fff;--muted:#9aa7c7;--blue:#4cc9ff;--green:#3ddc84;
      --yellow:#f5b942;--purple:#a78bfa;--red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);--nav-bg:rgba(9,15,31,.98);
      --shadow:0 14px 28px rgba(0,0,0,.16);--soft-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    body{
      background:
        radial-gradient(circle at 15% 8%, rgba(76,201,255,.08), transparent 26%),
        radial-gradient(circle at 85% 12%, rgba(167,139,250,.06), transparent 22%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:6px 6px 82px;
    }

    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:14px;
      padding:5px 6px;
      margin-bottom:7px;
      display:grid;
      grid-template-columns:34px 1fr 34px;
      align-items:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .top-icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:11px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .top-icon-btn.refresh-top{
      background:rgba(61,220,132,.13);
      border-color:rgba(61,220,132,.20);
    }

    .top-icon-btn svg{width:17px;height:17px;display:block}
    .top-center{text-align:center;min-width:0}

    .brand{
      font-size:15.5px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.02em;
    }

    .brand-sub{
      font-size:9px;
      color:var(--muted);
      margin-top:1px;
      font-weight:800;
    }

    .compact-controls{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:7px;
      margin-bottom:7px;
      box-shadow:var(--shadow);
      display:grid;
      gap:6px;
    }

    .summary-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
    }

    .stat-chip{
      min-height:27px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:5px;
      border-radius:10px;
      font-size:10px;
      font-weight:950;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
      white-space:nowrap;
      line-height:1;
    }

    .stat-chip.blue{background:rgba(76,201,255,.13);border-color:rgba(76,201,255,.20)}
    .stat-chip.yellow{background:rgba(245,185,66,.13);border-color:rgba(245,185,66,.20)}
    .stat-chip.purple{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.20)}

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
    }

    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:6px 5px;
      font-size:10.5px;
      font-weight:950;
      cursor:pointer;
      min-height:29px;
      white-space:nowrap;
      line-height:1;
    }

    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.22);
    }

    .search-actions-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:5px;
      align-items:center;
    }

    .search-wrap{position:relative;min-width:0}

    .search-input{
      width:100%;
      border:none;
      outline:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:11px;
      padding:8px 32px 8px 10px;
      font-size:12px;
      min-height:33px;
    }

    .search-input::placeholder{color:var(--muted)}

    .clear-search-btn{
      position:absolute;
      right:4px;
      top:50%;
      transform:translateY(-50%);
      width:24px;
      height:24px;
      border:none;
      border-radius:8px;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:950;
      line-height:1;
    }

    .action-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 8px;
      font-size:10.5px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      min-height:33px;
      white-space:nowrap;
      line-height:1;
    }

    .action-btn.primary{
      background:rgba(76,201,255,.13);
      border-color:rgba(76,201,255,.20);
    }

    .action-btn:disabled{opacity:.65;cursor:not-allowed}

    .message{
      min-height:0;
      font-size:11px;
      line-height:1.3;
      color:var(--muted);
      padding:0 2px;
    }

    .message:not(:empty){min-height:15px}
    .message.ok{color:#16a34a}
    .message.err{color:#e11d48}
    html[data-theme="dark"] .message.ok{color:#9cf0bf}
    html[data-theme="dark"] .message.err{color:#ffb3bd}

    .list-panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:7px;
      box-shadow:var(--shadow);
    }

    .loading{
      text-align:center;
      color:var(--muted);
      padding:18px 10px;
      font-size:12.5px;
    }

    .list{display:grid;gap:6px}

    .item{
      display:block;
      text-decoration:none;
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:13px;
      padding:8px;
      color:var(--text);
      box-shadow:var(--soft-shadow);
    }

    .item.unread{
      border-color:rgba(76,201,255,.30);
      box-shadow:0 0 0 1px rgba(76,201,255,.08) inset,var(--soft-shadow);
      background:linear-gradient(135deg, rgba(76,201,255,.045), rgba(255,255,255,0)),var(--surface-2);
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:4px;
    }

    .item-title{
      font-size:12.5px;
      font-weight:950;
      line-height:1.25;
      word-break:break-word;
    }

    .item-time{
      color:var(--muted);
      font-size:9.5px;
      white-space:nowrap;
      flex-shrink:0;
      font-weight:850;
      line-height:1.25;
    }

    .item-text{
      color:var(--muted);
      font-size:11.5px;
      line-height:1.42;
      margin-bottom:7px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .item-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
    }

    .type-wrap{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      min-width:0;
    }

    .item-type{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 7px;
      border-radius:999px;
      font-size:9.5px;
      font-weight:950;
      border:1px solid transparent;
      line-height:1;
      min-height:20px;
    }

    .type-default{background:rgba(76,201,255,.13);color:var(--text);border-color:rgba(76,201,255,.20)}
    .type-follow{background:rgba(167,139,250,.13);color:var(--text);border-color:rgba(167,139,250,.20)}
    .type-like{background:rgba(255,93,115,.13);color:var(--text);border-color:rgba(255,93,115,.20)}
    .type-comment{background:rgba(245,185,66,.13);color:var(--text);border-color:rgba(245,185,66,.20)}
    .type-request{background:rgba(61,220,132,.13);color:var(--text);border-color:rgba(61,220,132,.20)}
    .type-event{background:rgba(76,201,255,.13);color:var(--text);border-color:rgba(76,201,255,.20)}
    .type-place{background:rgba(167,139,250,.13);color:var(--text);border-color:rgba(167,139,250,.20)}
    .type-verification{background:rgba(61,220,132,.13);color:var(--text);border-color:rgba(61,220,132,.20)}
    .type-community{background:rgba(167,139,250,.13);color:var(--text);border-color:rgba(167,139,250,.20)}
    .type-unread{background:rgba(245,185,66,.13);color:var(--text);border-color:rgba(245,185,66,.20)}

    .mini-btn{
      border:none;
      background:var(--surface-3);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:9px;
      padding:6px 8px;
      font-size:10px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:27px;
      line-height:1;
    }

    .empty-box{
      text-align:center;
      padding:20px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:13px;
      border:1px dashed var(--line);
      font-size:12.5px;
      line-height:1.5;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px,calc(100% - 12px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      z-index:50;
      box-shadow:0 14px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      padding:5px 3px;
      border-radius:12px;
      font-size:9.5px;
      font-weight:850;
      min-height:43px;
      border:none;
      background:transparent;
      cursor:pointer;
      position:relative;
    }

    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    .icon-svg{
      width:17px;
      height:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .icon-svg svg{
      width:17px;
      height:17px;
      display:block;
    }

    .nav-badge{
      position:absolute;
      top:2px;
      right:8px;
      min-width:15px;
      height:15px;
      border-radius:999px;
      background:var(--red);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      font-size:9px;
      font-weight:950;
      line-height:1;
      padding:0 4px;
      border:2px solid var(--nav-bg);
    }

    .nav-badge.show{display:flex}

    @media(max-width:700px){
      body{padding:6px 6px 82px}
      .topbar{grid-template-columns:34px 1fr 34px;border-radius:14px;margin-bottom:6px}
      .brand{font-size:15.5px}
      .compact-controls{padding:7px;gap:6px;margin-bottom:6px;border-radius:15px}
      .summary-row,.tabs{gap:4px}
      .stat-chip{font-size:9.5px;padding:5px 3px;min-height:27px}
      .tab-btn{font-size:10px;padding:6px 3px;min-height:28px}
      .search-actions-row{grid-template-columns:1fr}
      .action-btn{width:100%;min-height:31px}
      .list-panel{padding:7px;border-radius:15px}
      .item{border-radius:13px;padding:8px}
      .item-title{font-size:12.3px}
      .item-text{font-size:11.3px}
      .bottom-nav{padding:5px;gap:4px}
      .nav-link{font-size:9.2px;padding:5px 2px;min-height:41px}
      .nav-badge{right:8px}
    }

    @media(max-width:390px){
      .stat-chip{font-size:9px}
      .tab-btn{font-size:9.5px}
      .item-bottom{align-items:flex-start}
      .mini-btn{width:100%}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="backBtn" class="top-icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>

      <div class="top-center">
        <div class="brand">OwnSpace</div>
        <div class="brand-sub">Notifications</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn refresh-top" type="button" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.9-3"></path>
          <path d="M4 4v5h5"></path>
          <path d="M4 13a8 8 0 0 0 14.9 3"></path>
          <path d="M20 20v-5h-5"></path>
        </svg>
      </button>
    </div>

    <div class="compact-controls">
      <div class="summary-row">
        <span id="allCountChip" class="stat-chip blue">All 0</span>
        <span id="unreadCountChip" class="stat-chip yellow">Unread 0</span>
        <span id="requestCountChip" class="stat-chip purple">Requests 0</span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="all" type="button">All</button>
        <button class="tab-btn" data-tab="unread" type="button">Unread</button>
        <button class="tab-btn" data-tab="requests" type="button">Requests</button>
      </div>

      <div class="search-actions-row">
        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search notifications..." />
          <button id="clearSearchBtn" class="clear-search-btn hidden" type="button" aria-label="Clear search">×</button>
        </div>

        <button id="markAllBtn" class="action-btn primary" type="button">Mark Read</button>
        <a href="follow-requests.html" class="action-btn" id="followRequestsLink">Follow Req.</a>
      </div>

      <div id="pageMessage" class="message"></div>
    </div>

    <div class="list-panel">
      <div id="loading" class="loading">Loading notifications...</div>
      <div id="list" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No notifications yet.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
          <path d="M9 20v-6h6v6"></path>
        </svg>
      </span>
      <span>Feed</span>
    </a>

    <a href="nearby.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s7-5.3 7-12a7 7 0 0 0-14 0c0 6.7 7 12 7 12z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </span>
      <span>Nearby</span>
    </a>

    <a href="search.html" class="nav-link">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-4.2-4.2"></path>
        </svg>
      </span>
      <span>Search</span>
    </a>

    <a href="inbox.html" class="nav-link">
      <span id="inboxBadge" class="nav-badge">0</span>
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
      </span>
      <span>Inbox</span>
    </a>

    <a href="profile.html" class="nav-link active">
      <span class="icon-svg" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { supabase } from "./supabase.js";

    const backBtn = document.getElementById("backBtn");
    const loading = document.getElementById("loading");
    const list = document.getElementById("list");
    const emptyBox = document.getElementById("emptyBox");
    const markAllBtn = document.getElementById("markAllBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const searchInput = document.getElementById("searchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const pageMessage = document.getElementById("pageMessage");
    const allCountChip = document.getElementById("allCountChip");
    const unreadCountChip = document.getElementById("unreadCountChip");
    const requestCountChip = document.getElementById("requestCountChip");
    const followRequestsLink = document.getElementById("followRequestsLink");
    const inboxBadge = document.getElementById("inboxBadge");

    const INBOX_NOTIFICATION_TYPES = new Set([
      "message",
      "chat",
      "chat_message",
      "new_message",
      "message_request",
      "message_request_accepted",
      "message_request_declined"
    ]);

    const COMMUNITY_REQUEST_TYPES = new Set([
      "community_join_request",
      "community_request",
      "join_community_request",
      "community_member_request",
      "community_membership_request",
      "community_request_pending",
      "community_join_requested",
      "join_request",
      "group_join_request",
      "group_request"
    ]);

    const FOLLOW_REQUEST_TYPES = new Set([
      "follow_request",
      "follow_requested",
      "new_follow_request"
    ]);

    const REQUEST_TYPES = new Set([
      ...FOLLOW_REQUEST_TYPES,
      ...COMMUNITY_REQUEST_TYPES,
      "verification_note",
      "verification_update",
      "verification_request",
      "verification_review",
      "report",
      "warning",
      "suspension"
    ]);

    let currentUser = null;
    let currentTab = "all";
    let allDocs = [];
    let realtimeChannels = [];
    let refreshTimer = null;
    let badgeRefreshTimer = null;

    function getStoredTheme(){
      return localStorage.getItem("osTheme") || localStorage.getItem("bwTheme") || "light";
    }

    function resolveTheme(themeValue){
      if(themeValue === "system"){
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      return themeValue === "dark" ? "dark" : "light";
    }

    function applyTheme(themeValue = getStoredTheme()){
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme();

    window.addEventListener("storage", (e) => {
      if(e.key === "osTheme" || e.key === "bwTheme") applyTheme();

      if(
        e.key === "ownspace_badges_refresh" ||
        e.key === "ownspace_inbox_refresh" ||
        e.key === "ownspace_chat_read_refresh"
      ){
        scheduleInboxBadgeRefresh(120);
      }

      if(e.key === "ownspace_notifications_refresh"){
        scheduleRefresh(160);
      }
    });

    const themeMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    if(themeMediaQuery.addEventListener){
      themeMediaQuery.addEventListener("change", () => {
        if(getStoredTheme() === "system") applyTheme("system");
      });
    }

    backBtn.addEventListener("click", () => {
      if(document.referrer) history.back();
      else window.location.href = "profile.html";
    });

    function nowIso(){
      return new Date().toISOString();
    }

    function setMessage(text = "", type = ""){
      pageMessage.textContent = text;
      pageMessage.className = `message ${type}`;
    }

    function announceNotificationRefresh(){
      try{
        localStorage.setItem("ownspace_notifications_refresh", String(Date.now()));
        localStorage.setItem("ownspace_badges_refresh", String(Date.now()));
      }catch{}

      try{window.dispatchEvent(new CustomEvent("ownspace:notifications-refresh"))}catch{}
      try{window.dispatchEvent(new CustomEvent("ownspace:badges-refresh"))}catch{}
    }

    function escapeHtml(text){
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function getField(raw, names, fallback = ""){
      for(const name of names){
        const value = raw?.[name];

        if(value !== undefined && value !== null && String(value).trim() !== ""){
          return String(value).trim();
        }
      }

      return fallback;
    }

    function normalizeText(value){
      return String(value || "").trim().toLowerCase();
    }

    function toMillis(value){
      if(!value) return 0;

      try{
        if(typeof value === "object" && typeof value.toDate === "function"){
          return value.toDate().getTime();
        }
      }catch{}

      try{
        if(typeof value === "object" && typeof value.seconds === "number"){
          return value.seconds * 1000;
        }
      }catch{}

      try{
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? ms : 0;
      }catch{
        return 0;
      }
    }

    function formatDate(value){
      if(!value) return "Just now";

      try{
        const d = new Date(value);
        if(Number.isNaN(d.getTime())) return "Just now";

        const diff = Date.now() - d.getTime();
        const minute = 60000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if(diff < minute) return "Now";
        if(diff < hour) return `${Math.floor(diff / minute)}m`;
        if(diff < day) return `${Math.floor(diff / hour)}h`;
        if(diff < day * 7) return `${Math.floor(diff / day)}d`;

        return d.toLocaleDateString([], { month:"short", day:"numeric" });
      }catch{
        return "Just now";
      }
    }

    function isSchemaError(error){
      const msg = String(error?.message || error || "").toLowerCase();

      return (
        msg.includes("schema cache") ||
        msg.includes("could not find") ||
        msg.includes("column") ||
        msg.includes("does not exist") ||
        msg.includes("relation") ||
        msg.includes("not found")
      );
    }

    function isUnread(item){
      return (
        item.isRead !== true &&
        item.read !== true &&
        item.is_read !== true &&
        !item.readAt &&
        !item.read_at
      );
    }

    function normalizeNotification(raw){
      const d = raw || {};

      const type = normalizeText(getField(d, ["type", "notification_type", "notificationType"], "activity"));

      return {
        id:getField(d, ["id"], ""),
        type,
        title:getField(d, ["title", "heading"], "Notification"),
        text:getField(d, ["text", "message", "body", "description"], "No details"),
        fromUserId:getField(d, ["from_user_id", "fromUserId", "from_uid", "fromUid", "sender_id", "senderId"], ""),
        toUserId:getField(d, ["to_user_id", "toUserId", "user_id", "userId", "uid", "target_id", "targetId"], ""),
        postId:getField(d, ["post_id", "postId"], ""),
        requestId:getField(d, ["request_id", "requestId", "join_request_id", "joinRequestId"], ""),
        communityId:getField(d, ["community_id", "communityId", "group_id", "groupId"], ""),
        communityName:getField(d, ["community_name", "communityName", "group_name", "groupName"], ""),
        eventId:getField(d, ["event_id", "eventId"], ""),
        placeId:getField(d, ["place_id", "placeId"], ""),
        source:getField(d, ["source", "place_source", "placeSource", "source_table", "sourceTable"], ""),
        isRead:!!(d.is_read ?? d.isRead ?? d.read),
        read:!!(d.read ?? d.isRead ?? d.is_read),
        readAt:d.read_at ?? d.readAt ?? null,
        read_at:d.read_at ?? d.readAt ?? null,
        createdAt:d.created_at ?? d.createdAt ?? d.created ?? null,
        createdAtMs:toMillis(d.created_at ?? d.createdAt ?? d.created ?? null)
      };
    }

    function isCommunityRequestType(itemOrType){
      const t = typeof itemOrType === "string" ? normalizeText(itemOrType) : normalizeText(itemOrType?.type);
      return COMMUNITY_REQUEST_TYPES.has(t);
    }

    function isFollowRequestType(itemOrType){
      const t = typeof itemOrType === "string" ? normalizeText(itemOrType) : normalizeText(itemOrType?.type);
      return FOLLOW_REQUEST_TYPES.has(t);
    }

    function isRequestType(item){
      const t = normalizeText(item?.type);
      return REQUEST_TYPES.has(t) || isCommunityRequestType(t) || isFollowRequestType(t);
    }

    function isInboxNotificationType(item){
      return INBOX_NOTIFICATION_TYPES.has(normalizeText(item?.type));
    }

    function normalizeType(type = ""){
      const t = normalizeText(type);

      if(t === "follow") return {label:"Follow", cls:"type-follow"};
      if(isFollowRequestType(t)) return {label:"Request", cls:"type-request"};
      if(t === "follow_accept" || t === "follow_accepted") return {label:"Accepted", cls:"type-follow"};
      if(t === "like") return {label:"Like", cls:"type-like"};
      if(t === "comment") return {label:"Comment", cls:"type-comment"};

      if(t === "verification" || t === "verification_update" || t === "verification_note" || t === "verification_request" || t === "verification_review"){
        return {label:"Verification", cls:"type-verification"};
      }

      if(t === "event_join" || t === "event_comment" || t === "event"){
        return {label:"Event", cls:"type-event"};
      }

      if(t === "place_update" || t === "place_approved" || t === "place_rejected" || t === "place"){
        return {label:"Place", cls:"type-place"};
      }

      if(t === "report" || t === "warning" || t === "suspension"){
        return {label:"Safety", cls:"type-request"};
      }

      if(isCommunityRequestType(t)){
        return {label:"Join Request", cls:"type-request"};
      }

      if(t === "community" || t === "community_invite" || t === "community_join" || t === "community_post"){
        return {label:"Community", cls:"type-community"};
      }

      return {label:t || "Activity", cls:"type-default"};
    }

    function buildCommunityRequestsUrl(item){
      const params = new URLSearchParams();

      if(item.communityId) params.set("communityId", item.communityId);
      if(item.requestId) params.set("requestId", item.requestId);

      const query = params.toString();
      return `community-requests.html${query ? `?${query}` : ""}`;
    }

    function getTargetUrl(item){
      const t = normalizeText(item.type);

      if(isCommunityRequestType(item)) return buildCommunityRequestsUrl(item);
      if(isFollowRequestType(item)) return "follow-requests.html";

      if(t === "follow" && item.fromUserId) return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;
      if((t === "follow_accept" || t === "follow_accepted") && item.fromUserId) return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;

      if(t.includes("verification")) return "verification.html";

      if((t === "like" || t === "comment" || t === "community_post") && item.postId){
        const sourcePart = item.source ? `&source=${encodeURIComponent(item.source)}` : "";
        return `post.html?postId=${encodeURIComponent(item.postId)}${sourcePart}`;
      }

      if(item.communityId && (t.includes("community") || t.includes("join"))){
        return `community.html?communityId=${encodeURIComponent(item.communityId)}`;
      }

      if(item.eventId) return `event.html?eventId=${encodeURIComponent(item.eventId)}`;

      if(item.placeId){
        const sourcePart = item.source ? `&source=${encodeURIComponent(item.source)}` : "";
        return `place.html?placeId=${encodeURIComponent(item.placeId)}${sourcePart}`;
      }

      if(item.fromUserId) return `member.html?uid=${encodeURIComponent(item.fromUserId)}`;

      return "feed.html";
    }

    function getActionLabel(item){
      const t = normalizeText(item.type);

      if(isCommunityRequestType(item)) return "Requests";
      if(isFollowRequestType(item)) return "Requests";
      if(t.includes("verification")) return "Verify";
      if(item.postId) return "Post";
      if(item.communityId) return "Community";
      if(item.eventId) return "Event";
      if(item.placeId) return "Place";
      if(item.fromUserId) return "Profile";

      return "Open";
    }

    function updateCounts(items){
      const allCount = items.length;
      const unreadCount = items.filter(isUnread).length;
      const requestCount = items.filter(isRequestType).length;
      const unreadFollowRequestCount = items.filter(item => isFollowRequestType(item) && isUnread(item)).length;

      allCountChip.textContent = `All ${allCount}`;
      unreadCountChip.textContent = `Unread ${unreadCount}`;
      requestCountChip.textContent = `Requests ${requestCount}`;

      followRequestsLink.textContent = unreadFollowRequestCount > 0
        ? `Follow Req. (${unreadFollowRequestCount > 99 ? "99+" : unreadFollowRequestCount})`
        : "Follow Req.";
    }

    function matchesSearch(item, queryText){
      const q = queryText.trim().toLowerCase();
      if(!q) return true;

      return [
        item.title,
        item.text,
        item.type,
        item.fromUserId,
        item.postId,
        item.requestId,
        item.communityId,
        item.communityName,
        item.eventId,
        item.placeId
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase()
        .includes(q);
    }

    function filterItems(){
      const queryText = searchInput.value || "";

      return allDocs.filter(item => {
        if(!matchesSearch(item, queryText)) return false;
        if(currentTab === "unread") return isUnread(item);
        if(currentTab === "requests") return isRequestType(item);
        return true;
      });
    }

    function renderItems(items){
      list.innerHTML = "";

      if(!items.length){
        list.classList.add("hidden");
        emptyBox.classList.remove("hidden");

        emptyBox.textContent =
          currentTab === "unread"
            ? "No unread notifications."
            : currentTab === "requests"
              ? "No requests yet."
              : "No notifications yet.";

        return;
      }

      emptyBox.classList.add("hidden");
      list.classList.remove("hidden");

      items.forEach(item => {
        const a = document.createElement("a");
        a.className = `item ${isUnread(item) ? "unread" : ""}`;
        a.href = getTargetUrl(item);
        a.dataset.id = item.id;

        const typeInfo = normalizeType(item.type);

        a.innerHTML = `
          <div class="item-top">
            <div class="item-title">${escapeHtml(item.title || "Notification")}</div>
            <div class="item-time">${escapeHtml(formatDate(item.createdAt))}</div>
          </div>

          <div class="item-text">${escapeHtml(item.text || "No details")}</div>

          <div class="item-bottom">
            <div class="type-wrap">
              <span class="item-type ${typeInfo.cls}">${escapeHtml(typeInfo.label)}</span>
              ${isUnread(item) ? `<span class="item-type type-unread">Unread</span>` : ""}
            </div>

            <span class="mini-btn">${escapeHtml(getActionLabel(item))}</span>
          </div>
        `;

        a.addEventListener("click", async (e) => {
          e.preventDefault();

          if(isUnread(item)){
            await markOneAsRead(item.id);
          }

          window.location.href = a.href;
        });

        list.appendChild(a);
      });
    }

    async function safeSelect(table, buildQuery){
      try{
        let q = supabase.from(table).select("*");
        q = buildQuery ? buildQuery(q) : q;

        const { data, error } = await q;

        if(error){
          if(!isSchemaError(error)){
            console.warn(`Skipped ${table}:`, error.message || error);
          }

          return [];
        }

        return data || [];
      }catch(err){
        if(!isSchemaError(err)){
          console.warn(`Skipped ${table}:`, err?.message || err);
        }

        return [];
      }
    }

    async function updateNotificationById(notificationId, payloadVariants = []){
      let lastError = null;

      for(const payload of payloadVariants){
        try{
          const { error } = await supabase
            .from("notifications")
            .update(payload)
            .eq("id", notificationId);

          if(!error) return true;

          lastError = error;
        }catch(err){
          lastError = err;
        }
      }

      console.warn("Could not update notification:", lastError?.message || lastError);
      return false;
    }

    async function markOneAsRead(notificationId){
      if(!currentUser || !notificationId) return;

      const now = nowIso();

      const ok = await updateNotificationById(notificationId, [
        {is_read:true, read:true, read_at:now, updated_at:now},
        {isRead:true, read:true, readAt:now, updatedAt:now},
        {is_read:true, read_at:now},
        {read:true},
        {isRead:true}
      ]);

      if(ok){
        const target = allDocs.find(d => d.id === notificationId);

        if(target){
          target.isRead = true;
          target.is_read = true;
          target.read = true;
          target.readAt = now;
          target.read_at = now;
        }

        updateCounts(allDocs);
        renderItems(filterItems());
        announceNotificationRefresh();
      }
    }

    async function markAllAsRead(){
      if(!currentUser) return;

      const unreadItems = allDocs.filter(isUnread);

      if(!unreadItems.length){
        setMessage("Everything is already read.", "ok");
        return;
      }

      markAllBtn.disabled = true;
      setMessage("");

      try{
        const ids = unreadItems.map(item => item.id).filter(Boolean);
        const now = nowIso();
        let done = false;

        const payloads = [
          {is_read:true, read:true, read_at:now, updated_at:now},
          {isRead:true, read:true, readAt:now, updatedAt:now},
          {is_read:true, read_at:now},
          {read:true},
          {isRead:true}
        ];

        for(const payload of payloads){
          try{
            const { error } = await supabase
              .from("notifications")
              .update(payload)
              .in("id", ids);

            if(!error){
              done = true;
              break;
            }
          }catch{}
        }

        if(!done) throw new Error("Could not update notifications.");

        unreadItems.forEach(item => {
          item.isRead = true;
          item.is_read = true;
          item.read = true;
          item.readAt = now;
          item.read_at = now;
        });

        updateCounts(allDocs);
        renderItems(filterItems());
        setMessage("All notifications marked as read.", "ok");
        announceNotificationRefresh();
      }catch(err){
        console.error(err);
        setMessage("Could not mark all notifications as read.", "err");
      }

      markAllBtn.disabled = false;
    }

    function renderFromState(){
      updateCounts(allDocs);
      renderItems(filterItems());
      loading.classList.add("hidden");
    }

    function setActiveTab(tab){
      currentTab = tab;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      renderFromState();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setActiveTab(btn.dataset.tab || "all"));
    });

    searchInput.addEventListener("input", () => {
      clearSearchBtn.classList.toggle("hidden", !searchInput.value.trim());
      renderFromState();
    });

    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearSearchBtn.classList.add("hidden");
      renderFromState();
      searchInput.focus();
    });

    markAllBtn.addEventListener("click", markAllAsRead);

    async function loadNotifications(){
      if(!currentUser) return;

      loading.classList.remove("hidden");
      list.classList.add("hidden");
      emptyBox.classList.add("hidden");

      let rows = [];
      let loaded = false;

      const attempts = [
        ["to_user_id", "created_at"],
        ["user_id", "created_at"],
        ["target_id", "created_at"],
        ["toUserId", "createdAt"],
        ["userId", "createdAt"],
        ["targetId", "createdAt"]
      ];

      for(const [userCol, orderCol] of attempts){
        try{
          const { data, error } = await supabase
            .from("notifications")
            .select("*")
            .eq(userCol, currentUser.id)
            .order(orderCol, {ascending:false});

          if(!error){
            rows = data || [];
            loaded = true;
            break;
          }
        }catch{}
      }

      if(!loaded){
        try{
          const { data, error } = await supabase
            .from("notifications")
            .select("*");

          if(error) throw error;

          rows = (data || []).filter(row => {
            return getField(row, ["to_user_id", "toUserId", "user_id", "userId", "uid", "target_id", "targetId"], "") === currentUser.id;
          });
        }catch(err){
          console.error(err);
          loading.textContent = "Could not load notifications.";
          return;
        }
      }

      allDocs = rows
        .map(normalizeNotification)
        .filter(item => item.id)
        .filter(item => !isInboxNotificationType(item))
        .sort((a, b) => b.createdAtMs - a.createdAtMs);

      renderFromState();
    }

    function normalizeBadgeThread(raw){
      return {
        id:raw?.id || "",
        participantA:getField(raw, ["participant_a", "participantA"]),
        participantB:getField(raw, ["participant_b", "participantB"]),
        status:normalizeText(getField(raw, ["status"], "accepted") || "accepted")
      };
    }

    function normalizeBadgeMessage(raw){
      return {
        id:raw?.id || "",
        threadId:getField(raw, ["thread_id", "threadId"]),
        senderId:getField(raw, ["sender_id", "senderId", "from_user_id", "fromUserId"]),
        createdAt:raw?.created_at ?? raw?.createdAt ?? null,
        seenAt:raw?.seen_at ?? raw?.seenAt ?? null,
        readAt:raw?.read_at ?? raw?.readAt ?? null,
        isRead:raw?.is_read ?? raw?.isRead ?? null,
        read:raw?.read ?? null
      };
    }

    function badgeMessageUnread(msg){
      if(!msg || !currentUser?.id) return false;
      if(msg.senderId === currentUser.id) return false;
      if(msg.isRead === true || msg.read === true) return false;
      if(msg.seenAt || msg.readAt) return false;
      return true;
    }

    function setInboxBadge(count){
      if(!inboxBadge) return;

      const safeCount = Number(count || 0);

      if(safeCount > 0){
        inboxBadge.textContent = safeCount > 99 ? "99+" : String(safeCount);
        inboxBadge.classList.add("show");
      }else{
        inboxBadge.textContent = "0";
        inboxBadge.classList.remove("show");
      }
    }

    async function countPendingMessageRequests(){
      if(!currentUser?.id) return 0;

      const map = new Map();

      const targetColumns = [
        "target_id",
        "to_user_id",
        "receiver_id",
        "recipient_id",
        "targetId",
        "toUserId",
        "receiverId",
        "recipientId"
      ];

      for(const col of targetColumns){
        const rows = await safeSelect("message_requests", q => q.eq(col, currentUser.id));

        rows.forEach(row => {
          const id = row.id || `${col}-${getField(row, ["from_user_id", "fromUserId", "sender_id", "senderId"], "")}`;
          const status = normalizeText(getField(row, ["status", "request_status", "requestStatus"], "pending") || "pending");

          if(status === "pending") map.set(id, row);
        });
      }

      return map.size;
    }

    async function countUnreadChatMessages(){
      if(!currentUser?.id) return 0;

      const threadMap = new Map();

      const threadAttempts = [
        ["participant_a", "participant_b"],
        ["participantA", "participantB"]
      ];

      for(const [a, b] of threadAttempts){
        try{
          const { data, error } = await supabase
            .from("chat_threads")
            .select("*")
            .or(`${a}.eq.${currentUser.id},${b}.eq.${currentUser.id}`);

          if(!error && Array.isArray(data)){
            data.forEach(row => {
              const thread = normalizeBadgeThread(row);
              if(thread.id && thread.status === "accepted") threadMap.set(thread.id, thread);
            });
          }
        }catch{}
      }

      const threadIds = [...threadMap.keys()];
      if(!threadIds.length) return 0;

      let messageRows = await safeSelect("chat_messages", q => q.in("thread_id", threadIds));

      if(!messageRows.length){
        messageRows = await safeSelect("chat_messages", q => q.in("threadId", threadIds));
      }

      const byThread = new Map();

      messageRows.forEach(row => {
        const msg = normalizeBadgeMessage(row);
        if(!msg.id || !msg.threadId || !threadMap.has(msg.threadId)) return;

        if(!byThread.has(msg.threadId)) byThread.set(msg.threadId, []);
        byThread.get(msg.threadId).push(msg);
      });

      let total = 0;

      byThread.forEach(messages => {
        const lastOutgoingMs = messages
          .filter(msg => msg.senderId === currentUser.id)
          .reduce((max, msg) => Math.max(max, toMillis(msg.createdAt)), 0);

        messages.forEach(msg => {
          if(toMillis(msg.createdAt) <= lastOutgoingMs) return;
          if(badgeMessageUnread(msg)) total += 1;
        });
      });

      return total;
    }

    async function refreshInboxBadge(){
      if(!currentUser?.id){
        setInboxBadge(0);
        return;
      }

      try{
        const [requestsCount, unreadCount] = await Promise.all([
          countPendingMessageRequests(),
          countUnreadChatMessages()
        ]);

        setInboxBadge(Number(requestsCount || 0) + Number(unreadCount || 0));
      }catch(err){
        console.warn("Inbox badge refresh failed:", err?.message || err);
      }
    }

    function scheduleInboxBadgeRefresh(delay = 300){
      clearTimeout(badgeRefreshTimer);

      badgeRefreshTimer = setTimeout(() => {
        refreshInboxBadge().catch(() => {});
      }, delay);
    }

    function scheduleRefresh(delay = 350){
      clearTimeout(refreshTimer);

      refreshTimer = setTimeout(() => {
        Promise.allSettled([loadNotifications(), refreshInboxBadge()]).catch(() => {});
      }, delay);
    }

    function clearRealtimeChannels(){
      realtimeChannels.forEach(channel => {
        try{supabase.removeChannel(channel)}catch{}
      });

      realtimeChannels = [];
    }

    function setupRealtime(){
      clearRealtimeChannels();

      const tables = [
        { table:"notifications", handler:() => scheduleRefresh(250) },
        { table:"message_requests", handler:() => scheduleInboxBadgeRefresh(250) },
        { table:"chat_threads", handler:() => scheduleInboxBadgeRefresh(250) },
        { table:"chat_messages", handler:() => scheduleInboxBadgeRefresh(250) },
        { table:"follow_requests", handler:() => scheduleRefresh(300) }
      ];

      tables.forEach(item => {
        try{
          const channel = supabase
            .channel(`ownspace-notifications-${item.table}-${Math.random().toString(36).slice(2)}`)
            .on(
              "postgres_changes",
              {event:"*", schema:"public", table:item.table},
              () => item.handler()
            )
            .subscribe();

          realtimeChannels.push(channel);
        }catch{}
      });
    }

    refreshBtn.addEventListener("click", async () => {
      if(!currentUser) return;

      refreshBtn.disabled = true;
      setMessage("");

      try{
        await Promise.allSettled([loadNotifications(), refreshInboxBadge()]);
        setMessage("Refreshed.", "ok");
      }catch(err){
        console.error(err);
        setMessage("Could not refresh.", "err");
      }

      refreshBtn.disabled = false;
    });

    window.addEventListener("ownspace:badges-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:inbox-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:chat-read-refresh", () => scheduleInboxBadgeRefresh(120));
    window.addEventListener("ownspace:notifications-refresh", () => scheduleRefresh(120));

    window.addEventListener("pageshow", () => {
      scheduleRefresh(120);
      scheduleInboxBadgeRefresh(120);
    });

    window.addEventListener("focus", () => {
      scheduleRefresh(180);
      scheduleInboxBadgeRefresh(180);
    });

    document.addEventListener("visibilitychange", () => {
      if(!document.hidden){
        scheduleRefresh(160);
        scheduleInboxBadgeRefresh(160);
      }
    });

    async function initPage(){
      const { data, error } = await supabase.auth.getUser();

      if(error || !data?.user){
        window.location.href = "login.html";
        return;
      }

      currentUser = data.user;

      await Promise.allSettled([
        loadNotifications(),
        refreshInboxBadge()
      ]);

      setupRealtime();

      supabase.auth.onAuthStateChange((_event, session) => {
        if(!session?.user){
          clearRealtimeChannels();
          window.location.href = "login.html";
        }
      });
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(refreshTimer);
      clearTimeout(badgeRefreshTimer);
      clearRealtimeChannels();
    });

    initPage().catch(err => {
      console.error(err);
      loading.textContent = "Could not load notifications.";
    });
