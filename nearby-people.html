<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BareWorld - Nearby People</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

    :root,
    html[data-theme="dark"]{
      --bg:#07101f;
      --surface:#0c1630;
      --surface-2:#111d3d;
      --surface-3:#15244a;
      --line:rgba(255,255,255,.08);
      --line-soft:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#9aa7c7;
      --blue:#4cc9ff;
      --green:#3ddc84;
      --yellow:#f5b942;
      --purple:#a78bfa;
      --red:#ff5d73;
      --topbar-bg:rgba(9,15,31,.92);
      --nav-bg:rgba(9,15,31,.98);
      --shadow:0 20px 40px rgba(0,0,0,.18);
    }

    html[data-theme="light"]{
      --bg:#f3f6fb;
      --surface:#ffffff;
      --surface-2:#f7f9fd;
      --surface-3:#edf3ff;
      --line:rgba(15,23,42,.09);
      --line-soft:rgba(15,23,42,.05);
      --text:#14213d;
      --muted:#6b7893;
      --blue:#1f8fff;
      --green:#22b36c;
      --yellow:#d59617;
      --purple:#7f63ff;
      --red:#e74c66;
      --topbar-bg:rgba(255,255,255,.94);
      --nav-bg:rgba(255,255,255,.98);
      --shadow:0 16px 30px rgba(20,33,61,.08);
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px 12px 110px;
    }
    .app{max-width:760px;margin:0 auto}
    .hidden{display:none!important}

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:var(--topbar-bg);
      border:1px solid var(--line-soft);
      border-radius:18px;
      padding:8px 10px;
      margin-bottom:12px;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top-icon-btn{
      width:44px;
      height:44px;
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border-radius:14px;
      cursor:pointer;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .top-icon-btn svg{width:19px;height:19px;display:block}
    .top-center{text-align:center;min-width:0}
    .brand{font-size:20px;font-weight:800;line-height:1.05}
    .brand-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }
    .hero-sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-2);
      color:var(--text);
    }
    .chip-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .chip-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .chip-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .chip-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}
    .chip-red{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.20)}

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .action-btn{
      border:none;
      border-radius:12px;
      padding:10px 13px;
      font-size:13px;
      font-weight:800;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
    }
    .btn-primary{
      background:rgba(76,201,255,.14);
      color:var(--text);
      border:1px solid rgba(76,201,255,.20);
    }
    .btn-soft{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-purple{
      background:rgba(167,139,250,.14);
      color:var(--text);
      border:1px solid rgba(167,139,250,.20);
    }
    .btn-green{
      background:rgba(61,220,132,.14);
      color:var(--text);
      border:1px solid rgba(61,220,132,.20);
    }
    .btn-red{
      background:rgba(255,93,115,.14);
      color:var(--text);
      border:1px solid rgba(255,93,115,.20);
    }
    .btn-yellow{
      background:rgba(245,185,66,.14);
      color:var(--text);
      border:1px solid rgba(245,185,66,.20);
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .tab-btn{
      border:none;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 10px;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
    }
    .tab-btn.active{
      background:rgba(76,201,255,.14);
      border-color:rgba(76,201,255,.20);
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:16px;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--line);
      font-size:14px;
      margin-bottom:12px;
    }
    .search-box::placeholder{color:var(--muted)}

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      background:var(--surface-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

    .person-card{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .person-avatar,.person-avatar-placeholder{
      width:56px;
      height:56px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--line);
      background:var(--surface-3);
    }
    .person-avatar{object-fit:cover}
    .person-avatar-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      padding:6px;
    }

    .person-body{
      min-width:0;
      flex:1;
    }
    .person-name{
      font-size:15px;
      font-weight:800;
      line-height:1.3;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .person-name a{
      color:var(--text);
      text-decoration:none;
    }
    .person-name a:hover{text-decoration:underline}
    .verified-dot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:rgba(61,220,132,.14);
      color:#d9ffe8;
      border:1px solid rgba(61,220,132,.20);
      font-size:10px;
      font-weight:900;
    }
    .person-username{
      font-size:12px;
      color:var(--blue);
      font-weight:700;
      margin-top:3px;
      word-break:break-word;
    }
    .card-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:4px;
    }
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .mini-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid var(--line);
      background:var(--surface-3);
      color:var(--text);
    }
    .mini-blue{background:rgba(76,201,255,.14);border-color:rgba(76,201,255,.20)}
    .mini-green{background:rgba(61,220,132,.14);border-color:rgba(61,220,132,.20)}
    .mini-yellow{background:rgba(245,185,66,.14);border-color:rgba(245,185,66,.20)}
    .mini-purple{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.20)}

    .card-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .loading-box{
      text-align:center;
      color:var(--muted);
      padding:20px 10px;
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .empty-box{
      text-align:center;
      padding:22px 10px;
      color:var(--muted);
      background:var(--surface-2);
      border-radius:16px;
      border:1px dashed var(--line);
    }
    .status-text{
      min-height:18px;
      font-size:13px;
      margin-top:10px;
    }
    .status-ok{color:#86efac}
    .status-err{color:#fda4af}

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 16px));
      background:var(--nav-bg);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      z-index:50;
      box-shadow:0 22px 44px rgba(0,0,0,.22);
    }
    .nav-link{
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:10px 6px;
      border-radius:14px;
      font-size:11px;
      font-weight:700;
      min-height:58px;
      border:none;
      background:transparent;
      cursor:pointer;
    }
    .nav-link .icon{
      font-size:18px;
      line-height:1;
      display:block;
    }
    .nav-link.active{
      background:rgba(76,201,255,.14);
      color:var(--text);
    }

    @media (max-width:700px){
      body{padding:10px 10px 110px}
      .brand{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="nearby.html" class="top-icon-btn" aria-label="Back to nearby">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </a>

      <div class="top-center">
        <div class="brand">BareWorld</div>
        <div class="brand-sub">Nearby people</div>
      </div>

      <button id="refreshBtn" class="top-icon-btn" type="button" aria-label="Refresh people">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
      </button>
    </div>

    <div class="panel">
      <div class="hero-title">People Around You</div>
      <div class="hero-sub">
        Discover members nearby, filter by following or verified accounts, and open their profiles fast.
      </div>

      <div class="chip-row">
        <span class="chip chip-blue" id="cityChip">City: -</span>
        <span class="chip chip-purple" id="modeChip">Mode: -</span>
        <span class="chip chip-yellow" id="browserChip">Browser location off</span>
      </div>

      <div class="action-row">
        <button id="useBrowserLocationBtn" class="action-btn btn-primary" type="button">Use Browser Location</button>
        <a href="search.html" class="action-btn btn-soft">Search Members</a>
        <a href="settings.html" class="action-btn btn-purple">Nearby Settings</a>
      </div>

      <div id="pageStatus" class="status-text"></div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" data-tab="discover">Discover</button>
        <button class="tab-btn" data-tab="following">Following</button>
        <button class="tab-btn" data-tab="verified">Verified</button>
      </div>

      <input id="searchInput" class="search-box" type="text" placeholder="Search nearby people..." />

      <div id="listLoading" class="loading-box">Loading nearby people...</div>
      <div id="listWrap" class="list hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No nearby people found.</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="feed.html" class="nav-link">
      <span class="icon">⌂</span>
      <span>Feed</span>
    </a>
    <a href="nearby.html" class="nav-link active">
      <span class="icon">◎</span>
      <span>Nearby</span>
    </a>
    <a href="feed.html#composerPanel" class="nav-link">
      <span class="icon">＋</span>
      <span>Create</span>
    </a>
    <a href="search.html" class="nav-link">
      <span class="icon">⌕</span>
      <span>Search</span>
    </a>
    <a href="profile.html" class="nav-link">
      <span class="icon">◉</span>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getDoc,
      getDocs,
      setDoc,
      deleteDoc,
      addDoc,
      collection,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const cityChip = document.getElementById("cityChip");
    const modeChip = document.getElementById("modeChip");
    const browserChip = document.getElementById("browserChip");

    const refreshBtn = document.getElementById("refreshBtn");
    const useBrowserLocationBtn = document.getElementById("useBrowserLocationBtn");
    const pageStatus = document.getElementById("pageStatus");

    const searchInput = document.getElementById("searchInput");
    const listLoading = document.getElementById("listLoading");
    const listWrap = document.getElementById("listWrap");
    const emptyBox = document.getElementById("emptyBox");

    let currentUser = null;
    let viewerProfile = null;
    let viewerBlockedUsers = [];
    let browserCoords = null;
    let currentTab = "discover";

    let peopleData = [];
    let followMap = new Map();
    let requestMap = new Map();

    function getStoredTheme() {
      return localStorage.getItem("bwTheme") || "dark";
    }

    function resolveTheme(themeValue) {
      if (themeValue === "system") {
        return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      return themeValue === "light" ? "light" : "dark";
    }

    function applyTheme(themeValue) {
      document.documentElement.setAttribute("data-theme", resolveTheme(themeValue));
    }

    applyTheme(getStoredTheme());

    window.addEventListener("storage", (e) => {
      if (e.key === "bwTheme") applyTheme(getStoredTheme());
    });

    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (getStoredTheme() === "system") applyTheme("system");
    });

    function setPageStatus(text = "", type = "") {
      pageStatus.textContent = text;
      pageStatus.className = `status-text ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function readLat(obj) {
      return num(
        obj?.lat ??
        obj?.latitude ??
        obj?.location?.lat ??
        obj?.location?.latitude ??
        obj?.coords?.lat ??
        obj?.coords?.latitude
      );
    }

    function readLng(obj) {
      return num(
        obj?.lng ??
        obj?.lon ??
        obj?.long ??
        obj?.longitude ??
        obj?.location?.lng ??
        obj?.location?.lon ??
        obj?.location?.long ??
        obj?.location?.longitude ??
        obj?.coords?.lng ??
        obj?.coords?.longitude
      );
    }

    function normalizeProfile(raw, fallbackUid = "") {
      const d = raw || {};
      return {
        uid: d.uid || d.id || fallbackUid || "",
        displayName: d.displayName || d.name || d.fullName || d.username || "Member",
        username: d.username || d.handle || d.userName || "",
        photoURL: d.photoURL || d.avatar || d.avatarUrl || d.userPhotoURL || "",
        bio: d.bio || d.about || d.description || "",
        isPrivate: !!(d.isPrivate || d.privateProfile || d.private || d.accountPrivate),
        verified: !!(d.verified || d.isVerified),
        moderationStatus: d.moderationStatus || d.status || "",
        isHiddenByAdmin: !!d.isHiddenByAdmin,
        softDeleted: !!d.softDeleted,
        showInNearby: !!d.showInNearby,
        locationVisibility: d.locationVisibility || "hidden",
        city: d.city || d.locationCity || d.currentCity || "",
        blockedUsers: Array.isArray(d.blockedUsers) ? d.blockedUsers : [],
        lat: readLat(d),
        lng: readLng(d)
      };
    }

    function kmDistance(lat1, lng1, lat2, lng2) {
      if ([lat1, lng1, lat2, lng2].some(v => v === null || v === undefined)) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function sameCity(a, b) {
      const aa = String(a || "").trim().toLowerCase();
      const bb = String(b || "").trim().toLowerCase();
      return aa && bb && aa === bb;
    }

    function formatDistanceLabel(distanceKm) {
      if (distanceKm === null || distanceKm === undefined) return "";
      if (distanceKm < 1) return "Under 1 km";
      if (distanceKm < 10) return `${distanceKm.toFixed(1)} km away`;
      return `${Math.round(distanceKm)} km away`;
    }

    async function requestBrowserLocation() {
      if (!navigator.geolocation) {
        browserCoords = null;
        browserChip.textContent = "Browser location unsupported";
        browserChip.className = "chip chip-red";
        renderPeople();
        return;
      }

      browserChip.textContent = "Checking browser location...";
      browserChip.className = "chip chip-yellow";

      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            browserCoords = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            browserChip.textContent = "Browser location on";
            browserChip.className = "chip chip-green";
            resolve();
          },
          () => {
            browserCoords = null;
            browserChip.textContent = "Browser location off";
            browserChip.className = "chip chip-yellow";
            resolve();
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
        );
      });

      renderPeople();
    }

    function renderViewerChips() {
      if (!viewerProfile) return;

      cityChip.textContent = `City: ${viewerProfile.city || "Not added"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "hidden"}`;

      cityChip.className = "chip chip-blue";
      modeChip.className = "chip chip-purple";

      if (!browserCoords) {
        browserChip.textContent = "Browser location off";
        browserChip.className = "chip chip-yellow";
      }
    }

    function openLoading() {
      listLoading.classList.remove("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.add("hidden");
      listWrap.innerHTML = "";
    }

    function showEmpty(text) {
      listLoading.classList.add("hidden");
      listWrap.classList.add("hidden");
      emptyBox.classList.remove("hidden");
      emptyBox.textContent = text;
    }

    function showList() {
      listLoading.classList.add("hidden");
      listWrap.classList.remove("hidden");
      emptyBox.classList.add("hidden");
    }

    function getRelation(profile) {
      if (profile.uid === currentUser.uid) return "self";
      if (followMap.has(profile.uid)) return "following";
      if (requestMap.has(profile.uid)) return "requested";
      return profile.isPrivate ? "request" : "follow";
    }

    function buildPersonViewModel(profile) {
      const viewerLat = browserCoords?.lat ?? viewerProfile?.lat ?? null;
      const viewerLng = browserCoords?.lng ?? viewerProfile?.lng ?? null;

      let distanceKm = null;
      let score = 0;

      if (viewerLat !== null && viewerLng !== null && profile.lat !== null && profile.lng !== null) {
        distanceKm = kmDistance(viewerLat, viewerLng, profile.lat, profile.lng);
        if (distanceKm !== null) score = Math.max(0, 500 - distanceKm);
      } else if (sameCity(viewerProfile?.city, profile.city)) {
        score = 250;
      }

      let locationText = "";
      const mode = profile.locationVisibility || "hidden";

      if (mode === "city" && profile.city) {
        locationText = profile.city;
      } else if (mode === "approximate" && distanceKm !== null) {
        locationText = formatDistanceLabel(distanceKm);
      } else if (mode === "approximate" && sameCity(viewerProfile?.city, profile.city)) {
        locationText = "Same area";
      }

      return {
        ...profile,
        distanceKm,
        score,
        locationText,
        relation: getRelation(profile)
      };
    }

    function matchesSearch(profile, q) {
      if (!q) return true;
      const joined = [
        profile.displayName,
        profile.username,
        profile.bio,
        profile.city
      ].filter(Boolean).join(" ").toLowerCase();

      return joined.includes(q.toLowerCase());
    }

    function getFilteredPeople() {
      const q = searchInput.value.trim();

      let rows = peopleData
        .filter(p => p.uid !== currentUser.uid)
        .filter(p => p.showInNearby)
        .filter(p => !p.softDeleted && !p.isHiddenByAdmin && p.moderationStatus !== "banned")
        .filter(p => !viewerBlockedUsers.includes(p.uid))
        .map(buildPersonViewModel)
        .filter(p => matchesSearch(p, q));

      if (currentTab === "following") {
        rows = rows.filter(p => p.relation === "following");
      } else if (currentTab === "verified") {
        rows = rows.filter(p => p.verified);
      }

      return rows.sort((a, b) => {
        if (a.relation === "following" && b.relation !== "following") return -1;
        if (b.relation === "following" && a.relation !== "following") return 1;
        if (a.verified && !b.verified) return -1;
        if (b.verified && !a.verified) return 1;
        return b.score - a.score || a.displayName.localeCompare(b.displayName);
      });
    }

    async function createNotificationSafe(targetUid, payload) {
      if (!targetUid || targetUid === currentUser.uid) return;
      try {
        await addDoc(collection(db, "notifications", targetUid, "items"), payload);
      } catch {}
    }

    async function followPerson(profile) {
      await setDoc(doc(db, "follows", `${currentUser.uid}__${profile.uid}`), {
        followerId: currentUser.uid,
        followingId: profile.uid,
        createdAt: serverTimestamp()
      });

      await createNotificationSafe(profile.uid, {
        type: "follow",
        title: "New follower",
        text: `${viewerProfile?.displayName || currentUser.displayName || "Someone"} started following you.`,
        fromUserId: currentUser.uid,
        toUserId: profile.uid,
        createdAt: serverTimestamp(),
        isRead: false
      });
    }

    async function unfollowPerson(profile) {
      const docId = followMap.get(profile.uid) || `${currentUser.uid}__${profile.uid}`;
      await deleteDoc(doc(db, "follows", docId));
    }

    async function requestFollow(profile) {
      await setDoc(doc(db, "follow_requests", `${currentUser.uid}__${profile.uid}`), {
        requesterId: currentUser.uid,
        targetId: profile.uid,
        createdAt: serverTimestamp()
      });

      await createNotificationSafe(profile.uid, {
        type: "follow_request",
        title: "Follow request",
        text: `${viewerProfile?.displayName || currentUser.displayName || "Someone"} sent you a follow request.`,
        fromUserId: currentUser.uid,
        toUserId: profile.uid,
        createdAt: serverTimestamp(),
        isRead: false
      });
    }

    async function cancelRequest(profile) {
      const docId = requestMap.get(profile.uid) || `${currentUser.uid}__${profile.uid}`;
      await deleteDoc(doc(db, "follow_requests", docId));
    }

    function buildRelationButton(profile) {
      if (profile.relation === "following") {
        return `<button class="action-btn btn-red relation-btn" data-action="unfollow" data-uid="${escapeHtml(profile.uid)}" type="button">Unfollow</button>`;
      }
      if (profile.relation === "requested") {
        return `<button class="action-btn btn-yellow relation-btn" data-action="cancel" data-uid="${escapeHtml(profile.uid)}" type="button">Requested</button>`;
      }
      if (profile.relation === "request") {
        return `<button class="action-btn btn-purple relation-btn" data-action="request" data-uid="${escapeHtml(profile.uid)}" type="button">Request</button>`;
      }
      return `<button class="action-btn btn-green relation-btn" data-action="follow" data-uid="${escapeHtml(profile.uid)}" type="button">Follow</button>`;
    }

    function renderPeople() {
      openLoading();

      requestAnimationFrame(() => {
        const rows = getFilteredPeople();

        if (!rows.length) {
          const emptyText = currentTab === "following"
            ? "No nearby people you follow right now."
            : currentTab === "verified"
            ? "No verified nearby people found."
            : "No nearby people found.";
          showEmpty(emptyText);
          return;
        }

        listWrap.innerHTML = "";

        rows.forEach(profile => {
          const avatarHtml = profile.photoURL
            ? `<img class="person-avatar" src="${escapeHtml(profile.photoURL)}" alt="Profile photo">`
            : `<div class="person-avatar-placeholder">No photo</div>`;

          const badges = [];
          badges.push(`<span class="mini-badge ${profile.isPrivate ? "mini-yellow" : "mini-blue"}">${profile.isPrivate ? "Private" : "Public"}</span>`);
          if (profile.verified) badges.push(`<span class="mini-badge mini-green">Verified</span>`);
          if (profile.locationText) badges.push(`<span class="mini-badge mini-purple">${escapeHtml(profile.locationText)}</span>`);

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="person-card">
              ${avatarHtml}
              <div class="person-body">
                <div class="person-name">
                  <a href="member.html?uid=${encodeURIComponent(profile.uid)}">${escapeHtml(profile.displayName)}</a>
                  ${profile.verified ? `<span class="verified-dot">✓</span>` : ""}
                </div>
                ${profile.username ? `<div class="person-username">@${escapeHtml(profile.username)}</div>` : ""}
                <div class="card-sub">${escapeHtml(profile.bio || "Nearby member")}</div>
                <div class="badge-row">${badges.join("")}</div>
                <div class="card-actions">
                  <a href="member.html?uid=${encodeURIComponent(profile.uid)}" class="action-btn btn-soft">View Profile</a>
                  ${buildRelationButton(profile)}
                </div>
              </div>
            </div>
          `;

          const img = card.querySelector(".person-avatar");
          if (img) {
            img.addEventListener("error", () => {
              img.outerHTML = `<div class="person-avatar-placeholder">No photo</div>`;
            });
          }

          listWrap.appendChild(card);
        });

        listWrap.querySelectorAll(".relation-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const action = btn.getAttribute("data-action");
            const uid = btn.getAttribute("data-uid");
            const profile = rows.find(p => p.uid === uid);
            if (!profile) return;

            btn.disabled = true;
            setPageStatus("");

            try {
              if (action === "follow") await followPerson(profile);
              else if (action === "unfollow") await unfollowPerson(profile);
              else if (action === "request") await requestFollow(profile);
              else if (action === "cancel") await cancelRequest(profile);

              await loadRelations();
              renderPeople();

              const messages = {
                follow: "Now following member.",
                unfollow: "Unfollowed member.",
                request: "Follow request sent.",
                cancel: "Follow request cancelled."
              };
              setPageStatus(messages[action] || "Updated.", "status-ok");
            } catch (err) {
              console.error(err);
              setPageStatus("Could not update follow state.", "status-err");
              btn.disabled = false;
            }
          });
        });

        showList();
      });
    }

    async function loadViewer(uid) {
      const [userSnap, publicSnap] = await Promise.all([
        getDoc(doc(db, "users", uid)),
        getDoc(doc(db, "publicProfiles", uid))
      ]);

      viewerProfile = normalizeProfile({
        ...(publicSnap.exists() ? publicSnap.data() : {}),
        ...(userSnap.exists() ? userSnap.data() : {}),
        uid
      }, uid);

      viewerBlockedUsers = viewerProfile.blockedUsers || [];
      cityChip.textContent = `City: ${viewerProfile.city || "Not added"}`;
      modeChip.textContent = `Mode: ${viewerProfile.locationVisibility || "hidden"}`;
    }

    async function loadPeople() {
      const snap = await getDocs(collection(db, "publicProfiles"));
      peopleData = snap.docs.map(d => normalizeProfile({ id: d.id, ...d.data() }, d.id));
    }

    async function loadRelations() {
      followMap = new Map();
      requestMap = new Map();

      const [followsSnap, requestsSnap] = await Promise.all([
        getDocs(collection(db, "follows")),
        getDocs(collection(db, "follow_requests"))
      ]);

      followsSnap.forEach(d => {
        const data = d.data();
        if (data.followerId === currentUser.uid && data.followingId) {
          followMap.set(data.followingId, d.id);
        }
      });

      requestsSnap.forEach(d => {
        const data = d.data();
        if (data.requesterId === currentUser.uid && data.targetId) {
          requestMap.set(data.targetId, d.id);
        }
      });
    }

    async function refreshAll() {
      openLoading();
      await Promise.all([
        loadPeople(),
        loadRelations()
      ]);
      renderViewerChips();
      renderPeople();
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      searchInput.placeholder =
        tab === "following"
          ? "Search nearby people you follow..."
          : tab === "verified"
          ? "Search verified nearby people..."
          : "Search nearby people...";

      renderPeople();
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    searchInput.addEventListener("input", renderPeople);
    refreshBtn.addEventListener("click", refreshAll);
    useBrowserLocationBtn.addEventListener("click", requestBrowserLocation);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        await loadViewer(user.uid);
        await refreshAll();
      } catch (err) {
        console.error(err);
        showEmpty("Could not load nearby people.");
      }
    });
  </script>
</body>
</html>
